<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações Automáticas</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: #0b2256;
            color: #ffffff;
            display: flex;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 0;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top, rgba(54, 105, 214, 0.55), transparent 34%),
                linear-gradient(180deg, #11317a 0%, #0b2256 42%, #071634 100%);
            z-index: -1;
        }
        .app {
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            padding: 18px 16px 32px;
        }
        .topo {
            position: relative;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
            padding: 10px 0 4px;
        }
        .titulo {
            color: #ffffff;
            font-size: 24px;
            line-height: 1.1;
            font-weight: 700;
            text-align: center;
            max-width: calc(100% - 58px);
            letter-spacing: 0.3px;
        }
        .btn-home {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: rgba(255,255,255,0.16);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.28);
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
            font-size: 20px;
            color: #ffffff;
        }
        .btn-home:active {
            background: rgba(255,255,255,0.30);
            transform: translateY(-50%) scale(0.92);
        }
        .btn-home img {
            width: 22px;
            height: 22px;
            filter: brightness(0) invert(1);
        }
        .status {
            margin: 4px 0 10px;
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            line-height: 1.35;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .status:empty {
            margin: 0;
        }
        .secao {
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 18px;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(8px);
            padding: 18px 16px;
            margin-bottom: 14px;
        }
        .secao-titulo {
            color: #ffeb3b;
            font-size: 17px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            letter-spacing: 0.3px;
        }
        .campo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
        }
        .campo + .campo {
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        label {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            font-weight: 500;
            text-align: left;
            flex: 1;
            margin: 0;
            line-height: 1.3;
        }
        input {
            width: 100px;
            flex-shrink: 0;
            min-height: 46px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.12);
            color: #ffeb3b;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            padding: 8px 10px;
            outline: none;
            user-select: text;
            -webkit-user-select: text;
            transition: background 0.15s ease, box-shadow 0.15s ease;
            border: 1px solid rgba(255,255,255,0.18);
        }
        input:focus {
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 0 2px rgba(255, 235, 59, 0.5);
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            appearance: textfield;
            -moz-appearance: textfield;
        }
        .meta {
            margin-top: 12px;
            padding: 9px 12px 9px 12px;
            border-left: 3px solid rgba(255,255,255,0.28);
            border-radius: 0 6px 6px 0;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            line-height: 1.45;
            text-align: left;
        }
        .acoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 18px;
        }
        button {
            min-height: 50px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
            letter-spacing: 0.4px;
            transition: transform 0.12s ease;
        }
        button:active { transform: scale(0.97); }
        .btn-salvar {
            background: linear-gradient(135deg, #1b8f3a 0%, #27ae60 100%);
            box-shadow: 0 4px 16px rgba(27, 143, 58, 0.4);
        }
        .btn-resetar {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
        }
        button:disabled {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.3);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="topo">
        <div class="titulo">Configurações Automáticas</div>
        <div class="btn-home" onclick="window.location.href='index.html'" role="button" aria-label="Voltar">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="status" id="status">Carregando configurações...</div>

    <div class="secao">
        <div class="secao-titulo">Prioridade de rota</div>
        <div class="campo">
            <label for="valorMinimoRota">Valor mínimo da rota</label>
            <input id="valorMinimoRota" type="number" min="1" step="1" inputmode="numeric">
        </div>
        <div class="campo">
            <label for="diasMaximosRota">Dias máximos sem fazer</label>
            <input id="diasMaximosRota" type="number" min="1" step="1" inputmode="numeric">
        </div>
        <div class="campo">
            <label for="diasMinimosRota">Dias mínimos</label>
            <input id="diasMinimosRota" type="number" min="0" step="1" inputmode="numeric">
        </div>
    </div>

    <div class="secao">
        <div class="secao-titulo">Manutenção automática</div>
        <div class="campo">
            <label for="diasSemVisita">Dias sem visita para criar manutenção</label>
            <input id="diasSemVisita" type="number" min="1" step="1" inputmode="numeric">
        </div>
        <div class="meta" id="metaAtualizacao">Sem atualização registrada.</div>
    </div>

    <div class="acoes">
        <button type="button" class="btn-resetar" id="btnPadrao">Padrão</button>
        <button type="button" class="btn-salvar" id="btnSalvar">Salvar</button>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbObterConfiguracoesAutomaticas, dbSalvarConfiguracoesAutomaticas } from './database.js';

    const PADRAO = {
        prioridade_rota: {
            valor_minimo: 1500,
            dias_minimos: 0,
            dias_maximos: 70
        },
        manutencao_sem_visita: {
            dias_minimos: 100
        }
    };

    const els = {
        status: document.getElementById('status'),
        meta: document.getElementById('metaAtualizacao'),
        valorMinimoRota: document.getElementById('valorMinimoRota'),
        diasMinimosRota: document.getElementById('diasMinimosRota'),
        diasMaximosRota: document.getElementById('diasMaximosRota'),
        diasSemVisita: document.getElementById('diasSemVisita'),
        btnSalvar: document.getElementById('btnSalvar'),
        btnPadrao: document.getElementById('btnPadrao')
    };

    let assinaturaSalva = '';
    let salvando = false;

    function obterUsuarioAtual() {
        return String(localStorage.getItem('usuarioLogado') || localStorage.getItem('usuario_selecionado') || '').trim();
    }

    function obterPerfilAtual() {
        const nome = obterUsuarioAtual();
        try {
            const cache = JSON.parse(localStorage.getItem('cache_colaboradores') || '[]');
            const usuario = cache.find(c => String(c?.nome || '').trim() === nome);
            return String(usuario?.nivel_completo || '');
        } catch (_) {
            return '';
        }
    }

    function validarAcesso() {
        if (obterPerfilAtual().includes('gestao_3')) return true;
        els.status.textContent = 'Acesso restrito à gestão nível 3.';
        els.btnSalvar.disabled = true;
        els.btnPadrao.disabled = true;
        return false;
    }

    function numeroPositivo(valor, nomeCampo) {
        const numero = Number(String(valor || '').trim());
        if (!Number.isFinite(numero) || numero <= 0) {
            throw new Error(`Informe um valor válido para ${nomeCampo}.`);
        }
        return Math.round(numero);
    }

    function numeroNaoNegativo(valor, nomeCampo) {
        const numero = Number(String(valor || '').trim());
        if (!Number.isFinite(numero) || numero < 0) {
            throw new Error(`Informe um valor válido para ${nomeCampo}.`);
        }
        return Math.round(numero);
    }

    function montarAssinaturaValores(valores) {
        return [
            Number(valores?.prioridade_rota?.valor_minimo || 0),
            Number(valores?.prioridade_rota?.dias_minimos || 0),
            Number(valores?.prioridade_rota?.dias_maximos || 0),
            Number(valores?.manutencao_sem_visita?.dias_minimos || 0)
        ].join('|');
    }

    function obterValoresCampos() {
        return {
            prioridade_rota: {
                valor_minimo: numeroPositivo(els.valorMinimoRota.value, 'valor mínimo da rota'),
                dias_minimos: numeroNaoNegativo(els.diasMinimosRota.value, 'dias mínimos da rota'),
                dias_maximos: numeroPositivo(els.diasMaximosRota.value, 'dias máximos da rota')
            },
            manutencao_sem_visita: {
                dias_minimos: numeroPositivo(els.diasSemVisita.value, 'dias sem visita')
            }
        };
    }

    function atualizarEstadoSalvar() {
        if (salvando || !validarAcesso()) {
            els.btnSalvar.disabled = true;
            return;
        }
        try {
            els.btnSalvar.disabled = montarAssinaturaValores(obterValoresCampos()) === assinaturaSalva;
        } catch (_) {
            els.btnSalvar.disabled = true;
        }
    }

    function preencherCampos(config = {}) {
        els.valorMinimoRota.value = Number(config?.prioridade_rota?.valor_minimo || PADRAO.prioridade_rota.valor_minimo);
        els.diasMinimosRota.value = Number(config?.prioridade_rota?.dias_minimos ?? PADRAO.prioridade_rota.dias_minimos);
        els.diasMaximosRota.value = Number(config?.prioridade_rota?.dias_maximos || PADRAO.prioridade_rota.dias_maximos);
        els.diasSemVisita.value = Number(config?.manutencao_sem_visita?.dias_minimos || PADRAO.manutencao_sem_visita.dias_minimos);

        const atualizadoPor = String(config?.atualizado_por || '').trim();
        const atualizadoEm = config?.atualizado_em ? new Date(config.atualizado_em) : null;
        if (atualizadoPor && atualizadoEm && !Number.isNaN(atualizadoEm.getTime())) {
            els.meta.textContent = `Feito por ${atualizadoPor} - ${atualizadoEm.toLocaleString('pt-BR')}`;
        } else {
            els.meta.textContent = 'Sem atualização registrada.';
        }
        atualizarEstadoSalvar();
    }

    function montarPayload() {
        return {
            ...obterValoresCampos(),
            atualizado_em: new Date().toISOString(),
            atualizado_por: obterUsuarioAtual()
        };
    }

    async function carregar() {
        if (!validarAcesso()) return;
        try {
            const config = await dbObterConfiguracoesAutomaticas();
            assinaturaSalva = montarAssinaturaValores({
                prioridade_rota: {
                    valor_minimo: Number(config?.prioridade_rota?.valor_minimo || PADRAO.prioridade_rota.valor_minimo),
                    dias_minimos: Number(config?.prioridade_rota?.dias_minimos ?? PADRAO.prioridade_rota.dias_minimos),
                    dias_maximos: Number(config?.prioridade_rota?.dias_maximos || PADRAO.prioridade_rota.dias_maximos)
                },
                manutencao_sem_visita: {
                    dias_minimos: Number(config?.manutencao_sem_visita?.dias_minimos || PADRAO.manutencao_sem_visita.dias_minimos)
                }
            });
            preencherCampos(config);
            els.status.textContent = '';
        } catch (error) {
            console.error('Erro ao carregar configuracoes automaticas:', error);
            assinaturaSalva = montarAssinaturaValores(PADRAO);
            preencherCampos(PADRAO);
            els.status.textContent = 'Não foi possível carregar. Exibindo valores padrão.';
        }
    }

    async function salvar() {
        if (!validarAcesso()) return;
        try {
            salvando = true;
            atualizarEstadoSalvar();
            els.status.textContent = 'Salvando...';
            const payload = montarPayload();
            await dbSalvarConfiguracoesAutomaticas(payload);
            assinaturaSalva = montarAssinaturaValores(payload);
            preencherCampos(payload);
            els.status.textContent = 'Configurações salvas.';
        } catch (error) {
            console.error('Erro ao salvar configurações automáticas:', error);
            if (window.playAlert) await window.playAlert(error.message || 'Erro ao salvar configurações.');
            els.status.textContent = 'Erro ao salvar.';
        } finally {
            salvando = false;
            atualizarEstadoSalvar();
        }
    }

    els.btnSalvar.addEventListener('click', salvar);
    [els.valorMinimoRota, els.diasMinimosRota, els.diasMaximosRota, els.diasSemVisita].forEach(input => {
        input.addEventListener('input', atualizarEstadoSalvar);
    });
    els.btnPadrao.addEventListener('click', () => {
        preencherCampos(PADRAO);
        els.status.textContent = 'Valores padrão preenchidos. Toque em Salvar para aplicar.';
    });

    carregar();
</script>
</body>
</html>
