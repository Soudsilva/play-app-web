<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuten&ccedil;&otilde;es Solicitadas</title>

    <style>
        * {
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0b2256;
            display: flex;
            justify-content: center;
            color: white;
            min-height: 100vh;
            position: relative;
            z-index: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top, rgba(54, 105, 214, 0.55), transparent 34%),
                linear-gradient(180deg, #11317a 0%, #0b2256 42%, #071634 100%);
            z-index: -1;
        }

        .app {
            width: 100%;
            max-width: 440px;
            padding: 18px;
            box-sizing: border-box;
            transition: padding-bottom 0.25s ease;
        }

        .topo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 18px;
            position: relative;
            padding: 10px 0 2px;
        }

        .titulo-wrap {
            text-align: center;
        }

        .titulo {
            font-size: 31px;
            font-weight: bold;
            line-height: 1.05;
            color: #ffffff;
            letter-spacing: 0.3px;
        }

        .subtitulo {
            margin-top: 4px;
            font-size: 14px;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.76);
        }

        .btn-home {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: rgba(255,255,255,0.16);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.24);
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
        }

        .btn-home:active {
            background: rgba(255,255,255,0.34);
            transform: translateY(-50%) scale(0.92);
        }

        .btn-home img {
            width: 22px;
            height: 22px;
            filter: brightness(0) invert(1);
        }

        .resumo-grid {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 18px;
            padding: 10px 14px;
            backdrop-filter: blur(8px);
        }

        .resumo-pendentes {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .resumo-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #ffffff;
            font-weight: bold;
        }

        .resumo-valor {
            font-size: 24px;
            font-weight: bold;
            color: #ffeb3b;
            line-height: 1;
        }

        .resumo-divider {
            width: 1px;
            align-self: stretch;
            background: rgba(255,255,255,0.18);
            flex-shrink: 0;
        }

        .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
        }

        .search-wrap svg {
            position: absolute;
            left: 10px;
            width: 15px;
            height: 15px;
            stroke: rgba(255,255,255,0.45);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        #campoPesquisa {
            width: 100%;
            background: transparent;
            border: none;
            padding: 6px 28px 6px 30px;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        #campoPesquisa::placeholder {
            color: rgba(255,255,255,0.75);
            font-weight: bold;
        }

        .search-clear {
            position: absolute;
            right: 4px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 16px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            display: none;
        }

        .estado-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            color: rgba(255,255,255,0.78);
            margin-bottom: 14px;
        }

        .loading-engrenagem {
            display: block;
            margin: 0 auto 14px;
            animation: girar-eng 2s linear infinite;
            transform-origin: center;
        }
        @keyframes girar-eng {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .loading-msg {
            font-size: 15px;
            min-height: 22px;
            transition: opacity 0.35s ease;
        }
        .loading-msg.fade-out {
            opacity: 0;
        }

        .lista-manutencoes {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card-manutencao {
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 20px;
            padding: 16px 16px 14px 18px;
            box-shadow: 0 18px 38px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
        }

        .card-manutencao::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            border-radius: 20px 0 0 20px;
            background: #4caf50;
        }

        .card-manutencao.urgencia-media::before {
            background: #ffb300;
        }

        .card-manutencao.urgencia-alta::before {
            background: #ff5252;
        }

        .card-selecao {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
        }

        .card-selecao.selecionado {
            background: rgba(76,175,80,0.15);
            border-color: rgba(76,175,80,0.4);
        }

        .card-selecao input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #4caf50;
            cursor: pointer;
            flex-shrink: 0;
        }

        .card-selecao-texto {
            font-size: 17px;
            color: #ffffff;
            line-height: 1.3;
        }

        .card-selecao-tecnico {
            font-size: 14px;
            color: #81c784;
            font-weight: bold;
        }


        .card-info-linhas {
            margin-bottom: 12px;
        }

        .linha-nome {
            font-size: 19px;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .linha-rota-icons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.9);
        }

        .linha-rota-icons b {
            color: #ff9800;
        }

        .rota-cidade-stack {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 15px;
            color: rgba(255,255,255,0.9);
        }

        .rota-cidade-stack b {
            color: #ff9800;
        }

        .icones-acao {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icone-btn-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .icone-label {
            font-size: 11px;
            color: #ffffff;
            letter-spacing: 0.3px;
        }

        .icone-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .icone-btn:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.2);
        }

        .icone-btn img {
            width: 22px;
            height: 22px;
        }

        .icone-ok svg {
            width: 20px;
            height: 20px;
            stroke: #4caf50;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .linha-cidade {
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
        }

        .linha-cidade b {
            color: #ff9800;
        }

        .linha-solicitado {
            font-size: 14px;
            color: rgba(255,255,255,0.76);
        }

        .linha-solicitado b {
            color: #ff9800;
        }

        .bloco-acao {
            background: rgba(6, 17, 43, 0.36);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 12px;
        }

        .bloco-acao-titulo {
            font-size: 19px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffeb3b;
            text-align: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .bloco-acao-texto {
            font-size: 16px;
            line-height: 1.5;
            color: white;
            white-space: pre-line;
        }

        .acao-foto-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .acao-foto-row .bloco-acao-texto {
            text-align: center;
            flex: 1;
            min-width: 0;
        }

        .foto-solicitacao {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(4, 13, 32, 0.45);
        }

        .foto-solicitacao img {
            width: 100%;
            max-height: 220px;
            object-fit: contain;
            display: block;
            padding: 10px;
            box-sizing: border-box;
            cursor: zoom-in;
        }

        .acao-foto-row .foto-solicitacao {
            margin-top: 0;
            width: clamp(96px, 30vw, 140px);
            flex-shrink: 0;
        }

        .acao-foto-row .foto-solicitacao img {
            max-height: 140px;
            padding: 8px;
        }


        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .lightbox.aberto {
            display: flex;
        }

        .lightbox img {
            max-width: 96vw;
            max-height: 96vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-fechar {
            position: absolute;
            top: 16px;
            right: 18px;
            font-size: 32px;
            color: white;
            cursor: pointer;
            line-height: 1;
            opacity: 0.75;
        }

        .lightbox-fechar:active {
            opacity: 1;
        }

        .ultima-visita {
            margin-top: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 16px;
            color: rgba(255,255,255,0.75);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ultima-visita b {
            color: #ffffff;
        }

        .barra-flutuante {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
            z-index: 500;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .barra-flutuante.visivel {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .btn-navegar-rota {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(15,50,30,0.94), rgba(8,35,18,0.97));
            border: 1px solid rgba(76,175,80,0.55);
            border-radius: 50px;
            padding: 10px 14px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 0 0 1px rgba(76,175,80,0.15);
            backdrop-filter: blur(12px);
        }

        .btn-navegar-rota:active {
            transform: scale(0.96);
        }

        .btn-navegar-icone {
            width: 22px;
            height: 22px;
            background: rgba(76,175,80,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-navegar-icone svg {
            width: 15px;
            height: 15px;
            stroke: #81c784;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-navegar-label {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.2px;
        }

        .btn-navegar-sub {
            font-size: 14px;
            color: #81c784;
            letter-spacing: 0.3px;
        }

        .btn-navegar-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .btn-minhas-selecoes {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(20,40,90,0.92), rgba(10,25,60,0.96));
            border: 1px solid rgba(76,175,80,0.5);
            border-radius: 50px;
            padding: 10px 14px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 0 0 1px rgba(76,175,80,0.15);
            backdrop-filter: blur(12px);
        }

        .btn-minhas-selecoes:active {
            transform: scale(0.96);
        }

        .btn-selecoes-icone {
            width: 22px;
            height: 22px;
            background: rgba(76,175,80,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-selecoes-icone svg {
            width: 15px;
            height: 15px;
            stroke: #81c784;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-selecoes-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .btn-selecoes-label {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.2px;
        }

        .btn-selecoes-contador {
            font-size: 14px;
            color: #81c784;
            letter-spacing: 0.3px;
        }

        @media (max-width: 390px) {
            .resumo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo-wrap">
            <div class="titulo">Manuten&ccedil;&otilde;es</div>
            <div class="subtitulo">Solicitadas</div>
        </div>
        <div class="btn-home" onclick="window.location.href='index.html'" aria-label="Home" role="button" tabindex="0">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div id="resumoGrid" class="resumo-grid" style="display:none;">
        <div class="resumo-pendentes">
            <span class="resumo-label">Pendentes</span>
            <span id="resumoPendentes" class="resumo-valor">0</span>
        </div>
        <div class="resumo-divider"></div>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
            </svg>
            <input id="campoPesquisa" type="search" placeholder="Pesquisar..." autocomplete="off">
            <button class="search-clear" id="btnLimparPesquisa" aria-label="Limpar">&#x2715;</button>
        </div>
    </div>

    <div id="estadoLista" class="estado-card">
        <svg class="loading-engrenagem" width="44" height="44" viewBox="0 0 24 24" fill="none"
             stroke="rgba(255,200,50,0.9)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <div id="loadingMsg" class="loading-msg">Buscando as ordens de serviço...</div>
    </div>
    <div id="listaManutencoes" class="lista-manutencoes"></div>
</div>

<div id="barraFlutuante" class="barra-flutuante">
    <div id="btnNavegarRota" class="btn-navegar-rota">
        <div class="btn-navegar-icone">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <polygon points="3 11 22 2 13 21 11 13 3 11"/>
            </svg>
        </div>
        <div class="btn-navegar-info">
            <span class="btn-navegar-label">Gerar rota</span>
            <span id="btnNavegarSub" class="btn-navegar-sub"></span>
        </div>
    </div>

    <div id="btnMinhasSelecoes" class="btn-minhas-selecoes">
        <div class="btn-selecoes-icone">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
        </div>
        <div class="btn-selecoes-info">
            <span class="btn-selecoes-label">Ver minhas seleções</span>
            <span id="btnSelecoesCont" class="btn-selecoes-contador"></span>
        </div>
    </div>
</div>

<div id="lightbox" class="lightbox">
    <span class="lightbox-fechar" id="fecharLightbox">&times;</span>
    <img id="lightboxImg" src="" alt="">
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbEscutarClientes, dbEscutarManutencoes, dbSalvarManutencao, dbEscutarAtendimentos, dbVerificarRestricaoBalanco } from './database.js';

    function usuarioEhAtendimentoNivel2Manutencao() {
        try {
            const usuarioLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
            const cache = JSON.parse(localStorage.getItem('cache_colaboradores') || '[]');
            const userObj = cache.find(c => String(c?.nome || '').trim() === usuarioLogado);
            return String(userObj?.nivel_completo || '').includes('atendimento_2');
        } catch (_) {
            return false;
        }
    }

    async function bloquearManutencaoSeNecessario() {
        if (!usuarioEhAtendimentoNivel2Manutencao()) return false;
        if (navigator.onLine === false) {
            alert('Manutenção precisa de internet.');
            window.location.replace('index.html');
            return true;
        }
        const usuario = String(localStorage.getItem('usuarioLogado') || '').trim();
        try {
            const restricao = await dbVerificarRestricaoBalanco(usuario, 2);
            if (restricao?.bloqueado) {
                alert('Balanço pendente. Regularize o balanço para liberar a manutenção.');
                window.location.replace('index.html');
                return true;
            }
        } catch (erro) {
            console.warn('Nao foi possivel verificar restricao de balanco:', erro);
        }
        return false;
    }

    if (await bloquearManutencaoSeNecessario()) throw new Error('Acesso bloqueado.');

    let clientes = [];
    let manutencoes = [];
    let atendimentos = [];
    let manutencoesPendentesEnriquecidas = [];
    let termoPesquisa = "";
    let filtroMinhasSelecoes = false;
    let manutencaoPendenteAjuste = "";

    const _loadingMsgs = [
        "Buscando as ordens de serviço...",
        "Calibrando os equipamentos...",
        "Consultando o técnico sênior...",
        "Apertando os parafusos...",
        "Verificando o estoque de peças...",
        "Lendo o manual técnico...",
        "Aquecendo as ferramentas...",
        "Organizando a caixa de ferramentas...",
        "Pedindo ajuda pro estagiário...",
        "Procurando a chave de fenda...",
    ];
    let _loadingIdx = 0;
    let _loadingTimer = null;

    function _iniciarLoading() {
        const el = document.getElementById('loadingMsg');
        if (!el || _loadingTimer) return;
        _loadingTimer = setInterval(() => {
            el.classList.add('fade-out');
            setTimeout(() => {
                _loadingIdx = (_loadingIdx + 1) % _loadingMsgs.length;
                el.textContent = _loadingMsgs[_loadingIdx];
                el.classList.remove('fade-out');
            }, 350);
        }, 2200);
    }

    const APP_PADDING_BASE = 18;

    function normalizar(texto) {
        return String(texto || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .replace(/\s+/g, " ")
            .trim();
    }

    function itemBatePesquisa(item, termo) {
        if (!termo) return true;
        const palavras = termo.split(" ").filter(Boolean);
        const haystack = normalizar([
            item.clienteNome,
            item.clienteNumero,
            item.clienteCidade,
            item.clienteRota,
            item.clienteEndereco,
            item.solicitante,
            item.tipoAcao,
            item.observacoes
        ].join(" "));
        return palavras.every(p => haystack.includes(p));
    }

    function escaparHtml(valor) {
        return String(valor || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function parseData(valor) {
        const data = new Date(valor || "");
        return Number.isNaN(data.getTime()) ? null : data;
    }

    function calcularDiasEmAberto(valorData) {
        const data = parseData(valorData);
        if (!data) return 0;

        const hoje = new Date();
        const inicioHoje = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
        const inicioData = new Date(data.getFullYear(), data.getMonth(), data.getDate());
        const diffMs = inicioHoje.getTime() - inicioData.getTime();

        return Math.max(0, Math.floor(diffMs / 86400000));
    }

    function formatarDiasEmAberto(dias) {
        if (dias <= 0) return "Hoje";
        if (dias === 1) return "1 dia";
        return `${dias} dias`;
    }

    function formatarData(valorData) {
        const data = parseData(valorData);
        if (!data) return "Data nao informada";
        return data.toLocaleDateString('pt-BR');
    }

    function obterClasseUrgencia(dias) {
        if (dias >= 7) return "alta";
        if (dias >= 3) return "media";
        return "baixa";
    }

    function montarUltimaVisita(atendimento) {
        if (!atendimento) return null;
        const dataBase = atendimento.ultimaEdicao || atendimento.data || "";
        const data = new Date(dataBase);
        const dataOk = !Number.isNaN(data.getTime());
        const hoje = new Date();
        const inicioHoje = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
        const inicioData = new Date(data.getFullYear(), data.getMonth(), data.getDate());
        const dias = dataOk ? Math.max(0, Math.floor((inicioHoje - inicioData) / 86400000)) : null;

        return {
            atendente: atendimento.atendente || "N/A",
            dataFormatada: dataOk ? data.toLocaleDateString('pt-BR') : "N/A",
            dias
        };
    }

    function atualizarIndicesClientes() {
        clientesPorId = new Map(clientes.filter(c => c?.firebaseUrl).map(c => [c.firebaseUrl, c]));
        clientesPorNumero = new Map(
            clientes

                .map(c => [String(c.numero), c])

    function atualizarIndicesAtendimentos() {
        // Índices para O(1) em vez de O(n) por item
        const clientesPorId = new Map(clientes.filter(c => c.firebaseUrl).map(c => [c.firebaseUrl, c]));
        const clientesPorNumero = new Map(clientes.filter(c => c.numero != null).map(c => [String(c.numero), c]));

        const ultimoAtendPorId = new Map();
        const ultimoAtendPorNumero = new Map();
        atendimentos.forEach(a => {
            const ts = Date.parse(a?.ultimaEdicao || a?.data || "") || 0;
            if (a?.cliente?.id) {
                const atual = ultimoAtendPorId.get(a.cliente.id);
                const tsAtual = atual ? (Date.parse(atual?.ultimaEdicao || atual?.data || "") || 0) : -1;
                if (ts > tsAtual) ultimoAtendPorId.set(a.cliente.id, a);
            }
            if (a?.cliente?.numero != null) {
                const num = String(a.cliente.numero);
                const atual = ultimoAtendPorNumero.get(num);
                const tsAtual = atual ? (Date.parse(atual?.ultimaEdicao || atual?.data || "") || 0) : -1;
                if (ts > tsAtual) ultimoAtendPorNumero.set(num, a);
            }
        });

        return manutencoes
            .filter(manutencao => {
                const status = String(manutencao?.status || "pendente").toLowerCase();
                return status !== 'concluida' && status !== 'concluido';
            })
            .map(manutencao => {
                const cliente = (manutencao?.clienteId && clientesPorId.get(manutencao.clienteId))
                    || (manutencao?.clienteNumero != null && clientesPorNumero.get(String(manutencao.clienteNumero)))
                    || null;

                const atendimento = (manutencao?.clienteId && ultimoAtendPorId.get(manutencao.clienteId))
                    || (manutencao?.clienteNumero != null && ultimoAtendPorNumero.get(String(manutencao.clienteNumero)))
                    || null;

                let ultimaVisita = null;
                if (atendimento) {
                    const dataBase = atendimento.ultimaEdicao || atendimento.data || "";
                    const data = new Date(dataBase);
                    const dataOk = !Number.isNaN(data.getTime());
                    const hoje = new Date();
                    const inicioHoje = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
                    const inicioData = new Date(data.getFullYear(), data.getMonth(), data.getDate());
                    ultimaVisita = {
                        atendente: atendimento.atendente || "N/A",
                        dataFormatada: dataOk ? data.toLocaleDateString('pt-BR') : "N/A",
                        dias: dataOk ? Math.max(0, Math.floor((inicioHoje - inicioData) / 86400000)) : null
                    };
                }

                const diasEmAberto = calcularDiasEmAberto(manutencao?.dataRegistro);

                return {
                    ...manutencao,
                    clienteNome: cliente?.nome || manutencao?.clienteNome || "Cliente sem nome",
                    clienteNumero: cliente?.numero || manutencao?.clienteNumero || "",
                    clienteFirebaseUrl: cliente?.firebaseUrl || "",
                    clienteCidade: cliente?.cidade || manutencao?.clienteCidade || "Nao informada",
                    clienteRota: cliente?.rota || manutencao?.clienteRota || "Nao informada",
                    clienteEndereco: cliente?.endereco || manutencao?.clienteEndereco || "",
                    solicitante: manutencao?.cadastradoPor || "Nao informado",
                    diasEmAberto,
                    classeUrgencia: obterClasseUrgencia(diasEmAberto),
                    dataFormatada: formatarData(manutencao?.dataRegistro),
                    ultimaVisita
                };
            })
            .sort((a, b) => {
                const dataA = parseData(a?.dataRegistro)?.getTime() || 0;
                const dataB = parseData(b?.dataRegistro)?.getTime() || 0;
                return dataA - dataB;
            });
    }

        return manutencoes

                    || (manutencao?.clienteNumero != null && clientesPorNumero.get(String(manutencao.clienteNumero)))
                    || null;

                const atendimento = (manutencao?.clienteId && ultimoAtendPorId.get(manutencao.clienteId))
                    || (manutencao?.clienteNumero != null && ultimoAtendPorNumero.get(String(manutencao.clienteNumero)))
                    || null;

                const diasEmAberto = calcularDiasEmAberto(manutencao?.dataRegistro);

                return {

            })
            .sort((a, b) => {

    document.getElementById('btnNavegarRota').addEventListener('click', async () => {
        const usuarioLogado = localStorage.getItem('usuarioLogado') || "";
        const selecionados = manutencoes.filter(m => {
            const status = String(m?.status || "pendente").toLowerCase();
            return status !== 'concluida' && status !== 'concluido' && m.selecionadoPor === usuarioLogado;
        });

        const enderecos = selecionados
            .map(m => m.clienteEndereco || m.clienteCidade || "")
            .filter(Boolean);

        if (enderecos.length === 0) {
            await window.playAlert("Nenhum endereço encontrado nas suas seleções.");
            return;
        }

        const ua = navigator.userAgent || '';
        const isAndroid = /Android/i.test(ua);
        const isiOS = /iPhone|iPad|iPod/i.test(ua);
        const isMobile = isAndroid || isiOS;

        function gerarUrlMaps(origem, enderecos) {
            const destino = encodeURIComponent(enderecos[enderecos.length - 1]);
            const waypoints = enderecos.slice(0, -1).map(e => encodeURIComponent(e)).join('|');
            let url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origem)}&destination=${destino}&travelmode=driving`;
            if (waypoints) url += `&waypoints=${waypoints}`;
            return url;
        }

        function abrirMaps(urlWeb) {
            if (isAndroid) {
                const intentUrl = urlWeb.replace(/^https:\/\/www\.google\.com\//i, 'intent://www.google.com/')
                    + '#Intent;scheme=https;package=com.google.android.apps.maps;end';
                const a = document.createElement('a');
                a.href = intentUrl;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } else if (isiOS) {
                window.location.href = urlWeb.replace(/^https?:\/\//i, 'comgooglemapsurl://');
                setTimeout(() => { window.location.href = urlWeb; }, 1000);
            } else {
                window.open(urlWeb, '_blank');
            }
        }

        if (isMobile) {
            // No mobile o app Maps lida com a localização por conta própria
            abrirMaps(gerarUrlMaps('My+Location', enderecos));
            return;
        }

        // Desktop: pega GPS e abre nova aba
        const novaAba = window.open('about:blank', '_blank');
        if (!novaAba || novaAba === window) {
            await window.playAlert("Permita pop-ups para abrir o mapa.");
            return;
        }

        if (!navigator.geolocation) {
            novaAba.location.href = gerarUrlMaps('My+Location', enderecos);
            return;
        }

        const btn = document.getElementById('btnNavegarRota');
        const labelOriginal = btn.querySelector('.btn-navegar-label').textContent;
        btn.querySelector('.btn-navegar-label').textContent = 'Obtendo GPS...';
        btn.style.pointerEvents = 'none';

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                btn.querySelector('.btn-navegar-label').textContent = labelOriginal;
                btn.style.pointerEvents = 'auto';
                novaAba.location.href = gerarUrlMaps(`${pos.coords.latitude},${pos.coords.longitude}`, enderecos);
            },
            async (err) => {
                btn.querySelector('.btn-navegar-label').textContent = labelOriginal;
                btn.style.pointerEvents = 'auto';
                novaAba.close();
                if (err.code === 1 || err.code === 2 || err.code === 3) {
                    await window.playAlert("Ative o GPS e depois aperte novamente em Gerar rota.");
                }
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
        );
    });

    window.alternarSelecao = async function(id, marcado, checkbox) {
        const item = manutencoesPendentesEnriquecidas.find(m => m.firebaseUrl === id)
            || manutencoes.find(m => m.firebaseUrl === id);
        if (!item) return;

        const usuarioLogado = localStorage.getItem('usuarioLogado') || "Técnico";

        if (!marcado && item.selecionadoPor && item.selecionadoPor !== usuarioLogado) {
            checkbox.checked = true;
            await window.playAlert(`Apenas ${escaparHtml(item.selecionadoPor)} pode desmarcar este serviço.`);
            return;
        }

        if (!marcado) {
            const confirmar = await window.playConfirm("Você não vai mais realizar esse serviço?", {
                secondaryLabel: "Não vou mais",
                secondaryResult: true,
                primaryLabel: "Vou sim",
                primaryResult: false,
                overlayResult: false
            });

            if (!confirmar) {
                checkbox.checked = true;
                return;
            }
        }
        const atualizado = { ...item };
        delete atualizado.firebaseUrl;

        manutencaoPendenteAjuste = marcado ? id : "";

        if (marcado) {
            atualizado.selecionadoPor = usuarioLogado;
            atualizado.dataSelecionado = new Date().toISOString();
        } else {
            delete atualizado.selecionadoPor;
            delete atualizado.dataSelecionado;
        }

        try {
            await dbSalvarManutencao(atualizado, id);
        } catch (e) {
            await window.playAlert(e?.message || "Erro ao salvar seleção.");
        }
    };

                    <div class="linha-rota-icons">
                        <div class="rota-cidade-stack">
                            <div><b>Rota:</b> ${escaparHtml(item.clienteRota)}</div>
                            <div><b>Cidade:</b> ${escaparHtml(item.clienteCidade)}</div>
                        </div>
                        ${!isEstoque ? `
                        <div class="icones-acao">
                            <div class="icone-btn-wrap" onclick="abrirLocalizacao('${escaparHtml(item.clienteEndereco || item.clienteCidade)}')">
                                <div class="icone-btn">
                                    <img src="assets/img/Localizacao.png" alt="Localização">
                                </div>
                                <span class="icone-label">Localização</span>
                            </div>
                            <div class="icone-btn-wrap" onclick="confirmarConclusao('${escaparHtml(item.firebaseUrl)}')">
                                <div class="icone-btn icone-ok">
                                    <svg viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M20 6L9 17l-5-5"/>
                                    </svg>
                                </div>
                                <span class="icone-label">Realizada</span>
                            </div>
                        </div>` : ''}
                    </div>
                    <div class="linha-solicitado"><b>Solicitado:</b> ${escaparHtml(item.solicitante)} &nbsp;&nbsp; solicitação feita há ${escaparHtml(formatarDiasEmAberto(item.diasEmAberto).toLowerCase())}</div>
                </div>

                <div class="bloco-acao">
                    <div class="bloco-acao-titulo">${escaparHtml(item.tipoAcao || "Manutencao")}</div>
                    <div class="acao-foto-row">
                        ${item.fotoSolicitacao ? `
                            <div class="foto-solicitacao">
                                <img src="${escaparHtml(item.fotoSolicitacaoThumb || item.fotoSolicitacao)}" alt="Foto da solicitacao de ${escaparHtml(item.clienteNome)}" onclick="abrirLightbox('${escaparHtml(item.fotoSolicitacao)}')" loading="lazy">
                            </div>
                        ` : ''}
                        <div class="bloco-acao-texto">${escaparHtml(item.observacoes || "Sem observacoes.")}</div>
                    </div>
                </div>

                ${!isEstoque && item.ultimaVisita ? `
                    <div class="ultima-visita">
                        Visita: <b>${escaparHtml(item.ultimaVisita.atendente)}</b> ${escaparHtml(item.ultimaVisita.dataFormatada)}${item.ultimaVisita.dias !== null ? ` &nbsp;Dias: <b>${item.ultimaVisita.dias}</b>` : ''}
                    </div>
                ` : ''}
            `;

            _fragment.appendChild(card);
        });
        container.appendChild(_fragment);

        if (_scrollPos !== null) {
            window.scrollTo({ top: _scrollPos });
        }

        manutencaoPendenteAjuste = "";
    }

    const inputPesquisa = document.getElementById('campoPesquisa');
    const btnLimpar = document.getElementById('btnLimparPesquisa');

    let _manutencoesRecebidas = false;
    let _renderTimeout = null;
    function agendarRenderizacao() {
        if (!_manutencoesRecebidas) return;
        clearTimeout(_renderTimeout);
        _renderTimeout = setTimeout(renderizarLista, 80);
    }

    let _searchTimeout = null;
    inputPesquisa.addEventListener('input', () => {
        termoPesquisa = normalizar(inputPesquisa.value);
        btnLimpar.style.display = termoPesquisa ? 'block' : 'none';
        clearTimeout(_searchTimeout);
        _searchTimeout = setTimeout(renderizarLista, 300);
    });

    btnLimpar.addEventListener('click', () => {
        inputPesquisa.value = "";
        termoPesquisa = "";
        btnLimpar.style.display = 'none';
        inputPesquisa.focus();
        renderizarLista();
    });

    dbEscutarClientes((lista) => {
        clientes = lista;
        atualizarCacheManutencoesPendentes();
        agendarRenderizacao();
    });

    const TIMEZONE_BRASILIA = 'America/Sao_Paulo';
    let _limpezaSelecoesEmExecucao = false;

    function obterPartesDataNoFuso(data, timeZone) {
        return new Intl.DateTimeFormat('en-CA', {
            timeZone,
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        }).formatToParts(data).reduce((acc, parte) => {
            if (parte.type !== 'literal') acc[parte.type] = parte.value;
            return acc;
        }, {});
    }

    function obterOffsetFusoEmMs(data, timeZone) {
        const partes = obterPartesDataNoFuso(data, timeZone);
        const utcEquivalente = Date.UTC(
            Number(partes.year),
            Number(partes.month) - 1,
            Number(partes.day),
            Number(partes.hour),
            Number(partes.minute),
            Number(partes.second)
        );
        return utcEquivalente - data.getTime();
    }

    function criarDataNoFuso(timeZone, ano, mes, dia, hora = 0, minuto = 0, segundo = 0) {
        const tentativaUtc = Date.UTC(ano, mes - 1, dia, hora, minuto, segundo);
        let offset = obterOffsetFusoEmMs(new Date(tentativaUtc), timeZone);
        let resultado = tentativaUtc - offset;
        const offsetFinal = obterOffsetFusoEmMs(new Date(resultado), timeZone);
        if (offsetFinal !== offset) {
            resultado = tentativaUtc - offsetFinal;
        }
        return resultado;
    }

    function obterExpiracaoSelecaoBrasilia(dataSelecionado) {
        const ts = Date.parse(dataSelecionado || '');
        if (Number.isNaN(ts)) return null;

        const partes = obterPartesDataNoFuso(new Date(ts), TIMEZONE_BRASILIA);
        const proximoDia = new Date(Date.UTC(
            Number(partes.year),
            Number(partes.month) - 1,
            Number(partes.day) + 1
        ));

        return criarDataNoFuso(
            TIMEZONE_BRASILIA,
            proximoDia.getUTCFullYear(),
            proximoDia.getUTCMonth() + 1,
            proximoDia.getUTCDate(),
            20,
            0,
            0
        );
    }

    async function limparSelecesExpiradas(lista) {
        if (_limpezaSelecoesEmExecucao) return;
        _limpezaSelecoesEmExecucao = true;

        try {
            const agora = Date.now();
            const expirados = (Array.isArray(lista) ? lista : []).filter(m => {
                if (!m?.selecionadoPor) return false;
                if (!m.dataSelecionado) return true;
                const expiracao = obterExpiracaoSelecaoBrasilia(m.dataSelecionado);
                if (!expiracao) return true;
                return agora >= expiracao;
            });

            for (const m of expirados) {
                const atualizado = { ...m };
                delete atualizado.firebaseUrl;
                delete atualizado.selecionadoPor;
                delete atualizado.dataSelecionado;
                try {
                    await dbSalvarManutencao(atualizado, m.firebaseUrl);
                } catch (_) {}
            }
        } finally {
            _limpezaSelecoesEmExecucao = false;
        }
    }

    dbEscutarManutencoes((lista) => {
        manutencoes = lista;
        _manutencoesRecebidas = true;
        atualizarCacheManutencoesPendentes();
        limparSelecesExpiradas(lista);
        agendarRenderizacao();
    });

    setInterval(() => {
        limparSelecesExpiradas(manutencoes);
    }, 15000);

    dbEscutarAtendimentos((lista) => {
        atendimentos = lista;
        atualizarCacheManutencoesPendentes();
        agendarRenderizacao();
    });
</script>
