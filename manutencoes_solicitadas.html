<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuten&ccedil;&otilde;es Solicitadas</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top, rgba(54, 105, 214, 0.55), transparent 34%),
                linear-gradient(180deg, #11317a 0%, #0b2256 42%, #071634 100%);
            display: flex;
            justify-content: center;
            color: white;
            min-height: 100vh;
        }

        .app {
            width: 100%;
            max-width: 440px;
            padding: 18px;
            box-sizing: border-box;
        }

        .topo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 18px;
            position: relative;
            padding: 10px 0 2px;
        }

        .titulo-wrap {
            text-align: center;
        }

        .titulo {
            font-size: 29px;
            font-weight: bold;
            line-height: 1.05;
            color: #ffffff;
            letter-spacing: 0.3px;
        }

        .subtitulo {
            margin-top: 4px;
            font-size: 13px;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.76);
        }

        .btn-home {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: rgba(255,255,255,0.16);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.24);
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
        }

        .btn-home:active {
            background: rgba(255,255,255,0.34);
            transform: translateY(-50%) scale(0.92);
        }

        .btn-home img {
            width: 22px;
            height: 22px;
            filter: brightness(0) invert(1);
        }

        .resumo-grid {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 18px;
            padding: 10px 14px;
            backdrop-filter: blur(8px);
        }

        .resumo-pendentes {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .resumo-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(255,255,255,0.65);
        }

        .resumo-valor {
            font-size: 22px;
            font-weight: bold;
            color: #ffeb3b;
            line-height: 1;
        }

        .resumo-divider {
            width: 1px;
            align-self: stretch;
            background: rgba(255,255,255,0.18);
            flex-shrink: 0;
        }

        .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
        }

        .search-wrap svg {
            position: absolute;
            left: 10px;
            width: 15px;
            height: 15px;
            stroke: rgba(255,255,255,0.45);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        #campoPesquisa {
            width: 100%;
            background: transparent;
            border: none;
            padding: 6px 28px 6px 30px;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        #campoPesquisa::placeholder {
            color: rgba(255,255,255,0.32);
        }

        .search-clear {
            position: absolute;
            right: 4px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            display: none;
        }

        .estado-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            color: rgba(255,255,255,0.78);
            margin-bottom: 14px;
        }

        .lista-manutencoes {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card-manutencao {
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 20px;
            padding: 16px 16px 14px 18px;
            box-shadow: 0 18px 38px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
        }

        .card-manutencao::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            border-radius: 20px 0 0 20px;
            background: #4caf50;
        }

        .card-manutencao.urgencia-media::before {
            background: #ffb300;
        }

        .card-manutencao.urgencia-alta::before {
            background: #ff5252;
        }

        .card-info-linhas {
            margin-bottom: 12px;
        }

        .linha-nome {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .linha-rota-icons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.9);
        }

        .linha-rota-icons b {
            color: #ff9800;
        }

        .icones-acao {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icone-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .icone-btn:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.2);
        }

        .icone-btn img {
            width: 22px;
            height: 22px;
        }

        .icone-ok svg {
            width: 20px;
            height: 20px;
            stroke: #4caf50;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .linha-cidade {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
        }

        .linha-cidade b {
            color: #ff9800;
        }

        .linha-solicitado {
            font-size: 13px;
            color: rgba(255,255,255,0.76);
        }

        .linha-solicitado b {
            color: #ff9800;
        }

        .bloco-acao {
            margin-top: 12px;
            background: rgba(6, 17, 43, 0.36);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 12px;
        }

        .bloco-acao-titulo {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffeb3b;
            margin-bottom: 7px;
        }

        .bloco-acao-texto {
            font-size: 15px;
            line-height: 1.5;
            color: white;
            white-space: pre-line;
        }

        .foto-solicitacao {
            margin-top: 12px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(4, 13, 32, 0.45);
        }

        .foto-solicitacao-titulo {
            padding: 10px 12px 0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffeb3b;
            font-weight: bold;
        }

        .foto-solicitacao img {
            width: 100%;
            max-height: 290px;
            object-fit: contain;
            display: block;
            padding: 10px;
            box-sizing: border-box;
        }

        @media (max-width: 390px) {
            .resumo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo-wrap">
            <div class="titulo">Manuten&ccedil;&otilde;es</div>
            <div class="subtitulo">Solicitadas</div>
        </div>
        <div class="btn-home" onclick="window.location.href='index.html'" aria-label="Home" role="button" tabindex="0">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div id="resumoGrid" class="resumo-grid" style="display:none;">
        <div class="resumo-pendentes">
            <span class="resumo-label">Pendentes</span>
            <span id="resumoPendentes" class="resumo-valor">0</span>
        </div>
        <div class="resumo-divider"></div>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
            </svg>
            <input id="campoPesquisa" type="search" placeholder="Pesquisar..." autocomplete="off">
            <button class="search-clear" id="btnLimparPesquisa" aria-label="Limpar">&#x2715;</button>
        </div>
    </div>

    <div id="estadoLista" class="estado-card">Carregando manutencoes solicitadas...</div>
    <div id="listaManutencoes" class="lista-manutencoes"></div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { dbEscutarClientes, dbEscutarManutencoes, dbSalvarManutencao } from './database.js';

    let clientes = [];
    let manutencoes = [];
    let termoPesquisa = "";

    function normalizar(texto) {
        return String(texto || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .replace(/\s+/g, " ")
            .trim();
    }

    function itemBatePesquisa(item, termo) {
        if (!termo) return true;
        const palavras = termo.split(" ").filter(Boolean);
        const haystack = normalizar([
            item.clienteNome,
            item.clienteNumero,
            item.clienteCidade,
            item.clienteRota,
            item.clienteEndereco,
            item.solicitante,
            item.tipoAcao,
            item.observacoes
        ].join(" "));
        return palavras.every(p => haystack.includes(p));
    }

    function escaparHtml(valor) {
        return String(valor || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function parseData(valor) {
        const data = new Date(valor || "");
        return Number.isNaN(data.getTime()) ? null : data;
    }

    function calcularDiasEmAberto(valorData) {
        const data = parseData(valorData);
        if (!data) return 0;

        const hoje = new Date();
        const inicioHoje = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
        const inicioData = new Date(data.getFullYear(), data.getMonth(), data.getDate());
        const diffMs = inicioHoje.getTime() - inicioData.getTime();

        return Math.max(0, Math.floor(diffMs / 86400000));
    }

    function formatarDiasEmAberto(dias) {
        if (dias <= 0) return "Hoje";
        if (dias === 1) return "1 dia";
        return `${dias} dias`;
    }

    function formatarData(valorData) {
        const data = parseData(valorData);
        if (!data) return "Data nao informada";
        return data.toLocaleDateString('pt-BR');
    }

    function obterClasseUrgencia(dias) {
        if (dias >= 7) return "alta";
        if (dias >= 3) return "media";
        return "baixa";
    }

    function obterClienteRelacionado(manutencao) {
        return clientes.find(cliente => {
            if (manutencao?.clienteId && cliente?.firebaseUrl) {
                return manutencao.clienteId === cliente.firebaseUrl;
            }
            return manutencao?.clienteNumero == cliente?.numero;
        }) || null;
    }

    function obterManutencoesPendentesEnriquecidas() {
        return manutencoes
            .filter(manutencao => {
                const status = String(manutencao?.status || "pendente").toLowerCase();
                return status !== 'concluida' && status !== 'concluido';
            })
            .map(manutencao => {
                const cliente = obterClienteRelacionado(manutencao);
                const diasEmAberto = calcularDiasEmAberto(manutencao?.dataRegistro);

                return {
                    ...manutencao,
                    clienteNome: manutencao?.clienteNome || cliente?.nome || "Cliente sem nome",
                    clienteNumero: manutencao?.clienteNumero || cliente?.numero || "",
                    clienteCidade: manutencao?.clienteCidade || cliente?.cidade || "Nao informada",
                    clienteRota: manutencao?.clienteRota || cliente?.rota || "Nao informada",
                    clienteEndereco: manutencao?.clienteEndereco || cliente?.endereco || "",
                    solicitante: manutencao?.cadastradoPor || "Nao informado",
                    diasEmAberto,
                    classeUrgencia: obterClasseUrgencia(diasEmAberto),
                    dataFormatada: formatarData(manutencao?.dataRegistro)
                };
            })
            .sort((a, b) => {
                const dataA = parseData(a?.dataRegistro)?.getTime() || 0;
                const dataB = parseData(b?.dataRegistro)?.getTime() || 0;
                return dataA - dataB;
            });
    }

    function renderizarResumo(lista) {
        const resumoGrid = document.getElementById('resumoGrid');
        const pendentesEl = document.getElementById('resumoPendentes');

        resumoGrid.style.display = 'flex';
        pendentesEl.textContent = String(lista.length);
    }

    window.abrirLocalizacao = function abrirLocalizacao(endereco) {
        const query = encodeURIComponent(endereco || "");
        if (!query) return;
        window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
    }

    window.confirmarConclusao = async function confirmarConclusao(id) {
        if (!id) return;
        const ok = await window.playConfirm("Confirmar conclusao do servico?", {
            secondaryLabel: "Sim",
            secondaryResult: true,
            primaryLabel: "Nao",
            primaryResult: false,
            overlayResult: false
        });
        if (!ok) return;

        const item = manutencoes.find(m => m.firebaseUrl === id);
        if (!item) return;

        try {
            const atualizado = { ...item, status: "concluida", dataConclusao: new Date().toISOString() };
            delete atualizado.firebaseUrl;
            await dbSalvarManutencao(atualizado, id);
        } catch (e) {
            await window.playAlert(e?.message || "Erro ao concluir manutencao.");
        }
    }

    function renderizarLista() {
        const lista = obterManutencoesPendentesEnriquecidas();
        const estado = document.getElementById('estadoLista');
        const container = document.getElementById('listaManutencoes');

        renderizarResumo(lista);
        container.innerHTML = "";

        if (lista.length === 0) {
            estado.style.display = 'block';
            estado.textContent = "Nenhuma manutencao pendente no momento.";
            return;
        }

        estado.style.display = 'none';

        const listaFiltrada = termoPesquisa
            ? lista.filter(item => itemBatePesquisa(item, normalizar(termoPesquisa)))
            : lista;

        if (listaFiltrada.length === 0) {
            estado.style.display = 'block';
            estado.textContent = termoPesquisa ? "Nenhum resultado encontrado." : "Nenhuma manutencao pendente no momento.";
            return;
        }

        listaFiltrada.forEach(item => {
            const card = document.createElement('div');
            card.className = `card-manutencao urgencia-${item.classeUrgencia}`;
            card.innerHTML = `
                <div class="card-info-linhas">
                    <div class="linha-nome">${item.clienteNumero ? 'N. ' + escaparHtml(item.clienteNumero) + ' - ' : ''}${escaparHtml(item.clienteNome)}</div>
                    <div class="linha-rota-icons">
                        <div style="display:inline-block; border:1px solid rgba(255,255,255,0.3); border-radius:6px; padding:3px 8px;"><b style="color:#ff9800;">Rota: </b>${escaparHtml(item.clienteRota)}</div>
                        <div class="icones-acao">
                            <div class="icone-btn" onclick="abrirLocalizacao('${escaparHtml(item.clienteEndereco || item.clienteCidade)}')">
                                <img src="assets/img/Localizacao.png" alt="Localização">
                            </div>
                            <div class="icone-btn icone-ok" onclick="confirmarConclusao('${escaparHtml(item.firebaseUrl)}')">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M20 6L9 17l-5-5"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="linha-cidade"><b>Cidade:</b> ${escaparHtml(item.clienteCidade)}</div>
                    <div class="linha-solicitado"><b>Solicitado:</b> ${escaparHtml(item.solicitante)} &nbsp;&nbsp; solicitação feita há ${escaparHtml(formatarDiasEmAberto(item.diasEmAberto).toLowerCase())}</div>
                </div>

                <div class="bloco-acao">
                    <div class="bloco-acao-titulo" style="text-align:center;">${escaparHtml(item.tipoAcao || "Manutencao")}</div>
                    <div class="bloco-acao-texto" style="text-align:center;">${escaparHtml(item.observacoes || "Sem observacoes.")}</div>
                </div>

                ${item.fotoSolicitacao ? `
                    <div class="foto-solicitacao">
                        <div class="foto-solicitacao-titulo">Foto da solicitacao</div>
                        <img src="${escaparHtml(item.fotoSolicitacao)}" alt="Foto da solicitacao de ${escaparHtml(item.clienteNome)}">
                    </div>
                ` : ''}
            `;

            container.appendChild(card);
        });
    }

    const inputPesquisa = document.getElementById('campoPesquisa');
    const btnLimpar = document.getElementById('btnLimparPesquisa');

    inputPesquisa.addEventListener('input', () => {
        termoPesquisa = inputPesquisa.value;
        btnLimpar.style.display = termoPesquisa ? 'block' : 'none';
        renderizarLista();
    });

    btnLimpar.addEventListener('click', () => {
        inputPesquisa.value = "";
        termoPesquisa = "";
        btnLimpar.style.display = 'none';
        inputPesquisa.focus();
        renderizarLista();
    });

    dbEscutarClientes((lista) => {
        clientes = lista;
        renderizarLista();
    });

    dbEscutarManutencoes((lista) => {
        manutencoes = lista;
        renderizarLista();
    });
</script>

</body>
</html>
