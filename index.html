    <style>
        /* =========================================
        CONFIGURAÃ‡ÃƒO GLOBAL DO APP
        ========================================= */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f2a66;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

            padding: 20px;

            text-align: center;
        }

        .logo img {
            width: 100%;
            max-width: 220px;
            position: relative;
            left: -1px;
        }

        .ola {
            font-size: 30px;
            margin: 20px 0 30px 0;
            color: #cfd6e3;
            user-select: none;
            -webkit-user-select: none;
        }

        /* =========================================
        MENU E BOTÃ•ES (CENTRALIZADOS)
        ========================================= */
        .menu {
            display: none;
            flex-direction: column;
            gap: 20px;
        }


        .botao {
            position: relative; /* Base para o Ã­cone absoluto */
            background: #4467a8;
            border: 4px solid #d7dce3;
            border-radius: 45px;
            padding: 10px;     /*altura do botÃ£o*/
            min-height: 35px; /* Garante altura mÃ­nima */
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center; /* Centraliza o conteÃºdo principal (texto) */
            user-select: none;
            -webkit-user-select: none;
        }

        /* O Ãcone fica "preso" na esquerda sem empurrar o texto */
        .icone {
            position: absolute;
            left: 20px; /* DistÃ¢ncia da borda esquerda */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
        }
        .icone svg {
            width: 24px;
            height: 24px;
            display: block;
        }

        /* O texto ocupa o centro real do botÃ£o */
        .botao span:last-child {
            color: white;
            font-size: 25px;
            font-weight: bold;
            text-align: center;
            width: 100%;
        }

        .botao:hover { background: #3c5f9f; }
        .botao:active { transform: translateY(2px); background: #355792; transition: 0.05s; }
        .botao.manutencao-bloqueada {
            background:#5f6470;
            border-color:#8b9099;
            cursor:default;
        }
        .botao.manutencao-bloqueada:hover,
        .botao.manutencao-bloqueada:active {
            transform:none;
            background:#5f6470;
        }
        .botao.manutencao-bloqueada span:last-child,
        .botao.manutencao-bloqueada .icone {
            color:#d8d8d8;
        }

        @keyframes piscar-borda {
            0%, 100% { border-color: #f59e0b; box-shadow: 0 0 0px rgba(245,158,11,0); }
            50%       { border-color: #fcd34d; box-shadow: 0 0 10px rgba(245,158,11,0.6); }
        }
        .botao-pendente-alerta {
            border-color: #f59e0b;
            animation: piscar-borda 2s ease-in-out infinite;
        }
        /* Submenu Gestão */
        .submenu {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 8px 0 0 0;
        }
        .submenu.aberto { display: flex; }
        .botao-sub {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.18);
            border-radius: 35px;
            padding: 10px;
            min-height: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            transition: 0.15s;
        }
        .botao-sub:active { transform: translateY(2px); background: rgba(255,255,255,0.14); }
        .botao-sub .icone { position: absolute; left: 20px; font-size: 20px; }
        .botao-sub span:last-child { color: white; font-size: 18px; font-weight: bold; text-align: center; width: 100%; }
        .botao-sub.rotas-bloqueadas {
            background:#5f6470;
            border-color:#8b9099;
            cursor:default;
        }
        .botao-sub.rotas-bloqueadas:active {
            transform:none;
            background:#5f6470;
        }
        .botao-sub.rotas-bloqueadas span:last-child,
        .botao-sub.rotas-bloqueadas .icone {
            color:#d8d8d8;
        }
        .seta-gestao {
            position: absolute;
            right: 20px;
            font-size: 16px;
            font-weight: normal;
            width: auto !important;
            transition: transform 0.2s;
        }
        .seta-gestao.girada { transform: rotate(180deg); }

    </style>
</head>

<script>
    function toggleSubmenuGestao() {
        const submenu = document.getElementById('submenuGestao');
        const seta = document.getElementById('setaGestao');
        const abrindo = !submenu.classList.contains('aberto');
        submenu.classList.toggle('aberto');
        seta.classList.toggle('girada');
        // Empurra estado para o histÃ³rico ao abrir, para o botÃ£o voltar poder fechar
        if (abrindo) history.pushState({ submenu: true }, '');
    }

    function fecharSubmenus() {
        const submenu = document.getElementById('submenuGestao');
        const seta = document.getElementById('setaGestao');
        if (submenu && submenu.classList.contains('aberto')) {
            submenu.classList.remove('aberto');
            seta.classList.remove('girada');
        }
    }

    // Trava o index como primeira pÃ¡gina
    function travarIndex() {
        history.pushState(null, '', window.location.href);
    }

    // Empurra imediatamente (sÃ­ncrono) + nas primeiras interaÃ§Ãµes (mobile)
    travarIndex();
    window.addEventListener('load', travarIndex);
    window.addEventListener('touchstart', function _t() {
        travarIndex();
        window.removeEventListener('touchstart', _t);
    });
    window.addEventListener('click', function _c() {
        travarIndex();
        window.removeEventListener('click', _c);
    });

    window.addEventListener('popstate', function() {
        travarIndex();
        fecharSubmenus();
    });
</script>

<script type="module">
    import { dbEscutarColaboradores, dbSalvarAtendimento, dbSincronizarProdutosAtendimentoNoHistorico, storageSalvarFoto, dbEscutarAtendimentos, dbEscutarManutencoes, dbEscutarClientes, dbEscutarResumoBalanco, dbEscutarTodasContestacoesBalanco, dbEscutarTodosDepositos } from './database.js';
    import { verificarAutenticacao, fazerLogout } from './auth.js';
    import { sincronizarPendentes } from './offline-sync.js';

    let _atendBadgeStarted = false;
    let _servicoBadgeStarted = false;
    let _servicoManutencoes = [];
    let _servicoClientes = [];
    let unsubscribeResumoBalanco = null;
    let statusBalancoPendenteIndex = false;
    let statusBalancoCarregadoIndex = false;
    let usuarioAtendimentoNivel2Index = false;

    function atualizarEstadoBotaoRotas() {
        const btnRotas = document.getElementById('btnRotas');
        if (!btnRotas) return;
        const bloqueado = !navigator.onLine || statusBalancoPendenteIndex;
        btnRotas.classList.toggle('rotas-bloqueadas', bloqueado);
        btnRotas.setAttribute('aria-disabled', bloqueado ? 'true' : 'false');
    }

    function atualizarEstadoBotaoManutencao() {
        const btnManutencao = document.getElementById('btnManutencao');
        if (!btnManutencao) return;
        const verificandoBalanco = usuarioAtendimentoNivel2Index && !statusBalancoCarregadoIndex;
        const bloqueado = usuarioAtendimentoNivel2Index && (verificandoBalanco || statusBalancoPendenteIndex);
        btnManutencao.classList.toggle('manutencao-bloqueada', bloqueado);
        btnManutencao.setAttribute('aria-disabled', bloqueado ? 'true' : 'false');
    }

    function atualizarStatusBalancoIndex(resumo) {
        const status = String(resumo?.statusBalanco || 'ok').trim().toLowerCase();
        const pendente = status === 'pendente';
        statusBalancoPendenteIndex = pendente;
        statusBalancoCarregadoIndex = true;
        atualizarEstadoBotaoRotas();
        atualizarEstadoBotaoManutencao();
    }

    function iniciarStatusBalancoIndex(nomeUsuario) {
        const nome = String(nomeUsuario || '').trim();
        if (typeof unsubscribeResumoBalanco === 'function') unsubscribeResumoBalanco();
        unsubscribeResumoBalanco = null;
        statusBalancoPendenteIndex = false;
        statusBalancoCarregadoIndex = false;
        atualizarEstadoBotaoRotas();
        atualizarEstadoBotaoManutencao();
        if (!nome) {
            statusBalancoCarregadoIndex = true;
            atualizarEstadoBotaoManutencao();
            return;
        }
        unsubscribeResumoBalanco = dbEscutarResumoBalanco(nome, atualizarStatusBalancoIndex);
    }

    function atualizarBadgeServico() {
        const temPendente =
            _servicoManutencoes.some(m =>
                (Array.isArray(m.equipamentosAdicionados) && m.equipamentosAdicionados.length > 0 ||
                 Array.isArray(m.equipamentosRetirados)   && m.equipamentosRetirados.length  > 0) &&
                !m.confirmadoGestor
            ) ||
            _servicoClientes.some(c => c.statusCadastro === 'em_analise');
        const btn = document.getElementById('btnServico');
        if (!btn) return;
        btn.classList.toggle('botao-pendente-alerta', temPendente);
    }

    function iniciarBadgeServico() {
        if (_servicoBadgeStarted) return;
        _servicoBadgeStarted = true;
        dbEscutarManutencoes((lista) => { _servicoManutencoes = lista; atualizarBadgeServico(); });
        dbEscutarClientes((lista)    => { _servicoClientes    = lista; atualizarBadgeServico(); });
    }

    function iniciarBadgeAtendimentos() {
        if (_atendBadgeStarted) return;
        _atendBadgeStarted = true;
        dbEscutarAtendimentos((lista) => {
            const pendentes = lista.filter(a => !a.confirmacao).length;
            const btn = document.getElementById('btnAtendimento');
            if (!btn) return;
            btn.classList.toggle('botao-pendente-alerta', pendentes > 0);
        });
    }

    let _depositosBadgeStarted = false;
    function iniciarBadgeDepositos() {
        if (_depositosBadgeStarted) return;
        _depositosBadgeStarted = true;
        dbEscutarTodosDepositos((lista) => {
            if (lista?.erro) return;
            const pendentes = lista.filter(d =>
                String(d?.status || '').trim().toLowerCase() === 'aguardando_conferencia'
            ).length;
            const temPendente = pendentes > 0;
            document.getElementById('btnDepositos')?.classList.toggle('botao-pendente-alerta', temPendente);
            document.getElementById('btnGestao')?.classList.toggle('botao-pendente-alerta', temPendente);
        });
    }

    let _balancoBadgeStarted = false;
    function iniciarBadgeBalanco() {
        if (_balancoBadgeStarted) return;
        _balancoBadgeStarted = true;
        dbEscutarTodasContestacoesBalanco((lista) => {
            const pendentes = lista.filter(c =>
                String(c?.status || '').trim() !== 'aprovado' &&
                !c?.aprovadoEm &&
                !c?.aprovadoPor
            ).length;
            const btn = document.getElementById('btnBalanco');
            if (!btn) return;
            btn.classList.toggle('botao-pendente-alerta', pendentes > 0);
        });
    }

    // â”€â”€ INDICADOR DE CONEXÃƒO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const pillOffline = document.getElementById('pill-offline');
    function atualizarConexao() {
        pillOffline.style.display = navigator.onLine ? 'none' : 'block';
        atualizarEstadoBotaoRotas();
    }
    atualizarConexao();
    window.addEventListener('offline', atualizarConexao);
    window.addEventListener('online', async () => {
        atualizarConexao();
        try {
            const n = await sincronizarPendentes(storageSalvarFoto, dbSalvarAtendimento, dbSincronizarProdutosAtendimentoNoHistorico);
            if (n > 0) await window.playAlert(`Sucesso: ${n} atendimento${n > 1 ? 's' : ''} enviado${n > 1 ? 's' : ''} com sucesso!`);
        } catch(e) { console.warn('Sync ao reconectar falhou:', e); }
    });

    // Sincroniza pendentes que ficaram da sessÃ£o anterior
    if (navigator.onLine) {
        sincronizarPendentes(storageSalvarFoto, dbSalvarAtendimento, dbSincronizarProdutosAtendimentoNoHistorico).then(async n => {
            if (n > 0) await window.playAlert(`Sucesso: ${n} atendimento${n > 1 ? 's' : ''} pendente${n > 1 ? 's' : ''} enviado${n > 1 ? 's' : ''} com sucesso!`);
        }).catch(() => {});
    }

    verificarAutenticacao();
    window.sair = fazerLogout;

    let listaColaboradores = [];


    // Redirecionamento inteligente do Atendimento
    window.abrirAtendimento = function() {
        localStorage.removeItem('rascunho_atendimento');

        const nome = String(localStorage.getItem('usuarioLogado') || '').trim();
        const usuario = listaColaboradores.find(c => String(c?.nome || '').trim() === nome);
        const perfil = usuario ? (usuario.nivel_completo || "") : "";

        if (perfil.includes('atendimento_1')) {
            sessionStorage.setItem('atendimento_tela_origem', 'index.html');
            window.location.href = 'atendimento_nivel_1.html';
        } else if (perfil.includes('gestao')) {
            window.location.href = 'verificar_atendimentos.html';
        } else {
            // Caso existam outras telas para outros niveis ou padrÃ£o
            console.log("Abrindo atendimento padrÃ£o...");
            // window.location.href = 'atendimento.html'; // Descomente quando existir
        }
    };

    // Verificar Envios: Gestor vÃª todos, demais veem apenas os prÃ³prios
    window.abrirEnvios = function() {
        const nome = String(localStorage.getItem('usuarioLogado') || '').trim();
        const usuario = listaColaboradores.find(c => String(c?.nome || '').trim() === nome);
        const perfil = usuario ? (usuario.nivel_completo || "") : "";

        if (perfil.includes('gestao')) {
            window.location.href = 'lista_de_envios_para_gestor.html';
        } else {
            window.location.href = 'verificar_envios.html';
        }
    };

    window.abrirMediaVendas = function() {
        window.location.href = 'media_de_vendas.html';
    };

    function perfilEhGestor(perfil) {
        const valor = String(perfil || '').toLowerCase();
        return valor.includes('gestao') || valor.includes('gestor');
    }

    window.abrirTela = async function(tela){
        if (tela === 'manutencao') {
            if (usuarioAtendimentoNivel2Index && !statusBalancoCarregadoIndex) {
                return;
            }
            if (usuarioAtendimentoNivel2Index && statusBalancoPendenteIndex) {
                if (window.playAlert) await window.playAlert('Confira o material e envie o Balanço');
                return;
            }
            window.location.href = 'manutencoes_solicitadas.html';
            return;
        }
        if (tela === 'depositos') {
            const nomeLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
            const u = listaColaboradores.find(c => String(c?.nome || '').trim() === nomeLogado);
            const perfil = u ? (u.nivel_completo || "") : "";
            window.location.href = perfilEhGestor(perfil) ? 'Verificar_Depositos.html' : 'depositos.html';
            return;
        }
        if (tela === 'rotas') {
            if (!navigator.onLine) return;
            if (statusBalancoPendenteIndex) {
                if (window.playAlert) await window.playAlert('Confira o material e envie o Balanço');
                return;
            }
            window.location.href = 'selecionar_rota.html';
            return;
        }
        if (tela === 'fluxo_caixa') {
            window.location.href = 'fluxo_caixa.html';
            return;
        }
        if (tela === 'pix') {
            window.location.href = 'cadastro_pix.html';
            return;
        }
        if (tela === 'pagamentos_gestor') {
            window.location.href = 'Pagamentos_Gestor.html';
            return;
        }
        if (tela === 'financeiro') {
            const nomeLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
            const u = listaColaboradores.find(c => String(c?.nome || '').trim() === nomeLogado);
            const perfil = u ? (u.nivel_completo || "") : "";
            if (perfil.includes('gestao')) {
                window.location.href = 'Pagamentos_Gestor.html';
                return;
            }
            window.location.href = u?.producaoProdutos ? 'producao_produtos.html' : 'financeiro.html';
            return;
        }
        console.log("Abrindo tela genÃ©rica: " + tela);
    };

    // Verifica permissÃµes baseado no nome selecionado
    function verificarPermissoes(nomeUsuario) {
        const nomeNormalizado = String(nomeUsuario || '').trim();
        const usuario = listaColaboradores.find(c => String(c?.nome || '').trim() === nomeNormalizado);
        const perfil = usuario ? (usuario.nivel_completo || "") : "";
        usuarioAtendimentoNivel2Index = perfil.includes('atendimento_2');
        atualizarEstadoBotaoManutencao();
        // Mapeamento de todos os botÃµes para facilitar o controle
        const btns = {
            atendimento: document.getElementById('btnAtendimento'),
            clientes: document.getElementById('btnClientes'),
            manutencao: document.getElementById('btnManutencao'),
            gestao: document.getElementById('btnGestao'),
            blocoGestao: document.getElementById('blocoGestao'),
            verificarEnvios: document.getElementById('btnVerificarEnvios'),
            mediaVendas: document.getElementById('btnMediaVendas'),
            balanco: document.getElementById('btnBalanco'),
            depositos: document.getElementById('btnDepositos'),
            importarHistorico: document.getElementById('btnImportarHistorico'),
            rotas: document.getElementById('btnRotas'),
            cadColab: document.getElementById('btnCadColaborador'),
            cadastroItens: document.getElementById('btnCadastroItens'),
            movimentacao: document.getElementById('btnMovimentacao'),
            pedidos: document.getElementById('btnPedidos'),
            servico: document.getElementById('btnServico'),
            financeiro: document.getElementById('btnFinanceiro'),
            pix: document.getElementById('btnPix'),
            fluxoCaixa: document.getElementById('btnFluxoCaixa'),
            pagamentosGestor: document.getElementById('btnPagamentosGestor')
        };

        // Por padrÃ£o, garante que o bloco de GestÃ£o nÃ£o vai deixar "espaÃ§o vazio" no menu.
        btns.blocoGestao.style.display = 'block';

        // 1. PERFIL ESTOQUE
        if (perfil.includes('estoque')) {
            // Estoque nível 3: acesso restrito apenas ao financeiro
            if (perfil.includes('estoque_3')) {
                Object.values(btns).forEach(b => { if (b) b.style.display = 'none'; });
                btns.blocoGestao.style.display = 'none';
                btns.financeiro.style.display = 'flex';
            } else {
            btns.atendimento.style.display = 'none';
            btns.clientes.style.display = 'none';
            btns.rotas.style.display = 'none';
            btns.cadColab.style.display = 'none';
            btns.pix.style.display = 'none';
            btns.fluxoCaixa.style.display = 'none';
            btns.mediaVendas.style.display = 'none';
            btns.balanco.style.display = 'none';

            btns.manutencao.style.display = 'flex';
            btns.gestao.style.display = 'none';
            btns.blocoGestao.style.display = 'none';

            btns.movimentacao.style.display = 'flex';
            btns.cadastroItens.style.display = 'none';

            btns.pedidos.style.display = 'flex';
            btns.servico.style.display = 'none';
            btns.financeiro.style.display = 'flex';

            // Manutenção aparece depois de Financeiro para estoque
            const _menu = document.querySelector('.menu');
            if (_menu && btns.financeiro && btns.manutencao) {
                _menu.insertBefore(btns.manutencao, btns.financeiro.nextSibling);
            }
            }

        // 2. PERFIL ATENDIMENTO
        } else if (perfil.includes('atendimento')) {
            const ehAtendimentoNivel2 = perfil.includes('atendimento_2');
            
            // [ALTERADO] BotÃ£o Atendimento oculto para NÃ­vel 2
            if (ehAtendimentoNivel2) {
                btns.atendimento.style.display = 'none';
            } else {
                btns.atendimento.style.display = 'flex';
            }
            
            btns.clientes.style.display = 'flex';
            btns.manutencao.style.display = 'flex';
            btns.gestao.style.display = 'flex';
            btns.mediaVendas.style.display = ehAtendimentoNivel2 ? 'flex' : 'none';
            btns.depositos.style.display = ehAtendimentoNivel2 ? 'none' : 'flex';
            btns.importarHistorico.style.display = 'none';
            
            // [ALTERADO] Rotas apenas para NÃ­vel 1
            if (perfil.includes('atendimento_1')) {
                btns.rotas.style.display = 'flex';
            } else {
                btns.rotas.style.display = 'none';
            }
            
            // [ALTERADO] Ãrea Pix nÃ£o aparece para NÃ­vel 1
            if (perfil.includes('atendimento_1')) {
                btns.pix.style.display = 'none';
            } else {
                btns.pix.style.display = 'flex';
            }

            // Fluxo de Caixa: Apenas NÃ­vel 2
            btns.fluxoCaixa.style.display = perfil.includes('atendimento_2') ? 'flex' : 'none';
            
            btns.balanco.style.display = 'flex';

            // Oculta o restante
            btns.cadColab.style.display = 'none';
            btns.movimentacao.style.display = 'none';
            btns.cadastroItens.style.display = 'none';
            btns.pedidos.style.display = 'none';
            btns.servico.style.display = 'none';
            btns.financeiro.style.display = 'none';

        // 3. PERFIL GESTÃO
        } else {
            btns.atendimento.style.display = 'flex';
            btns.clientes.style.display = 'flex';
            btns.manutencao.style.display = 'flex';
            btns.gestao.style.display = 'flex';
            btns.balanco.style.display = 'flex';
            btns.mediaVendas.style.display = 'flex';
            btns.depositos.style.display = 'flex';
            btns.importarHistorico.style.display = 'flex';

            btns.rotas.style.display = 'none';

            btns.cadColab.style.display = 'flex';
            btns.cadastroItens.style.display = 'flex';

            // [ALTERADO] MovimentaÃ§Ã£o (Entr. SaÃ­das) fica para o perfil Estoque
            btns.movimentacao.style.display = 'none';
            
            btns.pedidos.style.display = 'flex';
            btns.servico.style.display = 'flex';

            btns.pix.style.display = perfil.includes('gestao') ? 'flex' : 'none'; // Apenas GestÃ£o (ou atendimento acima)
            btns.fluxoCaixa.style.display = perfil.includes('gestao') ? 'flex' : 'none';
            btns.financeiro.style.display = 'none'; // Financeiro continua restrito ao Estoque
            iniciarBadgeAtendimentos();
            iniciarBadgeServico();
            iniciarBadgeBalanco();
            iniciarBadgeDepositos();
        }

        // GESTOR NÍVEL 2 e 3: acesso a Entr. Saídas
        if (perfil.includes('gestao_2') || perfil.includes('gestao_3')) {
            btns.movimentacao.style.display = 'flex';
        }

        // GESTOR NÍVEL 3: botão Financeiro (Pagamentos_Gestor), sem Fluxo de Caixa
        if (perfil.includes('gestao_3')) {
            btns.pagamentosGestor.style.display = 'flex';
            btns.fluxoCaixa.style.display = 'none';
        }

        // GESTOR NÍVEL 1: restrições sobre o perfil gestão
        if (perfil.includes('gestao_1')) {
            btns.cadColab.style.display = 'none';
            btns.cadastroItens.style.display = 'none';
            btns.pedidos.style.display = 'none';
            btns.fluxoCaixa.style.display = 'none';
            btns.manutencao.style.display = 'none';
            btns.pix.style.display = 'none';
            btns.mediaVendas.style.display = 'none';
            btns.importarHistorico.style.display = 'none';
            btns.balanco.onclick = () => window.location.href = 'balanco.html?contestacao=1';
        }

        // Remuneração "Produção de Produtos": exibe o botão Financeiro para qualquer perfil
        if (usuario?.producaoProdutos) {
            btns.financeiro.style.display = 'flex';
        }
        iniciarStatusBalancoIndex(nomeNormalizado);
    }

    // Abre o menu imediatamente com dados do cache (se existir)
    const cacheColab = localStorage.getItem('cache_colaboradores');
    if (cacheColab) {
        try {
            listaColaboradores = JSON.parse(cacheColab);
            const nome = String(localStorage.getItem('usuarioLogado') || '').trim();
            document.getElementById('nomeUsuario').textContent = nome;
            if (nome) verificarPermissoes(nome);
            document.querySelector('.menu').style.display = 'flex';
            document.body.style.visibility = 'visible';
        } catch (_) {}
    }

    dbEscutarColaboradores((lista) => {
        listaColaboradores = lista;
        localStorage.setItem('cache_colaboradores', JSON.stringify(lista));
        const nome = String(localStorage.getItem('usuarioLogado') || '').trim();

        document.getElementById('nomeUsuario').textContent = nome;
        if (nome) verificarPermissoes(nome);

        document.querySelector('.menu').style.display = 'flex';
        document.body.style.visibility = 'visible';
    });
</script>

</body>
</html>
