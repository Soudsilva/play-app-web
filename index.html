<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Diversões</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f2a66">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Play">
    <link rel="apple-touch-icon" href="assets/img/logomenor.png">

    <style>
        /* =========================================
        CONFIGURAÇÃO GLOBAL DO APP
        ========================================= */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f2a66;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .logo img {
            width: 100%;
            max-width: 220px;
            position: relative;
            left: -1px;
        }

        .ola {
            font-size: 30px;
            margin: 20px 0 30px 0;
            color: #cfd6e3;
            user-select: none;
            -webkit-user-select: none;
        }

        /* =========================================
        MENU E BOTÕES (CENTRALIZADOS)
        ========================================= */
        .menu {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .botao {
            position: relative; /* Base para o ícone absoluto */
            background: #4467a8;
            border: 4px solid #d7dce3;
            border-radius: 45px;
            padding: 10px;     /*altura do botão*/
            min-height: 35px; /* Garante altura mínima */
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center; /* Centraliza o conteúdo principal (texto) */
            user-select: none;
            -webkit-user-select: none;
        }

        /* O Ícone fica "preso" na esquerda sem empurrar o texto */
        .icone {
            position: absolute;
            left: 20px; /* Distância da borda esquerda */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
        }

        /* O texto ocupa o centro real do botão */
        .botao span:last-child {
            color: white;
            font-size: 25px;
            font-weight: bold;
            text-align: center;
            width: 100%;
        }

        .botao:hover { background: #3c5f9f; }
        .botao:active { transform: translateY(2px); background: #355792; transition: 0.05s; }

        /* Submenu Gestão */
        .submenu {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 4px 0 0 0;
        }
        .submenu.aberto { display: flex; }
        .botao-sub {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.18);
            border-radius: 35px;
            padding: 10px;
            min-height: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            transition: 0.15s;
        }
        .botao-sub:active { transform: translateY(2px); background: rgba(255,255,255,0.14); }
        .botao-sub .icone { position: absolute; left: 20px; font-size: 20px; }
        .botao-sub span:last-child { color: white; font-size: 18px; font-weight: bold; text-align: center; width: 100%; }
        .seta-gestao {
            position: absolute;
            right: 20px;
            font-size: 16px;
            font-weight: normal;
            width: auto !important;
            transition: transform 0.2s;
        }
        .seta-gestao.girada { transform: rotate(180deg); }

    </style>
</head>

<body style="visibility: hidden;">

<!-- Indicador de conexão -->
<div id="pill-offline" style="display:none; position:fixed; top:14px; left:50%; transform:translateX(-50%); background:#c62828; color:white; padding:7px 22px; border-radius:999px; font-size:15px; font-weight:bold; z-index:999; box-shadow:0 4px 14px rgba(0,0,0,0.35); white-space:nowrap;">
    📵 Sem internet
</div>

<div class="app">

    <div class="logo">
        <img src="assets/img/logo.png">
    </div>

    <div class="ola" style="display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;">
        Olá, <span id="nomeUsuario" style="color: #ffeb3b; font-size: 24px; font-weight: bold;"></span>
        <button onclick="sair()" style="background: transparent; border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer; padding: 3px 10px; font-family: Arial, Helvetica, sans-serif; transition: 0.15s;" title="Sair">Sair</button>
    </div>

    <div class="menu">

        <div class="botao" id="btnAtendimento" onclick="abrirAtendimento()">
            <span class="icone">🤝</span>
            <span>Atendimento</span>
        </div>

        <div class="botao" id="btnClientes" onclick="window.location.href='clientes.html'">
            <span class="icone">🔍</span>
            <span>Lista de Clientes</span>
        </div>

        <div class="botao" id="btnManutencao" onclick="abrirTela('manutencao')">
            <span class="icone">🔧</span>
            <span>Manutenção</span>
        </div>

        <div id="blocoGestao">
            <div class="botao" id="btnGestao" onclick="toggleSubmenuGestao()">
                <span class="icone">📊</span>
                <span style="color:white; font-size:25px; font-weight:bold; text-align:center; width:100%;">Gestão</span>
                <span class="seta-gestao" id="setaGestao">▼</span>
            </div>
            <div class="submenu" id="submenuGestao">
                <div class="botao-sub" onclick="window.location.href='verificar_envios.html'">
                    <span class="icone">📤</span>
                    <span>Verificar Envios</span>
                </div>
                <div class="botao-sub" onclick="window.location.href='balanco.html'">
                    <span class="icone">📈</span>
                    <span>Balanço</span>
                </div>
                <div class="botao-sub" onclick="abrirTela('checkin')">
                    <span class="icone">📍</span>
                    <span>Check in de Rotas</span>
                </div>
                <div class="botao-sub" onclick="abrirTela('depositos')">
                    <span class="icone">🏦</span>
                    <span>Depósitos</span>
                </div>
            </div>
        </div>

        <div class="botao" id="btnRotas" onclick="abrirTela('rotas')">
            <span class="icone">🚀</span>
            <span>Seleção de rotas</span>
        </div>

        <div class="botao" id="btnCadColaborador" onclick="window.location.href='cadastrar_colaborador.html'">
            <span class="icone">
                <img src="assets/img/boneco-cadastrar.png" 
                     alt="Cadastrar" 
                     style="width: 35px; height: 35px; vertical-align: middle;">
            </span>
            <span>Cad. Colaborador</span>
        </div>



       <div class="botao" id="btnEstoque" onclick="abrirEstoque()">
          <span class="icone">📦</span>
           <span>Estoque</span>
       </div>


       <div class="botao" id="btnMovimentacao" onclick="window.location.href='movimentacao_estoq.html'">
          <span class="icone">🔄</span>
           <span>Entr. Saídas </span>
       </div>

       <div class="botao" id="btnPedidos" onclick="window.location.href='pedidos.html'">
          <span class="icone">🛒</span>
           <span>Pedidos</span>
       </div>

       <div class="botao" id="btnFinanceiro" onclick="abrirTela('financeiro')" style="display: none;">
          <span class="icone">💰</span>
           <span>Financeiro</span>
       </div>

       <div class="botao" id="btnPix" onclick="abrirTela('pix')" style="display: none;">
          <span class="icone">💠</span>
           <span>Área Pix</span>
       </div>

       <div class="botao" id="btnFluxoCaixa" onclick="abrirTela('fluxo_caixa')" style="display: none;">
          <span class="icone">💸</span>
           <span>Fluxo de Caixa</span>
       </div>


    </div>

</div>

<script>
    function toggleSubmenuGestao() {
        const submenu = document.getElementById('submenuGestao');
        const seta = document.getElementById('setaGestao');
        const abrindo = !submenu.classList.contains('aberto');
        submenu.classList.toggle('aberto');
        seta.classList.toggle('girada');
        // Empurra estado para o histórico ao abrir, para o botão voltar poder fechar
        if (abrindo) history.pushState({ submenu: true }, '');
    }

    function fecharSubmenus() {
        const submenu = document.getElementById('submenuGestao');
        const seta = document.getElementById('setaGestao');
        if (submenu && submenu.classList.contains('aberto')) {
            submenu.classList.remove('aberto');
            seta.classList.remove('girada');
        }
    }

    // Trava o index como primeira página
    function travarIndex() {
        history.pushState(null, '', window.location.href);
    }

    // Empurra imediatamente (síncrono) + nas primeiras interações (mobile)
    travarIndex();
    window.addEventListener('load', travarIndex);
    window.addEventListener('touchstart', function _t() {
        travarIndex();
        window.removeEventListener('touchstart', _t);
    });
    window.addEventListener('click', function _c() {
        travarIndex();
        window.removeEventListener('click', _c);
    });

    window.addEventListener('popstate', function() {
        travarIndex();
        fecharSubmenus();
    });
</script>

<script type="module">
    import { dbEscutarColaboradores, dbSalvarAtendimento, storageSalvarFoto } from './database.js';
    import { verificarAutenticacao, fazerLogout } from './auth.js';
    import { sincronizarPendentes, contarPendentes } from './offline-sync.js';

    // ── INDICADOR DE CONEXÃO ─────────────────────────────────────────
    const pillOffline = document.getElementById('pill-offline');
    function atualizarConexao() {
        pillOffline.style.display = navigator.onLine ? 'none' : 'block';
    }
    atualizarConexao();
    window.addEventListener('offline', atualizarConexao);
    window.addEventListener('online', async () => {
        atualizarConexao();
        try {
            const n = await sincronizarPendentes(storageSalvarFoto, dbSalvarAtendimento);
            if (n > 0) await window.playAlert(`✅ ${n} atendimento${n > 1 ? 's' : ''} enviado${n > 1 ? 's' : ''} com sucesso!`);
        } catch(e) { console.warn('Sync ao reconectar falhou:', e); }
    });

    // Sincroniza pendentes que ficaram da sessão anterior
    if (navigator.onLine) {
        sincronizarPendentes(storageSalvarFoto, dbSalvarAtendimento).then(async n => {
            if (n > 0) await window.playAlert(`✅ ${n} atendimento${n > 1 ? 's' : ''} pendente${n > 1 ? 's' : ''} enviado${n > 1 ? 's' : ''} com sucesso!`);
        }).catch(() => {});
    }

    verificarAutenticacao();
    window.sair = fazerLogout;

    let listaColaboradores = [];

    // Redirecionamento inteligente do Estoque
    window.abrirEstoque = function() {
        const nome = localStorage.getItem('usuarioLogado') || '';
        const usuario = listaColaboradores.find(c => c.nome === nome);

        // Se for Gestor, vai para a tela avançada. Se for Estoque ou outro, vai para a padrão.
        if (usuario && usuario.nivel_completo && usuario.nivel_completo.includes('gestao')) {
            window.location.href = 'estoque_gestor.html';
        } else {
            window.location.href = 'estoque.html';
        }
    };

    // Redirecionamento inteligente do Atendimento
    window.abrirAtendimento = function() {
        localStorage.removeItem('rascunho_atendimento');

        const nome = localStorage.getItem('usuarioLogado') || '';
        const usuario = listaColaboradores.find(c => c.nome === nome);
        const perfil = usuario ? (usuario.nivel_completo || "") : "";

        if (perfil.includes('atendimento_1')) {
            sessionStorage.setItem('atendimento_tela_origem', 'index.html');
            window.location.href = 'atendimento_nivel_1.html';
        } else {
            // Caso existam outras telas para outros niveis ou padrão
            console.log("Abrindo atendimento padrão...");
            // window.location.href = 'atendimento.html'; // Descomente quando existir
        }
    };

    window.abrirTela = function(tela){
        if (tela === 'manutencao') {
            window.location.href = 'manutencoes_solicitadas.html';
            return;
        }
        if (tela === 'depositos') {
            window.location.href = 'depositos.html';
            return;
        }
        if (tela === 'checkin') {
            window.location.href = 'checkin_rotas.html';
            return;
        }
        if (tela === 'rotas') {
            window.location.href = 'selecionar_rota.html';
            return;
        }
        console.log("Abrindo tela genérica: " + tela);
    };

    // Verifica permissões baseado no nome selecionado
    function verificarPermissoes(nomeUsuario) {
        const usuario = listaColaboradores.find(c => c.nome === nomeUsuario);
        const perfil = usuario ? (usuario.nivel_completo || "") : "";

        // Mapeamento de todos os botões para facilitar o controle
        const btns = {
            atendimento: document.getElementById('btnAtendimento'),
            clientes: document.getElementById('btnClientes'),
            manutencao: document.getElementById('btnManutencao'),
            gestao: document.getElementById('btnGestao'),
            blocoGestao: document.getElementById('blocoGestao'),
            rotas: document.getElementById('btnRotas'),
            cadColab: document.getElementById('btnCadColaborador'),
            estoque: document.getElementById('btnEstoque'),
            movimentacao: document.getElementById('btnMovimentacao'),
            pedidos: document.getElementById('btnPedidos'),
            financeiro: document.getElementById('btnFinanceiro'),
            pix: document.getElementById('btnPix'),
            fluxoCaixa: document.getElementById('btnFluxoCaixa')
        };

        // Por padrão, garante que o bloco de Gestão não vai deixar "espaço vazio" no menu.
        btns.blocoGestao.style.display = 'block';

        // 1. PERFIL ESTOQUE
        if (perfil.includes('estoque')) {
            btns.atendimento.style.display = 'none';
            btns.clientes.style.display = 'none';
            btns.rotas.style.display = 'none';
            btns.cadColab.style.display = 'none';
            btns.pix.style.display = 'none';
            btns.fluxoCaixa.style.display = 'none';
            
            btns.manutencao.style.display = 'flex';
            btns.gestao.style.display = 'none';
            btns.blocoGestao.style.display = 'none';
            
            // Perfil Estoque também pode acessar a tela padrão de estoque.
            btns.estoque.style.display = 'flex'; 
            
            // [MANTIDO] Botão 'Entr. Saídas' para perfil Estoque
            btns.movimentacao.style.display = 'flex';
            
            btns.pedidos.style.display = 'flex';
            btns.financeiro.style.display = 'flex';

        // 2. PERFIL ATENDIMENTO
        } else if (perfil.includes('atendimento')) {
            
            // [ALTERADO] Botão Atendimento oculto para Nível 2
            if (perfil.includes('atendimento_2')) {
                btns.atendimento.style.display = 'none';
            } else {
                btns.atendimento.style.display = 'flex';
            }
            
            btns.clientes.style.display = 'flex';
            btns.manutencao.style.display = 'flex';
            btns.gestao.style.display = 'flex';
            
            // [ALTERADO] Rotas apenas para Nível 1
            if (perfil.includes('atendimento_1')) {
                btns.rotas.style.display = 'flex';
            } else {
                btns.rotas.style.display = 'none';
            }
            
            // [ALTERADO] Área Pix não aparece para Nível 1
            if (perfil.includes('atendimento_1')) {
                btns.pix.style.display = 'none';
            } else {
                btns.pix.style.display = 'flex';
            }

            // Fluxo de Caixa: Apenas Nível 2
            btns.fluxoCaixa.style.display = perfil.includes('atendimento_2') ? 'flex' : 'none';
            
            // Oculta o restante
            btns.cadColab.style.display = 'none';
            btns.estoque.style.display = 'none';
            btns.movimentacao.style.display = 'none';
            btns.pedidos.style.display = 'none';
            btns.financeiro.style.display = 'none';

        // 3. PERFIL GESTÃO
        } else {
            btns.atendimento.style.display = 'flex';
            btns.clientes.style.display = 'flex';
            btns.manutencao.style.display = 'flex';
            btns.gestao.style.display = 'flex';
            
            // [ALTERADO] Rotas é exclusivo de Atendimento 1
            btns.rotas.style.display = 'none'; 
            
            btns.cadColab.style.display = 'flex';
            btns.estoque.style.display = 'flex';
            
            // [ALTERADO] Movimentação (Entr. Saídas) fica para o perfil Estoque
            btns.movimentacao.style.display = 'none';
            
            btns.pedidos.style.display = 'flex';
            
            btns.pix.style.display = perfil.includes('gestao') ? 'flex' : 'none'; // Apenas Gestão (ou atendimento acima)
            btns.fluxoCaixa.style.display = perfil.includes('gestao') ? 'flex' : 'none';
            btns.financeiro.style.display = 'none'; // Financeiro continua restrito ao Estoque
        }
    }

    dbEscutarColaboradores((lista) => {
        listaColaboradores = lista;
        const nome = localStorage.getItem('usuarioLogado') || '';

        document.getElementById('nomeUsuario').textContent = nome;

        if (nome) verificarPermissoes(nome);

        document.querySelector('.menu').style.display = 'flex';
    });
</script>

</body>
</html>
