<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Play Diversões</title>

<style>

/* =========================================
CONFIGURAÇÃO GLOBAL DO APP
Foco: desempenho e simplicidade
========================================= */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f2a66;
display:flex;
justify-content:center;

/* remove o flash azul ao tocar no celular */
-webkit-tap-highlight-color: transparent;
}

.app{
width:100%;
max-width:420px;
padding:20px;
box-sizing:border-box;
text-align:center;
}

/* =========================================
LOGO
========================================= */

.logo img{

width:100%;
max-width:220px;

/* permite mover a imagem manualmente */
position:relative;

/* move a logo para esquerda */
left:-1px;

}

/* =========================================
SAUDAÇÃO
========================================= */

.ola{
font-size:30px;
margin:20px 0 30px 0;
color:#cfd6e3;

/* impede selecionar/copiar o texto */
user-select:none;
-webkit-user-select:none;
-moz-user-select:none;
}

/* =========================================
MENU PRINCIPAL
========================================= */

.menu{
display:flex;
flex-direction:column;
gap:20px;
}

/* =========================================
BOTÕES tela inical
========================================= */

.botao{

position:relative;

background:#4467a8;

border:4px solid #d7dce3;

border-radius:45px;

padding:15px;  /* altura dos botões*/

font-size:25px; /* tamanho do texto dos botões */

font-weight:bold;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

transition:0.15s;

color:white;

/* impede selecionar texto (copiar) no botão */
user-select:none;
-webkit-user-select:none;
-moz-user-select:none;

}

/* texto centralizado */

.botao span:last-child{

width:100%;

text-align:center;

}

.botao:hover{
background:#3c5f9f;
}

/* =========================================
EFEITO DE CLIQUE NO BOTÃO
========================================= */

.botao:active{

/* botão "afunda" um pouco quando pressionado */
transform:translateY(2px);

/* escurece levemente o botão */
background:#355792;

/* animação rápida de pressão */
transition:0.05s;

}

</style>

</head>

<body>

<div class="app">

<!-- =========================================
TELA INICIAL - INICIO
========================================= -->

<div class="logo">
<img src="assets/img/logo.png">
</div>

<div class="ola">
Olá, Anderson
</div>

<span class="icone">🤝</span>
<span>Atendimento</span>
</div>

<div class="botao" onclick="window.location.href='clientes.html'">
<span class="icone">🔍</span>
<span>Lista de Clientes</span>
</div>

<div class="botao" onclick="abrirTela('manutencao')">
<span class="icone">🔧</span>
<span>Manutenção</span>
</div>

<div class="botao" onclick="abrirTela('gestao')">
<span class="icone">📦</span>
<span>Gestão</span>
</div>

<div class="botao" onclick="abrirTela('rotas')">
<span class="icone">🚀</span>
<span>Seleção de rotas</span>
</div>

<div class="botao" onclick="window.location.href='cadastrar_colaborador.html'">
<span class="icone">🚀</span>
<span>Cadastrar Colaborador</span>
</div>


</div>

<!-- =========================================
TELA INICIAL - FIM
========================================= -->

</div>
