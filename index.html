<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Diversões</title>

    <style>
        /* =========================================
        CONFIGURAÇÃO GLOBAL DO APP
        ========================================= */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f2a66;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .logo img {
            width: 100%;
            max-width: 220px;
            position: relative;
            left: -1px;
        }

        .ola {
            font-size: 30px;
            margin: 20px 0 30px 0;
            color: #cfd6e3;
            user-select: none;
            -webkit-user-select: none;
        }

        /* =========================================
        MENU E BOTÕES (CENTRALIZADOS)
        ========================================= */
        .menu {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .botao {
            position: relative; /* Base para o ícone absoluto */
            background: #4467a8;
            border: 4px solid #d7dce3;
            border-radius: 45px;
            padding: 10px;     /*altura do botão*/
            min-height: 35px; /* Garante altura mínima */
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center; /* Centraliza o conteúdo principal (texto) */
            user-select: none;
            -webkit-user-select: none;
        }

        /* O Ícone fica "preso" na esquerda sem empurrar o texto */
        .icone {
            position: absolute;
            left: 20px; /* Distância da borda esquerda */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
        }

        /* O texto ocupa o centro real do botão */
        .botao span:last-child {
            color: white;
            font-size: 25px;
            font-weight: bold;
            text-align: center;
            width: 100%;
        }

        .botao:hover { background: #3c5f9f; }
        .botao:active { transform: translateY(2px); background: #355792; transition: 0.05s; }

    </style>
</head>

<body>

<div class="app">

    <div class="logo">
        <img src="assets/img/logo.png">
    </div>

    <div class="ola" style="display: flex; justify-content: center; align-items: center; gap: 10px;">
        Olá, 
        <select id="selectUsuario" style="
            background: transparent; 
            border: none; 
            border-bottom: 1px solid rgba(255,255,255,0.3); 
            color: #ffeb3b; 
            font-size: 24px; 
            font-weight: bold; 
            outline: none; 
            cursor: pointer; 
            max-width: 220px;
        ">
            <option value="" style="background: #0f2a66; color: white;">Carregando...</option>
        </select>
    </div>

    <div class="menu">

        <div class="botao" id="btnAtendimento" onclick="abrirTela('atendimento')">
            <span class="icone">🤝</span>
            <span>Atendimento</span>
        </div>

        <div class="botao" id="btnClientes" onclick="window.location.href='clientes.html'">
            <span class="icone">🔍</span>
            <span>Lista de Clientes</span>
        </div>

        <div class="botao" id="btnManutencao" onclick="abrirTela('manutencao')">
            <span class="icone">🔧</span>
            <span>Manutenção</span>
        </div>

        <div class="botao" id="btnGestao" onclick="abrirTela('gestao')">
            <span class="icone">📊</span>
            <span>Gestão</span>
        </div>

        <div class="botao" id="btnRotas" onclick="abrirTela('rotas')">
            <span class="icone">🚀</span>
            <span>Seleção de rotas</span>
        </div>

        <div class="botao" id="btnCadColaborador" onclick="window.location.href='cadastrar_colaborador.html'">
            <span class="icone">
                <img src="assets/img/boneco-cadastrar.png" 
                     alt="Cadastrar" 
                     style="width: 35px; height: 35px; vertical-align: middle;">
            </span>
            <span>Cad. Colaborador</span>
        </div>



       <div class="botao" id="btnEstoque" onclick="abrirEstoque()">
          <span class="icone">📦</span>
           <span>Estoque</span>
       </div>


       <div class="botao" id="btnMovimentacao" onclick="window.location.href='movimentacao_estoq.html'">
          <span class="icone">🔄</span>
           <span>Entr. Saídas </span>
       </div>

       <div class="botao" id="btnPedidos" onclick="window.location.href='pedidos.html'">
          <span class="icone">🛒</span>
           <span>Pedidos</span>
       </div>

       <div class="botao" id="btnFinanceiro" onclick="abrirTela('financeiro')" style="display: none;">
          <span class="icone">💰</span>
           <span>Financeiro</span>
       </div>

       <div class="botao" id="btnPix" onclick="abrirTela('pix')" style="display: none;">
          <span class="icone">💠</span>
           <span>Área Pix</span>
       </div>

       <div class="botao" id="btnFluxoCaixa" onclick="abrirTela('fluxo_caixa')" style="display: none;">
          <span class="icone">💸</span>
           <span>Fluxo de Caixa</span>
       </div>


    </div>

</div>

<script type="module">
    import { dbEscutarColaboradores } from './database.js';

    let listaColaboradores = [];

    // Torna a função global para funcionar com os 'onclick' do HTML
    window.abrirTela = function(tela){
        console.log("Abrindo tela: " + tela);
    }

    // [NOVO] Redirecionamento inteligente do Estoque
    window.abrirEstoque = function() {
        const nome = document.getElementById('selectUsuario').value;
        const usuario = listaColaboradores.find(c => c.nome === nome);

        // Se for Gestor, vai para a tela avançada. Se for Estoque ou outro, vai para a padrão.
        if (usuario && usuario.nivel_completo && usuario.nivel_completo.includes('gestao')) {
            window.location.href = 'estoque_gestor.html';
        } else {
            window.location.href = 'estoque.html';
        }
    };

    // Verifica permissões baseado no nome selecionado
    function verificarPermissoes(nomeUsuario) {
        const usuario = listaColaboradores.find(c => c.nome === nomeUsuario);
        const perfil = usuario ? (usuario.nivel_completo || "") : "";

        // Mapeamento de todos os botões para facilitar o controle
        const btns = {
            atendimento: document.getElementById('btnAtendimento'),
            clientes: document.getElementById('btnClientes'),
            manutencao: document.getElementById('btnManutencao'),
            gestao: document.getElementById('btnGestao'),
            rotas: document.getElementById('btnRotas'),
            cadColab: document.getElementById('btnCadColaborador'),
            estoque: document.getElementById('btnEstoque'),
            movimentacao: document.getElementById('btnMovimentacao'),
            pedidos: document.getElementById('btnPedidos'),
            financeiro: document.getElementById('btnFinanceiro'),
            pix: document.getElementById('btnPix'),
            fluxoCaixa: document.getElementById('btnFluxoCaixa')
        };

        // 1. PERFIL ESTOQUE
        if (perfil.includes('estoque')) {
            btns.atendimento.style.display = 'none';
            btns.clientes.style.display = 'none';
            btns.rotas.style.display = 'none';
            btns.cadColab.style.display = 'none';
            btns.pix.style.display = 'none';
            btns.fluxoCaixa.style.display = 'none';
            
            btns.manutencao.style.display = 'flex';
            btns.gestao.style.display = 'flex';
            btns.estoque.style.display = 'flex';
            btns.movimentacao.style.display = 'flex';
            btns.pedidos.style.display = 'flex';
            btns.financeiro.style.display = 'flex';

        // 2. PERFIL ATENDIMENTO (Restrito conforme solicitado)
        } else if (perfil.includes('atendimento')) {
            btns.atendimento.style.display = 'flex';
            btns.clientes.style.display = 'flex';
            btns.manutencao.style.display = 'flex';
            btns.gestao.style.display = 'flex';
            btns.rotas.style.display = 'flex';
            btns.pix.style.display = 'flex'; // [NOVO]
            
            // Fluxo de Caixa: Apenas Nível 2
            btns.fluxoCaixa.style.display = perfil.includes('atendimento_2') ? 'flex' : 'none';
            
            // Oculta o restante
            btns.cadColab.style.display = 'none';
            btns.estoque.style.display = 'none';
            btns.movimentacao.style.display = 'none';
            btns.pedidos.style.display = 'none';
            btns.financeiro.style.display = 'none';

        // 3. PERFIL GESTÃO (Vê quase tudo)
        } else {
            btns.atendimento.style.display = 'flex';
            btns.clientes.style.display = 'flex';
            btns.manutencao.style.display = 'flex';
            btns.gestao.style.display = 'flex';
            btns.rotas.style.display = 'flex';
            btns.cadColab.style.display = 'flex';
            btns.estoque.style.display = 'flex';
            btns.movimentacao.style.display = 'flex';
            btns.pedidos.style.display = 'flex';
            
            btns.pix.style.display = perfil.includes('gestao') ? 'flex' : 'none'; // Apenas Gestão (ou atendimento acima)
            btns.fluxoCaixa.style.display = perfil.includes('gestao') ? 'flex' : 'none';
            btns.financeiro.style.display = 'none'; // Financeiro continua restrito ao Estoque
        }
    }

    // Lógica do Dropdown de Usuários
    const select = document.getElementById('selectUsuario');

    dbEscutarColaboradores((lista) => {
        listaColaboradores = lista; // Guarda a lista completa para consultar depois
        const selecionadoAnterior = localStorage.getItem('usuarioLogado') || "";
        
        select.innerHTML = '<option value="" style="background: #0f2a66; color: #ccc;">Selecione...</option>';
        
        lista.forEach(c => {
            const option = document.createElement('option');
            option.value = c.nome; 
            option.innerText = c.nome;
            option.style.background = "#0f2a66"; // Fundo azul escuro para as opções
            option.style.color = "white";
            select.appendChild(option);
        });

        // Restaura a seleção anterior se existir
        if (selecionadoAnterior) {
            select.value = selecionadoAnterior;
            verificarPermissoes(selecionadoAnterior);
        }

        // Exibe o menu somente após as permissões serem aplicadas, evitando o "piscar"
        document.querySelector('.menu').style.display = 'flex';
    });

    // Salva a escolha no navegador para não perder ao recarregar
    select.addEventListener('change', (e) => {
        const nome = e.target.value;
        localStorage.setItem('usuarioLogado', nome);
        verificarPermissoes(nome);
    });
</script>

</body>
</html>
