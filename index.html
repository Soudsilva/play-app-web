<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Diversões</title>

    <style>
        /* =========================================
        CONFIGURAÇÃO GLOBAL DO APP
        ========================================= */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f2a66;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .logo img {
            width: 100%;
            max-width: 220px;
            position: relative;
            left: -1px;
        }

        .ola {
            font-size: 30px;
            margin: 20px 0 30px 0;
            color: #cfd6e3;
            user-select: none;
            -webkit-user-select: none;
        }

        /* =========================================
        MENU E BOTÕES (CENTRALIZADOS)
        ========================================= */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .botao {
            position: relative; /* Base para o ícone absoluto */
            background: #4467a8;
            border: 4px solid #d7dce3;
            border-radius: 45px;
            padding: 10px;     /*altura do botão*/
            min-height: 35px; /* Garante altura mínima */
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center; /* Centraliza o conteúdo principal (texto) */
            user-select: none;
            -webkit-user-select: none;
        }

        /* O Ícone fica "preso" na esquerda sem empurrar o texto */
        .icone {
            position: absolute;
            left: 20px; /* Distância da borda esquerda */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
        }

        /* O texto ocupa o centro real do botão */
        .botao span:last-child {
            color: white;
            font-size: 25px;
            font-weight: bold;
            text-align: center;
            width: 100%;
        }

        .botao:hover { background: #3c5f9f; }
        .botao:active { transform: translateY(2px); background: #355792; transition: 0.05s; }

    </style>
</head>

<body>

<div class="app">

    <div class="logo">
        <img src="assets/img/logo.png">
    </div>

    <div class="ola">
        Olá, Anderson
    </div>

    <div class="menu">

        <div class="botao" onclick="abrirTela('atendimento')">
            <span class="icone">🤝</span>
            <span>Atendimento</span>
        </div>

        <div class="botao" onclick="window.location.href='clientes.html'">
            <span class="icone">🔍</span>
            <span>Lista de Clientes</span>
        </div>

        <div class="botao" onclick="abrirTela('manutencao')">
            <span class="icone">🔧</span>
            <span>Manutenção</span>
        </div>

        <div class="botao" onclick="abrirTela('gestao')">
            <span class="icone">📊</span>
            <span>Gestão</span>
        </div>

        <div class="botao" onclick="abrirTela('rotas')">
            <span class="icone">🚀</span>
            <span>Seleção de rotas</span>
        </div>

        <div class="botao" onclick="window.location.href='cadastrar_colaborador.html'">
            <span class="icone">
                <img src="assets/img/boneco-cadastrar.png" 
                     alt="Cadastrar" 
                     style="width: 35px; height: 35px; vertical-align: middle;">
            </span>
            <span>Cad. Colaborador</span>
        </div>



       <div class="botao" onclick="window.location.href='estoque.html'">
          <span class="icone">📦</span>
           <span>Estoque</span>
       </div>



    </div>

</div>

<script>
    function abrirTela(tela){
        console.log("Abrindo tela: " + tela);
    }
</script>

</body>
</html>
