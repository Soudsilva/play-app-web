<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de Compra</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f2a66;
            display: flex;
            justify-content: center;
            color: white;
            min-height: 100vh;
        }

        .app {
            width: 100%;
            max-width: 440px;
            padding: 18px 18px 200px;
        }

        /* ── TOPO ── */
        .topo {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px 54px 4px;
            margin-bottom: 6px;
        }
        .titulo-wrap { text-align: center; }
        .titulo { font-size: 28px; font-weight: bold; letter-spacing: 0.3px; }
        .subtitulo {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #9db8e8;
            margin-top: 2px;
        }
        .btn-home {
            position: absolute; right: 0; top: 50%; transform: translateY(-50%);
            cursor: pointer;
            background: rgba(255,255,255,0.12);
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.22);
        }
        .btn-home:active { background: rgba(255,255,255,0.28); transform: translateY(-50%) scale(0.92); }
        .btn-home img { width: 22px; height: 22px; filter: brightness(0) invert(1); }

        /* ── CONTADOR TOTAL ── */
        .contador-total {
            text-align: center;
            margin: 10px 0 18px;
        }
        .contador-total span {
            background: rgba(255,235,59,0.15);
            border: 1px solid rgba(255,235,59,0.5);
            color: #ffeb3b;
            font-weight: bold;
            padding: 5px 16px;
            border-radius: 999px;
            font-size: 15px;
        }

        /* ── FILTROS ── */
        .filtros {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: none;
        }
        .filtros::-webkit-scrollbar { display: none; }

        .chip-filtro {
            flex-shrink: 0;
            padding: 9px 18px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.07);
            color: #b8cce8;
            transition: 0.15s;
            user-select: none;
        }
        .chip-filtro.ativo {
            background: rgba(255,235,59,0.18);
            border-color: #ffeb3b;
            color: #ffeb3b;
        }
        .chip-filtro:active { transform: scale(0.95); }

        /* ── CARDS ── */
        .card-pedido {
            background: linear-gradient(160deg, rgba(255,255,255,0.11) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 20px;
            margin-bottom: 14px;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0,0,0,0.22);
            backdrop-filter: blur(8px);
            transition: transform 0.15s;
        }
        .card-pedido:active { transform: scale(0.985); }

        /* Barra de urgência no topo do card */
        .card-accent {
            height: 6px;
            width: 100%;
        }
        .accent-produtos  { background: linear-gradient(90deg, #4caf50, #81c784); }
        .accent-peca      { background: linear-gradient(90deg, #ff9800, #ffb74d); }
        .accent-maquina   { background: linear-gradient(90deg, #9c27b0, #ce93d8); }
        .accent-materiais { background: linear-gradient(90deg, #00acc1, #4dd0e1); }

        /* Urgência sobrescreve a cor */
        .urgencia-alta  .card-accent { background: linear-gradient(90deg, #f44336, #ef9a9a) !important; }
        .urgencia-media .card-accent { background: linear-gradient(90deg, #ff9800, #ffcc80) !important; }

        .card-corpo { padding: 16px 16px 14px; }

        /* Topo do card: descrição à esquerda, badges empilhados à direita */
        .card-topo {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .desc-item {
            font-size: 23px;
            font-weight: bold;
            color: white;
            word-break: break-word;
            line-height: 1.25;
            flex: 1;
        }

        .badges-col {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            flex-shrink: 0;
        }

        .badge-cat {
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }
        .badge-produtos { background: rgba(76,175,80,0.25);  border: 1.5px solid #4caf50; color: #c8e6c9; }
        .badge-peca     { background: rgba(255,152,0,0.25);  border: 1.5px solid #ff9800; color: #ffe0b2; }
        .badge-maquina  { background: rgba(156,39,176,0.25); border: 1.5px solid #9c27b0; color: #e1bee7; }
        .badge-materiais{ background: rgba(0,172,193,0.22); border: 1.5px solid #00acc1; color: #b2ebf2; }

        .badge-tempo {
            font-size: 13px;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 999px;
            white-space: nowrap;
        }
        .tempo-hoje   { background: rgba(76,175,80,0.2);  border: 1.5px solid #4caf50; color: #c8e6c9; }
        .tempo-fresco { background: rgba(33,150,243,0.2); border: 1.5px solid #2196f3; color: #bbdefb; }
        .tempo-alerta { background: rgba(255,152,0,0.2);  border: 1.5px solid #ff9800; color: #ffe0b2; }
        .tempo-urgente{ background: rgba(244,67,54,0.2);  border: 1.5px solid #f44336; color: #ffcdd2; }

        /* Rodapé do card: solicitante + botões na mesma linha */
        .card-rodape {
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px solid rgba(255,255,255,0.18);
            padding-top: 8px;
        }

        .avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 1.5px solid rgba(255,255,255,0.45);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .nome-sol {
            font-size: 14px;
            color: #dde8ff;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .btn-acao {
            background: none;
            border: none;
            cursor: not-allowed;
            font-size: 20px;
            line-height: 1;
            padding: 2px 3px;
            border-radius: 6px;
            transition: 0.15s;
            opacity: 0.25;
            flex-shrink: 0;
        }
        .btn-acao.ativo-editar  { opacity: 0.75; cursor: pointer; }
        .btn-acao.ativo-editar:active  { opacity: 1; background: rgba(33,150,243,0.2); }
        .btn-acao.ativo-confirmar { opacity: 0.9; cursor: pointer; }
        .btn-acao.ativo-confirmar:active { background: rgba(76,175,80,0.28); }

        .btn-excluir {
            background: rgba(244,67,54,0.15);
            border: 1.5px solid rgba(244,67,54,0.5);
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 2px 5px;
            border-radius: 6px;
            transition: 0.15s;
            flex-shrink: 0;
        }
        .btn-excluir:active { background: rgba(244,67,54,0.35); }

        /* ── FORM FIXO ── */
        .form-fixo {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            background: rgba(5, 20, 60, 0.96);
            border-top: 2px solid rgba(255,235,59,0.5);
            padding: 14px 18px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.45);
            backdrop-filter: blur(18px);
            z-index: 100;
        }
        @media (min-width: 441px) {
            .form-fixo { left: 50%; transform: translateX(-50%); max-width: 440px; }
        }

        .form-fixo-topo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .form-fixo-titulo {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffeb3b;
            text-align: center;
        }
        .form-fixo-categoria {
            min-width: 88px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.18);
        }
        .form-fixo-categoria.vazia {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.18);
            color: #9fb4d7;
        }
        .form-fixo-categoria.produtos {
            background: rgba(76,175,80,0.18);
            border-color: rgba(76,175,80,0.55);
            color: #bfe5c4;
        }
        .form-fixo-categoria.peca {
            background: rgba(255,152,0,0.18);
            border-color: rgba(255,152,0,0.55);
            color: #ffd79b;
        }
        .form-fixo-categoria.maquina {
            background: rgba(156,39,176,0.2);
            border-color: rgba(156,39,176,0.55);
            color: #dfb1ea;
        }
        .form-fixo-categoria.materiais {
            background: rgba(0,172,193,0.18);
            border-color: rgba(0,172,193,0.55);
            color: #b2ebf2;
        }

        .input-glass {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.09);
            color: white;
            font-size: 17px;
            outline: none;
        }
        .input-glass::placeholder { color: #7a9cc8; }
        .input-glass:focus { border-color: #ffeb3b; background: rgba(255,255,255,0.12); }

        /* Linha única: chips de categoria + botão enviar */
        .linha-enviar {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .linha-enviar .input-glass {
            flex: 1;
            margin: 0;
        }
        .chips-cat {
            display: flex;
            gap: 6px;
        }
        .chip-cat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 4px;
            border-radius: 10px;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.06);
            color: #8aadde;
            transition: 0.15s;
            user-select: none;
        }
        .chip-cat .chip-icon { font-size: 18px; line-height: 1; }
        .chip-cat .chip-label { font-size: 11px; font-weight: bold; color: #ffffff; }
        .chip-cat.selecionado-produtos { border-color: #4caf50; background: rgba(76,175,80,0.2);  color: #a5d6a7; }
        .chip-cat.selecionado-peca     { border-color: #ff9800; background: rgba(255,152,0,0.2);  color: #ffcc80; }
        .chip-cat.selecionado-maquina  { border-color: #9c27b0; background: rgba(156,39,176,0.2); color: #ce93d8; }
        .chip-cat.selecionado-materiais { border-color: #00acc1; background: rgba(0,172,193,0.2); color: #b2ebf2; }
        .chip-cat:active { transform: scale(0.96); }

        #btnCancelar {
            display: none;
            background: rgba(244,67,54,0.2);
            color: #ffcdd2;
            border: 1.5px solid #f44336;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: -4px;
        }

        #btnEnviar {
            background: linear-gradient(135deg, #ffeb3b, #ffc107);
            color: #0f2a66;
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }
        #btnEnviar:active { transform: scale(0.97); }

        /* ── VAZIO ── */
        .estado-vazio {
            text-align: center;
            padding: 50px 20px;
            color: #7a9cc8;
        }
        .estado-vazio .icone-vazio { font-size: 48px; margin-bottom: 12px; }
        .estado-vazio p { font-size: 17px; margin: 0; }

        .barra-topo-filtros {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0 18px;
        }
        .linha-resumo-filtros {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .linha-resumo-filtros .contador-total {
            margin: 0;
            flex-shrink: 0;
        }
        .linha-resumo-filtros .contador-total span {
            min-height: 40px;
            padding: 8px 16px;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            line-height: 1;
        }
        .linha-resumo-filtros .chip-filtro {
            min-height: 40px;
            padding: 8px 16px;
            font-size: 15px;
            white-space: nowrap;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .filtros-secundarios {
            display: flex;
            gap: 6px;
            margin-bottom: 0;
            overflow: visible;
            padding-bottom: 0;
        }
        .filtros-secundarios .chip-filtro {
            flex: 1 1 0;
            min-width: 0;
            padding: 8px 4px;
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
        }

        input[type="hidden"] { display: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo-wrap">
            <div class="titulo">Pedidos</div>
        </div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="barra-topo-filtros">
        <div class="linha-resumo-filtros">
            <div class="contador-total">
                <span id="textoContador">0 pendentes</span>
            </div>

            <div class="chip-filtro ativo" data-filtro="todos" onclick="setFiltro('todos')">Todos</div>
        </div>

        <div class="filtros filtros-secundarios" id="filtros">
        <div class="chip-filtro" data-filtro="produtos" onclick="setFiltro('produtos')">🟢 Produtos</div>
        <div class="chip-filtro" data-filtro="peca" onclick="setFiltro('peca')">🟠 Peças</div>
        <div class="chip-filtro" data-filtro="maquina" onclick="setFiltro('maquina')">🟣 Máquinas</div>
        <div class="chip-filtro" data-filtro="materiais" onclick="setFiltro('materiais')">🔵 Materiais</div>
        </div>

    </div>

    <div id="listaPedidos">
        <div class="estado-vazio">
            <div class="icone-vazio">🛒</div>
            <p>Carregando pedidos...</p>
        </div>
    </div>
</div>

<!-- Formulário Fixo -->
<div class="form-fixo">
    <div class="form-fixo-topo">
        <div class="form-fixo-titulo">Novo Pedido</div>
        <div id="formCategoriaAtual" class="form-fixo-categoria vazia">Selecione</div>
    </div>
    <button id="btnCancelar" onclick="cancelarEdicao()">✕ Cancelar edição</button>
    <input type="hidden" id="idPedido">

    <div class="chips-cat" id="chipsCat">
        <div class="chip-cat selecionado-produtos" data-val="produtos" onclick="selecionarCat('produtos')"><span class="chip-icon">🟢</span><span class="chip-label">Produtos</span></div>
        <div class="chip-cat" data-val="peca" onclick="selecionarCat('peca')"><span class="chip-icon">🟠</span><span class="chip-label">Peças</span></div>
        <div class="chip-cat" data-val="maquina" onclick="selecionarCat('maquina')"><span class="chip-icon">🟣</span><span class="chip-label">Máquinas</span></div>
        <div class="chip-cat" data-val="materiais" onclick="selecionarCat('materiais')"><span class="chip-icon">🔵</span><span class="chip-label">Materiais</span></div>
    </div>

    <div class="linha-enviar">
        <input class="input-glass" type="text" id="descPedido" placeholder="O que precisa comprar?">
        <button id="btnEnviar" onclick="salvarPedido()">ENVIAR</button>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbSalvarPedido, dbEscutarPedidos, dbExcluirPedido } from './database.js';

    const usuarioLogado = localStorage.getItem('usuarioLogado') || "Desconhecido";

    const _cacheColab = localStorage.getItem('cache_colaboradores');
    const _listaColab = _cacheColab ? JSON.parse(_cacheColab) : [];
    const _usuarioObj = _listaColab.find(c => c.nome === usuarioLogado);
    const isGestor = _usuarioObj ? (_usuarioObj.nivel_completo || '').includes('gestao') : false;

    // Categoria selecionada no form
    let catAtual = '';
    function atualizarCategoriaTituloForm() {
        const categoriaEl = document.getElementById('formCategoriaAtual');
        if (!categoriaEl) return;
        const rotulos = {
            produtos: 'Produtos',
            peca: 'Peças',
            maquina: 'Máquinas',
            materiais: 'Materiais'
        };
        categoriaEl.className = `form-fixo-categoria ${catAtual || 'vazia'}`;
        categoriaEl.textContent = rotulos[catAtual] || 'Selecione';
    }
    window.selecionarCat = function(val) {
        catAtual = val;
        document.querySelectorAll('.chip-cat').forEach(c => {
            c.className = 'chip-cat';
            if (c.dataset.val === val) c.classList.add('selecionado-' + val);
        });
        atualizarCategoriaTituloForm();
    };

    function limparSelecaoCategoria() {
        catAtual = '';
        document.querySelectorAll('.chip-cat').forEach(c => {
            c.className = 'chip-cat';
        });
        atualizarCategoriaTituloForm();
    }

    // Filtro ativo
    let filtroAtivo = 'todos';
    window.setFiltro = function(f) {
        filtroAtivo = f;
        document.querySelectorAll('.chip-filtro').forEach(c => {
            c.classList.toggle('ativo', c.dataset.filtro === f);
        });
        aplicarFiltroVisual();
    };

    function ajustarRotulosFiltrosTopo() {
        const rotulos = {
            todos: 'Todos',
            produtos: '🟢 Produtos',
            peca: '🟠 Peças',
            maquina: '🟣 Máquinas',
            materiais: '🔵 Materiais'
        };
        document.querySelectorAll('.chip-filtro').forEach(chip => {
            chip.textContent = rotulos[chip.dataset.filtro] || chip.textContent;
        });
    }

    function aplicarFiltroVisual() {
        document.querySelectorAll('.card-pedido').forEach(card => {
            const cat = card.dataset.cat;
            card.style.display = (filtroAtivo === 'todos' || cat === filtroAtivo) ? '' : 'none';
        });
        atualizarContador();
    }

    function atualizarContador() {
        const visiveis = [...document.querySelectorAll('.card-pedido')].filter(c => c.style.display !== 'none').length;
        const t = document.getElementById('textoContador');
        t.textContent = visiveis === 0 ? 'nenhum pendente' : `${visiveis} pendente${visiveis > 1 ? 's' : ''}`;
    }

    function calcularDias(dataIso) {
        if (!dataIso) return 0;
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const d    = new Date(dataIso); d.setHours(0,0,0,0);
        return Math.max(0, Math.floor((hoje - d) / 86400000));
    }

    function txtDias(dias) {
        return dias === 1 ? '1 dia atrás' : `${dias} dias atrás`;
    }

    function badgeTempo(dias, media) {
        if (dias === 0)          return { cls: 'tempo-hoje',    txt: 'Hoje' };
        if (dias <= media * 0.5) return { cls: 'tempo-fresco',  txt: txtDias(dias) };
        if (dias <= media)       return { cls: 'tempo-alerta',  txt: `${txtDias(dias)} ⚠️` };
        return                          { cls: 'tempo-urgente', txt: `${txtDias(dias)} 🔥` };
    }

    function urgenciaClass(dias, media) {
        if (dias > media)        return 'urgencia-alta';
        if (dias > media * 0.5)  return 'urgencia-media';
        return '';
    }

    function inicialAvatar(nome) {
        return (nome || '?').trim().charAt(0).toUpperCase();
    }

    // 1. CARREGAR PEDIDOS
    dbEscutarPedidos((lista) => {
        const container = document.getElementById('listaPedidos');
        container.innerHTML = '';

        if (lista.length === 0) {
            container.innerHTML = `
                <div class="estado-vazio">
                    <div class="icone-vazio">✅</div>
                    <p>Tudo comprado! Nenhum pedido pendente.</p>
                </div>`;
            document.getElementById('textoContador').textContent = 'nenhum pendente';
            return;
        }

        const todosDias = lista.map(p => calcularDias(p.data));
        const media = todosDias.length ? todosDias.reduce((a, b) => a + b, 0) / todosDias.length : 7;

        lista.slice().reverse().forEach(p => {
            const dias = calcularDias(p.data);
            const tempo = badgeTempo(dias, media);
            const urgencia = urgenciaClass(dias, media);
            const souDono = (p.solicitante === usuarioLogado);

            const catMap = { produtos: 'Produtos', peca: 'Peças', maquina: 'Máquinas', materiais: 'Materiais' };
            const nomeCat = catMap[p.categoria] || p.categoria;

            const classeConfirmar = souDono ? 'ativo-confirmar' : '';
            const textoConfirmar  = souDono ? '✔ Recebido' : 'Aguardando';
            const acaoConfirmar   = souDono ? `confirmarCompra('${p.firebaseUrl}')` : '';
            const classeEditar    = souDono ? 'ativo-editar' : '';
            const acaoEditar      = souDono ? `editarPedido(${JSON.stringify(p).replace(/'/g,"&#39;")})` : '';

            const card = document.createElement('div');
            card.className = `card-pedido ${urgencia}`;
            card.dataset.cat = p.categoria;

            card.innerHTML = `
                <div class="card-accent accent-${p.categoria}"></div>
                <div class="card-corpo">
                    <div class="card-topo">
                        <div class="desc-item">${p.descricao}</div>
                        <div class="badges-col">
                            <span class="badge-cat badge-${p.categoria}">${nomeCat}</span>
                            <span class="badge-tempo ${tempo.cls}">${tempo.txt}</span>
                        </div>
                    </div>
                    <div class="card-rodape">
                        <div class="avatar">${inicialAvatar(p.solicitante)}</div>
                        <span class="nome-sol">${p.solicitante}</span>
                        <button class="btn-acao ${classeEditar}" onclick='${acaoEditar}'>✏️</button>
                        <button class="btn-acao ${classeConfirmar}" onclick="${acaoConfirmar}">${souDono ? '✅' : '⏳'}</button>
                        ${isGestor ? `<button class="btn-excluir" onclick="excluirPedido('${p.firebaseUrl}')">🗑️</button>` : ''}
                    </div>
                </div>`;

            container.appendChild(card);
        });

        aplicarFiltroVisual();
    });

    // 2. SALVAR PEDIDO
    window.salvarPedido = async function() {
        const id   = document.getElementById('idPedido').value;
        const desc = document.getElementById('descPedido').value.trim();
        if (!desc) { await window.playAlert('Digite o que precisa comprar.'); return; }
        if (!catAtual) { await window.playAlert('Selecione a categoria do pedido.'); return; }

        await dbSalvarPedido({
            descricao:   desc,
            categoria:   catAtual,
            solicitante: usuarioLogado,
            data:        new Date().toISOString()
        }, id);
        cancelarEdicao();
    };

    // 3. EDITAR PEDIDO
    window.editarPedido = function(p) {
        document.getElementById('idPedido').value   = p.firebaseUrl;
        document.getElementById('descPedido').value = p.descricao;
        selecionarCat(p.categoria);
        document.getElementById('btnEnviar').innerText      = 'SALVAR';
        document.getElementById('btnCancelar').style.display = 'block';
        document.querySelector('.form-fixo-titulo').textContent = 'Editando Pedido';
        document.getElementById('descPedido').focus();
    };

    // 4. CANCELAR EDIÇÃO
    window.cancelarEdicao = function() {
        document.getElementById('idPedido').value          = '';
        document.getElementById('descPedido').value        = '';
        document.getElementById('btnEnviar').innerText      = 'ENVIAR';
        document.getElementById('btnCancelar').style.display = 'none';
        document.querySelector('.form-fixo-titulo').textContent = 'Novo Pedido';
        limparSelecaoCategoria();
    };

    // 5. CONFIRMAR COMPRA
    window.confirmarCompra = async function(id) {
        if (await window.playConfirm('Confirmar que este item foi comprado e recebido? Ele sairá da lista.')) {
            await dbExcluirPedido(id);
        }
    };

    // 6. EXCLUIR PEDIDO (gestor)
    window.excluirPedido = async function(id) {
        if (await window.playConfirm('Excluir este pedido da lista?')) {
            await dbExcluirPedido(id);
        }
    };

    ajustarRotulosFiltrosTopo();
    limparSelecaoCategoria();

</script>
</body>
</html>
