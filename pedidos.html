<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de Compra</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:420px; box-sizing:border-box; min-height: 100vh; position: relative; padding-bottom: 160px; /* Espaço para o rodapé */ }
        
        .topo { display: flex; align-items: center; justify-content: center; margin-top: 15px; margin-bottom: 20px; position: relative; width: 100%; min-height: 45px; }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; position: absolute; right: 15px; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Galeria */
        .secao-lista { padding: 0 15px; }
        .card-pedido { background: white; color: #333; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); border-left: 5px solid #ccc; position: relative; }
        
        /* Hierarquia 1: Descrição aqui muda o tamanho da fonte */
        .desc-item { font-size:24px; /* <--- TAMANHO DO TEXTO */ font-weight: bold; color: #222; word-break: break-word; line-height: 1.2; flex: 1; padding-right: 10px; }
        /* Hierarquia 2: Categoria */
        .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; white-space: nowrap; height: fit-content; }
        
        .bg-produtos { background: #4caf50; }
        .bg-peca { background: #ff9800; }
        .bg-maquina { background: #9c27b0; }

        /* Botões Discretos */
        .acoes { display: flex; gap: 10px; margin-top: 10px; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-discreto { padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; background: transparent; color: #999; font-size: 11px; font-weight: bold; cursor: not-allowed; transition: 0.2s; }
        
        /* Estados Ativos dos Botões */
        .btn-discreto.ativo-editar { border-color: #2196f3; color: #2196f3; cursor: pointer; }
        .btn-discreto.ativo-editar:hover { background: #e3f2fd; }
        
        .btn-discreto.ativo-confirmar { border-color: #4caf50; color: #4caf50; cursor: pointer; }
        .btn-discreto.ativo-confirmar:hover { background: #e8f5e9; }

        /* Rodapé Fixo (Formulário) */
        .form-fixo { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #0f2a66; border-top: 2px solid #ffeb3b; 
            padding: 15px; box-sizing: border-box; 
            display: flex; flex-direction: column; gap: 10px; 
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }
        
        /* Centralizar o rodapé apenas na largura do app (para desktop não ficar esticado) */
        @media (min-width: 421px) {
            .form-fixo { left: 50%; transform: translateX(-50%); max-width: 420px; }
        }

        input, select { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.3); 
            background: white; color: #333; box-sizing: border-box; font-size: 14px; outline: none; 
        }
        
        .linha-form { display: flex; gap: 8px; }
        
        #btnEnviar { 
            background: #ffeb3b; color: #042d86; font-weight: bold; border: none; 
            padding: 12px; border-radius: 8px; cursor: pointer; width: 100px;
        }
        #btnEnviar:active { transform: scale(0.95); }
        
        /* Botão Cancelar Edição (pequeno) */
        #btnCancelar { display: none; background: #f44336; color: white; font-size: 10px; padding: 5px; border-radius: 4px; border:none; width: 100%; margin-bottom: 5px; cursor: pointer; }

    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Pedidos de Compra</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="secao-lista" id="listaPedidos">
        <p style="text-align:center; opacity:0.5; font-size:12px;">Carregando pedidos...</p>
    </div>
</div>

<!-- Formulário Fixo no Rodapé -->
<div class="form-fixo">
    <button id="btnCancelar" onclick="cancelarEdicao()">Cancelar Edição</button>
    <input type="hidden" id="idPedido">
    <input type="text" id="descPedido" placeholder="Descreva o item (Ex: Garra da grua G)..." required>
    
    <div class="linha-form">
        <select id="catPedido">
            <option value="produtos">Produtos</option>
            <option value="peca">Peças</option>
            <option value="maquina">Máquinas</option>
        </select>
        <button id="btnEnviar" onclick="salvarPedido()">ENVIAR</button>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbSalvarPedido, dbEscutarPedidos, dbExcluirPedido } from './database.js';

    const usuarioLogado = localStorage.getItem('usuarioLogado') || "Desconhecido";

    function calcularTextoDiasPedido(dataIso) {
        if (!dataIso) return 'Pedido feito hoje';

        const agora = new Date();
        const dataPedido = new Date(dataIso);

        const hoje = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
        const pedidoDia = new Date(dataPedido.getFullYear(), dataPedido.getMonth(), dataPedido.getDate());

        const diffTempo = hoje - pedidoDia;
        const diffDias = Math.max(0, Math.floor(diffTempo / (1000 * 60 * 60 * 24)));

        if (diffDias === 0) return 'Pedido feito hoje';
        if (diffDias === 1) return 'Pedido feito há 1 dia';
        return `Pedido feito há ${diffDias} dias`;
    }

    // 1. CARREGAR PEDIDOS
    dbEscutarPedidos((lista) => {
        const container = document.getElementById('listaPedidos');
        container.innerHTML = "";

        if (lista.length === 0) {
            container.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:20px;">Nenhum pedido pendente.</p>';
            return;
        }

        // Ordenar: Mais recentes no final (ou topo, se preferir. Aqui deixo novos no topo para facilidade)
        lista.reverse().forEach(p => {
            const card = document.createElement('div');
            card.className = 'card-pedido';
            
            // Cores das categorias
            let classeCor = "bg-produtos";
            let nomeCat = "Produtos";
            if(p.categoria === 'peca') { classeCor = 'bg-peca'; nomeCat = 'Peças'; }
            if(p.categoria === 'maquina') { classeCor = 'bg-maquina'; nomeCat = 'Máquinas'; }

            // Cor da borda baseada na categoria
            if(p.categoria === 'peca') card.style.borderLeftColor = "#ff9800";
            else if(p.categoria === 'maquina') card.style.borderLeftColor = "#9c27b0";
            else card.style.borderLeftColor = "#4caf50";

            // Verifica se pode confirmar (Usuario logado == Solicitante)
            const souDono = (p.solicitante === usuarioLogado);

            const classeConfirmar = souDono ? 'ativo-confirmar' : '';
            const textoConfirmar = souDono ? 'Confirmar Recebimento' : 'Aguardando Solicitante';
            const acaoConfirmar = souDono ? `confirmarCompra('${p.firebaseUrl}')` : '';
            
            const classeEditar = souDono ? 'ativo-editar' : '';
            const acaoEditar = souDono ? `editarPedido(${JSON.stringify(p)})` : '';
            const textoDias = calcularTextoDiasPedido(p.data);

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="desc-item">${p.descricao}</span>
                    <div style="display:flex; flex-direction:column; align-items:flex-end;">
                        <span class="badge ${classeCor}">${nomeCat}</span>
                        <span style="font-size:11px; color:#999; margin-top:5px; white-space:nowrap;">${textoDias}</span>
                    </div>
                </div>
                
                <div class="acoes">
                    <div style="display:flex; flex-direction:column; align-items:center; margin-right: 10px;">
                        <span style="font-size:20px; line-height: 1;">👤</span>
                        <span style="font-size:10px; color:#555; font-weight:bold; margin-top: 2px;">${p.solicitante}</span>
                    </div>
                    <div style="display:flex; gap:5px; align-items:center;">
                        <button class="btn-discreto ${classeEditar}" onclick='${acaoEditar}'>✏️ Editar</button>
                        <button class="btn-discreto ${classeConfirmar}" onclick="${acaoConfirmar}">✔️ ${textoConfirmar}</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    });

    // 2. SALVAR PEDIDO
    window.salvarPedido = async function() {
        const id = document.getElementById('idPedido').value;
        const desc = document.getElementById('descPedido').value;
        const cat = document.getElementById('catPedido').value;

        if(!desc) return alert("Digite o que precisa comprar.");

        const dados = {
            descricao: desc,
            categoria: cat,
            solicitante: usuarioLogado, // Pega o usuário do Index
            data: new Date().toISOString()
        };

        await dbSalvarPedido(dados, id);
        cancelarEdicao();
    };

    // 3. EDITAR PEDIDO
    window.editarPedido = function(p) { // Recebe o objeto completo
        document.getElementById('idPedido').value = p.firebaseUrl;
        document.getElementById('descPedido').value = p.descricao;
        document.getElementById('catPedido').value = p.categoria;
        document.getElementById('btnEnviar').innerText = "SALVAR";
        document.getElementById('btnCancelar').style.display = "block";
        document.getElementById('descPedido').focus();
    };

    // 4. CANCELAR EDIÇÃO
    window.cancelarEdicao = function() {
        document.getElementById('idPedido').value = "";
        document.getElementById('descPedido').value = "";
        document.getElementById('catPedido').value = "produtos";
        document.getElementById('btnEnviar').innerText = "ENVIAR";
        document.getElementById('btnCancelar').style.display = "none";
    };

    // 5. CONFIRMAR COMPRA (EXCLUIR)
    window.confirmarCompra = async function(id) {
        if(await window.playConfirm("Confirmar que este item foi comprado e recebido? Ele sairá da lista.")) {
            await dbExcluirPedido(id);
        }
    };

</script>
</body>
</html>
