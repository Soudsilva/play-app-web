<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação de Estoque</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:420px; padding:15px; box-sizing:border-box; min-height: 100vh; display:flex; flex-direction:column; }
        
        /* Topo */
        .topo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; width: 100%; min-height: 45px; }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; position: absolute; right: 0; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Botões de Tipo de Movimento (Abas) */
        .tipo-movimento { display: flex; margin-bottom: 20px; background: rgba(0,0,0,0.2); border-radius: 30px; padding: 5px; }
        .btn-mov { flex: 1; padding: 12px; text-align: center; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; opacity: 0.6; font-size: 13px; }
        .btn-mov.ativo { opacity: 1; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .entrada.ativo { background: #4caf50; } /* Verde */
        .saida.ativo { background: #f44336; }   /* Vermelho */

        /* Card de Formulário */
        .card-form { background: rgba(255,255,255,0.07); padding: 20px; border-radius: 18px; border: 2px solid rgba(255,255,255,0.85); }
        .card-form.modo-pix {
            border-color: #c9a7ff;
            background: #4b2f9f;
        }

        /* Grade 2×2 dos campos */
        .card-grid {
            display: grid;
            grid-template-columns: minmax(115px, auto) 1fr;
            gap: 6px 10px;
            margin-bottom: 16px;
        }
        .campo-form { display: flex; flex-direction: column; gap: 5px; }
        .campo-form label {
            font-size: 10px; font-weight: bold; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.45); text-transform: uppercase;
        }

        /* Separador entre as duas linhas */
        .card-separador {
            grid-column: 1 / -1;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 2px 0;
        }

        select, input {
            padding: 11px 8px;
            border-radius: 10px;
            border: 1.5px solid #bbb;
            background: white;
            color: #222;
            font-size: 15px;
            outline: none;
            height: 48px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Quantidade com leve destaque */
        .inp-qtd {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background: #fffde7;
            border-color: #f9a825;
        }
        .inp-qtd::-webkit-outer-spin-button,
        .inp-qtd::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .inp-qtd[type=number] { -moz-appearance: textfield; }

        /* Linha de Saldo Atual */
        .saldo-box {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .saldo-box-titulo {
            font-size: 10px; font-weight: bold; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4); text-transform: uppercase;
            white-space: nowrap;
        }
        .info-atual { font-size: 18px; color: rgba(255,235,59,0.85); font-weight: bold; }
        .destaque-qtd { color: rgba(255,235,59,0.85); font-weight: bold; font-size: 18px; }
        .saldo-total-disc { font-size: 11px; color: rgba(255,255,255,0.35); margin-right: 6px; }
        .saldo-defeito-label { font-size: 13px; color: #ff9800; font-weight: 600; margin-right: 8px; }
        .saldo-defeito-num { font-size: 15px; font-weight: bold; }

        .btn-confirmar {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; color: white; cursor: pointer;
            letter-spacing: 0.5px; transition: 0.2s;
        }
        .btn-confirmar:disabled {
            cursor: wait;
            filter: saturate(0.85);
        }
        .btn-confirmar.salvando {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-spinner {
            width: 18px;
            height: 18px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex: 0 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-excluir-hist.salvando {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: wait;
        }
        .btn-excluir-hist .btn-spinner {
            width: 12px;
            height: 12px;
            border-width: 2px;
        }
        .lista-pendente {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin: 0 0 14px;
        }
        .lista-pendente.visivel { display: flex; }
        .pendente-card {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 8px;
            background: #123f9b;
            border: 1px solid #ffffff;
            border-radius: 10px;
            padding: 9px 10px;
        }
        .pendente-info { min-width: 0; }
        .pendente-nome {
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pendente-meta {
            color: #dfe8ff;
            font-size: 13px;
            font-weight: 400;
            margin-top: 2px;
        }
        .pendente-qtd {
            color: #ffeb3b;
            font-size: 18px;
            font-weight: 700;
            min-width: 42px;
            text-align: center;
        }
        .pendente-remover {
            width: 32px;
            height: 32px;
            border: 1px solid #ffffff;
            border-radius: 50%;
            background: #f44336;
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .label-pequena { font-size: 11px; color: #ccc; margin-bottom: 4px; display: block; margin-top: 10px; }

        /* Input de busca padronizado */
        .input-busca {
            width: 100%;
            margin-bottom: 14px;
            text-align: center;
            background: rgba(255,255,255,0.18) !important;
            color: white !important;
            border: 1.5px solid rgba(255,255,255,0.55) !important;
            box-sizing: border-box;
        }
        .input-busca::placeholder { color: rgba(255,255,255,0.65); }

        /* Seções */
        .secao-historico { margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; border-radius: 16px; transition: border 0.3s, padding 0.3s; }
        .secao-historico:has(.titulo-hist.aberto) { border: 3px solid rgba(76,175,80,0.75); padding: 15px; }
        .historico-sticky {
            z-index: 40;
        }
        .secao-historico:has(.titulo-hist.aberto) .historico-sticky {
            position: sticky;
            top: 0;
            background: #042d86;
            padding-top: 6px;
            padding-bottom: 8px;
        }
        .historico-filtros {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 8px;
            align-items: stretch;
        }
        .historico-filtros .input-busca {
            margin-bottom: 0;
        }
        .historico-mes-select {
            height: 48px;
            margin-bottom: 0;
            border-radius: 10px;
            border: 1.5px solid #7fa6ff;
            background: #244d9b;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .historico-mes-nav {
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr) 44px;
            align-items: center;
            gap: 6px;
        }
        .historico-mes-btn,
        .historico-mes-centro {
            height: 42px;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1.5px solid #7fa6ff;
            background: #244d9b;
            color: #ffffff;
            font-weight: 700;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .historico-mes-centro {
            font-size: 15px;
            padding: 0 8px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .historico-mes-btn {
            font-size: 24px;
            cursor: pointer;
            padding: 0;
        }
        .historico-mes-btn:active { background: #1b3f85; }
        .historico-mes-btn:disabled {
            color: #7fa6ff;
            border-color: #3d63b8;
            cursor: default;
        }
        .historico-responsavel-chip {
            display: none;
            margin-top: 8px;
            border: 2px solid #ffeb3b;
            border-radius: 12px;
            background: #0b7a34;
            color: #ffffff;
            padding: 9px 12px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
            box-shadow: 0 4px 12px #001b4f;
            user-select: none;
            -webkit-user-select: none;
        }
        .historico-responsavel-chip.visivel {
            display: block;
        }
        .historico-responsavel-chip.todos {
            border-color: #ffffff;
            background: #243f78;
        }
        .historico-responsavel-label {
            display: block;
            color: #ffeb3b;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 3px;
        }
        .historico-responsavel-nome {
            display: block;
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
        }

        .secao-itens:has(.titulo-hist.aberto) { border: 3px solid rgba(33,150,243,0.75); border-radius: 16px; padding: 15px; }
        .secao-itens.oculta-por-posse { display: none; }
        .itens-sticky {
            z-index: 40;
        }
        .secao-itens:has(.titulo-hist.aberto) .itens-sticky {
            position: sticky;
            top: 0;
            background: #042d86;
            padding-top: 6px;
            padding-bottom: 8px;
        }
        .itens-controles {
            display: none;
        }
        .secao-itens:has(.titulo-hist.aberto) .itens-controles {
            display: block;
        }

        .secao-posse-usuario {
            display: none;
            margin-top: 20px;
            border: 3px solid #ffeb3b;
            border-radius: 16px;
            padding: 12px;
        }
        .secao-posse-usuario.visivel {
            display: block;
        }
        .posse-header {
            margin-bottom: 0;
            border-radius: 10px;
            border: 1.5px solid #ffeb3b;
            background: #0f3d93;
            padding: 10px 42px;
            text-align: center;
            cursor: pointer;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }
        .posse-header:active {
            transform: scale(0.985);
        }
        .posse-header.aberto {
            margin-bottom: 10px;
        }
        .posse-header-centro {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .posse-header-label {
            color: #ffeb3b;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .posse-header-nome {
            margin-top: 3px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
        }
        .posse-header-seta {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffeb3b;
            font-size: 14px;
            font-weight: 700;
        }
        .posse-header.aberto .posse-header-seta {
            transform: translateY(-50%) rotate(180deg);
        }
        .posse-secao {
            margin-top: 12px;
        }
        .posse-secao:first-child {
            margin-top: 0;
        }
        .posse-secao-titulo {
            color: #ffeb3b;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 8px;
            user-select: none;
            -webkit-user-select: none;
        }
        .posse-lista-card {
            display: block;
            width: 100%;
            border-top: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background: transparent;
        }
        .posse-lista-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 72px;
            align-items: stretch;
            min-height: 26px;
            border-bottom: 1px solid #9bb8ff;
        }
        .posse-lista-item:last-child {
            border-bottom: none;
        }
        .posse-item-nome {
            min-width: 0;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
            overflow-wrap: anywhere;
            padding: 5px 8px;
            display: flex;
            align-items: center;
        }
        .posse-item-barra-wrap {
            display: none;
        }
        .posse-item-badge {
            color: #ffffff;
            padding: 5px 8px;
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
            white-space: nowrap;
            border-left: 1px solid #9bb8ff;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .posse-item-badge.negativo,
        .posse-item-barra.negativo {
            color: #ffb3b3;
        }
        .posse-pix-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: #12367f;
            border: 1px solid #7fa6ff;
            border-left: 3px solid #00c8ff;
            border-radius: 14px;
            padding: 12px;
        }
        .posse-pix-label {
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            user-select: none;
            -webkit-user-select: none;
        }
        .posse-pix-numeros {
            color: #ffeb3b;
            font-size: 16px;
            font-weight: 700;
            text-align: right;
            overflow-wrap: anywhere;
        }
        .posse-vazio {
            color: #ffffff;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
            padding: 18px 8px;
        }

        @keyframes shimmer-btn {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 18px rgba(0,0,0,0.2), 0 0 0 0 rgba(255,235,59,0.0); }
            50%       { box-shadow: 0 4px 18px rgba(0,0,0,0.2), 0 0 0 6px rgba(255,235,59,0.18); }
        }
        @keyframes blink-eye {
            0%, 90%, 100% { transform: scaleY(1); }
            95%            { transform: scaleY(0.1); }
        }

        .titulo-hist {
            width: 100%;
            margin-bottom: 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,235,59,0.35);
            border-left: 4px solid #ffeb3b;
            border-radius: 14px;
            padding: 13px 15px 13px 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            animation: pulse-glow 2.8s ease-in-out infinite;
        }
        .titulo-hist::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(100deg, transparent 20%, rgba(255,235,59,0.09) 50%, transparent 80%);
            background-size: 200% 100%;
            animation: shimmer-btn 2.4s linear infinite;
            pointer-events: none;
        }
        .titulo-hist:hover {
            background: rgba(255,235,59,0.07);
            border-color: rgba(255,235,59,0.7);
            box-shadow: 0 6px 22px rgba(0,0,0,0.28);
        }
        .titulo-hist:active { transform: scale(0.985); }
        .titulo-hist:focus-visible {
            outline: 2px solid #ffeb3b;
            outline-offset: 3px;
        }
        /* Movimentações aberto — verde */
        .secao-historico .titulo-hist.aberto {
            background: rgba(76,175,80,0.07);
            border-color: rgba(76,175,80,0.55);
            border-left-color: #4caf50;
            animation: none;
        }
        .secao-historico .titulo-hist.aberto::before { display: none; }
        .secao-historico .titulo-hist.aberto .titulo-hist-olho {
            background: rgba(76,175,80,0.2);
            border-color: rgba(76,175,80,0.55);
        }
        .secao-historico .titulo-hist.aberto .titulo-hist-label { color: #81c784; }
        .secao-historico .titulo-hist.aberto .titulo-hist-seta { transform: rotate(180deg); }
        .secao-historico .titulo-hist.aberto .titulo-hist-seta svg { stroke: #81c784; }

        /* Itens aberto — azul */
        .secao-itens .titulo-hist.aberto {
            background: rgba(33,150,243,0.07);
            border-color: rgba(33,150,243,0.55);
            border-left-color: #2196f3;
            animation: none;
        }
        .secao-itens .titulo-hist.aberto::before { display: none; }
        .secao-itens .titulo-hist.aberto .titulo-hist-olho {
            background: rgba(33,150,243,0.2);
            border-color: rgba(33,150,243,0.55);
        }
        .secao-itens .titulo-hist.aberto .titulo-hist-label { color: #64b5f6; }
        .secao-itens .titulo-hist.aberto .titulo-hist-seta { transform: rotate(180deg); }
        .secao-itens .titulo-hist.aberto .titulo-hist-seta svg { stroke: #64b5f6; }

        /* Ícone olho */
        .titulo-hist-olho {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,235,59,0.15);
            border: 1.5px solid rgba(255,235,59,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            line-height: 1;
            transition: background 0.3s, border-color 0.3s;
        }
        .titulo-hist.aberto .titulo-hist-olho {
            background: rgba(76,175,80,0.2);
            border-color: rgba(76,175,80,0.55);
        }

        .titulo-hist-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
        .titulo-hist-label {
            font-size: 13px;
            font-weight: 800;
            color: #ffeb3b;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .titulo-hist-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ffeb3b;
            color: #1a1a2e;
            font-size: 10px;
            font-weight: 900;
            min-width: 20px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            letter-spacing: 0;
            text-transform: none;
        }
        .secao-historico .titulo-hist.aberto .titulo-hist-badge { background: #4caf50; color: #fff; }
        .secao-itens .titulo-hist.aberto .titulo-hist-badge { background: #2196f3; color: #fff; }
        .titulo-hist-subtexto {
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .titulo-hist.aberto .titulo-hist-subtexto { color: rgba(255,255,255,0.65); }

        /* Seta */
        .titulo-hist-seta {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.35s cubic-bezier(.4,0,.2,1), background 0.3s;
        }
        .titulo-hist-seta svg {
            width: 16px; height: 16px;
            stroke: rgba(255,235,59,0.9);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s;
        }
        .secao-historico .titulo-hist.aberto .titulo-hist-seta { background: rgba(76,175,80,0.15); }
        .secao-itens .titulo-hist.aberto .titulo-hist-seta { background: rgba(33,150,243,0.15); }
        .oculto { display: none; }
        .item-hist { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid; }
        .hist-esq { display: flex; flex-direction: column; gap: 2px; }
        .hist-dir { text-align: right; font-weight: bold; }
        
        .tag-entrada { color: #4caf50; font-weight: bold; }
        .tag-saida { color: #f44336; font-weight: bold; }
        
        /* [NOVO] Classes para controlar o tamanho da fonte da lista aqui */
        .hist-tipo-label { font-size: 20px; font-weight: bold; }
        .hist-nome-item { font-size: 18px; color: white; font-weight: bold; } /* <--- TAMANHO DO NOME DO PRODUTO */
        .hist-resp-label { font-size: 18px; }
        .hist-data { font-size: 15px; color: #999; } /* <--- TAMANHO DA DATA E HORA */
        .hist-obs-label { font-size: 18px; font-style: italic; color: #aaa; }
        .hist-mov-topo,
        .hist-mov-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #3d63b8;
            min-height: 32px;

<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Movimentação</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="tipo-movimento">
        <div id="tabSaida" class="btn-mov saida ativo" onclick="mudarModo('saida')">SAÍDA (-)</div>
        <div id="tabEntrada" class="btn-mov entrada" onclick="mudarModo('entrada')">ENTRADA (+)</div>
    </div>

    <div class="card-form" id="cardMovimentacao">
        <div class="card-grid">
            <div class="campo-form">
                <label>Tipo</label>
                <select id="filtroCategoria" onchange="filtrarItens()">
                    <option value="">Tipo</option>
                    <option value="maquina">Máquina</option>
                    <option value="peca">Peças / Outros</option>
                    <option value="produtos">Produtos</option>
                    <option value="pix">PIX</option>
                </select>
            </div>
            <div class="campo-form campo-oculto">
                <label>Item</label>
                <select id="selectItem" onchange="mostrarSaldoAtual()">
                    <option value="">Item</option>
                </select>
            </div>

            <div class="card-separador"></div>

            <div class="campo-form campo-oculto">
                <label>Quantidade</label>
                <input type="text" id="qtdInput" class="inp-qtd" placeholder="0" inputmode="numeric">
            </div>
            <div class="campo-form campo-responsavel">
                <label id="labelResponsavelPrincipal">Responsável</label>
                <select id="responsavel">
                    <option value="">Selecione...</option>
                </select>
            </div>
            <div class="campo-form pix-card-campo" id="campoPixPrincipal">
                <label for="pixPrincipalNumero">Num. Pix</label>
                <input type="text" id="pixPrincipalNumero" inputmode="numeric" placeholder="Nº" autocomplete="off" oninput="this.value = this.value.replace(/[^0-9]/g, '')" onblur="validarPixPrincipal()">
            </div>
            <div class="linhas-movimentacao" id="containerMovimentacaoItens"></div>
        </div>

        <div class="saldo-box" id="saldoBox" style="display:none;">
            <div class="saldo-box-titulo">Saldo Atual</div>
            <div class="info-atual" id="textoSaldo">—</div>
        </div>

        <button class="btn-confirmar" id="btnAcao" style="background:#f44336;" onclick="salvarAcaoMovimentacao()">CONFIRMAR SAÍDA</button>
    </div>

    <div class="secao-historico">
        <div class="historico-sticky">
            <div class="titulo-hist">Últimas Movimentações</div>
            <div class="historico-filtros">
                <div id="mesHistorico" class="historico-mes-nav"></div>
                <input type="text" id="filtroHistorico" class="input-busca" placeholder="Pesquisar no histórico..." oninput="filtrarHistorico()">
            </div>
            <div id="historicoResponsavelAtual" class="historico-responsavel-chip"></div>
        </div>
        <div id="listaHistorico">
            <p style="text-align:center; font-size:11px; opacity:0.5;">Carregando...</p>
        </div>
    </div>

    <div class="secao-itens">
        <div class="itens-sticky">
            <div class="titulo-hist" id="btnToggleItens" role="button" tabindex="0" aria-expanded="false"
                 onclick="toggleItens()"
                 onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleItens();}">
            </div>
            <div class="itens-controles">
                <input type="text" id="filtroItens" class="input-busca" placeholder="Buscar item no estoque..." oninput="filtrarItensLista()">
            </div>
        </div>
        <div id="conteudoItens" class="oculto">
            <div id="listaItens"></div>
        </div>
    </div>

    <div class="secao-posse-usuario" id="secaoPosseUsuario">
        <div class="posse-header" id="btnTogglePosseUsuario" role="button" tabindex="0" aria-expanded="false"
             onclick="togglePosseUsuario()"
             onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();togglePosseUsuario();}">
            <div class="posse-header-centro">
                <div class="posse-header-label">Itens em posse</div>
                <div class="posse-header-nome" id="posseUsuarioNome">Responsável</div>
            </div>
            <div class="posse-header-seta">▼</div>
        </div>
        <div id="conteudoPosseUsuario" class="oculto">
            <div class="posse-vazio">Selecione um responsável.</div>
        </div>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbEscutarEstoque, dbSalvarItemEstoque, dbEscutarColaboradores, dbAdicionarPixEmPosse, dbRemoverPixEmPosse, dbLerPixEmPosse, dbSalvarHistoricoBalanco, dbEscutarHistoricoBalancoDoUsuario, dbEscutarPosseItensUsuario, dbEscutarPixEmPosse, dbExcluirHistoricoBalanco, dbRecalcularRemuneracoes, dbEscutarClientes, dbEscutarTodosPixEmPosse } from './database.js';

    let listaGlobal = [];
    let historicoGlobal = [];
    let colabsGlobal = [];
    let clientesGlobal = [];
    let pixEmPosseGlobal = new Set();
    let pixEmPossePorNumero = new Map();
    let posseUsuarioAtual = [];
    let pixUsuarioAtual = [];
    let itensPendentes = [];
    let timerAdicionarPendente = null;
    let salvandoMovimentacao = false;
    let modoAtual = 'saida';
    let historicoVisivel = false;
    let itensVisivelEstoque = false;
    let posseUsuarioVisivel = false;
    let mesHistoricoSelecionado = '';
    let mesHistoricoSelecionadoManual = false;
    let responsavelHistoricoAtual = '';
    let unsubscribeHistoricoResponsavel = null;
    let unsubscribePosseUsuario = null;
    let unsubscribePixUsuario = null;
    const RESPONSAVEL_PIX_ESTOQUE = 'Fornecedor';
    const ROTULO_PIX_ESTOQUE = 'Estoque';

    const tituloHistorico = document.querySelector('.titulo-hist');
    const filtroHistoricoEl = document.getElementById('filtroHistorico');
    const listaHistoricoEl = document.getElementById('listaHistorico');
    const mesHistoricoEl = document.getElementById('mesHistorico');
    const historicoResponsavelAtualEl = document.getElementById('historicoResponsavelAtual');
    const historicoFiltrosEl = document.querySelector('.historico-filtros');
    const secaoItensEl = document.querySelector('.secao-itens');
    const secaoPosseUsuarioEl = document.getElementById('secaoPosseUsuario');
    const conteudoPosseUsuarioEl = document.getElementById('conteudoPosseUsuario');
    const posseUsuarioNomeEl = document.getElementById('posseUsuarioNome');
    const btnTogglePosseUsuarioEl = document.getElementById('btnTogglePosseUsuario');

    function escaparHtml(valor) {
        return String(valor || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function normalizarBusca(valor) {
        return String(valor || '').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function formatarResponsavelInterface(valor) {
        const texto = String(valor || '').trim();
        return texto === RESPONSAVEL_PIX_ESTOQUE ? ROTULO_PIX_ESTOQUE : texto;
    }

    function obterDataMovimentacao(mov) {
        const data = new Date(mov?.timestamp || mov?.data || '');
        return Number.isFinite(data.getTime()) ? data : null;
    }

    function obterAnoMesMovimentacao(mov) {
        const data = obterDataMovimentacao(mov);
        if (!data) return '';
        return `${data.getFullYear()}-${String(data.getMonth() + 1).padStart(2, '0')}`;
    }

    function rotuloAnoMes(anoMes) {
        const [ano, mes] = String(anoMes || '').split('-').map(Number);
        if (!ano || !mes) return 'Mês';
        const data = new Date(ano, mes - 1, 1);
        const texto = data.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
        return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    function obterMesAtual() {
        const partes = new Intl.DateTimeFormat('pt-BR', {
            timeZone: 'America/Sao_Paulo',
            year: 'numeric',
            month: '2-digit'
        }).formatToParts(new Date());
        const ano = partes.find(parte => parte.type === 'year')?.value;
        const mes = partes.find(parte => parte.type === 'month')?.value;
        return ano && mes ? `${ano}-${mes}` : '';
    }

    function obterMesesHistorico() {
        const meses = new Set(historicoGlobal.map(obterAnoMesMovimentacao).filter(Boolean));
        const mesAtual = obterMesAtual();
        if (mesAtual) meses.add(mesAtual);
        return [...meses].sort((a, b) => b.localeCompare(a));
    }

    function atualizarResponsavelHistoricoChip() {
        if (!historicoResponsavelAtualEl) return;
        historicoResponsavelAtualEl.innerHTML = responsavelHistoricoAtual
            ? `<span class="historico-responsavel-label">Responsável selecionado</span><span class="historico-responsavel-nome">${escaparHtml(formatarResponsavelInterface(responsavelHistoricoAtual))}</span>`
            : `<span class="historico-responsavel-label">Aguardando responsável</span><span class="historico-responsavel-nome">Selecione um responsável</span>`;
        historicoResponsavelAtualEl.classList.toggle('visivel', historicoVisivel);
        historicoResponsavelAtualEl.classList.toggle('todos', !responsavelHistoricoAtual);
    }

    function atualizarMesesHistorico() {
        if (!mesHistoricoEl) return;
        const meses = obterMesesHistorico();
        const mesAtual = obterMesAtual();
        if (!mesHistoricoSelecionadoManual) {
            mesHistoricoSelecionado = mesAtual;
        } else if (!mesHistoricoSelecionado || !meses.includes(mesHistoricoSelecionado)) {
            mesHistoricoSelecionado = mesAtual;
            mesHistoricoSelecionadoManual = false;
        }
        const indice = meses.indexOf(mesHistoricoSelecionado);
        const temAnterior = indice >= 0 && indice < meses.length - 1;
        const temProximo = indice > 0;
        mesHistoricoEl.innerHTML = `
            <button class="historico-mes-btn" type="button" ${temAnterior ? '' : 'disabled'} onclick="event.stopPropagation(); window.navegarMesHistorico(1)">&#8249;</button>
            <div class="historico-mes-centro">${escaparHtml(rotuloAnoMes(mesHistoricoSelecionado))}</div>
            <button class="historico-mes-btn" type="button" ${temProximo ? '' : 'disabled'} onclick="event.stopPropagation(); window.navegarMesHistorico(-1)">&#8250;</button>
        `;
    }

    function aplicarHistoricoRecebido(lista) {
        historicoGlobal = (Array.isArray(lista) ? lista : []).filter(ehMovimentoEstoqueHistorico);
        atualizarMesesHistorico();
        atualizarBotaoHistorico();
        atualizarResponsavelHistoricoChip();
        filtrarHistorico();
    }

    function atualizarHistoricoPorResponsavelSelecionado() {
        const responsavel = String(document.getElementById('responsavel')?.value || '').trim();
        if (responsavel === responsavelHistoricoAtual) {
            atualizarResponsavelHistoricoChip();
            atualizarSecaoPosseUsuario();
            filtrarHistorico();
            return;
        }

        responsavelHistoricoAtual = responsavel;
        atualizarLeiturasPosseUsuario();
        if (unsubscribeHistoricoResponsavel) {
            unsubscribeHistoricoResponsavel();
            unsubscribeHistoricoResponsavel = null;
        }

        if (responsavelHistoricoAtual) {
            unsubscribeHistoricoResponsavel = dbEscutarHistoricoBalancoDoUsuario(responsavelHistoricoAtual, aplicarHistoricoRecebido);
            return;
        }

        aplicarHistoricoRecebido([]);
    }

    function ordenarItensPosse(lista) {
        return [...(Array.isArray(lista) ? lista : [])]
            .filter(item => item.itemNome && Number(item.quantidade || 0) !== 0)
            .sort((a, b) => Math.abs(Number(b.quantidade || 0)) - Math.abs(Number(a.quantidade || 0))
                || String(a.itemNome || '').localeCompare(String(b.itemNome || ''), 'pt-BR'));
    }

    function ordenarPixUsuario(lista) {
        return [...(Array.isArray(lista) ? lista : [])].sort((a, b) => {
            const pa = String(a?.numero_pix || '').trim();
            const pb = String(b?.numero_pix || '').trim();
            const na = /^\d+$/.test(pa) ? Number(pa) : Number.MAX_SAFE_INTEGER;
            const nb = /^\d+$/.test(pb) ? Number(pb) : Number.MAX_SAFE_INTEGER;
            if (na !== nb) return na - nb;
            return pa.localeCompare(pb, 'pt-BR');
        });
    }

    function formatarPixUsuario(lista) {
        return ordenarPixUsuario(lista)
            .map(item => escaparHtml(String(item?.numero_pix || '').trim()))
            .filter(Boolean)
            .join(', ');
    }

    function renderizarListaPosse(titulo, itens, tipo = 'produto') {
        if (!itens.length) return '';
        const max = Math.max(1, ...itens.map(item => Math.abs(Number(item.quantidade || 0))));
        const icone = tipo === 'maquina' ? '&#127920;' : '&#129371;';
        const tituloTexto = tipo === 'maquina' ? 'Máquinas em Posse' : titulo;
        return `
            <div class="posse-secao">
                <div class="posse-secao-titulo">${icone} ${tituloTexto}</div>
                <div class="posse-lista-card">
                    ${itens.map(item => {
                        const qtd = Number(item.quantidade || 0);
                        const largura = Math.max(8, Math.round((Math.abs(qtd) / max) * 100));
                        return `
                            <div class="posse-lista-item">
                                <div class="posse-item-nome">${escaparHtml(item.itemNome)}</div>
                                <div class="posse-item-barra-wrap">
                                    <div class="posse-item-barra-bg">
                                        <div class="posse-item-barra${qtd < 0 ? ' negativo' : ''}" style="width:${largura}%"></div>
                                    </div>
                                </div>
                                <div class="posse-item-badge${qtd < 0 ? ' negativo' : ''}">${qtd}</div>
                            </div>`;
                    }).join('')}
                </div>
            </div>`;
    }

    function renderizarPosseUsuario() {
        if (!conteudoPosseUsuarioEl) return;
        const responsavel = responsavelHistoricoAtual;
        if (posseUsuarioNomeEl) posseUsuarioNomeEl.textContent = formatarResponsavelInterface(responsavel) || 'Responsável';

        if (!responsavel) {
            conteudoPosseUsuarioEl.innerHTML = '<div class="posse-vazio">Selecione um responsável.</div>';
            return;
        }

        const produtos = ordenarItensPosse(posseUsuarioAtual)
            .filter(item => String(item.categoria || '').trim() !== 'maquina');
        const maquinas = ordenarItensPosse(posseUsuarioAtual)
            .filter(item => String(item.categoria || '').trim() === 'maquina');
        const pixTexto = formatarPixUsuario(pixUsuarioAtual);
        const pixHtml = pixTexto
            ? `<div class="posse-secao">
                <div class="posse-secao-titulo">PIX em Posse</div>
                <div class="posse-pix-card">
                    <div class="posse-pix-label">Números Pix</div>
                    <div class="posse-pix-numeros">${pixTexto}</div>
                </div>
               </div>`
            : '';
        const html = [
            renderizarListaPosse('Produtos em Posse', produtos, 'produto'),
            renderizarListaPosse('Máquinas em Posse', maquinas, 'maquina'),
            pixHtml
        ].filter(Boolean).join('');

        conteudoPosseUsuarioEl.innerHTML = html || '<div class="posse-vazio">Nenhum item em posse desse responsável.</div>';
    }

    function atualizarBotaoPosseUsuario() {
        if (!btnTogglePosseUsuarioEl) return;
        btnTogglePosseUsuarioEl.classList.toggle('aberto', posseUsuarioVisivel);
        btnTogglePosseUsuarioEl.setAttribute('aria-expanded', posseUsuarioVisivel ? 'true' : 'false');
        conteudoPosseUsuarioEl?.classList.toggle('oculto', !posseUsuarioVisivel);
    }

    function atualizarSecaoPosseUsuario() {
        const temResponsavel = !!responsavelHistoricoAtual;
        const responsavelFornecedor = responsavelHistoricoAtual === RESPONSAVEL_PIX_ESTOQUE;
        const responsavelMaquina = responsavelHistoricoAtual === 'Máquina';
        const mostrarPosse = temResponsavel && !responsavelFornecedor && !responsavelMaquina;
        secaoItensEl?.classList.remove('oculta-por-posse');
        secaoPosseUsuarioEl?.classList.toggle('visivel', mostrarPosse);
        if (!mostrarPosse) {
            posseUsuarioVisivel = false;
        }

        const prox = Math.max(0, Math.min(meses.length - 1, idx + Number(delta || 0)));

    function formatarDescricaoMovimentacao(descricao) {
        const texto = String(descricao || '').trim();
        const chave = texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const mapa = {
            'retirada de estoque': 'Retirada de estoque',
            'devolucao ao estoque': 'Devolução ao estoque',
            'reposicao': 'Reposição',
            'reposicao de estoque': 'Reposição de estoque',
            'saida de estoque': 'Saída de estoque',
            'entrada de estoque': 'Entrada de estoque'
        };
        return mapa[chave] || texto;
    }

    function renderizarHistorico(lista) {
        const container = document.getElementById('listaHistorico');
        container.innerHTML = "";

        if (!responsavelHistoricoAtual) {
            container.innerHTML = '<p style="text-align:center; font-size:15px; color:#ffffff; padding:16px 8px;">Selecione um responsável para ver as movimentações.</p>';

        if(lista.length === 0) {

        lista.forEach((mov, index) => {

            const textoTipo = metaTipo.texto;
            const movimentacao = Number(mov.movimento ?? 0);
            const quantidade = Math.abs(movimentacao);
            
            const dataObj = new Date(mov.timestamp || mov.data || '');
            const dataFormatada = dataObj.toLocaleString('pt-BR');
            const responsavelRotulo = formatarResponsavelInterface(mov.responsavel) || '-';
            const registradoPorRotulo = formatarResponsavelInterface(mov.registradoPor);
            const textoRegistradoPor = mov.registradoPor && mov.registradoPor !== mov.responsavel
                ? `Registrado por: ${registradoPorRotulo}`
                : '';
            
            const div = document.createElement('div');
            div.className = 'item-hist';
            div.style.flexDirection = 'column';
            div.style.alignItems = 'stretch';
            div.style.borderColor = metaTipo.ehEntrada
                ? 'rgba(76,175,80,0.6)'
                : (metaTipo.ehSaida ? 'rgba(244,67,54,0.6)' : 'rgba(255,235,59,0.6)');

            div.innerHTML = `
                <div class="hist-mov-topo">
                    <span class="hist-tipo-label" style="color:${metaTipo.cor}">${textoTipo}</span>
                    <span class="hist-resp-label" style="color:white;font-weight:bold;">${escaparHtml(responsavelRotulo)}</span>
                </div>
                <div class="hist-mov-linha">
                    <span class="hist-nome-item">${mov.itemNome}</span>

            const usuarioAtual = String(localStorage.getItem('usuarioLogado') || '').trim();
            const foiRegistradoPorMim = mov.registradoPor
                ? mov.registradoPor === usuarioAtual
                : false;
            const dentroDe3h = (Date.now() - new Date(mov.timestamp || mov.data || '').getTime()) < 3 * 60 * 60 * 1000;

            const podeExcluirPelaTela = !metaTipo.ehCancelamento
                && mov.tipo !== 'atendimento'
                && String(mov?.origemRegistro || '').trim() !== 'atendimento';

            if (podeExcluirPelaTela && foiRegistradoPorMim && dentroDe3h) {

    function obterEquipamentosDetalhadosClientePix(cliente) {
        if (Array.isArray(cliente?.equipDetalhes) && cliente.equipDetalhes.length > 0) {
            return cliente.equipDetalhes.map((item, index) => ({
                rowId: String(item?.rowId || `eq_${index + 1}`),
                nome: String(item?.nome || '').trim(),
                pix: String(item?.pix || '').trim(),
                manutencaoPendente: String(item?.manutencaoPendente || '').trim(),
                aguardandoConfirmacao: item?.aguardandoConfirmacao === true
            }));
        }

        const texto = String(cliente?.equip || '').trim();
        if (!texto) return [];
        const partes = texto.includes('|')
            ? texto.split(/\s*\|\s*/)
            : texto.split(/\s*,\s*/);

        return partes.map((parte, index) => {
            let trecho = String(parte || '').trim();
            if (!trecho) return null;

            let pix = '';
            const matchPixLegado = trecho.match(/\s*\[Pix:\s*([^\]]+)\]\s*$/i);
            if (matchPixLegado) {
                pix = String(matchPixLegado[1] || '').trim();
                trecho = trecho.replace(/\s*\[Pix:\s*([^\]]+)\]\s*$/i, '').trim();
            } else {
                const matchPixTexto = trecho.match(/\s+Pix\s+([0-9]+)\s*$/i);
                if (matchPixTexto) {
                    pix = String(matchPixTexto[1] || '').trim();
                    trecho = trecho.replace(/\s+Pix\s+[0-9]+\s*$/i, '').trim();
                }
            }

            return {
                rowId: `legacy_${index + 1}`,
                nome: trecho.replace(/\s*\(([^)]+)\)\s*$/, '').trim(),
                pix,
                manutencaoPendente: '',
                aguardandoConfirmacao: false
            };
        }).filter(item => item && item.nome);
    }

    function obterPixParaValidacaoMovimentacao() {
        const lista = [];
        clientesGlobal.forEach(cliente => {
            obterEquipamentosDetalhadosClientePix(cliente).forEach(equip => {
                const pixAtual = String(equip?.pix || '').trim();
                if (!pixAtual) return;

                let situacao = 'instalado';
                let pendenciaTipo = '';
                if (equip.aguardandoConfirmacao && equip.manutencaoPendente === 'adicao') {
                    situacao = 'em_analise';
                    pendenciaTipo = 'adicao';
                }

                lista.push({
                    numero_pix: pixAtual,
                    situacao,
                    pendenciaTipo
                });
            });
        });
        return lista;
    }

    function pixEmUsoSet() {
        const emUso = new Set();
        obterPixParaValidacaoMovimentacao().forEach(item => {
            const situacao = String(item?.situacao || '').trim().toLowerCase();
            const pendenciaTipo = String(item?.pendenciaTipo || '').trim().toLowerCase();
            if (situacao === 'instalado' || (situacao === 'em_analise' && pendenciaTipo === 'adicao')) {
                const pix = String(item?.numero_pix || '').trim();
                if (pix) emUso.add(pix);
            }
        });
        return emUso;
    }

    function obterResponsavelPixEmPosse(numeroPix) {
        return pixEmPossePorNumero.get(String(numeroPix || '').trim()) || '';
    }

    function pixJaEstaEmPosse(numeroPix) {
        const pix = String(numeroPix || '').trim();
        return !!pix && pixEmPosseGlobal.has(pix);
    }

    function registrarPixEmPosseLocal(numeroPix, responsavel) {
        const pix = String(numeroPix || '').trim();
        if (!pix) return;
        pixEmPosseGlobal.add(pix);
        pixEmPossePorNumero.set(pix, String(responsavel || '').trim());
    }

    function removerPixEmPosseLocal(numeroPix) {
        const pix = String(numeroPix || '').trim();
        if (!pix) return;
        pixEmPosseGlobal.delete(pix);
        pixEmPossePorNumero.delete(pix);
    }

    window.validarPixPrincipal = async function() {
        const input = document.getElementById('pixPrincipalNumero');
        const responsavel = String(document.getElementById('responsavel')?.value || '').trim();
        const valor = String(input?.value || '').trim();
        if (!valor) return;
        if (pixEmUsoSet().has(valor)) {
            await window.playAlert(`Pix ${valor} já está instalado em outro equipamento.`);
            input.value = '';
            input.focus();
            return;
        }
        if (modoAtual === 'entrada' && responsavel === RESPONSAVEL_PIX_ESTOQUE && pixJaEstaEmPosse(valor)) {
            const responsavelAtual = obterResponsavelPixEmPosse(valor);
            const responsavelAtualRotulo = formatarResponsavelInterface(responsavelAtual);
            await window.playAlert(responsavelAtual
                ? `Pix ${valor} j\u00e1 est\u00e1 em posse de ${responsavelAtualRotulo}.`
                : `Pix ${valor} j\u00e1 est\u00e1 registrado no estoque.`);
            input.value = '';
            input.focus();
            return;
        }
        if (modoAtual === 'saida' && pixJaEstaEmPosse(valor)) {
            const responsavelAtual = obterResponsavelPixEmPosse(valor);
            if (responsavelAtual === RESPONSAVEL_PIX_ESTOQUE) return;
            const responsavelAtualRotulo = formatarResponsavelInterface(responsavelAtual);
            await window.playAlert(responsavelAtual
                ? `Pix ${valor} já está em posse de ${responsavelAtualRotulo}.`
                : `Pix ${valor} já está em posse de um usuário.`);
            input.value = '';
            input.focus();
        }
    };

    function usuarioTemPerfilAtendimentoNivel2(colab) {

    function renderizarResponsaveis() {
        const select = document.getElementById('responsavel');
        const valorAtual = select.value;
        select.innerHTML = '<option value="">Responsável</option>';

        const nomeLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
        const categoriaAtual = document.getElementById('filtroCategoria').value;

        if (categoriaAtual === 'pix') {
            if (modoAtual === 'entrada') {
                const optForn = document.createElement('option');
                optForn.value = RESPONSAVEL_PIX_ESTOQUE;
                optForn.innerText = ROTULO_PIX_ESTOQUE;
                select.appendChild(optForn);
            }
            colabsGlobal
                .filter(usuarioTemPerfilAtendimentoNivel2)
                .forEach((colab) => {
                    const nome = String(colab?.nome || '').trim();
                    if (!nome) return;
                    const opt = document.createElement('option');
                    opt.value = nome;
                    opt.innerText = nome;
                    select.appendChild(opt);
                });
            if (valorAtual && Array.from(select.options).some(opt => opt.value === valorAtual)) {
                select.value = valorAtual;
            }
            atualizarHistoricoPorResponsavelSelecionado();
            return;
        }

        // Adiciona estoque e usuário logado apenas se for ENTRADA
        if (modoAtual === 'entrada') {
            const optForn = document.createElement('option');
            optForn.value = RESPONSAVEL_PIX_ESTOQUE;
            optForn.innerText = ROTULO_PIX_ESTOQUE;
            select.appendChild(optForn);

            if (nomeLogado && categoriaAtual !== 'produtos' && categoriaAtual !== 'materiais') {
                const optUser = document.createElement('option');
                optUser.value = nomeLogado;
                optUser.innerText = nomeLogado;
                select.appendChild(optUser);
            }
        }

        const tipoProduto = categoriaAtual === 'produtos';
        const tipoMaterial = categoriaAtual === 'materiais';

        let listaFiltrada;
        if (modoAtual === 'entrada' && tipoMaterial) {
            // Entrada de materiais: só estoque (já adicionado acima)
            listaFiltrada = [];
        } else if (modoAtual === 'entrada' && tipoProduto) {
            // Entrada de produtos: apenas quem tem remuneração "Produção de Produtos"
            listaFiltrada = colabsGlobal.filter(c => c.producaoProdutos || (c.nivel_completo && c.nivel_completo.includes('atendimento')));
        } else if (modoAtual === 'saida' && tipoMaterial) {
            // Saída de materiais: atendimento nível 2 + perfil estoque (exceto quem tem produção de produtos)
            listaFiltrada = colabsGlobal.filter(c =>
                !c.producaoProdutos &&
                (
                    c.nivel_completo === 'atendimento_2' ||
                    (c.nivel_completo && c.nivel_completo.startsWith('estoque'))
                )
            );
            // Permite que o próprio usuário logado se selecione
            if (nomeLogado && !listaFiltrada.some(c => c.nome === nomeLogado)) {
                const optSelf = document.createElement('option');
                optSelf.value = nomeLogado;
                optSelf.innerText = nomeLogado + ' (você)';
                select.appendChild(optSelf);
            }
        } else {
            // Demais casos: colaboradores com perfil atendimento
            listaFiltrada = colabsGlobal.filter(c => c.nivel_completo && c.nivel_completo.includes('atendimento'));
        }

        if (modoAtual === 'saida' && categoriaAtual === 'peca') {
            const optMaquina = document.createElement('option');
            optMaquina.value = 'Máquina';
            optMaquina.innerText = 'Máquina';
            select.appendChild(optMaquina);
        }

        listaFiltrada.forEach(c => {
            if (Array.from(select.options).some(opt => opt.value === c.nome)) return;
            const opt = document.createElement('option');
            opt.value = c.nome;
            opt.innerText = c.nome;
            select.appendChild(opt);
        });

        if (valorAtual && Array.from(select.options).some(opt => opt.value === valorAtual)) {
            select.value = valorAtual;
        }
        atualizarHistoricoPorResponsavelSelecionado();
    }

        selectItem.innerHTML = '<option value="">Item</option>';

        if (!categoriaSelecionada) {
            mostrarSaldoAtual();
            atualizarBotaoItens();
            if (itensVisivelEstoque) filtrarItensLista();
            return;
        }

        const itensFiltrados = listaGlobal.filter(item => item.categoria === categoriaSelecionada);

        if (itensFiltrados.length === 0) {
            mostrarSaldoAtual();
            atualizarBotaoItens();
            if (itensVisivelEstoque) filtrarItensLista();
            return;
        }

        itensFiltrados.forEach(item => {
            const option = document.createElement('option');
            option.value = item.firebaseUrl;
            option.innerText = item.nome;
            option.dataset.qtdAtual = item.quantidade || 0;
            option.dataset.qtdDefeito = item.qtd_defeito || 0;
            option.dataset.categItem = item.categoria || '';
            selectItem.appendChild(option);
        });

        if (valorAnterior && [...selectItem.options].some(o => o.value === valorAnterior)) {
            selectItem.value = valorAnterior;
        }

        mostrarSaldoAtual();
        atualizarBotaoItens();
        if (itensVisivelEstoque) filtrarItensLista();
    };

    // 3. MOSTRAR SALDO
    window.mostrarSaldoAtual = function() {
        const select = document.getElementById('selectItem');
        const itemSelecionado = select.options[select.selectedIndex];
        const saldoBox = document.getElementById('saldoBox');

        if (itemSelecionado && itemSelecionado.value) {

            const qtdDefeito = parseInt(itemSelecionado.dataset.qtdDefeito || 0);

                    `<span class="saldo-total-disc">Total ${total}</span>` +
                    `<span class="saldo-defeito-label">&#9888; Ruim <span class="saldo-defeito-num">${qtdDefeito}</span></span>` +
                    `<span class="destaque-qtd">${qtdBoa}</span>`;
            } else {
                document.getElementById('textoSaldo').innerHTML = `<span class="destaque-qtd">${qtdBoa}</span>`;
            }
            saldoBox.style.display = 'flex';
        } else {
            saldoBox.style.display = 'none';
        }
    };

    // 4. MUDAR MODO
    window.mudarModo = function(modo) {
        modoAtual = modo;
        const btn = document.getElementById('btnAcao');
        
        if (modo === 'entrada') {
            document.getElementById('tabEntrada').classList.add('ativo');
