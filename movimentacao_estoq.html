<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação de Estoque</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:420px; padding:15px; box-sizing:border-box; min-height: 100vh; }
        
        /* Topo */
        .topo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; width: 100%; min-height: 45px; }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; position: absolute; right: 0; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Botões de Tipo de Movimento (Abas) */
        .tipo-movimento { display: flex; margin-bottom: 20px; background: rgba(0,0,0,0.2); border-radius: 30px; padding: 5px; }
        .btn-mov { flex: 1; padding: 12px; text-align: center; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; opacity: 0.6; font-size: 13px; }
        .btn-mov.ativo { opacity: 1; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .entrada.ativo { background: #4caf50; } /* Verde */
        .saida.ativo { background: #f44336; }   /* Vermelho */

        /* Card de Formulário */
        .card-form { background: rgba(255,255,255,0.07); padding: 20px; border-radius: 18px; border: 2px solid rgba(255,255,255,0.85); }

        /* Grade 2×2 dos campos */
        .card-grid {
            display: grid;
            grid-template-columns: 115px 1fr;
            gap: 6px 10px;
            margin-bottom: 16px;
        }
        .campo-form { display: flex; flex-direction: column; gap: 5px; }
        .campo-form label {
            font-size: 10px; font-weight: bold; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.45); text-transform: uppercase;
        }

        /* Separador entre as duas linhas */
        .card-separador {
            grid-column: 1 / -1;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 2px 0;
        }

        select, input {
            padding: 11px 8px;
            border-radius: 10px;
            border: 1.5px solid #bbb;
            background: white;
            color: #222;
            font-size: 15px;
            outline: none;
            height: 48px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Quantidade com leve destaque */
        .inp-qtd {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background: #fffde7;
            border-color: #f9a825;
        }
        .inp-qtd::-webkit-outer-spin-button,
        .inp-qtd::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .inp-qtd[type=number] { -moz-appearance: textfield; }

        /* Linha de Saldo Atual */
        .saldo-box {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .saldo-box-titulo {
            font-size: 10px; font-weight: bold; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4); text-transform: uppercase;
            white-space: nowrap;
        }
        .info-atual { font-size: 18px; color: rgba(255,235,59,0.85); font-weight: bold; }
        .destaque-qtd { color: rgba(255,235,59,0.85); font-weight: bold; font-size: 18px; }
        .saldo-total-disc { font-size: 11px; color: rgba(255,255,255,0.35); margin-right: 6px; }
        .saldo-defeito-label { font-size: 13px; color: #ff9800; font-weight: 600; margin-right: 8px; }
        .saldo-defeito-num { font-size: 15px; font-weight: bold; }

        .btn-confirmar {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; color: white; cursor: pointer;
            letter-spacing: 0.5px; transition: 0.2s;
        }
        .btn-confirmar:disabled {
            cursor: wait;
            filter: saturate(0.85);
        }
        .btn-confirmar.salvando {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-spinner {
            width: 18px;
            height: 18px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex: 0 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-excluir-hist.salvando {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: wait;
        }
        .btn-excluir-hist .btn-spinner {
            width: 12px;
            height: 12px;
            border-width: 2px;
        }
        .lista-pendente {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin: 0 0 14px;
        }
        .lista-pendente.visivel { display: flex; }
        .pendente-card {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 8px;
            background: #123f9b;
            border: 1px solid #ffffff;
            border-radius: 10px;
            padding: 9px 10px;
        }
        .pendente-info { min-width: 0; }
        .pendente-nome {
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pendente-meta {
            color: #dfe8ff;
            font-size: 13px;
            font-weight: 400;
            margin-top: 2px;
        }
        .pendente-qtd {
            color: #ffeb3b;
            font-size: 18px;
            font-weight: 700;
            min-width: 42px;
            text-align: center;
        }
        .pendente-remover {
            width: 32px;
            height: 32px;
            border: 1px solid #ffffff;
            border-radius: 50%;
            background: #f44336;
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .label-pequena { font-size: 11px; color: #ccc; margin-bottom: 4px; display: block; margin-top: 10px; }

        /* Input de busca padronizado */
        .input-busca {
            width: 100%;
            margin-bottom: 14px;
            text-align: center;
            background: rgba(255,255,255,0.18) !important;
            color: white !important;
            border: 1.5px solid rgba(255,255,255,0.55) !important;
            box-sizing: border-box;
        }
        .input-busca::placeholder { color: rgba(255,255,255,0.65); }

        /* Seções */
        .secao-historico { margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; border-radius: 16px; transition: border 0.3s, padding 0.3s; }
        .secao-historico:has(.titulo-hist.aberto) { border: 3px solid rgba(76,175,80,0.75); padding: 15px; }

        .secao-itens:has(.titulo-hist.aberto) { border: 3px solid rgba(33,150,243,0.75); border-radius: 16px; padding: 15px; }

        @keyframes shimmer-btn {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 18px rgba(0,0,0,0.2), 0 0 0 0 rgba(255,235,59,0.0); }
            50%       { box-shadow: 0 4px 18px rgba(0,0,0,0.2), 0 0 0 6px rgba(255,235,59,0.18); }
        }
        @keyframes blink-eye {
            0%, 90%, 100% { transform: scaleY(1); }
            95%            { transform: scaleY(0.1); }
        }

        .titulo-hist {
            width: 100%;
            margin-bottom: 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,235,59,0.35);
            border-left: 4px solid #ffeb3b;
            border-radius: 14px;
            padding: 13px 15px 13px 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            animation: pulse-glow 2.8s ease-in-out infinite;
        }
        .titulo-hist::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(100deg, transparent 20%, rgba(255,235,59,0.09) 50%, transparent 80%);
            background-size: 200% 100%;
            animation: shimmer-btn 2.4s linear infinite;
            pointer-events: none;
        }
        .titulo-hist:hover {
            background: rgba(255,235,59,0.07);
            border-color: rgba(255,235,59,0.7);
            box-shadow: 0 6px 22px rgba(0,0,0,0.28);
        }
        .titulo-hist:active { transform: scale(0.985); }
        .titulo-hist:focus-visible {
            outline: 2px solid #ffeb3b;
            outline-offset: 3px;
        }
        /* Movimentações aberto — verde */
        .secao-historico .titulo-hist.aberto {
            background: rgba(76,175,80,0.07);
            border-color: rgba(76,175,80,0.55);
            border-left-color: #4caf50;
            animation: none;
        }
        .secao-historico .titulo-hist.aberto::before { display: none; }
        .secao-historico .titulo-hist.aberto .titulo-hist-olho {
            background: rgba(76,175,80,0.2);
            border-color: rgba(76,175,80,0.55);
        }
        .secao-historico .titulo-hist.aberto .titulo-hist-label { color: #81c784; }
        .secao-historico .titulo-hist.aberto .titulo-hist-seta { transform: rotate(180deg); }
        .secao-historico .titulo-hist.aberto .titulo-hist-seta svg { stroke: #81c784; }

        /* Itens aberto — azul */
        .secao-itens .titulo-hist.aberto {
            background: rgba(33,150,243,0.07);
            border-color: rgba(33,150,243,0.55);
            border-left-color: #2196f3;
            animation: none;
        }
        .secao-itens .titulo-hist.aberto::before { display: none; }
        .secao-itens .titulo-hist.aberto .titulo-hist-olho {
            background: rgba(33,150,243,0.2);
            border-color: rgba(33,150,243,0.55);
        }
        .secao-itens .titulo-hist.aberto .titulo-hist-label { color: #64b5f6; }
        .secao-itens .titulo-hist.aberto .titulo-hist-seta { transform: rotate(180deg); }
        .secao-itens .titulo-hist.aberto .titulo-hist-seta svg { stroke: #64b5f6; }

        /* Ícone olho */
        .titulo-hist-olho {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,235,59,0.15);
            border: 1.5px solid rgba(255,235,59,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            line-height: 1;
            transition: background 0.3s, border-color 0.3s;
        }
        .titulo-hist.aberto .titulo-hist-olho {
            background: rgba(76,175,80,0.2);
            border-color: rgba(76,175,80,0.55);
        }

        .titulo-hist-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
        .titulo-hist-label {
            font-size: 13px;
            font-weight: 800;
            color: #ffeb3b;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .titulo-hist-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ffeb3b;
            color: #1a1a2e;
            font-size: 10px;
            font-weight: 900;
            min-width: 20px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            letter-spacing: 0;
            text-transform: none;
        }
        .secao-historico .titulo-hist.aberto .titulo-hist-badge { background: #4caf50; color: #fff; }
        .secao-itens .titulo-hist.aberto .titulo-hist-badge { background: #2196f3; color: #fff; }
        .titulo-hist-subtexto {
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .titulo-hist.aberto .titulo-hist-subtexto { color: rgba(255,255,255,0.65); }

        /* Seta */
        .titulo-hist-seta {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.35s cubic-bezier(.4,0,.2,1), background 0.3s;
        }
        .titulo-hist-seta svg {
            width: 16px; height: 16px;
            stroke: rgba(255,235,59,0.9);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s;
        }
        .secao-historico .titulo-hist.aberto .titulo-hist-seta { background: rgba(76,175,80,0.15); }
        .secao-itens .titulo-hist.aberto .titulo-hist-seta { background: rgba(33,150,243,0.15); }
        .oculto { display: none; }
        .item-hist { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid; }
        .hist-esq { display: flex; flex-direction: column; gap: 2px; }
        .hist-dir { text-align: right; font-weight: bold; }
        
        .tag-entrada { color: #4caf50; font-weight: bold; }
        .tag-saida { color: #f44336; font-weight: bold; }
        
        /* [NOVO] Classes para controlar o tamanho da fonte da lista aqui */
        .hist-tipo-label { font-size: 20px; font-weight: bold; }
        .hist-nome-item { font-size: 18px; color: white; font-weight: bold; } /* <--- TAMANHO DO NOME DO PRODUTO */
        .hist-resp-label { font-size: 18px; }
        .hist-data { font-size: 15px; color: #999; } /* <--- TAMANHO DA DATA E HORA */
        .hist-obs-label { font-size: 18px; font-style: italic; color: #aaa; }
        .hist-dir { font-size: 25px; } /* <--- TAMANHO DA QUANTIDADE (Número) */

        /* Botões de Ação no Histórico */
        .acoes-hist { display: flex; gap: 20px; margin-top: 5px; justify-content: flex-end; width: 100%; }
        .btn-hist { font-size: 10px; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; }
        .btn-excluir-hist { background: #f44336; color: white; }

        /* ── Seção Itens do Estoque ── */
        .secao-itens { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .card-est {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 11px 13px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .card-est-topo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .card-est-nome {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.01em;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .badge-est {
            display: inline-block;
            padding: 5px 13px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        .bg-maquina-est { background: #9c27b0; }
        .bg-produtos-est { background: #4caf50; }
        .bg-peca-est { background: #ff9800; }
        .bg-materiais-est { background: #00acc1; }
        .card-est-rodape {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
        }
        .card-est-minimo {
            font-size: 11px;
            color: #888;
        }
        .qtd-est {
            font-size: 26px;
            font-weight: 900;
            color: #ffeb3b;
            text-align: center;
            background: rgba(255,235,59,0.1);
            border: 1px solid rgba(255,235,59,0.28);
            padding: 4px 14px;
            border-radius: 8px;
            min-width: 48px;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        .filtros-est {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: nowrap;
        }
        .filtro-est {
            cursor: pointer;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 4px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            font-weight: bold;
            font-size: 11px;
            transition: 0.15s;
        }
        .filtro-est .f-icon { font-size: 18px; line-height: 1; }
        .filtro-est .f-label { color: #ffffff; }
        .filtro-est.ativo { background: rgba(255,235,59,0.18); border-color: rgba(255,235,59,0.52); }
        .filtro-est input { display: none; }
        .campo-oculto { display: none !important; }
        .campo-responsavel { grid-column: 2; grid-row: 1; }
        .linhas-movimentacao {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .linha-movimentacao {
            display: grid;
            grid-template-columns: 1fr 110px;
            gap: 10px;
            animation: slideDown 0.2s ease;
        }
        .linha-movimentacao .input-mov-qtd {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background: #fffde7;
            border-color: #f9a825;
        }
        .pp-secao { margin-top: 20px; }
        .pp-secao-header {
            background: #4b2f9f;
            border: 2px solid #c9a7ff;
            border-radius: 14px;
            padding: 13px 15px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background 0.15s, border-radius 0.2s;
            min-height: 48px;
            user-select: none;
            -webkit-user-select: none;
        }
        .pp-secao-header:active { transform: translateY(1px); }
        .pp-secao-header.aberta { border-radius: 14px 14px 0 0; border-bottom-color: rgba(255,255,255,0.2); }
        .pp-secao-icone {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,235,59,0.15);
            border: 1.5px solid rgba(255,235,59,0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .pp-secao-titulo {
            color: #ffeb3b;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
        }
        .pp-secao-seta {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.35s cubic-bezier(.4,0,.2,1), background 0.3s;
        }
        .pp-secao-seta svg {
            width: 16px; height: 16px;
            stroke: rgba(255,235,59,0.9);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .pp-secao-seta.girada { transform: rotate(180deg); }
        .pp-secao-corpo {
            display: none;
            background: rgba(8, 22, 65, 0.75);
            border: 2px solid #c9a7ff;
            border-top: none;
            border-radius: 0 0 14px 14px;
            padding: 16px;
        }
        .pp-secao-corpo.aberto { display: block; }
        .pp-secao-sub {
            color: #ffffff;
            font-size: 13px;
            text-align: center;
            margin-bottom: 14px;
        }
        .pix-posse-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
        }
        .pix-posse-campo label {
            display: block;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 5px;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-confirmar-pix-posse {
            width: 100%;
            min-height: 50px;
            border: 1px solid #ffffff;
            border-radius: 12px;
            background: #0b7a34;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 14px;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-confirmar-pix-posse:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Movimentação</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="tipo-movimento">
        <div id="tabSaida" class="btn-mov saida ativo" onclick="mudarModo('saida')">SAÍDA (-)</div>
        <div id="tabEntrada" class="btn-mov entrada" onclick="mudarModo('entrada')">ENTRADA (+)</div>
    </div>

    <div class="card-form">
        <div class="card-grid">
            <div class="campo-form">
                <label>Tipo</label>
                <select id="filtroCategoria" onchange="filtrarItens()">
                    <option value="">Tipo</option>
                    <option value="maquina">Máquina</option>
                    <option value="peca">Peça</option>
                    <option value="produtos">Produtos</option>
                    <option value="materiais">Materiais</option>
                </select>
            </div>
            <div class="campo-form campo-oculto">
                <label>Item</label>
                <select id="selectItem" onchange="mostrarSaldoAtual()">
                    <option value="">Item</option>
                </select>
            </div>

            <div class="card-separador"></div>

            <div class="campo-form campo-oculto">
                <label>Quantidade</label>
                <input type="text" id="qtdInput" class="inp-qtd" placeholder="0" inputmode="numeric">
            </div>
            <div class="campo-form campo-responsavel">
                <label>Responsável</label>
                <select id="responsavel">
                    <option value="">Selecione...</option>
                </select>
            </div>
            <div class="linhas-movimentacao" id="containerMovimentacaoItens"></div>
        </div>

        <div class="saldo-box" id="saldoBox" style="display:none;">
            <div class="saldo-box-titulo">Saldo Atual</div>
            <div class="info-atual" id="textoSaldo">—</div>
        </div>

        <button class="btn-confirmar" id="btnAcao" style="background:#f44336;" onclick="salvarMovimentacao()">CONFIRMAR SAÍDA</button>
    </div>

    <div class="secao-historico">
        <div class="titulo-hist">Últimas Movimentações</div>
        <input type="text" id="filtroHistorico" class="input-busca" placeholder="Pesquisar no histórico..." oninput="filtrarHistorico()">
        <div id="listaHistorico">
            <p style="text-align:center; font-size:11px; opacity:0.5;">Carregando...</p>
        </div>
    </div>

    <div class="secao-itens">
        <div class="titulo-hist" id="btnToggleItens" role="button" tabindex="0" aria-expanded="false"
             onclick="toggleItens()"
             onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleItens();}">
        </div>
        <div id="conteudoItens" class="oculto">
            <input type="text" id="filtroItens" class="input-busca" placeholder="Buscar item no estoque..." oninput="filtrarItensLista()">
            <div class="filtros-est">
                <label class="filtro-est"><input type="checkbox" class="filtro-tipo-est" value="produtos" checked onclick="selecionarFiltroTipo(this)"><span class="f-icon">🟢</span><span class="f-label">Produtos</span></label>
                <label class="filtro-est"><input type="checkbox" class="filtro-tipo-est" value="peca" onclick="selecionarFiltroTipo(this)"><span class="f-icon">🟠</span><span class="f-label">Peças</span></label>
                <label class="filtro-est"><input type="checkbox" class="filtro-tipo-est" value="maquina" onclick="selecionarFiltroTipo(this)"><span class="f-icon">🟣</span><span class="f-label">Máquinas</span></label>
                <label class="filtro-est"><input type="checkbox" class="filtro-tipo-est" value="materiais" onclick="selecionarFiltroTipo(this)"><span class="f-icon">🔵</span><span class="f-label">Materiais</span></label>
            </div>
            <div id="listaItens"></div>
        </div>
    </div>

    <div class="pp-secao">
        <div class="pp-secao-header" id="hdr-pix-posse" onclick="togglePixPosse()">
            <span class="pp-secao-icone">Pix</span>
            <span class="pp-secao-titulo">Área Pix</span>
            <span class="pp-secao-seta" id="seta-pix-posse"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>
        </div>
        <div class="pp-secao-corpo" id="corpo-pix-posse">
<div class="pix-posse-grid">
                <div class="pix-posse-campo">
                    <label for="pixPosseNumero">Num. Pix</label>
                    <input type="text" id="pixPosseNumero" inputmode="numeric" placeholder="Nº" autocomplete="off" style="width:90px;font-size:19px;text-align:center;" oninput="this.value = this.value.replace(/[^0-9]/g, '')" onblur="validarPixPosse()">
                </div>
                <div class="pix-posse-campo">
                    <label for="pixPosseResponsavel">Quem está retirando</label>
                    <select id="pixPosseResponsavel" style="font-size:19px;">
                        <option value="">Selecione...</option>
                    </select>
                </div>
            </div>
            <button type="button" class="btn-confirmar-pix-posse" id="btnConfirmarPixPosse" onclick="salvarPixEmPosseMovimentacao()">CONFIRMAR PIX</button>
        </div>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbEscutarEstoque, dbSalvarItemEstoque, dbEscutarColaboradores, dbAdicionarPixEmPosse, dbSalvarHistoricoBalanco, dbEscutarHistoricoBalanco, dbExcluirHistoricoBalanco, dbRecalcularRemuneracoes, dbEscutarClientes } from './database.js';

    let listaGlobal = [];
    let historicoGlobal = [];
    let colabsGlobal = [];
    let clientesGlobal = [];
    let itensPendentes = [];
    let timerAdicionarPendente = null;
    let salvandoMovimentacao = false;
    let modoAtual = 'saida';
    let historicoVisivel = false;
    let itensVisivelEstoque = false;

    const tituloHistorico = document.querySelector('.titulo-hist');
    const filtroHistoricoEl = document.getElementById('filtroHistorico');
    const listaHistoricoEl = document.getElementById('listaHistorico');

    function atualizarBotaoHistorico() {
        tituloHistorico.classList.toggle('aberto', historicoVisivel);
        tituloHistorico.setAttribute('aria-expanded', historicoVisivel ? 'true' : 'false');
        const total = historicoGlobal.length;
        const badgeTexto = total > 0 ? total : '';
        tituloHistorico.innerHTML = `
            <span class="titulo-hist-olho"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg></span>
            <span class="titulo-hist-info">
                <span class="titulo-hist-label">
                    Movimentações
                    ${badgeTexto ? `<span class="titulo-hist-badge">${badgeTexto}</span>` : ''}
                </span>
                <span class="titulo-hist-subtexto">${historicoVisivel ? 'Toque para ocultar' : 'Toque para ver todas as movimentações'}</span>
            </span>
            <span class="titulo-hist-seta">
                <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
        `;
    }

    tituloHistorico.id = 'btnToggleHistorico';
    tituloHistorico.setAttribute('role', 'button');
    tituloHistorico.tabIndex = 0;
    tituloHistorico.onclick = () => window.toggleHistorico();
    tituloHistorico.onkeydown = (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            window.toggleHistorico();
        }
    };

    filtroHistoricoEl.classList.add('oculto');
    listaHistoricoEl.classList.add('oculto');
    atualizarBotaoHistorico();

    // 1. CARREGAR ITENS DO BANCO
    dbEscutarEstoque((lista) => {
        listaGlobal = lista;
        filtrarItens();
        atualizarBotaoItens();
        if (itensVisivelEstoque) filtrarItensLista();
    });

    function ehMovimentoEstoqueHistorico(mov) {
        if (mov?.cancelado) return false;
        const tipo = String(mov?.tipo || '').trim();
        if (tipo === 'cancelamento') return false;
        const origemRegistro = String(mov?.origemRegistro || '').trim();
        return tipo === 'entrada_estoque'
            || tipo === 'saida_estoque'
            || origemRegistro === 'entrada_estoque'
            || origemRegistro === 'retirada_estoque';
    }

    function obterMetaTipoHistorico(mov) {
        const tipo = String(mov?.tipo || '').trim();
        if (tipo === 'atendimento') {
            return { classe: 'tag-saida', texto: 'ATENDIMENTO', cor: '#f44336', ehEntrada: false, ehSaida: true, ehCancelamento: false };
        }
        if (tipo === 'entrada_estoque') {
            return { classe: 'tag-entrada', texto: 'ENTRADA', cor: '#4caf50', ehEntrada: true, ehSaida: false, ehCancelamento: false };
        }
        if (tipo === 'saida_estoque') {
            return { classe: 'tag-saida', texto: 'SAÍDA', cor: '#f44336', ehEntrada: false, ehSaida: true, ehCancelamento: false };
        }
        return { classe: '', texto: 'CANCELAMENTO', cor: '#ffeb3b', ehEntrada: false, ehSaida: false, ehCancelamento: true };
    }

    function obterOrigemLabel(mov) {
        const origem = String(mov?.origemRegistro || '').trim();
        const tipo   = String(mov?.tipo || '').trim();
        if (tipo === 'atendimento' || origem === 'atendimento') {
            return { icone: '📋', texto: 'Atendimento', cor: '#ef9a9a' };
        }
        if (origem === 'retirada_estoque') {
            return { icone: '📤', texto: 'Tela Movimentação', cor: '#ffcc80' };
        }
        if (origem === 'entrada_estoque') {
            return { icone: '📥', texto: 'Tela Movimentação', cor: '#a5d6a7' };
        }
        if (origem === 'manutencao') {
            return { icone: '🔧', texto: 'Manutenção', cor: '#90caf9' };
        }
        if (origem) {
            return { icone: '📦', texto: origem, cor: '#e0e0e0' };
        }
        return { icone: '📦', texto: 'Manual', cor: '#e0e0e0' };
    }

    // Histórico único vindo do movimentacao_balanco_historico
    dbEscutarHistoricoBalanco((lista) => {
        historicoGlobal = lista.filter(ehMovimentoEstoqueHistorico);
        atualizarBotaoHistorico();
        filtrarHistorico();
    });

    window.toggleHistorico = function() {
        historicoVisivel = !historicoVisivel;

        // Fecha itens se estiver abrindo o histórico
        if (historicoVisivel && itensVisivelEstoque) {
            itensVisivelEstoque = false;
            document.getElementById('conteudoItens').classList.add('oculto');
            atualizarBotaoItens();
        }

        filtroHistoricoEl.classList.toggle('oculto', !historicoVisivel);
        listaHistoricoEl.classList.toggle('oculto', !historicoVisivel);
        atualizarBotaoHistorico();

        if (historicoVisivel) {
            filtrarHistorico();
        }
    };

    window.filtrarHistorico = function() {
        if (!historicoVisivel) return;

        const termo = document.getElementById('filtroHistorico').value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const listaFiltrada = historicoGlobal.filter(mov => {
            const texto = (mov.itemNome + " " + mov.responsavel + " " + mov.tipo + " " + (mov.descricao || "")).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            return texto.includes(termo);
        });
        renderizarHistorico(listaFiltrada);
    };

    function renderizarHistorico(lista) {
        const container = document.getElementById('listaHistorico');
        container.innerHTML = "";

        if(lista.length === 0) {
            container.innerHTML = '<p style="text-align:center; font-size:11px; opacity:0.5;">Nenhum registro encontrado.</p>';
            return;
        }

        lista.forEach((mov, index) => {
            const metaTipo = obterMetaTipoHistorico(mov);
            const classeCor = metaTipo.classe;
            const textoTipo = metaTipo.texto;
            const movimentacao = Number(mov.movimento ?? 0);
            const quantidade = Math.abs(movimentacao);
            
            const dataObj = new Date(mov.timestamp || mov.data || '');
            const dataFormatada = dataObj.toLocaleString('pt-BR');
            
            const div = document.createElement('div');
            div.className = 'item-hist';
            div.style.flexDirection = 'column';
            div.style.alignItems = 'stretch';
            div.style.borderColor = metaTipo.ehEntrada
                ? 'rgba(76,175,80,0.6)'
                : (metaTipo.ehSaida ? 'rgba(244,67,54,0.6)' : 'rgba(255,235,59,0.6)');

            const origemInfo = obterOrigemLabel(mov);
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 6px;">
                    <span class="hist-tipo-label" style="color:${metaTipo.cor}">${textoTipo}</span>
                    <span style="font-size: 12px; color: #ccc;">${dataFormatada}</span>
                </div>
                <div style="display:flex; align-items:center; gap:6px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.08);">
                    <span style="font-size:11px; color:rgba(255,255,255,0.4); white-space:nowrap;">Origem:</span>
                    <span style="font-size:12px; font-weight:bold; color:${origemInfo.cor};">${origemInfo.icone} ${origemInfo.texto}</span>
                    ${mov.refId ? `<span style="font-size:11px; color:rgba(255,255,255,0.3); font-family:monospace; margin-left:auto; white-space:nowrap;">ID: ${mov.refId.slice(-8).toUpperCase()}</span>` : ''}
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.06);">
                    <span class="hist-nome-item">${mov.itemNome}</span>
                    <span class="hist-resp-label" style="color:rgba(255,255,255,0.65);">${mov.responsavel}</span>
                </div>
                ${mov.registradoPor && mov.registradoPor !== mov.responsavel ? `
                <div style="padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.06);">
                    <span class="hist-resp-label" style="color:rgba(255,255,255,0.5);">Reg. por: ${mov.registradoPor}</span>
                </div>` : ''}
                <div style="display:flex; justify-content:space-between; align-items:center; padding: 4px 0;">
                    <span class="hist-obs-label" style="margin:0;">${mov.descricao || ''}</span>
                    <span class="hist-dir ${classeCor}" style="margin:0;">${quantidade}</span>
                </div>
                ${(mov.estoqueAntes != null && mov.estoqueDepois != null) ? `
                <div style="padding: 3px 0; display:flex; align-items:center; gap:6px; margin-top:2px;">
                    <span style="font-size:11px; color:rgba(255,255,255,0.4);">Saldo estoque:</span>
                    <span style="font-size:13px; font-weight:bold; color:rgba(255,255,255,0.7);">${mov.estoqueAntes}</span>
                    <span style="font-size:12px; color:rgba(255,255,255,0.35);">→</span>
                    <span style="font-size:13px; font-weight:bold; color:${metaTipo.ehEntrada ? '#a5d6a7' : '#ef9a9a'};">${mov.estoqueDepois}</span>
                </div>` : ''}
            `;

            // Botão excluir: só para quem registrou e dentro de 3 horas
            const usuarioAtual = String(localStorage.getItem('usuarioLogado') || '').trim();
            const foiRegistradoPorMim = mov.registradoPor
                ? mov.registradoPor === usuarioAtual
                : false;
            const dentroDe3h = (Date.now() - new Date(mov.timestamp || mov.data || '').getTime()) < 3 * 60 * 60 * 1000;

            const podeExcluirPelaTela = !metaTipo.ehCancelamento
                && mov.tipo !== 'atendimento'
                && String(mov?.origemRegistro || '').trim() !== 'atendimento';

            if (podeExcluirPelaTela && foiRegistradoPorMim && dentroDe3h) {
                const divAcoes = document.createElement('div');
                divAcoes.className = 'acoes-hist';
                const movString = encodeURIComponent(JSON.stringify(mov));
                divAcoes.innerHTML = `
                    <button class="btn-hist btn-excluir-hist" onclick="excluirUltimo('${movString}', this)">EXCLUIR</button>
                `;
                div.appendChild(divAcoes);
            }

            container.appendChild(div);
        });
    }

    // [NOVO] CARREGAR COLABORADORES PARA O DROPDOWN
    dbEscutarColaboradores((colabs) => {
        colabsGlobal = colabs;
        renderizarResponsaveis();
        renderizarResponsaveisPixPosse();
    });

    dbEscutarClientes((lista) => {
        clientesGlobal = Array.isArray(lista) ? lista : [];
    });

    function pixEmUsoSet() {
        const emUso = new Set();
        clientesGlobal.forEach(cliente => {
            const equips = Array.isArray(cliente?.equipDetalhes) ? cliente.equipDetalhes : [];
            equips.forEach(equip => {
                const pix = String(equip?.pix || '').trim();
                if (pix) emUso.add(pix);
            });
        });
        return emUso;
    }

    window.validarPixPosse = async function() {
        const input = document.getElementById('pixPosseNumero');
        const valor = String(input?.value || '').trim();
        if (!valor) return;
        if (pixEmUsoSet().has(valor)) {
            await window.playAlert(`Pix ${valor} já está instalado em outro equipamento.`);
            if (input) { input.value = ''; input.focus(); }
        }
    };

    function usuarioTemPerfilAtendimentoNivel2(colab) {
        const nivel = String(colab?.nivel_completo || '').trim().toLowerCase();
        return nivel === 'atendimento_2' || nivel === 'atendimento nivel 2' || nivel === 'atendimento nível 2';
    }

    function renderizarResponsaveisPixPosse() {
        const select = document.getElementById('pixPosseResponsavel');
        const registrador = document.getElementById('pixPosseRegistradoPor');
        if (!select) return;

        select.innerHTML = '<option value="">Selecione...</option>';
        colabsGlobal
            .filter(usuarioTemPerfilAtendimentoNivel2)
            .forEach((colab) => {
                const nome = String(colab?.nome || '').trim();
                if (!nome) return;
                const opt = document.createElement('option');
                opt.value = nome;
                opt.innerText = nome;
                select.appendChild(opt);
            });

        if (registrador) {
            registrador.textContent = String(localStorage.getItem('usuarioLogado') || '').trim() || 'Usuário não identificado';
        }
    }

    window.togglePixPosse = function() {
        const header = document.getElementById('hdr-pix-posse');
        const corpo = document.getElementById('corpo-pix-posse');
        const seta = document.getElementById('seta-pix-posse');
        const aberto = corpo.classList.contains('aberto');
        corpo.classList.toggle('aberto', !aberto);
        header.classList.toggle('aberta', !aberto);
        seta.classList.toggle('girada', !aberto);
    };

    window.salvarPixEmPosseMovimentacao = async function() {
        const inputPix = document.getElementById('pixPosseNumero');
        const selectResponsavel = document.getElementById('pixPosseResponsavel');
        const btn = document.getElementById('btnConfirmarPixPosse');
        const numeroPix = String(inputPix?.value || '').trim();
        const responsavel = String(selectResponsavel?.value || '').trim();
        const registradoPor = String(localStorage.getItem('usuarioLogado') || '').trim();

        if (!numeroPix) {
            await window.playAlert('Informe o número do Pix.');
            inputPix?.focus();
            return;
        }
        if (!responsavel) {
            await window.playAlert('Selecione quem está retirando o Pix.');
            selectResponsavel?.focus();
            return;
        }
        if (!registradoPor) {
            await window.playAlert('Usuário registrador não identificado. Entre novamente no sistema.');
            return;
        }

        const textoOriginal = btn?.innerText || 'CONFIRMAR PIX';
        if (btn) {
            btn.disabled = true;
            btn.innerText = 'SALVANDO...';
        }

        try {
            await dbAdicionarPixEmPosse(responsavel, numeroPix, {
                responsavel,
                retiradoPor: responsavel,
                registradoPor,
                origemRegistro: 'movimentacao_estoque',
                tipo: 'pix_em_posse',
                timestamp: new Date().toISOString()
            });

            if (inputPix) inputPix.value = '';
            if (selectResponsavel) selectResponsavel.value = '';
            await window.playAlert('Pix registrado em posse com sucesso.');
        } catch (error) {
            console.error('Erro ao registrar Pix em posse:', error);
            await window.playAlert('Erro ao registrar Pix em posse. Tente novamente.');
        } finally {
            if (btn) {
                btn.disabled = false;
                btn.innerText = textoOriginal;
            }
        }
    };

    function renderizarResponsaveis() {
        const select = document.getElementById('responsavel');
        select.innerHTML = '<option value="">Responsável</option>';

        const nomeLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
        const categoriaAtual = document.getElementById('filtroCategoria').value;

        // Adiciona "Fornecedor" e usuário logado apenas se for ENTRADA
        if (modoAtual === 'entrada') {
            const optForn = document.createElement('option');
            optForn.value = "Fornecedor";
            optForn.innerText = "Fornecedor";
            select.appendChild(optForn);

            if (nomeLogado && categoriaAtual !== 'maquina' && categoriaAtual !== 'produtos' && categoriaAtual !== 'materiais') {
                const optUser = document.createElement('option');
                optUser.value = nomeLogado;
                optUser.innerText = nomeLogado;
                select.appendChild(optUser);
            }
        }

        const tipoProduto = categoriaAtual === 'produtos';
        const tipoMaterial = categoriaAtual === 'materiais';

        let listaFiltrada;
        if (modoAtual === 'entrada' && tipoMaterial) {
            // Entrada de materiais: só Fornecedor (já adicionado acima)
            listaFiltrada = [];
        } else if (modoAtual === 'entrada' && tipoProduto) {
            // Entrada de produtos: apenas quem tem remuneração "Produção de Produtos"
            listaFiltrada = colabsGlobal.filter(c => c.producaoProdutos || (c.nivel_completo && c.nivel_completo.includes('atendimento')));
        } else if (modoAtual === 'saida' && tipoMaterial) {
            // Saída de materiais: atendimento nível 2 + perfil estoque (exceto quem tem produção de produtos)
            listaFiltrada = colabsGlobal.filter(c =>
                !c.producaoProdutos &&
                (
                    c.nivel_completo === 'atendimento_2' ||
                    (c.nivel_completo && c.nivel_completo.startsWith('estoque'))
                )
            );
            // Permite que o próprio usuário logado se selecione
            if (nomeLogado && !listaFiltrada.some(c => c.nome === nomeLogado)) {
                const optSelf = document.createElement('option');
                optSelf.value = nomeLogado;
                optSelf.innerText = nomeLogado + ' (você)';
                select.appendChild(optSelf);
            }
        } else {
            // Demais casos: colaboradores com perfil atendimento
            listaFiltrada = colabsGlobal.filter(c => c.nivel_completo && c.nivel_completo.includes('atendimento'));
        }

        if (modoAtual === 'saida' && categoriaAtual === 'peca') {
            const optMaquina = document.createElement('option');
            optMaquina.value = 'Máquina';
            optMaquina.innerText = 'Máquina';
            select.appendChild(optMaquina);
        }

        listaFiltrada.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.nome;
            opt.innerText = c.nome;
            select.appendChild(opt);
        });
    }

    // 2. FILTRAR ITENS POR CATEGORIA
    window.filtrarItens = function() {
        renderizarResponsaveis(); // atualiza dropdown de responsável conforme tipo selecionado
        const categoriaSelecionada = document.getElementById('filtroCategoria').value;
        const selectItem = document.getElementById('selectItem');
        const valorAnterior = selectItem.value;

        selectItem.innerHTML = '<option value="">Item</option>';

        if (!categoriaSelecionada) {
            mostrarSaldoAtual();
            return;
        }

        const itensFiltrados = listaGlobal.filter(item => item.categoria === categoriaSelecionada);

        if (itensFiltrados.length === 0) {
            mostrarSaldoAtual();
            return;
        }

        itensFiltrados.forEach(item => {
            const option = document.createElement('option');
            option.value = item.firebaseUrl;
            option.innerText = item.nome;
            option.dataset.qtdAtual = item.quantidade || 0;
            option.dataset.qtdDefeito = item.qtd_defeito || 0;
            option.dataset.categItem = item.categoria || '';
            selectItem.appendChild(option);
        });

        if (valorAnterior && [...selectItem.options].some(o => o.value === valorAnterior)) {
            selectItem.value = valorAnterior;
        }

        mostrarSaldoAtual();
    };

    // 3. MOSTRAR SALDO
    window.mostrarSaldoAtual = function() {
        const select = document.getElementById('selectItem');
        const itemSelecionado = select.options[select.selectedIndex];

                    `<span class="destaque-qtd">${qtdBoa}</span>`;

    // 4. MUDAR MODO
    window.mudarModo = function(modo) {

        if (modo === 'entrada') {

    };

    // 5. ATUALIZAR ESTOQUE NO BANCO
    window.salvarMovimentacao = async function() {
        const idItem = document.getElementById('selectItem').value;
        const qtdMovimento = parseInt(String(document.getElementById('qtdInput').value).replace(/\./g, ''));
        const responsavel = document.getElementById('responsavel').value;
        if (!idItem) return alert("Selecione um item.");
        if (isNaN(qtdMovimento) || qtdMovimento <= 0) return alert("Informe a quantidade.");
        if (!responsavel) return alert("Selecione o responsável.");

        const itemOriginal = listaGlobal.find(i => i.firebaseUrl === idItem);
        if (!itemOriginal) return alert("Erro ao localizar item.");

        const isPeca = itemOriginal.categoria === 'peca';
        let novaQtd = parseInt(itemOriginal.quantidade) || 0;
        let novaQtdDefeito = parseInt(itemOriginal.qtd_defeito) || 0;
        let isDefeitoEntry = false;
        let qtdDefeitoConsumida = 0;

        if (modoAtual === 'entrada') {
            if (isPeca) {
                const ehFornecedor = responsavel === 'Fornecedor';
                const responsavelEhEstoque = colabsGlobal.some(
                    c => c.nome === responsavel && c.nivel_completo && c.nivel_completo.startsWith('estoque')
                );

                if (ehFornecedor || responsavelEhEstoque) {
                    // Peça boa: abate defeitos primeiro, o que sobrar soma ao estoque bom
                    qtdDefeitoConsumida = Math.min(qtdMovimento, novaQtdDefeito);
                    novaQtdDefeito -= qtdDefeitoConsumida;
                    novaQtd += qtdMovimento - qtdDefeitoConsumida;
                } else {
                    // Veio da rua: entra como defeito
                    novaQtdDefeito += qtdMovimento;
                    isDefeitoEntry = true;
                }
            } else {
                novaQtd += qtdMovimento;
            }
        } else {
            if (qtdMovimento > novaQtd) {
                return alert("Quantidade insuficiente em estoque!");
            }
            novaQtd -= qtdMovimento;
        }

        // Criamos a cópia do objeto para atualizar no Firebase
        const itemParaSalvar = {
            nome: itemOriginal.nome,
            categoria: itemOriginal.categoria,
            quantidade: novaQtd,
            qtd_defeito: novaQtdDefeito,
            minimo: itemOriginal.minimo || 0,
            dataAtualizacao: new Date().toISOString(),
            ultimo_responsavel: responsavel
        };

        const estoqueAntes = parseInt(itemOriginal.quantidade) || 0;

        try {
            await dbSalvarItemEstoque(itemParaSalvar, idItem);
            await dbSalvarHistoricoBalanco({
                responsavel:   responsavel,
                registradoPor: String(localStorage.getItem('usuarioLogado') || '').trim(),
                itemId:        idItem,
                itemNome:      itemOriginal.nome,
                categoria:     itemOriginal.categoria || 'produto',
                tipo:          modoAtual === 'saida' ? 'saida_estoque' : 'entrada_estoque',
                origemRegistro: modoAtual === 'saida' ? 'retirada_estoque' : 'entrada_estoque',
                itemChave:     idItem,
                movimento:     modoAtual === 'saida' ? qtdMovimento : -qtdMovimento,
                descricao:     modoAtual === 'saida' ? 'Retirada de estoque' : 'Devolução ao estoque',
                refId:         idItem,
                controlarPosse: responsavel !== 'Fornecedor' && responsavel !== 'Máquina',
                isDefeitoEntry,
                qtdDefeitoConsumida,
                estoqueAntes,
                estoqueDepois: novaQtd
            });

            alert("Sucesso! Novo saldo: " + novaQtd);
            document.getElementById('qtdInput').value = "";
        } catch (error) {
            alert("Erro ao salvar. Detalhe: " + (error?.message || 'desconhecido'));
            console.error(error);
        }
    };

    // ── FORMATAÇÃO CAMPO QUANTIDADE ──
    function obterQuantidadeDigitada() {
        return parseInt(String(document.getElementById('qtdInput').value).replace(/\./g, ''), 10);
    }

    function obterItemEstoqueAtual(idItem, mapaEstoque = null) {
        if (mapaEstoque?.has(idItem)) return mapaEstoque.get(idItem);
        return listaGlobal.find(i => i.firebaseUrl === idItem);
    }

    function obterSaldoProjetadoPendente(idItem) {
        const item = obterItemEstoqueAtual(idItem);
        if (!item) return 0;
        let saldo = parseInt(item.quantidade, 10) || 0;
        itensPendentes.forEach(pendente => {
            if (pendente.idItem !== idItem) return;
            saldo += pendente.modo === 'saida' ? -pendente.qtdMovimento : pendente.qtdMovimento;
        });
        return saldo;
    }

    function limparCamposAposAdicionar() {
        document.getElementById('selectItem').value = '';
        document.getElementById('qtdInput').value = '';
        mostrarSaldoAtual();
        setTimeout(() => document.getElementById('selectItem').focus(), 0);
    }

    function renderizarPendentes() {
        const container = document.getElementById('listaPendente');
        if (!container) return;
        container.classList.toggle('visivel', itensPendentes.length > 0);
        container.innerHTML = itensPendentes.map((item, idx) => `
            <div class="pendente-card">
                <div class="pendente-info">
                    <div class="pendente-nome">${item.itemNome}</div>
                    <div class="pendente-meta">${item.modo === 'saida' ? 'Saída' : 'Entrada'} - ${item.responsavel}</div>
                </div>
                <div class="pendente-qtd">${item.qtdMovimento.toLocaleString('pt-BR')}</div>
                <button type="button" class="pendente-remover" onclick="removerPendente(${idx})" title="Remover">×</button>
            </div>
        `).join('');
    }

    window.removerPendente = function(index) {
        itensPendentes.splice(index, 1);
        renderizarPendentes();
    };

    function adicionarPendenteAtual({ silencioso = false } = {}) {
        if (timerAdicionarPendente) {
            clearTimeout(timerAdicionarPendente);
            timerAdicionarPendente = null;
        }
        const idItem = document.getElementById('selectItem').value;
        const qtdMovimento = obterQuantidadeDigitada();
        const responsavel = document.getElementById('responsavel').value;
        if (!idItem) {
            if (!silencioso) alert("Selecione um item.");
            return false;
        }
        if (isNaN(qtdMovimento) || qtdMovimento <= 0) {
            if (!silencioso) alert("Informe a quantidade.");
            return false;
        }
        if (!responsavel) {
            if (!silencioso) alert("Selecione o responsável.");
            return false;
        }

        const itemOriginal = obterItemEstoqueAtual(idItem);
        if (!itemOriginal) {
            if (!silencioso) alert("Erro ao localizar item.");
            return false;
        }

        if (modoAtual === 'saida' && qtdMovimento > obterSaldoProjetadoPendente(idItem)) {
            if (!silencioso) alert("Quantidade insuficiente em estoque!");
            return false;
        }

        itensPendentes.push({
            idItem,
            qtdMovimento,
            responsavel,
            modo: modoAtual,
            itemNome: itemOriginal.nome
        });
        renderizarPendentes();
        limparCamposAposAdicionar();
        return true;
    }

    function agendarAdicionarPendenteAtual() {
        if (timerAdicionarPendente) clearTimeout(timerAdicionarPendente);
        timerAdicionarPendente = setTimeout(() => {
            timerAdicionarPendente = null;
            adicionarPendenteAtual({ silencioso: true });
        }, 650);
    }

    function tentarAdicionarPendenteSeCompleto() {
        if (!document.getElementById('qtdInput').value.trim()) return;
        agendarAdicionarPendenteAtual();
    }

    async function salvarItemMovimentacaoPendente({ idItem, qtdMovimento, responsavel, modo }, mapaEstoque) {
        const itemOriginal = obterItemEstoqueAtual(idItem, mapaEstoque);
        if (!itemOriginal) throw new Error('Erro ao localizar item.');

        const isPeca = itemOriginal.categoria === 'peca';
        let novaQtd = parseInt(itemOriginal.quantidade) || 0;
        let novaQtdDefeito = parseInt(itemOriginal.qtd_defeito) || 0;
        let isDefeitoEntry = false;
        let qtdDefeitoConsumida = 0;

        if (modo === 'entrada') {
            if (isPeca) {
                const ehFornecedor = responsavel === 'Fornecedor';
                const responsavelEhEstoque = colabsGlobal.some(
                    c => c.nome === responsavel && c.nivel_completo && c.nivel_completo.startsWith('estoque')
                );

                if (ehFornecedor || responsavelEhEstoque) {
                    qtdDefeitoConsumida = Math.min(qtdMovimento, novaQtdDefeito);
                    novaQtdDefeito -= qtdDefeitoConsumida;
                    novaQtd += qtdMovimento - qtdDefeitoConsumida;
                } else {
                    novaQtdDefeito += qtdMovimento;
                    isDefeitoEntry = true;
                }
            } else {
                novaQtd += qtdMovimento;
            }
        } else {
            if (qtdMovimento > novaQtd) {
                throw new Error(`Quantidade insuficiente em estoque para ${itemOriginal.nome}.`);
            }
            novaQtd -= qtdMovimento;
        }

        const itemParaSalvar = {
            ...itemOriginal,
            nome: itemOriginal.nome,
            categoria: itemOriginal.categoria,
            quantidade: novaQtd,
            qtd_defeito: novaQtdDefeito,
            minimo: itemOriginal.minimo || 0,
            dataAtualizacao: new Date().toISOString(),
            ultimo_responsavel: responsavel
        };

        const estoqueAntes = parseInt(itemOriginal.quantidade) || 0;

        await dbSalvarItemEstoque(itemParaSalvar, idItem, { recalcular: false });
        await dbSalvarHistoricoBalanco({
            responsavel:   responsavel,
            registradoPor: String(localStorage.getItem('usuarioLogado') || '').trim(),
            itemId:        idItem,
            itemNome:      itemOriginal.nome,
            categoria:     itemOriginal.categoria || 'produto',
            tipo:          modo === 'saida' ? 'saida_estoque' : 'entrada_estoque',
            origemRegistro: modo === 'saida' ? 'retirada_estoque' : 'entrada_estoque',
            itemChave:     idItem,
            movimento:     modo === 'saida' ? qtdMovimento : -qtdMovimento,
            descricao:     modo === 'saida' ? 'Retirada de estoque' : 'Devolução ao estoque',
            refId:         idItem,
            controlarPosse: responsavel !== 'Fornecedor' && responsavel !== 'Máquina',
            isDefeitoEntry,
            qtdDefeitoConsumida,
            estoqueAntes,
            estoqueDepois: novaQtd
        }, { recalcular: false });

        mapaEstoque.set(idItem, { ...itemParaSalvar, firebaseUrl: idItem });
        const idx = listaGlobal.findIndex(i => i.firebaseUrl === idItem);
        if (idx >= 0) listaGlobal[idx] = { ...itemParaSalvar, firebaseUrl: idItem };
        return novaQtd;
    }

    function definirEstadoSalvando(ativo) {
        const btn = document.getElementById('btnAcao');
        if (!btn) return;
        btn.disabled = ativo;
        btn.classList.toggle('salvando', ativo);
        if (ativo) {
            btn.dataset.textoOriginal = btn.textContent;
            btn.innerHTML = '<span class="btn-spinner"></span><span>Salvando...</span>';
            return;
        }
        btn.textContent = btn.dataset.textoOriginal || (modoAtual === 'saida' ? 'CONFIRMAR SAÍDA' : 'CONFIRMAR ENTRADA');
    }

    window.salvarMovimentacao = async function() {
        if (salvandoMovimentacao) return;
        if (document.getElementById('qtdInput').value.trim()) {
            if (!adicionarPendenteAtual()) return;
        }
        if (itensPendentes.length === 0) return alert("Adicione ao menos um item.");

        try {
            salvandoMovimentacao = true;
            definirEstadoSalvando(true);
            const mapaEstoque = new Map(listaGlobal.map(item => [item.firebaseUrl, { ...item }]));
            let ultimoSaldo = 0;
            for (const pendente of itensPendentes) {
                ultimoSaldo = await salvarItemMovimentacaoPendente(pendente, mapaEstoque);
            }
            await dbRecalcularRemuneracoes();

            const totalSalvo = itensPendentes.length;
            itensPendentes = [];
            renderizarPendentes();
            document.getElementById('qtdInput').value = '';
            filtrarItens();
            alert(totalSalvo === 1 ? "Sucesso! Novo saldo: " + ultimoSaldo : `${totalSalvo} itens salvos com sucesso.`);
        } catch (error) {
            alert("Erro ao salvar. Detalhe: " + (error?.message || 'desconhecido'));
            console.error(error);
        } finally {
            salvandoMovimentacao = false;
            definirEstadoSalvando(false);
        }
    };

    const qtdInput = document.getElementById('qtdInput');
    qtdInput.addEventListener('input', () => {
        const apenasNumeros = qtdInput.value.replace(/\D/g, '');
        if (!apenasNumeros) {
            qtdInput.value = '';
            if (timerAdicionarPendente) clearTimeout(timerAdicionarPendente);
            timerAdicionarPendente = null;
            return;
        }
        qtdInput.value = Number(apenasNumeros).toLocaleString('pt-BR');
        agendarAdicionarPendenteAtual();
    });
    qtdInput.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        adicionarPendenteAtual();
    });
    qtdInput.addEventListener('blur', () => {
        if (!qtdInput.value.trim()) return;
        adicionarPendenteAtual({ silencioso: true });
    });
    document.getElementById('selectItem').addEventListener('change', tentarAdicionarPendenteSeCompleto);
    document.getElementById('responsavel').addEventListener('change', tentarAdicionarPendenteSeCompleto);

    // ── ITENS DO ESTOQUE ──

    let categoriaAtualLinhasMovimentacao = '';

    function obterItensDaCategoriaAtual() {
        const categoriaSelecionada = document.getElementById('filtroCategoria').value;
        return listaGlobal.filter(item => item.categoria === categoriaSelecionada);
    }

    function obterLinhasMovimentacao() {
        return Array.from(document.querySelectorAll('#containerMovimentacaoItens .linha-movimentacao'));
    }

    function linhaMovimentacaoVazia(linha) {
        if (!linha) return false;
        const item = (linha.querySelector('.input-mov-item')?.value || '').trim();
        const qtd = (linha.querySelector('.input-mov-qtd')?.value || '').trim();
        return !item && !qtd;
    }

    function normalizarLinhasMovimentacao() {
        let encontrouVazia = false;
        obterLinhasMovimentacao().forEach(linha => {
            if (!linhaMovimentacaoVazia(linha)) return;
            if (!encontrouVazia) {
                encontrouVazia = true;
                return;
            }
            linha.remove();
        });
    }

    window.atualizarOpcoesMovimentacao = function(selectAlterado = null) {
        normalizarLinhasMovimentacao();
        const selects = document.querySelectorAll('#containerMovimentacaoItens .input-mov-item');
        const selecionados = Array.from(selects).map(select => select.value).filter(Boolean);
        const itens = obterItensDaCategoriaAtual();

        selects.forEach(select => {
            const valorAtual = select.value;
            let opcoesHTML = '<option value="">Item</option>';

            itens.forEach(item => {
                if (item.firebaseUrl === valorAtual || !selecionados.includes(item.firebaseUrl)) {
                    opcoesHTML += `<option value="${item.firebaseUrl}">${item.nome}</option>`;
                }
            });

            select.innerHTML = opcoesHTML;
            select.value = valorAtual;
        });

        mostrarSaldoAtual(selectAlterado);
    };

    window.adicionarLinhaMovimentacao = function(inputAnterior = null, valorItem = '', valorQtd = '') {
        const container = document.getElementById('containerMovimentacaoItens');
        if (!container) return;
        if (inputAnterior && inputAnterior.value.trim() === '') return;

        const linhas = obterLinhasMovimentacao();
        if (!valorItem && !valorQtd && linhas.length > 0) {
            const ultimaLinha = linhas[linhas.length - 1];
            const ultimoItem = ultimaLinha.querySelector('.input-mov-item')?.value || '';
            const ultimaQtd = ultimaLinha.querySelector('.input-mov-qtd')?.value || '';
            if (!ultimoItem && !ultimaQtd) return;
        }

        const linha = document.createElement('div');
        linha.className = 'linha-movimentacao';
        linha.innerHTML = `
            <select class="input-mov-item" onchange="atualizarOpcoesMovimentacao(this)"></select>
            <input type="text" inputmode="numeric" class="input-mov-qtd" placeholder="Qtd" onfocus="mostrarSaldoAtualDaLinha(this)" onclick="mostrarSaldoAtualDaLinha(this)" oninput="this.value = this.value.replace(/[^0-9]/g, ''); mostrarSaldoAtualDaLinha(this); adicionarLinhaMovimentacao(this)">
        `;

        container.appendChild(linha);
        atualizarOpcoesMovimentacao();
        if (valorItem) linha.querySelector('.input-mov-item').value = valorItem;
        if (valorQtd) linha.querySelector('.input-mov-qtd').value = valorQtd;
        normalizarLinhasMovimentacao();
        atualizarOpcoesMovimentacao();
    };

    window.filtrarItens = function() {
        renderizarResponsaveis();
        const categoriaSelecionada = document.getElementById('filtroCategoria').value;
        const container = document.getElementById('containerMovimentacaoItens');
        if (!container) return;

        if (categoriaAtualLinhasMovimentacao !== categoriaSelecionada) {
            categoriaAtualLinhasMovimentacao = categoriaSelecionada;
            container.innerHTML = '';
        }

        if (!categoriaSelecionada) {
            mostrarSaldoAtual();
            return;
        }

        if (obterLinhasMovimentacao().length === 0) adicionarLinhaMovimentacao();
        atualizarOpcoesMovimentacao();
    };

    window.mostrarSaldoAtualDaLinha = function(elemento) {
        const linha = elemento?.closest?.('.linha-movimentacao');
        const select = linha?.querySelector('.input-mov-item') || elemento;
        mostrarSaldoAtual(select);
    };

    window.mostrarSaldoAtual = function(selectOrigem = null) {
        const saldoBox = document.getElementById('saldoBox');
        const select = selectOrigem || document.querySelector('#containerMovimentacaoItens .input-mov-item');
        const idItem = select?.value || '';
        const item = listaGlobal.find(i => i.firebaseUrl === idItem);

        if (!item) {
            saldoBox.style.display = 'none';
            return;
        }

        const qtdBoa = parseInt(item.quantidade || 0, 10);
        const qtdDefeito = parseInt(item.qtd_defeito || 0, 10);
        if (item.categoria === 'peca' && qtdDefeito > 0) {
            const total = qtdBoa + qtdDefeito;
            document.getElementById('textoSaldo').innerHTML =
                `<span class="saldo-total-disc">Total ${total}</span>` +
                `<span class="saldo-defeito-label">&#9888; Defeito <span class="saldo-defeito-num">${qtdDefeito}</span></span>` +
                `<span class="destaque-qtd">${qtdBoa}</span>`;
        } else {
            document.getElementById('textoSaldo').innerHTML = `<span class="destaque-qtd">${qtdBoa}</span>`;
        }
        saldoBox.style.display = 'flex';
    };

    function coletarMovimentacoesDasLinhas() {
        const linhas = obterLinhasMovimentacao()
            .map((linha, index) => {
                const idItem = (linha.querySelector('.input-mov-item')?.value || '').trim();
                const qtdRaw = (linha.querySelector('.input-mov-qtd')?.value || '').trim();
                const qtdMovimento = parseInt(qtdRaw, 10) || 0;
                return { index, idItem, qtdRaw, qtdMovimento };
            })
            .filter(item => item.idItem || item.qtdRaw);

        if (linhas.length === 0) throw new Error('Informe ao menos um item.');

        const incompletas = linhas.filter(item => !item.idItem || item.qtdMovimento <= 0);
        if (incompletas.length > 0) {
            const posicoes = incompletas.map(item => item.index + 1).join(', ');
            throw new Error(`Complete item e quantidade nas linhas: ${posicoes}.`);
        }

        return linhas;
    }

    window.salvarMovimentacao = async function() {
        if (salvandoMovimentacao) return;
        const responsavel = document.getElementById('responsavel').value;
        if (!responsavel) return alert("Selecione o responsável.");

        let linhas;
        try {
            linhas = coletarMovimentacoesDasLinhas();
        } catch (erro) {
            return alert(erro.message);
        }

        try {
            salvandoMovimentacao = true;
            definirEstadoSalvando(true);
            const mapaEstoque = new Map(listaGlobal.map(item => [item.firebaseUrl, { ...item }]));
            let ultimoSaldo = 0;
            for (const linha of linhas) {
                ultimoSaldo = await salvarItemMovimentacaoPendente({
                    idItem: linha.idItem,
                    qtdMovimento: linha.qtdMovimento,
                    responsavel,
                    modo: modoAtual
                }, mapaEstoque);
            }
            await dbRecalcularRemuneracoes();

            document.getElementById('containerMovimentacaoItens').innerHTML = '';
            categoriaAtualLinhasMovimentacao = '';
            filtrarItens();
            alert(linhas.length === 1 ? "Sucesso! Novo saldo: " + ultimoSaldo : `${linhas.length} itens salvos com sucesso.`);
        } catch (error) {
            alert("Erro ao salvar. Detalhe: " + (error?.message || 'desconhecido'));
            console.error(error);
        } finally {
            salvandoMovimentacao = false;
            definirEstadoSalvando(false);
        }
    };

    function atualizarBotaoItens() {
        const btn = document.getElementById('btnToggleItens');
        if (!btn) return;
        btn.classList.toggle('aberto', itensVisivelEstoque);
        btn.setAttribute('aria-expanded', itensVisivelEstoque ? 'true' : 'false');
        const total = listaGlobal.length;
        const badgeTexto = total > 0 ? total : '';
        btn.innerHTML = `
            <span class="titulo-hist-olho"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg></span>
            <span class="titulo-hist-info">
                <span class="titulo-hist-label">
                    Itens do Estoque
                    ${badgeTexto ? `<span class="titulo-hist-badge">${badgeTexto}</span>` : ''}
                </span>
                <span class="titulo-hist-subtexto">${itensVisivelEstoque ? 'Toque para ocultar' : 'Toque para ver todos os itens'}</span>
            </span>
            <span class="titulo-hist-seta">
                <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
        `;
    }

    window.toggleItens = function() {
        itensVisivelEstoque = !itensVisivelEstoque;

        // Fecha histórico se estiver abrindo os itens
        if (itensVisivelEstoque && historicoVisivel) {
            historicoVisivel = false;
            filtroHistoricoEl.classList.add('oculto');
            listaHistoricoEl.classList.add('oculto');
            atualizarBotaoHistorico();
        }

        document.getElementById('conteudoItens').classList.toggle('oculto', !itensVisivelEstoque);
        atualizarBotaoItens();
        if (itensVisivelEstoque) {
            filtrarItensLista();
            atualizarVisualFiltrosItens();
        }
    };

    function atualizarVisualFiltrosItens() {
        document.querySelectorAll('.filtro-est').forEach(label => {
            const input = label.querySelector('.filtro-tipo-est');
            label.classList.toggle('ativo', !!input?.checked);
        });
    }

    window.selecionarFiltroTipo = function(cb) {
        document.querySelectorAll('.filtro-tipo-est').forEach(el => { el.checked = false; });
        cb.checked = true;
        filtrarItensLista();
    };

    window.filtrarItensLista = function() {
        if (!itensVisivelEstoque) return;
        const termo = document.getElementById('filtroItens').value.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        const tiposMarcados = Array.from(document.querySelectorAll('.filtro-tipo-est:checked')).map(cb => cb.value);
        const filtrados = listaGlobal.filter(item => {
            const nome = item.nome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            if (!nome.includes(termo)) return false;
            return termo ? true : tiposMarcados.includes(item.categoria);
        });
        renderizarItensEstoque(filtrados);
        atualizarVisualFiltrosItens();
    };

    function renderizarItensEstoque(lista) {
        const container = document.getElementById('listaItens');
        container.innerHTML = '';
        if (lista.length === 0) {
            container.innerHTML = '<p style="text-align:center; font-size:11px; opacity:0.5;">Nenhum item encontrado.</p>';
            return;
        }
        lista.forEach(item => {
            let classeCor = 'bg-produtos-est', nomeCat = 'Produto';
            if (item.categoria === 'maquina') { classeCor = 'bg-maquina-est'; nomeCat = 'Máquina'; }
            if (item.categoria === 'peca')    { classeCor = 'bg-peca-est';    nomeCat = 'Peça'; }
            if (item.categoria === 'materiais') { classeCor = 'bg-materiais-est'; nomeCat = 'Materiais'; }
            const div = document.createElement('div');
            div.className = 'card-est';
            const qtdDefeito = parseInt(item.qtd_defeito) || 0;
            const qtdBoa = parseInt(item.quantidade) || 0;
            const rodapeQtd = (item.categoria === 'peca' && qtdDefeito > 0)
                ? `<div style="display:flex;align-items:center;gap:8px;">
                       <span class="saldo-defeito-label" style="font-size:11px;">&#9888; <span class="saldo-defeito-num">${qtdDefeito}</span></span>
                       <div class="qtd-est">${qtdBoa}</div>
                   </div>`
                : `<div class="qtd-est">${qtdBoa}</div>`;

            div.innerHTML = `
                <div class="card-est-topo">
                    <span class="card-est-nome">${item.nome}</span>
                    <span class="badge-est ${classeCor}">${nomeCat}</span>
                </div>
                <div class="card-est-rodape">
                    <span class="card-est-minimo">Mínimo: ${item.minimo || 0}</span>
                    ${rodapeQtd}
                </div>
            `;
            container.appendChild(div);
        });
    }

    atualizarBotaoItens();

    // --- FUNÇÕES DE CORREÇÃO (EDITAR/EXCLUIR ÚLTIMO) ---

    // Reverte o estoque e apaga o histórico
    function definirEstadoExcluindo(botao, ativo) {
        if (!botao) return;
        botao.disabled = ativo;
        botao.classList.toggle('salvando', ativo);
        if (ativo) {
            botao.dataset.textoOriginal = botao.textContent;
            botao.innerHTML = '<span class="btn-spinner"></span><span>...</span>';
            return;
        }
        botao.textContent = botao.dataset.textoOriginal || 'EXCLUIR';
    }

    window.excluirUltimo = async function(movString, botao = null) {
        if (botao?.disabled) return;
        if(!(await window.playConfirm("Deseja desfazer essa movimentação? O saldo do estoque será revertido."))) return;
        
        const mov = JSON.parse(decodeURIComponent(movString));
        // Precisamos encontrar o item no estoque atual para atualizar o saldo
        const itemEstoque = listaGlobal.find(i => i.firebaseUrl === mov.refId);

        if(!itemEstoque) {
            alert("Erro: O item associado não existe mais no estoque.");
            return;
        }

        let novaQtd = parseInt(itemEstoque.quantidade);
        let novaQtdDefeito = parseInt(itemEstoque.qtd_defeito) || 0;
        const isPecaRev = itemEstoque.categoria === 'peca';

        const ehEntradaHistorico = mov.tipo === 'entrada_estoque';
        const qtdMovimento = Math.abs(Number(mov.movimento ?? 0) || 0);

        if (isPecaRev && ehEntradaHistorico) {
            if (mov.isDefeitoEntry) {
                // Desfaz entrada defeituosa: remove do defeito
                novaQtdDefeito -= qtdMovimento;
            } else {
                // Desfaz entrada boa: restaura defeitos consumidos e remove do bom
                novaQtdDefeito += parseInt(mov.qtdDefeitoConsumida || 0);
                novaQtd -= qtdMovimento - parseInt(mov.qtdDefeitoConsumida || 0);
            }
        } else if (ehEntradaHistorico) {
            novaQtd -= qtdMovimento;
        } else {
            novaQtd += qtdMovimento;
        }

        try {
            definirEstadoExcluindo(botao, true);
            // 1. Atualiza Estoque
            await dbSalvarItemEstoque({ ...itemEstoque, quantidade: novaQtd, qtd_defeito: novaQtdDefeito }, mov.refId, { recalcular: false });
            
            // 2. Remove do histórico único e grava o cancelamento no próprio movimentacao_balanco_historico
            if(mov.firebaseUrl && mov.responsavel) {
               await dbExcluirHistoricoBalanco(mov.firebaseUrl, mov.responsavel, { recalcular: false });
               await dbRecalcularRemuneracoes();
            } else {
               alert("Erro de identificação do registro. Atualizando...");
               window.location.reload();
            }

        } catch (err) {
            alert("Erro ao desfazer. Detalhe: " + (err?.message || 'desconhecido'));
            console.error(err);
        } finally {
            definirEstadoExcluindo(botao, false);
        }
    };

</script>
