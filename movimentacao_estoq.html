<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação de Estoque</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:420px; padding:15px; box-sizing:border-box; min-height: 100vh; }
        
        /* Topo */
        .topo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; width: 100%; min-height: 45px; }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; position: absolute; right: 0; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Botões de Tipo de Movimento (Abas) */
        .tipo-movimento { display: flex; margin-bottom: 20px; background: rgba(0,0,0,0.2); border-radius: 30px; padding: 5px; }
        .btn-mov { flex: 1; padding: 12px; text-align: center; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; opacity: 0.6; font-size: 13px; }
        .btn-mov.ativo { opacity: 1; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .entrada.ativo { background: #4caf50; } /* Verde */
        .saida.ativo { background: #f44336; }   /* Vermelho */

        /* Card de Formulário */
        .card-form { background: rgba(255,255,255,0.07); padding: 20px; border-radius: 18px; border: 2px solid rgba(255,255,255,0.85); }

        /* Grade 2×2 dos campos */
        .card-grid {
            display: grid;
            grid-template-columns: 115px 1fr;
            gap: 6px 10px;
            margin-bottom: 16px;
        }
        .campo-form { display: flex; flex-direction: column; gap: 5px; }
        .campo-form label {
            font-size: 10px; font-weight: bold; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.45); text-transform: uppercase;
        }

        /* Separador entre as duas linhas */
        .card-separador {
            grid-column: 1 / -1;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 2px 0;
        }

        select, input {
            padding: 11px 8px;
            border-radius: 10px;
            border: 1.5px solid #bbb;
            background: white;
            color: #222;
            font-size: 15px;
            outline: none;
            height: 48px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Quantidade com leve destaque */
        .inp-qtd {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background: #fffde7;
            border-color: #f9a825;
        }

        /* Linha de Saldo Atual */
        .saldo-box {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .saldo-box-titulo {
            font-size: 10px; font-weight: bold; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4); text-transform: uppercase;
            white-space: nowrap;
        }
        .info-atual { font-size: 18px; color: rgba(255,235,59,0.85); font-weight: bold; }
        .destaque-qtd { color: rgba(255,235,59,0.85); font-weight: bold; font-size: 18px; }

        .btn-confirmar {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; color: white; cursor: pointer;
            letter-spacing: 0.5px; transition: 0.2s;
        }

        .label-pequena { font-size: 11px; color: #ccc; margin-bottom: 4px; display: block; margin-top: 10px; }

        /* Input de busca padronizado */
        .input-busca {
            width: 100%;
            margin-bottom: 14px;
            text-align: center;
            background: rgba(255,255,255,0.18) !important;
            color: white !important;
            border: 1.5px solid rgba(255,255,255,0.55) !important;
            box-sizing: border-box;
        }
        .input-busca::placeholder { color: rgba(255,255,255,0.65); }

        /* Seções */
        .secao-historico { margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; border-radius: 16px; transition: border 0.3s, padding 0.3s; }
        .secao-historico:has(.titulo-hist.aberto) { border: 3px solid rgba(76,175,80,0.75); padding: 15px; }

        .secao-itens:has(.titulo-hist.aberto) { border: 3px solid rgba(33,150,243,0.75); border-radius: 16px; padding: 15px; }

        @keyframes shimmer-btn {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 18px rgba(0,0,0,0.2), 0 0 0 0 rgba(255,235,59,0.0); }
            50%       { box-shadow: 0 4px 18px rgba(0,0,0,0.2), 0 0 0 6px rgba(255,235,59,0.18); }
        }
        @keyframes blink-eye {
            0%, 90%, 100% { transform: scaleY(1); }
            95%            { transform: scaleY(0.1); }
        }

        .titulo-hist {
            width: 100%;
            margin-bottom: 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,235,59,0.35);
            border-left: 4px solid #ffeb3b;
            border-radius: 14px;
            padding: 13px 15px 13px 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            animation: pulse-glow 2.8s ease-in-out infinite;
        }
        .titulo-hist::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(100deg, transparent 20%, rgba(255,235,59,0.09) 50%, transparent 80%);
            background-size: 200% 100%;
            animation: shimmer-btn 2.4s linear infinite;
            pointer-events: none;
        }
        .titulo-hist:hover {
            background: rgba(255,235,59,0.07);
            border-color: rgba(255,235,59,0.7);
            box-shadow: 0 6px 22px rgba(0,0,0,0.28);
        }
        .titulo-hist:active { transform: scale(0.985); }
        .titulo-hist:focus-visible {
            outline: 2px solid #ffeb3b;
            outline-offset: 3px;
        }
        /* Movimentações aberto — verde */
        .secao-historico .titulo-hist.aberto {
            background: rgba(76,175,80,0.07);
            border-color: rgba(76,175,80,0.55);
            border-left-color: #4caf50;
            animation: none;
        }
        .secao-historico .titulo-hist.aberto::before { display: none; }
        .secao-historico .titulo-hist.aberto .titulo-hist-olho {
            background: rgba(76,175,80,0.2);
            border-color: rgba(76,175,80,0.55);
        }
        .secao-historico .titulo-hist.aberto .titulo-hist-label { color: #81c784; }
        .secao-historico .titulo-hist.aberto .titulo-hist-seta { transform: rotate(180deg); }
        .secao-historico .titulo-hist.aberto .titulo-hist-seta svg { stroke: #81c784; }

        /* Itens aberto — azul */
        .secao-itens .titulo-hist.aberto {
            background: rgba(33,150,243,0.07);
            border-color: rgba(33,150,243,0.55);
            border-left-color: #2196f3;
            animation: none;
        }
        .secao-itens .titulo-hist.aberto::before { display: none; }
        .secao-itens .titulo-hist.aberto .titulo-hist-olho {
            background: rgba(33,150,243,0.2);
            border-color: rgba(33,150,243,0.55);
        }
        .secao-itens .titulo-hist.aberto .titulo-hist-label { color: #64b5f6; }
        .secao-itens .titulo-hist.aberto .titulo-hist-seta { transform: rotate(180deg); }
        .secao-itens .titulo-hist.aberto .titulo-hist-seta svg { stroke: #64b5f6; }

        /* Ícone olho */
        .titulo-hist-olho {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,235,59,0.15);
            border: 1.5px solid rgba(255,235,59,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            line-height: 1;
            transition: background 0.3s, border-color 0.3s;
        }
        .titulo-hist.aberto .titulo-hist-olho {
            background: rgba(76,175,80,0.2);
            border-color: rgba(76,175,80,0.55);
        }

        .titulo-hist-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
        .titulo-hist-label {
            font-size: 13px;
            font-weight: 800;
            color: #ffeb3b;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .titulo-hist-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ffeb3b;
            color: #1a1a2e;
            font-size: 10px;
            font-weight: 900;
            min-width: 20px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            letter-spacing: 0;
            text-transform: none;
        }
        .secao-historico .titulo-hist.aberto .titulo-hist-badge { background: #4caf50; color: #fff; }
        .secao-itens .titulo-hist.aberto .titulo-hist-badge { background: #2196f3; color: #fff; }
        .titulo-hist-subtexto {
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .titulo-hist.aberto .titulo-hist-subtexto { color: rgba(255,255,255,0.65); }

        /* Seta */
        .titulo-hist-seta {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.35s cubic-bezier(.4,0,.2,1), background 0.3s;
        }
        .titulo-hist-seta svg {
            width: 16px; height: 16px;
            stroke: rgba(255,235,59,0.9);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s;
        }
        .secao-historico .titulo-hist.aberto .titulo-hist-seta { background: rgba(76,175,80,0.15); }
        .secao-itens .titulo-hist.aberto .titulo-hist-seta { background: rgba(33,150,243,0.15); }
        .oculto { display: none; }
        .item-hist { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid; }
        .hist-esq { display: flex; flex-direction: column; gap: 2px; }
        .hist-dir { text-align: right; font-weight: bold; }
        
        .tag-entrada { color: #4caf50; font-weight: bold; }
        .tag-saida { color: #f44336; font-weight: bold; }
        
        /* [NOVO] Classes para controlar o tamanho da fonte da lista aqui */
        .hist-tipo-label { font-size: 20px; font-weight: bold; }
        .hist-nome-item { font-size: 18px; color: white; font-weight: bold; } /* <--- TAMANHO DO NOME DO PRODUTO */
        .hist-resp-label { font-size: 18px; }
        .hist-data { font-size: 15px; color: #999; } /* <--- TAMANHO DA DATA E HORA */
        .hist-obs-label { font-size: 18px; font-style: italic; color: #aaa; }
        .hist-dir { font-size: 25px; } /* <--- TAMANHO DA QUANTIDADE (Número) */

        /* Botões de Ação no Histórico */
        .acoes-hist { display: flex; gap: 20px; margin-top: 5px; justify-content: flex-end; width: 100%; }
        .btn-hist { font-size: 10px; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; }
        .btn-excluir-hist { background: #f44336; color: white; }

        /* ── Seção Itens do Estoque ── */
        .secao-itens { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; padding-bottom: 40px; }
        .card-est {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 11px 13px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .card-est-topo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .card-est-nome {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.01em;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .badge-est {
            display: inline-block;
            padding: 5px 13px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        .bg-maquina-est { background: #9c27b0; }
        .bg-produtos-est { background: #4caf50; }
        .bg-peca-est { background: #ff9800; }
        .bg-materiais-est { background: #00acc1; }
        .card-est-rodape {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
        }
        .card-est-minimo {
            font-size: 11px;
            color: #888;
        }
        .qtd-est {
            font-size: 26px;
            font-weight: 900;
            color: #ffeb3b;
            text-align: center;
            background: rgba(255,235,59,0.1);
            border: 1px solid rgba(255,235,59,0.28);
            padding: 4px 14px;
            border-radius: 8px;
            min-width: 48px;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        .filtros-est {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: nowrap;
        }
        .filtro-est {
            cursor: pointer;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 4px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            font-weight: bold;
            font-size: 11px;
            transition: 0.15s;
        }
        .filtro-est .f-icon { font-size: 18px; line-height: 1; }
        .filtro-est .f-label { color: #ffffff; }
        .filtro-est.ativo { background: rgba(255,235,59,0.18); border-color: rgba(255,235,59,0.52); }
        .filtro-est input { display: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Movimentação</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="tipo-movimento">
        <div id="tabSaida" class="btn-mov saida ativo" onclick="mudarModo('saida')">SAÍDA (-)</div>
        <div id="tabEntrada" class="btn-mov entrada" onclick="mudarModo('entrada')">ENTRADA (+)</div>
    </div>

    <div class="card-form">
        <div class="card-grid">
            <div class="campo-form">
                <label>Tipo</label>
                <select id="filtroCategoria" onchange="filtrarItens()">
                    <option value="">Tipo</option>
                    <option value="maquina">Máquina</option>
                    <option value="peca">Peça</option>
                    <option value="produtos">Produtos</option>
                    <option value="materiais">Materiais</option>
                </select>
            </div>
            <div class="campo-form">
                <label>Item</label>
                <select id="selectItem" onchange="mostrarSaldoAtual()">
                    <option value="">Item</option>
                </select>
            </div>

            <div class="card-separador"></div>

            <div class="campo-form">
                <label>Quantidade</label>
                <input type="number" id="qtdInput" class="inp-qtd" placeholder="0" min="1">
            </div>
            <div class="campo-form">
                <label>Responsável</label>
                <select id="responsavel">
                    <option value="">Selecione...</option>
                </select>
            </div>
        </div>

        <div class="saldo-box" id="saldoBox" style="display:none;">
            <div class="saldo-box-titulo">Saldo Atual</div>
            <div class="info-atual" id="textoSaldo">—</div>
        </div>

        <button class="btn-confirmar" id="btnAcao" style="background:#f44336;" onclick="salvarMovimentacao()">CONFIRMAR SAÍDA</button>
    </div>

    <div class="secao-historico">
        <div class="titulo-hist">Últimas Movimentações</div>
        <input type="text" id="filtroHistorico" class="input-busca" placeholder="Pesquisar no histórico..." oninput="filtrarHistorico()">
        <div id="listaHistorico">
            <p style="text-align:center; font-size:11px; opacity:0.5;">Carregando...</p>
        </div>
    </div>

    <div class="secao-itens">
        <div class="titulo-hist" id="btnToggleItens" role="button" tabindex="0" aria-expanded="false"
             onclick="toggleItens()"
             onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleItens();}">
        </div>
        <div id="conteudoItens" class="oculto">
            <input type="text" id="filtroItens" class="input-busca" placeholder="Buscar item no estoque..." oninput="filtrarItensLista()">
            <div class="filtros-est">
                <label class="filtro-est"><input type="checkbox" class="filtro-tipo-est" value="produtos" checked onclick="selecionarFiltroTipo(this)"><span class="f-icon">🟢</span><span class="f-label">Produtos</span></label>
                <label class="filtro-est"><input type="checkbox" class="filtro-tipo-est" value="peca" onclick="selecionarFiltroTipo(this)"><span class="f-icon">🟠</span><span class="f-label">Peças</span></label>
                <label class="filtro-est"><input type="checkbox" class="filtro-tipo-est" value="maquina" onclick="selecionarFiltroTipo(this)"><span class="f-icon">🟣</span><span class="f-label">Máquinas</span></label>
                <label class="filtro-est"><input type="checkbox" class="filtro-tipo-est" value="materiais" onclick="selecionarFiltroTipo(this)"><span class="f-icon">🔵</span><span class="f-label">Materiais</span></label>
            </div>
            <div id="listaItens"></div>
        </div>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbEscutarEstoque, dbSalvarItemEstoque, dbEscutarColaboradores, dbSalvarHistorico, dbEscutarHistorico, dbExcluirHistorico, dbSalvarAtendimento } from './database.js';

    let listaGlobal = [];
    let historicoGlobal = [];
    let colabsGlobal = [];
    let modoAtual = 'saida';
    let historicoVisivel = false;
    let itensVisivelEstoque = false;

    const tituloHistorico = document.querySelector('.titulo-hist');
    const filtroHistoricoEl = document.getElementById('filtroHistorico');
    const listaHistoricoEl = document.getElementById('listaHistorico');

    function atualizarBotaoHistorico() {
        tituloHistorico.classList.toggle('aberto', historicoVisivel);
        tituloHistorico.setAttribute('aria-expanded', historicoVisivel ? 'true' : 'false');
        const total = historicoGlobal.length;
        const badgeTexto = total > 0 ? total : '';
        tituloHistorico.innerHTML = `
            <span class="titulo-hist-olho"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg></span>
            <span class="titulo-hist-info">
                <span class="titulo-hist-label">
                    Movimentações
                    ${badgeTexto ? `<span class="titulo-hist-badge">${badgeTexto}</span>` : ''}
                </span>
                <span class="titulo-hist-subtexto">${historicoVisivel ? 'Toque para ocultar' : 'Toque para ver todas as movimentações'}</span>
            </span>
            <span class="titulo-hist-seta">
                <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
        `;
    }

    tituloHistorico.id = 'btnToggleHistorico';
    tituloHistorico.setAttribute('role', 'button');
    tituloHistorico.tabIndex = 0;
    tituloHistorico.onclick = () => window.toggleHistorico();
    tituloHistorico.onkeydown = (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            window.toggleHistorico();
        }
    };

    filtroHistoricoEl.classList.add('oculto');
    listaHistoricoEl.classList.add('oculto');
    atualizarBotaoHistorico();

    // 1. CARREGAR ITENS DO BANCO
    dbEscutarEstoque((lista) => {
        listaGlobal = lista;
        filtrarItens();
        atualizarBotaoItens();
        if (itensVisivelEstoque) filtrarItensLista();
    });

    // [NOVO] CARREGAR HISTÓRICO
    dbEscutarHistorico((lista) => {
        historicoGlobal = lista.reverse();
        atualizarBotaoHistorico();
        filtrarHistorico();
    });

    window.toggleHistorico = function() {
        historicoVisivel = !historicoVisivel;

        // Fecha itens se estiver abrindo o histórico
        if (historicoVisivel && itensVisivelEstoque) {
            itensVisivelEstoque = false;
            document.getElementById('conteudoItens').classList.add('oculto');
            atualizarBotaoItens();
        }

        filtroHistoricoEl.classList.toggle('oculto', !historicoVisivel);
        listaHistoricoEl.classList.toggle('oculto', !historicoVisivel);
        atualizarBotaoHistorico();

        if (historicoVisivel) {
            filtrarHistorico();
        }
    };

    window.filtrarHistorico = function() {
        if (!historicoVisivel) return;

        const termo = document.getElementById('filtroHistorico').value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const listaFiltrada = historicoGlobal.filter(mov => {
            const texto = (mov.itemNome + " " + mov.responsavel + " " + mov.tipo + " " + (mov.obs || "")).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            return texto.includes(termo);
        });
        renderizarHistorico(listaFiltrada);
    };

    function renderizarHistorico(lista) {
        const container = document.getElementById('listaHistorico');
        container.innerHTML = "";

        if(lista.length === 0) {
            container.innerHTML = '<p style="text-align:center; font-size:11px; opacity:0.5;">Nenhum registro encontrado.</p>';
            return;
        }

        lista.forEach((mov, index) => {
            const classeCor = mov.tipo === 'entrada' ? 'tag-entrada' : 'tag-saida';
            const textoTipo = mov.tipo === 'entrada' ? 'ENTRADA' : 'SAÍDA';
            
            const dataObj = new Date(mov.data);
            const dataFormatada = dataObj.toLocaleString('pt-BR');
            
            const div = document.createElement('div');
            div.className = 'item-hist';
            div.style.flexDirection = 'column';
            div.style.alignItems = 'stretch';
            div.style.borderColor = mov.tipo === 'entrada' ? 'rgba(76,175,80,0.6)' : 'rgba(244,67,54,0.6)';

            div.innerHTML = `
                <div style="text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 8px;">
                    <span class="hist-tipo-label" style="color:${mov.tipo === 'entrada' ? '#4caf50' : '#f44336'}">${textoTipo}</span>
                    <span style="font-size: 13px; color: #ccc; margin-left: 6px;">${dataFormatada}</span>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="hist-esq">
                        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                            <span class="hist-nome-item">${mov.itemNome}</span>
                            <span class="hist-resp-label" style="color:rgba(255,255,255,0.7);">· ${mov.responsavel}</span>
                        </div>
                        ${mov.registradoPor && mov.registradoPor !== mov.responsavel ? `<span class="hist-resp-label" style="color:rgba(255,255,255,0.55);">Reg. por: ${mov.registradoPor}</span>` : ''}
                        ${mov.obs ? `<span class="hist-obs-label">Obs: ${mov.obs}</span>` : ''}
                    </div>
                    <div class="hist-dir ${classeCor}">
                        ${mov.qtd}
                    </div>
                </div>
            `;

            // Botão excluir: só para quem registrou e dentro de 3 horas
            const usuarioAtual = String(localStorage.getItem('usuarioLogado') || '').trim();
            const foiRegistradoPorMim = mov.registradoPor
                ? mov.registradoPor === usuarioAtual
                : mov === historicoGlobal[0]; // registros antigos sem campo: mantém comportamento original
            const dentroDe3h = (Date.now() - new Date(mov.data).getTime()) < 3 * 60 * 60 * 1000;

            if (foiRegistradoPorMim && dentroDe3h) {
                const divAcoes = document.createElement('div');
                divAcoes.className = 'acoes-hist';
                const movString = encodeURIComponent(JSON.stringify(mov));
                divAcoes.innerHTML = `
                    <button class="btn-hist btn-excluir-hist" onclick="excluirUltimo('${movString}')">EXCLUIR</button>
                `;
                div.appendChild(divAcoes);
            }

            container.appendChild(div);
        });
    }

    // [NOVO] CARREGAR COLABORADORES PARA O DROPDOWN
    dbEscutarColaboradores((colabs) => {
        colabsGlobal = colabs;
        renderizarResponsaveis();
    });

    function renderizarResponsaveis() {
        const select = document.getElementById('responsavel');
        select.innerHTML = '<option value="">Responsável</option>';
        
        // Adiciona "Fornecedor" e usuário logado apenas se for ENTRADA
        if (modoAtual === 'entrada') {
            const optForn = document.createElement('option');
            optForn.value = "Fornecedor";
            optForn.innerText = "Fornecedor";
            select.appendChild(optForn);

            const nomeLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
            if (nomeLogado) {
                const optUser = document.createElement('option');
                optUser.value = nomeLogado;
                optUser.innerText = nomeLogado;
                select.appendChild(optUser);
            }
        }

        // Filtra apenas colaboradores que tenham "atendimento" no perfil
        const listaFiltrada = colabsGlobal.filter(c => c.nivel_completo && c.nivel_completo.includes('atendimento'));

        listaFiltrada.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.nome; // Salva o nome do colaborador
            opt.innerText = c.nome;
            select.appendChild(opt);
        });
    }

    // 2. FILTRAR ITENS POR CATEGORIA
    window.filtrarItens = function() {
        const categoriaSelecionada = document.getElementById('filtroCategoria').value;
        const selectItem = document.getElementById('selectItem');
        const valorAnterior = selectItem.value;

        selectItem.innerHTML = '<option value="">Item</option>';

        if (!categoriaSelecionada) {
            mostrarSaldoAtual();
            return;
        }

        const itensFiltrados = listaGlobal.filter(item => item.categoria === categoriaSelecionada);

        if (itensFiltrados.length === 0) {
            mostrarSaldoAtual();
            return;
        }

        itensFiltrados.forEach(item => {
            const option = document.createElement('option');
            option.value = item.firebaseUrl;
            option.innerText = item.nome;
            option.dataset.qtdAtual = item.quantidade || 0;
            selectItem.appendChild(option);
        });

        if (valorAnterior && [...selectItem.options].some(o => o.value === valorAnterior)) {
            selectItem.value = valorAnterior;
        }

        mostrarSaldoAtual();
    };

    // 3. MOSTRAR SALDO
    window.mostrarSaldoAtual = function() {
        const select = document.getElementById('selectItem');
        const itemSelecionado = select.options[select.selectedIndex];
        const saldoBox = document.getElementById('saldoBox');

        if (itemSelecionado && itemSelecionado.value) {
            const qtd = itemSelecionado.dataset.qtdAtual;
            document.getElementById('textoSaldo').innerHTML = `<span class="destaque-qtd">${qtd}</span>`;
            saldoBox.style.display = 'flex';
        } else {
            saldoBox.style.display = 'none';
        }
    };

    // 4. MUDAR MODO
    window.mudarModo = function(modo) {
        modoAtual = modo;
        const btn = document.getElementById('btnAcao');
        
        if (modo === 'entrada') {
            document.getElementById('tabEntrada').classList.add('ativo');
            document.getElementById('tabSaida').classList.remove('ativo');
            btn.innerText = "CONFIRMAR ENTRADA";
            btn.style.background = "#4caf50";
        } else {
            document.getElementById('tabSaida').classList.add('ativo');
            document.getElementById('tabEntrada').classList.remove('ativo');
            btn.innerText = "CONFIRMAR SAÍDA";
            btn.style.background = "#f44336";
        }
        renderizarResponsaveis(); // Atualiza a lista para mostrar/esconder "Fornecedor"
    };

    // 5. ATUALIZAR ESTOQUE NO BANCO
    window.salvarMovimentacao = async function() {
        const idItem = document.getElementById('selectItem').value;
        const qtdMovimento = parseInt(document.getElementById('qtdInput').value);
        const responsavel = document.getElementById('responsavel').value;
        if (!idItem) return alert("Selecione um item.");
        if (isNaN(qtdMovimento) || qtdMovimento <= 0) return alert("Informe a quantidade.");
        if (!responsavel) return alert("Selecione o responsável.");

        const itemOriginal = listaGlobal.find(i => i.firebaseUrl === idItem);
        if (!itemOriginal) return alert("Erro ao localizar item.");

        let novaQtd = parseInt(itemOriginal.quantidade) || 0;

        if (modoAtual === 'entrada') {
            novaQtd += qtdMovimento;
        } else {
            if (qtdMovimento > novaQtd) {
                return alert("Quantidade insuficiente em estoque!");
            }
            novaQtd -= qtdMovimento;
        }

        // Criamos a cópia do objeto para atualizar no Firebase
        const itemParaSalvar = {
            nome: itemOriginal.nome,
            categoria: itemOriginal.categoria,
            quantidade: novaQtd,
            minimo: itemOriginal.minimo || 0,
            dataAtualizacao: new Date().toISOString(),
            // Salvamos quem mexeu por último para controle
            ultimo_responsavel: responsavel
        };

        // Objeto para o Histórico (Registro Eterno)
        const registroHistorico = {
            data: new Date().toISOString(),
            tipo: modoAtual,
            itemUrl: idItem,
            itemNome: itemOriginal.nome,
            // Guarda a categoria no histórico para o balanço saber se isso entra em produtos ou máquinas em posse.
            itemCategoria: itemOriginal.categoria || '',
            qtd: qtdMovimento,
            responsavel: responsavel,
            registradoPor: String(localStorage.getItem('usuarioLogado') || '').trim()
        };

        try {
            await dbSalvarItemEstoque(itemParaSalvar, idItem);
            await dbSalvarHistorico(registroHistorico);

            // Saída: registra no atendimento do responsável para aparecer em Meus Envios e no Balanço
            if (modoAtual === 'saida') {
                const registroEnvio = {
                    data: new Date().toISOString(),
                    atendente: responsavel,
                    autorizadoPor: String(localStorage.getItem('usuarioLogado') || '').trim(),
                    origemRegistro: 'retirada_estoque',
                    // Mantemos a categoria na raiz para telas como "Meus Envios" conseguirem rotular a retirada corretamente.
                    itemCategoria: itemOriginal.categoria || '',
                    cliente: { nome: 'Retirada de Estoque', numero: '' },
                    // Compatibilidade: várias telas antigas ainda leem retirada de estoque a partir de "produtos".
                    // Quando a estrutura for reorganizada no futuro, este ponto é o lugar certo para separar por tipo.
                    produtos: [{ nome: itemOriginal.nome, quantidade: qtdMovimento }]
                };
                await dbSalvarAtendimento(registroEnvio);
            }

            alert("Sucesso! Novo saldo: " + novaQtd);
            document.getElementById('qtdInput').value = "";
        } catch (error) {
            alert("Erro ao salvar.");
            console.error(error);
        }
    };

    // ── ITENS DO ESTOQUE ──

    function atualizarBotaoItens() {
        const btn = document.getElementById('btnToggleItens');
        if (!btn) return;
        btn.classList.toggle('aberto', itensVisivelEstoque);
        btn.setAttribute('aria-expanded', itensVisivelEstoque ? 'true' : 'false');
        const total = listaGlobal.length;
        const badgeTexto = total > 0 ? total : '';
        btn.innerHTML = `
            <span class="titulo-hist-olho"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg></span>
            <span class="titulo-hist-info">
                <span class="titulo-hist-label">
                    Itens do Estoque
                    ${badgeTexto ? `<span class="titulo-hist-badge">${badgeTexto}</span>` : ''}
                </span>
                <span class="titulo-hist-subtexto">${itensVisivelEstoque ? 'Toque para ocultar' : 'Toque para ver todos os itens'}</span>
            </span>
            <span class="titulo-hist-seta">
                <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
        `;
    }

    window.toggleItens = function() {
        itensVisivelEstoque = !itensVisivelEstoque;

        // Fecha histórico se estiver abrindo os itens
        if (itensVisivelEstoque && historicoVisivel) {
            historicoVisivel = false;
            filtroHistoricoEl.classList.add('oculto');
            listaHistoricoEl.classList.add('oculto');
            atualizarBotaoHistorico();
        }

        document.getElementById('conteudoItens').classList.toggle('oculto', !itensVisivelEstoque);
        atualizarBotaoItens();
        if (itensVisivelEstoque) {
            filtrarItensLista();
            atualizarVisualFiltrosItens();
        }
    };

    function atualizarVisualFiltrosItens() {
        document.querySelectorAll('.filtro-est').forEach(label => {
            const input = label.querySelector('.filtro-tipo-est');
            label.classList.toggle('ativo', !!input?.checked);
        });
    }

    window.selecionarFiltroTipo = function(cb) {
        document.querySelectorAll('.filtro-tipo-est').forEach(el => { el.checked = false; });
        cb.checked = true;
        filtrarItensLista();
    };

    window.filtrarItensLista = function() {
        if (!itensVisivelEstoque) return;
        const termo = document.getElementById('filtroItens').value.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        const tiposMarcados = Array.from(document.querySelectorAll('.filtro-tipo-est:checked')).map(cb => cb.value);
        const filtrados = listaGlobal.filter(item => {
            const nome = item.nome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            if (!nome.includes(termo)) return false;
            return termo ? true : tiposMarcados.includes(item.categoria);
        });
        renderizarItensEstoque(filtrados);
        atualizarVisualFiltrosItens();
    };

    function renderizarItensEstoque(lista) {
        const container = document.getElementById('listaItens');
        container.innerHTML = '';
        if (lista.length === 0) {
            container.innerHTML = '<p style="text-align:center; font-size:11px; opacity:0.5;">Nenhum item encontrado.</p>';
            return;
        }
        lista.forEach(item => {
            let classeCor = 'bg-produtos-est', nomeCat = 'Produto';
            if (item.categoria === 'maquina') { classeCor = 'bg-maquina-est'; nomeCat = 'Máquina'; }
            if (item.categoria === 'peca')    { classeCor = 'bg-peca-est';    nomeCat = 'Peça'; }
            if (item.categoria === 'materiais') { classeCor = 'bg-materiais-est'; nomeCat = 'Materiais'; }
            const div = document.createElement('div');
            div.className = 'card-est';
            div.innerHTML = `
                <div class="card-est-topo">
                    <span class="card-est-nome">${item.nome}</span>
                    <span class="badge-est ${classeCor}">${nomeCat}</span>
                </div>
                <div class="card-est-rodape">
                    <span class="card-est-minimo">Mínimo: ${item.minimo || 0}</span>
                    <div class="qtd-est">${item.quantidade}</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    atualizarBotaoItens();

    // --- FUNÇÕES DE CORREÇÃO (EDITAR/EXCLUIR ÚLTIMO) ---

    // Reverte o estoque e apaga o histórico
    window.excluirUltimo = async function(movString) {
        if(!(await window.playConfirm("Deseja desfazer essa movimentação? O saldo do estoque será revertido."))) return;
        
        const mov = JSON.parse(decodeURIComponent(movString));
        // Precisamos encontrar o item no estoque atual para atualizar o saldo
        const itemEstoque = listaGlobal.find(i => i.firebaseUrl === mov.itemUrl);

        if(!itemEstoque) {
            alert("Erro: O item associado não existe mais no estoque.");
            return;
        }

        let novaQtd = parseInt(itemEstoque.quantidade);

        // Lógica Inversa: Se foi Entrada, subtrai. Se foi Saída, soma.
        if(mov.tipo === 'entrada') {
            novaQtd -= parseInt(mov.qtd);
        } else {
            novaQtd += parseInt(mov.qtd);
        }

        try {
            // 1. Atualiza Estoque
            await dbSalvarItemEstoque({ ...itemEstoque, quantidade: novaQtd }, mov.itemUrl);
            
            // 2. Remove do Histórico (Precisamos que o database.js traga a chave firebaseUrl no histórico também)
            // NOTA IMPORTANTE: Como ajustamos o database.js para ler com Object.values, precisamos garantir que a chave venha.
            // Vou corrigir o database.js no próximo passo se necessário, mas aqui vamos assumir que 'mov' tem firebaseUrl.
            if(mov.firebaseUrl) {
               await dbExcluirHistorico(mov.firebaseUrl);
            } else {
               // Se por acaso não tiver ID, recarregamos para tentar pegar (fallback)
               alert("Erro de identificação do registro. Atualizando...");
               window.location.reload();
            }

        } catch (err) {
            alert("Erro ao desfazer.");
            console.error(err);
        }
    };

</script>
