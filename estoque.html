<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Estoque</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:420px; padding:15px; box-sizing:border-box; min-height: 100vh; }
        
        .topo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; width: 100%; min-height: 45px; }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; position: absolute; right: 0; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        .secao-lista { margin-bottom: 25px; padding-right: 5px; border-radius: 8px; }
        .subtitulo { font-size: 16px; color: #ffeb3b; margin-bottom: 12px; font-weight: bold; text-align: center; text-transform: uppercase; }
        
        .card-estoque { background: white; color: #333; border-radius: 12px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .info-estoque b { color: #042d86; font-size: 16px; display: block; }
        .info-estoque div { color: #666; font-size: 13px; font-weight: 500; }
        
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; color: white; margin-top: 5px;}
        .bg-maquina { background: #9c27b0; }
        .bg-produtos { background: #4caf50; }
        .bg-peca { background: #ff9800; }

        .qtd-destaque { font-size: 20px; font-weight: bold; color: #042d86; text-align: center; background: #f0f0f0; padding: 8px 15px; border-radius: 8px; min-width: 40px; }

        .acoes-card { display: flex; flex-direction: column; gap: 5px; margin-left: 12px; }
        .btn-editar-card { background: #e3f2fd; color: #1976d2; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center; border: 1px solid #1976d2; }
        .btn-excluir-card { background: #ffebee; color: #c62828; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center; border: 1px solid #c62828; }

        .divisor { border-top: 1px solid rgba(255,255,255,0.3); margin: 25px 0; position: relative; text-align: center; }
        .divisor span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #042d86; padding: 0 10px; font-size: 11px; color: #ffeb3b; }
        .form-container { display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
        .label-focada { font-size: 12px; color: #ffeb3b; font-weight: bold; margin-bottom: 4px; display: block; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255,255,255,0.05); color: white; box-sizing:border-box; font-size: 14px; outline: none; }
        input::placeholder { color: rgba(255,255,255,0.4); }
        select option { background: #042d86; color: white; }
        .btn-salvar { background:#4caf50; padding:14px; text-align:center; border-radius:30px; font-weight:bold; cursor:pointer; margin-top: 10px; border: none; color: white; width: 100%; font-size: 15px; transition: 0.3s; }

        /* Personalização do Campo de Busca (Branco e Centralizado) */
        #campoPesquisa {
            background: #fff; color: #333; width: 75%; display: block; margin: 0 auto 15px auto;
            padding: 8px;
        }
        #campoPesquisa::placeholder {
            color: #888;
        }

        /* Estilo para os filtros de checkbox */
        .filtros-container {
            position: sticky;
            top: 8px;
            z-index: 5;
            margin: 0 0 15px;
            padding: 8px;
            font-size: 13px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
            background: rgba(4, 45, 134, 0.92);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
        }
        .filtros-titulo { display: none; }
        .filtro-opcao {
            cursor: pointer;
            display: flex;
            flex: 1 1 0;
            align-items: center;
            justify-content: center;
            min-width: 0;
            padding: 10px 8px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            font-weight: bold;
            white-space: nowrap;
            transition: 0.15s ease;
        }
        .filtro-opcao.ativo {
            background: rgba(255,235,59,0.18);
            border-color: rgba(255,235,59,0.52);
            color: #fff2a8;
        }
        .filtro-opcao input { display: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Controle de Estoque</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="secao-lista">
        <div class="subtitulo">Itens Registrados</div>
        <input type="text" id="campoPesquisa" placeholder="🔍 Buscar item...">

        <div class="filtros-container">
            <div class="filtros-titulo">Mostrar no estoque</div>
            <label class="filtro-opcao"><input type="checkbox" class="filtro-tipo" value="produtos" checked onchange="aplicarFiltros()"> Produtos</label>
            <label class="filtro-opcao"><input type="checkbox" class="filtro-tipo" value="peca" onchange="aplicarFiltros()"> Peças</label>
            <label class="filtro-opcao"><input type="checkbox" class="filtro-tipo" value="maquina" onchange="aplicarFiltros()"> Máquinas</label>
        </div>

        <div id="containerEstoque">
            <p style='text-align:center; opacity:0.5; font-size:12px;'>Carregando itens...</p>
        </div>
    </div>

</div>

<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbEscutarEstoque } from './database.js';

    function formatarValorEquipamento(valor, categoria) {
        const numero = Number(valor || 0);
        if (!Number.isFinite(numero) || numero <= 0) return '';
        if (categoria === 'produtos') {
            return numero.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        return numero.toLocaleString('pt-BR');
    }

    function atualizarVisualFiltros() {
        document.querySelectorAll('.filtro-opcao').forEach((label) => {
            const input = label.querySelector('.filtro-tipo');
            label.classList.toggle('ativo', !!input?.checked);
        });
    }

    // [NOVO] LÓGICA DE FILTRAGEM UNIFICADA (Pesquisa + Checkboxes)
    window.aplicarFiltros = function() {
        const termo = document.getElementById('campoPesquisa').value.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        
        // Pega quais checkboxes estão marcados
        const tiposMarcados = Array.from(document.querySelectorAll('.filtro-tipo:checked')).map(cb => cb.value);

        const cards = document.querySelectorAll('.card-estoque');
        
        cards.forEach(card => {
            const nome = card.querySelector('.info-estoque b').innerText.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            const categoriaItem = card.dataset.categoria; // Pega a categoria salva no data-attribute

            // Exibe se: (Nome bate com pesquisa) E (Categoria está marcada nos checkboxes)
            const correspondePesquisa = nome.includes(termo);
            const correspondeTipo = tiposMarcados.includes(categoriaItem);

            card.style.display = (correspondePesquisa && correspondeTipo) ? 'flex' : 'none';
        });
        atualizarVisualFiltros();
    };

    // Aciona o filtro também ao digitar
    document.getElementById('campoPesquisa').addEventListener('input', aplicarFiltros);

    // 1. CARREGAR A LISTA DE ESTOQUE
    function carregarEstoque() {
        const container = document.getElementById('containerEstoque');
        
        dbEscutarEstoque((lista) => {
            container.innerHTML = "";
            if (lista.length === 0) {
                container.innerHTML = "<p style='text-align:center; opacity:0.5; font-size:12px;'>Estoque vazio.</p>";
                return;
            }

            lista.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'card-estoque';
                card.dataset.categoria = item.categoria; // Salva categoria oculta para facilitar o filtro
                
                let classeCor = "bg-produtos";
                let nomeCategoria = "Produtos";
                if(item.categoria === "maquina") { classeCor = "bg-maquina"; nomeCategoria = "Máquina"; }
                if(item.categoria === "peca") { classeCor = "bg-peca"; nomeCategoria = "Peça"; }
                const valorEquipamento = Number(item.valorEquipamento || 0);
                const valorHtml = valorEquipamento > 0
                    ? `<div style="font-size:11px; margin-top:5px; color:#999;">Valor: ${formatarValorEquipamento(valorEquipamento, item.categoria)}</div>`
                    : '';

                card.innerHTML = `
                    <div class="info-estoque" style="flex:1;">
                        <b>${item.nome}</b>
                        <span class="badge ${classeCor}">${nomeCategoria}</span>
                        <div style="font-size:11px; margin-top:5px; color:#999;">Mínimo ideal: ${item.minimo || 0}</div>
                        ${valorHtml}
                    </div>
                    <div class="qtd-destaque">${item.quantidade}</div>
                `;
                container.appendChild(card);
            });

            // Se já tiver algo escrito na busca (ex: numa atualização automática), reaplica o filtro
            aplicarFiltros();
        });
    }

    carregarEstoque();
    atualizarVisualFiltros();
</script>
</body>
</html>
