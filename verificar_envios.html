<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Envios</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:600px; padding:15px; box-sizing:border-box; min-height: 100vh; padding-bottom: 50px; }
        
        .topo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; width: 100%; min-height: 45px; }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; position: absolute; right: 0; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Card de cada Envio */
        .card-envio { 
            background: rgba(255,255,255,0.08); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.2); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        /* Cabeçalho do Card */
        .envio-header { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 10px; }
        .envio-data { font-size: 13px; color: #ffeb3b; font-weight: bold; }
        .envio-cliente { font-size: 20px; font-weight: bold; margin-top: 5px; color: white; }

        /* Títulos de Seção Interna */
        .secao-titulo { 
            font-size: 14px; font-weight: bold; color: #ffeb3b; margin: 15px 0 8px 0; 
            text-transform: uppercase; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 3px; 
        }
        
        /* Linhas de Informação */
        .info-linha { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; align-items: center;}
        .info-linha span { color: #cfd6e3; }
        .info-linha strong { color: white; font-size: 15px;}

        /* Galeria de Fotos Interna */
        .foto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .foto-item { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 5px; text-align: center; }
        .foto-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.2); }
        .foto-legenda { font-size: 10px; color: #ccc; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .sem-envios { text-align: center; opacity: 0.6; margin-top: 50px; font-size: 16px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px;}

        /* Barra de busca */
        .barra-busca { position: sticky; top: 0; z-index: 100; background: #042d86; padding: 10px 0 12px; margin-bottom: 14px; }
        .busca-wrap { display: flex; align-items: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22); border-radius: 14px; padding: 0 14px; gap: 10px; }
        .busca-wrap:focus-within { border-color: rgba(255,235,59,0.6); background: rgba(255,255,255,0.13); }
        .busca-icone { font-size: 17px; flex-shrink: 0; opacity: 0.7; }
        .busca-input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 16px; padding: 13px 0; }
        .busca-input::placeholder { color: rgba(255,255,255,0.4); font-size: 15px; }
        .busca-limpar { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; display: none; }
        .busca-limpar.visivel { display: block; }
        .envio-acoes { margin-top: 16px; padding-top: 12px; border-top: 1px dashed rgba(255,255,255,0.2); }
        .acoes-linha { display: flex; gap: 10px; }
        .btn-acao {
            flex: 1;
            border: none;
            border-radius: 10px;
            padding: 11px 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-editar { background: #ff9800; }
        .btn-excluir { background: #f44336; }
        .btn-acao:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* ===================== MODO TESTE ===================== */
        /* PROVISÓRIO — remover junto com o bloco JS marcado      */
        .tag-teste {
            display: inline-block; background: #ff9800; color: white;
            font-size: 11px; font-weight: bold; padding: 2px 8px;
            border-radius: 20px; margin-left: 8px; vertical-align: middle;
        }
        .btn-excluir-teste {
            flex: 1; border: 2px dashed #ff9800; border-radius: 10px;
            padding: 11px 12px; background: rgba(255,152,0,0.12);
            color: #ff9800; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        /* =================== FIM MODO TESTE =================== */
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Meus Envios</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="barra-busca">
        <div class="busca-wrap">
            <span class="busca-icone">🔍</span>
            <input class="busca-input" id="inputBusca" type="search" placeholder="Buscar cliente, produto..." autocomplete="off">
            <button class="busca-limpar" id="btnLimparBusca" onclick="limparBusca()">✕</button>
        </div>
    </div>

    <div id="listaEnvios">
        <p class="sem-envios">Carregando seus envios...</p>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbEscutarAtendimentos, dbEscutarColaboradores, dbExcluirAtendimento } from './database.js';

    // Pega quem está logado no celular no momento
    const usuarioLogado = localStorage.getItem('usuarioLogado');
    let atendimentosSalvos = [];
    let colaboradoresSalvos = [];
    let colaboradoresCarregados = false;
    let termoBusca = '';

    function normalizarTexto(txt) {
        return String(txt || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    window.limparBusca = function() {
        document.getElementById('inputBusca').value = '';
        termoBusca = '';
        document.getElementById('btnLimparBusca').classList.remove('visivel');
        renderizarEnvios();
    };

    document.getElementById('inputBusca').addEventListener('input', function() {
        termoBusca = normalizarTexto(this.value);
        document.getElementById('btnLimparBusca').classList.toggle('visivel', this.value.length > 0);
        renderizarEnvios();
    });

    function formatarMoeda(valor) {
        return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function obterPerfilPorNome(nome) {
        return colaboradoresSalvos.find(c => c.nome === nome)?.nivel_completo || "";
    }

    function obterNomeAutorEnvio(envio) {
        return envio.enviadoPor || envio.autor || envio.responsavel || envio.atendente || "";
    }

    function obterPerfilAutorEnvio(envio) {
        return envio.perfilAutor || envio.autorPerfil || envio.perfil || obterPerfilPorNome(obterNomeAutorEnvio(envio));
    }

    function ehMesmoDiaAtual(dataIso) {
        if (!dataIso) return false;
        const dataEnvio = new Date(dataIso);
        const agora = new Date();

        return dataEnvio.getFullYear() === agora.getFullYear()
            && dataEnvio.getMonth() === agora.getMonth()
            && dataEnvio.getDate() === agora.getDate();
    }

    function podeAlterarEnvio(envio) {
        if (!colaboradoresCarregados) {
            return false;
        }

        const nomeAutor = obterNomeAutorEnvio(envio);
        const perfilAutor = obterPerfilAutorEnvio(envio);

        if (perfilAutor.includes('estoque')) {
            return false;
        }
        if (nomeAutor !== usuarioLogado) {
            return false;
        }

        return ehMesmoDiaAtual(envio.data);
    }

    function montarRascunhoEdicao(envio) {
        const financeiro = envio.financeiro || {};
        const fotos = envio.fotos || {};

        return {
            clienteBusca: envio.cliente?.numero || "",
            pixLinhas: Array.isArray(financeiro.pix) ? financeiro.pix.map(pix => ({
                numero: pix.numero || "",
                contAnt: pix.contAnt ?? "",
                contAtual: pix.contAtual ?? "",
                valor: pix.valor ?? ""
            })) : [],
            valorDinheiro: financeiro.dinheiro ?? "",
            porcComissao: financeiro.comissaoPorcentagem ?? "",
            produtos: Array.isArray(envio.produtos) ? envio.produtos.map(produto => ({
                prod: "",
                prodNome: produto.nome || "",
                qtd: produto.quantidade ?? ""
            })) : [],
            fotoFichaBase64: fotos.ficha || "",
            fotosPix: Array.isArray(fotos.pix) ? fotos.pix.map((foto, index) => ({
                index,
                src: foto.url || ""
            })) : [],
            fotosMaquinas: Array.isArray(fotos.maquinas) ? fotos.maquinas.map((foto, index) => ({
                index,
                src: foto.url || ""
            })) : []
        };
    }

    function renderizarEnvios() {
        const container = document.getElementById('listaEnvios');
        container.innerHTML = '';

        if (!usuarioLogado) {
            container.innerHTML = '<p class="sem-envios">Nenhum usuário logado. Volte ao Menu Inicial e selecione seu nome.</p>';
            return;
        }

        // Filtra só os que foram enviados por ele e ordena da data mais recente (maior) para a mais velha (menor)
        const meusEnvios = atendimentosSalvos
            .filter(a => {
                if (a.atendente !== usuarioLogado) return false;
                if (!termoBusca) return true;
                const fotos = a.fotos || {};
                const campos = [
                    a.cliente?.nome,
                    a.cliente?.numero,
                    ...(a.produtos || []).map(p => p.nome),
                    new Date(a.data).toLocaleString('pt-BR'),
                    fotos.ficha ? 'ficha' : '',
                    ...(fotos.maquinas || []).map(m => m.nome),
                    ...(fotos.pix || []).map(p => `pix ${p.numero}`)
                ];
                return campos.some(c => normalizarTexto(c).includes(termoBusca));
            })
            .sort((a, b) => new Date(b.data) - new Date(a.data));

        if (meusEnvios.length === 0) {
            container.innerHTML = termoBusca
                ? `<p class="sem-envios">Nenhum envio encontrado para "<strong>${document.getElementById('inputBusca').value}</strong>".</p>`
                : '<p class="sem-envios">Você ainda não tem nenhum atendimento salvo no sistema.</p>';
            return;
        }

        // Constrói os Cards
        meusEnvios.forEach(envio => {
            const card = document.createElement('div');
            card.className = 'card-envio';

            const dataFormatada = new Date(envio.data).toLocaleString('pt-BR');
            const clienteNome = envio.cliente?.nome || 'Cliente Desconhecido';
            const clienteNumero = envio.cliente?.numero || 'S/N';
            // MODO TESTE — tag visual nos cards de teste (PROVISÓRIO)
            const tagTeste = envio._teste ? `<span class="tag-teste">🧪 TESTE</span>` : '';

            // --- 1. PRODUTOS ---
            let htmlProdutos = '';
            if (envio.produtos && envio.produtos.length > 0) {
                htmlProdutos += `<div class="secao-titulo">Produtos</div>`;
                envio.produtos.forEach(p => {
                    htmlProdutos += `<div class="info-linha"><span>${p.nome}</span> <strong>Qtd: ${p.quantidade}</strong></div>`;
                });
            }

            // --- 2. FINANCEIRO ---
            let htmlFin = `<div class="secao-titulo">Financeiro</div>`;
            const fin = envio.financeiro || {};

            // Área Pix do Card
            if (fin.pix && fin.pix.length > 0) {
                fin.pix.forEach(p => {
                    htmlFin += `
                        <div style="background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 13px;">
                            <strong style="color: #ffeb3b;">💠 Pix ${p.numero}:</strong>
                            Cont: <strong>${p.contAnt}</strong> ➔ <strong>${p.contAtual}</strong>
                            &nbsp;|&nbsp; Valor: <span style="color:#4caf50; font-weight:bold; font-size:15px;">${formatarMoeda(p.valor)}</span>
                        </div>
                    `;
                });
            }

            // Dinheiro em espécie — destacado
            if ((fin.dinheiro ?? '') !== '') {
                htmlFin += `
                    <div style="background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 13px;">
                        <strong style="color: #ffeb3b;">💵 Dinheiro em Espécie:</strong>
                        &nbsp;<span style="color:white; font-weight:bold; font-size:15px;">${formatarMoeda(fin.dinheiro)}</span>
                    </div>
                `;
            }

            // Totais
            htmlFin += `
                <div class="info-linha" style="margin-top: 10px;"><span>Total Geral</span> <strong>${formatarMoeda(fin.totalGeral)}</strong></div>
                <div class="info-linha"><span>Comissão (${fin.comissaoPorcentagem || 0}%)</span> <strong style="color:#f44336;">- ${formatarMoeda(fin.comissaoValor)}</strong></div>
                <div class="info-linha"><span>Saldo Final (Acerto)</span> <strong style="color:#4caf50; font-size:18px;">${formatarMoeda(fin.saldoFinal)}</strong></div>
            `;

            // --- 3. FOTOS ---
            let htmlFotos = `<div class="secao-titulo">Imagens (Toque para ampliar)</div><div class="foto-grid">`;
            const fotos = envio.fotos || {};
            
            // [CORREÇÃO] Filtra links corrompidos
            const ehImagemValida = (url) => url && (url.startsWith('data:') || url.includes('firebasestorage'));
            let temFoto = false;
            
            if (fotos.ficha && ehImagemValida(fotos.ficha)) { 
                htmlFotos += `<div class="foto-item"><a href="${fotos.ficha}" target="_blank"><img src="${fotos.ficha}"></a><div class="foto-legenda">FICHA</div></div>`; 
                temFoto = true; 
            }
            
            if (fotos.maquinas && Array.isArray(fotos.maquinas)) {
                fotos.maquinas.forEach(m => { if (ehImagemValida(m.url)) { htmlFotos += `<div class="foto-item"><a href="${m.url}" target="_blank"><img src="${m.url}"></a><div class="foto-legenda">${m.nome}</div></div>`; temFoto = true; }});
            }
            
            if (fotos.pix && Array.isArray(fotos.pix)) {
                fotos.pix.forEach(p => { if (ehImagemValida(p.url)) { htmlFotos += `<div class="foto-item"><a href="${p.url}" target="_blank"><img src="${p.url}"></a><div class="foto-legenda">PIX ${p.numero}</div></div>`; temFoto = true; }});
            }
            
            htmlFotos += `</div>`;
            if (!temFoto) {
                htmlFotos = `<div class="secao-titulo">Imagens</div><div style="font-size:12px; color:#aaa; font-style: italic;">Nenhuma foto foi anexada neste envio.</div>`;
            }

            const liberado = podeAlterarEnvio(envio);
            const htmlAcoes = liberado ? `
                <div class="envio-acoes">
                    <div class="acoes-linha">
                        <button class="btn-acao btn-editar btn-editar-envio">Editar</button>
                        <button class="btn-acao btn-excluir btn-excluir-envio">Excluir</button>
                    </div>
                </div>
            ` : '';

            // ================================================================
            // MODO TESTE — BOTÃO DE EXCLUSÃO PROVISÓRIO
            // Aparece em todos os envios do usuário logado (ignora restrição de data)
            // REMOVER este bloco e o CSS marcado "MODO TESTE" para desativar
            // ================================================================
            const ehMeuEnvio = (envio.atendente === usuarioLogado);
            const htmlExcluirTeste = (!liberado && ehMeuEnvio) ? `
                <div class="envio-acoes" style="border-top: 1px dashed rgba(255,152,0,0.4);">
                    <div class="acoes-linha">
                        <button class="btn-excluir-teste btn-excluir-teste-envio">🧪 Excluir (Modo Teste)</button>
                    </div>
                </div>
            ` : '';
            // ================================================================
            // FIM MODO TESTE
            // ================================================================

            card.innerHTML = `<div class="envio-header"><div class="envio-data">📅 Recebido em ${dataFormatada}${tagTeste}</div><div class="envio-cliente">Nº ${clienteNumero} - ${clienteNome}</div></div>${htmlProdutos}${htmlFin}${htmlFotos}${htmlAcoes}${htmlExcluirTeste}`;
            if (liberado) {
                card.querySelector('.btn-editar-envio')?.addEventListener('click', () => window.editarEnvio(envio));
                card.querySelector('.btn-excluir-envio')?.addEventListener('click', () => window.excluirEnvio(envio.firebaseUrl));
            }
            // MODO TESTE — listener do botão de exclusão (PROVISÓRIO)
            card.querySelector('.btn-excluir-teste-envio')?.addEventListener('click', () => window.excluirRegistroTeste(envio.firebaseUrl));
            container.appendChild(card);
        });
    }

    dbEscutarColaboradores((colaboradores) => {
        colaboradoresSalvos = colaboradores;
        colaboradoresCarregados = true;
        renderizarEnvios();
    });

    dbEscutarAtendimentos((atendimentos) => {
        atendimentosSalvos = atendimentos;
        renderizarEnvios();
    });

    window.editarEnvio = function(envio) {
        if (!podeAlterarEnvio(envio)) {
            return;
        }

        localStorage.setItem('rascunho_atendimento', JSON.stringify(montarRascunhoEdicao(envio)));
        localStorage.setItem('atendimento_em_edicao_id', envio.firebaseUrl);
        localStorage.setItem('atendimento_em_edicao_data', envio.data || "");
        sessionStorage.setItem('atendimento_tela_origem', 'verificar_envios.html');
        window.location.href = 'atendimento_nivel_1.html';
    };

    window.excluirEnvio = async function(id) {
        const envio = atendimentosSalvos.find(item => item.firebaseUrl === id);
        if (!envio) {
            alert("Envio não encontrado.");
            return;
        }

        if (!podeAlterarEnvio(envio)) {
            return;
        }

        if (await window.playConfirm("Excluir este envio? Esta ação não pode ser desfeita.")) {
            await dbExcluirAtendimento(id);
        }
    };

    // ================================================================
    // MODO TESTE — FUNÇÃO DE EXCLUSÃO PROVISÓRIA
    // Permite excluir registros _teste:true independente de data/usuário
    // REMOVER esta função e os elementos HTML/CSS marcados "MODO TESTE"
    // ================================================================
    window.excluirRegistroTeste = async function(id) {
        const envio = atendimentosSalvos.find(item => item.firebaseUrl === id);
        if (!envio || envio.atendente !== usuarioLogado) return;
        if (await window.playConfirm("Excluir este envio?\nEsta ação não pode ser desfeita.")) {
            await dbExcluirAtendimento(id);
        }
    };
    // ================================================================
    // FIM MODO TESTE
    // ================================================================
</script>
</body>
</html>
