<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Movimentações</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:600px; padding:15px; box-sizing:border-box; min-height: 100vh; padding-bottom: 50px; }
        
        .topo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; width: 100%; min-height: 45px; }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; user-select: none; -webkit-user-select: none; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; position: absolute; right: 0; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Card de cada Envio */
        .card-envio { 
            background: rgba(255,255,255,0.08); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.2); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        /* CabeÃ§alho do Card */
        .envio-header { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 10px; }
        .envio-data { font-size: 13px; color: #ffeb3b; font-weight: bold; }
        .envio-cliente { font-size: 20px; font-weight: bold; margin-top: 5px; color: white; user-select: none; -webkit-user-select: none; }

        /* TÃ­tulos de SeÃ§Ã£o Interna */
        .secao-titulo { 
            font-size: 14px; font-weight: bold; color: #ffeb3b; margin: 15px 0 8px 0; 
            text-transform: uppercase; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 3px; 
            user-select: none; -webkit-user-select: none;
        }
        
        /* Linhas de InformaÃ§Ã£o */
        .info-linha {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }
        .info-linha span {
            display: inline;
            color: #cfd6e3;
            user-select: none;
            -webkit-user-select: none;
            white-space: normal;
            text-align: left;
            margin-right: 4px;
        }
        .info-linha strong {
            display: inline;
            color: white;
            font-size: 15px;
            text-align: left;
            line-height: 1.35;
            white-space: normal;
            overflow-wrap: anywhere;
        }
        .info-linha-bloco {
            display: block;
        }
        .info-linha-bloco span,
        .info-linha-bloco strong {
            display: inline;
        }
        .info-linha-bloco span { margin-bottom: 0; white-space: normal; }
        .info-linha-livre {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            column-gap: 10px;
            align-items: center;
        }
        .info-linha-livre span {
            display: block;
            white-space: normal;
            margin-right: 0;
        }
        .info-linha-livre strong {
            display: block;
            text-align: right;
        }
        .rotulo-cadastrou { color: #4caf50 !important; }
        .rotulo-retirado { color: #f44336 !important; }
        .item-estoque-nome { color: white !important; font-size: 18px !important; font-weight: bold; }
        .envio-rodape-estoque {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.25);
            font-size: 13px; color: white; font-weight: bold;
        }
        .envio-rodape-estoque strong { color: #ffeb3b; }

        /* Galeria de Fotos Interna */
        .foto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .foto-item { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 5px; text-align: center; }
        .foto-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.2); }
        .foto-legenda { font-size: 10px; color: #ccc; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .sem-envios { text-align: center; opacity: 0.6; margin-top: 50px; font-size: 16px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px;}
        .grupo-data-label {
            font-size: 12px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 1.5px; color: #aac4f5;
            padding: 14px 2px 6px;
            user-select: none; -webkit-user-select: none;
        }

        /* Barra de busca */
        .barra-busca { position: sticky; top: 0; z-index: 100; background: #042d86; padding: 10px 0 12px; margin-bottom: 14px; }
        .busca-wrap { display: flex; align-items: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22); border-radius: 14px; padding: 0 14px; gap: 10px; }
        .busca-wrap:focus-within { border-color: rgba(255,235,59,0.6); background: rgba(255,255,255,0.13); }
        .busca-icone { font-size: 17px; flex-shrink: 0; opacity: 0.7; }
        .busca-input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 16px; padding: 13px 0; }
        .busca-input::placeholder { color: rgba(255,255,255,0.4); font-size: 15px; }
        .busca-limpar { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; display: none; }
        .busca-limpar.visivel { display: block; }
        .envio-acoes { margin-top: 16px; padding-top: 12px; border-top: 1px dashed rgba(255,255,255,0.2); }
        .acoes-linha { display: flex; gap: 10px; }
        .btn-acao {
            flex: 1;
            border: none;
            border-radius: 10px;
            padding: 11px 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-editar { background: #ff9800; }
        .btn-excluir { background: #f44336; }
        .btn-acao:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }


    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Minhas Movimentações</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="barra-busca">
        <div class="busca-wrap">
            <span class="busca-icone">&#128269;</span>
            <input class="busca-input" id="inputBusca" type="search" placeholder="Buscar cliente, produto..." autocomplete="off">
            <button class="busca-limpar" id="btnLimparBusca" onclick="limparBusca()">&times;</button>
        </div>
    </div>

    <div id="listaEnvios">
        <p class="sem-envios">Carregando seus envios...</p>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbEscutarAtendimentos, dbEscutarCadastrosPix, dbEscutarClientes, dbEscutarColaboradores, dbEscutarHistoricoDoUsuario, dbEscutarManutencoes, dbExcluirAtendimento, dbReverterEncerramentoCliente, dbExcluirMovimentoFluxoCaixa, dbReverterConclusaoManutencao } from './database.js';

    // Pega quem estÃ¡ logado no celular no momento
    const usuarioLogado = localStorage.getItem('usuarioLogado');
    let atendimentosSalvos = [];
    let cadastrosPixSalvos = [];
    let historicoEstoqueSalvo = [];
    let manutencoesSalvas = [];
    let clientesSalvos = [];
    let colaboradoresSalvos = [];
    let colaboradoresCarregados = false;
    let termoBusca = '';

    function normalizarTexto(txt) {
        return String(txt || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function formatarDataHora(valor) {
        if (!valor) return '';
        const data = new Date(valor);
        if (Number.isNaN(data.getTime())) return '';
        return data.toLocaleString('pt-BR');
    }

    window.limparBusca = function() {
        document.getElementById('inputBusca').value = '';
        termoBusca = '';
        document.getElementById('btnLimparBusca').classList.remove('visivel');
        renderizarEnvios();
    };

    document.getElementById('inputBusca').addEventListener('input', function() {
        termoBusca = normalizarTexto(this.value);
        document.getElementById('btnLimparBusca').classList.toggle('visivel', this.value.length > 0);
        renderizarEnvios();
    });

    function formatarMoeda(valor) {
        return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function converterParaNumero(valor) {
        if (typeof valor === 'number') return Number.isFinite(valor) ? valor : 0;
        if (typeof valor !== 'string') return Number(valor || 0) || 0;

        const texto = valor.trim();
        if (!texto) return 0;

        const normalizado = texto
            .replace(/[^\d,.-]/g, '')
            .replace(/\.(?=\d{3}(?:\D|$))/g, '')
            .replace(',', '.');

        return Number(normalizado) || 0;
    }

    function obterPerfilPorNome(nome) {
        return colaboradoresSalvos.find(c => c.nome === nome)?.nivel_completo || "";
    }

    function obterNomeAutorEnvio(envio) {
        return envio.enviadoPor || envio.autor || envio.responsavel || envio.atendente || "";
    }

    function obterPerfilAutorEnvio(envio) {
        return envio.perfilAutor || envio.autorPerfil || envio.perfil || obterPerfilPorNome(obterNomeAutorEnvio(envio));
    }

    function pertenceAoUsuario(envio) {
        const usuario = normalizarTexto(usuarioLogado);
        if (!usuario) return false;

        return [
            envio?.atendente,
            envio?.responsavel,
            envio?.enviadoPor,
            envio?.autor,
            envio?.autorizadoPor
        ].some(nome => normalizarTexto(nome) === usuario);
    }

    function obterManutencaoCompleta(envio) {
        const manutencaoResumo = envio?.manutencao || {};
        const manutencaoId = String(manutencaoResumo?.id || '').trim();
        if (!manutencaoId) {
            return manutencaoResumo;
        }

        const manutencaoBanco = manutencoesSalvas.find(item => item.firebaseUrl === manutencaoId);
        if (!manutencaoBanco) {
            return manutencaoResumo;
        }

        return {
            ...manutencaoBanco,
            ...manutencaoResumo,
            equipamentosAdicionados: Array.isArray(manutencaoBanco.equipamentosAdicionados) && manutencaoBanco.equipamentosAdicionados.length > 0
                ? manutencaoBanco.equipamentosAdicionados
                : (Array.isArray(manutencaoResumo.equipamentosAdicionados) ? manutencaoResumo.equipamentosAdicionados : []),
            equipamentosRetiradosDetalhes: Array.isArray(manutencaoBanco.equipamentosRetiradosDetalhes) && manutencaoBanco.equipamentosRetiradosDetalhes.length > 0
                ? manutencaoBanco.equipamentosRetiradosDetalhes
                : [],
            equipamentosRetirados: Array.isArray(manutencaoBanco.equipamentosRetirados) && manutencaoBanco.equipamentosRetirados.length > 0
                ? manutencaoBanco.equipamentosRetirados
                : (Array.isArray(manutencaoResumo.equipamentosRetirados) ? manutencaoResumo.equipamentosRetirados : []),
            observacoes: manutencaoBanco.observacoes || manutencaoResumo.observacoes || '',
            valorEncerramento: manutencaoBanco.valorEncerramento || manutencaoResumo.valorEncerramento || '',
            pontoEncerrado: manutencaoBanco.pontoEncerrado === true || manutencaoResumo.pontoEncerrado === true
        };
    }

    function obterDataLocalYMD(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        if (Number.isNaN(d.getTime())) return '';
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function obterTextoLocalCadastroPix(registro, clienteContexto = null) {
        const identificacao = String(registro?.identificacao || registro?.cliente || '').trim();
        const equipamento = String(registro?.equipamento || '').trim();
        const clienteRegistro = extrairClienteDoCadastroPix(registro);
        const numeroContexto = normalizarTexto(clienteContexto?.numero);
        const nomeContexto = normalizarTexto(clienteContexto?.nome);
        const mesmoCliente = Boolean(
            (numeroContexto && normalizarTexto(clienteRegistro?.numero) === numeroContexto)
            || (nomeContexto && normalizarTexto(clienteRegistro?.nome) === nomeContexto)
        );

        if (mesmoCliente) {
            return equipamento || identificacao || '—';
        }

        return [identificacao, equipamento].filter(Boolean).join(' | ');
    }

    function cadastroPixPertenceAoEnvio(registro, envio) {
        const clienteNome = normalizarTexto(envio?.cliente?.nome);
        const clienteNumero = normalizarTexto(envio?.cliente?.numero);
        const identificacao = normalizarTexto(registro?.identificacao);
        const clienteRegistro = normalizarTexto(registro?.cliente);

        if (clienteNumero && identificacao.includes(clienteNumero)) return true;
        if (clienteNome && (clienteRegistro === clienteNome || identificacao.includes(clienteNome))) return true;
        return false;
    }

    function obterEventosCadastroPixDoEnvio(envio) {
        const usuario = normalizarTexto(usuarioLogado);
        const dataEnvio = obterDataLocalYMD(envio?.data);
        if (!usuario || !dataEnvio) return [];

        const eventos = [];
        cadastrosPixSalvos.forEach(registro => {
            if (!cadastroPixPertenceAoEnvio(registro, envio)) return;

            const numeroPix = String(registro?.numero_pix || '').trim();
            const local = obterTextoLocalCadastroPix(registro, envio?.cliente || null);

            if (normalizarTexto(registro?.tecnico) === usuario && obterDataLocalYMD(registro?.data) === dataEnvio) {
                eventos.push({
                    chave: `inst_${registro.firebaseUrl || ''}_${numeroPix}_${registro.data || ''}`,
                    tipo: 'colocou',
                    numeroPix,
                    local,
                    data: registro?.data || '',
                    tecnico: String(registro?.tecnico || '').trim()
                });
            }

            if (normalizarTexto(registro?.tecnico_retirada) === usuario && obterDataLocalYMD(registro?.data_retirada) === dataEnvio) {
                eventos.push({
                    chave: `ret_${registro.firebaseUrl || ''}_${numeroPix}_${registro.data_retirada || ''}`,
                    tipo: 'retirou',
                    numeroPix,
                    local,
                    data: registro?.data_retirada || '',
                    tecnico: String(registro?.tecnico_retirada || '').trim()
                });
            }
        });

        const vistos = new Set();
        return eventos
            .filter(item => {
                if (!item.chave || vistos.has(item.chave)) return false;
                vistos.add(item.chave);
                return true;
            })
            .sort((a, b) => new Date(b.data || 0) - new Date(a.data || 0));
    }

    function extrairClienteDoCadastroPix(registro) {
        const identificacao = String(registro?.identificacao || '').trim();
        const clienteFallback = String(registro?.cliente || '').trim();
        const match = identificacao.match(/^N\.\s*([^-]+)\s*-\s*(.+)$/i);
        if (match) {
            return {
                numero: String(match[1] || '').trim(),
                nome: String(match[2] || '').trim() || clienteFallback
            };
        }
        return {
            numero: '',
            nome: clienteFallback || identificacao || 'Cliente Desconhecido'
        };
    }

    function existeAtendimentoParaCadastroPix(registro, tipoEvento, dataEvento) {
        const dataYmd = obterDataLocalYMD(dataEvento);
        if (!dataYmd) return false;

        return atendimentosSalvos.some(envio => {
            if (!pertenceAoUsuario(envio)) return false;
            if (obterDataLocalYMD(envio?.data) !== dataYmd) return false;
            if (!cadastroPixPertenceAoEnvio(registro, envio)) return false;

            const eventos = obterEventosCadastroPixDoEnvio(envio);
            const numeroPix = String(registro?.numero_pix || '').trim();
            return eventos.some(evento => evento.tipo === tipoEvento && evento.numeroPix === numeroPix && obterDataLocalYMD(evento.data) === dataYmd);
        });
    }

    function obterCadastrosPixAvulsosDoUsuario() {
        const usuario = normalizarTexto(usuarioLogado);
        if (!usuario) return [];

        const itens = [];
        cadastrosPixSalvos.forEach(registro => {
            const numeroPix = String(registro?.numero_pix || '').trim();
            if (!numeroPix) return;

            const tecnicoInstalacao = normalizarTexto(registro?.tecnico);
            const tecnicoRetirada = normalizarTexto(registro?.tecnico_retirada);

            if (tecnicoInstalacao === usuario && registro?.data && !existeAtendimentoParaCadastroPix(registro, 'colocou', registro.data)) {
                itens.push({
                    tipoLinhaTempo: 'cadastro_pix',
                    eventoTipo: 'colocou',
                    data: registro.data,
                    cadastroPix: registro,
                    cliente: extrairClienteDoCadastroPix(registro)
                });
            }

            if (tecnicoRetirada === usuario && registro?.data_retirada && !existeAtendimentoParaCadastroPix(registro, 'retirou', registro.data_retirada)) {
                itens.push({
                    tipoLinhaTempo: 'cadastro_pix',
                    eventoTipo: 'retirou',
                    data: registro.data_retirada,
                    cadastroPix: registro,
                    cliente: extrairClienteDoCadastroPix(registro)
                });
            }
        });

        return itens.sort((a, b) => new Date(b.data || 0) - new Date(a.data || 0));
    }

    function montarHtmlCadastroPix(envio) {
        const eventos = obterEventosCadastroPixDoEnvio(envio);
        if (eventos.length === 0) return '';

        let html = '';
        eventos.forEach(evento => {
            const rotulo = evento.tipo === 'retirou'
                ? `Retirado Pix ${evento.numeroPix || '—'}:`
                : `Cadastrou Pix ${evento.numeroPix || '—'}:`;
            const detalhes = [evento.local, formatarDataHora(evento.data)].filter(Boolean).join(' | ');
            const classeRotulo = evento.tipo === 'retirou' ? ' class="rotulo-retirado"' : ' class="rotulo-cadastrou"';
            html += `<div class="info-linha"><span${classeRotulo}>${rotulo}</span><strong>${detalhes || '—'}</strong></div>`;
        });

        return html;
    }

    function montarHtmlCadastroPixAvulso(item) {
        const registro = item?.cadastroPix || {};
        const numeroPix = String(registro?.numero_pix || '').trim() || '—';
        const local = obterTextoLocalCadastroPix(registro, item?.cliente || null);
        const rotulo = item?.eventoTipo === 'retirou' ? `Retirado Pix ${numeroPix}:` : `Cadastrou Pix ${numeroPix}:`;
        let html = '';
        const classeRotulo = item?.eventoTipo === 'retirou' ? ' class="rotulo-retirado"' : ' class="rotulo-cadastrou"';
        html += `<div class="info-linha"><span${classeRotulo}>${rotulo}</span><strong>${local || '—'}</strong></div>`;

        if ((registro?.contador ?? '') !== '' && item?.eventoTipo === 'colocou') {
            html += `<div class="info-linha"><span>Contador:</span><strong>${registro.contador}</strong></div>`;
        }

        return html;
    }

    function ehRegistroManutencao(envio) {
        return envio?.origemRegistro === 'manutencao' || !!envio?.manutencao;
    }

    function ehRetiradaEstoque(envio) {
        return envio?.origemRegistro === 'retirada_estoque';
    }

    function ehEntradaEstoque(envio) {
        return envio?.origemRegistro === 'entrada_estoque';
    }

    function ehMovimentoEstoque(envio) {
        return ehRetiradaEstoque(envio) || ehEntradaEstoque(envio) || envio?.tipoLinhaTempo === 'movimento_estoque';
    }

    function obterTituloItensMovimentoEstoque(envio) {
        return normalizarTexto(envio?.itemCategoria) === 'maquina' ? 'Máquinas' : 'Produtos';
    }

    function obterCabecalhoMovimentoEstoque(envio) {
        return ehEntradaEstoque(envio) ? '📥 Entrada de Estoque' : '📦 Retirada de Estoque';
    }

    function obterMovimentosEstoqueDoUsuario() {
        return historicoEstoqueSalvo
            .filter(item => {
                if (!termoBusca) return true;
                const campos = [
                    item?.tipo === 'entrada' ? 'entrada de estoque' : 'retirada de estoque',
                    item?.itemNome,
                    item?.itemCategoria,
                    item?.responsavel,
                    item?.registradoPor,
                    formatarDataHora(item?.data)
                ];
                return campos.some(c => normalizarTexto(c).includes(termoBusca));
            })
            .map(item => ({
                tipoLinhaTempo: 'movimento_estoque',
                firebaseUrl: item?.firebaseUrl ? `historico_${item.firebaseUrl}` : '',
                data: item?.data || '',
                atendente: item?.responsavel || '',
                responsavel: item?.responsavel || '',
                autorizadoPor: item?.registradoPor || '',
                registradoPor: item?.registradoPor || '',
                itemCategoria: item?.itemCategoria || '',
                origemRegistro: item?.tipo === 'entrada' ? 'entrada_estoque' : 'retirada_estoque',
                produtos: [{
                    nome: item?.itemNome || 'Item sem nome',
                    quantidade: Number(item?.qtd || 0)
                }]
            }))
            .sort((a, b) => new Date(b.data || 0) - new Date(a.data || 0));
    }

    function temFinanceiroNoEnvio(envio) {
        const fin = envio?.financeiro || {};
        return (
            (Array.isArray(fin.pix) && fin.pix.length > 0)
            || (fin.dinheiro ?? '') !== ''
            || Number(fin.totalGeral || 0) !== 0
            || Number(fin.comissaoValor || 0) !== 0
            || Number(fin.saldoFinal || 0) !== 0
            || Number(fin.saldoDepositar || 0) !== 0
        );
    }

    function formatarStatusCadastroTexto(status) {
        const valor = normalizarTexto(status);
        if (!valor) return 'Aprovado';
        if (valor === 'em_analise' || valor === 'em analise' || valor === 'analise') return 'Em análise';
        if (valor === 'aprovado') return 'Aprovado';
        return String(status || '').trim() || 'Aprovado';
    }

    function obterEquipamentosTextoLista(equipDetalhes, equipTexto = '') {
        if (Array.isArray(equipDetalhes) && equipDetalhes.length > 0) {
            return equipDetalhes.map(formatarDescricaoEquipamento).filter(Boolean).join(', ');
        }
        return String(equipTexto || '').trim();
    }

    function obterCadastrosClienteDoUsuario() {
        const usuario = normalizarTexto(usuarioLogado);
        if (!usuario) return [];

        return clientesSalvos
            .filter(item => normalizarTexto(item?.cadastradoPor) === usuario)
            .filter(item => {
                if (!termoBusca) return true;
                const campos = [
                    item?.numero,
                    item?.nome,
                    item?.cidade,
                    item?.rota,
                    item?.endereco,
                    item?.statusCadastro,
                    item?.aberto,
                    item?.obs,
                    obterEquipamentosTextoLista(item?.equipDetalhes, item?.equip),
                    formatarDataHora(item?.dataCadastro)
                ];
                return campos.some(c => normalizarTexto(c).includes(termoBusca));
            })
            .map(item => ({
                tipoLinhaTempo: 'cadastro_cliente',
                data: item?.dataCadastro || '',
                clienteCadastro: item,
                cliente: {
                    numero: item?.numero || '',
                    nome: item?.nome || 'Cliente sem nome'
                }
            }))
            .sort((a, b) => new Date(b.data || 0) - new Date(a.data || 0));
    }

    function formatarDescricaoEquipamento(item, opcoes = {}) {
        if (!item) return '';
        if (typeof item === 'string') return item.trim();

        const { modoRetirada = false } = opcoes;
        const nome = String(item?.nome || '').trim();
        const partes = [];
        const qtd = String(item?.qtd ?? '').trim();
        const pix = String(item?.pix ?? '').trim();
        const contador = String(item?.contador ?? '').trim();
        const tecnico = String(item?.tecnico ?? '').trim();
        const contAntRetirada = String(item?.contador_anterior_retirada ?? '').trim();
        const contAtualRetirada = String(item?.contador_atual_retirada ?? '').trim();
        const valorRetirada = String(item?.valor_retirada ?? '').trim();
        const percentualComissao = String(item?.percentual_comissao ?? '').trim();
        const valorComissao = String(item?.valor_comissao ?? '').trim();
        const valorLiquido = String(item?.valor_liquido ?? '').trim();

        if (qtd && qtd !== '1') partes.push(`Qtd ${qtd}`);
        if (tecnico) partes.push(`Técnico ${tecnico}`);
        if (pix) partes.push(`Pix ${pix}`);
        if (contador) partes.push(`Contador ${contador}`);
        if (contAntRetirada || contAtualRetirada) {
            partes.push(`Retirada ${contAntRetirada || '0'} -> ${contAtualRetirada || '0'}`);
        }
        if (valorRetirada) partes.push(`Valor ${formatarMoeda(converterParaNumero(valorRetirada))}`);
        if (percentualComissao) partes.push(`Comissão ${percentualComissao}%`);
        if (valorComissao) partes.push(`Comis. ${formatarMoeda(converterParaNumero(valorComissao))}`);
        if (valorLiquido) partes.push(`Líquido ${formatarMoeda(converterParaNumero(valorLiquido))}`);

        if (modoRetirada && pix) {
            return nome ? `${nome} (Pix ${pix})` : `Pix ${pix}`;
        }

        if (!nome) return partes.join(' | ');
        return partes.length > 0 ? `${nome} (${partes.join(' | ')})` : nome;
    }

    function montarHtmlManutencao(envio) {
        const info = obterManutencaoCompleta(envio);
        let linhas = '';
        const equipamentosAdicionados = Array.isArray(info.equipamentosAdicionados) && info.equipamentosAdicionados.length > 0
            ? info.equipamentosAdicionados
            : (Array.isArray(info?.equipamentoAdicionado?.detalhes) ? info.equipamentoAdicionado.detalhes : []);
        const equipamentosRetirados = Array.isArray(info.equipamentosRetiradosDetalhes) && info.equipamentosRetiradosDetalhes.length > 0
            ? info.equipamentosRetiradosDetalhes
            : (Array.isArray(info.equipamentosRetirados) ? info.equipamentosRetirados : []);

        if (info.tipoServico) linhas += `<div class="info-linha"><span>Tipo:</span><strong>${info.tipoServico}</strong></div>`;
        if (equipamentosAdicionados.length > 0) {
            linhas += `<div class="info-linha"><span>Máquinas adicionadas:</span><strong>${equipamentosAdicionados.map(formatarDescricaoEquipamento).filter(Boolean).join(', ')}</strong></div>`;
        }
        if (equipamentosRetirados.length > 0) {
            linhas += `<div class="info-linha"><span>Retirou:</span><strong>${equipamentosRetirados.map(item => formatarDescricaoEquipamento(item, { modoRetirada: true })).filter(Boolean).join(', ')}</strong></div>`;
        }
        if (info.pontoEncerrado) {
            linhas += `<div class="info-linha"><span>Ponto:</span><strong>Encerrado em análise</strong></div>`;
        }
        if ((info.valorEncerramento ?? '') !== '') {
            linhas += `<div class="info-linha"><span>Valor encerramento:</span><strong>${formatarMoeda(converterParaNumero(info.valorEncerramento))}</strong></div>`;
        }
        if (info.observacoes) {
            linhas += `<div class="info-linha info-linha-bloco"><span>Observações:</span><strong>${info.observacoes}</strong></div>`;
        }
        return linhas ? `<div class="secao-titulo">Manutenção</div>${linhas}` : '';
    }

    function montarHtmlCadastroCliente(item) {
        const info = item?.clienteCadastro || {};
        const equipamentos = obterEquipamentosTextoLista(info?.equipDetalhes, info?.equip);
        let html = `<div class="secao-titulo">Cadastro de Cliente</div>`;
        html += `<div class="info-linha"><span>Status:</span><strong>${formatarStatusCadastroTexto(info?.statusCadastro)}</strong></div>`;
        if (info?.cidade) html += `<div class="info-linha"><span>Cidade:</span><strong>${info.cidade}</strong></div>`;
        if (info?.rota) html += `<div class="info-linha"><span>Rota:</span><strong>${info.rota}</strong></div>`;
        if (info?.endereco) html += `<div class="info-linha info-linha-bloco"><span>Endereço:</span><strong>${info.endereco}</strong></div>`;
        if (info?.aberto) html += `<div class="info-linha"><span>Dias aberto:</span><strong>${info.aberto}</strong></div>`;
        if (equipamentos) html += `<div class="info-linha info-linha-bloco"><span>Equipamentos:</span><strong>${equipamentos}</strong></div>`;
        if (info?.obs) html += `<div class="info-linha info-linha-bloco"><span>Observações:</span><strong>${info.obs}</strong></div>`;
        return html;
    }

    function ehMesmoDiaAtual(dataIso) {
        if (!dataIso) return false;
        const dataEnvio = new Date(dataIso);
        const agora = new Date();

        return dataEnvio.getFullYear() === agora.getFullYear()
            && dataEnvio.getMonth() === agora.getMonth()
            && dataEnvio.getDate() === agora.getDate();
    }

    function podeAlterarEnvio(envio) {
        if (!colaboradoresCarregados) {
            return false;
        }

        const nomeAutor = obterNomeAutorEnvio(envio);
        const perfilAutor = obterPerfilAutorEnvio(envio);

        if (perfilAutor.includes('estoque')) {
            return false;
        }
        if (nomeAutor !== usuarioLogado) {
            return false;
        }

        return ehMesmoDiaAtual(envio.data);
    }

    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    function dataLocalYMD(isoStr) {
        return obterDataLocalYMD(isoStr);
    }

    function rotuloData(ymd) {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const data = new Date(ymd + 'T00:00:00');
        const diff = Math.round((hoje - data) / 86400000);
        if (diff === 0) return 'Hoje';
        if (diff === 1) return 'Ontem';
        if (diff < 7) {
            const nome = data.toLocaleDateString('pt-BR', { weekday: 'long' });
            return nome.charAt(0).toUpperCase() + nome.slice(1);
        }
        const mes = MESES[data.getMonth()];
        return data.getFullYear() === hoje.getFullYear() ? mes : `${mes} ${data.getFullYear()}`;
    }

    function renderizarEnvios() {
        const container = document.getElementById('listaEnvios');
        container.innerHTML = '';

        if (!usuarioLogado) {
            container.innerHTML = '<p class="sem-envios">Nenhum usuário logado. Volte ao Menu Inicial e selecione seu nome.</p>';
            return;
        }

        const enviosAtendimento = atendimentosSalvos
            .filter(a => {
                if (!pertenceAoUsuario(a)) return false;
                if (ehMovimentoEstoque(a)) return false;
                if (!termoBusca) return true;
                const fotos = a.fotos || {};
                const manutencaoCompleta = ehRegistroManutencao(a) ? obterManutencaoCompleta(a) : {};
                const eventosCadastroPix = obterEventosCadastroPixDoEnvio(a);
                const maquinasAdicionadas = Array.isArray(manutencaoCompleta?.equipamentosAdicionados)
                    ? manutencaoCompleta.equipamentosAdicionados.map(formatarDescricaoEquipamento)
                    : [];
                const maquinasRetiradas = Array.isArray(manutencaoCompleta?.equipamentosRetiradosDetalhes) && manutencaoCompleta.equipamentosRetiradosDetalhes.length > 0
                    ? manutencaoCompleta.equipamentosRetiradosDetalhes.map(formatarDescricaoEquipamento)
                    : (Array.isArray(manutencaoCompleta?.equipamentosRetirados)
                        ? manutencaoCompleta.equipamentosRetirados.map(formatarDescricaoEquipamento)
                        : []);
                const campos = [
                    obterNomeAutorEnvio(a),
                    a.autorizadoPor,
                    a.cliente?.nome,
                    a.cliente?.numero,
                    ...(a.produtos || []).map(p => p.nome),
                    manutencaoCompleta?.tipoServico || '',
                    ...maquinasAdicionadas,
                    ...maquinasRetiradas,
                    ...eventosCadastroPix.map(item => `pix ${item.numeroPix}`),
                    ...eventosCadastroPix.map(item => item.local),
                    manutencaoCompleta?.observacoes || '',
                    manutencaoCompleta?.valorEncerramento || '',
                    new Date(a.data).toLocaleString('pt-BR'),
                    fotos.ficha ? 'ficha' : '',
                    ...(fotos.maquinas || []).map(m => m.nome),
                    ...(fotos.pix || []).map(p => `pix ${p.numero}`)
                ];
                return campos.some(c => normalizarTexto(c).includes(termoBusca));
            });

        const enviosCadastroPix = obterCadastrosPixAvulsosDoUsuario()
            .filter(item => {
                if (!termoBusca) return true;
                const registro = item?.cadastroPix || {};
                const cliente = item?.cliente || {};
                const campos = [
                    cliente.numero,
                    cliente.nome,
                    registro.numero_pix,
                    registro.equipamento,
                    registro.identificacao,
                    registro.cliente,
                    item?.eventoTipo === 'retirou' ? 'retirou' : 'colocou',
                    formatarDataHora(item?.data)
                ];
                return campos.some(c => normalizarTexto(c).includes(termoBusca));
            });

        const enviosEstoque = obterMovimentosEstoqueDoUsuario();
        const enviosCadastroCliente = obterCadastrosClienteDoUsuario();

        // Filtra sÃ³ os que foram enviados por ele e ordena da data mais recente (maior) para a mais velha (menor)
        const meusEnvios = [
            ...enviosAtendimento,
            ...enviosCadastroPix,
            ...enviosEstoque,
            ...enviosCadastroCliente
        ]
            .sort((a, b) => new Date(b.data) - new Date(a.data));

        if (meusEnvios.length === 0) {
            container.innerHTML = termoBusca
                ? `<p class="sem-envios">Nenhum envio encontrado para "<strong>${document.getElementById('inputBusca').value}</strong>".</p>`
                : '<p class="sem-envios">Você ainda não tem nenhum envio salvo no sistema.</p>';
            return;
        }

        // Agrupa por data e insere rótulos
        let ultimoGrupo = null;
        meusEnvios.forEach(envio => {
            const grupoKey = dataLocalYMD(envio.data);
            if (grupoKey !== ultimoGrupo) {
                ultimoGrupo = grupoKey;
                const label = document.createElement('div');
                label.className = 'grupo-data-label';
                label.textContent = rotuloData(grupoKey);
                container.appendChild(label);
            }
            const card = document.createElement('div');
            card.className = 'card-envio';

            if (envio?.tipoLinhaTempo === 'cadastro_pix') {
                const clienteNome = envio?.cliente?.nome || 'Cliente Desconhecido';
                const clienteNumero = envio?.cliente?.numero || 'S/N';

                const htmlHeader = `<div class="envio-header"><div class="envio-cliente">Nº ${clienteNumero} - ${clienteNome}</div></div>`;
                const htmlCadastroPixAvulso = montarHtmlCadastroPixAvulso(envio);
                const htmlRodape = `
                    <div class="envio-rodape-estoque">
                        <span>${dataFormatada}</span>

                card.innerHTML = `${htmlHeader}${htmlCadastroPixAvulso}${htmlRodape}`;
                container.appendChild(card);
                return;
            }

            if (envio?.tipoLinhaTempo === 'cadastro_cliente') {
                const clienteNome = envio?.cliente?.nome || 'Cliente Desconhecido';
                const clienteNumero = envio?.cliente?.numero || 'S/N';
                const dataFormatada = formatarDataHora(envio?.data);
                const info = envio?.clienteCadastro || {};
                const htmlHeader = `<div class="envio-header"><div class="envio-cliente">Nº ${clienteNumero} - ${clienteNome}</div></div>`;
                let htmlFotos = '';
                const fotos = [];
                if (info?.fotoFichaInstalacao) {

                }
                (Array.isArray(info?.fotosMaquinasInstalacao) ? info.fotosMaquinasInstalacao : []).forEach(foto => {
                    if (!foto?.url) return;
                    fotos.push({ nome: foto.nome || 'Máquina', url: foto.url, thumbUrl: foto.thumbUrl || foto.url });
                });
                if (fotos.length > 0) {
                    htmlFotos = `<div class="secao-titulo">Imagens (Toque para ampliar)</div><div class="foto-grid">`;
                    fotos.forEach(foto => {
                        htmlFotos += `<div class="foto-item"><a href="${foto.url}" target="_blank"><img src="${foto.thumbUrl || foto.url}" loading="lazy"></a><div class="foto-legenda">${foto.nome}</div></div>`;
                    });
                    htmlFotos += `</div>`;
                }
                const htmlRodape = `<div class="envio-rodape-estoque"><span>${dataFormatada}</span></div>`;
                card.innerHTML = `${htmlHeader}${montarHtmlCadastroCliente(envio)}${htmlFotos}${htmlRodape}`;
                container.appendChild(card);

            const dataFormatada = new Date(envio.data).toLocaleString('pt-BR');
            const htmlManutencao = ehRegistroManutencao(envio) ? montarHtmlManutencao(envio) : '';
            const htmlCadastroPix = montarHtmlCadastroPix(envio);

            let htmlHeader;

            // --- 2. FINANCEIRO ---

                const saldoDepositar = (fin.saldoDepositar != null)

            // [CORREÃ‡ÃƒO] Filtra links corrompidos

            if (fotos.ficha && ehImagemValida(fotos.ficha)) {

            htmlFotos += `</div>`;

            const liberado = !ehMovimentoEstoque(envio) && podeAlterarEnvio(envio);

                ? (envio.autorizadoPor || '')

                    infoRodape.push(`Registrado por: <strong>${autorEnvio}</strong>`);
                }
            } else if (autorEnvio && normalizarTexto(autorEnvio) !== normalizarTexto(usuarioLogado)) {
                infoRodape.push(`Registrado por: <strong>${autorEnvio}</strong>`);
            }

            const htmlRodape = `
                <div class="envio-rodape-estoque">
                    <span>${dataFormatada}</span>
                    ${infoRodape.length > 0 ? `<span>${infoRodape.join(' | ')}</span>` : ''}
                </div>`;

            card.innerHTML = `${htmlHeader}${htmlManutencao}${htmlCadastroPix}${htmlProdutos}${htmlFin}${htmlFotos}${htmlAcoes}${htmlRodape}`;
            if (liberado) {
                card.querySelector('.btn-editar-envio')?.addEventListener('click', () => window.editarEnvio(envio));
                card.querySelector('.btn-excluir-envio')?.addEventListener('click', () => window.excluirEnvio(envio.firebaseUrl));
            }
            container.appendChild(card);
        });
    }

    dbEscutarColaboradores((colaboradores) => {
        colaboradoresSalvos = colaboradores;
        colaboradoresCarregados = true;
        renderizarEnvios();
    });

    dbEscutarAtendimentos((atendimentos) => {
        atendimentosSalvos = atendimentos;
        renderizarEnvios();
    });

    dbEscutarCadastrosPix((cadastros) => {
        cadastrosPixSalvos = cadastros;
        renderizarEnvios();
    });

    dbEscutarHistoricoDoUsuario(usuarioLogado, (historico) => {
        historicoEstoqueSalvo = historico;
        renderizarEnvios();
    });

    dbEscutarManutencoes((manutencoes) => {
        manutencoesSalvas = manutencoes;
        renderizarEnvios();
    });

    dbEscutarClientes((clientes) => {
        clientesSalvos = clientes;
        renderizarEnvios();
    });

    window.editarEnvio = function(envio) {
        if (!podeAlterarEnvio(envio)) {
            return;
        }

        localStorage.setItem('rascunho_atendimento', JSON.stringify(montarRascunhoEdicao(envio)));
        localStorage.setItem('atendimento_em_edicao_id', envio.firebaseUrl);
        localStorage.setItem('atendimento_em_edicao_data', envio.data || "");
        sessionStorage.setItem('atendimento_tela_origem', 'verificar_envios.html');
        window.location.href = 'atendimento_nivel_1.html';
    };

    window.excluirEnvio = async function(id) {
        const envio = atendimentosSalvos.find(item => item.firebaseUrl === id);
        if (!envio) {
            await window.playAlert("Envio não encontrado.");
            return;
        }

        if (!podeAlterarEnvio(envio)) {
            return;
        }

        const ehEncerramento = envio.manutencao?.pontoEncerrado === true;
        const msg = ehEncerramento
            ? "Excluir este envio? O encerramento do cliente e o lançamento no fluxo de caixa serão revertidos."
            : "Excluir este envio? Esta ação não pode ser desfeita.";

        if (await window.playConfirm(msg)) {
            await dbExcluirAtendimento(id);

            if (ehEncerramento) {
                const clienteId = envio.cliente?.id || '';
                const equipamentos = envio.manutencao?.equipamentosRetiradosDetalhes || [];
                const manutencaoId = envio.manutencao?.id || '';

                if (clienteId) {
                    await dbReverterEncerramentoCliente(clienteId, equipamentos).catch(e => console.error(e));
                }
                if (envio.fluxoCaixaKey && envio.operadorFluxoCaixa) {
                    await dbExcluirMovimentoFluxoCaixa(envio.operadorFluxoCaixa, envio.fluxoCaixaKey).catch(e => console.error(e));
                }
                if (manutencaoId && envio.manutencao?.servicoRealizado) {
                    await dbReverterConclusaoManutencao(manutencaoId).catch(e => console.error(e));
                }
            }
        }
    };
</script>
</body>
</html>
