<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Movimentações</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:600px; padding:15px; box-sizing:border-box; min-height: 100vh; padding-bottom: 50px; }
        
        .topo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; width: 100%; min-height: 45px; }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; user-select: none; -webkit-user-select: none; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; position: absolute; right: 0; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Card de cada Envio */
        .card-envio {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid #ffeb3b;
            border-bottom: 2px solid #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .card-envio.contestado {
            border-left-color: #ff9800;
        }
        .contestacao-chat {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #f59e0b;
        }
        .contestacao-chat-titulo {
            color: #ffeb3b;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 8px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .contestacao-msg {
            background: #173b82;
            border: 1px solid #ffffff;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
            text-align: left;
        }
        .contestacao-msg.usuario {
            background: #14532d;
        }
        .contestacao-msg-meta {
            color: #ffeb3b;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            user-select: none;
            -webkit-user-select: none;
        }
        .contestacao-msg-texto {
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }
        .contestacao-resposta {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }
        .contestacao-resposta textarea {
            width: 100%;
            min-height: 76px;
            box-sizing: border-box;
            border: 1px solid #ffffff;
            border-radius: 8px;
            padding: 10px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            color: #111827;
            background: #ffffff;
            resize: vertical;
        }
        .contestacao-acoes-resposta {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .contestacao-ou {
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            flex: 0 0 auto;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .contestacao-acoes-resposta .btn-acao,
        .contestacao-acoes-resposta .btn-responder-contestacao {
            flex: 1;
            min-width: 0;
            height: 38px;
            padding: 8px 8px;
            border: 2px solid #ffffff;
            box-sizing: border-box;
            line-height: 1.1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .contestacao-acoes-resposta .btn-editar-envio {
            font-size: 18px;
        }
        .btn-responder-contestacao {
            width: 100%;
            border-radius: 8px;
            background: #0f766e;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 0 #064e3b;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-responder-contestacao:disabled {
            background: #4b5563;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        /* CabeÃ§alho do Card */
        .envio-header { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 10px; }
        .envio-data { font-size: 13px; color: #ffeb3b; font-weight: bold; user-select: none; -webkit-user-select: none; }
        .envio-cliente { font-size: 20px; font-weight: bold; margin-top: 5px; color: white; user-select: none; -webkit-user-select: none; }
        .envio-rota { margin-top: 5px; font-size: 14px; color: #ffffff; font-weight: bold; user-select: none; -webkit-user-select: none; }
        .envio-rota span { color: #ffffff; }

        /* TÃ­tulos de SeÃ§Ã£o Interna */
        .secao-titulo { 
            font-size: 14px; font-weight: bold; color: #ffeb3b; margin: 15px 0 8px 0; 
            text-transform: uppercase; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 3px; 
            user-select: none; -webkit-user-select: none;
        }
        
        /* Linhas de InformaÃ§Ã£o */
        .info-linha {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }
        .info-linha span {
            display: inline;
            color: #cfd6e3;
            user-select: none;
            -webkit-user-select: none;
            white-space: normal;
            text-align: left;
            margin-right: 4px;
        }
        .info-linha strong {
            display: inline;
            color: white;
            font-size: 15px;
            text-align: left;
            line-height: 1.35;
            white-space: normal;
            overflow-wrap: anywhere;
            user-select: none;
            -webkit-user-select: none;
        }
        .info-linha-bloco {
            display: block;
        }
        .info-linha-bloco span,
        .info-linha-bloco strong {
            display: inline;
        }
        .info-linha-bloco span { margin-bottom: 0; white-space: normal; }
        .info-linha-livre {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            column-gap: 10px;
            align-items: center;
        }
        .info-linha-livre span {
            display: block;
            white-space: normal;
            margin-right: 0;
        }
        .info-linha-livre strong {
            display: block;
            text-align: right;
        }
        .rotulo-cadastrou { color: #4caf50 !important; }
        .rotulo-retirado { color: #f44336 !important; }
        .item-estoque-nome { color: white !important; font-size: 18px !important; font-weight: bold; user-select: none; -webkit-user-select: none; }
        .envio-rodape-estoque {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.25);
            font-size: 13px; color: white; font-weight: bold;
            user-select: none; -webkit-user-select: none;
        }
        .envio-rodape-estoque strong { color: #ffeb3b; }

        /* Galeria de Fotos Interna */
        .foto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .foto-item { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 5px; text-align: center; }
        .foto-botao {
            display: block;
            width: 100%;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }
        .foto-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.2); }
        .foto-legenda { font-size: 10px; color: #ccc; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .foto-pendente-item {
            background: #5f4b00;
            border: 2px solid #ffeb3b;
            border-radius: 8px;
            padding: 8px 5px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .foto-pendente-tarja {
            background: #ffeb3b;
            color: #10224d;
            border-radius: 6px;
            padding: 6px 7px;
            font-size: 13px;
            font-weight: bold;
            line-height: 1.15;
            margin-bottom: 7px;
        }
        .foto-pendente-nome {
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }
        .modal-foto {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            background: #06142e;
        }
        .modal-foto[hidden] { display: none; }
        .modal-foto-topo {
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 12px;
            box-sizing: border-box;
            background: #082462;
            user-select: none;
            -webkit-user-select: none;
        }
        .modal-foto-topo > div:first-child {
            width: 40px;
            flex-shrink: 0;
        }
        .modal-foto-titulo {
            min-width: 0;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .modal-foto-fechar {
            width: 40px;
            height: 40px;
            border: 0;
            border-radius: 50%;
            background: #244f9f;
            color: #ffffff;
            font-size: 28px;
            line-height: 1;
            font-weight: normal;
            cursor: pointer;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        .modal-foto-corpo {
            position: relative;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            background: #06142e;
        }
        .modal-foto-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }
        .modal-foto-img.visivel { display: block; }
        .modal-foto-status {
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .modal-foto-corpo .carregando-envios { margin-top: 0; }

        .sem-envios { text-align: center; opacity: 0.6; margin-top: 50px; font-size: 16px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px;}
        .carregando-envios {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 50px;
            padding: 22px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .carregando-envios[hidden] { display: none; }
        .spinner-envios {
            width: 34px;
            height: 34px;
            border: 4px solid #7fa6ff;
            border-top-color: #ffeb3b;
            border-radius: 50%;
            animation: girarSpinnerEnvios 0.85s linear infinite;
        }
        @keyframes girarSpinnerEnvios {
            to { transform: rotate(360deg); }
        }
        .grupo-data-label {
            font-size: 12px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 1.5px; color: #aac4f5;
            padding: 14px 2px 6px;
            user-select: none; -webkit-user-select: none;
        }

        /* Barra de busca */
        .barra-busca { position: sticky; top: 0; z-index: 100; background: #042d86; padding: 10px 0 12px; margin-bottom: 14px; }
        .contestacoes-resumo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            padding: 11px 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #c0390b 0%, #e85d04 60%, #f48c06 100%);
            box-shadow: 0 3px 10px rgba(232, 93, 4, 0.45), inset 0 1px 0 rgba(255,255,255,0.15);
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
            transition: filter 0.15s, box-shadow 0.15s;
        }
        .contestacoes-resumo:active { filter: brightness(0.9); }
        .contestacoes-resumo[hidden] { display: none; }
        .contestacoes-resumo.ativo {
            background: linear-gradient(135deg, #1a3a1a 0%, #2d6a2d 100%);
            box-shadow: 0 3px 10px rgba(45, 106, 45, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .contestacoes-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 26px;
            padding: 0 7px;
            border-radius: 13px;
            background: #ffffff;
            color: #c0390b;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
            align-self: center;
            margin-left: 8px;
        }
        .contestacoes-resumo.ativo .contestacoes-badge {
            color: #2d6a2d;
        }
        .contestacoes-texto {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 2px;
            flex: 1;
        }
        .contestacoes-texto-titulo {
            font-size: 15px;
            font-weight: bold;
            line-height: 1.2;
        }
        @keyframes neon-pulse {
            0%, 100% {
                color: #ffffff;
                text-shadow: 0 0 8px #fff, 0 0 14px #ffe066;
            }
            50% {
                color: rgba(255,255,255,0.55);
                text-shadow: none;
            }
        }
        .contestacoes-texto-sub {
            font-size: 13px;
            font-weight: normal;
            line-height: 1.2;
            animation: neon-pulse 1.8s ease-in-out infinite;
        }
        .busca-wrap { display: flex; align-items: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22); border-radius: 14px; padding: 0 14px; gap: 10px; }
        .busca-wrap:focus-within { border-color: rgba(255,235,59,0.6); background: rgba(255,255,255,0.13); }
        .busca-icone { font-size: 17px; flex-shrink: 0; opacity: 0.7; }
        .busca-input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 16px; padding: 13px 0; }
        .busca-input::placeholder { color: rgba(255,255,255,0.4); font-size: 15px; }
        .busca-limpar { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; display: none; }
        .busca-limpar.visivel { display: block; }
        .envio-acoes { margin-top: 16px; padding-top: 12px; border-top: 1px dashed rgba(255,255,255,0.2); }
        .acoes-linha { display: flex; gap: 10px; }
        .btn-acao {
            flex: 1;
            border: none;
            border-radius: 10px;
            padding: 11px 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-editar { background: #ff9800; }
        .btn-acao:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .pendencias-envio {
            display: none;
            border: 2px solid #ffeb3b;
            border-radius: 8px;
            background: #173775;
            padding: 10px;
            margin: 0 0 14px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .pendencias-envio.visivel { display: block; }
        .pendencias-titulo {
            color: #ffeb3b;
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .pendencias-texto {
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.35;
            margin-bottom: 9px;
        }
        .pendencias-lista {
            display: grid;
            gap: 5px;
            margin-bottom: 10px;
        }
        .pendencias-item {
            border: 1px solid #ffffff;
            border-radius: 8px;
            padding: 7px 8px;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }
        .btn-reenviar-pendentes {
            width: 100%;
            min-height: 44px;
            border: 2px solid #ffeb3b;
            border-radius: 8px;
            background: #ffeb3b;
            color: #10224d;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-reenviar-pendentes:disabled {
            background: #6b7280;
            border-color: #ffffff;
            color: #ffffff;
            cursor: not-allowed;
        }


    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Minhas Movimentações</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="barra-busca">
        <button class="contestacoes-resumo" id="contestacoesResumo" type="button" hidden></button>
        <div class="busca-wrap">
            <span class="busca-icone">&#128269;</span>
            <input class="busca-input" id="inputBusca" type="search" placeholder="Buscar cliente, produto..." autocomplete="off">
            <button class="busca-limpar" id="btnLimparBusca" onclick="limparBusca()">&times;</button>
        </div>
    </div>

    <div class="pendencias-envio" id="pendenciasEnvio"></div>

    <div id="listaEnvios">
        <div class="carregando-envios">
            <div class="spinner-envios"></div>
            <div>Carregando movimentações...</div>
        </div>
    </div>
</div>

<div class="modal-foto" id="modalFotoEnvio" hidden>
    <div class="modal-foto-topo">
        <div></div>
        <div class="modal-foto-titulo" id="modalFotoTitulo">Imagem</div>
        <button class="modal-foto-fechar" id="btnFecharModalFoto" type="button" aria-label="Fechar imagem">&times;</button>
    </div>
    <div class="modal-foto-corpo">
        <div class="carregando-envios" id="modalFotoCarregando">
            <div class="spinner-envios"></div>
            <div>Carregando imagem...</div>
        </div>
        <div class="modal-foto-status" id="modalFotoErro" hidden>N&atilde;o foi poss&iacute;vel carregar a imagem.</div>
        <img class="modal-foto-img" id="modalFotoImg" alt="Imagem ampliada">
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbEscutarAtendimentos, dbEscutarCadastrosPix, dbEscutarClientes, dbEscutarColaboradores, dbEscutarHistoricoDoUsuario, dbEscutarManutencoes, dbEscutarHistoricoBalancoDoUsuario, dbResponderContestacaoAtendimento, dbSalvarAtendimento, dbSincronizarProdutosAtendimentoNoHistorico, storageSalvarFotoComThumb, dbAtualizarFotoAtendimentoPendente } from './database.js';
    import { listarPendentes, listarFotosPendentesUpload, sincronizarPendentes, sincronizarFotosPendentes } from './offline-sync.js';

    // Pega quem estÃ¡ logado no celular no momento
    const usuarioLogado = localStorage.getItem('usuarioLogado');
    let atendimentosSalvos = [];
    let cadastrosPixSalvos = [];
    let historicoEstoqueSalvo = [];
    let manutencoesSalvas = [];
    let clientesSalvos = [];
    let colaboradoresSalvos = [];
    let colaboradoresCarregados = false;
    let termoBusca = '';
    let filtroContestacoesAtivo = new URLSearchParams(window.location.search).get('contestacao') === '1';
    let mapaMovimentacoesPorAtendimento = {}; // { atendimentoRefId -> [{ nome, movimento, totalApos }] }
    let atendimentosPendentesLocais = [];
    let fotosPendentesLocais = [];
    let reenviandoPendencias = false;
    const carregamentosEnvios = {
        historicoBalanco: false,
        colaboradores: false,
        atendimentos: false,
        cadastrosPix: false,
        historicoEstoque: false,
        manutencoes: false,
        clientes: false
    };

    function todosEnviosCarregados() {
        return Object.values(carregamentosEnvios).every(Boolean);
    }

    function marcarEnviosCarregados(chave) {
        carregamentosEnvios[chave] = true;
        renderizarEnvios();
        renderizarPendenciasLocais();
    }

    function renderizarCarregandoEnvios(container) {
        container.innerHTML = `
            <div class="carregando-envios">
                <div class="spinner-envios"></div>
                <div>Carregando movimentações...</div>
            </div>
        `;
    }

    function descreverAtendimentoPendenteLocal(item) {
        const d = item?.dados || {};
        const numero = d?.cliente?.numero || 'S/N';
        const nome = d?.cliente?.nome || 'Cliente sem nome';
        return `Atendimento pendente: Nº ${numero} - ${nome}`;
    }

    function descreverFotoPendenteLocal(item) {
        const numero = item?.clienteNumero || '';
        const nomeCliente = item?.clienteNome || '';
        const nomeFoto = item?.nome || (item?.tipo === 'ficha' ? 'Ficha' : 'Foto');
        const cliente = [numero ? `Nº ${numero}` : '', nomeCliente].filter(Boolean).join(' - ');
        return `Foto pendente: ${nomeFoto}${cliente ? ` (${cliente})` : ''}`;
    }

    function obterFotosPendentesFirebaseDoEnvio(envio) {
        const fotos = envio?.fotos || {};
        const pendentes = [];
        const clienteNumero = envio?.cliente?.numero || '';
        const clienteNome = envio?.cliente?.nome || '';

        if (fotos.fichaPendente) {
            pendentes.push({
                atendimentoId: envio?.firebaseUrl || '',
                fotoLocalId: fotos.fichaLocalId || '',
                nome: 'Ficha',
                clienteNumero,
                clienteNome
            });
        }

        (Array.isArray(fotos.maquinas) ? fotos.maquinas : []).forEach((foto) => {
            if (!foto?.uploadPendente) return;
            pendentes.push({
                atendimentoId: envio?.firebaseUrl || '',
                fotoLocalId: foto?.fotoLocalId || '',
                nome: foto?.nome || 'Máquina',
                clienteNumero,
                clienteNome
            });
        });

        (Array.isArray(fotos.pix) ? fotos.pix : []).forEach((foto) => {
            if (!foto?.uploadPendente) return;
            pendentes.push({
                atendimentoId: envio?.firebaseUrl || '',
                fotoLocalId: foto?.fotoLocalId || '',
                nome: `Pix ${foto?.numero || ''}`.trim(),
                clienteNumero,
                clienteNome
            });
        });

        return pendentes;
    }

    function obterFotosPendentesFirebaseDoUsuario() {
        return atendimentosSalvos
            .filter(pertenceAoUsuario)
            .flatMap(obterFotosPendentesFirebaseDoEnvio);
    }

    function contarFotosPendentesComArquivoLocal(fotosFirebasePendentes) {
        const idsLocais = new Set(fotosPendentesLocais.map(item => String(item?.id || '').trim()).filter(Boolean));
        return fotosFirebasePendentes.filter(item => idsLocais.has(String(item?.fotoLocalId || '').trim())).length;
    }

    async function carregarPendenciasLocais() {
        const [atendimentos, fotos] = await Promise.all([
            listarPendentes(),
            listarFotosPendentesUpload()
        ]);
        atendimentosPendentesLocais = atendimentos || [];
        fotosPendentesLocais = fotos || [];
        renderizarPendenciasLocais();
    }

    async function tentarReenviarPendenciasSeOnline() {
        await carregarPendenciasLocais();
        if (!navigator.onLine || reenviandoPendencias) return;
        if (atendimentosPendentesLocais.length === 0 && fotosPendentesLocais.length === 0) return;
        await reenviarPendenciasLocais();
    }

    function renderizarPendenciasLocais(mensagem = '') {
        const box = document.getElementById('pendenciasEnvio');
        if (!box) return;
        const fotosFirebasePendentes = obterFotosPendentesFirebaseDoUsuario();
        const fotosComArquivoLocal = contarFotosPendentesComArquivoLocal(fotosFirebasePendentes);
        const fotosSemArquivoLocal = Math.max(fotosFirebasePendentes.length - fotosComArquivoLocal, 0);
        const total = atendimentosPendentesLocais.length + fotosPendentesLocais.length + fotosSemArquivoLocal;
        if (total === 0 && !mensagem) {
            box.classList.remove('visivel');
            box.innerHTML = '';
            return;
        }

        const fotosFirebaseSemArquivo = fotosFirebasePendentes
            .filter(item => !fotosPendentesLocais.some(local => String(local?.id || '').trim() === String(item?.fotoLocalId || '').trim()))
            .map(item => {
                const cliente = [item?.clienteNumero ? `Nº ${item.clienteNumero}` : '', item?.clienteNome || ''].filter(Boolean).join(' - ');
                return `Foto pendente sem arquivo neste aparelho: ${item?.nome || 'Foto'}${cliente ? ` (${cliente})` : ''}`;
            });
        const itens = [
            ...atendimentosPendentesLocais.map(descreverAtendimentoPendenteLocal),
            ...fotosPendentesLocais.map(descreverFotoPendenteLocal),
            ...fotosFirebaseSemArquivo
        ].slice(0, 5);
        const restante = total > itens.length ? `<div class="pendencias-item">Mais ${total - itens.length} pendência${total - itens.length === 1 ? '' : 's'}.</div>` : '';
        const texto = mensagem || `${total} pendência${total === 1 ? '' : 's'} salva${total === 1 ? '' : 's'} neste aparelho.`;
        const podeReenviar = atendimentosPendentesLocais.length > 0 || fotosPendentesLocais.length > 0;
        box.innerHTML = `
            <div class="pendencias-titulo">Pendências de envio</div>
            <div class="pendencias-texto">${escaparHtml(texto)}</div>
            ${itens.length ? `<div class="pendencias-lista">${itens.map(item => `<div class="pendencias-item">${escaparHtml(item)}</div>`).join('')}${restante}</div>` : ''}
            <button class="btn-reenviar-pendentes" id="btnReenviarPendentes" type="button" ${reenviandoPendencias || !podeReenviar ? 'disabled' : ''}>${reenviandoPendencias ? 'Reenviando...' : 'Reenviar pendentes'}</button>
        `;
        box.classList.add('visivel');
        box.querySelector('#btnReenviarPendentes')?.addEventListener('click', reenviarPendenciasLocais);
    }

    async function reenviarPendenciasLocais() {
        if (reenviandoPendencias) return;
        if (!navigator.onLine) {
            renderizarPendenciasLocais('Sem internet. As pendências continuam salvas neste aparelho.');
            return;
        }
        reenviandoPendencias = true;
        renderizarPendenciasLocais('Reenviando pendências, uma por vez...');
        try {
            const enviadosAtendimentos = await sincronizarPendentes(storageSalvarFotoComThumb, dbSalvarAtendimento, dbSincronizarProdutosAtendimentoNoHistorico);
            const enviadosFotos = await sincronizarFotosPendentes(storageSalvarFotoComThumb, dbAtualizarFotoAtendimentoPendente);
            await carregarPendenciasLocais();
            const totalEnviado = Number(enviadosAtendimentos || 0) + Number(enviadosFotos?.ok || 0);
            if (totalEnviado > 0) {
                renderizarPendenciasLocais(`${totalEnviado} pendência${totalEnviado === 1 ? '' : 's'} enviada${totalEnviado === 1 ? '' : 's'}.`);
                await carregarPendenciasLocais();
            }
        } catch (erro) {
            console.warn('Falha ao reenviar pendências:', erro);
            await carregarPendenciasLocais();
            renderizarPendenciasLocais('Não foi possível concluir agora. As pendências continuam salvas neste aparelho.');
        } finally {
            reenviandoPendencias = false;
            await carregarPendenciasLocais();
        }
    }

    function normalizarTexto(txt) {
        return String(txt || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function normalizarNumeroPesquisa(valor) {
        return String(valor || '').trim().replace(/\D/g, '').replace(/^0+(?=\d)/, '');
    }

    function buscaSomenteNumero(valor) {
        return /^\d+$/.test(String(valor || '').trim());
    }

    function obterNumeroBuscaRota(valor) {
        const match = normalizarTexto(valor).trim().match(/^rota\s*[:#-]?\s*(\d+)$/);
        return match ? normalizarNumeroPesquisa(match[1]) : '';
    }

    function textoContemTermos(valor, termo) {
        const palavras = normalizarTexto(termo).split(' ').filter(Boolean);
        if (palavras.length === 0) return false;
        const texto = normalizarTexto(valor);
        return palavras.every(palavra => texto.includes(palavra));
    }

    function obterClienteCadastradoPorNumero(numero) {
        const numeroBusca = normalizarNumeroPesquisa(numero);
        if (!numeroBusca) return null;
        return clientesSalvos.find(cliente => normalizarNumeroPesquisa(cliente?.numero) === numeroBusca) || null;
    }

    function obterClienteCadastradoPorNome(nome) {
        const nomeBusca = normalizarTexto(nome).trim();
        if (!nomeBusca) return null;
        return clientesSalvos.find(cliente => normalizarTexto(cliente?.nome).trim() === nomeBusca) || null;
    }

    function obterInfoClienteBusca(envio) {
        const cadastro = envio?.clienteCadastro || null;
        const cliente = envio?.cliente || {};
        const numero = String(cadastro?.numero || cliente?.numero || '').trim();
        const nome = String(cadastro?.nome || cliente?.nome || '').trim();
        const clienteSalvo = obterClienteCadastradoPorNumero(numero) || obterClienteCadastradoPorNome(nome) || {};

        return {
            numero: numero || String(clienteSalvo?.numero || '').trim(),
            nome: nome || String(clienteSalvo?.nome || '').trim(),
            rota: String(cadastro?.rota || cliente?.rota || clienteSalvo?.rota || '').trim(),
            cidade: String(cadastro?.cidade || cliente?.cidade || clienteSalvo?.cidade || '').trim(),
            endereco: String(cadastro?.endereco || cliente?.endereco || clienteSalvo?.endereco || '').trim()
        };
    }

    function montarHtmlRotaEnvio(envio) {
        const rota = obterInfoClienteBusca(envio).rota;
        return rota ? `<div class="envio-rota"><span>Rota:</span> ${escaparHtml(rota)}</div>` : '';
    }

    function obterCamposBuscaAtendimento(envio) {
        const fotos = envio?.fotos || {};
        const manutencaoCompleta = ehRegistroManutencao(envio) ? obterManutencaoCompleta(envio) : {};
        const eventosCadastroPix = obterEventosCadastroPixDoEnvio(envio);
        const maquinasAdicionadas = Array.isArray(manutencaoCompleta?.equipamentosAdicionados)
            ? manutencaoCompleta.equipamentosAdicionados.map(formatarDescricaoEquipamento)
            : [];
        const maquinasRetiradas = Array.isArray(manutencaoCompleta?.equipamentosRetiradosDetalhes) && manutencaoCompleta.equipamentosRetiradosDetalhes.length > 0
            ? manutencaoCompleta.equipamentosRetiradosDetalhes.map(formatarDescricaoEquipamento)
            : (Array.isArray(manutencaoCompleta?.equipamentosRetirados)
                ? manutencaoCompleta.equipamentosRetirados.map(formatarDescricaoEquipamento)
                : []);

        return [
            obterNomeAutorEnvio(envio),
            envio?.autorizadoPor,
            ...(envio?.produtos || []).map(p => p.nome),
            manutencaoCompleta?.tipoServico || '',
            ...maquinasAdicionadas,
            ...maquinasRetiradas,
            ...eventosCadastroPix.map(item => `pix ${item.numeroPix}`),
            ...eventosCadastroPix.map(item => item.local),
            manutencaoCompleta?.observacoes || '',
            manutencaoCompleta?.valorEncerramento || '',
            formatarDataHora(envio?.data),
            fotos.ficha ? 'ficha' : '',
            ...(fotos.maquinas || []).map(m => m.nome),
            ...(fotos.pix || []).map(p => `pix ${p.numero}`)
        ];
    }

    function obterCamposBuscaCadastroPix(item) {
        const registro = item?.cadastroPix || {};
        return [
            registro.numero_pix,
            registro.equipamento,
            registro.identificacao,
            registro.cliente,
            item?.eventoTipo === 'retirou' ? 'retirou' : 'colocou',
            formatarDataHora(item?.data)
        ];
    }

    function obterCamposBuscaMovimentoEstoque(item) {
        return [
            item?.tipo === 'entrada' || item?.origemRegistro === 'entrada_estoque' ? 'entrada de estoque' : 'retirada de estoque',
            item?.itemNome,
            item?.itemCategoria,
            item?.responsavel,
            item?.registradoPor,
            item?.autorizadoPor,
            ...(item?.produtos || []).map(produto => produto?.nome),
            formatarDataHora(item?.data)
        ];
    }

    function obterCamposBuscaCadastroCliente(item) {
        const info = item?.clienteCadastro || item || {};
        return [
            info?.cidade,
            info?.endereco,
            info?.statusCadastro,
            info?.aberto,
            info?.obs,
            obterEquipamentosTextoLista(info?.equipDetalhes, info?.equip),
            formatarDataHora(info?.dataCadastro || item?.data)
        ];
    }

    function obterCamposBuscaEnvio(envio) {
        if (envio?.tipoLinhaTempo === 'cadastro_pix') return obterCamposBuscaCadastroPix(envio);
        if (envio?.tipoLinhaTempo === 'cadastro_cliente') return obterCamposBuscaCadastroCliente(envio);
        if (ehMovimentoEstoque(envio)) return obterCamposBuscaMovimentoEstoque(envio);
        return obterCamposBuscaAtendimento(envio);
    }

    function itemBateBuscaEnvio(envio, termo) {
        if (!termo) return true;

        const cliente = obterInfoClienteBusca(envio);
        const numeroRotaBusca = obterNumeroBuscaRota(termo);
        if (numeroRotaBusca) {
            return normalizarNumeroPesquisa(cliente.rota) === numeroRotaBusca;
        }

        const palavras = normalizarTexto(termo).split(' ').filter(Boolean);
        const haystack = normalizarTexto([
            cliente.numero,
            cliente.nome,
            cliente.rota,
            cliente.cidade,
            cliente.endereco,
            ...obterCamposBuscaEnvio(envio)
        ].join(' '));

        return palavras.every(palavra => haystack.includes(palavra));
    }

    function ordenarPrioridadeNumero(lista, termo) {
        if (!buscaSomenteNumero(termo)) return lista;

        const numeroBusca = normalizarNumeroPesquisa(termo);
        if (!numeroBusca) return lista;

        return [...lista].sort((a, b) => {
            const clienteA = obterInfoClienteBusca(a);
            const clienteB = obterInfoClienteBusca(b);
            const numeroA = normalizarNumeroPesquisa(clienteA.numero) === numeroBusca ? 0 : 1;
            const numeroB = normalizarNumeroPesquisa(clienteB.numero) === numeroBusca ? 0 : 1;
            if (numeroA !== numeroB) return numeroA - numeroB;

            const rotaA = normalizarNumeroPesquisa(clienteA.rota) === numeroBusca ? 0 : 1;
            const rotaB = normalizarNumeroPesquisa(clienteB.rota) === numeroBusca ? 0 : 1;
            if (rotaA !== rotaB) return rotaA - rotaB;

            return 0;
        });
    }

    function ordenarPrioridadeRota(lista, termo) {
        const numeroRotaBusca = obterNumeroBuscaRota(termo);
        if (!numeroRotaBusca) return lista;

        return [...lista].sort((a, b) => {
            const clienteA = obterInfoClienteBusca(a);
            const clienteB = obterInfoClienteBusca(b);
            const rotaA = normalizarNumeroPesquisa(clienteA.rota) === numeroRotaBusca ? 0 : 1;
            const rotaB = normalizarNumeroPesquisa(clienteB.rota) === numeroRotaBusca ? 0 : 1;
            if (rotaA !== rotaB) return rotaA - rotaB;

            return 0;
        });
    }

    function ordenarPrioridadeTexto(lista, termo) {
        if (!termo || buscaSomenteNumero(termo) || obterNumeroBuscaRota(termo)) return lista;

        return [...lista].sort((a, b) => {
            const clienteA = obterInfoClienteBusca(a);
            const clienteB = obterInfoClienteBusca(b);
            const nomeA = textoContemTermos(clienteA.nome, termo) ? 0 : 1;
            const nomeB = textoContemTermos(clienteB.nome, termo) ? 0 : 1;
            if (nomeA !== nomeB) return nomeA - nomeB;

            const numeroA = textoContemTermos(clienteA.numero, termo) ? 0 : 1;
            const numeroB = textoContemTermos(clienteB.numero, termo) ? 0 : 1;
            if (numeroA !== numeroB) return numeroA - numeroB;

            const rotaA = textoContemTermos(clienteA.rota, termo) ? 0 : 1;
            const rotaB = textoContemTermos(clienteB.rota, termo) ? 0 : 1;
            if (rotaA !== rotaB) return rotaA - rotaB;

            return 0;
        });
    }

    function escaparHtml(valor) {
        return String(valor ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function obterMensagensContestacao(contestacaoObservacao) {
        if (!contestacaoObservacao) return [];
        if (typeof contestacaoObservacao === 'string') {
            const texto = contestacaoObservacao.trim();
            return texto ? [{ autor: 'Gestor', papel: 'gestor', texto, timestamp: '' }] : [];
        }
        const mensagens = contestacaoObservacao?.mensagens || {};
        return Object.keys(mensagens)
            .map((key) => ({ id: key, ...(mensagens[key] || {}) }))
            .filter((msg) => String(msg.texto || '').trim())
            .sort((a, b) => {
                const dataA = new Date(a.timestamp || 0).getTime() || 0;
                const dataB = new Date(b.timestamp || 0).getTime() || 0;
                return dataA - dataB;
            });
    }

    function montarHtmlConversaContestacao(envio) {
        const mensagens = obterMensagensContestacao(envio?.contestacaoObservacao);
        const htmlMensagens = mensagens.map((msg) => {
            const papel = msg.papel === 'usuario' ? 'usuario' : 'gestor';
            const autor = msg.autor || (papel === 'usuario' ? 'Usuário' : 'Gestor');
            const data = formatarDataHora(msg.timestamp);
            return `
                <div class="contestacao-msg ${papel}">
                    <div class="contestacao-msg-meta">${escaparHtml(autor)}${data ? ` - ${escaparHtml(data)}` : ''}</div>
                    <div class="contestacao-msg-texto">${escaparHtml(msg.texto)}</div>
                </div>`;
        }).join('');

        return `
            <div class="contestacao-chat">
                <div class="contestacao-chat-titulo">Conversa da contestação</div>
                ${htmlMensagens}
                <div class="contestacao-resposta">
                    <textarea class="contestacao-resposta-texto" data-contestacao-resposta-id="${escaparHtml(envio.firebaseUrl)}" placeholder="Responder ao gestor..."></textarea>
                    <div class="contestacao-acoes-resposta">
                        <button class="btn-acao btn-editar btn-editar-envio" type="button">Editar</button>
                        <span class="contestacao-ou">Ou</span>
                        <button class="btn-responder-contestacao" type="button" data-contestacao-responder-id="${escaparHtml(envio.firebaseUrl)}">Enviar resposta</button>
                    </div>
                </div>
            </div>`;
    }

    function montarHtmlThumbFoto(url, thumbUrl, legenda) {
        const urlSeguro = escaparHtml(url || '');
        const thumbSeguro = escaparHtml(thumbUrl || url || '');
        const legendaSegura = escaparHtml(legenda || 'Imagem');

    function montarHtmlFotoPendente(legenda) {

        return `
            <div class="foto-pendente-item">
                <div class="foto-pendente-tarja">Foto pendente</div>
                <div class="foto-pendente-nome">${legendaSegura}</div>
            </div>
        `;
    }

    let modalFotoAberto = false;
    let modalFotoHistoricoAtivo = false;

    function abrirModalFotoEnvio(url, legenda = 'Imagem') {
        const modal = document.getElementById('modalFotoEnvio');
        const img = document.getElementById('modalFotoImg');
        const titulo = document.getElementById('modalFotoTitulo');
        const carregando = document.getElementById('modalFotoCarregando');
        const erro = document.getElementById('modalFotoErro');
        if (!modal || !img || !url) return;

        titulo.textContent = legenda || 'Imagem';
        img.classList.remove('visivel');
        img.removeAttribute('src');
        erro.hidden = true;
        carregando.hidden = false;
        modal.hidden = false;
        modalFotoAberto = true;

        if (!modalFotoHistoricoAtivo) {
            history.pushState({ modalFotoEnvio: true }, '', window.location.href);
            modalFotoHistoricoAtivo = true;
        }

        img.onload = () => {
            carregando.hidden = true;
            erro.hidden = true;
            img.classList.add('visivel');
        };
        img.onerror = () => {
            carregando.hidden = true;
            erro.hidden = false;
            img.classList.remove('visivel');
        };
        img.src = url;
    }

    function fecharModalFotoEnvio(atualizarHistorico = true) {
        const modal = document.getElementById('modalFotoEnvio');
        const img = document.getElementById('modalFotoImg');
        if (!modal || !modalFotoAberto) return;

        if (atualizarHistorico && modalFotoHistoricoAtivo) {
            history.back();
            return;
        }

        modal.hidden = true;
        modalFotoAberto = false;
        modalFotoHistoricoAtivo = false;
        img.classList.remove('visivel');
        img.removeAttribute('src');
    }

        const botaoFoto = event.target.closest('.foto-botao');
        if (!botaoFoto) return;

    });

    window.addEventListener('popstate', () => {
        if (modalFotoAberto) {
            fecharModalFotoEnvio(false);
        }
    });

    function formatarDataHora(valor) {
        if (!valor) return '';
        const data = new Date(valor);
        if (Number.isNaN(data.getTime())) return '';
        return data.toLocaleString('pt-BR');
    }

    window.limparBusca = function() {
        document.getElementById('inputBusca').value = '';
        termoBusca = '';
        document.getElementById('btnLimparBusca').classList.remove('visivel');
        renderizarEnvios();
    };

    document.getElementById('inputBusca').addEventListener('input', function() {
        termoBusca = normalizarTexto(this.value);
        document.getElementById('btnLimparBusca').classList.toggle('visivel', this.value.length > 0);
        renderizarEnvios();
    });

    document.getElementById('contestacoesResumo').addEventListener('click', function() {
        filtroContestacoesAtivo = !filtroContestacoesAtivo;
        renderizarEnvios();
    });

    function formatarMoeda(valor) {
        return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function converterParaNumero(valor) {
        if (typeof valor === 'number') return Number.isFinite(valor) ? valor : 0;
        if (typeof valor !== 'string') return Number(valor || 0) || 0;

        const texto = valor.trim();
        if (!texto) return 0;

        const normalizado = texto
            .replace(/[^\d,.-]/g, '')
            .replace(/\.(?=\d{3}(?:\D|$))/g, '')
            .replace(',', '.');

        return Number(normalizado) || 0;
    }

    function obterPerfilPorNome(nome) {
        return colaboradoresSalvos.find(c => c.nome === nome)?.nivel_completo || "";
    }

    function obterNomeAutorEnvio(envio) {
        return envio.enviadoPor || envio.autor || envio.responsavel || envio.atendente || "";
    }

    function obterPerfilAutorEnvio(envio) {
        return envio.perfilAutor || envio.autorPerfil || envio.perfil || obterPerfilPorNome(obterNomeAutorEnvio(envio));
    }

    function pertenceAoUsuario(envio) {
        const usuario = normalizarTexto(usuarioLogado);
        if (!usuario) return false;

        return [
            envio?.atendente,
            envio?.responsavel,
            envio?.enviadoPor,
            envio?.autor,
            envio?.autorizadoPor
        ].some(nome => normalizarTexto(nome) === usuario);
    }

    function obterManutencaoCompleta(envio) {
        const manutencaoResumo = envio?.manutencao || {};
        const manutencaoId = String(manutencaoResumo?.id || '').trim();
        if (!manutencaoId) {
            return manutencaoResumo;
        }

        const manutencaoBanco = manutencoesSalvas.find(item => item.firebaseUrl === manutencaoId);
        if (!manutencaoBanco) {
            return manutencaoResumo;
        }

        return {
            ...manutencaoBanco,
            ...manutencaoResumo,
            equipamentosAdicionados: Array.isArray(manutencaoBanco.equipamentosAdicionados) && manutencaoBanco.equipamentosAdicionados.length > 0
                ? manutencaoBanco.equipamentosAdicionados
                : (Array.isArray(manutencaoResumo.equipamentosAdicionados) ? manutencaoResumo.equipamentosAdicionados : []),
            equipamentosRetiradosDetalhes: Array.isArray(manutencaoBanco.equipamentosRetiradosDetalhes) && manutencaoBanco.equipamentosRetiradosDetalhes.length > 0
                ? manutencaoBanco.equipamentosRetiradosDetalhes
                : [],
            equipamentosRetirados: Array.isArray(manutencaoBanco.equipamentosRetirados) && manutencaoBanco.equipamentosRetirados.length > 0
                ? manutencaoBanco.equipamentosRetirados
                : (Array.isArray(manutencaoResumo.equipamentosRetirados) ? manutencaoResumo.equipamentosRetirados : []),
            observacoes: manutencaoBanco.observacoes || manutencaoResumo.observacoes || '',
            valorEncerramento: manutencaoBanco.valorEncerramento || manutencaoResumo.valorEncerramento || '',
            pontoEncerrado: manutencaoBanco.pontoEncerrado === true || manutencaoResumo.pontoEncerrado === true
        };
    }

    function obterDataLocalYMD(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        if (Number.isNaN(d.getTime())) return '';
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function obterTextoLocalCadastroPix(registro, clienteContexto = null) {
        const identificacao = String(registro?.identificacao || registro?.cliente || '').trim();
        const equipamento = String(registro?.equipamento || '').trim();
        const clienteRegistro = extrairClienteDoCadastroPix(registro);
        const numeroContexto = normalizarTexto(clienteContexto?.numero);
        const nomeContexto = normalizarTexto(clienteContexto?.nome);
        const mesmoCliente = Boolean(
            (numeroContexto && normalizarTexto(clienteRegistro?.numero) === numeroContexto)
            || (nomeContexto && normalizarTexto(clienteRegistro?.nome) === nomeContexto)
        );

        if (mesmoCliente) {
            return equipamento || identificacao || '—';
        }

        return [identificacao, equipamento].filter(Boolean).join(' | ');
    }

    function cadastroPixPertenceAoEnvio(registro, envio) {
        const clienteNome = normalizarTexto(envio?.cliente?.nome);
        const clienteNumero = normalizarTexto(envio?.cliente?.numero);
        const identificacao = normalizarTexto(registro?.identificacao);
        const clienteRegistro = normalizarTexto(registro?.cliente);

        if (clienteNumero && identificacao.includes(clienteNumero)) return true;
        if (clienteNome && (clienteRegistro === clienteNome || identificacao.includes(clienteNome))) return true;
        return false;
    }

    function obterEventosCadastroPixDoEnvio(envio) {
        const usuario = normalizarTexto(usuarioLogado);
        const dataEnvio = obterDataLocalYMD(envio?.data);
        if (!usuario || !dataEnvio) return [];

        const eventos = [];
        cadastrosPixSalvos.forEach(registro => {
            if (!cadastroPixPertenceAoEnvio(registro, envio)) return;

            const numeroPix = String(registro?.numero_pix || '').trim();
            const local = obterTextoLocalCadastroPix(registro, envio?.cliente || null);

            if (normalizarTexto(registro?.tecnico) === usuario && obterDataLocalYMD(registro?.data) === dataEnvio) {
                eventos.push({
                    chave: `inst_${registro.firebaseUrl || ''}_${numeroPix}_${registro.data || ''}`,
                    tipo: 'colocou',
                    numeroPix,
                    local,
                    data: registro?.data || '',
                    tecnico: String(registro?.tecnico || '').trim()
                });
            }

            if (normalizarTexto(registro?.tecnico_retirada) === usuario && obterDataLocalYMD(registro?.data_retirada) === dataEnvio) {
                eventos.push({
                    chave: `ret_${registro.firebaseUrl || ''}_${numeroPix}_${registro.data_retirada || ''}`,
                    tipo: 'retirou',
                    numeroPix,
                    local,
                    data: registro?.data_retirada || '',
                    tecnico: String(registro?.tecnico_retirada || '').trim()
                });
            }
        });

        const vistos = new Set();
        return eventos
            .filter(item => {
                if (!item.chave || vistos.has(item.chave)) return false;
                vistos.add(item.chave);
                return true;
            })
            .sort((a, b) => new Date(b.data || 0) - new Date(a.data || 0));
    }

    function extrairClienteDoCadastroPix(registro) {
        const identificacao = String(registro?.identificacao || '').trim();
        const clienteFallback = String(registro?.cliente || '').trim();
        const match = identificacao.match(/^N\.\s*([^-]+)\s*-\s*(.+)$/i);
        if (match) {
            return {
                numero: String(match[1] || '').trim(),
                nome: String(match[2] || '').trim() || clienteFallback
            };
        }
        return {
            numero: '',
            nome: clienteFallback || identificacao || 'Cliente Desconhecido'
        };
    }

    function existeAtendimentoParaCadastroPix(registro, tipoEvento, dataEvento) {
        const dataYmd = obterDataLocalYMD(dataEvento);
        if (!dataYmd) return false;

        return atendimentosSalvos.some(envio => {
            if (!pertenceAoUsuario(envio)) return false;
            if (obterDataLocalYMD(envio?.data) !== dataYmd) return false;
            if (!cadastroPixPertenceAoEnvio(registro, envio)) return false;

            const eventos = obterEventosCadastroPixDoEnvio(envio);
            const numeroPix = String(registro?.numero_pix || '').trim();
            return eventos.some(evento => evento.tipo === tipoEvento && evento.numeroPix === numeroPix && obterDataLocalYMD(evento.data) === dataYmd);
        });
    }

    function obterCadastrosPixAvulsosDoUsuario() {
        const usuario = normalizarTexto(usuarioLogado);
        if (!usuario) return [];

        const itens = [];
        cadastrosPixSalvos.forEach(registro => {
            const numeroPix = String(registro?.numero_pix || '').trim();
            if (!numeroPix) return;

            const tecnicoInstalacao = normalizarTexto(registro?.tecnico);
            const tecnicoRetirada = normalizarTexto(registro?.tecnico_retirada);

            if (tecnicoInstalacao === usuario && registro?.data && !existeAtendimentoParaCadastroPix(registro, 'colocou', registro.data)) {
                itens.push({
                    tipoLinhaTempo: 'cadastro_pix',
                    eventoTipo: 'colocou',
                    data: registro.data,
                    cadastroPix: registro,
                    cliente: extrairClienteDoCadastroPix(registro)
                });
            }

            if (tecnicoRetirada === usuario && registro?.data_retirada && !existeAtendimentoParaCadastroPix(registro, 'retirou', registro.data_retirada)) {
                itens.push({
                    tipoLinhaTempo: 'cadastro_pix',
                    eventoTipo: 'retirou',
                    data: registro.data_retirada,
                    cadastroPix: registro,
                    cliente: extrairClienteDoCadastroPix(registro)
                });
            }
        });

        return itens.sort((a, b) => new Date(b.data || 0) - new Date(a.data || 0));
    }

    function montarHtmlCadastroPix(envio) {
        const eventos = obterEventosCadastroPixDoEnvio(envio);
        if (eventos.length === 0) return '';

        let html = '';
        eventos.forEach(evento => {
            const rotulo = evento.tipo === 'retirou'
                ? `Retirado Pix ${evento.numeroPix || '—'}:`
                : `Cadastrou Pix ${evento.numeroPix || '—'}:`;
            const detalhes = [evento.local, formatarDataHora(evento.data)].filter(Boolean).join(' | ');
            const classeRotulo = evento.tipo === 'retirou' ? ' class="rotulo-retirado"' : ' class="rotulo-cadastrou"';
            html += `<div class="info-linha"><span${classeRotulo}>${rotulo}</span><strong>${detalhes || '—'}</strong></div>`;
        });

        return html;
    }

    function montarHtmlCadastroPixAvulso(item) {
        const registro = item?.cadastroPix || {};
        const numeroPix = String(registro?.numero_pix || '').trim() || '—';
        const local = obterTextoLocalCadastroPix(registro, item?.cliente || null);
        const rotulo = item?.eventoTipo === 'retirou' ? `Retirado Pix ${numeroPix}:` : `Cadastrou Pix ${numeroPix}:`;
        let html = '';
        const classeRotulo = item?.eventoTipo === 'retirou' ? ' class="rotulo-retirado"' : ' class="rotulo-cadastrou"';
        html += `<div class="info-linha"><span${classeRotulo}>${rotulo}</span><strong>${local || '—'}</strong></div>`;

        if ((registro?.contador ?? '') !== '' && item?.eventoTipo === 'colocou') {
            html += `<div class="info-linha"><span>Contador:</span><strong>${registro.contador}</strong></div>`;
        }

        return html;
    }

    function ehRegistroManutencao(envio) {
        return envio?.origemRegistro === 'manutencao' || !!envio?.manutencao;
    }

    function ehRetiradaEstoque(envio) {
        return envio?.origemRegistro === 'retirada_estoque';
    }

    function ehEntradaEstoque(envio) {
        return envio?.origemRegistro === 'entrada_estoque';
    }

    function ehMovimentoEstoque(envio) {
        return ehRetiradaEstoque(envio) || ehEntradaEstoque(envio) || envio?.tipoLinhaTempo === 'movimento_estoque';
    }

    function obterTituloItensMovimentoEstoque(envio) {
        return normalizarTexto(envio?.itemCategoria) === 'maquina' ? 'Máquinas' : 'Produtos';
    }

    function obterCabecalhoMovimentoEstoque(envio) {

    function obterMovimentosEstoqueDoUsuario() {
        return historicoEstoqueSalvo

                tipoLinhaTempo: 'movimento_estoque',

                responsavel: item?.responsavel || '',

                registradoPor: item?.registradoPor || '',

                }]

    function temFinanceiroNoEnvio(envio) {
        const fin = envio?.financeiro || {};
        return (
            (Array.isArray(fin.pix) && fin.pix.length > 0)
            || (fin.dinheiro ?? '') !== ''
            || Number(fin.totalGeral || 0) !== 0
            || Number(fin.comissaoValor || 0) !== 0
            || Number(fin.saldoFinal || 0) !== 0
            || Number(fin.saldoDepositar || 0) !== 0
        );

    function formatarStatusCadastroTexto(status) {
        const valor = normalizarTexto(status);
        if (!valor) return 'Aprovado';
        if (valor === 'em_analise' || valor === 'em analise' || valor === 'analise') return 'Em análise';
        if (valor === 'aprovado') return 'Aprovado';
        return String(status || '').trim() || 'Aprovado';
    }

    function obterEquipamentosTextoLista(equipDetalhes, equipTexto = '') {
        if (Array.isArray(equipDetalhes) && equipDetalhes.length > 0) {
            return equipDetalhes.map(formatarDescricaoEquipamento).filter(Boolean).join(', ');
        }
        return String(equipTexto || '').trim();

    function obterCadastrosClienteDoUsuario() {
        const usuario = normalizarTexto(usuarioLogado);
        if (!usuario) return [];

        return clientesSalvos
            .filter(item => normalizarTexto(item?.cadastradoPor) === usuario)
            .map(item => ({
                tipoLinhaTempo: 'cadastro_cliente',

    function formatarDescricaoEquipamento(item, opcoes = {}) {
        if (!item) return '';
        if (typeof item === 'string') return item.trim();

        const { modoRetirada = false } = opcoes;
        const nome = String(item?.nome || '').trim();
        const partes = [];
        const qtd = String(item?.qtd ?? '').trim();
        const pix = String(item?.pix ?? '').trim();
        const contador = String(item?.contador ?? '').trim();
        const tecnico = String(item?.tecnico ?? '').trim();
        const contAntRetirada = String(item?.contador_anterior_retirada ?? '').trim();
        const contAtualRetirada = String(item?.contador_atual_retirada ?? '').trim();
        const valorRetirada = String(item?.valor_retirada ?? '').trim();
        const percentualComissao = String(item?.percentual_comissao ?? '').trim();
        const valorComissao = String(item?.valor_comissao ?? '').trim();
        const valorLiquido = String(item?.valor_liquido ?? '').trim();

        if (qtd && qtd !== '1') partes.push(`Qtd ${qtd}`);
        if (tecnico) partes.push(`Técnico ${tecnico}`);
        if (pix) partes.push(`Pix ${pix}`);
        if (contador) partes.push(`Contador ${contador}`);
        if (contAntRetirada || contAtualRetirada) {
            partes.push(`Retirada ${contAntRetirada || '0'} -> ${contAtualRetirada || '0'}`);
        }
        if (valorRetirada) partes.push(`Valor ${formatarMoeda(converterParaNumero(valorRetirada))}`);
        if (percentualComissao) partes.push(`Comissão ${percentualComissao}%`);
        if (valorComissao) partes.push(`Comis. ${formatarMoeda(converterParaNumero(valorComissao))}`);
        if (valorLiquido) partes.push(`Líquido ${formatarMoeda(converterParaNumero(valorLiquido))}`);

        if (modoRetirada && pix) {
            return nome ? `${nome} (Pix ${pix})` : `Pix ${pix}`;
        }

        if (!nome) return partes.join(' | ');
        return partes.length > 0 ? `${nome} (${partes.join(' | ')})` : nome;
    }

    function montarHtmlManutencao(envio) {

        const equipamentosAdicionados = Array.isArray(info.equipamentosAdicionados) && info.equipamentosAdicionados.length > 0
            ? info.equipamentosAdicionados

        const equipamentosRetirados = Array.isArray(info.equipamentosRetiradosDetalhes) && info.equipamentosRetiradosDetalhes.length > 0
            ? info.equipamentosRetiradosDetalhes
            : (Array.isArray(info.equipamentosRetirados) ? info.equipamentosRetirados : []);

        if (info.tipoServico) linhas += `<div class="info-linha"><span>Tipo:</span><strong>${info.tipoServico}</strong></div>`;
        if (equipamentosAdicionados.length > 0) {
            linhas += `<div class="info-linha"><span>Máquinas adicionadas:</span><strong>${equipamentosAdicionados.map(formatarDescricaoEquipamento).filter(Boolean).join(', ')}</strong></div>`;
        }
        if (equipamentosRetirados.length > 0) {
            linhas += `<div class="info-linha"><span>Retirou:</span><strong>${equipamentosRetirados.map(item => formatarDescricaoEquipamento(item, { modoRetirada: true })).filter(Boolean).join(', ')}</strong></div>`;
        }
        if (info.pontoEncerrado) {
            linhas += `<div class="info-linha"><span>Ponto:</span><strong>Encerrado em análise</strong></div>`;
        }
        if ((info.valorEncerramento ?? '') !== '') {
            linhas += `<div class="info-linha"><span>Valor encerramento:</span><strong>${formatarMoeda(converterParaNumero(info.valorEncerramento))}</strong></div>`;
        }
        if (info.observacoes) {
            linhas += `<div class="info-linha info-linha-bloco"><span>Observações:</span><strong>${info.observacoes}</strong></div>`;

        return linhas ? `<div class="secao-titulo">Manutenção</div>${linhas}` : '';
    }
