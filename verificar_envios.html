        if (info?.aberto) html += `<div class="info-linha"><span>Dias aberto:</span><strong>${info.aberto}</strong></div>`;
        if (equipamentos) html += `<div class="info-linha info-linha-bloco"><span>Equipamentos:</span><strong>${equipamentos}</strong></div>`;
        if (info?.obs) html += `<div class="info-linha info-linha-bloco"><span>Observações:</span><strong>${info.obs}</strong></div>`;
        return html;
    }

    function obterOrigemAtendimento(envio) {
        if (ehRegistroManutencao(envio))  return { icone: '🔧', texto: 'Manutenção',      cor: '#90caf9' };
        if (ehRetiradaEstoque(envio))     return { icone: '📤', texto: 'Saída Estoque',   cor: '#ffcc80' };
        if (ehEntradaEstoque(envio))      return { icone: '📥', texto: 'Entrada Estoque', cor: '#a5d6a7' };
        return { icone: '📋', texto: 'Atendimento', cor: '#ef9a9a' };
    }

    function idCurto(firebaseUrl) {
        if (!firebaseUrl) return '—';
        return firebaseUrl.replace(/^historico_/, '').slice(-8).toUpperCase();
    }

    function ehMesmoDiaAtual(dataIso) {
        if (!dataIso) return false;
        const dataEnvio = new Date(dataIso);
        const agora = new Date();

        return dataEnvio.getFullYear() === agora.getFullYear()
            && dataEnvio.getMonth() === agora.getMonth()
            && dataEnvio.getDate() === agora.getDate();
    }

    function podeAlterarEnvio(envio) {
        if (!colaboradoresCarregados) {
            return false;
        }

        if (envio.confirmacao) {
            return false;
        }

        const nomeAutor = obterNomeAutorEnvio(envio);
        const perfilAutor = obterPerfilAutorEnvio(envio);

        if (perfilAutor.includes('estoque')) {
            return false;
        }
        if (nomeAutor !== usuarioLogado) {
            return false;
        }

        if (envio.contestado) {
            return true;
        }

        return ehMesmoDiaAtual(envio.data);
    }

    function contestacaoRegistrada(envio) {
        return !!envio?.contestado;
    }

    function atualizarResumoContestacoes() {
        const resumo = document.getElementById('contestacoesResumo');
        if (!resumo || !usuarioLogado || !todosEnviosCarregados()) {
            if (resumo) resumo.hidden = true;
            return;
        }

        const total = atendimentosSalvos.filter(a =>
            pertenceAoUsuario(a)
            && !ehMovimentoEstoque(a)
            && contestacaoRegistrada(a)
        ).length;

        if (total <= 0) {
            filtroContestacoesAtivo = false;
            resumo.hidden = true;
            resumo.innerHTML = '';
            resumo.classList.remove('ativo');
            return;
        }

        resumo.innerHTML = filtroContestacoesAtivo
            ? `<span class="contestacoes-badge">✓</span><span class="contestacoes-texto"><span class="contestacoes-texto-titulo">${total === 1 ? 'Contestação' : 'Contestações'} do gestor</span><span class="contestacoes-texto-sub">Toque para limpar o filtro</span></span>`
            : `<span class="contestacoes-badge">${total}</span><span class="contestacoes-texto"><span class="contestacoes-texto-titulo">${total === 1 ? 'Contestação' : 'Contestações'} do gestor</span><span class="contestacoes-texto-sub">Toque para ver</span></span>`;
        resumo.classList.toggle('ativo', filtroContestacoesAtivo);
        resumo.hidden = false;
    }

    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    function dataLocalYMD(isoStr) {
        return obterDataLocalYMD(isoStr);
    }

    function rotuloData(ymd) {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const data = new Date(ymd + 'T00:00:00');
        const diff = Math.round((hoje - data) / 86400000);
        if (diff === 0) return 'Hoje';
        if (diff === 1) return 'Ontem';
        return data.toLocaleDateString('pt-BR');
    }

    function renderizarEnvios() {
        const container = document.getElementById('listaEnvios');
        const termoBuscaOriginal = document.getElementById('inputBusca')?.value || '';
        container.innerHTML = '';
        atualizarResumoContestacoes();

        if (!usuarioLogado) {
            container.innerHTML = '<p class="sem-envios">Nenhum usuário logado. Volte ao Menu Inicial e selecione seu nome.</p>';
            return;
        }

        if (!todosEnviosCarregados()) {
            renderizarCarregandoEnvios(container);
            return;
        }

        const enviosAtendimento = atendimentosSalvos
            .filter(a => {
                if (!pertenceAoUsuario(a)) return false;
                if (ehMovimentoEstoque(a)) return false;
                if (filtroContestacoesAtivo && !contestacaoRegistrada(a)) return false;
                return itemBateBuscaEnvio(a, termoBuscaOriginal);
            });

        const enviosCadastroPix = obterCadastrosPixAvulsosDoUsuario()
            .filter(item => {
                if (filtroContestacoesAtivo) return false;
                return itemBateBuscaEnvio(item, termoBuscaOriginal);
            });

        const enviosEstoque = filtroContestacoesAtivo ? [] : obterMovimentosEstoqueDoUsuario();
        const enviosCadastroCliente = filtroContestacoesAtivo ? [] : obterCadastrosClienteDoUsuario();

        // Filtra sÃ³ os que foram enviados por ele e ordena da data mais recente (maior) para a mais velha (menor)
        const meusEnvios = [
            ...enviosAtendimento,
            ...enviosCadastroPix,
            ...enviosEstoque,
            ...enviosCadastroCliente
        ]
            .sort((a, b) => new Date(b.data) - new Date(a.data));

        const meusEnviosOrdenados = ordenarPrioridadeTexto(
            ordenarPrioridadeRota(
                ordenarPrioridadeNumero(meusEnvios, termoBuscaOriginal),
                termoBuscaOriginal
            ),
            termoBuscaOriginal
        );

        if (meusEnviosOrdenados.length === 0) {
            container.innerHTML = filtroContestacoesAtivo
                ? '<p class="sem-envios">Nenhuma contestação encontrada.</p>'
                : termoBusca
                ? `<p class="sem-envios">Nenhum envio encontrado para "<strong>${document.getElementById('inputBusca').value}</strong>".</p>`
                : '<p class="sem-envios">Você ainda não tem nenhum envio salvo no sistema.</p>';
            return;
        }

        // Agrupa por data e insere rótulos
        let ultimoGrupo = null;
        meusEnviosOrdenados.forEach(envio => {
            const grupoKey = dataLocalYMD(envio.data);
            if (grupoKey !== ultimoGrupo) {
                ultimoGrupo = grupoKey;
                const label = document.createElement('div');
                label.className = 'grupo-data-label';
                label.textContent = rotuloData(grupoKey);
                container.appendChild(label);
            }
            const card = document.createElement('div');
            card.className = 'card-envio';

            if (envio?.tipoLinhaTempo === 'cadastro_pix') {
                const clienteNome = envio?.cliente?.nome || 'Cliente Desconhecido';
                const clienteNumero = envio?.cliente?.numero || 'S/N';
                const dataFormatada = formatarDataHora(envio?.data);
                const htmlHeader = `<div class="envio-header"><div class="envio-cliente">Nº ${clienteNumero} - ${clienteNome}</div>${montarHtmlRotaEnvio(envio)}</div>`;
                const htmlCadastroPixAvulso = montarHtmlCadastroPixAvulso(envio);
                const htmlRodape = `
                    <div class="envio-rodape-estoque">
                        <span>${dataFormatada}</span>
                    </div>`;
                card.innerHTML = `${htmlHeader}${htmlCadastroPixAvulso}${htmlRodape}`;
                container.appendChild(card);
                return;
            }

            if (envio?.tipoLinhaTempo === 'cadastro_cliente') {
                const clienteNome = envio?.cliente?.nome || 'Cliente Desconhecido';
                const clienteNumero = envio?.cliente?.numero || 'S/N';
                const dataFormatada = formatarDataHora(envio?.data);
                const info = envio?.clienteCadastro || {};
                const htmlHeader = `<div class="envio-header"><div class="envio-cliente">Nº ${clienteNumero} - ${clienteNome}</div>${montarHtmlRotaEnvio(envio)}</div>`;
                let htmlFotos = '';
                const fotos = [];
                if (info?.fotoFichaInstalacao) {
                    fotos.push({ nome: 'Ficha', url: info.fotoFichaInstalacao, thumbUrl: info.fotoFichaInstalacaoThumb || info.fotoFichaInstalacao });
                }
                (Array.isArray(info?.fotosMaquinasInstalacao) ? info.fotosMaquinasInstalacao : []).forEach(foto => {
                    if (!foto?.url) return;
                    fotos.push({ nome: foto.nome || 'Máquina', url: foto.url, thumbUrl: foto.thumbUrl || foto.url });
                });
                if (fotos.length > 0) {
                    htmlFotos = `<div class="secao-titulo">Imagens (Toque para ampliar)</div><div class="foto-grid">`;
                    fotos.forEach(foto => {
                        htmlFotos += montarHtmlThumbFoto(foto.url, foto.thumbUrl || foto.url, foto.nome);
                    });
                    htmlFotos += `</div>`;
                }
                const htmlRodape = `<div class="envio-rodape-estoque"><span>${dataFormatada}</span></div>`;
                card.innerHTML = `${htmlHeader}${montarHtmlCadastroCliente(envio)}${htmlFotos}${htmlRodape}`;
                container.appendChild(card);
                return;
            }

            const dataFormatada = new Date(envio.data).toLocaleString('pt-BR');
            const htmlManutencao = ehRegistroManutencao(envio) ? montarHtmlManutencao(envio) : '';
            const htmlCadastroPix = montarHtmlCadastroPix(envio);

            // Cabeçalho
            const origemAtend = obterOrigemAtendimento(envio);
            const idAtend = idCurto(envio.firebaseUrl);
            let htmlHeader;
            if (ehMovimentoEstoque(envio)) {
                htmlHeader = `
                    <div class="envio-header">
                        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,0.1);">
                            <span style="font-size:15px; font-weight:bold; color:${origemAtend.cor};user-select:none;-webkit-user-select:none;">${origemAtend.icone} ${origemAtend.texto}</span>
                            <span style="font-size:11px; color:rgba(255,255,255,0.35); font-family:monospace; letter-spacing:0.5px;user-select:none;-webkit-user-select:none;">ID: ${idAtend}</span>
                        </div>
                        <div class="envio-cliente">${obterCabecalhoMovimentoEstoque(envio)}</div>
                    </div>`;
            } else {
                const clienteNome = envio.cliente?.nome || 'Cliente Desconhecido';
                const clienteNumero = envio.cliente?.numero || 'S/N';
                htmlHeader = `
                    <div class="envio-header">
                        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,0.1);">
                            <span style="font-size:15px; font-weight:bold; color:${origemAtend.cor};user-select:none;-webkit-user-select:none;">${origemAtend.icone} ${origemAtend.texto}</span>
                            <span style="font-size:11px; color:rgba(255,255,255,0.35); font-family:monospace; letter-spacing:0.5px;user-select:none;-webkit-user-select:none;">ID: ${idAtend}</span>
                        </div>
                        <div class="envio-cliente">Nº ${clienteNumero} - ${clienteNome}</div>
                        ${montarHtmlRotaEnvio(envio)}
                    </div>`;
            }

            // --- 1. PRODUTOS ---
            let htmlProdutos = '';
            if (ehMovimentoEstoque(envio) && envio.produtos && envio.produtos.length > 0) {
                htmlProdutos += `<div class="secao-titulo">${obterTituloItensMovimentoEstoque(envio)}</div>`;
                envio.produtos.forEach(p => {
                    htmlProdutos += `<div class="info-linha info-linha-livre"><span class="item-estoque-nome">${p.nome}</span> <strong>Qtd: ${p.quantidade}</strong></div>`;
                });
            } else if (!ehMovimentoEstoque(envio) && !ehRegistroManutencao(envio)) {
                const produtosAtend = mapaMovimentacoesPorAtendimento[envio.firebaseUrl] || [];
                if (produtosAtend.length > 0) {
                    htmlProdutos += `<div class="secao-titulo">Produtos</div>`;
                    produtosAtend.forEach(p => {
                        htmlProdutos += `
                            <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                                <span style="color:white;font-size:15px;user-select:none;-webkit-user-select:none;">${p.nome}</span>
                                <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
                                    <span style="background:rgba(255,235,59,0.15);border:1px solid rgba(255,235,59,0.4);color:#ffeb3b;border-radius:6px;padding:2px 10px;font-size:14px;font-weight:bold;user-select:none;-webkit-user-select:none;">${p.movimento} usados</span>
                                    ${p.totalApos != null ? `<span style="font-size:13px;font-weight:bold;color:${p.totalApos < 0 ? '#f44336' : '#81c784'};user-select:none;-webkit-user-select:none;">total ${p.totalApos}</span>` : ''}
                                </div>
                            </div>`;
                    });
                }
            }

            // --- 2. FINANCEIRO ---
            let htmlFin = '';
            const fin = envio.financeiro || {};
            if (!ehMovimentoEstoque(envio) && (!ehRegistroManutencao(envio) || temFinanceiroNoEnvio(envio))) {
                const totalPix = Array.isArray(fin.pix)
                    ? fin.pix.reduce((soma, pix) => soma + converterParaNumero(pix?.valor), 0)
                    : 0;
                const saldoDepositar = (fin.saldoDepositar != null)
                    ? converterParaNumero(fin.saldoDepositar)
                    : (((fin.dinheiro ?? '') !== '' || fin.comissaoValor != null)
                        ? (converterParaNumero(fin.dinheiro) - converterParaNumero(fin.comissaoValor))
                        : converterParaNumero(fin.saldoFinal));

                htmlFin = `<div class="secao-titulo">Financeiro</div>`;
                htmlFin += `
                    <div style="background: rgba(255,255,255,0.04); border-left: 3px solid #4caf50; padding: 8px 10px; border-radius: 6px; margin-top: 10px; margin-bottom: 8px;">
                        <div class="info-linha" style="margin: 0;">
                            <span style="font-weight: 600; color: #ffffff;">Total geral:</span>
                            <strong style="color: #ffffff; font-size: 18px;">${formatarMoeda(converterParaNumero(fin.totalGeral))}</strong>
                        </div>
                    </div>
                `;

                if (fin.pix && fin.pix.length > 0) {
                    fin.pix.forEach(p => {
                        htmlFin += `
                            <div style="background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 13px;">
                                <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; white-space:nowrap;">
                                    <span>
                                        <strong style="color: #ffeb3b;">&#128179; Pix ${p.numero}</strong>
                                        &nbsp;|&nbsp; Cont: <strong>${p.contAnt}</strong> &rarr; <strong>${p.contAtual}</strong>
                                    </span>
                                    <span style="color:#64b5f6; font-weight:bold; font-size:15px;">${formatarMoeda(converterParaNumero(p.valor))}</span>
                                </div>
                            </div>
                        `;
                    });
                }

                if ((fin.dinheiro ?? '') !== '') {
                    htmlFin += `
                        <div class="info-linha"><span>Dinheiro em espécie:</span> <strong style="color:#4caf50;">${formatarMoeda(converterParaNumero(fin.dinheiro))}</strong></div>
                    `;
                }

                if (totalPix > 0) {
                    htmlFin += `
                        <div class="info-linha"><span>Pix:</span> <strong style="color:#64b5f6;">${formatarMoeda(totalPix)}</strong></div>
                    `;
                }

                htmlFin += `
                    <div class="info-linha"><span>Comissão (${fin.comissaoPorcentagem || 0}%):</span> <strong style="color:#f44336;">- ${formatarMoeda(converterParaNumero(fin.comissaoValor))}</strong></div>
                    <div class="info-linha"><span>Saldo depositar:</span> <strong style="color:#4caf50; font-size:18px;">${formatarMoeda(saldoDepositar)}</strong></div>
                `;
            }

            // --- 3. FOTOS ---
            let htmlFotos = `<div class="secao-titulo">Imagens (Toque para ampliar)</div><div class="foto-grid">`;
            const fotos = envio.fotos || {};
            const manutencaoCompleta = ehRegistroManutencao(envio) ? obterManutencaoCompleta(envio) : null;
            
            // [CORREÃ‡ÃƒO] Filtra links corrompidos
            const ehImagemValida = (url) => url && (url.startsWith('data:') || url.includes('firebasestorage'));
            let temFoto = false;
            
            if (fotos.ficha && ehImagemValida(fotos.ficha)) {
                htmlFotos += montarHtmlThumbFoto(fotos.ficha, fotos.fichaThumb || fotos.ficha, 'FICHA');
                temFoto = true;
            } else if (fotos.fichaPendente) {
                htmlFotos += montarHtmlFotoPendente('FICHA');
                temFoto = true;
            }

            if (fotos.maquinas && Array.isArray(fotos.maquinas)) {
                fotos.maquinas.forEach(m => {
                    if (ehImagemValida(m.url)) {
                        htmlFotos += montarHtmlThumbFoto(m.url, m.thumbUrl || m.url, m.nome);
                        temFoto = true;
                    } else if (m?.uploadPendente) {
                        htmlFotos += montarHtmlFotoPendente(m?.nome || 'Máquina');
                        temFoto = true;
                    }
                });
            }

            if (fotos.pix && Array.isArray(fotos.pix)) {
                fotos.pix.forEach(p => {
                    if (ehImagemValida(p.url)) {
                        htmlFotos += montarHtmlThumbFoto(p.url, p.thumbUrl || p.url, `PIX ${p.numero}`);
                        temFoto = true;
                    } else if (p?.uploadPendente) {
                        htmlFotos += montarHtmlFotoPendente(`PIX ${p?.numero || ''}`);
                        temFoto = true;
                    }
                });
            }

            if (Array.isArray(manutencaoCompleta?.equipamentosRetiradosDetalhes)) {
                manutencaoCompleta.equipamentosRetiradosDetalhes.forEach(item => {
                    if (!ehImagemValida(item?.foto_contador_retirada)) return;
                    const legenda = item?.pix
                        ? `RETIRADA PIX ${item.pix}`
                        : (item?.nome ? `RETIRADA ${item.nome}` : 'RETIRADA');
                    htmlFotos += montarHtmlThumbFoto(item.foto_contador_retirada, item.foto_contador_retirada_thumb || item.foto_contador_retirada, legenda);
                    temFoto = true;
                });
            }
            
            htmlFotos += `</div>`;
            if (!temFoto) {
                htmlFotos = '';
            }

            const estaContestado = !!envio.contestado;
            if (estaContestado) card.classList.add('contestado');
            const liberado = !ehMovimentoEstoque(envio) && podeAlterarEnvio(envio);
            const htmlAvisoContestacao = estaContestado ? `
                <div style="padding:10px 12px;background:rgba(255,152,0,0.15);border:1px solid rgba(255,152,0,0.5);border-radius:10px;color:#f59e0b;font-size:14px;font-weight:bold;margin-bottom:8px;text-align:center;user-select:none;-webkit-user-select:none;">
                    ⚠ O gestor contestou esse atendimento.
                    ${montarHtmlConversaContestacao(envio)}
                </div>` : '';
            const htmlAcoes = liberado ? `
                <div class="envio-acoes">
                    ${htmlAvisoContestacao}
                    ${estaContestado ? '' : `
                        <div class="acoes-linha">
                            <button class="btn-acao btn-editar btn-editar-envio">Editar</button>
                        </div>
                    `}
                </div>
            ` : '';

            const responsavelEstoque = ehMovimentoEstoque(envio) ? (envio.atendente || envio.responsavel || '') : '';
            const autorEnvio = ehMovimentoEstoque(envio)
                ? (envio.autorizadoPor || '')
                : obterNomeAutorEnvio(envio);
            const infoRodape = [];

            if (ehMovimentoEstoque(envio)) {
                if (autorEnvio && normalizarTexto(autorEnvio) !== normalizarTexto(usuarioLogado)) {
                    infoRodape.push(`Registrado por: <strong>${autorEnvio}</strong>`);
                }
            } else if (autorEnvio && normalizarTexto(autorEnvio) !== normalizarTexto(usuarioLogado)) {
                infoRodape.push(`Registrado por: <strong>${autorEnvio}</strong>`);
            }

            const htmlRodape = `
                <div class="envio-rodape-estoque">
                    <span>${dataFormatada}</span>
                    ${infoRodape.length > 0 ? `<span>${infoRodape.join(' | ')}</span>` : ''}
                </div>`;

            card.innerHTML = `${htmlHeader}${htmlManutencao}${htmlCadastroPix}${htmlProdutos}${htmlFin}${htmlFotos}${htmlAcoes}${htmlRodape}`;
            if (liberado) {
                card.querySelector('.btn-editar-envio')?.addEventListener('click', () => window.editarEnvio(envio));
            }
            container.appendChild(card);
        });
    }

    document.getElementById('listaEnvios').addEventListener('click', async (event) => {
        const btn = event.target.closest('.btn-responder-contestacao');
        if (!btn) return;

        const id = btn.dataset.contestacaoResponderId;
        const textarea = btn.closest('.card-envio')?.querySelector('.contestacao-resposta-texto');
        const resposta = (textarea?.value || '').trim();

        if (!resposta) {
            await window.playAlert('Digite uma resposta para o gestor.');
            textarea?.focus();
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Enviando...';
        try {
            await dbResponderContestacaoAtendimento(id, usuarioLogado, resposta);
            if (textarea) textarea.value = '';
            await window.playAlert('Resposta enviada.');
        } catch (erro) {
            await window.playAlert('Erro ao enviar resposta: ' + (erro.message || erro));
            btn.disabled = false;
            btn.textContent = 'Enviar resposta';
        }
    });

    dbEscutarHistoricoBalancoDoUsuario(usuarioLogado, (historico) => {
        mapaMovimentacoesPorAtendimento = {};
        historico.forEach(entry => {
            const refId = String(entry.atendimentoRefId || entry.refId || '').trim();
            if (!refId || String(entry.origemRegistro || '').trim() !== 'atendimento' || entry.cancelado || String(entry.tipo || '').trim() === 'cancelamento') return;
            if (!mapaMovimentacoesPorAtendimento[refId]) mapaMovimentacoesPorAtendimento[refId] = [];
            mapaMovimentacoesPorAtendimento[refId].push({
                nome: entry.itemNome || '—',
                itemChave: String(entry.itemChave || entry.refId || '').trim(),
                categoria: String(entry.categoria || 'produtos').trim(),
                movimento: Math.abs(Number(entry.movimento || 0)),
                totalApos: entry.totalApos != null ? Number(entry.totalApos) : null
            });
        });
        marcarEnviosCarregados('historicoBalanco');
    });

    dbEscutarColaboradores((colaboradores) => {
        colaboradoresSalvos = colaboradores;
        colaboradoresCarregados = true;
        marcarEnviosCarregados('colaboradores');
    });

    dbEscutarAtendimentos((atendimentos) => {
        atendimentosSalvos = atendimentos;
        marcarEnviosCarregados('atendimentos');
    });

    dbEscutarCadastrosPix((cadastros) => {
        cadastrosPixSalvos = cadastros;
        marcarEnviosCarregados('cadastrosPix');
    });

    dbEscutarHistoricoDoUsuario(usuarioLogado, (historico) => {
        historicoEstoqueSalvo = historico;
        marcarEnviosCarregados('historicoEstoque');
    });

    dbEscutarManutencoes((manutencoes) => {
        manutencoesSalvas = manutencoes;
        marcarEnviosCarregados('manutencoes');
    });

    dbEscutarClientes((clientes) => {
        clientesSalvos = clientes;
        marcarEnviosCarregados('clientes');
    });

    tentarReenviarPendenciasSeOnline().catch(() => {});
    window.addEventListener('online', () => {
        reenviarPendenciasLocais().catch(() => {});
    });

    window.editarEnvio = function(envio) {
        if (!podeAlterarEnvio(envio)) {
            return;
        }

        sessionStorage.setItem('atendimento_tela_origem', 'verificar_envios.html');
        window.location.href = `atendimento_nivel_1.html?edit=${encodeURIComponent(envio.firebaseUrl)}`;
    };

</script>
</body>
</html>
