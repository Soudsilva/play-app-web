<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Representante</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #042d86;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: #042d86;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 2px solid #1e3d7a;
        }

        .header-titulo {
            flex: 1;
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-home {
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-home img {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1);
        }

        .periodo-info {
            position: absolute;
            bottom: -10px;
            right: 0;
            font-size: 10px;
            color: #9fb4df;
            font-weight: 400;
            line-height: 1;
            background: #042d86;
            padding: 0 5px;
            user-select: none;
            -webkit-user-select: none;
            white-space: nowrap;
        }

        .lista {
            flex: 1;
            padding: 12px 14px 100px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .secao-label {
            font-size: 13px;
            font-weight: bold;
            color: #9fb4df;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 2px 0;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid #ffeb3b;
            border-bottom: 2px solid #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            overflow: hidden;
            cursor: pointer;
            transition: 0.15s;
        }
        .card:active { transform: scale(0.985); background: #1e3f80; }

        .card-corpo {
            display: flex;
            align-items: stretch;
        }

        .card-foto {
            width: 88px;
            min-height: 95px;
            background: #0f2266;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            flex-shrink: 0;
            border-right: 2px solid rgba(255,255,255,0.08);
            color: #5f7fc6;
        }

        .card-foto img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-info {
            flex: 1;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .card-linha-topo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .card-num {
            font-size: 13px;
            color: #c8d6f2;
            font-weight: 400;
        }

        .card-num b {
            color: white;
            font-weight: bold;
        }

        .chip {
            background: transparent;
            border: 1.5px solid #8ba4da;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 2px 11px;
            user-select: none;
            -webkit-user-select: none;
        }

        .card-nome {
            font-size: 18px;
            font-weight: bold;
            color: white;
        }

        .card-saldo-linha {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-saldo-label {
            font-size: 13px;
            color: #c8d6f2;
            font-weight: 400;
        }

        .chip-saldo {
            background: transparent;
            border: 1.5px solid #8ba4da;
            border-radius: 10px;
            color: white;
            font-size: 17px;
            font-weight: bold;
            padding: 3px 14px;
        }

        .card-rodape {
            padding: 8px 14px;
            background: #173c86;
            border-top: 1px solid #315596;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-data {
            font-size: 13px;
            color: #ffeb3b;
            font-weight: bold;
        }

        .card-tag {
            font-size: 12px;
            color: #9fb4df;
            font-weight: 400;
        }

        .estado-vazio,
        .estado-carregando {
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            padding: 34px 18px;
            user-select: none;
            -webkit-user-select: none;
        }

        .estado-carregando {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid #5f7fc6;
            border-top-color: #ffeb3b;
            animation: girar 0.8s linear infinite;
        }

        @keyframes girar {
            to { transform: rotate(360deg); }
        }

        .rodape {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: #042d86;
            border-top: 2px solid #1e3d7a;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
        }

        .rodape-bloco {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 2px;
        }

        .rodape-label {
            font-size: 12px;
            color: #c8d6f2;
            font-weight: 400;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .rodape-valor {
            font-size: 22px;
            font-weight: bold;
            color: #ffeb3b;
        }

        .rodape-div {
            width: 1px;
            height: 38px;
            background: #315596;
            flex-shrink: 0;
        }

        .select-mes {
            background: #1a3872;
            border: 2px solid #8ba4da;
            border-radius: 20px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            padding: 6px 14px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
        }

        /* ── LIGHTBOX ── */
        .lb-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .lb-overlay.aberto { display: flex; }
        .lb-img { max-width: 96vw; max-height: 90vh; border-radius: 10px; object-fit: contain; }
        .lb-fechar { position: absolute; top: 16px; right: 16px; font-size: 28px; color: white; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-titulo">Representante</div>
        <div class="periodo-info">Últimos 4 anos</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="lista" id="listaRepresentante">
        <div class="secao-label">Carregando</div>
        <div class="estado-carregando">
            <div class="spinner"></div>
            <div>Carregando atendimentos...</div>
        </div>
    </div>

    <div class="rodape">
        <div class="rodape-bloco">
            <div class="rodape-label">Clientes</div>
            <div class="rodape-valor">0</div>
        </div>
        <div class="rodape-div"></div>
        <div class="rodape-bloco">
            <div class="rodape-label">Comissão</div>
            <div class="rodape-valor">0</div>
        </div>
        <div class="rodape-div"></div>
        <select class="select-mes">
            <option>Carregando</option>
        </select>
    </div>
</div>

<script>
    function abrirFoto(url) {
        if (!url) return;
        document.getElementById('lbImg').src = url;
        document.getElementById('lbOverlay').classList.add('aberto');
        history.pushState({ lightbox: true }, '');
    }
    function fecharLightbox() {
        document.getElementById('lbOverlay').classList.remove('aberto');
        document.getElementById('lbImg').src = '';
        if (history.state?.lightbox) history.back();
    }
    window.addEventListener('popstate', () => {
        document.getElementById('lbOverlay').classList.remove('aberto');
        document.getElementById('lbImg').src = '';
    });
</script>

<script type="module">
    import { verificarAutenticacao } from './auth.js';
    import { dbEscutarAtendimentos } from './database.js';

    verificarAutenticacao();

    const MESES = [
        'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
        'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
    ];

    let atendimentosRepresentante = [];
    let mesSelecionado = obterMesAtual();

    const listaEl = document.getElementById('listaRepresentante');
    const rodapeValores = Array.from(document.querySelectorAll('.rodape-valor'));
    const totalClientesEl = rodapeValores[0];
    const totalComissaoEl = rodapeValores[1];
    const selectMesEl = document.querySelector('.select-mes');

    function normalizarNome(valor) {
        return String(valor || '').trim().toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function obterMesAtual() {
        const data = new Date();
        return `${data.getFullYear()}-${String(data.getMonth() + 1).padStart(2, '0')}`;
    }

    function obterMesAnoData(valor) {
        if (!valor) return '';
        const texto = String(valor);
        if (/^\d{4}-\d{2}/.test(texto)) return texto.slice(0, 7);
        const data = new Date(texto);
        if (Number.isNaN(data.getTime())) return '';
        return `${data.getFullYear()}-${String(data.getMonth() + 1).padStart(2, '0')}`;
    }

    function textoMes(mesAno) {
        const [ano, mes] = String(mesAno || '').split('-').map(Number);
        if (!ano || !mes) return '';
        return `${MESES[mes - 1]} ${ano}`;
    }

    function numeroFinanceiro(valor) {
        if (typeof valor === 'number') return Number.isFinite(valor) ? valor : 0;
        const texto = String(valor ?? '').trim();
        if (!texto) return 0;
        const normalizado = texto.replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, '');
        const numero = Number(normalizado);
        return Number.isFinite(numero) ? numero : 0;
    }

    function obterBaseAtendimento(atendimento) {
        const fin = atendimento?.financeiro || {};
        const saldo = numeroFinanceiro(fin.saldoFinal);
        if (saldo > 0) return saldo;
        return Math.max(numeroFinanceiro(fin.totalGeral) - numeroFinanceiro(fin.comissaoValor), 0);
    }

    function formatarInteiro(valor) {
        return Math.round(Number(valor || 0)).toLocaleString('pt-BR');
    }

    function formatarData(valor) {
        const data = new Date(valor);
        if (Number.isNaN(data.getTime())) return '';
        return data.toLocaleDateString('pt-BR', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
        });
    }

    function escaparHtml(valor) {
        return String(valor || '').replace(/[&<>"']/g, (char) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[char]));
    }

    function fotoThumb(atendimento) {
        return atendimento?.fotos?.fichaThumb || atendimento?.fotos?.ficha || '';
    }

    function fotoCompleta(atendimento) {
        return atendimento?.fotos?.ficha || atendimento?.fotos?.fichaThumb || '';
    }

    function atendimentoValidoRepresentante(item) {
        const usuarioNorm = normalizarNome(localStorage.getItem('usuarioLogado') || '');
        return Boolean(
            usuarioNorm &&
            normalizarNome(item?.representante) === usuarioNorm &&
            obterMesAnoData(item?.data) &&
            numeroFinanceiro(item?.representanteComissao) > 0 &&
            obterBaseAtendimento(item) > 0 &&
            String(item?.cliente?.id || '').trim()
        );
    }

    function montarMeses() {
        if (!selectMesEl) return;
        const mesesComDados = Array.from(new Set(
            (atendimentosRepresentante || [])
                .filter(atendimentoValidoRepresentante)
                .map(item => obterMesAnoData(item?.data))
                .filter(Boolean)
        )).sort().reverse();

        if (mesesComDados.length > 0 && !mesesComDados.includes(mesSelecionado)) {
            mesSelecionado = mesesComDados[0];
        }

        const opcoes = mesesComDados.length > 0 ? mesesComDados : [mesSelecionado || obterMesAtual()];
        selectMesEl.innerHTML = '';
        opcoes.forEach(valor => {
            const option = document.createElement('option');
            option.value = valor;
            option.textContent = textoMes(valor);
            option.selected = valor === mesSelecionado;
            selectMesEl.appendChild(option);
        });
    }

    function obterGruposDoMes() {
        const filtrados = (atendimentosRepresentante || []).filter(item =>
            atendimentoValidoRepresentante(item) &&
            obterMesAnoData(item?.data) === mesSelecionado
        );

        const porCliente = new Map();
        filtrados.forEach(item => {
            const clienteId = String(item?.cliente?.id || '').trim();
            if (!porCliente.has(clienteId)) {
                porCliente.set(clienteId, {
                    numero: item?.cliente?.numero || '',
                    nome: item?.cliente?.nome || 'Cliente',
                    saldo: 0,
                    comissao: 0,
                    ultimo: item,
                    ultimoMs: 0
                });
            }

            const grupo = porCliente.get(clienteId);
            const base = obterBaseAtendimento(item);
            const percentual = numeroFinanceiro(item?.representanteComissao);
            const dataMs = new Date(item?.data || '').getTime() || 0;
            grupo.saldo += base;
            grupo.comissao += base * percentual / 100;
            if (dataMs >= grupo.ultimoMs) {
                grupo.ultimo = item;
                grupo.ultimoMs = dataMs;
                grupo.numero = item?.cliente?.numero || grupo.numero;
                grupo.nome = item?.cliente?.nome || grupo.nome;
            }
        });

        return Array.from(porCliente.values()).sort((a, b) => b.ultimoMs - a.ultimoMs);
    }

    function renderizar() {
        const grupos = obterGruposDoMes();
        if (totalClientesEl) totalClientesEl.textContent = String(grupos.length);
        if (totalComissaoEl) {
            totalComissaoEl.textContent = formatarInteiro(grupos.reduce((soma, item) => soma + item.comissao, 0));
        }

        const cabecalho = `<div class="secao-label">${escaparHtml(textoMes(mesSelecionado).toUpperCase())}</div>`;
        if (grupos.length === 0) {
            listaEl.innerHTML = `${cabecalho}<div class="estado-vazio">Nenhum atendimento de representante neste período.</div>`;
            return;
        }

        listaEl.innerHTML = cabecalho + grupos.map(grupo => {
            const ultimo = grupo.ultimo || {};
            const foto = fotoThumb(ultimo);
            const fotoFull = fotoCompleta(ultimo);
            const percentual = numeroFinanceiro(ultimo?.representanteComissao);
            return `
                <div class="card">
                    <div class="card-corpo">
                        <div class="card-foto"${fotoFull ? ` onclick="abrirFoto('${escaparHtml(fotoFull)}')" style="cursor:pointer;"` : ''}>${foto ? `<img src="${escaparHtml(foto)}" alt="">` : '&#128247;'}</div>
                        <div class="card-info">
                            <div class="card-linha-topo">
                                <div class="card-num">Núm. <b>${escaparHtml(grupo.numero)}</b></div>
                                <div class="chip">${formatarInteiro(percentual)}%</div>
                            </div>
                            <div class="card-nome">${escaparHtml(grupo.nome)}</div>
                            <div class="card-saldo-linha">
                                <div class="card-saldo-label">Saldo</div>
                                <div class="chip-saldo">${formatarInteiro(grupo.comissao)}</div>
                            </div>
                        </div>
                    </div>
                    <div class="card-rodape">
                        <div class="card-data">${escaparHtml(formatarData(ultimo?.data))}</div>
                        <div class="card-tag">último atendimento</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    selectMesEl?.addEventListener('change', () => {
        mesSelecionado = selectMesEl.value || obterMesAtual();
        renderizar();
    });

    dbEscutarAtendimentos((lista) => {
        atendimentosRepresentante = Array.isArray(lista) ? lista : [];
        montarMeses();
        renderizar();
    });
</script>

<!-- Lightbox -->
<div class="lb-overlay" id="lbOverlay" onclick="fecharLightbox()">
    <div class="lb-fechar" onclick="fecharLightbox()">&times;</div>
    <img class="lb-img" id="lbImg" src="" alt="Ficha">
</div>

</body>
</html>
