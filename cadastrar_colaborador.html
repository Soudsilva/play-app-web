<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Colaboradores</title>
    
    <style>
        /* Base do App (Como a Screen do Power Apps) */
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:420px; padding:15px; box-sizing:border-box; min-height: 100vh; }
        
        /* Cabeçalho */
        .topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .titulo { font-size: 24px; font-weight:bold; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Galeria de Itens (Lista) */
        .secao-lista { margin-bottom: 25px; max-height: 300px; overflow-y: auto; padding-right: 5px; border-radius: 8px; }
        .subtitulo { font-size: 16px; color: #ffeb3b; margin-bottom: 12px; font-weight: bold; text-align: center; text-transform: uppercase; }
        
        /* O Template do Item (Card) */
        .card-colab { background: white; color: #333; border-radius: 12px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .info-colab b { color: #042d86; font-size: 16px; display: block; }
        .info-colab div { color: #666; font-size: 13px; font-weight: 500; }
        
        /* Botões de Ação no Card */
        .acoes-card { display: flex; flex-direction: column; gap: 5px; }
        .btn-editar-card { background: #e3f2fd; color: #1976d2; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; border: 1px solid #1976d2; }
        .btn-excluir-card { background: #ffebee; color: #c62828; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; border: 1px solid #c62828; }

        /* Divisor Visual */
        .divisor { border-top: 1px solid rgba(255,255,255,0.3); margin: 25px 0; position: relative; text-align: center; }
        .divisor span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #042d86; padding: 0 10px; font-size: 11px; color: #ffeb3b; }

        /* Formulário (EditForm) */
        .form-container { display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
        .label-focada { font-size: 12px; color: #ffeb3b; font-weight: bold; margin-bottom: 4px; display: block; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255,255,255,0.05); color: white; box-sizing:border-box; font-size: 14px; outline: none; }
        input::placeholder { color: rgba(255,255,255,0.4); }
        select option { background: #042d86; color: white; }

        /* Botão Salvar (Submit Button) */
        .btn-salvar { background:#4caf50; padding:14px; text-align:center; border-radius:30px; font-weight:bold; cursor:pointer; margin-top: 10px; border: none; color: white; width: 100%; font-size: 15px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Colaboradores</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="secao-lista">
        <div class="subtitulo">Lista de Acesso</div>
        <div id="containerColaboradores"></div>
    </div>

    <div class="divisor"><span>CONFIGURAR NOVO ACESSO</span></div>

    <form class="form-container" id="formColaborador">
        <input type="hidden" id="idEdicao" value=""> <div>
            <label class="label-focada">Nome do Colaborador</label>
            <input type="text" id="nomeColaborador" placeholder="Nome Completo" required>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 2;">
                <label class="label-focada">Cargo</label>
                <input type="text" id="cargoColaborador" placeholder="Ex: Técnico">
            </div>
            <div style="flex: 1;">
                <label class="label-focada">Comissão %</label>
                <input type="text" id="comissaoColaborador" placeholder="0%">
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1.5;">
                <label class="label-focada">Senha Global</label>
                <input type="text" id="senhaColaborador" placeholder="Senha">
            </div>
            <div style="flex: 2;">
                <label class="label-focada">Perfil</label>
                <select id="nivelAcesso">
                    <option value="gestao">Gestão</option>
                    <option value="atendimento">Atendimento</option>
                    <option value="estoque">Estoque</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label class="label-focada">Nível</label>
                <select id="nivelNumero">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-salvar" id="btnSalvar">+ Salvar Dados</button>
    </form>
</div>



<script type="module">
  // 1. Importa as funções do seu arquivo central (Padrão Realtime Database)
  import { dbEscutarColaboradores, dbSalvarColaborador, dbExcluirColaborador } from './database.js';

  // 2. FUNÇÃO PARA CARREGAR A GALERIA (Sincroniza em tempo real)
  function carregarGaleria() {
      const container = document.getElementById('containerColaboradores');
      
      dbEscutarColaboradores((lista) => {
          container.innerHTML = ""; // Limpa a galeria antes de atualizar
          
          if (lista.length === 0) {
              container.innerHTML = "<p style='text-align:center; opacity:0.5; font-size:12px;'>Nenhum colaborador cadastrado.</p>";
              return;
          }

          lista.forEach((c) => {
              const card = document.createElement('div');
              card.className = 'card-colab';
              const nivelExibir = c.nivel_completo ? c.nivel_completo.toUpperCase().replace('_', ' ') : 'N/D';
              
              card.innerHTML = `
                  <div class="info-colab">
                      <b>${c.nome}</b>
                      <div>${c.cargo || 'Geral'} | ${nivelExibir}</div>
                      <div style="font-size:11px; color:#999;">Comissão: ${c.comissao || 0}%</div>
                  </div>
                  <div class="acoes-card">
                      <div class="btn-editar-card" id="edit-${c.firebaseUrl}">Editar</div>
                      <div class="btn-excluir-card" id="del-${c.firebaseUrl}">Excluir</div>
                  </div>`;
              container.appendChild(card);

              // Pendura as funções nos botões (usando o ID gerado pelo Firebase)
              document.getElementById(`edit-${c.firebaseUrl}`).onclick = () => prepararEdicao(c);
              document.getElementById(`del-${c.firebaseUrl}`).onclick = () => {
                  if(confirm("Deseja excluir este colaborador?")) {
                      dbExcluirColaborador(c.firebaseUrl);
                  }
              };
          });
      });
  }

  // 3. PREPARAR EDIÇÃO (Preenche o formulário lá embaixo)
  function prepararEdicao(c) {
      document.getElementById('idEdicao').value = c.firebaseUrl;
      document.getElementById('nomeColaborador').value = c.nome;
      document.getElementById('cargoColaborador').value = c.cargo || "";
      document.getElementById('comissaoColaborador').value = c.comissao || "";
      document.getElementById('senhaColaborador').value = c.senha || "";
      
      // Ajusta o botão para modo edição
      document.getElementById('btnSalvar').innerText = "Atualizar na Nuvem";
      document.getElementById('btnSalvar').style.background = "#ff9800";
      window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // 4. FUNÇÃO SALVAR (O botão "+ Salvar Dados")
  document.getElementById('formColaborador').onsubmit = async function(e) {
      e.preventDefault();
      
      const idEdicao = document.getElementById('idEdicao').value;
      
      // Criamos o objeto de dados
      const dados = {
          nome: document.getElementById('nomeColaborador').value,
          cargo: document.getElementById('cargoColaborador').value,
          comissao: document.getElementById('comissaoColaborador').value,
          senha: document.getElementById('senhaColaborador').value,
          nivel_completo: document.getElementById('nivelAcesso').value + "_" + document.getElementById('nivelNumero').value,
          dataAtualizacao: new Date().toISOString()
      };

      // Se for um NOVO cadastro, adicionamos a data de criação
      if (!idEdicao) {
          dados.dataCadastro = new Date().toISOString();
      } else {
          // Se for EDIÇÃO, precisamos manter a data de cadastro original para não perder a ordem
          // Pegamos o valor que já estava no campo oculto se necessário ou apenas salvamos a atualização
          // Para simplificar, o sistema usará a dataCadastro já existente no banco.
      }

      try {
          await dbSalvarColaborador(dados, idEdicao);
          
          document.getElementById('formColaborador').reset();
          document.getElementById('idEdicao').value = "";
          document.getElementById('btnSalvar').innerText = "+ Salvar Dados";
          document.getElementById('btnSalvar').style.background = "#4caf50";
          
      } catch (err) {
          console.error("Erro ao sincronizar:", err);
          alert("Ops! Verifique sua conexão.");
      }
  };

  // Inicia a galeria assim que abrir a página
  carregarGaleria();
</script>
</body>
</html>
