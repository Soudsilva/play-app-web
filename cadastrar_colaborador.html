<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Colaboradores</title>
    
    <style>
        /* Estilos Visuais do App */
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:420px; padding:15px; box-sizing:border-box; min-height: 100vh; }
        
        /* Cabeçalho */
        .topo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; width: 100%; min-height: 45px; }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; }
        .btn-home { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; position: absolute; right: 0; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Lista de Colaboradores */
        .secao-lista { margin-bottom: 25px; max-height: 350px; overflow-y: auto; padding-right: 5px; border-radius: 8px; }
        .subtitulo { font-size: 16px; color: #ffeb3b; margin-bottom: 12px; font-weight: bold; text-align: center; text-transform: uppercase; }
        
        /* Card Branco */
        .card-colab { 
            background: white; color: #333; border-radius: 12px; padding: 12px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            cursor: default !important; 
        }
        
        /* Alça de Arraste ☰ */
        .handle { user-select: none; -webkit-user-select: none; transition: 0.2s; cursor: grab; padding-right: 15px; color: #ccc; font-size: 20px; }
        .handle:hover { color: #042d86 !important; }

        /* Textos do Card */
        .info-colab b { color: #042d86; font-size: 16px; display: block; }
        .info-colab div { color: #666; font-size: 13px; font-weight: 500; }
        
        /* Botões */
        .acoes-card { display: flex; flex-direction: column; gap: 5px; }
        .btn-editar-card { background: #e3f2fd; color: #1976d2; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; border: 1px solid #1976d2; }
        .btn-excluir-card { background: #ffebee; color: #c62828; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; border: 1px solid #c62828; }

        /* Divisores e Formulário */
        .divisor { border-top: 1px solid rgba(255,255,255,0.3); margin: 25px 0; position: relative; text-align: center; }
        .divisor span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #042d86; padding: 0 10px; font-size: 11px; color: #ffeb3b; }
        .form-container { display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
        .linha-campos { display:flex; gap:10px; align-items:flex-end; }
        .linha-campos .campo { min-width: 0; display: flex; flex-direction: column; }
        .campo-nome { flex: 2.3; }
        .campo-cargo { flex: 1; max-width: 170px; }
        .campo-senha { flex: 1; max-width: 120px; }
        .campo-perfil { flex: 1.4; }
        .campo-nivel { flex: 0.8; max-width: 78px; }
        .campo-curto { flex: 1; min-width: 0; }
        .label-focada { font-size: 12px; color: #ffeb3b; font-weight: bold; margin-bottom: 4px; display: block; width: 100%; box-sizing: border-box; text-align: center; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255,255,255,0.05); color: white; box-sizing:border-box; font-size: 14px; outline: none; }
        input::placeholder { color: rgba(255,255,255,0.4); }
        select option { background: #042d86; color: white; }
        .bloco-remuneracao { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; padding: 12px; }
        .titulo-remuneracao { font-size: 16px; margin-bottom: 6px !important; }
        .remuneracao-grid { display: grid; gap: 10px; }
        .linha-remuneracao-topo { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; align-items: end; }
        .campo-remuneracao { display: flex; flex-direction: column; }
        .campo-remuneracao .label-focada { font-size: 14px; text-align: center; }
        .campo-remuneracao input { font-size: 16px; }
        .linha-remuneracao { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .linha-remuneracao .label-focada { margin: 0; min-width: 72px; }
        .linha-remuneracao input { flex: 1; }
        .checks-remuneracao { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .check-remuneracao { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); }
        .check-remuneracao input[type="checkbox"] { width: 18px; height: 18px; margin: 0; accent-color: #4caf50; flex-shrink: 0; }
        .check-remuneracao span { font-size: 13px; color: white; font-weight: bold; }
        .btn-salvar { background:#4caf50; padding:14px; text-align:center; border-radius:30px; font-weight:bold; cursor:pointer; margin-top: 10px; border: none; color: white; width: 100%; font-size: 15px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Colaboradores</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="secao-lista">
        <div class="subtitulo">Lista de Acesso</div>
        <div id="containerColaboradores"></div>
    </div>

    <div class="divisor"><span>CONFIGURAR NOVO ACESSO</span></div>

    <form class="form-container" id="formColaborador">
        <input type="hidden" id="idEdicao" value=""> 
        <div>
            <label class="label-focada">Nome do Colaborador</label>
            <input type="text" id="nomeColaborador" placeholder="Nome Completo" required>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 2;"><label class="label-focada">Cargo</label><input type="text" id="cargoColaborador" placeholder="Ex: Técnico"></div>
            <div style="flex: 1;"><label class="label-focada">Comissão</label><input type="text" id="comissaoColaborador" placeholder="0%" inputmode="numeric"></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1.5;"><label class="label-focada">Senha Global</label><input type="text" id="senhaColaborador" placeholder="Ex: 1234A" maxlength="5" autocomplete="off" required oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 5);"></div>
            <div style="flex: 2;"><label class="label-focada">Perfil</label>
                <select id="nivelAcesso">
                    <option value="gestao">Gestão</option>
                    <option value="atendimento">Atendimento</option>
                    <option value="estoque">Estoque</option>
                </select>
            </div>
            <div style="flex: 1;"><label class="label-focada">Nível</label>
                <select id="nivelNumero">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                </select>
            </div>
        </div>
        <div class="bloco-remuneracao">
            <label class="label-focada titulo-remuneracao">Remuneração Complementar</label>
            <div class="remuneracao-grid">
                <label class="check-remuneracao">
                <div class="linha-remuneracao">
                    <label class="label-focada">Comissão</label>
                    <input type="text" id="comissaoColaboradorCard" class="comissao-no-card" placeholder="0%" inputmode="numeric">
                </div>
                    <input type="checkbox" id="producaoProdutosColaborador">
                    <span>Produção de Produtos</span>
                </label>
                <label class="check-remuneracao">
                    <input type="checkbox" id="producaoEquipamentosColaborador">
                    <span>Produção de Equipamentos</span>
                </label>
                <label class="check-remuneracao">
                    <input type="checkbox" id="producaoPecasColaborador">
                    <span>Produção de Peças</span>
                </label>
                <div>
                    <label class="label-focada">Fixo</label>
                    <input type="text" id="fixoColaborador" placeholder="Valor combinado" inputmode="decimal">
                </div>
            </div>
        </div>
        <button type="submit" class="btn-salvar" id="btnSalvar">+ Salvar Dados</button>
    </form>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
  import { verificarAutenticacao, criarContaColaborador, atualizarSenhaColaborador } from './auth.js';
  verificarAutenticacao();
  import { dbEscutarColaboradores, dbSalvarColaborador, dbExcluirColaborador, dbAtualizarOrdemColaborador } from './database.js';

  let listaColaboradores = [];

  function formatarResumoRepresentante(valor) {
      if (valor === true) return 'Representante';
      const texto = limparValorPercentual(valor).replace(',', '.');
      const numero = Number(texto);
      if (!texto || Number.isNaN(numero) || numero <= 0) return '';
      return `Repres.: ${String(valor).trim()}`;
  }

  function temValorMonetario(valor) {
      const limpo = limparValorInteiro(valor);
      return !!limpo && Number(limpo) > 0;
  }

  function formatarResumoComissao(valor) {
      const texto = limparValorPercentual(valor).replace(',', '.');
      const numero = Number(texto);
      if (!texto || Number.isNaN(numero) || numero <= 0) return '';
      return `Comissão: ${String(valor).trim()}%`;
  }

  function limparValorPercentual(valor) {
      return String(valor || '').replace(/%/g, '').replace(/\s+/g, '').trim();
  }

  function limparValorInteiro(valor) {
      return String(valor || '').replace(/\D/g, '');
  }

  function formatarMilhar(valor) {
      const limpo = limparValorInteiro(valor);
      if (!limpo) return '';
      return Number(limpo).toLocaleString('pt-BR');
  }

  function conectarCampoPercentual(id) {
      const input = document.getElementById(id);
      if (!input) return;
      input.addEventListener('focus', () => {
          input.value = limparValorPercentual(input.value);
      });
      input.addEventListener('input', () => {
          let valor = limparValorPercentual(input.value).replace(/[^0-9,]/g, '');
          const partes = valor.split(',');
          if (partes.length > 2) {
              valor = `${partes[0]},${partes.slice(1).join('')}`;
          }
          if (valor.includes(',')) {
              const [inteira, decimal] = valor.split(',');
              valor = `${inteira.slice(0, 2)},${(decimal || '').slice(0, 1)}`;
          } else {
              valor = valor.slice(0, 2);
          }
          input.value = valor;
      });
      input.addEventListener('blur', () => {
          const limpo = limparValorPercentual(input.value);
          input.value = limpo ? `${limpo}%` : '';
      });
  }

  function conectarCampoValor(id) {
      const input = document.getElementById(id);
      if (!input) return;
      input.addEventListener('focus', () => {
          input.value = limparValorInteiro(input.value);
      });
      input.addEventListener('input', () => {
          input.value = formatarMilhar(input.value);
      });
      input.addEventListener('blur', () => {
          input.value = formatarMilhar(input.value);
      });
  }

  function configurarBlocoRemuneracao() {
      const form = document.getElementById('formColaborador');
      if (!form) return;

      form.innerHTML = `
        <input type="hidden" id="idEdicao" value="">

        <div class="linha-campos">
            <div class="campo campo-nome">
                <label class="label-focada">Nome do Colaborador</label>
                <input type="text" id="nomeColaborador" placeholder="Nome Completo" maxlength="20" required>
            </div>
            <div class="campo campo-cargo">
                <label class="label-focada">Cargo</label>
                <input type="text" id="cargoColaborador" placeholder="Cargo" maxlength="15">
            </div>
        </div>

        <div class="linha-campos">
            <div class="campo campo-senha">
                <label class="label-focada">Senha Global</label>
                <input type="text" id="senhaColaborador" placeholder="1234A" maxlength="5" autocomplete="off" required oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 5);">
            </div>
            <div class="campo campo-perfil">
                <label class="label-focada">Perfil</label>
                <select id="nivelAcesso">
                    <option value="gestao">Gestão</option>
                    <option value="atendimento">Atendimento</option>
                    <option value="estoque">Estoque</option>
                </select>
            </div>
            <div class="campo campo-nivel">
                <label class="label-focada">Nível</label>
                <select id="nivelNumero">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                </select>
            </div>
        </div>

        <div class="bloco-remuneracao">
            <label class="label-focada titulo-remuneracao">Remuneração</label>
            <div class="remuneracao-grid">
                <div class="linha-remuneracao-topo">
                    <div class="campo campo-curto campo-remuneracao">
                        <label class="label-focada">Comissão</label>
                        <input type="text" id="comissaoColaborador" placeholder="0%" maxlength="5" inputmode="decimal">
                    </div>
                    <div class="campo campo-curto campo-remuneracao">
                        <label class="label-focada">Repres.</label>
                        <input type="text" id="representanteComissaoColaborador" placeholder="5%" maxlength="5" inputmode="decimal">
                    </div>
                    <div class="campo campo-curto campo-remuneracao">
                        <label class="label-focada">Fixo</label>
                        <input type="text" id="fixoColaborador" placeholder="Valor" maxlength="5" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 5);">
                    </div>
                    <div class="campo campo-curto campo-remuneracao">
                        <label class="label-focada">Bônus Fixo</label>
                        <input type="text" id="bonusFixoColaborador" placeholder="Valor" maxlength="5" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 5);">
                    </div>
                </div>
                <div class="checks-remuneracao">
                    <label class="check-remuneracao">
                        <input type="checkbox" id="producaoProdutosColaborador">
                        <span>Produção de Produtos</span>
                    </label>
                    <label class="check-remuneracao">
                        <input type="checkbox" id="producaoEquipamentosColaborador">
                        <span>Produção de Equipamentos</span>
                    </label>
                    <label class="check-remuneracao">
                        <input type="checkbox" id="producaoPecasColaborador">
                        <span>Produção de Peças</span>
                    </label>
                    <label class="check-remuneracao">
                        <input type="checkbox" id="prestacaoServicoColaborador">
                        <span>Prestação de Serviço</span>
                    </label>
                </div>
            </div>
        </div>
        <button type="submit" class="btn-salvar" id="btnSalvar">+ Salvar Dados</button>
      `;
      conectarCampoPercentual('comissaoColaborador');
      conectarCampoPercentual('representanteComissaoColaborador');
      conectarCampoValor('fixoColaborador');
      conectarCampoValor('bonusFixoColaborador');
      return;

      const bloco = document.querySelector('.bloco-remuneracao');
      if (!bloco) return;

      const titulo = bloco.querySelector('.label-focada');
      if (titulo) titulo.textContent = 'Remuneração';

      const campoComissaoTopo = document.getElementById('comissaoColaborador');
      const grupoComissaoTopo = campoComissaoTopo?.closest('div');
      if (grupoComissaoTopo) grupoComissaoTopo.style.display = 'none';

      const grid = bloco.querySelector('.remuneracao-grid');
      let campoComissaoCard = document.getElementById('comissaoColaboradorCard');
      if (!campoComissaoCard && grid) {
          const linhaComissao = document.createElement('div');
          linhaComissao.className = 'linha-remuneracao';
          linhaComissao.innerHTML = `
              <label class="label-focada">Comissão</label>
              <input type="text" id="comissaoColaboradorCard" class="comissao-no-card" placeholder="0%" inputmode="numeric">
          `;
          grid.prepend(linhaComissao);
          campoComissaoCard = linhaComissao.querySelector('#comissaoColaboradorCard');
      } else if (campoComissaoCard && grid && !campoComissaoCard.closest('.linha-remuneracao')) {
          const linhaComissao = document.createElement('div');
          linhaComissao.className = 'linha-remuneracao';
          const label = document.createElement('label');
          label.className = 'label-focada';
          label.textContent = 'Comissão';
          campoComissaoCard.parentElement?.removeChild(campoComissaoCard);
          linhaComissao.appendChild(label);
          linhaComissao.appendChild(campoComissaoCard);
          grid.prepend(linhaComissao);
      }

      const fixo = document.getElementById('fixoColaborador');
      if (fixo?.parentElement) {
          fixo.parentElement.classList.add('linha-remuneracao');
      }

      const opcoesExtras = [
          { id: 'prestacaoServicoColaborador', label: 'Prestação de Serviço' }
      ];
      opcoesExtras.forEach(({ id, label }) => {
          if (!grid || document.getElementById(id)) return;
          const linha = document.createElement('label');
          linha.className = 'check-remuneracao';
          linha.innerHTML = `
              <input type="checkbox" id="${id}">
              <span>${label}</span>
          `;
          const linhaFixo = fixo?.closest('.linha-remuneracao') || fixo?.parentElement || null;
          if (linhaFixo) grid.insertBefore(linha, linhaFixo);
          else grid.appendChild(linha);
      });

      if (grid && !document.getElementById('representanteComissaoColaborador')) {
          const linhaRepresentante = document.createElement('div');
          linhaRepresentante.className = 'linha-remuneracao';
          linhaRepresentante.innerHTML = `
              <label class="label-focada">Representante</label>
              <input type="text" id="representanteComissaoColaborador" placeholder="5%" inputmode="numeric">
          `;
          const linhaFixo = fixo?.closest('.linha-remuneracao') || fixo?.parentElement || null;
          if (linhaFixo) grid.insertBefore(linhaRepresentante, linhaFixo);
          else grid.appendChild(linhaRepresentante);
      }

      if (campoComissaoCard && campoComissaoTopo) {
          campoComissaoCard.value = campoComissaoTopo.value || '';
          campoComissaoCard.addEventListener('input', () => {
              campoComissaoTopo.value = campoComissaoCard.value;
          });
      }
  }

  // CARREGAR LISTA
  function carregarGaleria() {
      const container = document.getElementById('containerColaboradores');
      dbEscutarColaboradores((lista) => {
          listaColaboradores = lista;
          container.innerHTML = ""; 
          if (lista.length === 0) {
              container.innerHTML = "<p style='text-align:center; opacity:0.5; font-size:12px;'>Nenhum colaborador cadastrado.</p>";
              return;
          }

          // A lista já vem ordenada do banco. Se o novo tem ordem -Timestamp, ele vem primeiro.
          lista.forEach((c) => {
              const card = document.createElement('div');
              card.className = 'card-colab';
              card.setAttribute('data-id', c.firebaseUrl); 
              const nivelExibir = c.nivel_completo ? c.nivel_completo.toUpperCase().replace('_', ' ') : 'N/D';
              
              card.innerHTML = `
                  <div class="handle">☰</div>
                  <div class="info-colab" style="flex:1;">
                      <b>${c.nome}</b>
                      <div>${c.cargo || 'Geral'} | ${nivelExibir}</div>
                      <div style="font-size:11px; color:#999;">${[
                          c.producaoProdutos ? 'Prod. Produtos' : '',
                          c.producaoEquipamentos ? 'Prod. Equip.' : '',
                          c.prestacaoServico ? 'Prest. Serviço' : '',
                          formatarResumoComissao(c.comissao),
                          formatarResumoRepresentante(c.representanteComissao),
                          c.producaoPecas ? 'Prod. Peças' : '',
                          temValorMonetario(c.fixo) ? `Fixo: ${formatarMilhar(c.fixo)}` : '',
                          temValorMonetario(c.bonusFixo) ? `Bônus: ${formatarMilhar(c.bonusFixo)}` : ''
                      ].filter(Boolean).join(' | ')}</div>
                  </div>
                  <div class="acoes-card">
                      <div class="btn-editar-card" id="edit-${c.firebaseUrl}">Editar</div>
                      <div class="btn-excluir-card" id="del-${c.firebaseUrl}">Excluir</div>
                  </div>`;
              container.appendChild(card);

              document.getElementById(`edit-${c.firebaseUrl}`).onclick = (e) => { e.stopPropagation(); prepararEdicao(c); };
              document.getElementById(`del-${c.firebaseUrl}`).onclick = async (e) => {
                  e.stopPropagation();
                  if(await window.playConfirm("Deseja excluir este colaborador?")) dbExcluirColaborador(c.firebaseUrl);
              };
          });
      });
  }

  // ARRASTE: REORDENAÇÃO COMPLETA
  const listaCards = document.getElementById('containerColaboradores');
  Sortable.create(listaCards, {
      animation: 150,
      handle: '.handle', 
      onEnd: async function () {
          const cardsDaTela = Array.from(listaCards.querySelectorAll('.card-colab'));
          
          // Reatribuímos a ordem baseada na posição visual (0, 1, 2...)
          const promessas = cardsDaTela.map((card, index) => {
              const idFirebase = card.getAttribute('data-id');
              if (idFirebase) {
                  return dbAtualizarOrdemColaborador(idFirebase, index);
              }
          });

          await Promise.all(promessas);
          console.log("Posições visuais salvas no banco!");
      }
  });

  // PREPARAR EDIÇÃO
  function prepararEdicao(c) {
      document.getElementById('idEdicao').value = c.firebaseUrl;
      document.getElementById('nomeColaborador').value = c.nome;
      document.getElementById('cargoColaborador').value = c.cargo || "";
      document.getElementById('comissaoColaborador').value = c.comissao ? `${limparValorPercentual(c.comissao)}%` : "";
      document.getElementById('senhaColaborador').value = c.senha || "";
      document.getElementById('producaoProdutosColaborador').checked = !!c.producaoProdutos;
      document.getElementById('producaoEquipamentosColaborador').checked = !!c.producaoEquipamentos;
      document.getElementById('producaoPecasColaborador').checked = !!c.producaoPecas;
      document.getElementById('prestacaoServicoColaborador').checked = !!c.prestacaoServico;
      document.getElementById('representanteComissaoColaborador').value = c.representanteComissao ? `${limparValorPercentual(c.representanteComissao)}%` : '';
      document.getElementById('fixoColaborador').value = formatarMilhar(c.fixo || "");
      document.getElementById('bonusFixoColaborador').value = formatarMilhar(c.bonusFixo || "");
      const partesNivel = String(c.nivel_completo || 'gestao_1').split('_');
      document.getElementById('nivelAcesso').value = partesNivel[0] || 'gestao';
      document.getElementById('nivelNumero').value = partesNivel[1] || '1';
      document.getElementById('btnSalvar').innerText = "Atualizar na Nuvem";
      document.getElementById('btnSalvar').style.background = "#ff9800";
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  // SALVAR DADOS
  document.getElementById('formColaborador').onsubmit = async function(e) {
      e.preventDefault();
      const idEdicao = document.getElementById('idEdicao').value;
      const dados = {
          nome: document.getElementById('nomeColaborador').value,
          cargo: document.getElementById('cargoColaborador').value,
          comissao: limparValorPercentual(document.getElementById('comissaoColaborador').value),
          producaoProdutos: document.getElementById('producaoProdutosColaborador').checked,
          producaoEquipamentos: document.getElementById('producaoEquipamentosColaborador').checked,
          producaoPecas: document.getElementById('producaoPecasColaborador').checked,
          prestacaoServico: document.getElementById('prestacaoServicoColaborador').checked,
          representanteComissao: limparValorPercentual(document.getElementById('representanteComissaoColaborador').value),
          fixo: limparValorInteiro(document.getElementById('fixoColaborador').value),
          bonusFixo: limparValorInteiro(document.getElementById('bonusFixoColaborador').value),
          senha: document.getElementById('senhaColaborador').value.trim(),
          nivel_completo: document.getElementById('nivelAcesso').value + "_" + document.getElementById('nivelNumero').value,
          dataAtualizacao: new Date().toISOString()
      };

      // Mantém histórico de comissão por mês
      const mesAtual = new Date().toISOString().slice(0, 7); // "2025-03"
      if (!idEdicao) {
          dados.comissaoHistorico = [{ valor: dados.comissao, inicio: mesAtual }];
      } else {
          const existente = listaColaboradores.find(c => c.firebaseUrl === idEdicao);
          const historico = Array.isArray(existente?.comissaoHistorico) ? [...existente.comissaoHistorico] : [];
          if (existente?.comissao !== dados.comissao) {
              const idx = historico.findIndex(h => h.inicio === mesAtual);
              if (idx >= 0) historico[idx].valor = dados.comissao;
              else historico.push({ valor: dados.comissao, inicio: mesAtual });
          }
          dados.comissaoHistorico = historico;
      }

      if (!dados.senha) {
          await window.playAlert('Preencha a senha do colaborador antes de salvar.');
          return;
      }

      const digitos = (dados.senha.match(/[0-9]/g) || []).length;
      const letras = (dados.senha.match(/[A-Za-z]/g) || []).length;
      if (digitos !== 4 || letras !== 1 || dados.senha.length !== 5) {
          await window.playAlert('A senha deve ter exatamente 4 números e 1 letra (ex: 1234A).');
          return;
      }

      try {
          if (!idEdicao) {
              dados.dataCadastro = new Date().toISOString();
              await dbSalvarColaborador(dados, null);
              // Cria conta de login automaticamente para o novo colaborador
              if (dados.senha) {
                  try {
                      await criarContaColaborador(dados.nome, dados.senha);
                  } catch (authErr) {
                      if (authErr.code !== 'auth/email-already-in-use') {
                          console.warn('Conta de login não criada:', authErr.message);
                      }
                  }
              }
          } else {
              const existente = listaColaboradores.find(c => c.firebaseUrl === idEdicao);
              const senhaAntiga = existente?.senha || '';
              await dbSalvarColaborador(dados, idEdicao);
              // Atualiza senha no login se foi alterada
              if (dados.senha && senhaAntiga !== dados.senha) {
                  try {
                      await atualizarSenhaColaborador(dados.nome, senhaAntiga, dados.senha);
                  } catch (authErr) {
                      console.warn('Senha de login não atualizada:', authErr.message);
                      await window.playAlert('Dados salvos! Porém não foi possível atualizar a senha de login automaticamente. Use a página criar_contas.html para sincronizar.');
                  }
              }
          }

          document.getElementById('formColaborador').reset();
          document.getElementById('idEdicao').value = "";
          document.getElementById('btnSalvar').innerText = "+ Salvar Dados";
          document.getElementById('btnSalvar').style.background = "#4caf50";
          document.getElementById('nivelAcesso').value = "gestao";
          document.getElementById('nivelNumero').value = "1";
      } catch (err) {
          console.error("Erro:", err);
      }
  };

  configurarBlocoRemuneracao();
  carregarGaleria();
</script>
</body>
</html>
