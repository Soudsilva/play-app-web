<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa</title>
    <style>
        * { box-sizing: border-box; }
        input, textarea, select, button { font: inherit; }
        input, textarea { user-select: text; -webkit-user-select: text; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f2a66;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .app {
            width: 100%;
            max-width: 480px;
            padding: 15px 15px 210px;
        }

        .topo {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .card-saldo {
            background: linear-gradient(135deg, #162f7a, #0c1e56);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 14px;
            padding: 10px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .saldo-label {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .saldo-valor {
            font-size: 28px;
            font-weight: bold;
            color: #a5d6a7;
        }
        .saldo-valor.negativo { color: #ef9a9a; }


        .lista {
            display: flex;
            flex-direction: column;
        }
        .vazio {
            text-align: center;
            padding: 50px 20px;
            color: white;
            font-size: 17px;
        }
        .grupo-data {
            margin-bottom: 4px;
        }
        .grupo-data-label {
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #aac4f5;
            padding: 8px 4px 5px;
        }

        .mov-card {
            border-radius: 14px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }
        .mov-card.gasto  { background: transparent; border-color: rgba(196, 122, 122, 0.35); }
        .mov-card.entrada { background: rgba(80, 180, 100, 0.08); border-color: rgba(122, 184, 122, 0.35); }
        .mov-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .mov-icon.gasto  { background: rgba(180, 80, 80, 0.15); }
        .mov-icon.entrada { background: rgba(80, 180, 100, 0.15); }
        .mov-info {
            flex: 1;
            min-width: 0;
        }
        .mov-cat {
            font-size: 18px;
            font-weight: bold;
        }
        .mov-cat.gasto  { color: #ef9a9a; }
        .mov-cat.entrada { color: #a5d6a7; }
        .mov-desc {
            font-size: 15px;
            color: #c8d8f0;
            margin-top: 3px;
            white-space: normal;
            word-break: break-word;
        }
        .mov-hora {
            font-size: 14px;
            color: #8aaad0;
            margin-top: 3px;
        }
        .mov-registrado-por {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 9px;
            border-radius: 99px;
            border: 1px solid rgba(255, 213, 79, 0.35);
            background: rgba(255, 213, 79, 0.07);
            font-size: 12px;
            color: #ffd54f;
            font-weight: bold;
            white-space: nowrap;
        }
        .mov-acoes {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }
        .mov-valores { text-align: right; }
        .mov-valor {
            font-size: 18px;
            font-weight: bold;
        }
        .mov-valor.gasto  { color: #ef9a9a; }
        .mov-valor.entrada { color: #a5d6a7; }
        .mov-saldo-apos {
            font-size: 14px;
            color: #8aaad0;
            margin-top: 2px;
        }
        .btn-excluir-mov {
            width: 26px;
            height: 26px;
            padding: 0;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: rgba(255,255,255,0.2);
            font-size: 15px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-excluir-mov:hover { color: rgba(239,154,154,0.6); }
        .btn-excluir-mov:disabled {
            opacity: 0.2;
            cursor: default;
        }

        .form-fixo {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 16px);
            max-width: 480px;
            background: #091845;
            border: 1px solid #223768;
            border-bottom: none;
            border-radius: 18px;
            padding: 12px 12px calc(14px + env(safe-area-inset-bottom, 0px));
            z-index: 100;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-sizing: border-box;
            overflow: hidden;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }
        .form-fixo.tipo-gasto {
            border-color: #8f3940;
            box-shadow: inset 0 0 0 1px #ffd4d8, 0 -8px 32px rgba(0,0,0,0.4);
        }
        .form-fixo.tipo-entrada {
            border-color: #2e6d36;
            box-shadow: inset 0 0 0 1px #d8ffd8, 0 -8px 32px rgba(0,0,0,0.4);
        }
        .seg-row {
            display: flex;
            gap: 6px;
        }
        .seg-option {
            flex: 1;
            min-width: 0;
            position: relative;
            padding: 2px;
            border-radius: 12px;
            border: 2px solid #31406f;
            background: #122557;
            box-sizing: border-box;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }
        .seg-option.gasto-wrap { position: relative; }
        .seg-btn {
            width: 100%;
            height: 46px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.05);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }
        .seg-btn.gasto         { color: #ffb3ba; border-color: rgba(239,154,154,0.25); }
        .seg-btn.entrada       { color: #b3f0b8; border-color: rgba(165,214,167,0.25); min-width: 0; }
        .seg-btn.gasto.ativo   {
            background: #ef9a9a;
            border-color: #ffd4d8;
            box-shadow: inset 0 0 0 2px #8f3940, 0 0 0 1px #ffd4d8;
            color: #5a0000;
        }
        .seg-btn.entrada.ativo {
            background: #a5d6a7;
            border-color: #d8ffd8;
            box-shadow: inset 0 0 0 2px #2e6d36, 0 0 0 1px #d8ffd8;
            color: #003d00;
        }
        .gasto-wrap #btnGasto { width: 100%; }
        .menu-cat {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            z-index: 300;
            min-width: 100%;
        }
        .menu-cat-inner {
            background: #0d2560;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
        }
        .menu-cat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 20px;
            width: 100%;
            border: none;
            background: transparent;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            text-align: left;
        }
        .menu-cat-item + .menu-cat-item { border-top: 1px solid rgba(255,255,255,0.08); }
        .menu-cat-item:active { background: rgba(255,255,255,0.05); }
        .form-main-row {
            display: flex;
            gap: 6px;
            align-items: stretch;
        }
        .campo-obs {
            flex: 1.1;
            min-width: 0;
            height: 46px;
            padding: 0 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.1);
            color: white;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
        }
        .campo-obs::placeholder { color: rgba(255,255,255,0.3); }
        .campo-obs:focus { border-color: rgba(255,255,255,0.25); }
        .form-valor-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.14);
            border-radius: 10px;
            padding: 0 10px;
            gap: 4px;
            min-width: 0;
        }
        .valor-prefix {
            font-size: 14px;
            font-weight: bold;
            color: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }
        .campo-valor {
            flex: 1;
            min-width: 0;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            outline: none;
            height: 46px;
        }
        .campo-valor::placeholder { color: rgba(255,255,255,0.22); }
        .btn-registrar {
            flex-shrink: 0;
            padding: 0 14px;
            height: 46px;
            border: none;
            border-radius: 10px;
            background: #ffeb3b;
            color: #0b2256;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-registrar:disabled { opacity: 0.35; cursor: default; }

        .toast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.65);
            padding: 7px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: normal;
            z-index: 999;
            transition: opacity 0.4s;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>
<body style="visibility:hidden;">

<div class="app">
    <div class="topo">&#128184; Fluxo de Caixa</div>

    <div class="card-saldo">
        <div class="saldo-label">Saldo Atual</div>
        <div class="saldo-valor" id="saldoAtual">R$ 0,00</div>
    </div>

    <div class="lista" id="listaMov">
        <div class="vazio" id="msgVazio">Nenhuma movimentacao ainda.</div>
    </div>
</div>

<div class="form-fixo tipo-gasto" id="formFixo">
    <div class="seg-row">
        <div class="seg-option gasto-wrap">
            <button class="seg-btn gasto ativo" id="btnGasto" type="button">&#11015;&#65039; Gastos</button>
            <div class="menu-cat" id="menuCat">
                <div class="menu-cat-inner">
                    <button class="menu-cat-item" type="button" data-cat="combustivel">&#9981; Combust&iacute;vel</button>
                    <button class="menu-cat-item" type="button" data-cat="outros">&#128221; Outros</button>
                </div>
            </div>
        </div>
        <div class="seg-option entrada-wrap">
            <button class="seg-btn entrada" id="btnEntrada" type="button">&#11014;&#65039; Entrada</button>
        </div>
    </div>

    <div class="form-main-row">
        <input class="campo-obs" id="inputObs" type="text" placeholder="Observacao...">
        <div class="form-valor-wrap">
            <span class="valor-prefix">R$</span>
            <input class="campo-valor" id="inputValor" type="text" inputmode="decimal" placeholder="0,00" autocomplete="off">
        </div>
        <button class="btn-registrar" id="btnRegistrar" type="button">Registrar</button>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    import {
        dbListarFluxoCaixa,
        dbEscutarFluxoCaixa,
        dbSalvarMovimentoFluxoCaixa,
        dbExcluirMovimentoFluxoCaixa
    } from './database.js';

    const CATEGORIAS_GASTO = [
        { id: 'combustivel', label: 'Combustível', icone: '&#9981;' },
        { id: 'outros',      label: 'Outros',      icone: '&#128221;' },
    ];
    const CATEGORIA_GASTO_PADRAO = 'outros';

    const ICONES = {
        gasto: Object.fromEntries(CATEGORIAS_GASTO.map(c => [c.id, c.icone])),
        entrada: '&#128176;'
    };

    const estado = {
        nomeUsuario: '',
        tipoAtual: 'gasto',
        categoriaAtual: CATEGORIA_GASTO_PADRAO,
        movimentacoes: [],
        salvando: false,
        exclusoesEmAndamento: new Set()
    };

    const els = {
        saldoAtual: document.getElementById('saldoAtual'),
        listaCount: document.getElementById('listaCount'),
        listaMov: document.getElementById('listaMov'),
        msgVazio: document.getElementById('msgVazio'),
        btnGasto: document.getElementById('btnGasto'),
        btnEntrada: document.getElementById('btnEntrada'),
        formFixo: document.getElementById('formFixo'),
        menuCat: document.getElementById('menuCat'),
        inputObs: document.getElementById('inputObs'),
        inputValor: document.getElementById('inputValor'),
        btnRegistrar: document.getElementById('btnRegistrar')
    };

    function obterChaveCacheFluxoCaixa(nomeUsuario) {
        return `play_fluxo_caixa_cache_${String(nomeUsuario || '').trim().toLowerCase()}`;
    }

    function salvarCacheFluxoCaixa(nomeUsuario, movimentacoes) {
        if (!nomeUsuario) return;
        try {
            localStorage.setItem(obterChaveCacheFluxoCaixa(nomeUsuario), JSON.stringify(movimentacoes));
        } catch (error) {
            console.warn('Nao foi possivel salvar o cache do fluxo de caixa:', error);
        }
    }

    function lerCacheFluxoCaixa(nomeUsuario) {
        if (!nomeUsuario) return [];
        try {
            const json = localStorage.getItem(obterChaveCacheFluxoCaixa(nomeUsuario));
            const lista = json ? JSON.parse(json) : [];
            return Array.isArray(lista) ? lista : [];
        } catch (error) {
            console.warn('Nao foi possivel ler o cache do fluxo de caixa:', error);
            return [];
        }
    }

    await verificarAutenticacao();
    estado.nomeUsuario = String(localStorage.getItem('usuarioLogado') || '').trim();

    vincularEventos();
    atualizarFormulario();
    estado.movimentacoes = lerCacheFluxoCaixa(estado.nomeUsuario);
    render();

    dbEscutarFluxoCaixa(estado.nomeUsuario, (movimentacoes) => {
        estado.movimentacoes = movimentacoes;
        salvarCacheFluxoCaixa(estado.nomeUsuario, movimentacoes);
        render();
    });

    function toggleMenuCat(forcarAberto = false) {
        const aberto = els.menuCat.style.display === 'block';
        els.menuCat.style.display = (forcarAberto || !aberto) ? 'block' : 'none';
    }
    function fecharMenuCat() {
        els.menuCat.style.display = 'none';
    }
    document.addEventListener('click', (e) => {
        if (!els.menuCat.contains(e.target) && !els.btnGasto.contains(e.target)) fecharMenuCat();
    });

    function vincularEventos() {
        els.btnGasto.addEventListener('click', () => {
            const estavaNoGastoPadrao = estado.tipoAtual === 'gasto' && estado.categoriaAtual === CATEGORIA_GASTO_PADRAO;
            const menuAberto = els.menuCat.style.display === 'block';
            estado.tipoAtual = 'gasto';
            estado.categoriaAtual = CATEGORIA_GASTO_PADRAO;
            atualizarFormulario();
            toggleMenuCat(!(estavaNoGastoPadrao && menuAberto));
        });
        els.btnEntrada.addEventListener('click', () => {
            fecharMenuCat();
            estado.tipoAtual = 'entrada';
            atualizarFormulario();
        });
        els.menuCat.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-cat]');
            if (!btn) return;
            estado.categoriaAtual = btn.dataset.cat;
            estado.tipoAtual = 'gasto';
            fecharMenuCat();
            atualizarFormulario();
        });
        els.btnRegistrar.addEventListener('click', registrar);
        els.listaMov.addEventListener('click', async (event) => {
            const btn = event.target.closest('[data-acao="excluir"]');
            if (!btn) return;
            await excluirMovimentacao(btn.dataset.key || '');
        });
    }

    function toast(msg, erro = false) {
        const el = document.createElement('div');
        el.className = 'toast' + (erro ? ' erro' : '');
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => {
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 300);
        }, 2200);
    }

    function escapeHtml(texto) {
        return String(texto ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function obterDataLocalISO(dataBase = new Date()) {
        const agora = new Date(dataBase);
        const ano = agora.getFullYear();
        const mes = String(agora.getMonth() + 1).padStart(2, '0');
        const dia = String(agora.getDate()).padStart(2, '0');
        return `${ano}-${mes}-${dia}`;
    }

    function normalizarValorMoeda(valor) {
        const texto = String(valor ?? '').trim().replace(/\s+/g, '').replace(/[^\d,.-]/g, '');
        if (!texto) return NaN;

        const ultimoSeparador = Math.max(texto.lastIndexOf(','), texto.lastIndexOf('.'));
        if (ultimoSeparador === -1) {
            return Number(texto.replace(/[^\d-]/g, ''));
        }

        const parteInteira = texto.slice(0, ultimoSeparador).replace(/[^\d-]/g, '');
        const parteDecimal = texto.slice(ultimoSeparador + 1).replace(/\D/g, '');
        return Number(`${parteInteira || '0'}.${parteDecimal}`);
    }

    function formatarMoeda(valor) {
        return 'R$ ' + Math.abs(Number(valor || 0)).toLocaleString('pt-BR', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    function atualizarFormulario() {
        const isGasto = estado.tipoAtual === 'gasto';
        els.btnGasto.classList.toggle('ativo', isGasto);
        els.btnEntrada.classList.toggle('ativo', !isGasto);
        els.formFixo.classList.toggle('tipo-gasto', isGasto);
        els.formFixo.classList.toggle('tipo-entrada', !isGasto);

        if (isGasto) {
            const cat = CATEGORIAS_GASTO.find(c => c.id === estado.categoriaAtual)
                || CATEGORIAS_GASTO.find(c => c.id === CATEGORIA_GASTO_PADRAO)
                || CATEGORIAS_GASTO[0];
            const rotuloBotao = cat.id === CATEGORIA_GASTO_PADRAO ? 'Gastos' : cat.label;
            els.btnGasto.innerHTML = `&#11015;&#65039; ${rotuloBotao}`;
        } else {
            els.btnGasto.innerHTML = '&#11015;&#65039; Gastos';
        }

        els.btnRegistrar.disabled = estado.salvando || !estado.nomeUsuario;
        els.btnRegistrar.textContent = estado.salvando ? 'Salvando...' : 'Registrar';
    }

    function obterMovimentacoesFiltradas() {
        const meses = [...new Set(
            estado.movimentacoes
                .map(item => item.data ? item.data.slice(0, 7) : '')
                .filter(Boolean)
        )].sort().reverse().slice(0, 3);
        return estado.movimentacoes.filter(item => item.data && meses.includes(item.data.slice(0, 7)));
    }

    function calcularSaldo(lista) {
        let saldo = 0;
        for (const item of lista) {
            saldo += item.tipo === 'entrada' ? Number(item.valor || 0) : -Number(item.valor || 0);
        }
        return saldo;
    }

    function atualizarSaldo() {
        const saldo = calcularSaldo(obterMovimentacoesFiltradas());
        els.saldoAtual.textContent = 'R$ ' + Math.abs(saldo).toLocaleString('pt-BR', { maximumFractionDigits: 0 });
        els.saldoAtual.className = 'saldo-valor' + (saldo < 0 ? ' negativo' : '');
    }


    function obterSaldoPorKey(listaBase = estado.movimentacoes) {
        const ordenadas = [...listaBase].sort((a, b) => (a.criado_em || 0) - (b.criado_em || 0));
        const saldoPorKey = {};
        let saldo = 0;

        for (const item of ordenadas) {
            saldo += item.tipo === 'entrada' ? Number(item.valor || 0) : -Number(item.valor || 0);
            saldoPorKey[item.firebaseKey] = saldo;
        }

        return saldoPorKey;
    }

    function rotuloData(data) {
        if (!data) return 'Sem data';
        const hoje = obterDataLocalISO();
        const ontem = obterDataLocalISO(Date.now() - 86400000);
        if (data === hoje) return 'Hoje';
        if (data === ontem) return 'Ontem';
        const [ano, mes, dia] = data.split('-');
        return `${dia}/${mes}/${ano}`;
    }

    function renderLista() {
        const listaFiltrada = [...obterMovimentacoesFiltradas()].sort((a, b) => (b.criado_em || 0) - (a.criado_em || 0));
        const saldoPorKey = obterSaldoPorKey(listaFiltrada);
        const maisRecente = estado.movimentacoes.reduce(
            (atual, item) => ((item?.criado_em || 0) > (atual?.criado_em || 0) ? item : atual),
            null
        );
        const maisRecenteKey = maisRecente?.firebaseKey || '';

        els.listaMov.innerHTML = '';

        if (listaFiltrada.length === 0) {
            els.msgVazio.style.display = 'block';
            els.listaMov.appendChild(els.msgVazio);
            return;
        }

        els.msgVazio.style.display = 'none';

        const grupos = new Map();
        for (const item of listaFiltrada) {
            const chave = item.data || 'sem-data';
            if (!grupos.has(chave)) grupos.set(chave, []);
            grupos.get(chave).push(item);
        }

        const fragment = document.createDocumentFragment();

        for (const [dataKey, itens] of grupos.entries()) {
            const grupoEl = document.createElement('div');
            grupoEl.className = 'grupo-data';

            const headerEl = document.createElement('div');
            headerEl.className = 'grupo-data-label';
            headerEl.textContent = rotuloData(dataKey);
            grupoEl.appendChild(headerEl);

            for (const item of itens) {
                const isGasto = item.tipo === 'gasto';
                const catInfo = isGasto
                    ? (CATEGORIAS_GASTO.find(c => c.id === item.categoria) || CATEGORIAS_GASTO[CATEGORIAS_GASTO.length - 1])
                    : null;
                const icone = isGasto ? catInfo.icone : ICONES.entrada;
                const categoria = isGasto ? catInfo.label : 'Entrada';
                const hora = item.criado_em
                    ? new Date(item.criado_em).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                    : '';
                const saldoApos = saldoPorKey[item.firebaseKey] ?? 0;
                const apagandoItem = estado.exclusoesEmAndamento.has(item.firebaseKey);
                const podeApagar = item.firebaseKey === maisRecenteKey &&
                    (Date.now() - (item.criado_em || 0)) < 3600000 &&
                    !item.origemAutomatica;

                const card = document.createElement('div');
                card.className = `mov-card ${item.tipo}`;
                card.innerHTML = `
                    <div class="mov-icon ${item.tipo}">${icone}</div>
                    <div class="mov-info">
                        <div class="mov-cat ${item.tipo}">${categoria}</div>
                        ${item.descricao ? `<div class="mov-desc">${escapeHtml(item.descricao)}</div>` : ''}
                        ${hora ? `<div class="mov-hora">${hora}</div>` : ''}
                        ${item.registradoPor ? `<div class="mov-registrado-por">Inserido por ${escapeHtml(item.registradoPor)}</div>` : ''}
                    </div>
                    <div class="mov-acoes">
                        <div class="mov-valores">
                            <div class="mov-valor ${item.tipo}">${isGasto ? '-' : '+'}${formatarMoeda(item.valor)}</div>
                            <div class="mov-saldo-apos">saldo ${formatarMoeda(saldoApos)}</div>
                        </div>
                    </div>
                `;

                if (podeApagar || apagandoItem) {
                    const btnExcluir = document.createElement('button');
                    btnExcluir.className = 'btn-excluir-mov';
                    btnExcluir.type = 'button';
                    btnExcluir.dataset.acao = 'excluir';
                    btnExcluir.dataset.key = item.firebaseKey;
                    btnExcluir.disabled = apagandoItem;
                    btnExcluir.innerHTML = apagandoItem ? '⏳' : '🗑';
                    card.querySelector('.mov-acoes').appendChild(btnExcluir);
                }

                grupoEl.appendChild(card);
            }

            fragment.appendChild(grupoEl);
        }

        els.listaMov.appendChild(fragment);
    }

    function render() {
        atualizarFormulario();
        atualizarSaldo();
        renderLista();
    }

    async function carregarMovimentacoes() {
        estado.movimentacoes = await dbListarFluxoCaixa(estado.nomeUsuario);
        salvarCacheFluxoCaixa(estado.nomeUsuario, estado.movimentacoes);
        render();
    }

    async function registrar() {
        if (!estado.nomeUsuario || estado.salvando) return;

        const valor = normalizarValorMoeda(els.inputValor.value);
        if (!Number.isFinite(valor) || valor <= 0) {
            await window.playAlert('Informe um valor valido.');
            return;
        }

        const obsObrigatoria = estado.tipoAtual === 'entrada' ||
            (estado.tipoAtual === 'gasto' && estado.categoriaAtual === 'outros');
        if (obsObrigatoria && !els.inputObs.value.trim()) {
            await window.playAlert('Preencha a observação antes de registrar.');
            els.inputObs.focus();
            return;
        }

        const movimento = {
            tipo: estado.tipoAtual,
            valor,
            descricao: els.inputObs.value.trim(),
            data: obterDataLocalISO(),
            criado_em: Date.now()
        };

        if (estado.tipoAtual === 'gasto') {
            movimento.categoria = estado.categoriaAtual;
        }

        estado.salvando = true;
        atualizarFormulario();

        try {
            const movimentoSalvo = await dbSalvarMovimentoFluxoCaixa(estado.nomeUsuario, movimento);
            estado.movimentacoes = [
                movimentoSalvo,
                ...estado.movimentacoes.filter(item => item.firebaseKey !== movimentoSalvo.firebaseKey)
            ];
            salvarCacheFluxoCaixa(estado.nomeUsuario, estado.movimentacoes);
            els.inputValor.value = '';
            els.inputObs.value = '';
            render();
            toast('Registrado!');
        } catch (error) {
            console.error('Erro ao salvar fluxo de caixa:', error);
            await window.playAlert(navigator.onLine ? 'Erro ao salvar. Tente novamente.' : 'Sem internet. Conecte-se e tente novamente.');
        } finally {
            estado.salvando = false;
            atualizarFormulario();
        }
    }

    async function excluirMovimentacao(firebaseKey) {
        if (!firebaseKey || estado.exclusoesEmAndamento.has(firebaseKey)) return;

        const maisRecente = estado.movimentacoes.reduce((a, b) => (b.criado_em || 0) > (a.criado_em || 0) ? b : a, estado.movimentacoes[0]);
        const item = estado.movimentacoes.find(m => m.firebaseKey === firebaseKey);
        if (!item || item.firebaseKey !== maisRecente?.firebaseKey || (Date.now() - (item.criado_em || 0)) >= 3600000) return;

        if (!await window.playConfirm('Apagar este registro?', { primaryLabel: 'Apagar', secondaryLabel: 'Cancelar' })) return;

        estado.exclusoesEmAndamento.add(firebaseKey);
        render();

        try {
            await dbExcluirMovimentoFluxoCaixa(estado.nomeUsuario, firebaseKey);
            estado.movimentacoes = estado.movimentacoes.filter(item => item.firebaseKey !== firebaseKey);
            salvarCacheFluxoCaixa(estado.nomeUsuario, estado.movimentacoes);
            render();
            toast('Registro apagado!');
        } catch (error) {
            console.error('Erro ao apagar registro do fluxo de caixa:', error);
            await window.playAlert(navigator.onLine ? 'Erro ao apagar. Tente novamente.' : 'Sem internet. Conecte-se e tente novamente.');
        } finally {
            estado.exclusoesEmAndamento.delete(firebaseKey);
            render();
        }
    }

</script>
