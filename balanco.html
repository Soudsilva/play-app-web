    window.aprovarContestacaoBalanco = async function() {
        if (!await playConfirm('Esta ação não pode ser revertida.', { primaryLabel: 'Aprovar mesmo assim', secondaryLabel: 'Cancelar' })) return;
        const contestacao = obterContestacaoAbertaContexto(
            contestacaoContexto?.itemChave,
            contestacaoContexto?.itemNome,
            contestacaoContexto?.categoria
        );
        if (!contestacaoContexto?.itemChave) return;

        const btn = document.getElementById('histAprovarBtn');
        if (btn) {
            btn.disabled = true;
            btn.textContent = 'Aprovando...';
        }

        try {
            const aprovadoEm = new Date().toISOString();
            const quantidadeAprovada = Number(contestacaoContexto?.quantidadeAtual || 0);
            const responsavel = contestacaoContexto.responsavel || usuarioLogado;
            const aprovacaoGestorComAjuste = Boolean(historicoAbertoContexto?.modoGestorContestacao);
            if (aprovacaoGestorComAjuste) {
                if (!contestacao?.id) throw new Error('Contestação não encontrada para ajuste.');
                const contestacaoAjustada = await dbAprovarContestacaoBalancoComAjuste(responsavel, contestacao.id, usuarioLogado);
                contestacoesGestor = contestacoesGestor.map(c =>
                    c.id === contestacao.id && String(c?.usuarioKey || c?.responsavel || c?.registradoPor || '').trim() === String(responsavel).trim()
                        ? { ...c, ...contestacaoAjustada, status: 'aprovado', aprovadoEm, aprovadoPor: usuarioLogado }
                        : c
                );
                contestacoesBalanco = contestacoesBalanco.map(c =>
                    c.id === contestacao.id
                        ? { ...c, ...contestacaoAjustada, status: 'aprovado', aprovadoEm, aprovadoPor: usuarioLogado }
                        : c
                );
                renderizar();
                if (btn) btn.textContent = 'Aprovado';
                window.fecharHistorico();
                alert('Ajuste aprovado e aplicado.');
                return;
            }
            if (contestacao?.id) {
                await dbAprovarContestacaoBalanco(responsavel, contestacao.id, usuarioLogado, {
                    quantidadeAtual: quantidadeAprovada,
                    quantidadeInformada: quantidadeAprovada
                });
                contestacoesBalanco = contestacoesBalanco.map(c =>
                    c.id === contestacao.id
                        ? {
                            ...c,
                            quantidadeAtual: quantidadeAprovada,
                            quantidadeInformada: quantidadeAprovada,
                            diferenca: 0,
                            status: 'aprovado',
                            aprovadoEm,
                            aprovadoPor: usuarioLogado
                        }
                        : c
                );
            } else {
                const novaAprovacao = await dbSalvarContestacaoBalanco({
                    ...contestacaoContexto,
                    quantidadeAtual: quantidadeAprovada,
                    quantidadeInformada: quantidadeAprovada,
                    status: 'aprovado',
                    aprovadoPor: usuarioLogado
                });
                if (novaAprovacao?.id) {
                    contestacoesBalanco = [
                        { ...novaAprovacao, firebaseUrl: novaAprovacao.id },
                        ...contestacoesBalanco.filter(c => c.id !== novaAprovacao.id)
                    ];
                }
            }
            await registrarAprovacaoBalancoNoHistorico(quantidadeAprovada);
            renderizar();
            if (btn) btn.textContent = 'Aprovado';
            window.fecharHistorico();
            alert('Valor aprovado.');
        } catch (erro) {
            console.error(erro);
            alert('Erro ao aprovar o valor.');
            atualizarBotoesContestacaoHistorico();
        }
    };

                    <div style="background:linear-gradient(135deg, rgba(46,125,50,0.5), rgba(76,175,80,0.3)); border:1.5px solid rgba(76,175,80,0.6); border-radius:18px; padding:20px 12px; text-align:center; margin-bottom:10px; box-shadow:0 0 18px rgba(76,175,80,0.2);">
                        <div style="font-size:11px; color:#81c784; font-weight:bold; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">&#128179; Seu Saldo do M&ecirc;s</div>
                        <div style="font-size:11px; color:#ffeb3b; font-weight:bold; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;">&#128176; ${nomeMes}</div>
                        <div style="font-size:32px; font-weight:bold; color:#69f0ae; line-height:1; letter-spacing:-0.5px;">${moeda(valorComissao)}</div>
                        <div style="font-size:11px; color:rgba(165,214,167,0.7); margin-top:7px;">${comissaoUsuario}%${usaComissaoGlobal ? ' global' : ''} do m&ecirc;s</div>
                    </div>` : `<div class="resumo-titulo" style="margin-bottom:10px;">&#128176; ${nomeMes}</div>`}

                    <!-- Total do mês menor e discreto (oculto para comissão) -->
                    ${!usaResumoComissao ? `
                    <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:10px 8px; text-align:center; display:flex; justify-content:space-between; align-items:center; padding:10px 16px;">
                        <div style="font-size:11px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.5px;">Total cobrado no m&ecirc;s</div>
                        <div style="font-size:16px; font-weight:bold; color:rgba(255,255,255,0.35);">${moeda(fin.liquido)}</div>
                    </div>` : ''}
                </div>
            </div>`;
            })() : ''}

            <!-- Fichas do período (oculto para comissão global/técnico) -->
            ${filtradosFinanceiros.length > 0 && dataDe && !usaResumoComissao ? `
            <div class="secao">
                <div class="secao-titulo">&#128203; Fichas do Per&iacute;odo</div>
                ${filtradosFinanceiros.map((a, i) => {
                    const f = a.financeiro || {};
                    const totalPix = obterTotalPix(f);
                    const liquidoEmpresa = obterLiquidoEmpresa(f);
                    const depositar = obterSaldoDepositar(f);
                    const fotoUrl = a.fotos?.ficha || '';
                    const dataFicha = new Date(a.data || a.dataHora || 0).toLocaleDateString('pt-BR');
                    return `
                <div class="ficha-card">
                    <div class="ficha-foto-col">
                        ${fotoUrl ? `
                        <div class="ficha-foto-wrap" onclick="abrirFoto('${fotoUrl}')">
                            <img src="${fotoUrl}" class="ficha-foto" alt="Ficha">
                            <div class="ficha-foto-overlay">&#128269;</div>
                        </div>` : `<div class="ficha-foto-wrap ficha-sem-foto">Sem<br>foto</div>`}
                        <div class="ficha-foto-data">${dataFicha}</div>
                    </div>
                    <div class="ficha-info">
                        <div class="ficha-numero">N&ordm; ${a.cliente?.numero || i+1} &mdash; ${a.cliente?.nome || 'Cliente'}</div>
                        <div class="ficha-linha">
                            <span class="ficha-chave">Total Geral</span>
                            <span class="ficha-val">${moeda(f.totalGeral || 0)}</span>
                        </div>
                        <div class="ficha-linha">
                            <span class="ficha-chave">Dinheiro em Esp&eacute;cie</span>
                            <span class="ficha-val dinheiro">${moeda(f.dinheiro || 0)}</span>
                        </div>
                        ${totalPix > 0 ? `
                        <div class="ficha-linha">
                            <span class="ficha-chave">Pix (Total)</span>
                            <span class="ficha-val pix">${moeda(totalPix)}</span>
                        </div>` : ''}
                        ${Number(f.comissaoValor || 0) > 0 ? `
                        <div class="ficha-linha">
                            <span class="ficha-chave">Comiss&atilde;o${f.comissaoPorcentagem ? ` (${f.comissaoPorcentagem}%)` : ''}</span>
                            <span class="ficha-val comissao">${moeda(f.comissaoValor)}</span>
                        </div>` : ''}
                        <div class="ficha-linha">
                            <span class="ficha-chave">Depositar</span>
                            <span class="ficha-val dep">${moeda(depositar)}</span>
                        </div>
                    </div>
                </div>`;
                }).join('')}
            </div>` : ''}

            <!-- Por dia -->
            ${porDia.length > 0 && (dataDe || dataAte) ? `
            <div class="secao">
                <div class="secao-titulo" style="text-align:center;">&#128197; ${usaResumoComissao ? 'Comiss&atilde;o por Dia' : 'L&iacute;quido por Dia'}</div>
                <div class="lista-card" style="padding:0;">
                    ${(() => {
                        const temDepositar = !usaResumoComissao && porDia.some(([,{depositar}]) => depositar > 0);
                        const cols = usaResumoComissao
                            ? '1.2fr 1fr'
                            : temDepositar
                                ? '1.08fr 0.62fr 0.9fr 0.92fr'
                                : '1.14fr 0.72fr 1fr';
                        return `
                        <div class="tabela-dia-header" style="grid-template-columns:${cols};">
                            <div class="tabela-dia-th">Data</div>
                            ${!usaResumoComissao ? `<div class="tabela-dia-th rota">Rota</div>` : ''}
                            <div class="tabela-dia-th saldo">Saldo</div>
                            ${temDepositar ? `<div class="tabela-dia-th depositar">Depositar</div>` : ''}
                        </div>
                        <div class="tabela-dia">
                        ${porDia.map(([data,{count,rotas,saldo,depositar}]) => {
                            const nums = [...rotas].map(r => r.replace(/^rota\s*/i, '').replace(/^r\.\s*/i, '').trim());
                            const rotasStr = nums.join(' / ');
                            const valorDia = usaResumoComissao ? saldo * comissaoUsuario / 100 : saldo;
                            return `
                            <div class="tabela-dia-row" style="grid-template-columns:${cols};">
                                <div class="tabela-dia-cell data">${data}</div>
                                ${!usaResumoComissao ? `<div class="tabela-dia-cell rota">${rotasStr}</div>` : ''}
                                <div class="tabela-dia-cell saldo">${moeda(valorDia)}</div>
                                ${temDepositar ? `<div class="tabela-dia-cell depositar">${depositar > 0 ? moeda(depositar) : '—'}</div>` : ''}
                            </div>`;
                        }).join('')}
                        </div>`;
                    })()}
                </div>
            </div>` : ''}

            <!-- Máquinas atendidas no período (oculto para técnico) -->
            ${maquinas.length > 0 && (dataDe || dataAte) && !isTecnico ? `
            <div class="secao">
                <div class="secao-titulo" style="text-align:center;">&#127920; M&aacute;quinas Atendidas no Per&iacute;odo Selecionado</div>
                <div class="lista-card">
                    ${maquinas.map(([nome,qtd]) => `
                        <div class="lista-item">
                            <div class="item-nome">${nome}</div>
                            <div class="dia-count">${qtd}</div>
                        </div>`).join('')}
                </div>
            </div>` : ''}
            </div>`}

            ${isGestor ? `
            <div id="tituloContestacoes" class="contest-header" onclick="window.toggleContestacoes()">
                <span style="position:absolute;left:20px;font-size:20px;">&#128373;</span>
                <span class="contest-titulo">Contesta&ccedil;&atilde;o</span>
                <span class="contest-badge" id="contestBadge">${obterContestacoesGestorEmAnalise().length}</span>
                <span class="contest-seta" id="setaContestacoes">&#9660;</span>
            </div>
            <div class="contest-corpo${contestacoesAberto ? ' aberto' : ''}" id="corpoContestacoes">
                <div id="listaContestacoes">
                    ${montarCardsContestacoesGestor()}
                </div>
            </div>` : ''}
        `;
        if (contestacoesAberto) {
            document.getElementById('tituloContestacoes')?.classList.add('aberta');
            document.getElementById('setaContestacoes')?.classList.add('girada');
        }
        setupTopoObserver();
    }

    window._renderizar = renderizar;

    function atualizarTopoFinDatas() {
        const el = document.getElementById('topoFinDatas');
        if (!el) return;
        if (dataDe) {
            const ref = new Date(dataDe + 'T00:00:00');
            el.innerHTML = `&#128197; ${MESES[ref.getMonth()]} ${ref.getFullYear()}`;
        } else {
            el.innerHTML = 'Selecione um per&iacute;odo';
        }
    }

    function setupTopoObserver() {
        if (window._topoScrollHandler) {
            window.removeEventListener('scroll', window._topoScrollHandler);
        }

        window._topoScrollHandler = function() {
            const tituloFin       = document.getElementById('tituloFinanceiro');
            const topoFin         = document.getElementById('topoFin');
            const tituloPrincipal = document.getElementById('tituloPrincipal');
            if (!topoFin || !tituloPrincipal) return;

            const rolou  = window.scrollY > 10;
            const passou = tituloFin ? tituloFin.getBoundingClientRect().top < 0 : false;

            tituloPrincipal.style.display = rolou ? 'none' : '';
            topoFin.classList.toggle('visivel', passou);
            if (passou) atualizarTopoFinDatas();
        };

        window.addEventListener('scroll', window._topoScrollHandler, { passive: true });
    }

    window.toggleBalanco = function() {
        const header = document.getElementById('tituloFinanceiro');
        const corpo  = document.getElementById('corpoBalanco');
        const seta   = document.getElementById('setaBalanco');
        if (!header || !corpo || !seta) return;
        const abrindo = !corpo.classList.contains('aberto');
        corpo.classList.toggle('aberto', abrindo);
        header.classList.toggle('aberta', abrindo);
        seta.classList.toggle('girada', abrindo);
    };

    window.toggleContestacoes = function() {
        const header = document.getElementById('tituloContestacoes');
        const corpo  = document.getElementById('corpoContestacoes');
        const seta   = document.getElementById('setaContestacoes');
        if (!header || !corpo || !seta) return;
        contestacoesAberto = !corpo.classList.contains('aberto');
        corpo.classList.toggle('aberto', contestacoesAberto);
        header.classList.toggle('aberta', contestacoesAberto);
        seta.classList.toggle('girada', contestacoesAberto);
        // TODO: ao abrir pela primeira vez, chamar carregarContestacoes()
        // que faz dbEscutarTodasContestacoes() e popula #listaContestacoes
    };

    window.abrirFoto = function(url) {
        document.getElementById('lbImg').src = url;
        document.getElementById('lbOverlay').classList.add('aberto');
        history.pushState({ lightbox: true }, '');
    };
    window.fecharLightbox = function() {
        document.getElementById('lbOverlay').classList.remove('aberto');
        document.getElementById('lbImg').src = '';
        if (history.state?.lightbox) history.back();
    };
    window.addEventListener('popstate', function(e) {
        if (document.getElementById('lbOverlay').classList.contains('aberto')) {
            document.getElementById('lbOverlay').classList.remove('aberto');
            document.getElementById('lbImg').src = '';
        }
    });

    // â”€â”€ InicializaÃ§Ã£o â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // posseAcumulada: dados de produtos/mÃ¡quinas de atendimentos jÃ¡ excluÃ­dos.
    // Sem isso, ao excluir atendimentos antigos o balanÃ§o de material ficaria errado.
    const [todos, colaboradores, clientes, depositos, pixPosseInicial] = await Promise.all([
        dbListarAtendimentos(),
        dbListarColaboradores(),
        dbListarClientes(),
        dbListarDepositos(usuarioLogado),
        dbLerPixEmPosse(usuarioLogado)
    ]);
    todosDepositos = depositos;
    pixEmPosse = pixPosseInicial;
    colaboradorObj  = colaboradores.find(c => String(c?.nome || '').trim() === usuarioLogado) || null;
    isTecnico = (colaboradorObj?.nivel_completo || '').startsWith('atendimento') &&
                String(colaboradorObj?.cargo || '').trim().toLowerCase() === 'técnico';
    isGestor  = (colaboradorObj?.nivel_completo || '').includes('gestao');
    isGestao1 = (colaboradorObj?.nivel_completo || '').includes('gestao_1');
    usaComissaoGlobal = parsePercentualColaborador(colaboradorObj?.comissaoGlobal) > 0;

    // Mapa para cruzar cliente do atendimento â†’ rota atual
    mapaRotas = {};
    clientes.forEach(c => {
        if (!c.rota) return;
        if (c.firebaseUrl) mapaRotas[c.firebaseUrl] = c.rota;
        if (c.numero)      mapaRotas[String(c.numero)] = c.rota;
    });
    todosAtendimentos = isTecnico
        ? todos.filter(a => Number(a.financeiro?.totalGeral || 0) > 0 || a.origemRegistro === 'manutencao')
        : todos.filter(a => String(a?.atendente || '').trim() === usuarioLogado);
    todosAtendimentosFinanceiro = (isTecnico || usaComissaoGlobal)
        ? todos.filter(a => Number(a.financeiro?.totalGeral || 0) > 0 || a.origemRegistro === 'manutencao')
        : todosAtendimentos;
    atualizarDatasComAtendimento();
    if (!dataDe) {
        const mesAnoDisp = [...new Set([...datasComAtendimento].map(d => d.slice(0, 7)))].sort();
        const maisRecente = mesAnoDisp[mesAnoDisp.length - 1];
        const [anoStr, mesStr] = (maisRecente || `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`).split('-');
        const ultimoDia = new Date(parseInt(anoStr), parseInt(mesStr), 0).getDate();
        dataDe  = `${anoStr}-${mesStr}-01`;
        dataAte = `${anoStr}-${mesStr}-${String(ultimoDia).padStart(2, '0')}`;
    }

    // Salva o acumulado em variÃ¡veis globais para o renderizar() acessar sempre que
    // redesenha a tela (ex: ao trocar o perÃ­odo selecionado no calendÃ¡rio).
    // Estrutura: { produtos: { "NomeProduto": qtd }, maquinas: { "NomeMaquina": contagem } }

    renderizar();

    if (new URLSearchParams(window.location.search).get('contestacao') === '1') {
        contestacoesAberto = true;
        renderizar();
        setTimeout(() => {
            document.getElementById('tituloContestacoes')?.scrollIntoView({ behavior: 'smooth' });
        }, 50);
    }

    // Atualiza em tempo real apenas os dados do usuÃƒÂ¡rio logado.
    if (isTecnico) {
        dbEscutarAtendimentos((lista) => {
            todosAtendimentos = lista.filter(a => Number(a.financeiro?.totalGeral || 0) > 0 || a.origemRegistro === 'manutencao');
            todosAtendimentosFinanceiro = todosAtendimentos;
            atualizarDatasComAtendimento();
            renderizar();
        });
    } else if (usaComissaoGlobal) {
        dbEscutarAtendimentosDoUsuario(usuarioLogado, (lista) => {
            todosAtendimentos = lista;
            renderizar();
        });
        dbEscutarAtendimentos((lista) => {
            todosAtendimentosFinanceiro = lista.filter(a => Number(a.financeiro?.totalGeral || 0) > 0 || a.origemRegistro === 'manutencao');
            atualizarDatasComAtendimento();
            renderizar();
        });
    } else {
        dbEscutarAtendimentosDoUsuario(usuarioLogado, (lista) => {
            todosAtendimentos = lista;
            todosAtendimentosFinanceiro = lista;
            atualizarDatasComAtendimento();
            renderizar();
        });
    }

    dbEscutarDepositos(usuarioLogado, (lista) => {
        todosDepositos = lista;
        renderizar();
    });

    dbEscutarPosseItensUsuario(usuarioLogado, (lista) => {
        posseAtual = construirPosseAtualDaPosse(lista);
        posseAtualCarregada = true;
        removerAprovacoesDivergentes();
        renderizarHistoricoAberto();
        renderizar();
    });

    dbEscutarContestacoesBalanco(usuarioLogado, (lista) => {
        contestacoesBalanco = Array.isArray(lista) ? lista : [];
        const aprovadasAtuais = new Set(contestacoesBalanco
            .filter(c => String(c?.status || '').trim() === 'aprovado')
            .map(c => String(c?.id || c?.firebaseUrl || '').trim())
            .filter(Boolean));
        [...contestacoesAprovadasEmAtualizacao].forEach(id => {
            if (!aprovadasAtuais.has(id)) contestacoesAprovadasEmAtualizacao.delete(id);
        });
        removerAprovacoesDivergentes();
        atualizarBotoesContestacaoHistorico();
        renderizarHistoricoAberto();
        renderizar();
    });

    if (isGestor) {
        dbEscutarTodasContestacoesBalanco((lista) => {
            contestacoesGestor = Array.isArray(lista) ? lista : [];
            renderizar();
        });
    }

    dbEscutarPixEmPosse(usuarioLogado, (lista) => {
        pixEmPosse = lista;
        renderizar();
    });
</script>
</body>
</html>
