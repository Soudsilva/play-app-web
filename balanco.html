<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balan&ccedil;o</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#0b2256; display:flex; justify-content:center; color:white; user-select:none; -webkit-user-select:none; }
        .app { width:100%; max-width:600px; padding:15px; box-sizing:border-box; min-height:100vh; padding-bottom:50px; }

        /* Topo */
        .topo { display:flex; align-items:center; justify-content:center; margin-bottom:20px; position:sticky; top:0; z-index:100; width:100%; min-height:45px; background:#0b2256; padding:8px 0 4px; }
        .titulo { font-size:24px; font-weight:bold; text-align:center; }
        .btn-home { background:rgba(255,255,255,0.1); padding:8px; border-radius:50%; cursor:pointer; display:flex; position:absolute; right:0; }
        .btn-home img { width:20px; height:20px; filter:brightness(0) invert(1); }
        .topo-fin { display:none; flex-direction:column; align-items:center; gap:4px; width:100%; }
        .topo-fin.visivel { display:flex; }
        .topo-fin-titulo { font-size:18px; font-weight:bold; color:#fff; }
        .topo-fin-datas { display:flex; align-items:center; gap:6px; font-size:12px; color:rgba(255,235,59,0.85); cursor:pointer; padding:3px 10px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); border-radius:20px; }
        .topo-fin-datas:active { background:rgba(255,255,255,0.14); }

        /* Seletor de perÃ­odo */
        .seletor-periodo {
            display:flex; align-items:center; gap:8px; margin-bottom:18px;
            background:#0f2a66; border:1px solid rgba(255,255,255,0.15);
            border-radius:14px; padding:12px 14px;
            position:sticky; top:57px; z-index:99;
        }
        .data-btn {
            flex:1; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
            border-radius:10px; padding:8px 12px; cursor:pointer; text-align:center;
            transition:background 0.15s;
        }
        .data-btn:active { background:rgba(255,255,255,0.2); }
        .data-btn.ativo { border-color:#ffeb3b; background:rgba(255,235,59,0.1); }
        .data-label { font-size:10px; color:rgba(255,235,59,0.8); font-weight:bold; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:2px; }
        .data-valor { font-size:14px; font-weight:bold; color:#fff; }
        .data-valor.vazio { color:rgba(255,255,255,0.75); font-weight:normal; font-size:13px; }
        .sep-seta { color:rgba(255,255,255,0.35); font-size:18px; flex-shrink:0; }

        /* Overlay do calendÃ¡rio */
        .cal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.7); z-index:2000;
            align-items:flex-end; justify-content:center;
        }
        .cal-overlay.aberto { display:flex; }
        .cal-modal {
            background:linear-gradient(180deg, #173d8f 0%, #0f2a66 100%);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:20px 20px 0 0;
            padding:20px 16px 30px;
            width:100%; max-width:600px;
            box-sizing:border-box;
            user-select:none;
            -webkit-user-select:none;
        }
        .cal-status {
            display:flex; gap:8px; margin-bottom:14px;
        }
        .cal-status-item {
            flex:1; text-align:center; padding:8px;
            border-radius:10px; background:rgba(255,255,255,0.07);
            border:1px solid rgba(255,255,255,0.12);
        }
        .cal-status-item.ativo { border-color:#ffeb3b; background:rgba(255,235,59,0.1); }
        .cal-status-label { font-size:10px; color:rgba(255,235,59,0.7); font-weight:bold; text-transform:uppercase; letter-spacing:0.5px; }
        .cal-status-valor { font-size:14px; font-weight:bold; color:#fff; margin-top:2px; }
        .cal-status-valor.vazio { color:rgba(255,255,255,0.3); font-weight:normal; font-size:12px; }
        .cal-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:12px;
        }
        .cal-mes-ano { font-size:16px; font-weight:bold; color:#ffeb3b; text-align:center; flex:1; }
        .cal-nav {
            background:rgba(255,255,255,0.1); border:none; color:white;
            font-size:20px; width:36px; height:36px; border-radius:50%;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .cal-nav:active { background:rgba(255,255,255,0.25); }
        .cal-nav:disabled { opacity:0.2; cursor:default; }
        .cal-nav:disabled:active { background:rgba(255,255,255,0.1); }
        .cal-semana { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
        .cal-semana span { text-align:center; font-size:11px; color:rgba(255,255,255,0.4); font-weight:bold; padding:4px 0; }
        .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
        .cal-dia {
            aspect-ratio:1; display:flex; align-items:center; justify-content:center;
            font-size:14px; font-weight:bold; position:relative; border-radius:50%;
        }
        .cal-dia.disponivel { color:#fff; cursor:pointer; }
        .cal-dia.disponivel:active { opacity:0.7; }
        .cal-dia.disponivel::after {
            content:''; position:absolute; bottom:3px; left:50%; transform:translateX(-50%);
            width:3px; height:3px; border-radius:50%; background:#ffeb3b;
        }
        .cal-dia.indisponivel { color:rgba(255,255,255,0.13); cursor:default; }
        .cal-dia.selecionado { background:#ffeb3b !important; color:#0b2256 !important; border-radius:50% !important; z-index:1; }
        .cal-dia.selecionado::after { background:#0b2256; }
        .cal-dia.no-intervalo { background:rgba(255,235,59,0.15); border-radius:0; }
        .cal-dia.inicio-intervalo { border-radius:50% 0 0 50% !important; }
        .cal-dia.fim-intervalo   { border-radius:0 50% 50% 0 !important; }
        .cal-dia.unico-selecionado { border-radius:50% !important; }
        .cal-acoes { display:flex; gap:8px; margin-top:14px; }
        .cal-btn {
            flex:1; padding:12px; border-radius:12px; border:none;
            font-size:14px; font-weight:bold; cursor:pointer;
        }
        .cal-btn-ok { background:#ffeb3b; color:#0b2256; }
        .cal-btn-limpar { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.6); }
        .cal-btn-ok:disabled { opacity:0.35; cursor:default; }

        /* Card de resumo financeiro */
        .card-resumo {
            background:linear-gradient(135deg, rgba(68,103,168,0.5), rgba(15,42,102,0.7));
            border:1px solid rgba(255,235,59,0.3);
            border-radius:16px; padding:18px; margin-bottom:18px;
        }
        .resumo-titulo { font-size:11px; font-weight:bold; color:#ffeb3b; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; text-align:center; }
        .resumo-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .resumo-item { text-align:center; }
        .resumo-valor { font-size:22px; font-weight:bold; color:#fff; }
        .resumo-label { font-size:11px; color:rgba(255,255,255,0.55); margin-top:2px; text-transform:uppercase; letter-spacing:0.5px; }

        /* SeÃ§Ã£o */
        .secao { margin-bottom:20px; }
        .secao-titulo {
            font-size:12px; font-weight:bold; color:#ffeb3b; text-transform:uppercase;
            letter-spacing:1px; margin-bottom:10px; padding-bottom:5px;
            border-bottom:1px dashed rgba(255,235,59,0.3);
            display:flex; align-items:center; gap:6px;
        }
        .lista-card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:14px; overflow:hidden; }
        .lista-item { display:flex; align-items:center; justify-content:space-between; padding:11px 16px; border-bottom:1px solid rgba(255,255,255,0.07); }
        .lista-item:last-child { border-bottom:none; }
        .item-nome { font-size:14px; color:rgba(255,255,255,0.88); }
        .item-badge { font-size:14px; font-weight:bold; color:#fff; background:rgba(68,103,168,0.7); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:3px 14px; min-width:40px; text-align:center; }
        .item-badge.destaque { background:rgba(255,235,59,0.2); border-color:rgba(255,235,59,0.4); color:#ffeb3b; }
        .pix-posse-lista {
            font-size:15px;
            font-weight:700;
            color:#ffffff;
            text-align:right;
            line-height:1.45;
            word-break:break-word;
        }
        .item-barra-wrap { flex:1; margin:0 12px; }
        .item-barra-bg { background:rgba(255,255,255,0.1); border-radius:10px; height:5px; overflow:hidden; }
        .item-barra { background:#ffeb3b; height:100%; border-radius:10px; transition:width 0.5s ease; }
        .dia-item { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid rgba(255,255,255,0.07); }
        .dia-item:last-child { border-bottom:none; }
        .dia-data { font-size:16px; color:#fff; font-weight:bold; }
        .dia-count { font-size:14px; font-weight:bold; color:#fff; }
        .loading { text-align:center; padding:40px; opacity:0.6; }

        /* Card de fichas do perÃ­odo */
        .ficha-card {
            display:flex; gap:12px; align-items:flex-start;
            background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
            border-radius:14px; padding:14px; margin-bottom:10px;
        }
        .ficha-card:last-child { margin-bottom:0; }
        .ficha-info { flex:1; min-width:0; }
        .ficha-numero { font-size:16px; font-weight:bold; color:#ffeb3b; margin-bottom:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .ficha-linha { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; gap:8px; }
        .ficha-chave { font-size:11px; color:#fff; text-transform:uppercase; letter-spacing:0.4px; white-space:nowrap; }
        .ficha-val { font-size:13px; font-weight:bold; color:#fff; }
        .ficha-val.pix { color:#ce93d8; }
        .ficha-val.comissao { color:#f48fb1; }
        .ficha-val.dep { color:#ffcc80; }
        .ficha-val.saldo { color:#64b5f6; }
        .ficha-val.dinheiro { color:#a5d6a7; }
        .ficha-foto-col { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:4px; }
        .ficha-foto-wrap {
            width:80px; height:100px; border-radius:10px; overflow:hidden;
            border:1px solid rgba(255,255,255,0.15); cursor:pointer; position:relative;
            background:rgba(0,0,0,0.3);
        }
        .ficha-foto { width:100%; height:100%; object-fit:cover; display:block; }
        .ficha-foto-overlay {
            position:absolute; inset:0; background:rgba(0,0,0,0); display:flex;
            align-items:center; justify-content:center; font-size:20px;
            transition:background 0.15s;
        }
        .ficha-foto-wrap:active .ficha-foto-overlay { background:rgba(0,0,0,0.4); }
        .ficha-foto-data {
            font-size:14px; font-weight:bold; color:#ffeb3b;
            text-align:center; letter-spacing:0.3px;
        }
        .ficha-sem-foto {
            display:flex; align-items:center; justify-content:center;
            font-size:10px; color:rgba(255,255,255,0.2); text-align:center; padding:4px;
        }
        /* Lightbox */
        .lb-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92);
            z-index:3000; align-items:center; justify-content:center;
        }
        .lb-overlay.aberto { display:flex; }
        .lb-img { max-width:96vw; max-height:90vh; border-radius:10px; object-fit:contain; }
        .lb-fechar { position:absolute; top:16px; right:16px; font-size:28px; color:#fff; cursor:pointer; background:rgba(255,255,255,0.1); border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>
<div class="app">

    <div class="topo">
        <div class="titulo" id="tituloPrincipal">&#128230; Balan&ccedil;o</div>
        <div class="topo-fin" id="topoFin" onclick="abrirCalendario()">
            <div class="topo-fin-titulo">&#128176; Balan&ccedil;o Financeiro</div>
            <div class="topo-fin-datas" id="topoFinDatas">Selecione um per&iacute;odo</div>
        </div>
        <div class="btn-home" onclick="event.stopPropagation(); window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div id="conteudo">
        <div class="loading">Carregando...</div>
    </div>

</div>

<!-- Lightbox foto ficha -->
<div class="lb-overlay" id="lbOverlay" onclick="fecharLightbox()">
    <div class="lb-fechar" onclick="fecharLightbox()">&times;</div>
    <img class="lb-img" id="lbImg" src="" alt="Ficha">
</div>

<!-- CalendÃ¡rio customizado -->
<div class="cal-overlay" id="calOverlay" onclick="fecharCalendarioOverlay(event)">
    <div class="cal-modal">
        <div class="cal-status">
            <div class="cal-status-item" id="calStatusDe">
                <div class="cal-status-label">De</div>
                <div class="cal-status-valor vazio" id="calValorDe">Toque para selecionar</div>
            </div>
            <div class="cal-status-item" id="calStatusAte">
                <div class="cal-status-label">At&eacute;</div>
                <div class="cal-status-valor vazio" id="calValorAte">Toque para selecionar</div>
            </div>
        </div>
        <div class="cal-header">
            <button class="cal-nav" onclick="calNavegar(-1)">&#8249;</button>
            <div class="cal-mes-ano" id="calMesAno"></div>
            <button class="cal-nav" onclick="calNavegar(1)">&#8250;</button>
        </div>
        <div class="cal-semana">
            <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-acoes">
            <button class="cal-btn cal-btn-limpar" onclick="calLimpar()">Limpar</button>
            <button class="cal-btn cal-btn-ok" id="calBtnOk" onclick="fecharCalendario()">Confirmar</button>
        </div>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import {
        dbListarAtendimentos,
        dbListarColaboradores,
        dbListarClientes,
        dbListarDepositos,
        dbListarHistorico,
        dbLerPosseAcumulada,
        dbLerPixEmPosse,
        dbEscutarAtendimentosDoUsuario,
        dbEscutarDepositos,
        dbEscutarHistoricoDoUsuario,
        dbEscutarPosseAcumulada,
        dbEscutarPixEmPosse
    } from './database.js';
    // dbLerPosseAcumulada: lÃª o contador persistente de produtos/mÃ¡quinas acumulados
    // de atendimentos jÃ¡ excluÃ­dos do Firebase. Sem isso, ao excluir atendimentos antigos
    // os totais de posse ficariam incorretos (menores do que o real).
    const usuarioLogado = localStorage.getItem('usuarioLogado') || '';
    let todosAtendimentos = [];
    let todosDepositos = [];
    let historicoEstoque = [];
    let pixEmPosse = [];
    let datasComAtendimento = new Set();
    let comissaoUsuario = 0; // % de comissÃ£o do colaborador logado (calculado por mÃªs)
    let colaboradorObj  = null;
    let mapaRotas = {};

    function dataLocalStr(date) {
        const d = (date instanceof Date) ? date : new Date(date || 0);
        if (isNaN(d)) return null;
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    const hoje = dataLocalStr(new Date());

    // Estado do calendÃ¡rio
    // etapa: 0 = nenhum selecionado, 1 = aguardando AtÃ©
    let calEtapa = 0;
    let calMesAtual = new Date();
    let dataDe  = '';
    let dataAte = '';

    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    // â”€â”€ CalendÃ¡rio â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    window.abrirCalendario = function() {
        // Navega para o mÃªs mais recente com atendimento (ou mÃªs atual)
        if (!dataDe) {
            const datas = [...datasComAtendimento].sort();
            calMesAtual = datas.length ? new Date(datas[datas.length-1] + 'T00:00:00') : new Date();
        } else {
            calMesAtual = new Date(dataDe + 'T00:00:00');
        }
        atualizarStatusCal();
        renderizarCalendario();
        document.getElementById('calOverlay').classList.add('aberto');
        history.pushState({ calendarioAberto: true }, '');
    };

    window.fecharCalendario = function() {
        document.getElementById('calOverlay').classList.remove('aberto');
        renderizar();
    };

    window.addEventListener('popstate', function(e) {
        if (document.getElementById('calOverlay').classList.contains('aberto')) {
            fecharCalendario();
        }
    });

    window.fecharCalendarioOverlay = function(e) {
        if (e.target === document.getElementById('calOverlay')) fecharCalendario();
    };

    window.calNavegar = function(delta) {
        if (calEtapa === 1 || calEtapa === 2) return; // bloqueado enquanto datas estÃ£o selecionadas
        calMesAtual = new Date(calMesAtual.getFullYear(), calMesAtual.getMonth() + delta, 1);
        renderizarCalendario();
    };

    window.calLimpar = function() {
        dataDe = ''; dataAte = ''; calEtapa = 0;
        atualizarStatusCal();
        renderizarCalendario();
    };

    window.calSelecionarData = function(dataStr) {
        if (calEtapa === 0 || calEtapa === 2) {
            // Primeiro toque: define De, limpa AtÃ©
            dataDe = dataStr; dataAte = ''; calEtapa = 1;
        } else {
            // Segundo toque: define AtÃ© (garante ordem)
            if (dataStr < dataDe) { dataAte = dataDe; dataDe = dataStr; }
            else { dataAte = dataStr; }
            calEtapa = 2;
        }
        atualizarStatusCal();
        renderizarCalendario();
    };

    function atualizarStatusCal() {
        const elDe  = document.getElementById('calValorDe');
        const elAte = document.getElementById('calValorAte');
        const stDe  = document.getElementById('calStatusDe');
        const stAte = document.getElementById('calStatusAte');
        const btnOk = document.getElementById('calBtnOk');
        if (!elDe) return;

        elDe.textContent  = formatarDataBR(dataDe)  || 'Toque para selecionar';
        elAte.textContent = formatarDataBR(dataAte) || 'Toque para selecionar';
        elDe.classList.toggle('vazio', !dataDe);
        elAte.classList.toggle('vazio', !dataAte);

        stDe.classList.toggle('ativo', calEtapa === 1);
        stAte.classList.toggle('ativo', calEtapa === 2);

        if (btnOk) btnOk.disabled = !dataDe;
    }

    function renderizarCalendario() {
        const ano = calMesAtual.getFullYear();
        const mes = calMesAtual.getMonth();
        document.getElementById('calMesAno').textContent = `${MESES[mes]} ${ano}`;

        // Bloqueia navegaÃ§Ã£o de mÃªs quando aguardando seleÃ§Ã£o do "AtÃ©"
        const navBloqueado = calEtapa === 1 || calEtapa === 2;
        document.querySelectorAll('.cal-nav').forEach(btn => btn.disabled = navBloqueado);

        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';

        const primeiroDia = new Date(ano, mes, 1).getDay();
        const diasNoMes   = new Date(ano, mes+1, 0).getDate();

        for (let i = 0; i < primeiroDia; i++) grid.innerHTML += '<div></div>';

        for (let d = 1; d <= diasNoMes; d++) {
            const dataStr = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const temAtend = datasComAtendimento.has(dataStr);
            // Na etapa 1 (escolhendo AtÃ©), sÃ³ permite datas >= De com atendimento; nunca permite data futura
            const disponivel = temAtend && dataStr <= hoje && (calEtapa !== 1 || dataStr >= dataDe);

            const ehDe  = dataStr === dataDe;
            const ehAte = dataStr === dataAte;
            const noIntervalo = dataDe && dataAte && dataStr > dataDe && dataStr < dataAte;
            const unico = ehDe && !dataAte;

            let cls = 'cal-dia';
            cls += disponivel ? ' disponivel' : ' indisponivel';
            if (unico) cls += ' selecionado unico-selecionado';
            else if (ehDe)  cls += ' selecionado inicio-intervalo';
            else if (ehAte) cls += ' selecionado fim-intervalo';
            if (noIntervalo) cls += ' no-intervalo';

            grid.innerHTML += `<div class="${cls}" ${disponivel ? `onclick="calSelecionarData('${dataStr}')"` : ''}>${d}</div>`;
        }
    }

    // â”€â”€ Seletor visual â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function formatarDataBR(iso) {
        if (!iso) return null;
        const [y, m, d] = iso.split('-');
        return `${d}/${m}/${y}`;
    }

    function renderizarSeletor() {
        // nÃ£o necessÃ¡rio â€” o seletor agora Ã© gerado dentro do renderizar()
    }

    // â”€â”€ Dados â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function filtrarPorDatas(atendimentos, de, ate) {
        const inicio = de  ? new Date(de  + 'T00:00:00') : null;
        const fim    = ate ? new Date(ate + 'T23:59:59') : null;
        return atendimentos.filter(a => {
            const data = new Date(a.data || a.dataHora || a.timestamp || 0);
            if (inicio && data < inicio) return false;
            if (fim    && data > fim)    return false;
            return true;
        });
    }

    function atualizarDatasComAtendimento() {
        datasComAtendimento = new Set(
            todosAtendimentos
                .filter(a => {
                    const dataStr = dataLocalStr(a.data || a.dataHora || 0);
                    if (!dataStr) return false;
                    const total = Number(a.financeiro?.totalGeral || 0);
                    return dataStr <= hoje && total > 0;
                })
                .map(a => dataLocalStr(a.data || a.dataHora || 0))
        );
    }

    /**
     * Soma os produtos de todos os atendimentos passados.
     * @param {Array}  atendimentos - Lista de atendimentos ativos no Firebase
     * @param {Object} acumulado    - Objeto { "NomeProduto": quantidade } vindo de
     *                               dbLerPosseAcumulada, representando produtos de
     *                               atendimentos JÃ EXCLUÃDOS. PadrÃ£o: {} (vazio).
     * Resultado: lista ordenada por quantidade decrescente [["nome", qtd], ...]
     */
    function somarProdutos(atendimentos, acumulado = {}) {
        // ComeÃ§a com os dados acumulados dos atendimentos excluÃ­dos
        const mapa = { ...acumulado };
        // Soma os atendimentos ativos por cima
        atendimentos.forEach(a => {
            (a.produtos || []).forEach(p => {
                if (!p.nome) return;
                mapa[p.nome] = (mapa[p.nome] || 0) + Number(p.quantidade || 0);
            });
        });
        return Object.entries(mapa).sort((a, b) => b[1] - a[1]);
    }

    function normalizarTexto(valor) {
        return String(valor || '').trim().toLowerCase();
    }

    function aplicarDeltaMapa(mapa, nome, delta) {
        const nomeItem = String(nome || '').trim();
        if (!nomeItem || !Number.isFinite(delta) || delta === 0) return;
        const proximoTotal = Number(mapa[nomeItem] || 0) + delta;
        if (proximoTotal > 0) mapa[nomeItem] = proximoTotal;
        else delete mapa[nomeItem];
    }

    function somarProdutosEmPosse(atendimentos, movimentosEstoque, nomeUsuario, acumulado = {}) {
        const mapa = { ...acumulado };
        const usuarioNorm = normalizarTexto(nomeUsuario);

        movimentosEstoque.forEach(mov => {
            if (normalizarTexto(mov?.responsavel) !== usuarioNorm) return;
            const qtd = Number(mov?.qtd || 0);
            if (!qtd) return;

            if (mov.tipo === 'saida') {
                aplicarDeltaMapa(mapa, mov.itemNome, qtd);
            } else if (mov.tipo === 'entrada') {
                aplicarDeltaMapa(mapa, mov.itemNome, -qtd);
            }
        });

        atendimentos.forEach(a => {
            if (a?.origemRegistro === 'retirada_estoque') return;
            (a.produtos || []).forEach(p => {
                aplicarDeltaMapa(mapa, p.nome, -Number(p.quantidade || 0));
            });
        });

        return Object.entries(mapa).sort((a, b) => b[1] - a[1]);
    }

    function obterTotalPix(financeiro) {
        return (financeiro?.pix || []).reduce((soma, pix) => soma + Number(pix?.valor || 0), 0);
    }

    function obterLiquidoEmpresa(financeiro) {
        const fin = financeiro || {};
        return Number(fin.saldoFinal ?? (Number(fin.totalGeral || 0) - Number(fin.comissaoValor || 0)));
    }

    function obterSaldoDepositar(financeiro) {
        const fin = financeiro || {};
        if (fin.saldoDepositar != null) return Number(fin.saldoDepositar || 0);
        if ((fin.dinheiro ?? '') !== '' || fin.comissaoValor != null) {
            return Number(fin.dinheiro || 0) - Number(fin.comissaoValor || 0);
        }
        return obterLiquidoEmpresa(fin) - obterTotalPix(fin);
    }

    function somarFinanceiro(atendimentos) {
        let bruto = 0, comissao = 0, liquido = 0, dinheiro = 0, pix = 0, depositar = 0;
        atendimentos.forEach(a => {
            const f = a.financeiro || {};
            bruto    += Number(f.totalGeral    || 0);
            comissao += Number(f.comissaoValor || 0);
            // saldoFinal jÃ¡ Ã© totalGeral - comissaoValor, salvo pelo atendimento
            liquido  += obterLiquidoEmpresa(f);
            dinheiro += Number(f.dinheiro || 0);
            pix      += obterTotalPix(f);
            depositar += obterSaldoDepositar(f);
        });
        return { bruto, comissao, liquido, dinheiro, pix, depositar };
    }

    function filtrarMesCompleto(atendimentos, dataRef) {
        if (!dataRef) return [];
        const ref = new Date(dataRef + 'T00:00:00');
        const ano = ref.getFullYear(), mes = ref.getMonth();
        return atendimentos.filter(a => {
            const d = new Date(a.data || a.dataHora || a.timestamp || 0);
            return d.getFullYear() === ano && d.getMonth() === mes;
        });
    }

    /**
     * Conta as mÃ¡quinas atendidas somando os atendimentos passados.
     * @param {Array}  atendimentos - Lista de atendimentos ativos no Firebase
     * @param {Object} acumulado    - Objeto { "NomeMaquina": contagem } vindo de
     *                               dbLerPosseAcumulada, representando mÃ¡quinas de
     *                               atendimentos JÃ EXCLUÃDOS. PadrÃ£o: {} (vazio).
     * Resultado: lista ordenada por contagem decrescente [["nome", contagem], ...]
     */
    function somarMaquinas(atendimentos, acumulado = {}) {
        // ComeÃ§a com os dados acumulados dos atendimentos excluÃ­dos
        const mapa = { ...acumulado };
        // Soma os atendimentos ativos por cima (mÃ¡quinas ficam em a.fotos.maquinas)
        atendimentos.forEach(a => {
            (a.fotos?.maquinas || []).forEach(m => {
                if (!m.nome) return;
                mapa[m.nome] = (mapa[m.nome] || 0) + 1;
            });
        });
        return Object.entries(mapa).sort((a, b) => b[1] - a[1]);
    }

    function ordenarPixEmPosse(lista) {
        return [...lista]
            .map(item => String(item || '').trim())
            .filter(Boolean)
            .sort((a, b) => {
                const na = /^\d+$/.test(a) ? Number(a) : Number.MAX_SAFE_INTEGER;
                const nb = /^\d+$/.test(b) ? Number(b) : Number.MAX_SAFE_INTEGER;
                if (na !== nb) return na - nb;
                return a.localeCompare(b, 'pt-BR');
            });
    }

    function formatarListaPixEmPosse(lista) {
        const pixOrdenados = ordenarPixEmPosse(lista);
        if (pixOrdenados.length === 0) return '';
        return `Pix ${pixOrdenados.join(', ')}`;
    }

    function atendimentosPorDia(atendimentos) {
        const mapa = {};
        atendimentos.forEach(a => {
            const chave = new Date(a.data || a.dataHora || 0).toLocaleDateString('pt-BR');
            if (!mapa[chave]) mapa[chave] = { count: 0, rotas: new Set(), saldo: 0 };
            mapa[chave].count++;
            const f = a.financeiro || {};
            mapa[chave].saldo += obterLiquidoEmpresa(f);
            const rota = a.cliente?.rota
                || mapaRotas[a.cliente?.id]
                || mapaRotas[String(a.cliente?.numero || '')]
                || a.rota;
            if (rota) mapa[chave].rotas.add(rota);
        });
        return Object.entries(mapa).sort((a, b) => {
            const [da,ma,ya] = a[0].split('/').map(Number);
            const [db,mb,yb] = b[0].split('/').map(Number);
            return new Date(yb,mb-1,db) - new Date(ya,ma-1,da);
        });
    }

    function moeda(v) {
        return Number(v).toLocaleString('pt-BR', { style:'currency', currency:'BRL', minimumFractionDigits:0, maximumFractionDigits:0 });
    }

    function getComissaoParaMes(colab, mesAno) {
        // mesAno = "2025-03"
        const historico = colab?.comissaoHistorico;
        if (!historico || historico.length === 0) {
            return parseFloat(colab?.comissao || 0);
        }
        const sorted = [...historico].sort((a, b) => a.inicio.localeCompare(b.inicio));
        let taxa = parseFloat(sorted[0].valor || 0);
        for (const h of sorted) {
            if (h.inicio <= mesAno) taxa = parseFloat(h.valor || 0);
            else break;
        }
        return taxa;
    }

                        <div class="lista-item">
                            <div class="item-nome">${nome}</div>
                            <div class="dia-count">${qtd}</div>
                        </div>`).join('')}
                </div>
            </div>` : ''}

            <!-- Por dia -->
            ${porDia.length > 0 && (dataDe || dataAte) ? `
            <div class="secao">
                <div class="secao-titulo">&#128197; L&iacute;quido por Dia</div>
                <div class="lista-card">
                    ${porDia.map(([data,{count,rotas,saldo}]) => {
                        const nums = [...rotas].map(r => r.replace(/^rota\s*/i, '').replace(/^r\.\s*/i, '').trim());
                        const rotasStr = nums.length > 0 ? `Rota ${nums.join(' / ')}` : '';
                        return `
                        <div class="dia-item" style="gap:6px;">
                            <span class="dia-data" style="flex-shrink:0;">${data}</span>
                            <span style="font-size:13px; color:rgba(255,255,255,0.5); flex-shrink:0;">Qtd ${count}</span>
                            <span style="font-size:13px; color:#ffeb3b; flex:1; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${rotasStr}</span>
                            <span style="font-size:13px; font-weight:bold; color:#a5d6a7; flex-shrink:0;">${moeda(saldo)}</span>
                        </div>`;
                    }).join('')}
                </div>
            </div>` : ''}
        `;
        setupTopoObserver();
    }

    window._renderizar = renderizar;

    function atualizarTopoFinDatas() {
        const el = document.getElementById('topoFinDatas');
        if (!el) return;
        const de  = formatarDataBR(dataDe)  || 'Selecione';
        const ate = formatarDataBR(dataAte) || '';
        el.innerHTML = (ate && ate !== de) ? `${de} &rarr; ${ate}` : de;
    }

    function setupTopoObserver() {
        if (window._topoScrollHandler) {
            window.removeEventListener('scroll', window._topoScrollHandler);
        }

        window._topoScrollHandler = function() {
            const tituloFin       = document.getElementById('tituloFinanceiro');
            const topoFin         = document.getElementById('topoFin');
            const tituloPrincipal = document.getElementById('tituloPrincipal');
            if (!topoFin || !tituloPrincipal) return;

            const rolou  = window.scrollY > 10;
            const passou = tituloFin ? tituloFin.getBoundingClientRect().top < 0 : false;

            tituloPrincipal.style.display = rolou ? 'none' : '';
            topoFin.classList.toggle('visivel', passou);
            if (passou) atualizarTopoFinDatas();
        };

        window.addEventListener('scroll', window._topoScrollHandler, { passive: true });
    }

    window.abrirFoto = function(url) {
        document.getElementById('lbImg').src = url;
        document.getElementById('lbOverlay').classList.add('aberto');
        history.pushState({ lightbox: true }, '');
    };
    window.fecharLightbox = function() {
        document.getElementById('lbOverlay').classList.remove('aberto');
        document.getElementById('lbImg').src = '';
        if (history.state?.lightbox) history.back();
    };
    window.addEventListener('popstate', function(e) {
        if (document.getElementById('lbOverlay').classList.contains('aberto')) {
            document.getElementById('lbOverlay').classList.remove('aberto');
            document.getElementById('lbImg').src = '';
        }
    });

    // â”€â”€ InicializaÃ§Ã£o â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // Todas as chamadas ao Firebase rodam em paralelo para carregar mais rÃ¡pido.
    // posseAcumulada: dados de produtos/mÃ¡quinas de atendimentos jÃ¡ excluÃ­dos.
    // Sem isso, ao excluir atendimentos antigos o balanÃ§o de material ficaria errado.
    const [todos, posseAcumulada, colaboradores, clientes, depositos, historico, pixPosseInicial] = await Promise.all([
        dbListarAtendimentos(),
        dbLerPosseAcumulada(usuarioLogado),   // â† acumulado dos atendimentos excluÃ­dos
        dbListarColaboradores(),
        dbListarClientes(),
        dbListarDepositos(usuarioLogado),
        dbListarHistorico(),
        dbLerPixEmPosse(usuarioLogado)
    ]);
    todosDepositos = depositos;
    historicoEstoque = historico;
    pixEmPosse = pixPosseInicial;
    colaboradorObj  = colaboradores.find(c => c.nome === usuarioLogado) || null;

    // Mapa para cruzar cliente do atendimento â†’ rota atual
    mapaRotas = {};
    clientes.forEach(c => {
        if (!c.rota) return;
        if (c.firebaseUrl) mapaRotas[c.firebaseUrl] = c.rota;
        if (c.numero)      mapaRotas[String(c.numero)] = c.rota;
    });
    todosAtendimentos = todos.filter(a => a.atendente === usuarioLogado);
    datasComAtendimento = new Set(
        todosAtendimentos
            .filter(a => {
                const dataStr = dataLocalStr(a.data || a.dataHora || 0);
                if (!dataStr) return false;
                const total = Number(a.financeiro?.totalGeral || 0);
                return dataStr <= hoje && total > 0;
            })
            .map(a => dataLocalStr(a.data || a.dataHora || 0))
    );

    // Salva o acumulado em variÃ¡veis globais para o renderizar() acessar sempre que
    // redesenha a tela (ex: ao trocar o perÃ­odo selecionado no calendÃ¡rio).
    // Estrutura: { produtos: { "NomeProduto": qtd }, maquinas: { "NomeMaquina": contagem } }
    window._posseAcumuladaProdutos = posseAcumulada.produtos || {};
    window._posseAcumuladaMaquinas = posseAcumulada.maquinas || {};

    renderizar();

    // Atualiza em tempo real apenas os dados do usuÃƒÂ¡rio logado.
    dbEscutarAtendimentosDoUsuario(usuarioLogado, (lista) => {
        todosAtendimentos = lista;
        atualizarDatasComAtendimento();
        renderizar();
    });

    dbEscutarDepositos(usuarioLogado, (lista) => {
        todosDepositos = lista;
        renderizar();
    });

    dbEscutarHistoricoDoUsuario(usuarioLogado, (lista) => {
        historicoEstoque = lista;
        renderizar();
    });

    dbEscutarPosseAcumulada(usuarioLogado, (posseAcumuladaAtual) => {
        window._posseAcumuladaProdutos = posseAcumuladaAtual.produtos || {};
        window._posseAcumuladaMaquinas = posseAcumuladaAtual.maquinas || {};
        renderizar();
    });

    dbEscutarPixEmPosse(usuarioLogado, (lista) => {
        pixEmPosse = lista;
        renderizar();
    });
</script>
