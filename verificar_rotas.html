<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Rotas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #042d86;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
        }

        .app {
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            padding-bottom: 24px;
        }

        .header {
            background: #042d86;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 2px solid #1e3d7a;
        }

        .header-titulo {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-home {
            position: absolute;
            right: 12px;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-home svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
        }

        .lista {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .estado {
            margin: 32px 14px 0;
            padding: 18px 14px;
            border: 1px solid #ffffff;
            border-radius: 12px;
            background: #123b92;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.35;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .filtros {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            padding: 12px 14px 10px;
            position: sticky;
            top: 52px;
            z-index: 19;
            background: #042d86;
            border-bottom: 1px solid #1e3d7a;
        }

        .filtro-select {
            width: 100%;
            min-width: 0;
            border: 1px solid #ffffff;
            border-radius: 9px;
            background: #123b92;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 6px;
            text-align: center;
            outline: none;
        }

        .filtro-select option {
            background: #123b92;
            color: #ffffff;
        }

        .filtro-tempo-btn {
            width: 100%;
            min-width: 0;
            border: 1px solid #ffffff;
            border-radius: 9px;
            background: #123b92;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            padding: 7px 4px;
            text-align: center;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            user-select: none;
            -webkit-user-select: none;
        }

        .filtro-tempo-texto {
            font-size: 13px;
            line-height: 1;
            white-space: nowrap;
        }

        .filtro-tempo-btn.ativo {
            border-color: #ffeb3b;
            color: #ffeb3b;
        }

        .card {
            overflow: hidden;
            border: 1px solid #4f68a6;
            border-left: 4px solid #ffeb3b;
            border-bottom: 2px solid #ffffff;
            border-radius: 12px;
            background: #0f347e;
            box-shadow: 0 4px 8px #021944;
        }

        @keyframes piscar-borda-rota {
            0%, 100% { border-color: #f59e0b; box-shadow: 0 4px 8px #021944; }
            50% { border-color: #fcd34d; box-shadow: 0 0 10px #f59e0b; }
        }

        .card.rota-tempo-alerta {
            border-color: #f59e0b;
            animation: piscar-borda-rota 2s ease-in-out infinite;
        }

        .card-header {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 6px 10px;
            padding: 12px 14px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .card-mainline {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rota-badge {
            background: #ffeb3b;
            color: #042d86;
            font-size: 17px;
            font-weight: bold;
            border-radius: 8px;
            padding: 4px 11px;
            white-space: nowrap;
        }

        .card-info {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .card-topline {
            display: flex;
            flex-wrap: nowrap;
            gap: 7px;
            align-items: center;
            min-width: 0;
        }

        .chip-header,
        .chip-info {
            background: transparent;
            border: 1.5px solid #ffffff;
            border-radius: 20px;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            padding: 4px 10px;
            white-space: nowrap;
        }

        .chip-header .chip-label {
            color: #dce6ff;
            font-weight: 400;
            margin-right: 4px;
        }

        .card-sub {
            color: #dce6ff;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.3;
        }

        .card-subline {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            min-width: 0;
            padding-left: 6px;
        }

        .card-feito-grupo {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            min-width: 0;
        }

        .card-limpar-slot {
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 24px;
        }

        .btn-limpar-selecao {
            width: 20px;
            height: 20px;
            border: 1px solid #ff9800;
            border-radius: 50%;
            background: #123b92;
            color: #ffeb3b;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            line-height: 18px;
            padding: 0;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-limpar-selecao:disabled {
            border-color: #ffffff;
            color: #ffffff;
            cursor: wait;
        }

        .btn-prioridade-rota {
            width: 24px;
            height: 24px;
            border: 0;
            border-radius: 0;
            background: transparent;
            color: #ffffff;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            line-height: 24px;
            padding: 0;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-prioridade-rota.ativo {
            color: #ffeb3b;
        }

        .btn-prioridade-rota:disabled {
            color: #ffffff;
            cursor: wait;
        }

        .prioridade-chip {
            border: 1px solid #ffeb3b;
            border-radius: 20px;
            color: #ffeb3b;
            font-size: 13px;
            font-weight: 700;
            padding: 3px 9px;
            text-align: center;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }

        .selecionada-por {
            border: 1px solid #ff9800;
            border-radius: 20px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            padding: 3px 9px;
            text-align: center;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }

        .selecionada-label {
            color: #dce6ff;
            font-weight: 400;
            margin-right: 4px;
        }

        .expand-icon {
            color: #ffffff;
            font-size: 14px;
            transition: transform 0.2s;
            justify-self: end;
        }

        .card.expanded .expand-icon { transform: rotate(180deg); }

        .card-body {
            display: none;
            border-top: 1px solid #425f9e;
            background: #0b2b6d;
        }

        .card.expanded .card-body { display: block; }

        .clientes {
            display: flex;
            flex-direction: column;
            gap: 9px;
            padding: 12px 14px 14px;
        }

        .clientes-titulo {
            color: #ffeb3b;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.7px;
            text-align: center;
            text-transform: uppercase;
            user-select: none;
            -webkit-user-select: none;
        }

        .cliente-card {
            border: 1px solid #5c78b8;
            border-radius: 10px;
            background: #133985;
            padding: 8px;
        }

        .cliente-nome {
            color: #ffeb3b;
            font-size: 15px;
            font-weight: bold;
            line-height: 1.25;
            text-align: center;
            border-bottom: 1px solid #ffeb3b;
            margin-bottom: 4px;
            padding-bottom: 3px;
        }

        .cliente-dados {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .dado {
            border: 1px solid #ffffff;
            border-radius: 9px;
            padding: 5px 6px;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-align: center;
        }

        .dado-label {
            color: #dce6ff;
            display: inline;
            font-size: 13px;
            font-weight: 400;
            user-select: none;
            -webkit-user-select: none;
        }

        .dado-valor {
            color: #ffffff;
            display: inline;
            font-size: 14px;
            font-weight: bold;
            overflow-wrap: anywhere;
        }

        .dado.full { grid-column: 1 / -1; }

        @media (max-width: 380px) {
            .cliente-dados { gap: 5px; }
            .dado {
                flex-direction: column;
                gap: 2px;
                padding: 5px 4px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <button class="btn-home" type="button" aria-label="Ir para tela inicial" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </button>
        <div class="header-titulo">Verificar Rotas</div>
    </div>

    <div class="filtros" aria-label="Filtros de rotas">
        <button id="filtroTempo" class="filtro-tempo-btn" type="button" aria-label="Filtrar rotas por tempo" title="Filtrar por tempo">
            <span id="filtroTempoTexto" class="filtro-tempo-texto">+60 Dias</span>
        </button>
        <select id="filtroNumero" class="filtro-select" aria-label="Ordenar por número da rota">
            <option value="">Rota</option>
            <option value="numero_asc">Rota ↑</option>
            <option value="numero_desc">Rota ↓</option>
        </select>
        <select id="filtroValor" class="filtro-select" aria-label="Ordenar por valor">
            <option value="">Valor</option>
            <option value="valor_desc">Valor ↓</option>
            <option value="valor_asc">Valor ↑</option>
        </select>
        <select id="filtroSelecao" class="filtro-select" aria-label="Filtrar por seleção">
            <option value="todas">Todas</option>
            <option value="selecionadas">Selecionadas</option>
            <option value="livres">Livres</option>
        </select>
    </div>

    <div id="lista" class="lista"></div>
    <div id="estado" class="estado">Carregando rotas...</div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    import { dbEscutarMediaDeVendas, dbEscutarSessaoRotas, dbLiberarRota, dbDefinirPrioridadeManualRota } from './database.js';

    verificarAutenticacao();

    const elLista = document.getElementById('lista');
    const elEstado = document.getElementById('estado');
    const filtroNumero = document.getElementById('filtroNumero');
    const filtroValor = document.getElementById('filtroValor');
    const filtroSelecao = document.getElementById('filtroSelecao');
    const filtroTempo = document.getElementById('filtroTempo');
    const filtroTempoTexto = document.getElementById('filtroTempoTexto');
    let listaMediaDeVendasAtual = [];
    let mediaDeVendasCarregada = false;
    let sessaoRotasAtual = null;
    let ordemAtual = 'valor_desc';
    let selecaoAtual = 'todas';
    let filtrarTempo60 = false;

    function escaparHtml(valor) {
        return String(valor ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function normalizarRota(valor) {
        const limpa = String(valor ?? '').trim().replace(/^R\.?\s*/i, '');
        return limpa || '';
    }

    function obterRotaSessao(numeroRota) {
        return obterEntradaRotaSessao(numeroRota)?.dados || null;
    }

    function obterEntradaRotaSessao(numeroRota) {
        const rotas = sessaoRotasAtual?.rotas || {};
        const numeroNormalizado = normalizarRota(numeroRota);
        if (rotas[numeroRota]) return { chave: numeroRota, dados: rotas[numeroRota] };
        if (rotas[numeroNormalizado]) return { chave: numeroNormalizado, dados: rotas[numeroNormalizado] };

        const encontrada = Object.entries(rotas).find(([numero]) =>
            normalizarRota(numero) === numeroNormalizado
        );

        return encontrada ? { chave: encontrada[0], dados: encontrada[1] } : null;
    }

    function obterSelecionadaPor(numeroRota) {
        return String(obterRotaSessao(numeroRota)?.selecionada_por || '').trim();
    }

    function obterPrioridadeRota(numeroRota) {
        return obterRotaSessao(numeroRota)?.prioridade_manual === true;
    }

    function rotaEstaSelecionada(numeroRota) {
        return Boolean(obterSelecionadaPor(numeroRota));
    }

    function compararNumeroRota(a, b) {
        const numA = Number(a.numero);
        const numB = Number(b.numero);
        if (Number.isFinite(numA) && Number.isFinite(numB) && numA !== numB) {
            return numA - numB;
        }
        return String(a.numero).localeCompare(String(b.numero), 'pt-BR', { numeric: true });
    }

    function aplicarFiltrosRotas(rotas) {
        let filtradas = [...rotas];

        if (selecaoAtual === 'selecionadas') {
            filtradas = filtradas.filter(rota => rotaEstaSelecionada(rota.numero));
        } else if (selecaoAtual === 'livres') {
            filtradas = filtradas.filter(rota => !rotaEstaSelecionada(rota.numero));
        }

        if (filtrarTempo60) {
            filtradas = filtradas.filter(rota => (rota.diasSemFazer ?? -1) >= 60);
        }

        filtradas.sort((a, b) => {
            if (ordemAtual === 'numero_asc') return compararNumeroRota(a, b);
            if (ordemAtual === 'numero_desc') return compararNumeroRota(b, a);
            if (ordemAtual === 'valor_asc') {
                if (a.valorEstimado !== b.valorEstimado) return a.valorEstimado - b.valorEstimado;
                return compararNumeroRota(a, b);
            }
            if (b.valorEstimado !== a.valorEstimado) return b.valorEstimado - a.valorEstimado;
            return compararNumeroRota(a, b);
        });

        return filtradas;
    }

    function obterNumeroCliente(item) {
        return String(item?.cliente?.numero ?? item?.cliente_numero ?? item?.firebaseUrl ?? '').trim();
    }

    function obterNomeCliente(item) {
        return String(item?.cliente?.nome || '').trim() || 'Cliente sem nome';
    }

    function numeroFinito(valor) {
        const n = Number(valor);
        return Number.isFinite(n) ? n : 0;
    }

    function parseData(valor) {
        if (!valor) return null;
        const texto = String(valor).trim();
        const d = new Date(texto.includes('T') ? texto : `${texto}T00:00:00`);
        return Number.isNaN(d.getTime()) ? null : d;
    }

    function inicioDia(data) {
        if (!data) return null;
        const d = new Date(data);
        d.setHours(0, 0, 0, 0);
        return d;
    }

    function diasDesde(valor) {
        const data = inicioDia(parseData(valor));
        if (!data) return null;
        const hoje = inicioDia(new Date());
        return Math.max(0, Math.round((hoje - data) / 86400000));
    }

    function textoDias(valor) {
        const dias = diasDesde(valor);
        if (dias === null) return 'Sem cobrança';
        if (dias === 0) return 'Hoje';
        if (dias === 1) return 'Há 1 dia';
        return `Há ${dias} dias`;
    }

    function fmtMoeda(valor) {
        return numeroFinito(valor).toLocaleString('pt-BR', {
            style: 'currency',
            currency: 'BRL',
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        });
    }

    function agruparRotas(lista) {
        const mapa = new Map();

        (Array.isArray(lista) ? lista : []).forEach(item => {
            const rota = normalizarRota(item?.rota || item?.cliente?.rota);
            if (!rota) return;

            if (!mapa.has(rota)) {
                mapa.set(rota, {
                    numero: rota,
                    clientes: [],
                    valorEstimado: 0,
                    mediaDiaTotal: 0,
                    ultimoAtendimentoEm: null
                });
            }

            const grupo = mapa.get(rota);
            const estimativa = numeroFinito(item?.estimativaAtualDia);
            const vendaDia = numeroFinito(item?.mediaVendaPorDia);
            const ultimo = item?.ultimaCobrancaEm || null;
            const ultimoData = parseData(ultimo);
            const ultimoGrupoData = parseData(grupo.ultimoAtendimentoEm);

            grupo.valorEstimado += estimativa;
            grupo.mediaDiaTotal += vendaDia;
            if (ultimoData && (!ultimoGrupoData || ultimoData > ultimoGrupoData)) {
                grupo.ultimoAtendimentoEm = ultimo;
            }

            grupo.clientes.push({
                numero: obterNumeroCliente(item),
                nome: obterNomeCliente(item),
                vendaDia,
                estimativa,
                ultimoAtendimentoEm: ultimo
            });
        });

        return Array.from(mapa.values())
            .map(rota => ({
                ...rota,
                valorEstimado: Math.round((rota.valorEstimado + Number.EPSILON) * 100) / 100,
                mediaDiaTotal: Math.round((rota.mediaDiaTotal + Number.EPSILON) * 100) / 100,
                diasSemFazer: diasDesde(rota.ultimoAtendimentoEm),
                clientes: rota.clientes.sort((a, b) => {
                    if (b.estimativa !== a.estimativa) return b.estimativa - a.estimativa;
                    return a.nome.localeCompare(b.nome, 'pt-BR');
                })
            }))
            .sort((a, b) => {
                if (b.valorEstimado !== a.valorEstimado) return b.valorEstimado - a.valorEstimado;
                return Number(a.numero) - Number(b.numero);
            });
    }

    function montarClienteHtml(cliente) {
        const mediaTxt = cliente.vendaDia > 0 ? fmtMoeda(cliente.vendaDia) : '-';
        const diasUltimaTxt = textoDias(cliente.ultimoAtendimentoEm);

        return `
            <div class="cliente-card">
                <div class="cliente-nome">Nº ${escaparHtml(cliente.numero || '-')} - ${escaparHtml(cliente.nome)}</div>
                <div class="cliente-dados">
                    <div class="dado"><span class="dado-label">Venda/dia</span><span class="dado-valor">${mediaTxt}</span></div>
                    <div class="dado"><span class="dado-label">Desde última</span><span class="dado-valor">${escaparHtml(diasUltimaTxt)}</span></div>
                    <div class="dado"><span class="dado-label">Estimativa</span><span class="dado-valor">${fmtMoeda(cliente.estimativa)}</span></div>
                </div>
            </div>
        `;
    }

    function montarRotaHtml(rota) {
        const id = `rota-${rota.numero.replace(/[^a-z0-9_-]/gi, '-')}`;
        const clientesHtml = rota.clientes.map(montarClienteHtml).join('');
        const ultimaTxt = textoDias(rota.ultimoAtendimentoEm);
        const selecionadaPor = obterSelecionadaPor(rota.numero);
        const prioridadeAtiva = obterPrioridadeRota(rota.numero);
        const chaveRotaSessao = obterEntradaRotaSessao(rota.numero)?.chave || rota.numero;
        const botaoLimparHtml = selecionadaPor
            ? `<button class="btn-limpar-selecao" type="button" data-liberar-rota="${escaparHtml(chaveRotaSessao)}" aria-label="Remover seleção da rota ${escaparHtml(rota.numero)}" title="Remover seleção">×</button>`
            : '';
        const botaoPrioridadeHtml = !selecionadaPor
            ? `<button class="btn-prioridade-rota ${prioridadeAtiva ? 'ativo' : ''}" type="button" data-prioridade-rota="${escaparHtml(chaveRotaSessao)}" data-prioridade-ativa="${prioridadeAtiva ? '1' : '0'}" aria-label="${prioridadeAtiva ? 'Remover prioridade da rota' : 'Priorizar rota'} ${escaparHtml(rota.numero)}" title="${prioridadeAtiva ? 'Remover prioridade' : 'Priorizar rota'}">${prioridadeAtiva ? '★' : '⌛'}</button>`
            : '';
        const selecionadaHtml = selecionadaPor
            ? `<div class="selecionada-por"><span class="selecionada-label">Selecionada</span>${escaparHtml(selecionadaPor)}</div>`
            : '';
        const prioridadeHtml = prioridadeAtiva
            ? `<div class="prioridade-chip">Prioridade</div>`
            : '';

        return `
            <div class="card ${Number(rota.diasSemFazer || 0) >= 60 ? 'rota-tempo-alerta' : ''}" id="${escaparHtml(id)}">
                <div class="card-header" role="button" tabindex="0" data-toggle-card>
                    <div class="card-mainline">
                        <div class="rota-badge">R.${escaparHtml(rota.numero)}</div>
                        <div class="card-topline">
                            <div class="chip-header"><span class="chip-label">Valor</span>${fmtMoeda(rota.valorEstimado)}</div>
                            <div class="chip-header"><span class="chip-label">Clientes</span>${rota.clientes.length}</div>
                        </div>
                    </div>
                    <div class="expand-icon">▼</div>
                    <div class="card-subline">
                        <div class="card-feito-grupo">
                            <div class="card-limpar-slot">
                                ${botaoLimparHtml || botaoPrioridadeHtml}
                            </div>
                            <div class="card-sub">Feito ${escaparHtml(ultimaTxt)}</div>
                            ${selecionadaHtml}
                            ${prioridadeHtml}
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="clientes">
                        <div class="clientes-titulo">Clientes da rota</div>
                        ${clientesHtml}
                    </div>
                </div>
            </div>
        `;
    }

    function render() {
        if (!mediaDeVendasCarregada) return;

        const rotas = aplicarFiltrosRotas(agruparRotas(listaMediaDeVendasAtual));
        if (rotas.length === 0) {
            elLista.innerHTML = '';
            elEstado.style.display = 'block';
            elEstado.textContent = selecaoAtual === 'selecionadas'
                ? 'Nenhuma rota selecionada encontrada.'
                : selecaoAtual === 'livres'
                    ? 'Nenhuma rota livre encontrada.'
                    : 'Nenhuma rota encontrada em Media_de_Vendas.';
            return;
        }

        elEstado.style.display = 'none';
        elLista.innerHTML = rotas.map(montarRotaHtml).join('');
    }

    function alternarCard(card) {
        if (!card) return;
        const abrir = !card.classList.contains('expanded');
        elLista.querySelectorAll('.card.expanded').forEach(item => {
            if (item !== card) item.classList.remove('expanded');
        });
        card.classList.toggle('expanded', abrir);
    }

    async function limparSelecaoRota(botao) {
        const numeroRota = botao?.dataset?.liberarRota;
        if (!numeroRota || botao.disabled) return;

        const confirmar = await window.playConfirm(
            `Remover a seleção da rota R.${numeroRota}?`,
            {
                primaryLabel: 'Remover',
                secondaryLabel: 'Cancelar'
            }
        );
        if (!confirmar) return;

        botao.disabled = true;
        botao.textContent = '...';

        try {
            await dbLiberarRota(numeroRota);
        } catch (error) {
            console.error('Erro ao remover seleção da rota:', error);
            botao.disabled = false;
            botao.textContent = '×';
            await window.playAlert('Não foi possível remover a seleção da rota. Tente novamente.');
        }
    }

    async function alternarPrioridadeRota(botao) {
        const numeroRota = botao?.dataset?.prioridadeRota;
        if (!numeroRota || botao.disabled) return;

        const ativar = botao.dataset.prioridadeAtiva !== '1';
        botao.disabled = true;
        botao.textContent = '...';

        try {
            const usuario = String(localStorage.getItem('usuarioLogado') || localStorage.getItem('usuario_selecionado') || '').trim();
            await dbDefinirPrioridadeManualRota(numeroRota, usuario, ativar);
        } catch (error) {
            console.error('Erro ao alterar prioridade da rota:', error);
            botao.disabled = false;
            botao.textContent = botao.dataset.prioridadeAtiva === '1' ? '★' : '⌛';
            await window.playAlert('Não foi possível alterar a prioridade da rota. Tente novamente.');
        }
    }

    elLista.addEventListener('click', (event) => {
        const botaoPrioridade = event.target.closest('[data-prioridade-rota]');
        if (botaoPrioridade) {
            event.preventDefault();
            event.stopPropagation();
            alternarPrioridadeRota(botaoPrioridade);
            return;
        }

        const botaoLimpar = event.target.closest('[data-liberar-rota]');
        if (botaoLimpar) {
            event.preventDefault();
            event.stopPropagation();
            limparSelecaoRota(botaoLimpar);
            return;
        }

        const header = event.target.closest('[data-toggle-card]');
        if (!header) return;
        alternarCard(header.closest('.card'));
    });

    elLista.addEventListener('keydown', (event) => {
        if (event.target.closest('[data-liberar-rota], [data-prioridade-rota]')) return;
        if (event.key !== 'Enter' && event.key !== ' ') return;
        const header = event.target.closest('[data-toggle-card]');
        if (!header) return;
        event.preventDefault();
        alternarCard(header.closest('.card'));
    });

    filtroNumero.addEventListener('change', () => {
        ordemAtual = filtroNumero.value || 'valor_desc';
        filtroValor.value = ordemAtual === 'valor_desc' ? 'valor_desc' : '';
        render();
    });

    filtroValor.addEventListener('change', () => {
        ordemAtual = filtroValor.value || 'valor_desc';
        filtroValor.value = ordemAtual === 'valor_desc' ? 'valor_desc' : ordemAtual;
        filtroNumero.value = '';
        render();
    });

    filtroSelecao.addEventListener('change', () => {
        selecaoAtual = filtroSelecao.value || 'todas';
        render();
    });

    filtroTempo.addEventListener('click', () => {
        filtrarTempo60 = !filtrarTempo60;
        filtroTempo.classList.toggle('ativo', filtrarTempo60);
        filtroTempoTexto.textContent = filtrarTempo60 ? 'Limpar' : '+60 Dias';
        render();
    });

    filtroValor.value = ordemAtual;

    dbEscutarMediaDeVendas((lista) => {
        listaMediaDeVendasAtual = Array.isArray(lista) ? lista : [];
        mediaDeVendasCarregada = true;
        render();
    });

    dbEscutarSessaoRotas((sessao) => {
        sessaoRotasAtual = sessao || null;
        render();
    });
</script>
</body>
</html>
