<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        input, textarea { -webkit-user-select: text; user-select: text; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #042d86;
            display: flex;
            justify-content: center;
            color: white;
            min-height: 100vh;
        }

        .app {
            width: 100%;
            max-width: 440px;
            padding: 16px;
            padding-bottom: 50px;
            box-sizing: border-box;
        }

        /* ── TOPO ── */
        .topo {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; position: relative; width: 100%; min-height: 45px;
        }
        .titulo { font-size: 24px; font-weight: bold; text-align: center; }
        .btn-home {
            background: rgba(255,255,255,0.1); padding: 8px; border-radius: 50%;
            cursor: pointer; display: flex; position: absolute; right: 0;
        }
        .btn-home svg { width: 22px; height: 22px; fill: white; }

        /* ── ABAS ── */
        .abas {
            display: flex; background: rgba(0,0,0,0.25);
            border-radius: 30px; padding: 5px; margin-bottom: 14px;
        }
        .aba {
            flex: 1; padding: 11px; text-align: center; border-radius: 25px;
            cursor: pointer; font-weight: bold; font-size: 15px;
            transition: 0.2s; opacity: 0.5; font-family: Arial, sans-serif;
        }
        .aba.ativo { opacity: 1; color: white; }
        #aba-pendentes.ativo { background: #7c3aed; }
        #aba-confirmados.ativo { background: #16a34a; }
        .aba-badge {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            border-radius: 999px;
            padding: 1px 8px;
            font-size: 13px;
            font-weight: bold;
            margin-left: 6px;
            vertical-align: middle;
        }

        /* ── BARRA MÊS + BUSCA ── */
        .barra-filtros {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px;
        }

        .mes-selector { position: relative; flex-shrink: 0; }

        .mes-btn-atual {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 9px 12px; color: white;
            font-size: 14px; font-weight: bold; cursor: pointer;
            white-space: nowrap; font-family: Arial, sans-serif;
        }
        .mes-btn-atual .seta { font-size: 11px; color: rgba(255,255,255,0.5); transition: transform 0.2s; }
        .mes-btn-atual.aberto .seta { transform: rotate(180deg); }

        .mes-lista {
            position: absolute; top: calc(100% + 6px); left: 0;
            background: #0d2260; border: 1px solid rgba(255,255,255,0.18);
            border-radius: 12px; overflow: hidden; z-index: 300;
            min-width: 170px; box-shadow: 0 8px 24px rgba(0,0,0,0.55); display: none;
        }
        .mes-lista.aberta { display: block; }

        .mes-opcao {
            padding: 11px 16px; font-size: 14px; color: white; cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .mes-opcao:last-child { border-bottom: none; }
        .mes-opcao:active { background: rgba(255,255,255,0.08); }
        .mes-opcao.selecionado { color: #ffeb3b; font-weight: bold; }

        .filter-input {
            flex: 1; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: white; padding: 10px 13px; font-size: 15px;
            outline: none; min-width: 0; font-family: Arial, sans-serif;
        }
        .filter-input::placeholder { color: rgba(255,255,255,0.4); }

        /* ── CARD ── */
        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .card.colocada   { border-left-color: #4ade80; }
        .card.retirada   { border-left-color: #f87171; }
        .card.novo-ponto { border-left-color: #60a5fa; }
        .card.confirmado { opacity: 0.88; }

        .card-tipo {
            font-size: 13px; font-weight: bold; letter-spacing: 1.4px;
            text-transform: uppercase; margin-bottom: 10px;
            text-align: center; padding: 6px 0;
            border-radius: 8px; background: rgba(255,255,255,0.06);
        }
        .tipo-colocada   { color: #4ade80; }
        .tipo-retirada   { color: #f87171; }
        .tipo-novo-ponto { color: #93c5fd; }

        .card-cliente { font-size: 19px; font-weight: bold; margin-bottom: 4px; line-height: 1.3; }
        .card-detalhe { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.65; margin-bottom: 6px; }
        .card-detalhe strong { color: rgba(255,255,255,0.85); }

        .equip-lista { margin: 4px 0 8px; }
        .equip-item { display: flex; align-items: center; gap: 8px; font-size: 16px; color: #cbd5e1; padding: 3px 0; }
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dot.add { background: #4ade80; }
        .dot.rem { background: #f87171; }

        .card-rodape {
            display: flex; align-items: center;
            justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 8px;
        }
        .card-data { font-size: 13px; color: rgba(255,255,255,0.35); }

        .btn-ok {
            background: #14532d; border: 1px solid #4ade80; border-radius: 999px;
            padding: 8px 24px; font-size: 15px; font-weight: bold; color: #4ade80;
            cursor: pointer; font-family: Arial, sans-serif; transition: 0.15s;
        }
        .btn-ok:active { transform: translateY(1px); filter: brightness(0.85); }
        .btn-ok:disabled { opacity: 0.4; cursor: default; }

        .btn-aprovar {
            background: #1e3a8a; border: 1px solid #60a5fa; border-radius: 999px;
            padding: 8px 24px; font-size: 15px; font-weight: bold; color: #93c5fd;
            cursor: pointer; font-family: Arial, sans-serif; transition: 0.15s;
        }
        .btn-aprovar:active { transform: translateY(1px); filter: brightness(0.85); }
        .btn-aprovar:disabled { opacity: 0.4; cursor: default; }

        .btn-desfazer {
            background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.45);
            border-radius: 999px; padding: 8px 20px; font-size: 15px; font-weight: bold;
            color: #ef9a9a; cursor: pointer; font-family: Arial, sans-serif; transition: 0.15s;
        }
        .btn-desfazer:active { transform: translateY(1px); filter: brightness(0.85); }
        .btn-desfazer:disabled { opacity: 0.4; cursor: default; }

        .btn-editar-cliente {
            background: rgba(255,152,0,0.12); border: 1px solid rgba(255,152,0,0.5);
            border-radius: 999px; padding: 8px 20px; font-size: 15px; font-weight: bold;
            color: #ffb74d; cursor: pointer; font-family: Arial, sans-serif; transition: 0.15s;
        }
        .btn-editar-cliente:active { transform: translateY(1px); filter: brightness(0.85); }

        .confirmado-por { font-size: 13px; color: #4ade80; }

        .card.pix-servico {
            background: #172b63;
            border: 1px solid #8b5cf6;
            border-left-color: #a78bfa;
            padding: 12px;
        }
        .pix-servico-origem {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            padding: 4px 12px;
            border-radius: 999px;
            background: #4c1d95;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            margin: 0 auto 10px;
        }
        .pix-servico-origem.adicao { background: #166534; }
        .pix-servico-origem.retirada { background: #991b1b; }
        .pix-servico-cliente {
            font-size: 18px;
            font-weight: 700;
            color: #e9d5ff;
            margin-bottom: 10px;
            text-align: left;
        }
        .pix-servico-cliente .num-cliente {
            color: #f9a8d4;
            margin-right: 6px;
        }
        .pix-servico-lista {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pix-servico-item {
            background: #1d2268;
            border: 1px solid #4338ca;
            border-radius: 14px;
            padding: 10px;
        }
        .pix-servico-item-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pix-servico-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 24px;
            padding: 2px 10px;
            border-radius: 999px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
        }
        .pix-servico-badge.adicao { background: #16a34a; }
        .pix-servico-badge.retirada { background: #dc2626; }
        .pix-servico-equip {
            font-size: 15px;
            font-weight: 700;
            color: #e5e7eb;
            text-align: center;
        }
        .pix-servico-meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .pix-servico-pill,
        .pix-servico-resumo-item {
            background: #22324f;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
        }
        .pix-servico-pill span,
        .pix-servico-resumo-item span,
        .pix-servico-foto-label {
            display: block;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
            text-align: center;
        }
        .pix-servico-pill strong {
            display: block;
            font-size: 17px;
            font-weight: 700;
        }
        .pix-servico-pill.pix strong { color: #93c5fd; }
        .pix-servico-pill.por strong {
            color: #bbf7d0;
            font-size: 15px;
        }
        .pix-servico-pill.retirada-por strong { color: #fecaca; }
        .pix-servico-resumo {
            margin-top: 8px;
            border-radius: 14px;
            padding: 10px;
        }
        .pix-servico-resumo.adicao {
            background: #132f45;
            border: 1px solid #0f766e;
        }
        .pix-servico-resumo.retirada {
            background: #3b1f2f;
            border: 1px solid #be123c;
        }
        .pix-servico-resumo-titulo {
            color: #dcfce7;
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        .pix-servico-resumo.retirada .pix-servico-resumo-titulo { color: #fecdd3; }
        .pix-servico-resumo-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }
        .pix-servico-resumo.adicao .pix-servico-resumo-grid {
            grid-template-columns: minmax(0, 1fr);
        }
        .pix-servico-resumo-item strong {
            display: block;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
        }
        .pix-servico-resumo-item.valor strong { color: #fde68a; }
        .pix-servico-resumo-item.comissao strong { color: #fca5a5; }
        .pix-servico-resumo-item.contador strong { color: #86efac; }
        .pix-servico-foto-wrap {
            margin-top: 10px;
            text-align: center;
        }
        .pix-servico-foto {
            display: block;
            width: 100%;
            max-width: 140px;
            height: 96px;
            margin: 0 auto;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid #475569;
            background: #0f172a;
            cursor: zoom-in;
        }
        .pix-servico-acoes {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }
        .btn-gestor-confirmar {
            background: #6d28d9;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 700;
            font-family: Arial, sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: filter 0.15s, transform 0.15s;
        }
        .btn-gestor-confirmar:active {
            filter: brightness(0.85);
            transform: translateY(1px);
        }
        .btn-gestor-confirmar:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .vazio { text-align: center; color: rgba(255,255,255,0.3); padding: 36px 0; font-size: 17px; }
        .carregando { text-align: center; color: rgba(255,255,255,0.3); padding: 36px 0; font-size: 15px; }
    </style>
</head>
<script src="assets/js/play-dialogs.js"></script>
<body style="visibility: hidden;">
<div class="app">

    <!-- TOPO -->
    <div class="topo">
        <div class="titulo">&#128736; Servi&ccedil;os</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
    </div>

    <!-- ABAS -->
    <div class="abas">
        <div class="aba ativo" id="aba-pendentes" onclick="setAba('pendentes',this)">
            &#9203; A Confirmar<span id="badge-pendentes" class="aba-badge" style="display:none"></span>
        </div>
        <div class="aba" id="aba-confirmados" onclick="setAba('confirmados',this)">
            &#9989; Confirmados<span id="badge-confirmados" class="aba-badge" style="display:none"></span>
        </div>
    </div>

    <!-- MÊS + BUSCA -->
    <div class="barra-filtros">
        <div class="mes-selector" id="mesSelector">
            <button class="mes-btn-atual" id="mesBtnAtual">
                <span id="calMesTitulo"></span>
                <span class="seta">▼</span>
            </button>
            <div class="mes-lista" id="mesLista"></div>
        </div>
        <input type="text" class="filter-input" id="inputFiltro"
               placeholder="🔍 Buscar…" autocomplete="off">
    </div>

    <!-- LISTA -->
    <div id="lista">
        <div class="carregando">Carregando...</div>
    </div>

</div>

<script type="module">
    import {
        dbEscutarClientes,
        dbSalvarCliente,
        dbEscutarManutencoes,
        dbEscutarCadastrosPix,
        dbConfirmarGestorManutencao,
        dbSalvarManutencao
    } from './database.js';
    import { verificarAutenticacao, fazerLogout } from './auth.js';

    let _clientes    = [];
    let _manutencoes = [];
    let _pixCadastros = [];
    let _abaAtual    = 'pendentes';
    let _nomeUsuario = '';
    let _calAno = new Date().getFullYear();
    let _calMes = new Date().getMonth();

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function normalizarTextoBusca(valor) {
        return String(valor || '')
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    }

    function quebrarTermos(valor) {
        return normalizarTextoBusca(valor).split(/\s+/).filter(Boolean);
    }

    function escHtml(valor) {
        return String(valor || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function normalizarPix(valor) {
        return String(valor || '').trim();
    }

    function normalizarEquipDetalhesCliente(cliente) {
        if (Array.isArray(cliente?.equipDetalhes) && cliente.equipDetalhes.length > 0) {
            return cliente.equipDetalhes
                .map((item, index) => ({
                    rowId: String(item?.rowId || `equip_${index + 1}`),
                    nome: String(item?.nome || '').trim(),
                    qtd: String(item?.qtd || item?.quantidade || '1').trim() || '1',
                    pix: String(item?.pix || '').trim(),
                    contador: String(item?.contador || '').trim(),
                    tecnico: String(item?.tecnico || '').trim(),
                    pixRetiradoPendente: String(item?.pixRetiradoPendente || '').trim(),
                    contadorRetiradoPendente: String(item?.contadorRetiradoPendente || '').trim(),
                    retiradaPendentePor: String(item?.retiradaPendentePor || '').trim(),
                    manutencaoPendente: String(item?.manutencaoPendente || '').trim(),
                    aguardandoConfirmacao: item?.aguardandoConfirmacao === true,
                    manutencaoPendentePor: String(item?.manutencaoPendentePor || '').trim()
                }))
                .filter(item => item.nome);
        }

        if (!cliente?.equip) return [];

        const textoEquip = String(cliente.equip || '').trim();
        const partes = textoEquip.includes('|')
            ? textoEquip.split(/\s*\|\s*/)
            : textoEquip.split(/\s*,\s*/);

        return partes
            .map((item, index) => {
                let nome = String(item || '').trim();
                if (!nome) return null;
                let qtd = '1';
                let pix = '';

                const matchPixLegado = nome.match(/\s*\[Pix:\s*([^\]]+)\]\s*$/i);
                if (matchPixLegado) {
                    pix = String(matchPixLegado[1] || '').trim();
                    nome = nome.replace(/\s*\[Pix:\s*([^\]]+)\]\s*$/i, '').trim();
                } else {
                    const matchPixTexto = nome.match(/\s+Pix\s+([0-9]+)\s*$/i);
                    if (matchPixTexto) {
                        pix = String(matchPixTexto[1] || '').trim();
                        nome = nome.replace(/\s+Pix\s+([0-9]+)\s*$/i, '').trim();
                    }
                }

                const matchQtd = nome.match(/\s*\(([^)]+)\)\s*$/);
                if (matchQtd) {
                    qtd = String(matchQtd[1] || '1').trim() || '1';
                    nome = nome.replace(/\s*\(([^)]+)\)\s*$/, '').trim();
                }

                return {
                    rowId: `equip_${index + 1}`,
                    nome,
                    qtd,
                    pix,
                    contador: '',
                    tecnico: '',
                    pixRetiradoPendente: '',
                    contadorRetiradoPendente: '',
                    retiradaPendentePor: '',
                    manutencaoPendente: '',
                    aguardandoConfirmacao: false,
                    manutencaoPendentePor: ''
                };
            })
            .filter(Boolean);
    }

    function obterItensPixCadastroCliente(cliente) {
        const fotos = Array.isArray(cliente?.fotosMaquinasInstalacao) ? cliente.fotosMaquinasInstalacao : [];
        const fotoFicha = String(cliente?.fotoFichaInstalacaoThumb || cliente?.fotoFichaInstalacao || '').trim();

        return normalizarEquipDetalhesCliente(cliente)
            .flatMap((item, index) => {
                const fotoItem = fotos[index] || fotos.find(f => String(f?.url || f?.thumbUrl || '').trim()) || null;
                const fotoThumbBase = String(fotoItem?.thumbUrl || fotoItem?.url || fotoFicha).trim();
                const fotoFullBase = String(fotoItem?.url || fotoItem?.thumbUrl || fotoFicha).trim();
                const pendencias = [];
                const pixRetirado = String(item?.pixRetiradoPendente || '').trim();
                const pixAtual = String(item?.pix || '').trim();
                const duplicadoMesmoPix = pixRetirado && pixAtual && pixRetirado === pixAtual;

                if (pixRetirado && !duplicadoMesmoPix) {
                    const registro = obterRegistroCadastroPixServico(cliente, {
                        nome: item.nome,
                        pix: pixRetirado
                    });
                    const percentual = Number(registro?.percentual_comissao_cliente || 0);
                    pendencias.push({
                        rowId: item.rowId,
                        tipo: 'retirada',
                        nome: item.nome,
                        pix: pixRetirado,
                        por: item.retiradaPendentePor || item.manutencaoPendentePor || cliente?.cadastradoPor || '-',
                        contador: item.contadorRetiradoPendente || '',
                        contadorAnterior: String(registro?.contador_anterior_retirada || '').trim(),
                        contadorAtual: String(registro?.contador_atual_retirada || '').trim(),
                        valorTotal: Number(registro?.valor_bruto_cliente || 0),
                        valorComissao: Number(registro?.valor_comissao_cliente || 0),
                        percentualTxt: Number.isInteger(percentual)
                            ? `${percentual}%`
                            : `${percentual.toFixed(2).replace('.', ',')}%`,
                        fotoThumbUrl: String(registro?.foto_contador_retirada_thumb || registro?.foto_contador_retirada || fotoThumbBase).trim(),
                        fotoFullUrl: String(registro?.foto_contador_retirada || registro?.foto_contador_retirada_thumb || fotoFullBase).trim(),
                        mostrarResumoRetirada: registro?.retirou_trocou_contador === true
                    });
                } else if (item.aguardandoConfirmacao && item.manutencaoPendente === 'retirada' && pixAtual && !duplicadoMesmoPix) {
                    const registro = obterRegistroCadastroPixServico(cliente, {
                        nome: item.nome,
                        pix: pixAtual
                    });
                    const percentual = Number(registro?.percentual_comissao_cliente || 0);
                    pendencias.push({
                        rowId: item.rowId,
                        tipo: 'retirada',
                        nome: item.nome,
                        pix: pixAtual,
                        por: item.manutencaoPendentePor || cliente?.cadastradoPor || '-',
                        contador: item.contador || '',
                        contadorAnterior: String(registro?.contador_anterior_retirada || '').trim(),
                        contadorAtual: String(registro?.contador_atual_retirada || '').trim(),
                        valorTotal: Number(registro?.valor_bruto_cliente || 0),
                        valorComissao: Number(registro?.valor_comissao_cliente || 0),
                        percentualTxt: Number.isInteger(percentual)
                            ? `${percentual}%`
                            : `${percentual.toFixed(2).replace('.', ',')}%`,
                        fotoThumbUrl: String(registro?.foto_contador_retirada_thumb || registro?.foto_contador_retirada || fotoThumbBase).trim(),
                        fotoFullUrl: String(registro?.foto_contador_retirada || registro?.foto_contador_retirada_thumb || fotoFullBase).trim(),
                        mostrarResumoRetirada: registro?.retirou_trocou_contador === true
                    });
                }

                if (item.aguardandoConfirmacao && item.manutencaoPendente === 'adicao' && pixAtual) {
                    const registro = obterRegistroCadastroPixServico(cliente, {
                        nome: item.nome,
                        pix: pixAtual
                    });
                    pendencias.push({
                        rowId: item.rowId,
                        tipo: 'adicao',
                        nome: item.nome,
                        pix: pixAtual,
                        por: item.tecnico || item.manutencaoPendentePor || cliente?.cadastradoPor || '-',
                        contador: String(registro?.contador || item.contador || '').trim(),
                        fotoThumbUrl: String(registro?.foto_contador_instalacao_thumb || registro?.foto_contador_instalacao || fotoThumbBase).trim(),
                        fotoFullUrl: String(registro?.foto_contador_instalacao || registro?.foto_contador_instalacao_thumb || fotoFullBase).trim()
                    });
                }

                return pendencias;
            });
    }

    function obterItensPixManutencao(manutencao) {
        const tecnico = manutencao?.selecionadoPor || manutencao?.cadastradoPor || '-';
        const itens = [];

        (Array.isArray(manutencao?.equipamentosAdicionados) ? manutencao.equipamentosAdicionados : [])
            .filter(item => normalizarPix(item?.pix))
            .forEach(item => {
                itens.push({
                    tipo: 'adicao',
                    nome: String(item?.nome || '').trim(),
                    pix: String(item?.pix || '').trim(),
                    por: String(item?.tecnico || tecnico).trim() || '-',
                    contador: String(item?.contador || '').trim(),
                    fotoThumbUrl: '',
                    fotoFullUrl: ''
                });
            });

        (Array.isArray(manutencao?.equipamentosRetiradosDetalhes) ? manutencao.equipamentosRetiradosDetalhes : [])
            .filter(item => normalizarPix(item?.pix))
            .forEach(item => {
                const percentual = Number(item?.percentual_comissao_cliente || 0);
                itens.push({
                    tipo: 'retirada',
                    nome: String(item?.nome || '').trim(),
                    pix: String(item?.pix || '').trim(),
                    por: String(item?.tecnico || tecnico).trim() || '-',
                    contadorAnterior: String(item?.contador_anterior_retirada || item?.contador || '').trim(),
                    contadorAtual: String(item?.contador_atual_retirada || '').trim(),
                    valorTotal: Number(item?.valor_bruto_cliente || 0),
                    valorComissao: Number(item?.valor_comissao_cliente || 0),
                    percentualTxt: Number.isInteger(percentual)
                        ? `${percentual}%`
                        : `${percentual.toFixed(2).replace('.', ',')}%`,
                    fotoThumbUrl: String(item?.foto_contador_retirada_thumb || item?.foto_contador_retirada || '').trim(),
                    fotoFullUrl: String(item?.foto_contador_retirada || item?.foto_contador_retirada_thumb || '').trim(),
                    mostrarResumoRetirada: item?.retirou_trocou_contador === true
                });
            });

        return itens;
    }

    function formatarNumeroResumo(valor) {
        const texto = String(valor || '').trim();
        return texto || 'Nao informado';
    }

    function formatarMoedaBR(valor) {
        const numero = Number(valor || 0);
        return numero.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function serializarEquipamentosTextoCliente(equipDetalhes) {
        return (Array.isArray(equipDetalhes) ? equipDetalhes : [])
            .filter(item => String(item?.nome || '').trim())
            .map(item => {
                const nome = String(item?.nome || '').trim();
                const qtd = String(item?.qtd || '1').trim() || '1';
                const pix = String(item?.pix || '').trim();
                const base = `${nome}${qtd !== '1' ? ` (${qtd})` : ''}`;
                return pix ? `${base} [Pix: ${pix}]` : base;
            })
            .join(', ');
    }

    function obterTimestampCadastroPix(item) {
        return new Date(
            item?.atualizado_em
            || item?.criado_em
            || item?.data
            || item?.data_retirada
            || 0
        ).getTime() || 0;
    }

    function obterRegistroCadastroPixServico(cliente, pendencia) {
        const numeroPix = normalizarPix(pendencia?.pix);
        const equipamento = normalizarTextoBusca(pendencia?.nome);
        const clienteNome = normalizarTextoBusca(cliente?.nome);
        const identificacao = normalizarTextoBusca(
            `${cliente?.numero ? `N. ${cliente.numero} - ` : ''}${cliente?.nome || ''}`
        );
        if (!numeroPix || !equipamento) return null;

        return _pixCadastros
            .filter(item => normalizarPix(item?.numero_pix) === numeroPix)
            .filter(item => normalizarTextoBusca(item?.equipamento) === equipamento)
            .filter(item => {
                const itemCliente = normalizarTextoBusca(item?.cliente);
                const itemIdent = normalizarTextoBusca(item?.identificacao);
                return itemCliente === clienteNome || itemIdent === identificacao;
            })
            .sort((a, b) => obterTimestampCadastroPix(b) - obterTimestampCadastroPix(a))[0] || null;
    }

    function montarIdentificacaoPix(numero, nome) {
        const numeroFmt = String(numero || '').trim();
        const nomeFmt = String(nome || '').trim() || 'Cliente';
        if (!numeroFmt) return escHtml(nomeFmt);
        return `<span class="num-cliente">N. ${escHtml(numeroFmt)}</span> &mdash; ${escHtml(nomeFmt)}`;
    }

    function montarResumoPixItem(item) {
        const fotoHtml = item.fotoThumbUrl
            ? `<div class="pix-servico-foto-wrap">
                   <div class="pix-servico-foto-label">Foto do contador</div>
                   <img class="pix-servico-foto"
                        src="${escHtml(item.fotoThumbUrl)}"
                        data-full="${escHtml(item.fotoFullUrl || item.fotoThumbUrl)}"
                        alt="Foto do contador"
                        onclick="window.verFoto(this.dataset.full)">
               </div>`
            : '';

        if (item.tipo === 'retirada' && item.mostrarResumoRetirada) {
            return `
                <div class="pix-servico-resumo retirada">
                    <div class="pix-servico-resumo-titulo">Retirada/Troca do contador informada</div>
                    <div class="pix-servico-resumo-grid">
                        <div class="pix-servico-resumo-item">
                            <span>Contador anterior</span>
                            <strong>${escHtml(formatarNumeroResumo(item.contadorAnterior))}</strong>
                        </div>
                        <div class="pix-servico-resumo-item">
                            <span>Contador atual</span>
                            <strong>${escHtml(formatarNumeroResumo(item.contadorAtual))}</strong>
                        </div>
                        <div class="pix-servico-resumo-item valor">
                            <span>Valor total</span>
                            <strong>${escHtml(formatarMoedaBR(item.valorTotal))}</strong>
                        </div>
                        <div class="pix-servico-resumo-item comissao">
                            <span>Comissao do cliente (${escHtml(item.percentualTxt || '0%')})</span>
                            <strong>${escHtml(formatarMoedaBR(item.valorComissao))}</strong>
                        </div>
                    </div>
                    ${fotoHtml}
                </div>`;
        }

        if (item.tipo === 'adicao' && (item.contador || item.fotoThumbUrl)) {
            return `
                <div class="pix-servico-resumo adicao">
                    <div class="pix-servico-resumo-titulo">Instalacao informada</div>
                    <div class="pix-servico-resumo-grid">
                        <div class="pix-servico-resumo-item contador">
                            <span>Contador informado</span>
                            <strong>${escHtml(formatarNumeroResumo(item.contador))}</strong>
                        </div>
                    </div>
                    ${fotoHtml}
                </div>`;
        }

        return '';
    }

    function montarListaPixServico(itens) {
        return `
            <div class="pix-servico-lista">
                ${itens.map(item => `
                    <div class="pix-servico-item">
                        <div class="pix-servico-item-top">
                            <span class="pix-servico-badge ${item.tipo}">${item.tipo === 'retirada' ? '&minus; Retirado' : '+ Colocado'}</span>
                            <span class="pix-servico-equip">${escHtml(item.nome || 'Equipamento')}</span>
                        </div>
                        <div class="pix-servico-meta">
                            <div class="pix-servico-pill pix">
                                <span>${item.tipo === 'retirada' ? 'Pix retirado' : 'Pix colocado'}</span>
                                <strong>Pix ${escHtml(item.pix || '-')}</strong>
                            </div>
                            <div class="pix-servico-pill ${item.tipo === 'retirada' ? 'retirada-por' : 'por'}">
                                <span>${item.tipo === 'retirada' ? 'Retirado por' : 'Colocado por'}</span>
                                <strong>${escHtml(item.por || 'Nao informado')}</strong>
                            </div>
                        </div>
                        ${montarResumoPixItem(item)}
                    </div>
                `).join('')}
            </div>`;
    }

    function formatarData(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (isNaN(d)) return '—';
        return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' })
             + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function dentroDomes(iso) {
        if (!iso) return false;
        const d = new Date(iso);
        return d.getFullYear() === _calAno && d.getMonth() === _calMes;
    }

    function dentroDe2h(iso) {
        if (!iso) return false;
        return (Date.now() - new Date(iso).getTime()) < 2 * 60 * 60 * 1000;
    }

    function atualizarBadgesAbas() {
        const temColocacao = (m) => Array.isArray(m.equipamentosAdicionados) && m.equipamentosAdicionados.length > 0;
        const temRetirada  = (m) => Array.isArray(m.equipamentosRetirados)   && m.equipamentosRetirados.length  > 0;
        const dataM        = (m) => m.dataConclusao || m.dataRegistro;

        // Pendentes: todos os meses
        const totalPendentes =
            _manutencoes.filter(m => (temColocacao(m) || temRetirada(m)) && !m.confirmadoGestor).length +
            _clientes.filter(c => c.statusCadastro === 'em_analise').length;

        // Confirmados: só o mês atual
        const totalConfirmados =
            _manutencoes.filter(m => (temColocacao(m) || temRetirada(m)) && !!m.confirmadoGestor && dentroDomes(dataM(m))).length +
            _clientes.filter(c => c.statusCadastro === 'aprovado' && dentroDomes(c.dataCadastro)).length;

        const bP = document.getElementById('badge-pendentes');
        const bC = document.getElementById('badge-confirmados');
        if (bP) { bP.textContent = totalPendentes; bP.style.display = totalPendentes > 0 ? 'inline-block' : 'none'; }
        if (bC) { bC.textContent = totalConfirmados; bC.style.display = totalConfirmados > 0 ? 'inline-block' : 'none'; }
    }

    // ── RENDER ────────────────────────────────────────────────────────────────
    function renderizar() {
        atualizarBadgesAbas();
        const pendente = _abaAtual === 'pendentes';
        const termos   = quebrarTermos(document.getElementById('inputFiltro')?.value || '');

        const temColocacao = (m) => Array.isArray(m.equipamentosAdicionados) && m.equipamentosAdicionados.length > 0;
        const temRetirada  = (m) => Array.isArray(m.equipamentosRetirados)   && m.equipamentosRetirados.length  > 0;
        const dataM        = (m) => m.dataConclusao || m.dataRegistro;

        // Manutenções com movimentação de máquina
        const eventosManutencao = _manutencoes
            .filter(m => (temColocacao(m) || temRetirada(m))
                && (pendente ? !m.confirmadoGestor : !!m.confirmadoGestor)
                && dentroDomes(dataM(m)))
            .map(m => {
                const itensPix = obterItensPixManutencao(m);
                return {
                    tipo: itensPix.length > 0 ? 'pix-manutencao' : (temColocacao(m) ? 'colocada' : 'retirada'),
                data: dataM(m),
                id: m.firebaseUrl,
                clienteNome: m.clienteNome || '—',
                clienteNumero: m.clienteNumero || '',
                clienteRota: m.clienteRota || '—',
                clienteCidade: m.clienteCidade || '—',
                tecnico: m.selecionadoPor || m.cadastradoPor || '—',
                confirmedBy: m.confirmedBy || 'Gestor',
                dataConfirmacao: m.dataConfirmacaoGestor || '',
                equipColocadas: temColocacao(m) ? m.equipamentosAdicionados : [],
                equipRetiradas: temRetirada(m)  ? m.equipamentosRetirados   : [],
                foto: m.fotoSolicitacao || m.fotoSolicitacaoThumb || '',
                enderecoCliente: m.clienteEndereco || '',
                enderecoMaquina: m.enderecoAlteracaoMaquina || '',
                pontoEncerrado: m.pontoEncerrado === true,
                pixItens: itensPix,
                buscaExtra: itensPix.map(item => `${item.nome} ${item.pix}`).join(' ')
            };
            });

        // Novos pontos — pendentes (em_analise) ou confirmados (aprovado)
        const statusAlvo = pendente ? 'em_analise' : 'aprovado';
        const eventosNovos = _clientes
            .filter(c => c.statusCadastro === statusAlvo && dentroDomes(c.dataCadastro))
            .map(c => {
                const solicitacao = c.pontoNovoOrigemId
                    ? _manutencoes.find(m => m.firebaseUrl === c.pontoNovoOrigemId)
                    : null;
                const foto = c.fotoFichaInstalacao
                    || (Array.isArray(c.fotosMaquinasInstalacao) && c.fotosMaquinasInstalacao[0]?.url)
                    || '';
                const itensPix = obterItensPixCadastroCliente(c);
                return {
                    tipo: itensPix.length > 0 ? 'pix-cadastro' : 'novo-ponto',
                    confirmado: !pendente,
                    data: c.dataCadastro,
                    dataConfirmacao: c.dataAprovacao || '',
                    id: c.firebaseUrl,
                    clienteNome: c.nome || '—',
                    clienteNumero: c.numero || '',
                    clienteRota: c.rota || '—',
                    clienteCidade: c.cidade || '—',
                    cadastradoPor: c.cadastradoPor || '—',
                    equip: c.equip || '',
                    enderecoEntrega: c.endereco || '',
                    enderecoSolicitacao: solicitacao?.clienteEndereco || '',
                    foto,
                    pixItens: itensPix,
                    buscaExtra: itensPix.map(item => `${item.nome} ${item.pix}`).join(' ')
                };
            });

        let todos = [...eventosManutencao, ...eventosNovos]
            .sort((a, b) => new Date(b.data || 0) - new Date(a.data || 0));

        if (termos.length) {
            todos = todos.filter(ev => {
                const hay = normalizarTextoBusca([
                    ev.clienteNome, ev.clienteNumero, ev.clienteRota,
                    ev.clienteCidade, ev.tecnico, ev.cadastradoPor, ev.buscaExtra
                ].join(' '));
                return termos.every(t => hay.includes(t));
            });
        }

        const el = document.getElementById('lista');

        if (todos.length === 0) {
            el.innerHTML = `<div class="vazio">${pendente ? '&#9989; Nada pendente no per&iacute;odo' : 'Nenhum item confirmado no per&iacute;odo'}</div>`;
            return;
        }

        el.innerHTML = todos.map(ev => {
            if (ev.tipo === 'pix-manutencao') return cardPixManutencao(ev, pendente);
            if (ev.tipo === 'pix-cadastro')   return cardPixCadastro(ev);
            if (ev.tipo === 'colocada')   return cardColocada(ev, pendente);
            if (ev.tipo === 'retirada')   return cardRetirada(ev, pendente);
            if (ev.tipo === 'novo-ponto') return cardNovoPonto(ev);
            return '';
        }).join('');
    }

    function cardPixCadastro(ev) {
        const rodape = ev.confirmado
            ? dentroDe2h(ev.dataConfirmacao)
                ? `<button class="btn-desfazer" onclick="window.desfazerNovoPonto('${ev.id}',this)">&#8617; Desfazer</button>`
                : `<span class="confirmado-por">&#10003; Aprovado</span>`
            : `<button class="btn-gestor-confirmar" onclick="window.confirmarPixServico(this,'${ev.id}')">Confirmar</button>`;

        return `
            <div class="card pix-servico" id="card-${ev.id}">
                <div class="pix-servico-origem">Cadastro Pix</div>
                <div class="pix-servico-cliente">&#128205; ${montarIdentificacaoPix(ev.clienteNumero, ev.clienteNome)}</div>
                ${montarListaPixServico(ev.pixItens)}
                <div class="card-rodape" style="margin-top:12px;">
                    <span class="card-data">&#128336; ${formatarData(ev.data)}</span>
                    ${rodape}
                </div>
            </div>`;
    }

    function cardPixManutencao(ev, pendente) {
        const apenasRetirada = ev.pixItens.every(item => item.tipo === 'retirada');
        const apenasAdicao = ev.pixItens.every(item => item.tipo === 'adicao');
        const origemClasse = apenasRetirada ? 'retirada' : (apenasAdicao ? 'adicao' : '');
        const origemTexto = apenasRetirada ? 'Retirada Pix' : (apenasAdicao ? 'Inclusao Pix' : 'Movimentacao Pix');
        const rodape = pendente
            ? `<button class="btn-ok" onclick="window.okManutencao('${ev.id}',this)">&#10003; OK</button>`
            : dentroDe2h(ev.dataConfirmacao)
                ? `<button class="btn-desfazer" onclick="window.desfazerManutencao('${ev.id}',this)">&#8617; Desfazer</button>`
                : `<span class="confirmado-por">&#10003; ${ev.confirmedBy} &nbsp;&middot;&nbsp; ${formatarData(ev.dataConfirmacao)}</span>`;

        return `
            <div class="card pix-servico" id="card-${ev.id}">
                <div class="pix-servico-origem ${origemClasse}">${origemTexto}</div>
                <div class="pix-servico-cliente">&#128205; ${montarIdentificacaoPix(ev.clienteNumero, ev.clienteNome)}</div>
                ${montarListaPixServico(ev.pixItens)}
                <div class="card-rodape" style="margin-top:12px;">
                    <span class="card-data">&#128336; ${formatarData(ev.data)}</span>
                    ${rodape}
                </div>
            </div>`;
    }

                : `<span class="confirmado-por">&#10003; ${ev.confirmedBy} &nbsp;&middot;&nbsp; ${formatarData(ev.dataConfirmacao)}</span>`;

            ? `<img src="${ev.foto}" onclick="window.verFoto('${ev.foto}')" style="width:100%;border-radius:10px;margin:10px 0;object-fit:cover;max-height:200px;cursor:zoom-in;" />`

                   <div style="font-size:15px;color:#ffffff;">${ev.enderecoCliente}</div>
               </div>`

        const endMaquinaHtml_add = ev.enderecoMaquina

                   <div style="font-size:11px;font-weight:bold;letter-spacing:1px;color:#4ade80;text-transform:uppercase;margin-bottom:3px;">Endere&ccedil;o Informado na Visita</div>
                   <div style="font-size:15px;color:rgba(255,255,255,0.9);">${ev.enderecoMaquina}</div>
               </div>`
            : '';

        const btnRotaHtml_add = (ev.enderecoCliente && ev.enderecoMaquina)

                  style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 16px;border-radius:999px;background:rgba(74,222,128,0.10);border:1px solid rgba(74,222,128,0.35);color:#4ade80;font-size:14px;font-weight:bold;text-decoration:none;">

                  Ver dist&acirc;ncia no Maps
              </a>`
            : '';

        return `
        <div class="card colocada${!pendente ? ' confirmado' : ''}" id="card-${ev.id}">

            <div class="card-detalhe">
                <strong>Rota:</strong> ${ev.clienteRota} &nbsp;&middot;&nbsp; <strong>Cidade:</strong> ${ev.clienteCidade}<br>

                <span class="card-data">&#128336; ${formatarData(ev.data)}</span>

    function cardRetirada(ev, pendente) {
        const equips = ev.equipRetiradas.map(e => {

            return `<div class="equip-item"><span class="dot rem"></span>${nome}</div>`;
        }).join('');

            : dentroDe2h(ev.dataConfirmacao)
                ? `<button class="btn-desfazer" onclick="window.desfazerManutencao('${ev.id}',this)">↩ Desfazer</button>`
                : `<span class="confirmado-por">&#10003; ${ev.confirmedBy} &nbsp;&middot;&nbsp; ${formatarData(ev.dataConfirmacao)}</span>`;

        const endCadastroHtml_ret = ev.enderecoCliente
            ? `<div style="margin-top:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.06);border-left:3px solid rgba(255,255,255,0.35);">
                   <div style="font-size:11px;font-weight:bold;letter-spacing:1px;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-bottom:3px;">Endere&ccedil;o do Cadastro</div>
                   <div style="font-size:15px;color:#ffffff;">${ev.enderecoCliente}</div>
               </div>`
            : '';

        const endMaquinaHtml_ret = ev.enderecoMaquina
            ? `<div style="margin-top:6px;padding:8px 10px;border-radius:8px;background:rgba(248,113,113,0.07);border-left:3px solid #f87171;">
                   <div style="font-size:11px;font-weight:bold;letter-spacing:1px;color:#f87171;text-transform:uppercase;margin-bottom:3px;">Endere&ccedil;o Informado na Visita</div>
                   <div style="font-size:15px;color:rgba(255,255,255,0.9);">${ev.enderecoMaquina}</div>
               </div>`
            : '';

        const btnRotaHtml_ret = (ev.enderecoCliente && ev.enderecoMaquina)
            ? `<a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(ev.enderecoCliente)}&destination=${encodeURIComponent(ev.enderecoMaquina)}&travelmode=driving"
                  target="_blank" rel="noopener"
                  style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 16px;border-radius:999px;background:rgba(248,113,113,0.10);border:1px solid rgba(248,113,113,0.35);color:#f87171;font-size:14px;font-weight:bold;text-decoration:none;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                  Ver dist&acirc;ncia no Maps
              </a>`
            : '';

        return `
        <div class="card retirada${!pendente ? ' confirmado' : ''}" id="card-${ev.id}">
            <div class="card-tipo tipo-retirada">${ev.pontoEncerrado ? '&#9940; Ponto Encerrado' : '&#8595; M&aacute;quina Retirada'}</div>
            <div class="card-cliente">N. ${ev.clienteNumero} ${ev.clienteNome}</div>
            <div class="card-detalhe">
                <strong>Rota:</strong> ${ev.clienteRota} &nbsp;&middot;&nbsp; <strong>Cidade:</strong> ${ev.clienteCidade}<br>
                <strong>T&eacute;cnico:</strong> ${ev.tecnico}
            </div>
            <div class="equip-lista">${equips}</div>
            ${endCadastroHtml_ret}
            ${endMaquinaHtml_ret}
            ${btnRotaHtml_ret}
            <div class="card-rodape" style="margin-top:${(endCadastroHtml_ret || endMaquinaHtml_ret) ? '12px' : '10px'}">
                <span class="card-data">&#128336; ${formatarData(ev.data)}</span>
                ${rodape}
            </div>
        </div>`;
    }

    function cardNovoPonto(ev) {
        const fotoHtml = ev.foto
            ? `<img src="${ev.foto}" onclick="window.verFoto(this.currentSrc || this.src)" style="width:100%;border-radius:10px;margin:10px 0;object-fit:cover;max-height:180px;cursor:zoom-in;" />`
            : '';

        const enderecoSolicitacaoHtml = ev.enderecoSolicitacao
            ? `<div style="margin-top:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.06);border-left:3px solid rgba(255,255,255,0.6);">
                   <div style="font-size:11px;font-weight:bold;letter-spacing:1px;color:rgba(255,255,255,0.75);text-transform:uppercase;margin-bottom:3px;">Endere&ccedil;o da Solicita&ccedil;&atilde;o</div>
                   <div style="font-size:15px;color:#ffffff;">${ev.enderecoSolicitacao}</div>
               </div>`
            : '';

        const enderecoEntregaHtml = ev.enderecoEntrega
            ? `<div style="margin-top:6px;padding:8px 10px;border-radius:8px;background:rgba(74,222,128,0.07);border-left:3px solid #4ade80;">
                   <div style="font-size:11px;font-weight:bold;letter-spacing:1px;color:#4ade80;text-transform:uppercase;margin-bottom:3px;">Endere&ccedil;o Cadastrado</div>
                   <div style="font-size:15px;color:rgba(255,255,255,0.9);">${ev.enderecoEntrega}</div>
               </div>`
            : '';

        const btnRotaHtml = (ev.enderecoSolicitacao && ev.enderecoEntrega)
            ? `<a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(ev.enderecoSolicitacao)}&destination=${encodeURIComponent(ev.enderecoEntrega)}&travelmode=driving"
                  target="_blank" rel="noopener"
                  style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 16px;border-radius:999px;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.35);color:#93c5fd;font-size:14px;font-weight:bold;text-decoration:none;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                  Ver dist&acirc;ncia no Maps
              </a>`
            : '';

        return `
        <div class="card novo-ponto" id="card-${ev.id}">
            <div class="card-tipo tipo-novo-ponto">&#127968; Cliente Novo</div>
            <div class="card-cliente">N. ${ev.clienteNumero} ${ev.clienteNome}</div>
            <div class="card-detalhe">
                <strong>Rota:</strong> ${ev.clienteRota} &nbsp;&middot;&nbsp; <strong>Cidade:</strong> ${ev.clienteCidade}<br>
                <strong>Cadastrado por:</strong> ${ev.cadastradoPor}
                ${ev.equip ? `<br><strong>Equipamentos:</strong> ${ev.equip}` : ''}
            </div>
            ${fotoHtml}
            ${enderecoSolicitacaoHtml}
            ${enderecoEntregaHtml}
            ${btnRotaHtml}
            <div class="card-rodape" style="margin-top:12px;">
                <span class="card-data">&#128336; ${formatarData(ev.data)}</span>
                ${ev.confirmado
                    ? dentroDe2h(ev.dataConfirmacao)
                        ? `<button class="btn-desfazer" onclick="window.desfazerNovoPonto('${ev.id}',this)">↩ Desfazer</button>`
                        : `<span class="confirmado-por">&#10003; Aprovado</span>`
                    : `<div style="display:flex;gap:8px;">
                           <button class="btn-editar-cliente" onclick="window.location.href='cadastrar_cliente.html?edit=${ev.id}&volta=servico.html'">&#9998; Editar</button>
                           <button class="btn-aprovar" onclick="window.aprovarCliente('${ev.id}',this)">&#10003; Aprovar</button>
                       </div>`
                }
            </div>
        </div>`;
    }

    // ── AÇÕES ─────────────────────────────────────────────────────────────────
    window.okManutencao = async function(id, btn) {
        if (!id) return;
        const manut = _manutencoes.find(m => m.firebaseUrl === id);
        if (manut?.pontoEncerrado === true) {
            const confirmado = await window.playConfirm(
                'Confirmar o encerramento deste ponto?\n\nO cliente será excluído do sistema e esta ação não poderá ser desfeita.',
                { confirmLabel: 'Confirmar exclusão', cancelLabel: 'Cancelar' }
            );
            if (!confirmado) return;
        }
        if (btn) { btn.disabled = true; btn.textContent = '…'; }
        try {
            await dbConfirmarGestorManutencao(id, _nomeUsuario);
        } catch (e) {
            console.error(e);
            if (btn) { btn.disabled = false; btn.textContent = '✓ OK'; }
        }
    };

    window.desfazerManutencao = async function(id, btn) {
        if (!id) return;
        if (btn) { btn.disabled = true; btn.textContent = '…'; }
        try {
            const manut = _manutencoes.find(m => m.firebaseUrl === id);
            if (!manut) throw new Error('Registro não encontrado.');
            const payload = { ...manut };
            delete payload.firebaseUrl;
            delete payload.confirmadoGestor;
            delete payload.confirmedBy;
            delete payload.dataConfirmacaoGestor;
            await dbSalvarManutencao(payload, id);
        } catch (e) {
            console.error(e);
            if (btn) { btn.disabled = false; btn.textContent = '↩ Desfazer'; }
        }
    };

    window.desfazerNovoPonto = async function(id, btn) {
        if (!id) return;
        if (btn) { btn.disabled = true; btn.textContent = '…'; }
        try {
            await dbSalvarCliente({ statusCadastro: 'em_analise', dataAprovacao: null }, id);
        } catch (e) {
            console.error(e);
            if (btn) { btn.disabled = false; btn.textContent = '↩ Desfazer'; }
        }
    };

    window.confirmarPixServico = async function(btn, id) {
        if (!id) return;
        const textoOriginal = btn?.textContent || 'Confirmar';
        if (btn) { btn.disabled = true; btn.textContent = '...'; }
        try {
            const cliente = _clientes.find(c => c.firebaseUrl === id);
            if (!cliente) throw new Error('Cliente nao encontrado.');

            const equips = normalizarEquipDetalhesCliente(cliente).map(item => ({
                ...item,
                pixRetiradoPendente: '',
                contadorRetiradoPendente: '',
                retiradaPendentePor: '',
                manutencaoPendente: '',
                aguardandoConfirmacao: false,
                manutencaoPendenteEm: '',
                manutencaoPendentePor: ''
            }));

            await dbSalvarCliente({
                equipDetalhes: equips,
                equip: serializarEquipamentosTextoCliente(equips),
                statusCadastro: 'ativo'
            }, id);
        } catch (e) {
            console.error(e);
            if (window.playAlert) window.playAlert('Nao foi possivel confirmar este cadastro Pix.');
            else alert('Nao foi possivel confirmar este cadastro Pix.');
            if (btn) { btn.disabled = false; btn.textContent = textoOriginal; }
        }
    };

    window.aprovarCliente = async function(id, btn) {
        if (!id) return;
        if (btn) { btn.disabled = true; btn.textContent = '…'; }
        try {
            await dbSalvarCliente({ statusCadastro: 'aprovado', dataAprovacao: new Date().toISOString() }, id);
        } catch (e) {
            console.error(e);
            if (btn) { btn.disabled = false; btn.textContent = '✓ Aprovar'; }
        }
    };

    // ── CONTROLES ─────────────────────────────────────────────────────────────
    window.setAba = function(aba, el) {
        _abaAtual = aba;
        document.querySelectorAll('.aba').forEach(b => b.classList.remove('ativo'));
        if (el) el.classList.add('ativo');
        renderizar();
    };

    // ── SELETOR DE MÊS ────────────────────────────────────────────────────────
    function renderCalendario() {
        const titulo = new Date(_calAno, _calMes, 1)
            .toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
        const el = document.getElementById('calMesTitulo');
        if (el) el.textContent = titulo.charAt(0).toUpperCase() + titulo.slice(1);
    }

    function fecharMenuMes() {
        document.getElementById('mesLista').classList.remove('aberta');
        document.getElementById('mesBtnAtual').classList.remove('aberto');
    }

    function abrirMenuMes() {
        const mesAtualStr = `${_calAno}-${String(_calMes + 1).padStart(2, '0')}`;
        const todasDatas = [
            ..._manutencoes.map(m => m.dataConclusao || m.dataRegistro),
            ..._clientes.map(c => c.dataCadastro)
        ];
        const mesesDisp = [...new Set(
            todasDatas.map(iso => {
                if (!iso) return null;
                const d = new Date(iso);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            }).filter(Boolean)
        )].sort((a, b) => b.localeCompare(a));

        const lista = document.getElementById('mesLista');
        lista.innerHTML = '';
        if (mesesDisp.length === 0) {
            const vazio = document.createElement('div');
            vazio.className = 'mes-opcao';
            vazio.textContent = 'Nenhum registro';
            vazio.style.color = 'rgba(255,255,255,0.4)';
            lista.appendChild(vazio);
        }
        mesesDisp.forEach(mesStr => {
            const [a, m] = mesStr.split('-').map(Number);
            const titulo = new Date(a, m - 1, 1)
                .toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
            const div = document.createElement('div');
            div.className = 'mes-opcao' + (mesStr === mesAtualStr ? ' selecionado' : '');
            div.textContent = titulo.charAt(0).toUpperCase() + titulo.slice(1);
            div.addEventListener('click', () => {
                _calAno = a; _calMes = m - 1;
                fecharMenuMes();
                renderCalendario();
                renderizar();
            });
            lista.appendChild(div);
        });

        lista.classList.add('aberta');
        document.getElementById('mesBtnAtual').classList.add('aberto');
    }

    document.getElementById('inputFiltro').addEventListener('input', renderizar);

    document.getElementById('mesBtnAtual').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('mesLista').classList.contains('aberta')
            ? fecharMenuMes() : abrirMenuMes();
    });

    document.addEventListener('click', fecharMenuMes);

    renderCalendario();

    // ── INIT ──────────────────────────────────────────────────────────────────
    verificarAutenticacao();
    window.sair = fazerLogout;
    _nomeUsuario = String(localStorage.getItem('usuarioLogado') || '').trim();

    dbEscutarClientes(lista => {
        _clientes = lista;
        renderizar();
    });

    dbEscutarManutencoes(lista => {
        _manutencoes = lista;
        renderizar();
    });

    dbEscutarCadastrosPix(lista => {
        _pixCadastros = Array.isArray(lista) ? lista : [];
        renderizar();
    });

    document.body.style.visibility = 'visible';

    window.verFoto = function(url) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = `<img src="${url}" style="max-width:96vw;max-height:92vh;border-radius:10px;object-fit:contain;" />`;

        function fechar() {
            overlay.remove();
            window.removeEventListener('popstate', onPopState);
        }

        function onPopState() { fechar(); }

        overlay.addEventListener('click', () => {
            history.back();
        });

        window.addEventListener('popstate', onPopState);
        history.pushState({ foto: true }, '');
        document.body.appendChild(overlay);
    };
</script>

</body>
</html>
