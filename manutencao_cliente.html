<script type="module">
    import { verificarAutenticacao } from './auth.js';
    verificarAutenticacao();
    import { dbListarAtendimentos, dbListarClientes, dbSalvarCliente, dbSalvarManutencao, storageSalvarFoto, storageSalvarFotoComThumb } from './database.js';

    let clienteAtual = null;
    let usuarioPodeDevolverPix = false;
    let currentFileInputId = null;
    let fotosClienteReferenciaAtuais = [];

    function escaparHtml(valor) {
        return String(valor || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function voltarParaClientes() {
        window.location.href = 'clientes.html';
    }

    function obterClienteIdDaUrl() {
        const params = new URLSearchParams(window.location.search);
        return String(params.get('cliente') || "").trim();
    }

    function parseValorInteiro(valor) {
        return parseInt(String(valor || "").replace(/\D/g, ""), 10) || 0;
    }

    function parseValorInteiroComSinal(valor) {
        const texto = String(valor || "").trim();
        const numero = parseValorInteiro(texto);
        return texto.startsWith("-") ? -numero : numero;
    }

    function formatarMoedaInteira(valor) {
        return (Number(valor) || 0).toLocaleString('pt-BR', {
            style: 'currency',
            currency: 'BRL',
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        });
    }

    function atualizarTotalDevolucaoPix() {
        const valorEl = document.getElementById('modalPixSaldoValor');
        if (!valorEl) return;
        valorEl.textContent = formatarMoedaInteira(clienteAtual?.devolucao || 0);
    }

    function perfilPodeDevolverPix(perfil) {
        const valor = String(perfil || "")
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase();
        return valor.includes('gestao_3')
            || valor.includes('gestao nivel 3')
            || valor.includes('gestao_nivel_3')
            || valor.includes('atendimento_2')
            || valor.includes('atendimento nivel 2')
            || valor.includes('atendimento_nivel_2');
    }

    function clienteTemPix(cliente) {
        if (Array.isArray(cliente?.equipDetalhes)) {
            return cliente.equipDetalhes.some(item => String(item?.pix || "").trim());
        }

        const equipTexto = String(cliente?.equip || "").trim();
        return /\[Pix:\s*[^\]]+\]/i.test(equipTexto) || /\bPix\s+\d+/i.test(equipTexto);
    }

    function aplicarVisibilidadeDevolucaoPix() {
        const btn = document.getElementById('btnPixDev');
        const label = document.querySelector('.btn-pix-dev-label');
        const ocultar = () => {
            if (btn) btn.style.display = 'none';
            if (label) label.style.display = 'none';
        };

        ocultar();

        if (!usuarioPodeDevolverPix || !clienteTemPix(clienteAtual)) return;

        if (btn) btn.style.display = 'flex';
        if (label) label.style.display = 'block';
    }

    function aplicarPermissaoDevolucaoPix() {
        try {
            const nomeLogado = String(localStorage.getItem('usuarioLogado') || "").trim();
            if (!nomeLogado) {
                usuarioPodeDevolverPix = false;
                aplicarVisibilidadeDevolucaoPix();
                return;
            }

            const colaboradores = JSON.parse(localStorage.getItem('cache_colaboradores') || "[]");
            const usuario = colaboradores.find(item => String(item?.nome || "").trim() === nomeLogado);
            const perfil = usuario?.nivel_completo || "";
            usuarioPodeDevolverPix = perfilPodeDevolverPix(perfil);
            aplicarVisibilidadeDevolucaoPix();
        } catch (erro) {
            usuarioPodeDevolverPix = false;
            aplicarVisibilidadeDevolucaoPix();
            console.warn('Nao foi possivel ler o cache de permissao da devolucao Pix:', erro);
        }
    }

    function obterTimestampAtendimento(atendimento) {
        const dataBase = atendimento?.ultimaEdicao || atendimento?.data || "";
        const timestamp = Date.parse(dataBase);
        return Number.isNaN(timestamp) ? 0 : timestamp;
    }

    function obterAtendimentoMaisRecenteDoCliente(cliente, atendimentos) {
        if (!cliente || !Array.isArray(atendimentos)) return null;

        return atendimentos
            .filter(atendimento => {
                if (atendimento?.cliente?.id && cliente.firebaseUrl) {
                    return atendimento.cliente.id === cliente.firebaseUrl;
                }
                return atendimento?.cliente?.numero == cliente.numero;
            })
            .sort((a, b) => obterTimestampAtendimento(b) - obterTimestampAtendimento(a))[0] || null;
    }

    function obterFotosDoUltimoAtendimento(cliente, atendimentos) {
        const atendimento = obterAtendimentoMaisRecenteDoCliente(cliente, atendimentos);
        if (!atendimento?.fotos) return [];

        const fotos = [];

        if (Array.isArray(atendimento.fotos.maquinas)) {
            atendimento.fotos.maquinas.forEach((foto, index) => {
                const url = foto?.url || foto?.src || "";
                if (!url) return;
                fotos.push({
                    titulo: foto?.nome ? `Maquina: ${foto.nome}` : `Maquina ${index + 1}`,
                    url
                });
            });
        }

        return fotos;
    }

    function obterFotosClienteReferencia(cliente, atendimentos = []) {
        const fotosDoAtendimento = obterFotosDoUltimoAtendimento(cliente, atendimentos);
        if (fotosDoAtendimento.length > 0) {
            return fotosDoAtendimento;
        }

        const fotos = [];

        if (Array.isArray(cliente?.fotosMaquinasInstalacao)) {
            cliente.fotosMaquinasInstalacao.forEach((foto, index) => {
                const url = foto?.url || foto?.src || "";
                if (!url) return;
                fotos.push({
                    titulo: foto?.nome ? `Maquina: ${foto.nome}` : `Maquina ${index + 1}`,
                    url
                });
            });
        }

        return fotos;
    }

    function renderizarResumoCliente(cliente) {
        const resumo = document.getElementById('resumoCliente');
        if (!resumo) return;

        const blocos = [
            { titulo: 'Cliente', valor: [cliente.numero, cliente.nome].filter(Boolean).join(' - ') },
            { titulo: 'Rota', valor: cliente.rota || '' },
            { titulo: 'Cidade', valor: cliente.cidade || '' },
            { titulo: 'Endereco', valor: cliente.endereco || '' },
            { titulo: 'Equip.', valor: (function() {
                if (!cliente.equip) return '';
                const equipsToShow = [];
                cliente.equip.split(', ').forEach(function(item) {
                    if (!item) return;
                    let nome = item, qtd = '1', pix = '';
                    const mQtd = nome.match(/\s*\(([^)]+)\)$/);
                    if (mQtd) { qtd = mQtd[1]; nome = nome.replace(/\s*\(([^)]+)\)$/, '').trim(); }
                    const mPix = nome.match(/\s*\[Pix:\s*([^\]]+)\]$/);
                    if (mPix) { pix = mPix[1]; nome = nome.replace(/\s*\[Pix:\s*([^\]]+)\]$/, '').trim(); }
                    if (!nome) return;
                    const qtdTexto = String(qtd || '1').trim() === '1' ? '' : ` ${qtd}`;
                    equipsToShow.push(nome + qtdTexto + (pix ? ' Pix ' + pix : ''));
                });
                return equipsToShow.join(', ');
            })() }
        ].filter(item => item.valor);

        const clienteBloco = blocos.find(b => b.titulo === 'Cliente');
        const demais = blocos.filter(b => b.titulo !== 'Cliente');

        resumo.innerHTML =
            (clienteBloco ? `<div style="background:rgba(255,235,59,0.12); border:2px solid #ffeb3b; border-radius:10px; padding:10px 14px; margin-bottom:10px; text-align:center;">
                <div style="font-size:11px; color:#ffeb3b; font-weight:bold; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px;">Cliente</div>
                <div style="font-size:20px; font-weight:bold; color:#fff; line-height:1.3;">${escaparHtml(clienteBloco.valor)}</div>
            </div>` : '') +
            demais.map(item => `<div class="dado"><b>${escaparHtml(item.titulo)}:</b> ${escaparHtml(item.valor)}</div>`).join('');
    }

    function renderizarFotosCliente(cliente, atendimentos = []) {
        const lista = document.getElementById('listaFotosCliente');
        const vazio = document.getElementById('semFotosCliente');
        if (!lista || !vazio) return;

        const fotos = obterFotosClienteReferencia(cliente, atendimentos);
        fotosClienteReferenciaAtuais = fotos;
        lista.innerHTML = "";

        if (fotos.length === 0) {
            vazio.style.display = 'block';
            return;
        }

        vazio.style.display = 'none';
        fotos.forEach((foto) => {
            const bloco = document.createElement('div');
            bloco.className = 'foto-cliente';
            bloco.innerHTML = `
                <div class="foto-cliente-titulo">${escaparHtml(foto.titulo)}</div>
                <img src="${escaparHtml(foto.url)}" alt="${escaparHtml(foto.titulo)}">
            `;
            lista.appendChild(bloco);
        });
    }

    window.abrirModalFoto = function(inputId) {
        currentFileInputId = inputId;
        document.getElementById('modalFotoManutencao').style.display = 'flex';
    };

    function fecharModalFoto() {
        document.getElementById('modalFotoManutencao').style.display = 'none';
        currentFileInputId = null;
    }

    document.getElementById('btnCameraFotoManutencao').addEventListener('click', () => {
        if (!currentFileInputId) return;
        const input = document.getElementById(currentFileInputId);
        input?.setAttribute('capture', 'environment');
        input?.click();
        fecharModalFoto();
    });

    document.getElementById('btnGaleriaFotoManutencao').addEventListener('click', () => {
        if (!currentFileInputId) return;
        const input = document.getElementById(currentFileInputId);
        input?.removeAttribute('capture');
        input?.click();
        fecharModalFoto();
    });

    document.getElementById('btnCancelarModalFotoManutencao').addEventListener('click', fecharModalFoto);
    document.getElementById('modalFotoManutencao').addEventListener('click', (e) => {
        if (e.target.id === 'modalFotoManutencao') {
            fecharModalFoto();
        }
    });

    function definirPreviewFoto(imgId, textoId, src) {
        const imgEl = document.getElementById(imgId);
        const textoEl = document.getElementById(textoId);
        if (!imgEl) return;

        imgEl.src = src;
        imgEl.style.display = 'block';
        if (textoEl) {
            textoEl.style.display = 'none';
        }
    }

    window.mostrarPreview = function(input, imgId, textoId) {
        if (!(input.files && input.files[0])) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const imgObj = new Image();
            imgObj.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1600;
                const MAX_HEIGHT = 1600;
                let width = imgObj.width;
                let height = imgObj.height;

                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(imgObj, 0, 0, width, height);
                definirPreviewFoto(imgId, textoId, canvas.toDataURL('image/jpeg', 0.8));
            };
            imgObj.src = e.target.result;
        };

        reader.readAsDataURL(input.files[0]);
    };

    async function carregarCliente() {
        const status = document.getElementById('statusCarregando');
        const conteudo = document.getElementById('conteudoManutencao');
        const clienteId = obterClienteIdDaUrl();

        if (!clienteId) {
            await window.playAlert("Cliente nao informado para a manutencao.");
            voltarParaClientes();
            return;
        }

        try {
            const [clientes, atendimentos] = await Promise.all([
                dbListarClientes(),
                dbListarAtendimentos()
            ]);
            clienteAtual = clientes.find(cliente => String(cliente.firebaseUrl || "") === clienteId) || null;

            if (!clienteAtual) {
                throw new Error("Cliente nao encontrado.");
            }

            renderizarResumoCliente(clienteAtual);
            renderizarFotosCliente(clienteAtual, atendimentos);
            atualizarTotalDevolucaoPix();
            aplicarVisibilidadeDevolucaoPix();
            status.style.display = 'none';
            conteudo.style.display = 'block';
        } catch (error) {
            status.innerHTML = `
                <div class="card-titulo">Erro</div>
                <div class="sem-fotos">${escaparHtml(error?.message || "Nao foi possivel carregar o cliente.")}</div>
            `;
        }
    }

    async function validarFormulario() {
        if (!clienteAtual) {
            await window.playAlert("Carregue um cliente antes de salvar.");
            return false;
        }

        const tipo = document.getElementById('tipoManutencao');
        const observacoes = document.getElementById('observacoesManutencao');
        const img = document.getElementById('imgPreviewManutencao');

        if (!String(tipo.value || "").trim()) {
            await window.playAlert("Selecione o tipo da ação.");
            tipo.focus();
            return false;
        }

        if (!String(observacoes.value || "").trim()) {
            await window.playAlert("Preencha as observações do que deve ser feito.");
            observacoes.focus();
            return false;
        }

        const fotoOk = img && img.style.display === 'block' && !!img.src;
        if (!fotoOk) {
            await window.playAlert("Adicione a foto da solicitação.");
            return false;
        }

        return true;
    }

    async function salvarManutencao() {
        const btn = document.getElementById('btnSalvar');
        const tipo = document.getElementById('tipoManutencao');
        const observacoes = document.getElementById('observacoesManutencao');
        const img = document.getElementById('imgPreviewManutencao');

        if (!(await validarFormulario())) return;

        const confirmado = await window.playConfirm("Deseja confirmar o registro desta manutencao?", {
            secondaryLabel: "Sim",
            secondaryResult: true,
            primaryLabel: "Nao",
            primaryResult: false,
            overlayResult: false
        });
        if (!confirmado) return;

        btn.innerText = "Enviando...";
        btn.style.pointerEvents = "none";

        try {
            let fotoSolicitacao = "";
            let fotoSolicitacaoThumb = "";
            if (img && img.src) {
                if (img.src.startsWith('data:')) {
                    const r = await storageSalvarFotoComThumb(img.src, 'manutencoes');
                    fotoSolicitacao = r.url;
                    fotoSolicitacaoThumb = r.thumbUrl;
                } else if (img.src.startsWith('http') && !img.src.includes('.html')) {
                    fotoSolicitacao = img.src;
                    fotoSolicitacaoThumb = img.src;
                }
            }

            const manutencao = {
                clienteId: clienteAtual.firebaseUrl || "",
                clienteNumero: clienteAtual.numero || "",
                clienteNome: clienteAtual.nome || "",
                clienteCidade: clienteAtual.cidade || "",
                clienteRota: clienteAtual.rota || "",
                clienteEndereco: clienteAtual.endereco || "",
                clienteEquip: clienteAtual.equip || "",
                tipoAcao: String(tipo.value || "").trim(),
                observacoes: String(observacoes.value || "").trim(),
                fotoSolicitacao,
                fotoSolicitacaoThumb,
                fotosClienteReferencia: fotosClienteReferenciaAtuais,
                status: "pendente",
                cadastradoPor: localStorage.getItem('usuarioLogado') || "",
                dataRegistro: new Date().toISOString()
            };

            await dbSalvarManutencao(manutencao);
            await window.playAlert("Manutencao salva com sucesso!");
            voltarParaClientes();
        } catch (error) {
            await window.playAlert(error?.message || "Nao foi possivel salvar a manutencao.");
        } finally {
            btn.innerText = "Enviar Solicitação";
            btn.style.pointerEvents = "auto";
        }
    }

    async function salvarDevolucaoPixCliente() {
        if (!clienteAtual?.firebaseUrl) {
            await window.playAlert("Cliente nao carregado para salvar a devolucao.");
            return;
        }

        const input = document.getElementById('modalPixValorInput');
        const btn = document.getElementById('btnEnviarDevolucaoPix');
        const valorInformado = parseValorInteiroComSinal(input?.value || "");

        if (valorInformado === 0) {
            await window.playAlert("Informe o valor da devolucao.");
            input?.focus();
            return;
        }

        const totalAtual = parseValorInteiro(clienteAtual.devolucao || 0);
        const novoTotal = totalAtual + valorInformado;

        try {
            btn.innerText = "Enviando...";
            btn.style.pointerEvents = "none";
            await dbSalvarCliente({ devolucao: novoTotal }, clienteAtual.firebaseUrl);
            clienteAtual.devolucao = novoTotal;
            if (input) input.value = "";
            atualizarTotalDevolucaoPix();
            await window.playAlert("Devolucao Pix salva com sucesso!");
            voltarParaClientes();
        } catch (error) {
            await window.playAlert(error?.message || "Nao foi possivel salvar a devolucao Pix.");
        } finally {
            btn.innerText = "Enviar Devolu\u00e7\u00e3o";
            btn.style.pointerEvents = "auto";
        }
    }

    document.getElementById('btnPixDev').addEventListener('click', () => {
        if (!usuarioPodeDevolverPix) return;
        atualizarTotalDevolucaoPix();
        document.getElementById('modalPixOverlay').classList.add('aberto');
    });
    document.getElementById('btnFecharModalPix').addEventListener('click', () => {
        document.getElementById('modalPixOverlay').classList.remove('aberto');
    });
    document.getElementById('modalPixOverlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modalPixOverlay'))
            document.getElementById('modalPixOverlay').classList.remove('aberto');
    });

    document.getElementById('btnSalvar').addEventListener('click', salvarManutencao);
    document.getElementById('btnEnviarDevolucaoPix').addEventListener('click', salvarDevolucaoPixCliente);
    document.getElementById('btnHomeTopo').addEventListener('click', () => {
        window.location.href = 'index.html';
    });
    document.getElementById('btnHomeTopo').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            window.location.href = 'index.html';
        }
    });

    // Trava o botão voltar do navegador
    function travarVoltar() {
        history.pushState(null, null, window.location.href);
    }

    window.addEventListener('load', travarVoltar);
    window.addEventListener('click', function _trava() {
        travarVoltar();
        window.removeEventListener('click', _trava);
    });

    window.addEventListener('popstate', async function() {
        travarVoltar();

        const dialogRoot = document.getElementById('play-dialogs-root');
        if (dialogRoot && dialogRoot.style.display === 'flex') {
            dialogRoot.click();
            return;
        }

        const confirmar = await window.playConfirm("Se sair perderá as informações não enviadas. Deseja sair?", {
            secondaryLabel: "Sim",
            secondaryResult: true,
            primaryLabel: "Não",
            primaryResult: false,
            overlayResult: false
        });

        if (confirmar) voltarParaClientes();
    });

    aplicarPermissaoDevolucaoPix();
    carregarCliente();
</script>
