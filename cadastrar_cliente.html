<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Cliente - Play na Web</title>
    
    <style>
        body { margin:0; font-family:Arial; background:#0f2a66; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:420px; padding:20px; box-sizing: border-box; }
        
        /* Estilo padrão para todas as caixas de entrada e áreas de texto */
        input, textarea, select { 
            width:100%; padding:10px; margin-bottom:10px; border-radius:8px; 
            border:none; font-size:16px; box-sizing: border-box; 
        }
        select { background: white; color: #333; outline: none; }
        
        /* Estilo do botão azul */
        .botao { 
            background:#4467a8; padding:12px; text-align:center; 
            border-radius:30px; font-weight:bold; cursor:pointer; margin-top:10px; 
        }

        /* Bloqueio de seleção de texto (para evitar que o usuário selecione sem querer ao clicar rápido) */
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        .copiar { -webkit-user-select: text !important; user-select: text !important; }

        /* Alinhamento para os equipamentos ficarem lado a lado (Equip + Qtd) */
        .equip-group { display: flex; gap: 8px; margin-bottom: 8px; }
        .campo-cidade {
            background: #b8c0d1;
            color: #1f2f57;
            border: 1px solid rgba(255,255,255,0.35);
        }
        .campo-cidade::placeholder {
            color: rgba(31,47,87,0.7);
        }
        .campo-cidade:disabled {
            opacity: 1;
            cursor: not-allowed;
        }
        .linha-endereco {
            display: flex;
            gap: 8px;
            align-items: stretch;
            margin-bottom: 10px;
        }
        .linha-endereco #endereco {
            width: auto;
            flex: 1;
            min-width: 0;
            margin-bottom: 0;
        }
        .btn-mapa-endereco {
            width: 52px;
            min-width: 52px;
            border: none;
            border-radius: 8px;
            background: #4467a8;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0;
        }
        .btn-acao-endereco {
            width: 44px;
            min-width: 44px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.16);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0;
            padding: 0;
        }
        .btn-mapa-endereco,
        .btn-acao-endereco {
            transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        .btn-limpar-endereco {
            background: rgba(255,255,255,0.12);
            font-size: 18px;
        }
        .btn-mapa-endereco:active,
        .btn-acao-endereco:active,
        .btn-mapa-endereco.is-busy,
        .btn-acao-endereco.is-busy {
            transform: scale(0.94);
            filter: brightness(1.12);
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18);
        }
        .btn-mapa-endereco.is-busy,
        .btn-acao-endereco.is-busy {
            animation: pulsoBotaoEndereco 0.85s ease-in-out infinite alternate;
        }
        .btn-acao-endereco:disabled,
        .btn-mapa-endereco:disabled {
            cursor: not-allowed;
        }
        .btn-mapa-endereco .icone-mapa,
        .btn-mapa-endereco .spinner-mapa {
            transition: opacity 0.2s ease;
        }
        .btn-mapa-endereco img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }
        .spinner-mapa {
            display: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.28);
            border-top-color: white;
            animation: girarSpinnerMapa 0.75s linear infinite;
        }
        .btn-mapa-endereco.is-busy .icone-mapa {
            display: none;
        }
        .btn-mapa-endereco.is-busy .spinner-mapa {
            display: block;
        }
        @keyframes pulsoBotaoEndereco {
            from {
                filter: brightness(1);
            }
            to {
                filter: brightness(1.18);
            }
        }
        @keyframes girarSpinnerMapa {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        .card-fotos-instalacao {
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 15px;
            margin-top: 12px;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.2);
        }
        .titulo-fotos-instalacao {
            text-align: center;
            font-weight: bold;
            color: #ffeb3b;
            margin-bottom: 12px;
            font-size: 17px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sub-card-foto {
            margin-left: -15px;
            margin-right: -15px;
            border-top: 4px solid rgba(255,255,255,0.36);
            padding: 15px 15px 0;
        }
        .sub-card-foto:first-of-type {
            margin-top: -4px;
        }
        .titulo-sub-foto {
            font-size: 15px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
            text-align: center;
        }
        .area-foto {
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
        }
        .preview-img {
            width: 100%;
            max-height: 280px;
            object-fit: contain;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
        }
        .sem-fotos-maquinas {
            display: none;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0f2a66;
            padding: 24px;
            border-radius: 12px;
            border: 2px solid #ffeb3b;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .modal-content button {
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .modal-content button:active {
            transform: scale(0.97);
        }
        .modal-btn-icone {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .modal-btn-icone svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        #btnCameraFotoCliente {
            background: #4467a8;
            color: white;
        }
        #btnGaleriaFotoCliente {
            background: #4caf50;
            color: white;
        }
        .btn-cancelar-modal {
            background: transparent;
            border: 1px solid #f44336 !important;
            color: #f44336;
        }
        .alerta-play-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.72);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            padding: 20px;
            box-sizing: border-box;
        }
        .alerta-play-box {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(180deg, #173d8f 0%, #0f2a66 100%);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.38);
            overflow: hidden;
        }
        .alerta-play-topo {
            padding: 16px 18px 10px;
            font-size: 18px;
            font-weight: bold;
            color: #ffeb3b;
            text-align: center;
        }
        .alerta-play-msg {
            padding: 0 18px 18px;
            color: white;
            font-size: 15px;
            line-height: 1.45;
            text-align: center;
            white-space: pre-line;
        }
        .alerta-play-acoes {
            padding: 0 18px 18px;
        }
        .alerta-play-btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            background: #ffeb3b;
            color: #0f2a66;
            font-weight: bold;
            font-size: 15px;
            padding: 13px 14px;
            cursor: pointer;
        }
        .alerta-play-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div id="alertaPlayOverlay" class="alerta-play-overlay">

<script type="module">
    // Importamos as ferramentas de banco de dados do seu arquivo externo
    import { dbSalvarCliente, dbListarClientes, dbEscutarClientes, dbEscutarEstoque, dbEscutarColaboradores, storageSalvarFoto } from './database.js';

    let maquinasDisponiveis = [];
    let clientesCadastrados = [];
    let perfilUsuarioLogado = "";
    let nomeUsuarioLogado = localStorage.getItem('usuarioLogado') || "";
    let clienteEmEdicao = null;
    let perfilCarregado = false;
    let editId = "";
    let currentFileInputId = null;
    let proximoEquipamentoRowId = 0;
    let ultimoElementoFocadoAntesDoAlerta = null;
    let elementoParaFocarDepoisDoAlerta = null;

    function normalizarTexto(valor) {
        return String(valor || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .trim();
    }

    function escaparHtml(valor) {
        return String(valor || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function criarRowIdEquipamento(rowIdExistente = "") {
        const numeroExistente = parseInt(String(rowIdExistente || "").replace(/\D/g, ""), 10);
        if (!Number.isNaN(numeroExistente) && numeroExistente > proximoEquipamentoRowId) {
            proximoEquipamentoRowId = numeroExistente;
        }

        if (rowIdExistente) return String(rowIdExistente);

        proximoEquipamentoRowId += 1;
        return `equip_${proximoEquipamentoRowId}`;
    }

    function elementoEhCampoDigitavel(elemento) {
        const tagName = elemento?.tagName || "";
        const type = String(elemento?.type || "").toLowerCase();
        return tagName === 'TEXTAREA'
            || (tagName === 'INPUT' && !['button', 'submit', 'reset', 'checkbox', 'radio', 'file', 'color', 'range'].includes(type))
            || !!elemento?.isContentEditable;
    }

    function focarAposFecharAlerta() {
        const elemento = elementoParaFocarDepoisDoAlerta;
        elementoParaFocarDepoisDoAlerta = null;
        if (!elemento || typeof elemento.focus !== 'function') return;

        window.setTimeout(() => {
            try {
                elemento.focus();
            } catch (_) {}
        }, 0);
    }

    function fecharAlertaPlay() {
        const overlay = document.getElementById('alertaPlayOverlay');
        if (!overlay) return;

        overlay.style.display = 'none';
        document.body.style.overflow = '';
        const eraCampoDigitavel = elementoEhCampoDigitavel(ultimoElementoFocadoAntesDoAlerta);
        if (elementoParaFocarDepoisDoAlerta) {
            focarAposFecharAlerta();
        } else if (!eraCampoDigitavel && ultimoElementoFocadoAntesDoAlerta && typeof ultimoElementoFocadoAntesDoAlerta.focus === 'function') {
            ultimoElementoFocadoAntesDoAlerta.focus();
        }
        ultimoElementoFocadoAntesDoAlerta = null;
    }

    function mostrarAlertaPlay(mensagem, elementoParaFocar = null) {
        const overlay = document.getElementById('alertaPlayOverlay');
        const msg = document.getElementById('alertaPlayMensagem');
        if (!overlay || !msg) return;

        ultimoElementoFocadoAntesDoAlerta = document.activeElement instanceof HTMLElement ? document.activeElement : null;
        elementoParaFocarDepoisDoAlerta = elementoParaFocar instanceof HTMLElement ? elementoParaFocar : null;
        if (ultimoElementoFocadoAntesDoAlerta && typeof ultimoElementoFocadoAntesDoAlerta.blur === 'function') {
            ultimoElementoFocadoAntesDoAlerta.blur();
        }
        msg.textContent = String(mensagem || "");
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        document.getElementById('alertaPlayOk')?.focus();
    }

    window.alert = function(mensagem) {
        mostrarAlertaPlay(mensagem);
    };
    document.getElementById('alertaPlayOk').addEventListener('click', fecharAlertaPlay);
    document.getElementById('alertaPlayOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'alertaPlayOverlay') {
            fecharAlertaPlay();
        }
    });

    function obterDataLocalIso(data) {
        const base = data ? new Date(data) : new Date();
        if (Number.isNaN(base.getTime())) return "";
        const ano = base.getFullYear();
        const mes = String(base.getMonth() + 1).padStart(2, "0");
        const dia = String(base.getDate()).padStart(2, "0");
        return `${ano}-${mes}-${dia}`;
    }

    function extrairCidadeBairroDoEndereco(endereco) {
        const texto = String(endereco || "").replace(/\s+/g, " ").trim();
        if (!texto) return "";

        const partes = texto.split(",").map(parte => parte.trim()).filter(Boolean);
        if (partes.length === 0) return "";

        let cidade = "";
        let indiceCidade = -1;

        for (let i = partes.length - 1; i >= 0; i--) {
            const trechoSemCep = partes[i].replace(/\b\d{5}-?\d{3}\b/g, "").trim();
            const matchCidade = trechoSemCep.match(/^(.+?)\s*-\s*([A-Z]{2})$/i);
            if (matchCidade) {
                cidade = matchCidade[1].trim();
                indiceCidade = i;
                break;
            }
        }

        if (!cidade || indiceCidade <= 0) {
            return "";
        }

        let bairroBase = partes[indiceCidade - 1].replace(/\b\d{5}-?\d{3}\b/g, "").trim();
        if (bairroBase.includes(" - ")) {
            const partesBairro = bairroBase.split(" - ").map(parte => parte.trim()).filter(Boolean);
            bairroBase = partesBairro[partesBairro.length - 1] || "";
        }

        if ((!bairroBase || /^\d+[A-Za-z-]*$/.test(bairroBase)) && indiceCidade > 1) {
            bairroBase = partes[indiceCidade - 2].replace(/\b\d{5}-?\d{3}\b/g, "").trim();
            if (bairroBase.includes(" - ")) {
                const partesBairro = bairroBase.split(" - ").map(parte => parte.trim()).filter(Boolean);
                bairroBase = partesBairro[partesBairro.length - 1] || "";
            }
        }

        const bairro = bairroBase.trim();
        return bairro ? `${cidade} - ${bairro}` : cidade;
    }

    window.abrirModalFoto = function(inputId) {
        currentFileInputId = inputId;
        document.getElementById('modalFotoCliente').style.display = 'flex';
    }

    function fecharModalFoto() {
        document.getElementById('modalFotoCliente').style.display = 'none';
        currentFileInputId = null;
    }

    document.getElementById('btnCameraFotoCliente').addEventListener('click', () => {
        if (!currentFileInputId) return;
        const input = document.getElementById(currentFileInputId);
        input?.setAttribute('capture', 'environment');
        input?.click();
        fecharModalFoto();
    });

    document.getElementById('btnGaleriaFotoCliente').addEventListener('click', () => {
        if (!currentFileInputId) return;
        const input = document.getElementById(currentFileInputId);
        input?.removeAttribute('capture');
        input?.click();
        fecharModalFoto();
    });

    document.getElementById('btnCancelarModalFotoCliente').addEventListener('click', fecharModalFoto);
    document.getElementById('modalFotoCliente').addEventListener('click', (e) => {
        if (e.target.id === 'modalFotoCliente') {
            fecharModalFoto();
        }
    });

    function definirPreviewFoto(imgId, textoId, src) {
        const imgEl = document.getElementById(imgId);
        const textoEl = document.getElementById(textoId);
        if (!imgEl) return;

        imgEl.src = src;
        imgEl.style.display = 'block';
        if (textoEl) {
            textoEl.style.display = 'none';
        }
    }

    window.mostrarPreview = function(input, imgId, textoId) {
        if (!(input.files && input.files[0])) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const imgObj = new Image();
            imgObj.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1600;
                const MAX_HEIGHT = 1600;
                let width = imgObj.width;
                let height = imgObj.height;

                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(imgObj, 0, 0, width, height);

                definirPreviewFoto(imgId, textoId, canvas.toDataURL('image/jpeg', 0.8));
            };
            imgObj.src = e.target.result;
        };

        reader.readAsDataURL(input.files[0]);
    }

    function enderecoContemLink(valor) {
        return /(https?:\/\/|www\.)/i.test(String(valor || "").trim());
    }

    function enderecoTemFormatoMaps(valor) {
        const texto = String(valor || "").replace(/\s+/g, " ").trim();
        if (!texto) return false;
        if (enderecoContemLink(texto)) return false;

        const partes = texto.split(",").map(parte => parte.trim()).filter(Boolean);
        if (partes.length < 3) return false;

        const temCidadeUf = partes.some(parte => /^.+\s-\s[A-Z]{2}$/i.test(parte));
        const primeiraParte = partes[0] || "";
        const temRua = /[A-Za-zÀ-ÿ]/.test(primeiraParte);

        return temCidadeUf && temRua;
    }

    function obterEquipamentosDetalhadosDoCliente(cliente) {
        if (Array.isArray(cliente?.equipDetalhes) && cliente.equipDetalhes.length > 0) {
            return cliente.equipDetalhes.map((item, index) => ({
                rowId: criarRowIdEquipamento(item?.rowId || `equip_${index + 1}`),
                nome: String(item?.nome || "").trim(),
                qtd: String(item?.qtd || item?.quantidade || "1").trim() || "1",
                pix: String(item?.pix || "").trim(),
                contador: String(item?.contador || "").trim()
            }));
        }

        if (!cliente?.equip) return [];

        return String(cliente.equip)
            .split(", ")
            .map((item, index) => {
                let nome = item;
                let qtd = "1";
                let pix = "";

                const regexQtd = /\s*\(([^)]+)\)$/;
                const matchQtd = nome.match(regexQtd);
                if (matchQtd) {
                    qtd = matchQtd[1];
                    nome = nome.replace(regexQtd, "");
                }

                const regexPix = /\s*\[Pix:\s*([^\]]+)\]$/;
                const matchPix = nome.match(regexPix);
                if (matchPix) {
                    pix = matchPix[1];
                    nome = nome.replace(regexPix, "");
                }

                return {
                    rowId: criarRowIdEquipamento(`equip_${index + 1}`),
                    nome: nome.trim(),
                    qtd: String(qtd || "1").trim() || "1",
                    pix: String(pix || "").trim(),
                    contador: ""
                };
            })
            .filter(item => item.nome);
    }

    function preencherCidadePelaLocalizacao(dados, forcar = true) {
        const inputCidade = document.getElementById("cidade");

        const endereco = dados?.address || {};
        const bairro = endereco.suburb || endereco.neighbourhood || endereco.quarter || endereco.city_district || "";
        const cidade = endereco.city || endereco.town || endereco.village || endereco.municipality || endereco.county || "";
        const cidadeBairro = [cidade, bairro].filter(Boolean).join(" - ").trim();

        if (!cidadeBairro) return false;

        const cidadeAtual = String(inputCidade.value || "").trim();
        const podeSobrescrever = !cidadeAtual || inputCidade.dataset.preenchidoAutomaticamente === "1" || forcar;
        if (!podeSobrescrever) return false;

        inputCidade.disabled = false;
        inputCidade.value = cidadeBairro;
        inputCidade.dataset.preenchidoAutomaticamente = "1";
        return true;
    }

    function montarEnderecoDaLocalizacao(dados) {
        const endereco = dados?.address || {};
        const rua = endereco.road || endereco.pedestrian || endereco.footway || endereco.path || "";
        const numero = endereco.house_number || "";
        const bairro = endereco.suburb || endereco.neighbourhood || endereco.quarter || endereco.city_district || "";
        const cidade = endereco.city || endereco.town || endereco.village || endereco.municipality || endereco.county || "";
        const estado = endereco.state_code || endereco.state || "";
        const cep = endereco.postcode || "";

        const primeiraParte = [rua, numero].filter(Boolean).join(", ");
        const segundaParte = bairro ? ` - ${bairro}` : "";
        const terceiraParte = [cidade, estado].filter(Boolean).join(" - ");
        const partesFinais = [primeiraParte + segundaParte, terceiraParte, cep].filter(Boolean);

        return partesFinais.join(", ").trim();
    }

    async function buscarEnderecoPorCoordenadas(latitude, longitude) {
        const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(latitude)}&lon=${encodeURIComponent(longitude)}&addressdetails=1&accept-language=pt-BR`;
        const resposta = await fetch(url, {
            headers: {
                "Accept": "application/json"
            }
        });

        if (!resposta.ok) {
            throw new Error("Nao foi possivel consultar o endereco da sua localizacao.");
        }

        return resposta.json();
    }

    window.abrirMapaEndereco = async function() {
        if (!navigator.geolocation) {
            alert("Seu aparelho ou navegador nao permite usar localizacao.");
            return;
        }

        const hostSeguroLocal = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        if (!window.isSecureContext && !hostSeguroLocal) {
            alert("No celular, a localizacao do navegador normalmente so funciona em HTTPS. Abra esta pagina em HTTPS para preencher o endereco automaticamente.");
            return;
        }

        definirEstadoBotaoMapa(true);

        try {
            const posicao = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                });
            });

            const { latitude, longitude } = posicao.coords;
            const dadosLocalizacao = await buscarEnderecoPorCoordenadas(latitude, longitude);
            const enderecoAtual = montarEnderecoDaLocalizacao(dadosLocalizacao) || String(dadosLocalizacao?.display_name || "").trim();

            if (!enderecoAtual) {
                throw new Error("Nao foi possivel identificar um endereco para a localizacao atual.");
            }

            aplicarEnderecoNoFormulario(enderecoAtual, "gps");
            if (!preencherCidadePelaLocalizacao(dadosLocalizacao, true)) {
                preencherCidadePeloEndereco(true);
            }
        } catch (erro) {
            if (erro?.code === 1) {
                alert("Permita a localizacao no navegador. Se estiver no celular, confirme tambem que a pagina foi aberta em HTTPS e que o navegador tem permissao de localizacao.");
            } else if (erro?.code === 2) {
                alert("Nao foi possivel obter sua localizacao atual.");
            } else if (erro?.code === 3) {
                alert("A localizacao demorou demais para responder. Tente novamente.");
            } else {
                alert(erro?.message || "Nao foi possivel preencher o endereco pela localizacao.");
            }
        } finally {
            definirEstadoBotaoMapa(false);
        }
    }

    function validarCamposObrigatorios() {
        const camposObrigatorios = [
            { id: "ponto_aberto", nome: "Ponto Aberto por" },
            { id: "nome", nome: "Nome do cliente" },
            { id: "comissao", nome: "Comissão" },
            { id: "endereco", nome: "Endereço" },
            { id: "cidade", nome: "Cidade" },
            { id: "rota", nome: "Rota" }
        ];

        for (const campo of camposObrigatorios) {
            const input = document.getElementById(campo.id);
            if (!input || String(input.value || "").trim() !== "") continue;

            mostrarAlertaPlay(`Preencha o campo ${campo.nome}.`, input);
            return false;
        }

        const inputEndereco = document.getElementById("endereco");
        const enderecoAtual = String(inputEndereco?.value || "").trim();
        const origemEndereco = inputEndereco?.dataset.origemEndereco || "";
        const enderecoInicial = String(inputEndereco?.dataset.enderecoInicial || "").trim();
        const enderecoLegadoMantido = !!editId && origemEndereco === "legado" && enderecoAtual === enderecoInicial;
        const enderecoValido = origemEndereco === "gps" || enderecoTemFormatoMaps(enderecoAtual) || enderecoLegadoMantido;

        if (!enderecoValido) {
            mostrarAlertaPlay("Use a localizacao ou cole um endereco copiado do Google Maps no campo Endereco.", inputEndereco);
            return false;
        }

        const diasSelecionados = Array.from(document.querySelectorAll(".dias:checked"));
        if (diasSelecionados.length < 2) {
            alert("Selecione pelo menos 2 dias em Dias aberto.");
            return false;
        }

        const linhasEquipamento = Array.from(document.querySelectorAll('.equip-group'));
        const linhasPreenchidas = linhasEquipamento
            .map(grupo => ({
                grupo,
                maquina: grupo.querySelector('.equip-select')?.value.trim() || "",
                qtd: grupo.querySelector('.qtd-input')?.value.trim() || "",
                pix: grupo.querySelector('.pix-input')?.value.trim() || "",
                contador: grupo.querySelector('.contador-input')?.value.trim() || ""
            }))
            .filter(item => item.maquina || item.qtd || item.pix || item.contador);

        if (linhasPreenchidas.length === 0) {
            mostrarAlertaPlay("Preencha pelo menos 1 equipamento com máquina e quantidade.", linhasEquipamento[0]?.querySelector('.equip-select'));
            return false;
        }

        const linhaIncompleta = linhasPreenchidas.find(item => !item.maquina || !item.qtd);
        if (linhaIncompleta) {
            mostrarAlertaPlay("Complete máquina e quantidade em todos os equipamentos preenchidos.", linhaIncompleta.grupo.querySelector('.equip-select'));
            return false;
        }

        const linhaPixSemContador = linhasPreenchidas.find(item => item.pix && !item.contador);
        if (linhaPixSemContador) {
            mostrarAlertaPlay("Se preencher o Pix, informe também o contador da mesma máquina.", linhaPixSemContador.grupo.querySelector('.contador-input'));
            return false;
        }

        const linhaContadorSemPix = linhasPreenchidas.find(item => item.contador && !item.pix);
        if (linhaContadorSemPix) {
            mostrarAlertaPlay("O contador só pode ser informado quando o campo Pix estiver preenchido.", linhaContadorSemPix.grupo.querySelector('.pix-input'));
            return false;
        }

        return true;
    }

    function extrairPixDoEquipamento(equipTexto) {
        if (!equipTexto) return [];
        return String(equipTexto)
            .split(", ")
            .map(item => {
                const matchPix = item.match(/\[Pix:\s*([^\]]+)\]/i);

    function encontrarConflitoPix(pix, inputAtual = null) {
        const pixNormalizado = String(pix || "").trim();
        if (!pixNormalizado) return null;

        const pixJaDigitadosNaTela = Array.from(document.querySelectorAll('.pix-input'))
            .filter(input => input !== inputAtual)
            .map(input => String(input.value || "").trim())
            .filter(Boolean);

        if (pixJaDigitadosNaTela.includes(pixNormalizado)) {
            return { tipo: 'formulario' };
        }

        return clientesCadastrados.find(cliente => {
            if (editId && cliente.firebaseUrl && cliente.firebaseUrl.includes(editId)) {
                return false;
            }
            return extrairPixDoEquipamento(cliente.equip).includes(pixNormalizado);
        }) || null;
    }

    function validarPixInput(input, exibirAlerta = true) {
        if (!input) return true;

        const pix = String(input.value || "").trim();
        if (!pix) return !input.dataset.pixRemovidoPorDuplicidade;

        const conflito = encontrarConflitoPix(pix, input);
        if (!conflito) {
            delete input.dataset.pixRemovidoPorDuplicidade;
            return true;
        }

        input.value = "";
        input.dataset.pixRemovidoPorDuplicidade = "1";

        if (exibirAlerta) {
            const mensagem = conflito.tipo === 'formulario'
                ? `O numero Pix ${pix} ja foi informado em outra maquina deste cadastro.`
                : `Ja existe um cliente com o numero Pix ${pix} cadastrado.`;
            mostrarAlertaPlay(mensagem, input);
        }

        return false;
    }

        for (const input of inputsPix) {

                return false;
            }
        }
        return true;
    }

        perfilUsuarioLogado = String(usuarioAtual?.nivel_completo || "");
        perfilCarregado = true;
        if (editId && clienteEmEdicao && !usuarioPodeEditarCliente(clienteEmEdicao)) {
            bloquearEdicaoSemPermissao();
        }
    });

    // --- CARREGAR MÁQUINAS ---
    dbEscutarClientes((lista) => {
        clientesCadastrados = lista;
    });

    dbEscutarEstoque((lista) => {
        maquinasDisponiveis = lista.filter(item => item.categoria === 'maquina');
        
        // Atualiza os selects existentes que estiverem na tela
        document.querySelectorAll('.equip-select').forEach(select => {
            const valorAtual = select.value || select.getAttribute('data-value');
            select.innerHTML = '<option value="">Selecione a máquina...</option>';
            maquinasDisponiveis.forEach(m => {
                const option = document.createElement('option');
                option.value = m.nome;
                option.textContent = m.nome;
                if (m.nome === valorAtual) option.selected = true;
                select.appendChild(option);
            });
        });
    });

    window.adicionarLinhaEquipamento = function(nome = "", pix = "", qtd = "", contador = "", rowId = "") {
        const container = document.getElementById('container-equipamentos');
        const novoGrupo = document.createElement('div');
        novoGrupo.className = 'equip-group';
        novoGrupo.dataset.equipRowId = criarRowIdEquipamento(rowId);
        
        let options = '<option value="">Selecione a máquina...</option>';
        maquinasDisponiveis.forEach(m => {
            options += `<option value="${m.nome}" ${m.nome === nome ? 'selected' : ''}>${m.nome}</option>`;
        });

        novoGrupo.innerHTML = `
            <select class="equip-select" style="flex: 4.4; margin-bottom:0;" data-value="${nome}">
                ${options}
            </select>
            <input class="qtd-input" value="${qtd}" placeholder="Qtd" inputmode="numeric" maxlength="3" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 3);" style="flex: 1.1; margin-bottom:0; border: 2px solid #2196f3; text-align: center; padding: 10px 5px;">
            <input class="pix-input" value="${pix}" placeholder="Pix" inputmode="numeric" maxlength="3" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 3);" style="flex: 1.2; margin-bottom:0; border: 2px solid #4caf50; text-align: center; padding: 10px 5px;">
            <input class="contador-input" value="${contador}" placeholder="Cont." inputmode="numeric" maxlength="6" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);" style="flex: 1.7; margin-bottom:0; border: 2px solid #ffeb3b; text-align: center; padding: 10px 5px;">
        `;
        container.appendChild(novoGrupo);
        normalizarLinhasEquipamento();
    }

    /* --- PARTE A: DETECTAR EDIÇÃO ---
       Verifica se o link termina com "?edit=ID". Se sim, muda o título e carrega os dados. */
    const urlParams = new URLSearchParams(window.location.search);
    editId = urlParams.get('edit');

    if (editId) {
        document.querySelector('h2').innerText = "Editar Cliente";
        carregarDadosCliente(editId);
    } else {
        adicionarLinhaEquipamento();
        renderizarFotosMaquinasInstalacao();
    }

    atualizarEstadoCampoCidade();

    /* --- PARTE B: CARREGAR DADOS NO FORMULÁRIO ---
       Puxa as informações do Firebase e coloca dentro das caixinhas (inputs) */
    document.getElementById('endereco').addEventListener('beforeinput', (e) => {
        if (e.inputType !== 'insertFromPaste') {
            e.preventDefault();
        }
    });

    document.getElementById('endereco').addEventListener('blur', () => {
        if (!validarEnderecoSemLink(true)) return;
        atualizarEstadoCampoCidade();
        preencherCidadePeloEndereco(false);
    });

    document.getElementById('endereco').addEventListener('change', () => {
        if (!validarEnderecoSemLink(true)) return;
        atualizarEstadoCampoCidade();
        preencherCidadePeloEndereco(false);
    });

    document.getElementById('endereco').addEventListener('paste', (e) => {
        const textoColado = e.clipboardData?.getData('text') || "";
        e.preventDefault();
        processarTextoColadoEndereco(textoColado, true);
    });

    document.getElementById('cidade').addEventListener('input', () => {
        delete document.getElementById('cidade').dataset.preenchidoAutomaticamente;
    });

    async function carregarDadosCliente(id) {
        try {
            const clientes = await dbListarClientes();
            const cliente = clientes.find(c => c.firebaseUrl.includes(id));

            if (cliente) {
                clienteEmEdicao = cliente;
                if (perfilCarregado && !usuarioPodeEditarCliente(cliente)) {
                    bloquearEdicaoSemPermissao();
                    return;
                }

                document.getElementById("ponto_aberto").value = cliente.ponto_aberto || "";
                document.getElementById("nome").value = cliente.nome || "";
                document.getElementById("comissao").value = cliente.comissao || "";
                document.getElementById("endereco").value = cliente.endereco || "";
                document.getElementById("endereco").dataset.enderecoInicial = cliente.endereco || "";
                document.getElementById("endereco").dataset.origemEndereco = enderecoTemFormatoMaps(cliente.endereco || "") ? "maps" : "legado";
                atualizarEstadoCampoCidade();
                document.getElementById("cidade").value = cliente.cidade || "";
                document.getElementById("rota").value = cliente.rota || "";
                document.getElementById("obs").value = cliente.obs || "";

                // Especial: Recria as linhas de equipamentos baseadas no texto salvo
                const equipamentosDetalhados = obterEquipamentosDetalhadosDoCliente(cliente);
                if (equipamentosDetalhados.length > 0) {
                    const container = document.getElementById('container-equipamentos');
                    container.innerHTML = ""; // Limpa os campos padrão
                    
                    equipamentosDetalhados.forEach((item) => {
                        adicionarLinhaEquipamento(item.nome, item.pix, item.qtd, item.contador, item.rowId);
                    });
                    adicionarLinhaEquipamento(); // Adiciona uma linha vazia no final
                } else {
                    if (document.getElementById('container-equipamentos').children.length === 0) {
                        adicionarLinhaEquipamento();
                    }
                }

                const fotoFichaInstalacao = cliente.fotoFichaInstalacao || cliente.fotosInstalacao?.ficha || "";
                if (fotoFichaInstalacao) {
                    definirPreviewFoto('imgPreviewFichaInstalacao', 'textoFotoFichaInstalacao', fotoFichaInstalacao);
                }

                renderizarFotosMaquinasInstalacao(cliente.fotosMaquinasInstalacao || []);

                // Especial: Marca os quadradinhos (checkboxes) dos dias
                if (cliente.aberto) {
                    const diasSalvos = cliente.aberto.split(", ");
                    document.querySelectorAll(".dias").forEach(caixa => {
                        if (diasSalvos.includes(caixa.value)) caixa.checked = true;
                    });
                }
            }
        } catch (e) { console.error("Erro ao carregar:", e); }
    }

    /* --- PARTE C: EQUIPAMENTOS DINÂMICOS ---
       Sempre que o usuário seleciona uma máquina na última linha, cria uma nova abaixo. */
    document.getElementById('container-equipamentos').addEventListener('change', (e) => {
        if (e.target.classList.contains('equip-select')) {
            const grupoAtual = e.target.closest('.equip-group');
            if (!e.target.value) {
                limparCamposLinhaEquipamento(grupoAtual);
            }

            const grupos = document.querySelectorAll('.equip-group');
            const ultimoSelect = grupos[grupos.length - 1].querySelector('.equip-select');

            if (e.target === ultimoSelect && e.target.value !== "") {
                adicionarLinhaEquipamento();
            }

            normalizarLinhasEquipamento();
            renderizarFotosMaquinasInstalacao();
        }
    });

    /* --- PARTE D: AÇÃO DE SALVAR ---
       Coleta tudo e decide: É um cliente NOVO ou uma ATUALIZAÇÃO de um antigo? */
    document.getElementById('container-equipamentos').addEventListener('focusout', (e) => {
        if (e.target.classList.contains('pix-input')) {
            validarPixInput(e.target, true);
        }
    });

    document.getElementById('container-equipamentos').addEventListener('input', (e) => {
        if (e.target.classList.contains('pix-input')) {
            delete e.target.dataset.pixRemovidoPorDuplicidade;
        }
    });

    document.getElementById('btnSalvar').onclick = async () => {
        const btn = document.getElementById('btnSalvar');
        btn.innerText = "Salvando...";
        btn.style.pointerEvents = "none";

        try {
            const clientes = await dbListarClientes();
            clientesCadastrados = clientes;

            if (!validarEnderecoSemLink(true)) {
                btn.innerText = "Salvar Cliente";
                btn.style.pointerEvents = "auto";
                return;
            }

            preencherCidadePeloEndereco(false);
            atualizarEstadoCampoCidade();

            if (!validarCamposObrigatorios()) {
                btn.innerText = "Salvar Cliente";
                btn.style.pointerEvents = "auto";
                return;
            }

            if (!validarTodosOsPixAntesDeSalvar()) {
                btn.innerText = "Salvar Cliente";
                btn.style.pointerEvents = "auto";
                return;
            }

            if (!validarFotosMaquinasInstalacaoObrigatorias()) {
                btn.innerText = "Salvar Cliente";
                btn.style.pointerEvents = "auto";
                return;
            }

            let numeroFinal;
            let idParaSalvar = editId || null; // Se editId existe, usamos ele para salvar por cima

            if (editId) {
                const clienteAtual = clientes.find(c => c.firebaseUrl.includes(editId));
                if (!clienteAtual) {
                    throw new Error("Cliente nÃ£o encontrado.");
                }
                clienteEmEdicao = clienteAtual;
                if (!usuarioPodeEditarCliente(clienteAtual)) {
                    throw new Error("VocÃª nÃ£o tem permissÃ£o para editar este cliente.");
                }
                numeroFinal = clienteAtual.numero;
            } else {
                // Lógica para achar o próximo número da lista (ex: 1, 2, 3...)
                let numeros = clientes.map(c => parseInt(c.numero)).sort((a,b)=>a-b);
                numeroFinal = 1;
                for(let n of numeros){
                    if(n === numeroFinal) numeroFinal++;
                    else if (n > numeroFinal) break;
                }
            }

            const equipamentosDetalhados = obterEquipamentosDetalhadosDoFormulario()
                .filter(item => item.nome)
                .map(item => ({
                    rowId: item.rowId,
                    nome: item.nome,
                    qtd: item.qtd || "1",
                    pix: item.pix,
                    contador: item.contador
                }));

            // Junta Nome + [Pix: x] + (Qtd) de todos os equipamentos preenchidos
            let listaEquipFinal = [];
            equipamentosDetalhados.forEach(item => {
                let str = item.nome;
                if (item.pix !== "") str += ` [Pix: ${item.pix}]`;
                str += ` (${item.qtd})`;
                listaEquipFinal.push(str);
            });

            const fotosMaquinasInstalacao = [];
            for (const equipamento of equipamentosDetalhados) {
                const img = document.getElementById(`imgPreviewMaquinaInstalacao_${equipamento.rowId}`);
                if (!(img && img.style.display === 'block' && img.src)) continue;

                let url = null;
                try {
                    if (img.src.startsWith('data:')) {
                        url = await storageSalvarFoto(img.src);
                    } else if (img.src.startsWith('http') && !img.src.includes('.html')) {
                        url = img.src;
                    }
                } catch (e) {
                    console.warn("Falha ao salvar foto da maquina instalada", e);
                }

                if (url) {
                    fotosMaquinasInstalacao.push({
                        rowId: equipamento.rowId,
                        nome: equipamento.nome,
                        url
                    });
                }
            }

            let fotoFichaInstalacao = "";
            const imgFichaInstalacao = document.getElementById('imgPreviewFichaInstalacao');
            if (imgFichaInstalacao && imgFichaInstalacao.style.display === 'block' && imgFichaInstalacao.src) {
                try {
                    if (imgFichaInstalacao.src.startsWith('data:')) {
                        fotoFichaInstalacao = await storageSalvarFoto(imgFichaInstalacao.src);
                    } else if (imgFichaInstalacao.src.startsWith('http') && !imgFichaInstalacao.src.includes('.html')) {
                        fotoFichaInstalacao = imgFichaInstalacao.src;
                    }
                } catch (e) {
                    console.warn("Falha ao salvar foto da ficha", e);
                }
            }

            const dias = Array.from(document.querySelectorAll(".dias:checked")).map(d => d.value);
            const dataCadastro = clienteEmEdicao?.dataCadastro || new Date().toISOString();
            const dataCadastroDia = clienteEmEdicao?.dataCadastroDia || obterDataLocalIso();
            const cadastradoPor = clienteEmEdicao?.cadastradoPor || nomeUsuarioLogado || "N/A";
            preencherCidadePeloEndereco(false);

            const dadosFinal = {
                numero: numeroFinal,
                ponto_aberto: document.getElementById("ponto_aberto").value,
                nome: document.getElementById("nome").value,
                cidade: document.getElementById("cidade").value,
                comissao: document.getElementById("comissao").value,
                rota: document.getElementById("rota").value,
                endereco: document.getElementById("endereco").value,
                aberto: dias.join(", "),
                equip: listaEquipFinal.join(", "), 
                equipDetalhes: equipamentosDetalhados,
                fotoFichaInstalacao,
                fotosMaquinasInstalacao,
                obs: document.getElementById("obs").value,
                cadastradoPor,
                dataCadastro,
                dataCadastroDia
            };

            await dbSalvarCliente(dadosFinal, idParaSalvar);
            window.location.href = "clientes.html";

        } catch (error) {
            alert("Erro: " + error.message);
            btn.innerText = "Salvar Cliente";
            btn.style.pointerEvents = "auto";
        }
    };

    document.getElementById('btnVoltar').onclick = () => window.location.href = "clientes.html";
</script>

<script>
    // COMISSÃO: Só deixa digitar números e limita a 2 dígitos
    function somenteNumero(campo){
        campo.value = campo.value.replace(/\D/g,'').substring(0,2);
    }
    function adicionarPorcentagem(campo){
        if(campo.value !== "" && !campo.value.includes("%")) campo.value += "%";
    }
    function removerPorcentagem(campo){
        campo.value = campo.value.replace("%","");
    }

    // ROTA: Só números e adiciona o prefixo "R." ao sair
    function somenteNumeroRota(campo){
        campo.value = campo.value.replace(/\D/g,'');
    }
    function adicionarRota(campo){
        if(campo.value !== "" && !campo.value.startsWith("R.")) {
            let valor = campo.value.padStart(2, '0');
            campo.value = "R." + valor;
        }
    }
    function removerRota(campo){
        campo.value = campo.value.replace("R.", "");
    }




/* ============================================================
   [LIMPEZA AUTOMÁTICA AO VOLTAR]
   Garante que o formulário esteja zerado sempre que a tela abrir,
   mesmo que o usuário tenha usado o botão "Voltar" do Android/iOS.
   ============================================================ */
window.addEventListener('pageshow', function(event) {
    // O 'persisted' indica que a página foi carregada do cache (botão voltar)
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
        
        // 1. Localiza o formulário pelo ID (Certifique-se que seu <form> tem id="formCliente")
        const form = document.getElementById('formCliente');
        
        if (form) {
            form.reset(); // Limpa todos os campos de texto, checkbox e selects
            console.log("Formulário resetado ao voltar.");
        }

        // 2. Se você tiver campos ocultos (como o ID de edição), limpe-os manualmente:
        // const campoId = document.getElementById('idEdicao');
        // if (campoId) campoId.value = "";
    }
});





</script>
