<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Cliente - Play na Web</title>
    
    <style>
        body { margin:0; font-family:Arial; background:#0f2a66; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:420px; padding:20px; box-sizing: border-box; }
        
        /* Estilo padrão para todas as caixas de entrada e áreas de texto */
        input, textarea, select { 
            width:100%; padding:10px; margin-bottom:10px; border-radius:8px; 
            border:none; font-size:16px; box-sizing: border-box; 
        }
        select { background: white; color: #333; outline: none; }
        
        /* Estilo do botão azul */
        .botao { 
            background:#4467a8; padding:12px; text-align:center; 
            border-radius:30px; font-weight:bold; cursor:pointer; margin-top:10px; 
        }

        /* Bloqueio de seleção de texto (para evitar que o usuário selecione sem querer ao clicar rápido) */
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        .copiar { -webkit-user-select: text !important; user-select: text !important; }

        /* Alinhamento para os equipamentos ficarem lado a lado (Equip + Qtd) */
        .equip-group { display: flex; gap: 8px; margin-bottom: 8px; }
        .campo-cidade {
            background: #b8c0d1;
            color: #1f2f57;
            border: 1px solid rgba(255,255,255,0.35);
        }
        .campo-cidade::placeholder {
            color: rgba(31,47,87,0.7);
        }
        .campo-cidade:disabled {
            opacity: 1;
            cursor: not-allowed;
        }
        .linha-endereco {
            display: flex;
            gap: 8px;
            align-items: stretch;
            margin-bottom: 10px;
        }
        .linha-endereco #endereco {
            width: auto;
            flex: 1;
            min-width: 0;
            margin-bottom: 0;
        }
        .btn-mapa-endereco {
            width: 52px;
            min-width: 52px;
            border: none;
            border-radius: 8px;
            background: #4467a8;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0;
        }
        .btn-acao-endereco {
            width: 44px;
            min-width: 44px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.16);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0;
            padding: 0;
        }
        .btn-mapa-endereco,
        .btn-acao-endereco {
            transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        .btn-limpar-endereco {
            background: rgba(255,255,255,0.12);
            font-size: 18px;
        }
        .btn-mapa-endereco:active,
        .btn-acao-endereco:active,
        .btn-mapa-endereco.is-busy,
        .btn-acao-endereco.is-busy {
            transform: scale(0.94);
            filter: brightness(1.12);
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18);
        }
        .btn-mapa-endereco.is-busy,
        .btn-acao-endereco.is-busy {
            animation: pulsoBotaoEndereco 0.85s ease-in-out infinite alternate;
        }
        .btn-acao-endereco:disabled,
        .btn-mapa-endereco:disabled {
            cursor: not-allowed;
        }
        .btn-mapa-endereco img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }
        @keyframes pulsoBotaoEndereco {
            from {
                filter: brightness(1);
            }
            to {
                filter: brightness(1.18);
            }
        }
    </style>
</head>
<body>

<div class="app">
    <h2 style="text-align:center;">Novo Cliente</h2>

    <input id="ponto_aberto" placeholder="Ponto Aberto por:">
    <input id="nome" placeholder="Nome do cliente">
    
    <input id="comissao" placeholder="Comissão" maxlength="3" inputmode="numeric"  
        oninput="somenteNumero(this)"
        onblur="adicionarPorcentagem(this)"  
        onfocus="removerPorcentagem(this)">

    <div class="linha-endereco">
        <input id="endereco" placeholder="Use localização ou cole endereço do Google Maps" autocapitalize="off" autocomplete="off" spellcheck="false">
        <button type="button" class="btn-mapa-endereco" onclick="abrirMapaEndereco()" aria-label="Abrir mapa">
            <img src="assets/img/Localizacao.png" alt="Mapa">
        </button>
        <button type="button" class="btn-acao-endereco btn-limpar-endereco" onclick="limparEndereco()" aria-label="Limpar endereço" title="Limpar endereço">&#10006;</button>
    </div>
    <input id="cidade" class="campo-cidade" placeholder="Cidade" disabled>
    
    <div id="container-equipamentos">
    </div>
    
    <textarea id="obs" placeholder="Observações"></textarea>
    
    <input id="rota" placeholder="Rota (ex: 03)" inputmode="numeric" 
        oninput="somenteNumeroRota(this)" 
        onblur="adicionarRota(this)" 
        onfocus="removerRota(this)">

    


<div style="border:1px solid rgba(255,255,255,0.3); border-radius:10px; padding:10px; margin-bottom:10px;">
    <div style="margin-bottom:8px; text-align:center; font-weight:bold;">Dias aberto</div>
    
    <div style="display:flex; gap:2px; font-size:11px; flex-wrap:nowrap; justify-content:space-between;">
        
        <label style="display:flex; flex-direction:column; align-items:center; cursor:pointer; gap:5px;">
            Seg <input type="checkbox" name="dias" value="Seg" class="dias" style="width:18px; height:18px; margin:0;">
        </label>

        <label style="display:flex; flex-direction:column; align-items:center; cursor:pointer; gap:5px;">
            Ter <input type="checkbox" name="dias" value="Ter" class="dias" style="width:18px; height:18px; margin:0;">
        </label>

        <label style="display:flex; flex-direction:column; align-items:center; cursor:pointer; gap:5px;">
            Qua <input type="checkbox" name="dias" value="Qua" class="dias" style="width:18px; height:18px; margin:0;">
        </label>

        <label style="display:flex; flex-direction:column; align-items:center; cursor:pointer; gap:5px;">
            Qui <input type="checkbox" name="dias" value="Qui" class="dias" style="width:18px; height:18px; margin:0;">
        </label>

        <label style="display:flex; flex-direction:column; align-items:center; cursor:pointer; gap:5px;">
            Sex <input type="checkbox" name="dias" value="Sex" class="dias" style="width:18px; height:18px; margin:0;">
        </label>

        <label style="display:flex; flex-direction:column; align-items:center; cursor:pointer; gap:5px;">
            Sáb <input type="checkbox" name="dias" value="Sáb" class="dias" style="width:18px; height:18px; margin:0;">
        </label>

        <label style="display:flex; flex-direction:column; align-items:center; cursor:pointer; gap:5px;">
            Dom <input type="checkbox" name="dias" value="Dom" class="dias" style="width:18px; height:18px; margin:0;">
        </label>

    </div>
</div>






      
    <div id="btnSalvar" class="botao">Salvar Cliente</div>
    <div id="btnVoltar" class="botao" style="margin-top:5px; background: rgba(255,255,255,0.1);">Voltar</div>
</div>

<script type="module">
    // Importamos as ferramentas de banco de dados do seu arquivo externo
    import { dbSalvarCliente, dbListarClientes, dbEscutarClientes, dbEscutarEstoque, dbEscutarColaboradores } from './database.js';

    let maquinasDisponiveis = [];
    let clientesCadastrados = [];
    let perfilUsuarioLogado = "";
    let nomeUsuarioLogado = localStorage.getItem('usuarioLogado') || "";
    let clienteEmEdicao = null;
    let perfilCarregado = false;
    let editId = "";

    function normalizarTexto(valor) {
        return String(valor || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .trim();
    }

    function obterDataLocalIso(data) {
        const base = data ? new Date(data) : new Date();
        if (Number.isNaN(base.getTime())) return "";
        const ano = base.getFullYear();
        const mes = String(base.getMonth() + 1).padStart(2, "0");
        const dia = String(base.getDate()).padStart(2, "0");
        return `${ano}-${mes}-${dia}`;
    }

    function extrairCidadeBairroDoEndereco(endereco) {
        const texto = String(endereco || "").replace(/\s+/g, " ").trim();
        if (!texto) return "";

        const partes = texto.split(",").map(parte => parte.trim()).filter(Boolean);
        if (partes.length === 0) return "";

        let cidade = "";
        let indiceCidade = -1;

        for (let i = partes.length - 1; i >= 0; i--) {
            const trechoSemCep = partes[i].replace(/\b\d{5}-?\d{3}\b/g, "").trim();
            const matchCidade = trechoSemCep.match(/^(.+?)\s*-\s*([A-Z]{2})$/i);
            if (matchCidade) {
                cidade = matchCidade[1].trim();
                indiceCidade = i;
                break;
            }
        }

        if (!cidade || indiceCidade <= 0) {
            return "";
        }

        let bairroBase = partes[indiceCidade - 1].replace(/\b\d{5}-?\d{3}\b/g, "").trim();
        if (bairroBase.includes(" - ")) {
            const partesBairro = bairroBase.split(" - ").map(parte => parte.trim()).filter(Boolean);
            bairroBase = partesBairro[partesBairro.length - 1] || "";
        }

        if ((!bairroBase || /^\d+[A-Za-z-]*$/.test(bairroBase)) && indiceCidade > 1) {
            bairroBase = partes[indiceCidade - 2].replace(/\b\d{5}-?\d{3}\b/g, "").trim();
            if (bairroBase.includes(" - ")) {
                const partesBairro = bairroBase.split(" - ").map(parte => parte.trim()).filter(Boolean);
                bairroBase = partesBairro[partesBairro.length - 1] || "";
            }
        }

        const bairro = bairroBase.trim();
        return bairro ? `${cidade} - ${bairro}` : cidade;
    }

    function enderecoContemLink(valor) {
        return /(https?:\/\/|www\.)/i.test(String(valor || "").trim());
    }

    function enderecoTemFormatoMaps(valor) {
        const texto = String(valor || "").replace(/\s+/g, " ").trim();
        if (!texto) return false;
        if (enderecoContemLink(texto)) return false;

        const partes = texto.split(",").map(parte => parte.trim()).filter(Boolean);
        if (partes.length < 3) return false;

        const temCidadeUf = partes.some(parte => /^.+\s-\s[A-Z]{2}$/i.test(parte));
        const primeiraParte = partes[0] || "";
        const temRua = /[A-Za-zÀ-ÿ]/.test(primeiraParte);

        return temCidadeUf && temRua;
    }

    function aplicarEnderecoNoFormulario(endereco, origem = "maps") {
        const inputEndereco = document.getElementById("endereco");
        if (!inputEndereco) return false;

        const enderecoLimpo = String(endereco || "").replace(/\s+/g, " ").trim();
        if (!enderecoLimpo) return false;

        inputEndereco.value = enderecoLimpo;
        inputEndereco.dataset.origemEndereco = origem;
        atualizarEstadoCampoCidade();
        return true;
    }

    function limparEnderecoNoFormulario() {
        const inputEndereco = document.getElementById("endereco");
        if (!inputEndereco) return;

        inputEndereco.value = "";
        delete inputEndereco.dataset.origemEndereco;
        atualizarEstadoCampoCidade();
    }

    function validarEnderecoSemLink(exibirAlerta = true) {
        const inputEndereco = document.getElementById("endereco");
        if (!inputEndereco) return true;

        const endereco = String(inputEndereco.value || "").trim();
        if (!endereco) return true;
        if (!enderecoContemLink(endereco)) return true;

        inputEndereco.value = "";
        delete inputEndereco.dataset.origemEndereco;
        atualizarEstadoCampoCidade();

        if (exibirAlerta) {
            alert("Cole ou digite apenas o endereco em texto. Links de mapa nao sao permitidos nesse campo.");
        }

        inputEndereco.focus();
        return false;
    }

    function preencherCidadePeloEndereco(forcar = false) {
        const inputEndereco = document.getElementById("endereco");
        const inputCidade = document.getElementById("cidade");
        if (!inputEndereco || !inputCidade) return false;

        const cidadeBairro = extrairCidadeBairroDoEndereco(inputEndereco.value);
        if (!cidadeBairro) return false;

        const cidadeAtual = String(inputCidade.value || "").trim();
        const podeSobrescrever = !cidadeAtual || inputCidade.dataset.preenchidoAutomaticamente === "1" || forcar;
        if (!podeSobrescrever) return false;

        inputCidade.value = cidadeBairro;
        inputCidade.dataset.preenchidoAutomaticamente = "1";
        return true;
    }

    function preencherCidadePelaLocalizacao(dados, forcar = true) {
        const inputCidade = document.getElementById("cidade");
        if (!inputCidade) return false;

        const endereco = dados?.address || {};
        const bairro = endereco.suburb || endereco.neighbourhood || endereco.quarter || endereco.city_district || "";
        const cidade = endereco.city || endereco.town || endereco.village || endereco.municipality || endereco.county || "";
        const cidadeBairro = [cidade, bairro].filter(Boolean).join(" - ").trim();

        if (!cidadeBairro) return false;

        const cidadeAtual = String(inputCidade.value || "").trim();
        const podeSobrescrever = !cidadeAtual || inputCidade.dataset.preenchidoAutomaticamente === "1" || forcar;
        if (!podeSobrescrever) return false;

        inputCidade.disabled = false;
        inputCidade.value = cidadeBairro;
        inputCidade.dataset.preenchidoAutomaticamente = "1";
        return true;
    }

    function montarEnderecoDaLocalizacao(dados) {
        const endereco = dados?.address || {};
        const rua = endereco.road || endereco.pedestrian || endereco.footway || endereco.path || "";
        const numero = endereco.house_number || "";
        const bairro = endereco.suburb || endereco.neighbourhood || endereco.quarter || endereco.city_district || "";
        const cidade = endereco.city || endereco.town || endereco.village || endereco.municipality || endereco.county || "";
        const estado = endereco.state_code || endereco.state || "";
        const cep = endereco.postcode || "";

        const primeiraParte = [rua, numero].filter(Boolean).join(", ");
        const segundaParte = bairro ? ` - ${bairro}` : "";
        const terceiraParte = [cidade, estado].filter(Boolean).join(" - ");
        const partesFinais = [primeiraParte + segundaParte, terceiraParte, cep].filter(Boolean);

        return partesFinais.join(", ").trim();
    }

    async function buscarEnderecoPorCoordenadas(latitude, longitude) {
        const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(latitude)}&lon=${encodeURIComponent(longitude)}&addressdetails=1&accept-language=pt-BR`;
        const resposta = await fetch(url, {
            headers: {
                "Accept": "application/json"
            }
        });

        if (!resposta.ok) {
            throw new Error("Nao foi possivel consultar o endereco da sua localizacao.");
        }

        return resposta.json();
    }

    function definirEstadoBotaoMapa(carregando) {
        const botao = document.querySelector('.btn-mapa-endereco');
        if (!botao) return;

        botao.disabled = carregando;
        botao.style.opacity = carregando ? "0.7" : "1";
        botao.classList.toggle('is-busy', carregando);
    }

    function processarTextoColadoEndereco(textoColado, exibirAlerta = true) {
        const texto = String(textoColado || "").trim();
        if (!texto) {
            if (exibirAlerta) {
                alert("Não encontrei texto para colar no endereço.");
            }
            return false;
        }

        if (!enderecoTemFormatoMaps(texto)) {
            limparEnderecoNoFormulario();
            if (exibirAlerta) {
                alert("Use apenas a localização ou cole um endereço copiado do Google Maps nesse campo.");
            }
            return false;
        }

        aplicarEnderecoNoFormulario(texto, "maps");
        preencherCidadePeloEndereco(true);
        return true;
    }

    window.limparEndereco = function() {
        const botaoLimpar = document.querySelector('.btn-limpar-endereco');
        botaoLimpar?.classList.add('is-busy');
        limparEnderecoNoFormulario();
        document.getElementById("endereco")?.focus();
        window.setTimeout(() => botaoLimpar?.classList.remove('is-busy'), 180);
    }

    window.abrirMapaEndereco = async function() {
        if (!navigator.geolocation) {
            alert("Seu aparelho ou navegador nao permite usar localizacao.");
            return;
        }

        const hostSeguroLocal = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        if (!window.isSecureContext && !hostSeguroLocal) {
            alert("No celular, a localizacao do navegador normalmente so funciona em HTTPS. Abra esta pagina em HTTPS para preencher o endereco automaticamente.");
            return;
        }

        definirEstadoBotaoMapa(true);

        try {
            const posicao = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                });
            });

            const { latitude, longitude } = posicao.coords;
            const dadosLocalizacao = await buscarEnderecoPorCoordenadas(latitude, longitude);
            const enderecoAtual = montarEnderecoDaLocalizacao(dadosLocalizacao) || String(dadosLocalizacao?.display_name || "").trim();

            if (!enderecoAtual) {
                throw new Error("Nao foi possivel identificar um endereco para a localizacao atual.");
            }

            aplicarEnderecoNoFormulario(enderecoAtual, "gps");
            if (!preencherCidadePelaLocalizacao(dadosLocalizacao, true)) {
                preencherCidadePeloEndereco(true);
            }
        } catch (erro) {
            if (erro?.code === 1) {
                alert("Permita a localizacao no navegador. Se estiver no celular, confirme tambem que a pagina foi aberta em HTTPS e que o navegador tem permissao de localizacao.");
            } else if (erro?.code === 2) {
                alert("Nao foi possivel obter sua localizacao atual.");
            } else if (erro?.code === 3) {
                alert("A localizacao demorou demais para responder. Tente novamente.");
            } else {
                alert(erro?.message || "Nao foi possivel preencher o endereco pela localizacao.");
            }
        } finally {
            definirEstadoBotaoMapa(false);
        }
    }

    function atualizarEstadoCampoCidade() {
        const inputEndereco = document.getElementById("endereco");
        const inputCidade = document.getElementById("cidade");
        const botaoLimpar = document.querySelector('.btn-limpar-endereco');
        if (!inputEndereco || !inputCidade) return;

        const enderecoPreenchido = String(inputEndereco.value || "").trim() !== "";
        inputCidade.disabled = !enderecoPreenchido;
        if (botaoLimpar) {
            botaoLimpar.disabled = !enderecoPreenchido;
            botaoLimpar.style.opacity = enderecoPreenchido ? "1" : "0.45";
        }

        if (!enderecoPreenchido) {
            inputCidade.value = "";
            delete inputCidade.dataset.preenchidoAutomaticamente;
        }
    }

    function validarCamposObrigatorios() {
        const camposObrigatorios = [
            { id: "ponto_aberto", nome: "Ponto Aberto por" },
            { id: "nome", nome: "Nome do cliente" },
            { id: "comissao", nome: "Comissão" },
            { id: "endereco", nome: "Endereço" },
            { id: "cidade", nome: "Cidade" },
            { id: "obs", nome: "Observações" },
            { id: "rota", nome: "Rota" }
        ];

        for (const campo of camposObrigatorios) {
            const input = document.getElementById(campo.id);
            if (!input || String(input.value || "").trim() !== "") continue;

            alert(`Preencha o campo ${campo.nome}.`);
            input.focus();
            return false;
        }

        const inputEndereco = document.getElementById("endereco");
        const enderecoAtual = String(inputEndereco?.value || "").trim();
        const origemEndereco = inputEndereco?.dataset.origemEndereco || "";
        const enderecoInicial = String(inputEndereco?.dataset.enderecoInicial || "").trim();
        const enderecoLegadoMantido = !!editId && origemEndereco === "legado" && enderecoAtual === enderecoInicial;
        const enderecoValido = origemEndereco === "gps" || enderecoTemFormatoMaps(enderecoAtual) || enderecoLegadoMantido;

        if (!enderecoValido) {
            alert("Use a localizacao ou cole um endereco copiado do Google Maps no campo Endereco.");
            inputEndereco?.focus();
            return false;
        }

        const diasSelecionados = Array.from(document.querySelectorAll(".dias:checked"));
        if (diasSelecionados.length < 2) {
            alert("Selecione pelo menos 2 dias em Dias aberto.");
            return false;
        }

        const linhasEquipamento = Array.from(document.querySelectorAll('.equip-group'));
        const linhasPreenchidas = linhasEquipamento
            .map(grupo => ({
                grupo,
                maquina: grupo.querySelector('.equip-select')?.value.trim() || "",
                qtd: grupo.querySelector('.qtd-input')?.value.trim() || "",
                pix: grupo.querySelector('.pix-input')?.value.trim() || ""
            }))
            .filter(item => item.maquina || item.qtd || item.pix);

        if (linhasPreenchidas.length === 0) {
            alert("Preencha pelo menos 1 equipamento com máquina, quantidade e Pix.");
            linhasEquipamento[0]?.querySelector('.equip-select')?.focus();
            return false;
        }

        const linhaIncompleta = linhasPreenchidas.find(item => !item.maquina || !item.qtd || !item.pix);
        if (linhaIncompleta) {
            alert("Complete máquina, quantidade e Pix em todos os equipamentos preenchidos.");
            linhaIncompleta.grupo.querySelector('.equip-select')?.focus();
            return false;
        }

        return true;
    }

    function usuarioPodeEditarCliente(cliente) {
        if (perfilUsuarioLogado.includes('gestao')) return true;
        if (!perfilUsuarioLogado.includes('atendimento')) return false;
        if (!cliente) return true;

        const autorCadastro = cliente.cadastradoPor || cliente.ponto_aberto || "";
        const diaCadastro = cliente.dataCadastroDia || obterDataLocalIso(cliente.dataCadastro);
        const mesmoUsuario = normalizarTexto(autorCadastro) === normalizarTexto(nomeUsuarioLogado);
        const mesmoDia = diaCadastro === obterDataLocalIso();
        return mesmoUsuario && mesmoDia;
    }

    function extrairPixDoEquipamento(equipTexto) {
        if (!equipTexto) return [];
        return String(equipTexto)
            .split(", ")
            .map(item => {
                const matchPix = item.match(/\[Pix:\s*([^\]]+)\]/i);
                return matchPix ? String(matchPix[1]).trim() : "";
            })
            .filter(Boolean);
    }

    function encontrarConflitoPix(pix, inputAtual = null) {
        const pixNormalizado = String(pix || "").trim();
        if (!pixNormalizado) return null;

        const pixJaDigitadosNaTela = Array.from(document.querySelectorAll('.pix-input'))
            .filter(input => input !== inputAtual)
            .map(input => String(input.value || "").trim())
            .filter(Boolean);

        if (pixJaDigitadosNaTela.includes(pixNormalizado)) {
            return { tipo: 'formulario' };
        }

        return clientesCadastrados.find(cliente => {
            if (editId && cliente.firebaseUrl && cliente.firebaseUrl.includes(editId)) {
                return false;
            }
            return extrairPixDoEquipamento(cliente.equip).includes(pixNormalizado);
        }) || null;
    }

    function validarPixInput(input, exibirAlerta = true) {
        if (!input) return true;

        const pix = String(input.value || "").trim();
        if (!pix) return !input.dataset.pixRemovidoPorDuplicidade;

        const conflito = encontrarConflitoPix(pix, input);
        if (!conflito) {
            delete input.dataset.pixRemovidoPorDuplicidade;
            return true;
        }

        input.value = "";
        input.dataset.pixRemovidoPorDuplicidade = "1";

        if (exibirAlerta) {
            const mensagem = conflito.tipo === 'formulario'
                ? `O numero Pix ${pix} ja foi informado em outra maquina deste cadastro.`
                : `Ja existe um cliente com o numero Pix ${pix} cadastrado.`;
            alert(mensagem);
        }

        return false;
    }

    function validarTodosOsPixAntesDeSalvar() {
        const inputsPix = Array.from(document.querySelectorAll('.pix-input'));
        for (const input of inputsPix) {
            if (!validarPixInput(input, true)) {
                input.focus();
                return false;
            }
        }
        return true;
    }

    function bloquearEdicaoSemPermissao() {
        alert("VocÃª nÃ£o tem permissÃ£o para editar este cliente.");
        window.location.href = "clientes.html";
    }

    dbEscutarColaboradores((colaboradores) => {
        nomeUsuarioLogado = localStorage.getItem('usuarioLogado') || "";
        const usuarioAtual = colaboradores.find(c => c.nome === nomeUsuarioLogado);
        perfilUsuarioLogado = String(usuarioAtual?.nivel_completo || "");
        perfilCarregado = true;
        if (editId && clienteEmEdicao && !usuarioPodeEditarCliente(clienteEmEdicao)) {
            bloquearEdicaoSemPermissao();
        }
    });

    // --- CARREGAR MÁQUINAS ---
    dbEscutarClientes((lista) => {
        clientesCadastrados = lista;
    });

    dbEscutarEstoque((lista) => {
        maquinasDisponiveis = lista.filter(item => item.categoria === 'maquina');
        
        // Atualiza os selects existentes que estiverem na tela
        document.querySelectorAll('.equip-select').forEach(select => {
            const valorAtual = select.value || select.getAttribute('data-value');
            select.innerHTML = '<option value="">Selecione a máquina...</option>';
            maquinasDisponiveis.forEach(m => {
                const option = document.createElement('option');
                option.value = m.nome;
                option.textContent = m.nome;
                if (m.nome === valorAtual) option.selected = true;
                select.appendChild(option);
            });
        });
    });

    window.adicionarLinhaEquipamento = function(nome = "", pix = "", qtd = "") {
        const container = document.getElementById('container-equipamentos');
        const novoGrupo = document.createElement('div');
        novoGrupo.className = 'equip-group';
        
        let options = '<option value="">Selecione a máquina...</option>';
        maquinasDisponiveis.forEach(m => {
            options += `<option value="${m.nome}" ${m.nome === nome ? 'selected' : ''}>${m.nome}</option>`;
        });

        novoGrupo.innerHTML = `
            <select class="equip-select" style="flex: 5; margin-bottom:0;" data-value="${nome}">
                ${options}
            </select>
            <input class="qtd-input" value="${qtd}" placeholder="Qtd" inputmode="numeric" maxlength="3" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 3);" style="flex: 1.5; margin-bottom:0; border: 2px solid #2196f3; text-align: center; padding: 10px 5px;">
            <input class="pix-input" value="${pix}" placeholder="Pix" inputmode="numeric" maxlength="3" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 3);" style="flex: 1.5; margin-bottom:0; border: 2px solid #4caf50; text-align: center; padding: 10px 5px;">
        `;
        container.appendChild(novoGrupo);
    }

    /* --- PARTE A: DETECTAR EDIÇÃO ---
       Verifica se o link termina com "?edit=ID". Se sim, muda o título e carrega os dados. */
    const urlParams = new URLSearchParams(window.location.search);
    editId = urlParams.get('edit');

    if (editId) {
        document.querySelector('h2').innerText = "Editar Cliente";
        carregarDadosCliente(editId);
    } else {
        adicionarLinhaEquipamento();
    }

    atualizarEstadoCampoCidade();

    /* --- PARTE B: CARREGAR DADOS NO FORMULÁRIO ---
       Puxa as informações do Firebase e coloca dentro das caixinhas (inputs) */
    document.getElementById('endereco').addEventListener('beforeinput', (e) => {
        if (e.inputType !== 'insertFromPaste') {
            e.preventDefault();
        }
    });

    document.getElementById('endereco').addEventListener('blur', () => {
        if (!validarEnderecoSemLink(true)) return;
        atualizarEstadoCampoCidade();
        preencherCidadePeloEndereco(false);
    });

    document.getElementById('endereco').addEventListener('change', () => {
        if (!validarEnderecoSemLink(true)) return;
        atualizarEstadoCampoCidade();
        preencherCidadePeloEndereco(false);
    });

    document.getElementById('endereco').addEventListener('paste', (e) => {
        const textoColado = e.clipboardData?.getData('text') || "";
        e.preventDefault();
        processarTextoColadoEndereco(textoColado, true);
    });

    document.getElementById('cidade').addEventListener('input', () => {
        delete document.getElementById('cidade').dataset.preenchidoAutomaticamente;
    });

    async function carregarDadosCliente(id) {
        try {
            const clientes = await dbListarClientes();
            const cliente = clientes.find(c => c.firebaseUrl.includes(id));

            if (cliente) {
                clienteEmEdicao = cliente;
                if (perfilCarregado && !usuarioPodeEditarCliente(cliente)) {
                    bloquearEdicaoSemPermissao();
                    return;
                }

                document.getElementById("ponto_aberto").value = cliente.ponto_aberto || "";
                document.getElementById("nome").value = cliente.nome || "";
                document.getElementById("comissao").value = cliente.comissao || "";
                document.getElementById("endereco").value = cliente.endereco || "";
                document.getElementById("endereco").dataset.enderecoInicial = cliente.endereco || "";
                document.getElementById("endereco").dataset.origemEndereco = enderecoTemFormatoMaps(cliente.endereco || "") ? "maps" : "legado";
                atualizarEstadoCampoCidade();
                document.getElementById("cidade").value = cliente.cidade || "";
                document.getElementById("rota").value = cliente.rota || "";
                document.getElementById("obs").value = cliente.obs || "";

                // Especial: Recria as linhas de equipamentos baseadas no texto salvo
                if (cliente.equip) {
                    const lista = cliente.equip.split(", ");
                    const container = document.getElementById('container-equipamentos');
                    container.innerHTML = ""; // Limpa os campos padrão
                    
                    lista.forEach((item) => {
                        let nome = item;
                        let qtd = "1";
                        let pix = "";

                        // Extrai a quantidade. Ex: (2)
                        const regexQtd = /\s*\(([^)]+)\)$/;
                        const matchQtd = nome.match(regexQtd);
                        if(matchQtd) {
                            qtd = matchQtd[1];
                            nome = nome.replace(regexQtd, "");
                        }

                        // Extrai o Pix. Ex: [Pix: 12345]
                        const regexPix = /\s*\[Pix:\s*([^\]]+)\]$/;
                        const matchPix = nome.match(regexPix);
                        if(matchPix) {
                            pix = matchPix[1];
                            nome = nome.replace(regexPix, "");
                        }

                        nome = nome.trim();
                        adicionarLinhaEquipamento(nome, pix, qtd);
                    });
                    adicionarLinhaEquipamento(); // Adiciona uma linha vazia no final
                } else {
                    if (document.getElementById('container-equipamentos').children.length === 0) {
                        adicionarLinhaEquipamento();
                    }
                }

                // Especial: Marca os quadradinhos (checkboxes) dos dias
                if (cliente.aberto) {
                    const diasSalvos = cliente.aberto.split(", ");
                    document.querySelectorAll(".dias").forEach(caixa => {
                        if (diasSalvos.includes(caixa.value)) caixa.checked = true;
                    });
                }
            }
        } catch (e) { console.error("Erro ao carregar:", e); }
    }

    /* --- PARTE C: EQUIPAMENTOS DINÂMICOS ---
       Sempre que o usuário seleciona uma máquina na última linha, cria uma nova abaixo. */
    document.getElementById('container-equipamentos').addEventListener('change', (e) => {
        if (e.target.classList.contains('equip-select')) {
            const grupos = document.querySelectorAll('.equip-group');
            const ultimoSelect = grupos[grupos.length - 1].querySelector('.equip-select');

            if (e.target === ultimoSelect && e.target.value !== "") {
                adicionarLinhaEquipamento();
            }
        }
    });

    /* --- PARTE D: AÇÃO DE SALVAR ---
       Coleta tudo e decide: É um cliente NOVO ou uma ATUALIZAÇÃO de um antigo? */
    document.getElementById('container-equipamentos').addEventListener('focusout', (e) => {
        if (e.target.classList.contains('pix-input')) {
            validarPixInput(e.target, true);
        }
    });

    document.getElementById('container-equipamentos').addEventListener('input', (e) => {
        if (e.target.classList.contains('pix-input')) {
            delete e.target.dataset.pixRemovidoPorDuplicidade;
        }
    });

    document.getElementById('btnSalvar').onclick = async () => {
        const btn = document.getElementById('btnSalvar');
        btn.innerText = "Salvando...";
        btn.style.pointerEvents = "none";

        try {
            const clientes = await dbListarClientes();
            clientesCadastrados = clientes;

            if (!validarEnderecoSemLink(true)) {
                btn.innerText = "Salvar Cliente";
                btn.style.pointerEvents = "auto";
                return;
            }

            preencherCidadePeloEndereco(false);
            atualizarEstadoCampoCidade();

            if (!validarCamposObrigatorios()) {
                btn.innerText = "Salvar Cliente";
                btn.style.pointerEvents = "auto";
                return;
            }

            if (!validarTodosOsPixAntesDeSalvar()) {
                btn.innerText = "Salvar Cliente";
                btn.style.pointerEvents = "auto";
                return;
            }

            let numeroFinal;
            let idParaSalvar = editId || null; // Se editId existe, usamos ele para salvar por cima

            if (editId) {
                const clienteAtual = clientes.find(c => c.firebaseUrl.includes(editId));
                if (!clienteAtual) {
                    throw new Error("Cliente nÃ£o encontrado.");
                }
                clienteEmEdicao = clienteAtual;
                if (!usuarioPodeEditarCliente(clienteAtual)) {
                    throw new Error("VocÃª nÃ£o tem permissÃ£o para editar este cliente.");
                }
                numeroFinal = clienteAtual.numero;
            } else {
                // Lógica para achar o próximo número da lista (ex: 1, 2, 3...)
                let numeros = clientes.map(c => parseInt(c.numero)).sort((a,b)=>a-b);
                numeroFinal = 1;
                for(let n of numeros){
                    if(n === numeroFinal) numeroFinal++;
                    else if (n > numeroFinal) break;
                }
            }

            // Junta Nome + [Pix: x] + (Qtd) de todos os equipamentos preenchidos
            let listaEquipFinal = [];
            document.querySelectorAll('.equip-group').forEach(grupo => {
                const n = grupo.querySelector('.equip-select').value.trim();
                const p = grupo.querySelector('.pix-input').value.trim();
                const q = grupo.querySelector('.qtd-input').value.trim() || "1";
                
                if(n !== "") {
                    let str = n;
                    if(p !== "") str += ` [Pix: ${p}]`;
                    str += ` (${q})`;
                    listaEquipFinal.push(str);
                }
            });

            const dias = Array.from(document.querySelectorAll(".dias:checked")).map(d => d.value);
            const dataCadastro = clienteEmEdicao?.dataCadastro || new Date().toISOString();
            const dataCadastroDia = clienteEmEdicao?.dataCadastroDia || obterDataLocalIso();
            const cadastradoPor = clienteEmEdicao?.cadastradoPor || nomeUsuarioLogado || "N/A";
            preencherCidadePeloEndereco(false);

            const dadosFinal = {
                numero: numeroFinal,
                ponto_aberto: document.getElementById("ponto_aberto").value,
                nome: document.getElementById("nome").value,
                cidade: document.getElementById("cidade").value,
                comissao: document.getElementById("comissao").value,
                rota: document.getElementById("rota").value,
                endereco: document.getElementById("endereco").value,
                aberto: dias.join(", "),
                equip: listaEquipFinal.join(", "), 
                obs: document.getElementById("obs").value,
                cadastradoPor,
                dataCadastro,
                dataCadastroDia
            };

            await dbSalvarCliente(dadosFinal, idParaSalvar);
            window.location.href = "clientes.html";

        } catch (error) {
            alert("Erro: " + error.message);
            btn.innerText = "Salvar Cliente";
            btn.style.pointerEvents = "auto";
        }
    };

    document.getElementById('btnVoltar').onclick = () => window.location.href = "clientes.html";
</script>

<script>
    // COMISSÃO: Só deixa digitar números e limita a 2 dígitos
    function somenteNumero(campo){

    }
    function adicionarPorcentagem(campo){
        if(campo.value !== "" && !campo.value.includes("%")) campo.value += "%";
    }
    function removerPorcentagem(campo){
        campo.value = campo.value.replace("%","");
    }

    // ROTA: Só números e adiciona o prefixo "R." ao sair
    function somenteNumeroRota(campo){
        campo.value = campo.value.replace(/\D/g,'');
    }
    function adicionarRota(campo){
        if(campo.value !== "" && !campo.value.startsWith("R.")) {
            let valor = campo.value.padStart(2, '0');
            campo.value = "R." + valor;
        }
    }
    function removerRota(campo){
        campo.value = campo.value.replace("R.", "");
    }

        // 1. Localiza o formulário pelo ID (Certifique-se que seu <form> tem id="formCliente")
        const form = document.getElementById('formCliente');
        
        if (form) {

            console.log("Formulário resetado ao voltar.");

    }
});
