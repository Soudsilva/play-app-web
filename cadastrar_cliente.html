<script type="module">
    // Importamos as funções do seu novo database.js
    import { dbSalvarCliente, dbListarClientes } from './database.js';

    // Configura o botão Salvar
    document.getElementById('btnSalvar').addEventListener('click', async () => {
        const btn = document.getElementById('btnSalvar');
        btn.innerText = "Salvando...";
        btn.style.opacity = "0.5";

        try {
            // Puxa a lista da nuvem para ver o próximo número disponível
            let clientes = await dbListarClientes();
            let numeros = clientes.map(c => parseInt(c.numero)).sort((a,b)=>a-b);
            let numeroLivre = 1;
            for(let n of numeros){
                if(n === numeroLivre) numeroLivre++;
                else break;
            }

            // Pega dias selecionados
            let diasSelecionados = [];
            document.querySelectorAll(".dias:checked").forEach(dia => diasSelecionados.push(dia.value));

            // Cria o objeto
            const cliente = {
                numero: numeroLivre,
                nome: document.getElementById("nome").value,
                cidade: document.getElementById("cidade").value,
                comissao: document.getElementById("comissao").value,
                rota: document.getElementById("rota").value,
                endereco: document.getElementById("endereco").value,
                aberto: diasSelecionados.join(" "),
                equip: document.getElementById("equip").value,
                obs: document.getElementById("obs").value
            };

            // SALVA NA NUVEM
            await dbSalvarCliente(cliente);
            
            // Volta para a lista
            window.location.href = "clientes.html";
        } catch (error) {
            alert("Erro ao salvar: " + error.message);
            btn.innerText = "Salvar Cliente";
            btn.style.opacity = "1";
        }
    });

    // Configura o botão Voltar
    document.getElementById('btnVoltar').addEventListener('click', () => {
        window.location.href = "clientes.html";
    });
</script>

<script>
    /* Funções de máscara (permanecem normais) */
    function somenteNumero(campo){
        let valor = campo.value.replace(/\D/g,'');
        campo.value = valor.substring(0,2);
    }
    function adicionarPorcentagem(campo){
        if(campo.value !== "") campo.value += "%";
    }
    function removerPorcentagem(campo){
        campo.value = campo.value.replace("%","");
    }
</script>
