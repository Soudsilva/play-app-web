<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sa&uacute;de de Vendas</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#042d86; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:700px; padding:15px; box-sizing:border-box; min-height: 100vh; padding-bottom: 70px; }

        .topo { display:flex; align-items:center; justify-content:center; margin-bottom: 14px; position: relative; min-height: 45px; }
        .titulo { font-size: 22px; font-weight: 900; text-align:center; }
        .btn-home { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 50%; cursor: pointer; display:flex; position:absolute; right:0; }
        .btn-home img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        .barra { position: sticky; top: 0; z-index: 100; background:#042d86; padding: 10px 0 12px; margin-bottom: 12px; }
        .linha-barra { display:flex; gap: 10px; align-items: center; }
        .card-controle {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 14px;
            padding: 10px 12px;
        }
        .card-controle.periodo {
            flex: 0 0 62px;
            padding-left: 6px;
            padding-right: 6px;
        }
        .card-controle.ordenar {
            flex: 0 0 62px;
            padding-left: 6px;
            padding-right: 6px;
        }
        .card-controle.periodo select {
            padding-left: 8px;
            padding-right: 8px;
            text-align: center;
        }
        .card-controle.ordenar select {
            padding-left: 6px;
            padding-right: 6px;
            text-align: center;
        }
        .card-controle.buscar { flex: 1.35; }
        .busca-topo {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .modo-busca-row {
            display: flex;
            gap: 6px;
        }
        .btn-modo-busca {
            flex: 1;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.10);
            color: white;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: 0.15s ease;
        }
        .btn-modo-busca.ativo {
            background: rgba(255,235,59,0.18);
            border-color: rgba(255,235,59,0.45);
            color: #ffeb3b;
        }
        .busca-campo[hidden] { display: none !important; }
        .lbl { font-size: 11px; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
        input[type="date"], input[type="text"], select {
            width: 100%;
            background: rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 10px;
            padding: 10px 12px;
            color: white;
            outline: none;
            box-sizing: border-box;
            font-size: 15px;
        }
        input::placeholder { color: rgba(255,255,255,0.45); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.85; }
        select option { color: #111; }

        .btn-sync {
            background: #ffeb3b;
            color: #042d86;
            border: none;
            border-radius: 12px;
            padding: 11px 12px;
            font-weight: 900;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }

        .status { font-size: 12px; opacity: 0.8; margin: 8px 0 0; }

        .lista { display:flex; flex-direction: column; gap: 12px; }
        .card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-left: 4px solid #ffeb3b;
            border-bottom: 2px solid #ffffff;
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .card-top { display:flex; justify-content: space-between; gap: 10px; align-items: baseline; }
        .cliente { font-size: 18px; font-weight: 900; }
        .cliente small { font-size: 12px; opacity: 0.8; font-weight: 700; }
        .rota { font-size: 12px; opacity: 0.9; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.12); padding: 4px 8px; border-radius: 999px; white-space: nowrap; }

        .estimativa {
            margin-top: 10px;
            background: rgba(0,0,0,0.22);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 10px 12px;
            display:flex;
            justify-content: space-between;
            align-items: center;
        }
        .estimativa .lbl-est { font-size: 12px; opacity: 0.85; }
        .estimativa .val { font-size: 22px; font-weight: 1000; color: #4caf50; }

        .grid { margin-top: 10px; display:grid; grid-template-columns: 1fr; gap: 8px; }
        .linha { display:flex; justify-content: space-between; gap: 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 6px; }
        .linha span { opacity: 0.8; }
        .linha strong { color:white; }
        .resumo-venda {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px 12px;
            align-items: center;
            margin-top: 10px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 12px;
        }
        .resumo-venda .meta {
            font-size: 12px;
            opacity: 0.82;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .resumo-venda .meta strong {
            color: white;
            font-size: 14px;
            margin-left: 0;
            display: block;
        }
        .badge-venda-dia {
            background: rgba(76,175,80,0.16);
            border: 1px solid rgba(76,175,80,0.34);
            color: #b9f6ca;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 14px;
            font-weight: 900;
            white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .badge-venda-dia.abaixo-media {
            background: rgba(255, 152, 0, 0.16);
            border-color: rgba(255, 193, 7, 0.34);
            color: #ffe082;
        }

        .detalhe-fotos {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed rgba(255,255,255,0.22);
        }
        .detalhe-fotos[hidden] { display: none; }
        .detalhe-status {
            padding: 14px 10px;
            text-align: center;
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
        }
        .secao-titulo {
            font-size: 13px;
            font-weight: bold;
            color: #ffeb3b;
            text-transform: uppercase;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding-bottom: 5px;
            margin: 12px 0 10px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .foto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        .foto-item {
            background: rgba(0,0,0,0.30);
            border-radius: 8px;
            padding: 5px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .foto-botao {
            display: block;
            width: 100%;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }
        .foto-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            display: block;
        }
        .foto-legenda {
            font-size: 11px;
            color: #ffffff;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .modal-foto {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            background: #06142e;
        }
        .modal-foto[hidden] { display: none; }
        .modal-foto-topo {
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 12px;
            box-sizing: border-box;
            background: #082462;
            user-select: none;
            -webkit-user-select: none;
        }
        .modal-foto-titulo {
            min-width: 0;
            color: #ffffff;
            font-size: 17px;
            font-weight: bold;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .modal-foto-fechar {
            width: 40px;
            height: 40px;
            border: 0;
            border-radius: 50%;
            background: #244f9f;
            color: #ffffff;
            font-size: 28px;
            line-height: 1;
            font-weight: normal;
            cursor: pointer;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        .modal-foto-espaco {
            width: 40px;
            flex-shrink: 0;
        }
        .modal-foto-corpo {
            position: relative;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            background: #06142e;
        }
        .modal-foto-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }
        .modal-foto-img.visivel { display: block; }
        .modal-foto-status {
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .vazia { text-align:center; opacity: 0.65; margin-top: 45px; background: rgba(0,0,0,0.18); border: 1px solid rgba(255,255,255,0.12); padding: 18px; border-radius: 14px; }

        @keyframes led-pulse {
            0%, 100% { color: #7eb8ff; text-shadow: 0 0 6px #4a90e2; }
            50%       { color: #c8e0ff; text-shadow: 0 0 12px #82bfff; }
        }
        .card-expand-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            padding: 7px 0 1px;
            border-top: 1px solid rgba(255,255,255,0.10);
            font-size: 13px;
            font-weight: bold;
            color: #7eb8ff;
            text-shadow: 0 0 6px #4a90e2;
            animation: led-pulse 2.4s ease-in-out infinite;
            user-select: none;
            -webkit-user-select: none;
        }
        .card-expand-hint .hint-icon {
            font-size: 11px;
            transition: transform 0.2s ease;
            display: inline-block;
        }
        .hint-label-recolher { display: none; }
        .card.expandido .hint-label-recolher { display: inline; }
        .card.expandido .hint-label-expandir { display: none; }
        .card.expandido .hint-icon { transform: rotate(180deg); }
        .card.expandido .card-expand-hint { animation: none; color: #a0c8ff; text-shadow: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="topo">
        <div class="titulo">Sa&uacute;de de Vendas</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="barra">
        <div class="linha-barra">
            <div class="card-controle periodo">
                <div class="lbl" style="text-align:center;">Per&iacute;odo</div>
                <select id="periodoDias">
                    <option value="15">15</option>
                    <option value="30">30</option>
                </select>
            </div>
            <div class="card-controle ordenar">
                <div class="lbl" style="text-align:center;">Ordem</div>
                <select id="ordenacao">
                    <option value="valor_menor">- &#128181;</option>
                    <option value="valor_maior">+ &#128181;</option>
                </select>
            </div>
            <div class="card-controle buscar">
                <div class="busca-topo">
                    <div class="lbl" id="lblEscolhaBusca" style="text-align:center; margin-bottom:0;">Escolha</div>
                    <div class="modo-busca-row">
                        <button type="button" class="btn-modo-busca" id="btnModoCliente">Cliente</button>
                        <button type="button" class="btn-modo-busca" id="btnModoMaquina">Máquina</button>
                    </div>
                </div>
                <input class="busca-campo" type="text" id="busca" placeholder="Nome, n&ordm; ou rota">
                <select class="busca-campo" id="buscaMaquina" hidden>
                    <option value="">Selecione a m&aacute;quina</option>
                </select>
            </div>
        </div>
    </div>

    <div id="lista" class="lista"></div>
    <div id="vazia" class="vazia" style="display:none;"></div>
</div>

<div class="modal-foto" id="modalFotoSaude" hidden>
    <div class="modal-foto-topo">
        <div class="modal-foto-espaco"></div>
        <div class="modal-foto-titulo" id="modalFotoTitulo">Imagem</div>
        <button class="modal-foto-fechar" id="btnFecharModalFoto" type="button" aria-label="Fechar imagem">&times;</button>
    </div>
    <div class="modal-foto-corpo">
        <div class="modal-foto-status" id="modalFotoCarregando">Carregando imagem...</div>
        <div class="modal-foto-status" id="modalFotoErro" hidden>N&atilde;o foi poss&iacute;vel carregar a imagem.</div>
        <img class="modal-foto-img" id="modalFotoImg" alt="Imagem ampliada">
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { verificarAutenticacao } from './auth.js';
    import { dbEscutarClientes, dbEscutarColaboradores, dbEscutarMediaDeVendas, dbEscutarEstoque, dbListarAtendimentos } from './database.js';

    verificarAutenticacao();

    const nomeLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
    let colaboradores = [];
    let autorizado = false;
    let listaBase = [];
    let mapaClientesPorId = new Map();
    let mapaClientesPorNumero = new Map();
    let termo = '';
    let modoBusca = '';
    let termoMaquina = '';
    let modoOrdenacao = 'numero_menor';
    let usuarioGestao = false;
    let nomesMaquinasEstoque = [];
    let cardExpandidoId = '';
    let atendimentosCachePromise = null;
    const detalhesFotosCache = new Map();

    const elLista = document.getElementById('lista');
    const elVazia = document.getElementById('vazia');
    const elBusca = document.getElementById('busca');
    const elBuscaMaquina = document.getElementById('buscaMaquina');
    const elLblEscolhaBusca = document.getElementById('lblEscolhaBusca');
    const elBtnModoCliente = document.getElementById('btnModoCliente');
    const elBtnModoMaquina = document.getElementById('btnModoMaquina');
    const elPeriodo = document.getElementById('periodoDias');
    const elOrdenacao = document.getElementById('ordenacao');
    const elModalFoto = document.getElementById('modalFotoSaude');
    const elModalFotoImg = document.getElementById('modalFotoImg');
    const elModalFotoTitulo = document.getElementById('modalFotoTitulo');
    const elModalFotoCarregando = document.getElementById('modalFotoCarregando');
    const elModalFotoErro = document.getElementById('modalFotoErro');
    const elBtnFecharModalFoto = document.getElementById('btnFecharModalFoto');

    function escaparHtml(valor) {
        return String(valor ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function escaparAttr(valor) {
        return escaparHtml(valor);
    }

    function obterIdCliente(cliente, reg) {
        return String(cliente?.firebaseUrl || reg?.cliente?.id || reg?.firebaseUrl || '').trim();
    }

    function obterNumeroCliente(cliente, reg) {
        return String(cliente?.numero ?? reg?.cliente?.numero ?? reg?.cliente_numero ?? '').trim();
    }

    function normalizar(txt) {
        return String(txt || '')
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .trim();
    }

    function hojeLocalYYYYMMDD() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function inicioDiaLocalFromIso(iso) {
        if (!iso) return null;
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return null;
        d.setHours(0,0,0,0);
        return d;
    }

    function inicioDiaLocalFromYMD(ymd) {
        if (!ymd) return null;
        const d = new Date(`${ymd}T00:00:00`);
        if (Number.isNaN(d.getTime())) return null;
        d.setHours(0,0,0,0);
        return d;
    }

    function diasEntre(isoUltimo, ymdAlvo) {
        const dUlt = inicioDiaLocalFromIso(isoUltimo);
        const dAlvo = inicioDiaLocalFromYMD(ymdAlvo);
        if (!dUlt || !dAlvo) return null;
        const diff = Math.round((dAlvo - dUlt) / 86400000);
        return Math.max(0, diff);
    }

    function fmtDataHora(iso) {
        if (!iso) return '&mdash;';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '&mdash;';
        return d.toLocaleString('pt-BR');
    }

    function fmtData(iso) {
        if (!iso) return '&mdash;';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '&mdash;';
        return d.toLocaleDateString('pt-BR');
    }

    function fmtDiasUltimoAtendimento(dias) {
        if (typeof dias !== 'number' || !Number.isFinite(dias)) return '&mdash;';
        return dias === 1 ? '1 dia' : `${dias} dias`;
    }

    function fmtMoeda(v) {
        return Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function imagemValida(url) {
        const texto = String(url || '').trim();
        return Boolean(texto && (texto.startsWith('data:') || texto.includes('firebasestorage') || texto.startsWith('http')));
    }

    function obterAtendimentosCache() {
        if (!atendimentosCachePromise) {
            atendimentosCachePromise = dbListarAtendimentos().catch((erro) => {
                atendimentosCachePromise = null;
                throw erro;
            });
        }
        return atendimentosCachePromise;
    }

    function obterUltimoAtendimentoCliente(atendimentos, cliente, reg) {
        const idCliente = obterIdCliente(cliente, reg);
        const numeroCliente = obterNumeroCliente(cliente, reg);
        const lista = (Array.isArray(atendimentos) ? atendimentos : [])
            .filter(atendimento => {
                const clienteAt = atendimento?.cliente || {};
                const idAt = String(clienteAt?.id || clienteAt?.firebaseUrl || '').trim();
                const numeroAt = String(clienteAt?.numero ?? atendimento?.cliente_numero ?? '').trim();
                return Boolean((idCliente && idAt === idCliente) || (numeroCliente && numeroAt === numeroCliente));
            })
            .sort((a, b) => {
                const ta = Date.parse(a?.dataHora || a?.data || a?.timestamp || '') || 0;
                const tb = Date.parse(b?.dataHora || b?.data || b?.timestamp || '') || 0;
                return tb - ta;
            });
        return lista[0] || null;
    }

    function montarHtmlThumbFoto(foto) {
        const url = String(foto?.url || '').trim();
        if (!imagemValida(url)) return '';
        const thumb = String(foto?.thumbUrl || url).trim();
        const legenda = String(foto?.titulo || 'Imagem').trim();
        return `
            <div class="foto-item">
                <button class="foto-botao" type="button" data-foto-url="${escaparAttr(url)}" data-foto-legenda="${escaparAttr(legenda)}">
                    <img src="${escaparAttr(thumb)}" loading="lazy" alt="${escaparAttr(legenda)}">
                </button>
                <div class="foto-legenda">${escaparHtml(legenda)}</div>
            </div>
        `;
    }

    function montarHtmlSecaoFotos(nome, fotos) {
        const itens = (Array.isArray(fotos) ? fotos : []).map(montarHtmlThumbFoto).filter(Boolean).join('');
        if (!itens) return '';
        return `
            <div>
                <div class="secao-titulo">${escaparHtml(nome)}</div>
                <div class="foto-grid">${itens}</div>
            </div>
        `;
    }

    async function obterDetalheFotosCliente(cliente, reg) {
        const idCache = obterIdCliente(cliente, reg) || obterNumeroCliente(cliente, reg);
        if (idCache && detalhesFotosCache.has(idCache)) return detalhesFotosCache.get(idCache);

        const atendimentos = await obterAtendimentosCache();
        const ultimoAtendimento = obterUltimoAtendimentoCliente(atendimentos, cliente, reg);
        const secoes = [];

        const fotosFicha = [];
        const fichaInstalacao = cliente?.fotoFichaInstalacao || cliente?.fotosInstalacao?.ficha || '';
        if (fichaInstalacao) {
            fotosFicha.push({
                titulo: 'Ficha',
                url: fichaInstalacao,
                thumbUrl: cliente?.fotoFichaInstalacaoThumb || fichaInstalacao
            });
        }
        if (ultimoAtendimento?.fotos?.ficha) {
            fotosFicha.push({
                titulo: 'Ficha',
                url: ultimoAtendimento.fotos.ficha,
                thumbUrl: ultimoAtendimento.fotos.fichaThumb || ultimoAtendimento.fotos.ficha
            });
        }
        if (fotosFicha.length > 0) secoes.push({ nome: 'Foto da Ficha', fotos: fotosFicha });

        const fotosMaquinas = [];
        if (Array.isArray(ultimoAtendimento?.fotos?.maquinas) && ultimoAtendimento.fotos.maquinas.length > 0) {
            ultimoAtendimento.fotos.maquinas.forEach((foto, i) => {
                const url = foto?.url || foto?.src || '';
                if (!url) return;
                fotosMaquinas.push({
                    titulo: foto?.nome ? String(foto.nome).trim() : `Maquina ${i + 1}`,
                    url,
                    thumbUrl: foto?.thumbUrl || url
                });
            });
        } else if (Array.isArray(cliente?.fotosMaquinasInstalacao)) {
            cliente.fotosMaquinasInstalacao.forEach((foto, i) => {
                const url = foto?.url || foto?.src || '';
                if (!url) return;
                fotosMaquinas.push({
                    titulo: foto?.nome ? String(foto.nome).trim() : `Maquina ${i + 1}`,
                    url,
                    thumbUrl: foto?.thumbUrl || url
                });
            });
        }
        if (fotosMaquinas.length > 0) secoes.push({ nome: 'Fotos de Maquinas', fotos: fotosMaquinas });

        const html = secoes.map(secao => montarHtmlSecaoFotos(secao.nome, secao.fotos)).join('');
        const resultado = html || '<div class="detalhe-status">Nenhuma foto encontrada para este cliente.</div>';
        if (idCache) detalhesFotosCache.set(idCache, resultado);
        return resultado;
    }

    async function carregarDetalheFotos(card, cliente, reg) {
        const detalhe = card.querySelector('.detalhe-fotos');
        if (!detalhe || detalhe.dataset.carregado === '1') return;
        detalhe.innerHTML = '<div class="detalhe-status">Carregando fotos...</div>';
        try {
            detalhe.innerHTML = await obterDetalheFotosCliente(cliente, reg);
            detalhe.dataset.carregado = '1';
        } catch (erro) {
            console.error('Erro ao carregar fotos do cliente:', erro);
            detalhe.innerHTML = '<div class="detalhe-status">Erro ao carregar fotos.</div>';
        }
    }

    function alternarCardExpandido(card, cliente, reg) {
        const id = card.dataset.cardId || '';
        const jaExpandido = card.classList.contains('expandido');
        document.querySelectorAll('.card.expandido').forEach(item => {
            item.classList.remove('expandido');
            const detalhe = item.querySelector('.detalhe-fotos');
            if (detalhe) detalhe.hidden = true;
        });

        if (jaExpandido) {
            cardExpandidoId = '';
            return;
        }

        card.classList.add('expandido');
        const detalhe = card.querySelector('.detalhe-fotos');
        if (detalhe) detalhe.hidden = false;
        cardExpandidoId = id;
        carregarDetalheFotos(card, cliente, reg);
    }

    function perfilPorNome(nome) {
        return colaboradores.find(c => c.nome === nome)?.nivel_completo || '';
    }

    function extrairNomesMaquinas(cliente) {
        const bruto = String(cliente?.equip || '').trim();
        if (!bruto) return [];

        return bruto
            .split(',')
            .map(item => String(item || '').trim())
            .map(item => item.replace(/\s*\(([^)]+)\)\s*$/, '').trim())
            .map(item => item.replace(/\s*\[Pix:\s*([^\]]+)\]\s*$/i, '').trim())
            .map(item => item.replace(/\s+/g, ' ').trim())
            .filter(Boolean);
    }

    function atualizarOpcoesMaquina() {
        const listaOrdenada = nomesMaquinasEstoque.length > 0
            ? nomesMaquinasEstoque
            : Array.from(new Set(
                Array.from(mapaClientesPorId.values()).flatMap(cliente => extrairNomesMaquinas(cliente))
              )).sort((a, b) => normalizar(a).localeCompare(normalizar(b)));

        const valorAtual = elBuscaMaquina.value;
        elBuscaMaquina.innerHTML = '<option value="">Selecione a m&aacute;quina</option>';
        listaOrdenada.forEach(nome => {
            const option = document.createElement('option');
            option.value = nome;
            option.textContent = nome;
            elBuscaMaquina.appendChild(option);
        });
        if (listaOrdenada.includes(valorAtual)) {
            elBuscaMaquina.value = valorAtual;
        } else {
            elBuscaMaquina.value = '';
            termoMaquina = '';
        }
    }

    function atualizarModoBuscaUI() {
        const clienteAtivo = modoBusca === 'cliente';
        const maquinaAtiva = modoBusca === 'maquina';
        elBtnModoCliente.classList.toggle('ativo', clienteAtivo);
        elBtnModoMaquina.classList.toggle('ativo', maquinaAtiva);
        elLblEscolhaBusca.hidden = !!modoBusca;
        elBusca.hidden = !clienteAtivo;
        elBuscaMaquina.hidden = !maquinaAtiva;
        if (clienteAtivo) {
            elBusca.placeholder = 'Nome, n\u00ba ou rota';
        }
    }

    function atualizarMapasClientes(lista) {
        mapaClientesPorId = new Map();
        mapaClientesPorNumero = new Map();

        (lista || []).forEach(cliente => {
            const id = String(cliente?.firebaseUrl || '').trim();
            const numero = String(cliente?.numero ?? '').trim();
            if (id) mapaClientesPorId.set(id, cliente);
            if (numero) mapaClientesPorNumero.set(numero, cliente);
        });
        atualizarOpcoesMaquina();
    }

    function obterClienteFonte(reg) {
        const id = String(reg?.cliente?.id || '').trim();
        if (id && mapaClientesPorId.has(id)) return mapaClientesPorId.get(id);

        const numero = String(reg?.cliente?.numero ?? reg?.cliente_numero ?? '').trim();
        if (numero && mapaClientesPorNumero.has(numero)) return mapaClientesPorNumero.get(numero);

        return reg?.cliente || {};
    }

    function obterListaBaseCompleta() {
        if (mapaClientesPorId.size === 0) return Array.isArray(listaBase) ? listaBase : [];

        const porId = new Map();
        const porNumero = new Map();

        (Array.isArray(listaBase) ? listaBase : []).forEach(reg => {
            const id = String(reg?.cliente?.id || '').trim();
            const numero = String(reg?.cliente?.numero ?? reg?.cliente_numero ?? '').trim();
            if (id) porId.set(id, reg);
            if (numero) porNumero.set(numero, reg);
        });

        return Array.from(mapaClientesPorId.values()).map(cliente => {
            const id = String(cliente?.firebaseUrl || '').trim();
            const numero = String(cliente?.numero ?? '').trim();
            const existente = (id && porId.get(id)) || (numero && porNumero.get(numero));
            if (existente) return existente;

            return {
                cliente: {
                    id,
                    numero: cliente?.numero ?? '',
                    nome: cliente?.nome || '',
                    rota: cliente?.rota || ''
                },
                cliente_numero: cliente?.numero ?? '',
                rota: cliente?.rota || '',
                atualizadoEm: null,
                ultimaCobrancaEm: null
            };
        });
    }

    function checarAutorizacao() {
        const perfil = perfilPorNome(nomeLogado);
        return String(perfil || '').includes('gestao') || String(perfil || '').includes('atendimento_2');
    }

    function atualizarOpcoesOrdenacaoPorPerfil() {
        const valorAtual = modoOrdenacao || elOrdenacao.value || 'numero_menor';
        const valorPermitido = usuarioGestao
            ? valorAtual
            : (valorAtual === 'ultimo_atendimento_maior' ? 'numero_menor' : valorAtual);

        elOrdenacao.innerHTML = `
            <option value="valor_menor">- &#128181;</option>
            <option value="valor_maior">+ &#128181;</option>
            ${usuarioGestao ? '<option value="ultimo_atendimento_maior">+ dias</option>' : ''}
        `;

        elOrdenacao.value = valorPermitido;
        if (elOrdenacao.value !== valorPermitido) {
            elOrdenacao.selectedIndex = -1;
        }
        modoOrdenacao = valorPermitido;
    }

    function ordenarLista(lista) {
        return [...lista].sort((a, b) => {
            const clienteA = obterClienteFonte(a);
            const clienteB = obterClienteFonte(b);
            const numeroA = Number(clienteA?.numero ?? a?.cliente_numero ?? Number.MAX_SAFE_INTEGER);
            const numeroB = Number(clienteB?.numero ?? b?.cliente_numero ?? Number.MAX_SAFE_INTEGER);
            const aEhNumero = Number.isFinite(numeroA);
            const bEhNumero = Number.isFinite(numeroB);

            const ea = calcularEstimativaHistorica(a)?.estimativa ?? -1;
            const eb = calcularEstimativaHistorica(b)?.estimativa ?? -1;

            if (modoOrdenacao === 'ultimo_atendimento_maior') {
                const diasA = calcularEstimativaHistorica(a)?.dias;
                const diasB = calcularEstimativaHistorica(b)?.dias;
                const aTemDias = typeof diasA === 'number' && Number.isFinite(diasA);
                const bTemDias = typeof diasB === 'number' && Number.isFinite(diasB);

                if (aTemDias && bTemDias && diasA !== diasB) return diasB - diasA;
                if (aTemDias && !bTemDias) return -1;
                if (!aTemDias && bTemDias) return 1;
                if (eb !== ea) return eb - ea;
            }

            if (modoOrdenacao === 'numero_menor') {
                if (aEhNumero && bEhNumero && numeroA !== numeroB) return numeroA - numeroB;
                if (aEhNumero && !bEhNumero) return -1;
                if (!aEhNumero && bEhNumero) return 1;
                if (eb !== ea) return eb - ea;
            }

            if (modoOrdenacao === 'numero_maior') {
                if (aEhNumero && bEhNumero && numeroA !== numeroB) return numeroB - numeroA;
                if (aEhNumero && !bEhNumero) return -1;
                if (!aEhNumero && bEhNumero) return 1;
                if (eb !== ea) return eb - ea;
            }

            if (modoOrdenacao === 'valor_maior' && eb !== ea) return eb - ea;
            if (modoOrdenacao === 'valor_menor' && eb !== ea) return ea - eb;

            const na = normalizar(clienteA?.nome || '');
            const nb = normalizar(clienteB?.nome || '');
            return na.localeCompare(nb);
        });
    }

    function calcularEstimativaHistorica(reg) {
        const vendaDia = Number(reg?.mediaVendaPorDia);
        const ultimo = reg?.ultimaCobrancaEm || null;
        const dias = diasEntre(ultimo, hojeLocalYYYYMMDD());
        if (!Number.isFinite(vendaDia) || vendaDia <= 0 || !ultimo || dias === null) {
            return { msg: 'N\u00e3o calculado', dias, estimativa: null, vendaDia: null, ultimoAtendimentoEm: ultimo };
        }
        const periodo = Number(elPeriodo.value || 15);
        const estimativa = Math.round(((vendaDia * periodo) + Number.EPSILON) * 100) / 100;
        return { msg: null, dias, estimativa, vendaDia, ultimoAtendimentoEm: ultimo };
    }

    function render() {
        if (!navigator.onLine) {
            elLista.innerHTML = '';
            elVazia.style.display = 'block';
            elVazia.innerText = 'Sem internet — esta tela depende de dados em tempo real.';
            return;
        }

        const diasProjetados = Number(elPeriodo.value || 15);
        const filtradaBusca = obterListaBaseCompleta().filter(reg => {
            const cliente = obterClienteFonte(reg);
            if (modoBusca === 'maquina') {
                if (!termoMaquina) return true;
                const maquinas = extrairNomesMaquinas(cliente);
                return maquinas.some(nome => normalizar(nome) === normalizar(termoMaquina));
            }
            if (!termo) return true;
            const campos = [
                cliente.nome,
                cliente.numero,
                cliente.rota,
                reg?.rota,
                reg?.ultimaCobrancaEm ? fmtDataHora(reg.ultimaCobrancaEm) : ''
            ];
            return campos.some(c => normalizar(c).includes(termo));
        });

        const filtrada = filtradaBusca.filter(reg => {
            const calc = calcularEstimativaHistorica(reg);
            return typeof calc?.vendaDia === 'number' && calc.vendaDia >= 1;
        });

        const listaOrdenada = ordenarLista(filtrada);

        if (listaOrdenada.length === 0) {
            elLista.innerHTML = '';
            elVazia.style.display = 'block';
            elVazia.innerText = termo ? 'Nenhum cliente encontrado para este filtro.' : 'Nenhum registro dispon\u00edvel.';
            return;
        }

        elVazia.style.display = 'none';
        elLista.innerHTML = '';
        const listaCalculada = listaOrdenada.map(reg => {
            const calc = calcularEstimativaHistorica(reg);
            return { reg, calc };
        });
        const vendasDiaValidas = listaCalculada
            .map(item => item.calc?.vendaDia)
            .filter(valor => typeof valor === 'number' && Number.isFinite(valor));
        const mediaVendaDia = vendasDiaValidas.length
            ? (vendasDiaValidas.reduce((soma, valor) => soma + valor, 0) / vendasDiaValidas.length)
            : null;

        listaCalculada.forEach(({ reg, calc }) => {
            const cliente = obterClienteFonte(reg);
            const numero = cliente.numero ?? reg?.cliente_numero ?? '&mdash;';
            const nome = cliente.nome || '&mdash;';
            const rota = cliente.rota || reg?.rota || '&mdash;';
            const ultimoTxt = fmtDiasUltimoAtendimento(calc?.dias);
            const vendaDiaTxt = (typeof calc?.vendaDia === 'number') ? fmtMoeda(calc.vendaDia) : '&mdash;';
            const estTxt = (typeof calc?.estimativa === 'number') ? fmtMoeda(calc.estimativa) : '&mdash;';
            const abaixoDaMedia = mediaVendaDia !== null && typeof calc?.vendaDia === 'number' && calc.vendaDia < mediaVendaDia;
            const idCard = obterIdCliente(cliente, reg) || obterNumeroCliente(cliente, reg) || String(numero);
            const cardEstaExpandido = idCard && idCard === cardExpandidoId;
            const card = document.createElement('div');
            card.className = `card${cardEstaExpandido ? ' expandido' : ''}`;
            card.dataset.cardId = idCard;
            card.innerHTML = `
                <div class="card-top">
                    <div class="cliente">N&ordm; ${escaparHtml(numero)} - ${escaparHtml(nome)} <small></small></div>
                    <div class="rota">Rota: ${escaparHtml(rota)}</div>
                </div>

                <div class="estimativa">
                    <div>
                        <div class="lbl-est">Estimativa ${diasProjetados} dias</div>
                        ${calc?.msg ? `<div style="margin-top:4px; font-size:12px; opacity:0.8;">${calc.msg}</div>` : ``}
                    </div>
                    <div class="val">${estTxt}</div>
                </div>

                <div class="resumo-venda">
                    <div class="meta"><span>&Uacute;ltimo atendimento</span><strong>${ultimoTxt}</strong></div>
                    <div class="badge-venda-dia${abaixoDaMedia ? ' abaixo-media' : ''}">Venda/dia ${vendaDiaTxt}</div>
                </div>
                <div class="card-expand-hint">
                    <span>📷</span>
                    <span class="hint-label-expandir">Ver fotos</span>
                    <span class="hint-label-recolher">Fechar fotos</span>
                    <span class="hint-icon">▼</span>
                </div>
                <div class="detalhe-fotos" hidden></div>
            `;
            const detalhe = card.querySelector('.detalhe-fotos');
            if (cardEstaExpandido && detalhe) {
                detalhe.hidden = false;
                carregarDetalheFotos(card, cliente, reg);
            }
            card.addEventListener('click', (event) => {
                if (event.target.closest('.foto-botao')) return;
                alternarCardExpandido(card, cliente, reg);
            });
            elLista.appendChild(card);
        });
    }

    function abrirModalFoto(url, legenda) {
        if (!url) return;
        elModalFotoTitulo.textContent = legenda || 'Imagem';
        elModalFoto.hidden = false;
        elModalFotoImg.classList.remove('visivel');
        elModalFotoImg.removeAttribute('src');
        elModalFotoCarregando.hidden = false;
        elModalFotoErro.hidden = true;
        document.body.style.overflow = 'hidden';
        elModalFotoImg.onload = () => {
            elModalFotoCarregando.hidden = true;
            elModalFotoErro.hidden = true;
            elModalFotoImg.classList.add('visivel');
        };
        elModalFotoImg.onerror = () => {
            elModalFotoCarregando.hidden = true;
            elModalFotoErro.hidden = false;
            elModalFotoImg.classList.remove('visivel');
        };
        elModalFotoImg.src = url;
        if (!history.state?.fotoSaudeVendas) {
            history.pushState({ fotoSaudeVendas: true }, '');
        }
    }

    function fecharModalFoto(voltarHistorico = true) {
        if (elModalFoto.hidden) return;
        elModalFoto.hidden = true;
        elModalFotoImg.classList.remove('visivel');
        elModalFotoImg.removeAttribute('src');
        document.body.style.overflow = '';
        if (voltarHistorico && history.state?.fotoSaudeVendas) {
            history.back();
        }
    }

    elLista.addEventListener('click', (event) => {
        const botaoFoto = event.target.closest('.foto-botao');
        if (!botaoFoto) return;
        event.stopPropagation();
        abrirModalFoto(botaoFoto.dataset.fotoUrl, botaoFoto.dataset.fotoLegenda);
    });

    elBtnFecharModalFoto.addEventListener('click', fecharModalFoto);
    elModalFoto.addEventListener('click', (event) => {
        if (event.target === elModalFoto) fecharModalFoto();
    });
    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') fecharModalFoto();
    });
    window.addEventListener('popstate', () => {
        if (!elModalFoto.hidden) {
            fecharModalFoto(false);
        }
    });

    elBusca.addEventListener('input', () => {
        termo = normalizar(elBusca.value);
        render();
    });
    elBuscaMaquina.addEventListener('change', () => {
        termoMaquina = elBuscaMaquina.value || '';
        render();
    });
    elBtnModoCliente.addEventListener('click', () => {
        modoBusca = 'cliente';
        termoMaquina = '';
        elBuscaMaquina.value = '';
        atualizarModoBuscaUI();
        render();
        setTimeout(() => elBusca.focus(), 0);
    });
    elBtnModoMaquina.addEventListener('click', () => {
        modoBusca = 'maquina';
        termo = '';
        elBusca.value = '';
        atualizarModoBuscaUI();
        render();
        setTimeout(() => elBuscaMaquina.focus(), 0);
    });
    elPeriodo.addEventListener('change', render);
    elOrdenacao.addEventListener('change', () => {
        modoOrdenacao = elOrdenacao.value || 'numero_menor';
        render();
    });

    // Default: próximos 15 dias
    atualizarModoBuscaUI();
    elPeriodo.value = '15';
    elOrdenacao.value = 'numero_menor';

    dbEscutarColaboradores((lista) => {
        colaboradores = lista || [];
        usuarioGestao = String(perfilPorNome(nomeLogado) || '').includes('gestao');
        autorizado = checarAutorizacao();
        if (!nomeLogado) {
            window.playAlert('Nenhum usu\u00e1rio logado. Volte ao Menu Inicial e selecione seu nome.').then(() => {
                window.location.replace('index.html');
            });
            return;
        }
        if (!autorizado) {
            window.playAlert('Acesso restrito (Gest\u00e3o e Atendimento N\u00edvel 2).').then(() => {
                window.location.replace('index.html');
            });
            return;
        }
        atualizarOpcoesOrdenacaoPorPerfil();
        render();
    });

    dbEscutarMediaDeVendas((lista) => {
        listaBase = Array.isArray(lista) ? lista : [];
        render();
    });

    dbEscutarClientes((lista) => {
        atualizarMapasClientes(Array.isArray(lista) ? lista : []);
        render();
    });

    dbEscutarEstoque((lista) => {
        nomesMaquinasEstoque = (Array.isArray(lista) ? lista : [])
            .filter(item => item.categoria === 'maquina')
            .map(item => String(item.nome || '').trim())
            .filter(Boolean)
            .sort((a, b) => normalizar(a).localeCompare(normalizar(b)));
        atualizarOpcoesMaquina();
    });

    window.addEventListener('online', render);
    window.addEventListener('offline', render);
</script>
</body>
</html>
