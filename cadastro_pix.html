<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Pix</title>

    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        input, textarea, select { -webkit-user-select: text; user-select: text; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0b2256;
            display: flex;
            justify-content: center;
            color: white;
            min-height: 100vh;
            position: relative;
            z-index: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top, rgba(54, 105, 214, 0.55), transparent 34%),
                linear-gradient(180deg, #11317a 0%, #0b2256 42%, #071634 100%);
            z-index: -1;
        }

        .app {
            width: 100%;
            max-width: 440px;
            padding: 18px;
            box-sizing: border-box;
        }

        /* ── TOPO ── */
        .topo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 22px;
            position: relative;
            padding: 10px 0 2px;
        }
        .titulo-wrap { text-align: center; }
        .titulo {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
        }
        .subtitulo {
            margin-top: 4px;
            font-size: 13px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: #8faad4;
        }
        .btn-home {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: rgba(255,255,255,0.16);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.24);
            transition: background 0.15s;
        }
        .btn-home:active { background: rgba(255,255,255,0.34); transform: translateY(-50%) scale(0.93); }
        .btn-home svg { width: 22px; height: 22px; fill: white; }

        /* ── ACCORDION ── */
        .secao { margin-bottom: 14px; }

        .secao-header {
            background: #4467a8;
            border: 3px solid #d7dce3;
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: background 0.15s, border-radius 0.2s;
            min-height: 38px;
        }
        .secao-header:active { transform: translateY(1px); }
        .secao-header.aberta { border-radius: 22px 22px 0 0; border-bottom-color: rgba(255,255,255,0.2); }

        .secao-icone {
            position: absolute;
            left: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
        }
        .secao-titulo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .secao-seta {
            position: absolute;
            right: 18px;
            font-size: 14px;
            transition: transform 0.25s;
            color: rgba(255,255,255,0.85);
        }
        .secao-seta.girada { transform: rotate(180deg); }

        .secao-corpo {
            display: none;
            background: rgba(8, 22, 65, 0.75);
            border: 3px solid #d7dce3;
            border-top: none;
            border-radius: 0 0 22px 22px;
            padding: 16px;
            backdrop-filter: blur(8px);
        }
        .secao-corpo.aberto { display: block; }

        /* Badge contador no header */
        .badge-count {
            position: absolute;
            right: 46px;
            background: #4ade80;
            color: #0b2256;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* ── BUSCA ── */
        .busca-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .busca-row input {
            background: rgba(255,255,255,0.09);
            border: 1.5px solid rgba(255,255,255,0.22);
            border-radius: 22px;
            padding: 9px 14px;
            color: white;
            font-size: 15px;
            font-family: Arial, Helvetica, sans-serif;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .busca-row input::placeholder { color: rgba(255,255,255,0.38); }
        .busca-row input:focus { border-color: rgba(100,170,255,0.65); }
        .busca-numero-input { width: 90px; flex-shrink: 0; text-align: center; }
        .busca-geral-input  { flex: 1; min-width: 0; }

        /* ── CARDS PIX ── */
        .pix-card {
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.13);
            border-radius: 18px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }
        .pix-card:last-child { margin-bottom: 0; }

        /* Linha 1: "Pix 1   Grua G" */
        .pix-linha1 {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 3px;
        }
        .pix-numero {
            font-size: 17px;
            font-weight: bold;
            color: #7eb3ff;
            white-space: nowrap;
        }
        .pix-badge {
            font-size: 13px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .pix-badge-instalado {
            background: #1a4730;
            color: #4ade80;
            border: 1.5px solid #4ade80;
        }
        .pix-badge-retirado {
            background: #4a1f0a;
            color: #fb923c;
            border: 1.5px solid #fb923c;
        }
        .pix-numero-instalado { color: #4ade80; }
        .pix-numero-retirado { color: #f87171; }
        .pix-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            line-height: 1;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        .pix-status-badge.instalado {
            background: #166534;
            border: 1px solid #4ade80;
            color: #dcfce7;
        }
        .pix-status-badge.retirado {
            background: #7f1d1d;
            border: 1px solid #f87171;
            color: #fee2e2;
        }
        .pix-equipamento-nome {
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        /* Linha 2: "N. 01 - Peixe do vanor" */
        .pix-identificacao {
            font-size: 14px;
            color: #a8c4e8;
            margin-bottom: 8px;
        }

        /* Linha 3+4: Situação, Técnico, Data */
        .pix-rodape {
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.09);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .pix-rodape-linha {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 13px;
            flex-wrap: wrap;
        }
        .pix-rodape-item { color: #ccd9ec; }
        .pix-rodape-item .lbl { color: #dbeafe; }

        .situacao-txt-instalado { color: #4ade80; font-weight: bold; }
        .situacao-txt-retirado  { color: #f87171; font-weight: bold; }

        .vazio {
            text-align: center;
            color: rgba(255,255,255,0.38);
            font-size: 14px;
            padding: 22px 0 10px;
        }

        /* ── FORMULÁRIOS ── */
        .form-grupo { margin-bottom: 14px; }

        .form-label {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
            display: block;
        }
        .form-input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,255,255,0.09);
            border: 1.5px solid rgba(255,255,255,0.18);
            border-radius: 14px;
            padding: 10px 14px;
            color: white;
            font-size: 15px;
            font-family: Arial, Helvetica, sans-serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.28); }
        .form-input:focus { border-color: rgba(100,160,255,0.65); background: rgba(255,255,255,0.12); }

        .form-input-destaque {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 4px;
            color: #7eb3ff;
            padding: 12px 14px;
        }

        .form-row { display: flex; gap: 10px; }
        .form-row .form-grupo { flex: 1; }

        /* ── MOTIVO (grid de botões) ── */
        .motivo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .motivo-btn {
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.18);
            border-radius: 14px;
            padding: 13px 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }
        .motivo-btn.ativo { background: rgba(68,103,168,0.5); border-color: #7eb3ff; }
        .motivo-btn:active { transform: scale(0.96); }
        .motivo-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
        .motivo-texto { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: bold; }

        /* ── CONDIÇÃO (toggle row) ── */
        .condicao-row { display: flex; gap: 8px; }
        .condicao-btn {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.16);
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.15s;
            color: rgba(255,255,255,0.65);
        }
        .condicao-btn.ativo-ok       { background: #1a4730; border-color: #4ade80; color: #4ade80; }
        .condicao-btn.ativo-defeito  { background: #4a1f0a; border-color: #fb923c; color: #fb923c; }
        .condicao-btn.ativo-danif    { background: #3d0808; border-color: #f87171; color: #f87171; }
        .condicao-btn:active { transform: scale(0.96); }

        /* ── INFO CARD RETIRADA ── */
        .ret-info {
            display: none;
            background: rgba(251,146,60,0.1);
            border: 1.5px solid rgba(251,146,60,0.35);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #ffd0a8;
            line-height: 1.6;
        }

        /* ── DIVISOR ── */
        .divisor { height: 1px; background: rgba(255,255,255,0.1); margin: 14px 0; }

        /* ── BOTÃO SALVAR ── */
        .btn-salvar {
            width: 100%;
            border: none;
            border-radius: 28px;
            padding: 14px;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            transition: filter 0.15s, transform 0.1s;
            margin-top: 6px;
        }
        .btn-salvar:hover  { filter: brightness(1.1); }
        .btn-salvar:active { filter: brightness(0.9); transform: translateY(1px); }
        .btn-salvar-verde   { background: #1e7e3e; }
        .btn-salvar-laranja { background: #b84a1e; }

        /* select option escuro */
        select option { background: #0f2a66; }

        /* ── ADICIONEI PIX — LISTA DE CLIENTES/MÁQUINAS ── */
        .add-vazio {
            text-align: center;
            color: rgba(255,255,255,0.38);
            font-size: 15px;
            padding: 20px 0 8px;
        }
        .cliente-grupo {
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .cliente-grupo-header {
            padding: 11px 14px 9px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(68, 103, 168, 0.25);
        }
        .cliente-grupo-nome {
            font-size: 17px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.2px;
        }
        .cliente-grupo-nome .num-cliente {
            color: #ffffff;
            margin-right: 4px;
        }
        .maquina-item { border-bottom: 1px solid rgba(255,255,255,0.06); }
        .maquina-item:last-child { border-bottom: none; }
        .maquina-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            cursor: pointer;
        }
        .maquina-row:active { background: rgba(255,255,255,0.06); }
        .maquina-nome-txt {
            font-size: 16px;
            font-weight: bold;
            color: white;
        }
        .maquina-contador-txt {
            font-size: 14px;
            font-weight: bold;
            color: #fb923c;
            margin-top: 3px;
        }
        .maquina-contador-inline {
            color: #fb923c;
            margin-left: 8px;
        }
        .retirada-check-wrap {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        .retirada-check-input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #fb923c;
            cursor: pointer;
        }
        .retirada-confirma-wrap {
            padding-top: 10px;
        }
        .btn-pix-add {
            font-size: 13px;
            font-weight: bold;
            padding: 5px 13px;
            border-radius: 20px;
            white-space: nowrap;
            border: 1.5px solid rgba(74,222,128,0.5);
            color: #4ade80;
            background: rgba(74,222,128,0.1);
            flex-shrink: 0;
        }
        .btn-pix-add.aberto {
            border-color: rgba(251,146,60,0.5);
            color: #fb923c;
            background: rgba(251,146,60,0.1);
        }
        .maquina-form-inline {
            display: none;
            padding: 4px 14px 14px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .maquina-form-inline.aberto {
            display: block;
            animation: surgirForm 0.2s ease;
        }
        @keyframes surgirForm {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .pix-form-row {
            display: flex;
            gap: 8px;
            margin: 10px 0 8px;
        }
        .pix-input-nr {
            width: 78px;
            flex-shrink: 0;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #7eb3ff;
            letter-spacing: 2px;
        }
        .pix-input-cnt { flex: 1; font-size: 16px; }
        .pix-erro {
            font-size: 13px;
            color: #f87171;
            margin-bottom: 8px;
        }
        .btn-confirmar-pix {
            width: 100%;
            background: #1e7e3e;
            border: none;
            border-radius: 22px;
            padding: 11px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            transition: filter 0.15s;
        }
        .btn-confirmar-pix:active { filter: brightness(0.85); transform: translateY(1px); }

        /* ── RETIRADA INLINE NOS CARDS ── */
        .btn-retirar-card {
            margin-top: 10px;
            width: 100%;
            background: rgba(251,146,60,0.1);
            border: 1.5px solid rgba(251,146,60,0.35);
            border-radius: 20px;
            padding: 7px 14px;
            color: #fb923c;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            transition: background 0.15s;
        }
        .btn-retirar-card:active { background: rgba(251,146,60,0.22); }
        .btn-instalar-card {
            margin-top: 10px;
            width: 100%;
            background: rgba(250,204,21,0.1);
            border: 1.5px solid rgba(250,204,21,0.35);
            border-radius: 20px;
            padding: 7px 14px;
            color: #facc15;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            transition: background 0.15s;
        }
        .btn-instalar-card:active { background: rgba(250,204,21,0.22); }
        .card-ret-form {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 12px;
            padding-top: 12px;
            animation: surgirForm 0.2s ease;
        }
        .card-ret-form.aberto { display: block; }

        /* ── SEÇÃO GESTOR ── */
        .gestor-item {
            background: rgba(124,58,237,0.1);
            border: 1px solid rgba(124,58,237,0.3);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .gestor-cliente-nome {
            font-weight: bold;
            font-size: 14px;
            color: #c4b5fd;
            margin-bottom: 8px;
        }
        .gestor-equip-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 8px 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .gestor-badge-tipo {
            font-size: 11px;
            font-weight: bold;
            border-radius: 20px;
            padding: 2px 10px;
            white-space: nowrap;
        }
        .gestor-badge-adicao  { background: #16a34a; color: white; }
        .gestor-badge-retirada { background: #b91c1c; color: white; }
        .gestor-equip-nome { flex: 1; font-size: 13px; color: #e2e8f0; min-width: 80px; }
        .gestor-pix-nr { color: #7eb3ff; font-weight: bold; font-size: 13px; white-space: nowrap; }
        .btn-gestor-confirmar {
            background: #6d28d9;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 6px 14px;
            font: bold 13px Arial;
            cursor: pointer;
            white-space: nowrap;
            transition: filter 0.15s;
        }
        .btn-gestor-confirmar:active { filter: brightness(0.85); transform: translateY(1px); }
    </style>
</head>

<body style="visibility: hidden;">
<div class="app">

    <!-- TOPO -->
    <div class="topo">
        <div class="titulo-wrap">
            <div class="titulo">&#128160; Cadastro Pix</div>
            <div class="subtitulo">Controle de dispositivos</div>
        </div>
        <div class="btn-home" onclick="history.back()">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         SEÇÃO 1 — LOCAIS COM PIX
    ══════════════════════════════════════ -->
    <div class="secao">
        <div class="secao-header" id="hdr-locais" onclick="toggleSecao('locais')">
            <span class="secao-icone">&#128205;</span>
            <span class="secao-titulo">Locais com Pix</span>
            <span class="badge-count" id="count-pix" style="display:none">0</span>
            <span class="secao-seta" id="seta-locais">&#9660;</span>
        </div>
        <div class="secao-corpo" id="corpo-locais">
            <div class="busca-row">
                <input type="number" id="busca-numero"
                       class="busca-numero-input"
                       placeholder="N&#176; Pix"
                       min="1" max="999"
                       inputmode="numeric"
                       oninput="this.value=this.value.replace(/[^0-9]/g,'');filtrarCards()">
                <input type="text" id="busca-geral"
                       class="busca-geral-input"
                       placeholder="&#128269; Cliente / Equipamento"
                       oninput="filtrarCards()">
            </div>
            <div id="lista-pix">
                <div class="vazio">Carregando...</div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         SEÇÃO 2 — ADICIONEI PIX
    ══════════════════════════════════════ -->
    <div class="secao">
        <div class="secao-header" id="hdr-adicionar" onclick="toggleSecao('adicionar')"
             style="background:#1e5c30; border-color:#4ade80;">
            <span class="secao-icone">&#10133;</span>
            <span class="secao-titulo">Adicionei Pix</span>
            <span class="secao-seta" id="seta-adicionar" style="color:#4ade80;">&#9660;</span>
        </div>
        <div class="secao-corpo" id="corpo-adicionar" style="border-color:#4ade80;">
            <div class="busca-row">
                <input type="text" id="add-busca"
                       class="busca-geral-input"
                       placeholder="&#128269; Buscar por n&#250;mero ou nome do cliente"
                       oninput="renderizarAdicionarPix()">
            </div>
            <div class="add-vazio" id="add-carregando">Carregando clientes...</div>
            <div class="add-vazio" id="add-tudo-ok" style="display:none">
                &#9989; Todos os equipamentos j&#225; t&#234;m Pix instalado
            </div>
            <div id="add-lista-clientes"></div>
        </div>
    </div>


    <!-- SEÇÃO GESTOR — CONFIRMAR PIX -->
    <div class="secao" id="secao-gestor" style="display:none">
        <div class="secao-header" id="hdr-gestor" onclick="toggleSecao('gestor')"
             style="background:#4c1d95; border-color:#a78bfa;">
            <span class="secao-icone">&#10003;&#65039;</span>
            <span class="secao-titulo">Confirmar Gestor</span>
            <span class="badge-count" id="count-gestor" style="display:none">0</span>
            <span class="secao-seta" id="seta-gestor" style="color:#a78bfa;">&#9660;</span>
        </div>
        <div class="secao-corpo" id="corpo-gestor" style="border-color:#a78bfa;">

                &#9989; Nenhuma pend&#234;ncia para confirmar
            </div>
            <div id="gestor-lista"></div>
        </div>

</div><!-- /app -->

<script type="module">
import { verificarAutenticacao } from './auth.js';
import {
    getDatabase, ref, push, onValue, update, set, get
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import {
    app,
    dbEscutarClientes,
    dbEscutarAtendimentos,
    dbAplicarPendenciasManutencaoCliente,
    dbEscutarColaboradores
} from './database.js';

verificarAutenticacao();

const db   = getDatabase(app);
const PATH = 'cadastros_pix';

// Estado em memória
window._pixData            = {};
window._pixCardsData       = [];
window._clientesData       = [];
window._clientesPixData    = {};
window._atendimentosData   = [];
window._motivoSelecionado  = null;
window._condicaoSelecionada = null;
let _listaColaboradores    = [];
let _maquinaAberta        = null;
let _maquinaRetiradaAberta = null;
let _retEstado            = {};
let _cardRetiradaAberta   = null;
let _retCardEstado        = {};
let _cardInstalacaoAberta = null;
let _isGestor = false;

function aplicarPermissaoGestorRapida(lista = []) {
    _listaColaboradores = Array.isArray(lista) ? lista : [];
    const nome = String(localStorage.getItem('usuarioLogado') || '').trim();

    const perfil = normalizarTexto(usuario ? (usuario.nivel_completo || '') : '');
    _isGestor = perfil.includes('gestao');
    const secao = document.getElementById('secao-gestor');
    if (secao) secao.style.display = _isGestor ? '' : 'none';

        window.renderizarGestorPix();

// ──────────────────────────────────────────────
// ACCORDION — só uma seção aberta por vez
// ──────────────────────────────────────────────
window.toggleSecao = function(secao) {
    if (secao === 'gestor' && typeof window.renderizarGestorPix === 'function') {
        window.renderizarGestorPix();
    }
    let abrindoSecao = false;
    ['locais','adicionar','retirar','gestor'].forEach(s => {
        const hdr   = document.getElementById('hdr-'  + s);
        const corpo = document.getElementById('corpo-' + s);
        const seta  = document.getElementById('seta-'  + s);
        if (!hdr || !corpo || !seta) return;
        if (s === secao) {
            const abrindo = !corpo.classList.contains('aberto');
            corpo.classList.toggle('aberto',  abrindo);
            hdr.classList.toggle('aberta',    abrindo);
            seta.classList.toggle('girada',   abrindo);
            if (abrindo) abrindoSecao = s;
        } else {
            corpo.classList.remove('aberto');
            hdr.classList.remove('aberta');
            seta.classList.remove('girada');
        }
    });
    if (abrindoSecao === 'adicionar') renderizarAdicionarPix();
    if (abrindoSecao === 'retirar')   renderizarRetirarPix();
};

// ──────────────────────────────────────────────
// SELEÇÃO DE MOTIVO E CONDIÇÃO
// ──────────────────────────────────────────────
window.selecionarMotivo = function(el, valor) {

            .forEach(b => b.classList.remove('ativo'));

};

// ──────────────────────────────────────────────
// DATA/HORA ATUAL (Brasília)
// ──────────────────────────────────────────────
function dataAtualLocal() {
    const agora = new Date();
    agora.setMinutes(agora.getMinutes() - agora.getTimezoneOffset());
    return agora.toISOString().slice(0, 16);
}
const retDataEl = document.getElementById('ret-data');
if (retDataEl) retDataEl.value = dataAtualLocal();

function normalizarPix(valor) {
    return String(valor || '').trim();
}

function normalizarTexto(valor) {
    return String(valor || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .trim();
}

function normalizarStatusCadastro(valor) {
    return normalizarTexto(valor).replace(/\s+/g, '_');
}

function normalizarBuscaLivre(valor) {
    return String(valor || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9]+/g, ' ')
        .toLowerCase()
        .trim();
}

function descreverErroFirebase(erro, contextoPadrao) {
    const codigo = String(erro?.code || '').trim();
    const mensagem = String(erro?.message || erro || '').trim();
    const partes = [];
    if (contextoPadrao) partes.push(contextoPadrao);
    if (codigo) partes.push(`[${codigo}]`);
    if (mensagem) partes.push(mensagem);
    return partes.join(' ').trim() || 'Erro desconhecido.';
}

function obterNomeAutorEnvio(envio) {
    return String(envio?.enviadoPor || envio?.autor || envio?.responsavel || envio?.atendente || '').trim();
}

function extrairDataRegistro(envio) {
    if (envio?.situacao === 'retirado') {
        return envio?.data_retirada || envio?.data || envio?.criado_em || '';
    }
    return envio?.data || envio?.data_retirada || envio?.criado_em || '';
}

function obterTimestampRegistro(envio) {
    const iso = extrairDataRegistro(envio);
    const t = Date.parse(iso || '');
    return Number.isNaN(t) ? 0 : t;
}

function atendimentoEhRetiradaRelevante(envio) {
    if (!(envio?.origemRegistro === 'manutencao' || envio?.manutencao)) return false;
    const info = envio?.manutencao || {};
    return info?.pontoEncerrado === true || (Array.isArray(info?.equipamentosRetirados) && info.equipamentosRetirados.length > 0);
}

function atendimentoCombinaComCliente(envio, cliente) {
    const clienteEnvio = envio?.cliente || {};
    const idEnvio = String(clienteEnvio?.id || clienteEnvio?.firebaseUrl || '').trim();
    const idCliente = String(cliente?.firebaseUrl || '').trim();
    if (idEnvio && idCliente && idEnvio === idCliente) return true;

    const numeroEnvio = normalizarPix(clienteEnvio?.numero);
    const numeroCliente = normalizarPix(cliente?.numero);
    if (numeroEnvio && numeroCliente && numeroEnvio === numeroCliente) return true;

    return normalizarTexto(clienteEnvio?.nome) === normalizarTexto(cliente?.nome);
}

function atendimentoCombinaComEquipamento(envio, nomeEquipamento) {
    const info = envio?.manutencao || {};
    if (info?.pontoEncerrado === true) return true;
    const retirados = Array.isArray(info?.equipamentosRetirados) ? info.equipamentosRetirados : [];
    const equipamentoNorm = normalizarTexto(nomeEquipamento);
    return retirados.some(item => normalizarTexto(item) === equipamentoNorm);
}

function obterUltimaInfoRetirada(cliente, nomeEquipamento) {
    return (window._atendimentosData || [])
        .filter(atendimentoEhRetiradaRelevante)
        .filter(envio => atendimentoCombinaComCliente(envio, cliente))
        .filter(envio => atendimentoCombinaComEquipamento(envio, nomeEquipamento))
        .sort((a, b) => obterTimestampRegistro(b) - obterTimestampRegistro(a))[0] || null;
}

function escolherRegistroPix(atual, proximo) {
    if (!atual) return proximo;

    const tsAtual = obterTimestampRegistro(atual);
    const tsProximo = obterTimestampRegistro(proximo);
    if (tsAtual !== tsProximo) {
        return tsProximo > tsAtual ? proximo : atual;
    }

    const mesmoPix = normalizarPix(atual?.numero_pix) === normalizarPix(proximo?.numero_pix);
    const mesmaIdentificacao = normalizarTexto(atual?.identificacao) === normalizarTexto(proximo?.identificacao);
    const mesmoEquipamento = normalizarTexto(atual?.equipamento) === normalizarTexto(proximo?.equipamento);
    const atualEhAdicao = (atual?.situacao === 'instalado') || (atual?.situacao === 'em_analise' && atual?.pendenciaTipo === 'adicao');
    const proximoEhAdicao = (proximo?.situacao === 'instalado') || (proximo?.situacao === 'em_analise' && proximo?.pendenciaTipo === 'adicao');
    const atualEhRetirada = (atual?.situacao === 'retirado') || (atual?.situacao === 'em_analise' && atual?.pendenciaTipo === 'retirada');
    const proximoEhRetirada = (proximo?.situacao === 'retirado') || (proximo?.situacao === 'em_analise' && proximo?.pendenciaTipo === 'retirada');

    if (mesmoPix && mesmaIdentificacao && mesmoEquipamento) {
        if (atualEhAdicao !== proximoEhAdicao) {
            return proximoEhAdicao ? proximo : atual;
        }
        if (atualEhRetirada !== proximoEhRetirada) {
            return proximoEhRetirada ? proximo : atual;
        }
    }

    const atualEmAnalise = atual?.situacao === 'em_analise';
    const proximoEmAnalise = proximo?.situacao === 'em_analise';
    if (atualEmAnalise !== proximoEmAnalise) {
        return proximoEmAnalise ? proximo : atual;
    }

    const atualManual = atual?.origem !== 'clientes';
    const proximoManual = proximo?.origem !== 'clientes';
    if (atualManual !== proximoManual) {
        return proximoManual ? proximo : atual;
    }

    const atualInstalado = atual?.situacao === 'instalado';
    const proximoInstalado = proximo?.situacao === 'instalado';
    if (atualInstalado !== proximoInstalado) {
        return proximoInstalado ? proximo : atual;
    }

    return proximo;
}

function obterEquipamentosDetalhadosCliente(cliente) {
    if (Array.isArray(cliente?.equipDetalhes) && cliente.equipDetalhes.length > 0) {
        return cliente.equipDetalhes
            .map((item, index) => ({
                rowId: String(item?.rowId || `equip_${index + 1}`),
                nome: String(item?.nome || '').trim(),
                qtd: String(item?.qtd || item?.quantidade || '1').trim() || '1',
                pix: normalizarPix(item?.pix),
                contador: String(item?.contador || '').trim(),
                pixRetiradoPendente: normalizarPix(item?.pixRetiradoPendente),
                contadorRetiradoPendente: String(item?.contadorRetiradoPendente || '').trim(),
                retiradaPendenteEm: String(item?.retiradaPendenteEm || '').trim(),
                retiradaPendentePor: String(item?.retiradaPendentePor || '').trim(),
                manutencaoPendente: String(item?.manutencaoPendente || '').trim().toLowerCase(),
                aguardandoConfirmacao: item?.aguardandoConfirmacao === true,
                manutencaoPendenteEm: String(item?.manutencaoPendenteEm || '').trim(),
                manutencaoPendentePor: String(item?.manutencaoPendentePor || '').trim()
            }))
            .filter(item => item.nome);
    }

    if (!cliente?.equip) return [];

    return String(cliente.equip)
        .split(', ')
        .map((item, index) => {
            let nome = item;
            let qtd = '1';
            let pix = '';

            const regexQtd = /\s*\(([^)]+)\)$/;
            const matchQtd = nome.match(regexQtd);
            if (matchQtd) {
                qtd = matchQtd[1];
                nome = nome.replace(regexQtd, '');
            }

            const regexPix = /\s*\[Pix:\s*([^\]]+)\]$/;
            const matchPix = nome.match(regexPix);
            if (matchPix) {
                pix = matchPix[1];
                nome = nome.replace(regexPix, '');
            }

            return {
                rowId: `equip_${index + 1}`,
                nome: String(nome || '').trim(),
                qtd: String(qtd || '1').trim() || '1',
                pix: normalizarPix(pix),
                contador: '',
                pixRetiradoPendente: '',
                contadorRetiradoPendente: '',
                retiradaPendenteEm: '',
                retiradaPendentePor: '',
                manutencaoPendente: '',
                aguardandoConfirmacao: false,
                manutencaoPendenteEm: '',
                manutencaoPendentePor: ''
            };
        })
        .filter(item => item.nome);
}

function serializarEquipamentosTextoCliente(equipDetalhes) {
    return (Array.isArray(equipDetalhes) ? equipDetalhes : [])
        .filter(item => String(item?.nome || '').trim())
        .map(item => {
            const nome = String(item?.nome || '').trim();
            const qtd = String(item?.qtd || item?.quantidade || '1').trim() || '1';
            const pix = normalizarPix(item?.pix);
            const base = `${nome}${qtd !== '1' ? ` (${qtd})` : ''}`;
            return pix ? `${base} [Pix: ${pix}]` : base;
        })
        .join(', ');
}

function montarIdentificacaoCliente(cliente) {
    const numero = normalizarPix(cliente?.numero);
    const nome = String(cliente?.nome || '').trim();
    const numeroFmt = numero ? `N. ${numero.padStart(2, '0')}` : '';

    if (numeroFmt && nome) return `${numeroFmt} - ${nome}`;
    return numeroFmt || nome || '—';
}

function mapearPixDosClientes(clientes) {
    const registros = {};

    (Array.isArray(clientes) ? clientes : []).forEach(cliente => {
        obterEquipamentosDetalhadosCliente(cliente).forEach((item, index) => {
            const idBase = cliente?.firebaseUrl || cliente?.numero || cliente?.nome || 'cliente';
            const equipamento = String(item?.nome || '').trim();
            const clienteId = String(cliente?.firebaseUrl || '').trim();
            const identificacao = montarIdentificacaoCliente(cliente);
            const tipoPendencia = item.aguardandoConfirmacao
                ? String(item?.manutencaoPendente || '').trim().toLowerCase()
                : '';

            const numeroPixRetirado = normalizarPix(item?.pixRetiradoPendente || '');
            if (numeroPixRetirado) {
                registros[`cliente:${idBase}:ret:${numeroPixRetirado}:${index}`] = {
                    numero_pix: numeroPixRetirado,
                    cliente: String(cliente?.nome || '').trim(),
                    equipamento,
                    identificacao,
                    tecnico: String(item?.retiradaPendentePor || item?.manutencaoPendentePor || '').trim(),
                    data: String(item?.retiradaPendenteEm || item?.manutencaoPendenteEm || '').trim(),
                    situacao: 'em_analise',
                    pendenciaTipo: 'retirada',
                    origem: 'clientes',
                    clienteId,
                    rowId: String(item?.rowId || '').trim(),
                    contador: String(item?.contadorRetiradoPendente || '').trim()
                };
            }

            const numeroPixAtual = normalizarPix(item?.pix);
            if (!numeroPixAtual) return;

            const emAnalise = tipoPendencia === 'adicao' || tipoPendencia === 'retirada';
            const pendenciaTipoAtual = emAnalise ? tipoPendencia : '';
            const nomeResponsavel = emAnalise
                ? String(item?.manutencaoPendentePor || '').trim()
                : String(cliente?.cadastradoPor || cliente?.ponto_aberto || '').trim();
            const dataReferencia = emAnalise
                ? String(item?.manutencaoPendenteEm || '').trim()
                : (cliente?.dataCadastro || cliente?.dataCadastroDia || '');

            registros[`cliente:${idBase}:atual:${numeroPixAtual}:${index}`] = {
                numero_pix: numeroPixAtual,
                cliente: String(cliente?.nome || '').trim(),
                equipamento,
                identificacao,
                tecnico: nomeResponsavel,
                data: dataReferencia,
                situacao: emAnalise ? 'em_analise' : 'instalado',
                pendenciaTipo: pendenciaTipoAtual,
                origem: 'clientes',
                clienteId,
                rowId: String(item?.rowId || '').trim(),
                contador: String(item?.contador || '').trim()
            };
        });
    });

    return registros;
}

function obterPixParaExibicao() {
    return Object.entries(window._clientesPixData || {}).map(([id, pix]) => ({ id, ...pix }));
}

function sincronizarTelaPix() {
    window._pixCardsData = obterPixParaExibicao();
    renderizarCards(window._pixCardsData);
    atualizarContador(window._pixCardsData);
}

// ──────────────────────────────────────────────
// OUVIR DADOS DO FIREBASE
// ──────────────────────────────────────────────
onValue(ref(db, PATH), snap => {
    window._pixData = snap.val() || {};
    sincronizarTelaPix();
});

dbEscutarClientes((lista) => {
    window._clientesData = Array.isArray(lista) ? lista : [];
    window._clientesPixData = mapearPixDosClientes(window._clientesData);
    sincronizarTelaPix();
    renderizarAdicionarPix();
    renderizarRetirarPix();
    renderizarGestorPix();
});

const cacheColab = localStorage.getItem('cache_colaboradores');
if (cacheColab) {
    try {
        aplicarPermissaoGestorRapida(JSON.parse(cacheColab));
    } catch (_) {}
}

dbEscutarColaboradores((lista) => {
    localStorage.setItem('cache_colaboradores', JSON.stringify(Array.isArray(lista) ? lista : []));
    aplicarPermissaoGestorRapida(lista);
});

dbEscutarAtendimentos((lista) => {
    window._atendimentosData = Array.isArray(lista) ? lista : [];
    window._clientesPixData = mapearPixDosClientes(window._clientesData);
    sincronizarTelaPix();
});

function atualizarContador(data) {
    const n = (window._clientesData || []).reduce((total, cliente) => {
        const ativos = obterEquipamentosDetalhadosCliente(cliente)
            .filter(item => item.pix && item.manutencaoPendente !== 'retirada')
            .length;
        return total + ativos;
    }, 0);
    const badge = document.getElementById('count-pix');
    if (n > 0) {
        badge.textContent = n;
        badge.style.display = 'inline-block';
    } else {
        badge.style.display = 'none';
    }
}

// ──────────────────────────────────────────────
// RENDERIZAR CARDS
// ──────────────────────────────────────────────
window.renderizarCards = function(data) {
    const lista    = document.getElementById('lista-pix');
    const busNr    = (document.getElementById('busca-numero').value || '').trim().toLowerCase();
    const busGeral = (document.getElementById('busca-geral').value  || '').trim().toLowerCase();

    const registros = Array.isArray(data)
        ? [...data]
        : Object.entries(data || {}).map(([id, p]) => ({ id, ...p }));

    // Instalados primeiro, depois por número
    registros.sort((a, b) => {
        return (parseInt(a.numero_pix) || 0) - (parseInt(b.numero_pix) || 0);
    });

    const filtrados = registros.filter(p => {
        const matchNr    = !busNr    || String(p.numero_pix || '').includes(busNr);
        const haystack   = [p.cliente, p.equipamento, p.identificacao, p.tecnico]
                           .join(' ').toLowerCase();
        const matchGeral = !busGeral || haystack.includes(busGeral);
        return matchNr && matchGeral;
    });

    if (filtrados.length === 0) {
        lista.innerHTML = '<div class="vazio">Nenhum Pix encontrado</div>';
        return;
    }

    lista.innerHTML = filtrados.map(p => {
        const situacao = String(p.situacao || '').trim().toLowerCase();
        const pendenciaTipo = String(p.pendenciaTipo || '').trim().toLowerCase();
        const emAnalise = situacao === 'em_analise';
        const instalado = situacao === 'instalado' || (emAnalise && pendenciaTipo === 'adicao');
        const retirado = situacao === 'retirado';
        const situacaoTxt = emAnalise ? 'Em an&#225;lise' : (instalado ? 'Instalado' : 'Retirado');
        const situacaoCls = emAnalise
            ? (pendenciaTipo === 'adicao' ? 'situacao-txt-instalado' : 'situacao-txt-retirado')
            : (instalado ? 'situacao-txt-instalado' : 'situacao-txt-retirado');
        const exibirComoInstalado = situacao === 'instalado' || (emAnalise && pendenciaTipo === 'adicao');
        const responsavel = exibirComoInstalado ? (p.tecnico || '') : (p.tecnico_retirada || p.tecnico || '');
        const dataBase    = exibirComoInstalado ? p.data : (p.data_retirada || p.data);
        const dataExib    = dataBase ? formatarData(dataBase) : '—';
        const rotuloResp  = exibirComoInstalado ? 'T&#233;cnico:' : 'Informado por:';
        const pixKey      = String(p.numero_pix || 'x').replace(/\W/g,'_');
        const contador    = p.contador || '';

        const btnRetirar = situacao === 'instalado' && p.clienteId && p.rowId ? `
            <button class="btn-retirar-card" id="btnret-${pixKey}"
                    onclick="toggleRetiradaCard('${pixKey}')">
                &#8593; Retirar Pix
            </button>
            <div class="card-ret-form" id="retform-${pixKey}">
                <div class="pix-erro" id="crderro-${pixKey}" style="display:none;margin-top:0;margin-bottom:8px;"></div>
                <button class="btn-confirmar-pix" style="background:#7a2e0e;margin-top:0;"
                        onclick="confirmarRetiradaCard('${p.clienteId}','${p.rowId}','${p.numero_pix}','${pixKey}')">
                    &#128463;&#65039; Confirmar Retirada
                </button>
            </div>` : '';

        const btnInstalar = retirado && p.clienteId && p.rowId ? `
            <button class="btn-instalar-card" id="btnins-${pixKey}"
                    onclick="toggleInstalacaoCard('${pixKey}')">
                + Instalar Pix
            </button>
            <div class="card-ret-form" id="insform-${pixKey}">
                <button class="btn-confirmar-pix" style="background:#ca8a04;margin-top:0;"
                        onclick="confirmarInstalacaoCard('${p.clienteId}','${p.rowId}','${p.numero_pix}','${pixKey}')">
                    + Confirmar Instala&#231;&#227;o
                </button>
            </div>` : '';

        return `
        <div class="pix-card" id="pixcard-${pixKey}">
            <div class="pix-linha1">
                <span class="pix-numero">Pix ${esc(p.numero_pix) || '—'}</span>
                <span class="pix-badge ${instalado ? 'pix-badge-instalado' : 'pix-badge-retirado'}">${instalado ? '+' : '−'}</span>
                <span class="pix-equipamento-nome">${esc(p.equipamento)}</span>
            </div>
            <div class="pix-identificacao">${esc(p.identificacao)}</div>
            <div class="pix-rodape">
                <div class="pix-rodape-linha">
                    <span class="pix-rodape-item"><span class="lbl">Situa&#231;&#227;o:</span><span class="${situacaoCls}"> ${situacaoTxt}</span></span>
                    <span class="pix-rodape-item"><span class="lbl">${rotuloResp}</span> ${esc(responsavel)}</span>
                </div>
                <div class="pix-rodape-linha">
                    <span class="pix-rodape-item"><span class="lbl">Data:</span> ${dataExib}</span>
                    ${contador ? `<span class="pix-rodape-item"><span class="lbl">Contador:</span> ${esc(contador)}</span>` : ''}
                </div>
            </div>
            ${btnRetirar}
            ${btnInstalar}
        </div>`;
    }).join('');
};

window.filtrarCards = function() {
    renderizarCards(window._pixCardsData);
};

function formatarData(iso) {
    try {
        const d  = new Date(iso);
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const yy = d.getFullYear();
        const hh = String(d.getHours()).padStart(2,'0');
        const mi = String(d.getMinutes()).padStart(2,'0');
        return `${dd}/${mm}/${yy} ${hh}:${mi}`;
    } catch { return iso; }
}

function esc(v) {
    if (!v) return '—';
    return String(v)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _pixEmUso() {
    const em_uso = new Set();
    obterPixParaExibicao().forEach(p => {
        const situacao = String(p?.situacao || '').trim().toLowerCase();
        const pendenciaTipo = String(p?.pendenciaTipo || '').trim().toLowerCase();
        const bloqueiaUso = situacao === 'instalado' || (situacao === 'em_analise' && pendenciaTipo === 'adicao');
        if (bloqueiaUso && p?.numero_pix) {
            em_uso.add(String(p.numero_pix).trim());
        }
    });
    return em_uso;
}

window.renderizarAdicionarPix = function() {
    const container  = document.getElementById('add-lista-clientes');
    const carregando = document.getElementById('add-carregando');
    const tudoOk     = document.getElementById('add-tudo-ok');
    if (!container) return;

    carregando.style.display = 'none';

    const busca = normalizarBuscaLivre(document.getElementById('add-busca')?.value || '');

    const clientesFiltrados = (window._clientesData || [])
        .map(c => ({
            ...c,
            semPix: obterEquipamentosDetalhadosCliente(c).filter(
                e => !e.pix && (!e.aguardandoConfirmacao || e.manutencaoPendente === 'retirada' || e.pixRetiradoPendente)
            )
        }))
        .filter(c => c.semPix.length > 0)
        .filter(c => {
            if (!busca) return true;
            const numeroRaw = String(c.numero || '').trim();
            const numeroFmt = /^\d+$/.test(numeroRaw) ? numeroRaw.padStart(2, '0') : numeroRaw;
            const haystack = normalizarBuscaLivre([
                c.nome,
                numeroRaw,
                numeroFmt,
                montarIdentificacaoCliente(c),
                ...c.semPix.map(e => e.nome)
            ].join(' '));
            return haystack.includes(busca);
        })
        .sort((a, b) => {
            const na = parseInt(a.numero || '9999');
            const nb = parseInt(b.numero || '9999');
            return na - nb;
        });

    if (clientesFiltrados.length === 0) {
        tudoOk.style.display = 'block';
        container.innerHTML  = '';
        return;
    }
    tudoOk.style.display = 'none';

    container.innerHTML = clientesFiltrados.map(c => {
        const cId   = c.firebaseUrl;
        const titulo = montarIdentificacaoCliente(c);
        const maquinas = c.semPix.map(e => {
            const chave = `${cId}__${e.rowId}`;
            return `
            <div class="maquina-item" id="maqitem-${chave}">
                <div class="maquina-row" onclick="toggleMaquinaForm('${chave}')">
                    <span class="maquina-nome-txt">&#127918; ${esc(e.nome)}</span>
                    <span class="btn-pix-add" id="btnpix-${chave}">&#9889; Pix</span>
                </div>
                <div class="maquina-form-inline" id="formpix-${chave}">
                    <div class="pix-form-row">
                        <input type="text" class="form-input pix-input-nr"
                               id="pixnr-${chave}" placeholder="N°"
                               inputmode="numeric" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                               oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                               onblur="validarPixAdicionarAoSair('${chave}')">
                        <input type="text" class="form-input pix-input-cnt"
                               id="pixcnt-${chave}" placeholder="Contador"
                               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                    </div>
                    <div class="pix-erro" id="pixerro-${chave}" style="display:none"></div>
                    <button class="btn-confirmar-pix" style="background:#16a34a;"
                            onclick="confirmarPixMaquina('${cId}','${e.rowId}','${chave}')">
                        + Confirmar Instala&#231;&#227;o
                    </button>
                </div>
            </div>`;
        }).join('');

        // Separa "N. 01" do "- Nome" para colorir diferente
        const partes = titulo.match(/^(N\.\s*\d+)\s*-\s*(.+)$/);
        const tituloHtml = partes
            ? `<span class="num-cliente">${esc(partes[1])}</span>${esc(partes[2])}`
            : esc(titulo);

        return `
        <div class="cliente-grupo">
            <div class="cliente-grupo-header">
                <span class="cliente-grupo-nome">&#128205; ${tituloHtml}</span>
            </div>
            ${maquinas}
        </div>`;
    }).join('');
}

window.toggleMaquinaForm = function(chave) {
    if (!validarBuscaAdicionarPixObrigatoria()) return;
    const form = document.getElementById('formpix-' + chave);
    const btn  = document.getElementById('btnpix-'  + chave);
    if (!form) return;

        const fAnt = document.getElementById('formpix-' + _maquinaAberta);

        if (fAnt) fAnt.classList.remove('aberto');

    }

    form.classList.toggle('aberto', abrindo);
    btn.classList.toggle('aberto',  abrindo);
    btn.innerHTML = abrindo ? '&#215; Fechar' : '&#9889; Pix';
    _maquinaAberta = abrindo ? chave : null;

    if (abrindo) setTimeout(() => document.getElementById('pixnr-' + chave)?.focus(), 150);

window.confirmarPixMaquina = async function(clienteId, rowId, chave) {
    if (!validarBuscaAdicionarPixObrigatoria()) return;
    const pixNum   = String(document.getElementById('pixnr-'   + chave)?.value || '').trim();
    const contador = String(document.getElementById('pixcnt-'  + chave)?.value || '').trim();
    const usuarioLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
    const dataInstalacao = new Date().toISOString();
    const erroEl   = document.getElementById('pixerro-' + chave);

    const mostrarErro = (msg) => {
        erroEl.textContent   = msg;
        erroEl.style.display = 'block';
    };
    erroEl.style.display = 'none';

    if (!pixNum) return exibirAvisoPadrao('Informe o n\u00famero do Pix.');
    if (!contador) return exibirAvisoPadrao('Informe o n\u00famero do contador.');

    if (_pixEmUso().has(pixNum)) {
        return exibirAvisoPadrao(`Pix ${pixNum} j\u00e1 est\u00e1 instalado em outro equipamento.`);
    }

    const cliente = (window._clientesData || []).find(c => c.firebaseUrl === clienteId);
    if (!cliente) return mostrarErro('Cliente n\u00e3o encontrado.');

    // Copia profunda preservando todos os campos originais
    let equips = Array.isArray(cliente?.equipDetalhes) && cliente.equipDetalhes.length > 0
        ? JSON.parse(JSON.stringify(cliente.equipDetalhes))
        : obterEquipamentosDetalhadosCliente(cliente).map(e => ({ ...e }));

    const idx = equips.findIndex(e => String(e?.rowId || '') === rowId);
    if (idx === -1) return mostrarErro('Equipamento n\u00e3o encontrado.');

    const pixNovoNormalizado = normalizarPix(pixNum);
    const pixRetiradoNormalizado = normalizarPix(equips[idx].pixRetiradoPendente || '');
    const pixAtualNormalizado = normalizarPix(equips[idx].pix || '');
    const retiradaMesmoPix = equips[idx].manutencaoPendente === 'retirada'
        && (pixRetiradoNormalizado === pixNovoNormalizado || (!pixRetiradoNormalizado && pixAtualNormalizado === pixNovoNormalizado));

    if (retiradaMesmoPix) {
        equips[idx].pixRetiradoPendente = '';
        equips[idx].contadorRetiradoPendente = '';
        equips[idx].retiradaPendenteEm = '';
        equips[idx].retiradaPendentePor = '';
    } else if (!equips[idx].pixRetiradoPendente && equips[idx].manutencaoPendente === 'retirada' && equips[idx].pix) {
        equips[idx].pixRetiradoPendente = String(equips[idx].pix || '').trim();
        equips[idx].contadorRetiradoPendente = String(equips[idx].contador || '').trim();
        equips[idx].retiradaPendenteEm = String(equips[idx].manutencaoPendenteEm || dataInstalacao).trim();
        equips[idx].retiradaPendentePor = String(equips[idx].manutencaoPendentePor || usuarioLogado).trim();
    }

    equips[idx].pix = pixNum;
    if (contador) equips[idx].contador = contador;
    equips[idx].manutencaoPendente = 'adicao';
    equips[idx].aguardandoConfirmacao = true;
    equips[idx].manutencaoPendenteEm = dataInstalacao;
    equips[idx].manutencaoPendentePor = usuarioLogado;

    try {
        await update(ref(db, `clientes/${clienteId}`), {
            equipDetalhes: equips,
            equip: serializarEquipamentosTextoCliente(equips),
            statusCadastro: 'em_analise'
        });

        await push(ref(db, PATH), {
            numero_pix    : pixNum,
            cliente       : String(cliente.nome || '').trim(),
            identificacao : montarIdentificacaoCliente(cliente),
            equipamento   : String(equips[idx].nome || '').trim(),
            tecnico       : usuarioLogado,
            data          : dataInstalacao,
            contador      : contador,
            situacao      : 'instalado',
            origem        : 'adicionei_pix',
            criado_em     : dataInstalacao
        });

        await set(ref(db, 'metadata/clientes_versao'), Date.now());

        const mensagem = `Pix ${pixNum} enviado para an\u00e1lise do gestor.`;
        if (window.playAlert) {
            window.playAlert(mensagem);
        } else {
            alert(mensagem);
        }
    } catch (e) {
        mostrarErro('Erro ao salvar. Tente novamente.');
    }
};

window.toggleMaquinaRetirada = function(chave, forcarEstado = null) {
    const form = document.getElementById('formpixret-' + chave);
    const check = document.getElementById('retcheck-' + chave);
    if (!form) return;

    const abrindo = typeof forcarEstado === 'boolean'
        ? forcarEstado
        : !form.classList.contains('aberto');

    if (abrindo && !validarBuscaRetiradaPixObrigatoria()) {
        if (check) check.checked = false;
        return;
    }

    if (_maquinaRetiradaAberta && _maquinaRetiradaAberta !== chave) {
        const fAnt = document.getElementById('formpixret-' + _maquinaRetiradaAberta);
        const cAnt = document.getElementById('retcheck-'   + _maquinaRetiradaAberta);
        if (fAnt) fAnt.classList.remove('aberto');
        if (cAnt) cAnt.checked = false;
    }

    form.classList.toggle('aberto', abrindo);
    if (check) check.checked = abrindo;
    _maquinaRetiradaAberta = abrindo ? chave : null;
};

window.confirmarRetiradaMaquina = async function(clienteId, rowId, pixNum, chave) {
    if (!validarBuscaRetiradaPixObrigatoria()) return;
    const usuarioLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
    const dataRetirada = new Date().toISOString();

    const cliente = (window._clientesData || []).find(c => c.firebaseUrl === clienteId);
    if (!cliente) {
        if (window.playAlert) {
            window.playAlert('Cliente n\u00e3o encontrado.');
        } else {
            alert('Cliente n\u00e3o encontrado.');
        }
        return;
    }

    const equips = obterEquipamentosDetalhadosCliente(cliente);
    const itemSelecionado = equips.find(e => String(e?.rowId || '') === rowId);
    if (!itemSelecionado) {
        if (window.playAlert) {
            window.playAlert('Máquina do Pix não encontrada no cliente.');
        } else {
            alert('Máquina do Pix não encontrada no cliente.');
        }
        return;
    }

    const nomeEquipamento = String(itemSelecionado?.nome || '').trim();

    try {
        try {
            await dbAplicarPendenciasManutencaoCliente(clienteId, {
                atendente: usuarioLogado,
                equipamentosRetiradosDetalhes: [{
                    nome: nomeEquipamento,
                    pix: String(pixNum || '').trim()
                }]
            });
        } catch (erroCliente) {
            throw new Error(descreverErroFirebase(erroCliente, 'Falha ao marcar a máquina do cliente.'));
        }

        try {
            await update(ref(db, `clientes/${clienteId}`), { statusCadastro: 'em_analise' });
        } catch (erroStatus) {
            throw new Error(descreverErroFirebase(erroStatus, 'Falha ao marcar o cliente em análise.'));
        }

        const chaveFirebase = Object.keys(window._pixData).find(
            k => String(window._pixData[k].numero_pix) === String(pixNum)
        );

        if (chaveFirebase) {
            try {
                await update(ref(db, `${PATH}/${chaveFirebase}`), {
                    situacao         : 'retirado',
                    tecnico_retirada : usuarioLogado,
                    data_retirada    : dataRetirada,
                    equipamento      : nomeEquipamento,
                    identificacao    : montarIdentificacaoCliente(cliente),
                    motivo_retirada  : 'manutencao',
                    condicao_retirada: 'analise',
                    destino_retirada : 'analise'
                });
            } catch (erroPixExistente) {
                throw new Error(descreverErroFirebase(erroPixExistente, 'Falha ao atualizar o cadastro do Pix.'));
            }
        } else {
            try {
                await push(ref(db, PATH), {
                    numero_pix       : pixNum,
                    cliente          : String(cliente.nome || '').trim(),
                    identificacao    : montarIdentificacaoCliente(cliente),
                    equipamento      : nomeEquipamento,
                    situacao         : 'retirado',
                    tecnico_retirada : usuarioLogado,
                    data_retirada    : dataRetirada,
                    motivo_retirada  : 'manutencao',
                    condicao_retirada: 'analise',
                    destino_retirada : 'analise',
                    criado_em        : new Date().toISOString()
                });
            } catch (erroPixNovo) {
                throw new Error(descreverErroFirebase(erroPixNovo, 'Falha ao registrar um novo cadastro de Pix retirado.'));
            }
        }

        try {
            await set(ref(db, 'metadata/clientes_versao'), Date.now());
        } catch (erroVersao) {
            throw new Error(descreverErroFirebase(erroVersao, 'Falha ao atualizar a versão dos clientes.'));
        }

        if (window.playAlert) {
            window.playAlert(`Retirada do Pix ${pixNum} registrada e marcada em análise.`);
        } else {
            alert(`Retirada do Pix ${pixNum} registrada e marcada em análise.`);
        }
    } catch (e) {
        console.error('Erro ao confirmar retirada do Pix:', e);
        const detalhe = descreverErroFirebase(e, 'Erro ao salvar a retirada.');
        if (window.playAlert) {
            window.playAlert(detalhe);
        } else {
            alert(detalhe);
        }
    }
};

        } else if (!equips[idx].pixRetiradoPendente && equips[idx].manutencaoPendente === 'retirada' && equips[idx].pix) {
            equips[idx].pixRetiradoPendente = String(equips[idx].pix || '').trim();
            equips[idx].contadorRetiradoPendente = String(equips[idx].contador || '').trim();
            equips[idx].retiradaPendenteEm = String(equips[idx].manutencaoPendenteEm || dataInstalacao).trim();
            equips[idx].retiradaPendentePor = String(equips[idx].manutencaoPendentePor || usuarioLogado).trim();
        }
        equips[idx].pix = pixNum;
        equips[idx].manutencaoPendente = 'adicao';
        equips[idx].aguardandoConfirmacao = true;
        equips[idx].manutencaoPendenteEm = dataInstalacao;
        equips[idx].manutencaoPendentePor = usuarioLogado;
    }

    const nomeEquipamento = idx !== -1 ? String(equips[idx]?.nome || '').trim() : '';

    try {
        try {
            await update(ref(db, `clientes/${clienteId}`), {
                equipDetalhes: equips,
                equip: serializarEquipamentosTextoCliente(equips),
                statusCadastro: 'em_analise'
            });
        } catch (erroCliente) {
            throw new Error(descreverErroFirebase(erroCliente, 'Falha ao atualizar o cliente.'));
        }

        try {
            await push(ref(db, PATH), {
                numero_pix    : pixNum,
                cliente       : String(cliente.nome || '').trim(),
                identificacao : montarIdentificacaoCliente(cliente),
                equipamento   : nomeEquipamento,
                situacao      : 'instalado',
                tecnico       : usuarioLogado,
                data          : dataInstalacao,
                origem        : 'instalacao_card',
                criado_em     : dataInstalacao
            });
        } catch (erroPixNovo) {
            throw new Error(descreverErroFirebase(erroPixNovo, 'Falha ao registrar o Pix instalado.'));
        }

        try {
            await set(ref(db, 'metadata/clientes_versao'), Date.now());
        } catch (erroVersao) {
            throw new Error(descreverErroFirebase(erroVersao, 'Falha ao atualizar a vers\u00e3o dos clientes.'));
        }

        if (window.playAlert) {
            window.playAlert(`Pix ${pixNum} enviado para an\u00e1lise do gestor.`);
        } else {
            alert(`Pix ${pixNum} enviado para an\u00e1lise do gestor.`);
        }
    } catch (e) {
        console.error('Erro ao confirmar instala\u00e7\u00e3o do Pix:', e);
        const detalhe = descreverErroFirebase(e, 'Erro ao salvar a instala\u00e7\u00e3o.');
        if (window.playAlert) {
            window.playAlert(detalhe);
        } else {
            alert(detalhe);
        }
    }
};

// ──────────────────────────────────────────────
// GESTOR — RENDERIZAR PENDÊNCIAS
// ──────────────────────────────────────────────
window.renderizarGestorPix = function() {
    if (!_isGestor) return;
    const lista  = document.getElementById('gestor-lista');
    const vazio  = document.getElementById('gestor-vazio');
    const badge  = document.getElementById('count-gestor');
    if (!lista) return;

    const clientesPendentes = (window._clientesData || [])
        .map(c => ({
            ...c,
            pendentes: obterEquipamentosDetalhadosCliente(c).flatMap(e => {
                const pendencias = [];
                const rowId = String(e?.rowId || '').trim();
                const pixRetirado = String(e?.pixRetiradoPendente || '').trim();
                const pixAtual = String(e?.pix || '').trim();
                const duplicadoMesmoPix = pixRetirado && pixAtual && pixRetirado === pixAtual;

                if (pixRetirado && !duplicadoMesmoPix) {
                    pendencias.push({
                        rowId,
                        tipo: 'retirada',
                        nome: String(e?.nome || '').trim(),
                        pix: pixRetirado,
                        por: String(e?.retiradaPendentePor || e?.manutencaoPendentePor || '').trim()
                    });
                } else if (e.aguardandoConfirmacao && e.manutencaoPendente === 'retirada' && pixAtual && !duplicadoMesmoPix) {
                    pendencias.push({
                        rowId,
                        tipo: 'retirada',
                        nome: String(e?.nome || '').trim(),
                        pix: pixAtual,
                        por: String(e?.manutencaoPendentePor || '').trim()
                    });
                }

                if (e.aguardandoConfirmacao && e.manutencaoPendente === 'adicao' && pixAtual) {
                    pendencias.push({
                        rowId,
                        tipo: 'adicao',
                        nome: String(e?.nome || '').trim(),
                        pix: pixAtual,
                        por: String(e?.manutencaoPendentePor || '').trim()
                    });
                }

                return pendencias;
            })
        }))
        .filter(c => c.pendentes.length > 0);

    const total = clientesPendentes.reduce((s, c) => s + c.pendentes.length, 0);
    badge.textContent = total;
    badge.style.display = total > 0 ? 'inline-block' : 'none';

    if (clientesPendentes.length === 0) {
        vazio.style.display = 'block';
        lista.innerHTML = '';
        return;
    }
    vazio.style.display = 'none';

    // Delegação de eventos — mais confiável que onclick inline em módulo ES6
    lista.onclick = function(ev) {
        const btn = ev.target.closest('.btn-gestor-confirmar');
        if (!btn || btn.disabled) return;
        window.confirmarGestorItem(btn, btn.dataset.clienteid, btn.dataset.rowid, btn.dataset.tipo);
    };

    lista.innerHTML = clientesPendentes.map(c => {
        const cId    = c.firebaseUrl;
        const titulo = montarIdentificacaoCliente(c);

        const itens = c.pendentes.map(e => {
            const tipo      = e.tipo;
            const badgeCls  = tipo === 'adicao' ? 'gestor-badge-adicao' : 'gestor-badge-retirada';
            const tipoLabel = tipo === 'adicao' ? '+ Colocado' : '&minus; Retirado';
            const pixInfo   = e.pix ? `<span class="gestor-pix-nr">Pix ${esc(e.pix)}</span>` : '';
            const porQuem   = e.por
                ? `<span style="font-size:11px;color:#94a3b8;">${esc(e.por)}</span>`
                : '';
            return `
            <div class="gestor-equip-row">
                <span class="gestor-badge-tipo ${badgeCls}">${tipoLabel}</span>
                <span class="gestor-equip-nome">${esc(e.nome)}</span>
                ${pixInfo}
                ${porQuem}
                <button class="btn-gestor-confirmar"
                        data-clienteid="${cId}"
                        data-rowid="${e.rowId}"
                        data-tipo="${tipo}">
                    Confirmar
                </button>
            </div>`;
        }).join('');

        const partes = titulo.match(/^(N\.\s*\d+)\s*-\s*(.+)$/);
        const tituloHtml = partes
            ? `<span class="num-cliente">${esc(partes[1])}</span>${esc(partes[2])}`
            : esc(titulo);

        return `
        <div class="gestor-item">
            <div class="gestor-cliente-nome">&#128205; ${tituloHtml}</div>
            ${itens}
        </div>`;
    }).join('');
};

// ──────────────────────────────────────────────
// GESTOR — CONFIRMAR ITEM
// ──────────────────────────────────────────────
window.confirmarGestorItem = async function(btnEl, clienteId, rowId, tipo) {
    if (btnEl) { btnEl.disabled = true; btnEl.textContent = '...'; }

    const restaurarBtn = () => { if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'Confirmar'; } };

    try {
        const cliente = (window._clientesData || []).find(c => c.firebaseUrl === clienteId);
        if (!cliente) {
            restaurarBtn();
            alert('Cliente não encontrado. Recarregue a página.');
            return;
        }

        let equips = Array.isArray(cliente?.equipDetalhes) && cliente.equipDetalhes.length > 0
            ? JSON.parse(JSON.stringify(cliente.equipDetalhes))
            : obterEquipamentosDetalhadosCliente(cliente).map(e => ({ ...e }));

        const idx = equips.findIndex(e => String(e?.rowId || '') === rowId);
        if (idx === -1) {
            restaurarBtn();
            alert('Equipamento não encontrado. Recarregue a página.');
            return;
        }

        if (tipo === 'retirada') {
            equips[idx].pixRetiradoPendente = '';
            equips[idx].contadorRetiradoPendente = '';
            equips[idx].retiradaPendenteEm = '';
            equips[idx].retiradaPendentePor = '';
            if (equips[idx].manutencaoPendente === 'retirada') {
                equips[idx].pix      = '';
                equips[idx].contador = '';
            }
        }
        if (tipo === 'adicao' && String(equips[idx].pixRetiradoPendente || '').trim() === String(equips[idx].pix || '').trim()) {
            equips[idx].pixRetiradoPendente = '';
            equips[idx].contadorRetiradoPendente = '';
            equips[idx].retiradaPendenteEm = '';
            equips[idx].retiradaPendentePor = '';
        }
        if (tipo === 'adicao' || equips[idx].manutencaoPendente === 'retirada') {
            equips[idx].manutencaoPendente    = '';
            equips[idx].aguardandoConfirmacao = false;
            equips[idx].manutencaoPendenteEm  = '';
            equips[idx].manutencaoPendentePor = '';
        }

        const patch = {
            equipDetalhes: equips,
            equip: serializarEquipamentosTextoCliente(equips)
        };
        const aindaPendente = equips.some(e => e.aguardandoConfirmacao || e.pixRetiradoPendente);
        if (!aindaPendente) patch.statusCadastro = 'ativo';

        await update(ref(db, `clientes/${clienteId}`), patch);
        await set(ref(db, 'metadata/clientes_versao'), Date.now());

        if (window.playAlert) await window.playAlert('Confirmado com sucesso.');
        else alert('Confirmado com sucesso.');
    } catch (e) {
        restaurarBtn();
        const detalhe = descreverErroFirebase(e, 'Erro ao confirmar.');
        alert(detalhe);
    }
};

window.selecionarMotivoCard = function(pixKey, el) {
    document.querySelectorAll(`#crdmotivos-${pixKey} .motivo-btn`).forEach(b => b.classList.remove('ativo'));
    el.classList.add('ativo');
    _retCardEstado[pixKey] = _retCardEstado[pixKey] || {};
    _retCardEstado[pixKey].motivo = el.dataset.valor;
};

window.selecionarCondicaoCard = function(pixKey, el) {
    document.querySelectorAll(`#crdcond-${pixKey} .condicao-btn`).forEach(b => b.className = 'condicao-btn');
    el.classList.add(el.dataset.cls);
    _retCardEstado[pixKey] = _retCardEstado[pixKey] || {};
    _retCardEstado[pixKey].condicao = el.dataset.valor;
};

window.confirmarRetiradaCard = async function(clienteId, rowId, pixNum, pixKey) {
    if (!validarBuscaRetiradaPixObrigatoria()) return;
    const usuarioLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
    const dataRetirada = new Date().toISOString();

    const cliente = (window._clientesData || []).find(c => c.firebaseUrl === clienteId);
    if (!cliente) {
        if (window.playAlert) {
            window.playAlert('Cliente n\u00e3o encontrado.');
        } else {
            alert('Cliente n\u00e3o encontrado.');
        }
        return;
    }

    const equips = obterEquipamentosDetalhadosCliente(cliente);
    const itemSelecionado = equips.find(e => String(e?.rowId || '') === rowId);
    if (!itemSelecionado) {
        if (window.playAlert) {
            window.playAlert('M\u00e1quina do Pix n\u00e3o encontrada no cliente.');
        } else {
            alert('M\u00e1quina do Pix n\u00e3o encontrada no cliente.');
        }
        return;
    }

    const nomeEquipamento = String(itemSelecionado?.nome || '').trim();

    try {
        try {
            await dbAplicarPendenciasManutencaoCliente(clienteId, {
                atendente: usuarioLogado,
                equipamentosRetiradosDetalhes: [{
                    nome: nomeEquipamento,
                    pix: String(pixNum || '').trim()
                }]
            });
        } catch (erroCliente) {
            throw new Error(descreverErroFirebase(erroCliente, 'Falha ao marcar a m\u00e1quina do cliente.'));
        }

        try {
            await update(ref(db, `clientes/${clienteId}`), { statusCadastro: 'em_analise' });
        } catch (erroStatus) {
            throw new Error(descreverErroFirebase(erroStatus, 'Falha ao marcar o cliente em an\u00e1lise.'));
        }

        const chaveFirebase = Object.keys(window._pixData).find(
            k => String(window._pixData[k].numero_pix) === String(pixNum)
        );

        if (chaveFirebase) {
            try {
                await update(ref(db, `${PATH}/${chaveFirebase}`), {
                    situacao         : 'retirado',
                    tecnico_retirada : usuarioLogado,
                    data_retirada    : dataRetirada,
                    equipamento      : nomeEquipamento,
                    identificacao    : montarIdentificacaoCliente(cliente),
                    motivo_retirada  : 'manutencao',
                    condicao_retirada: 'analise',
                    destino_retirada : 'analise'
                });
            } catch (erroPixExistente) {
                throw new Error(descreverErroFirebase(erroPixExistente, 'Falha ao atualizar o cadastro do Pix.'));
            }
        } else {
            try {
                await push(ref(db, PATH), {
                    numero_pix       : pixNum,
                    cliente          : String(cliente.nome || '').trim(),
                    identificacao    : montarIdentificacaoCliente(cliente),
                    equipamento      : nomeEquipamento,
                    situacao         : 'retirado',
                    tecnico_retirada : usuarioLogado,
                    data_retirada    : dataRetirada,
                    motivo_retirada  : 'manutencao',
                    condicao_retirada: 'analise',
                    destino_retirada : 'analise',
                    criado_em        : new Date().toISOString()
                });
            } catch (erroPixNovo) {
                throw new Error(descreverErroFirebase(erroPixNovo, 'Falha ao registrar um novo cadastro de Pix retirado.'));
            }
        }

        try {
            await set(ref(db, 'metadata/clientes_versao'), Date.now());
        } catch (erroVersao) {
            throw new Error(descreverErroFirebase(erroVersao, 'Falha ao atualizar a vers\u00e3o dos clientes.'));
        }

        if (window.playAlert) {
            window.playAlert(`Retirada do Pix ${pixNum} registrada e marcada em an\u00e1lise.`);
        } else {
            alert(`Retirada do Pix ${pixNum} registrada e marcada em an\u00e1lise.`);
        }
    } catch (e) {
        console.error('Erro ao confirmar retirada do Pix:', e);
        const detalhe = descreverErroFirebase(e, 'Erro ao salvar a retirada.');
        if (window.playAlert) {
            window.playAlert(detalhe);
        } else {
            alert(detalhe);
        }
    }
};
