<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Pix</title>

    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        input, textarea, select { -webkit-user-select: text; user-select: text; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0b2256;
            display: flex;
            justify-content: center;
            color: white;
            min-height: 100vh;
            position: relative;
            z-index: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top, rgba(54, 105, 214, 0.55), transparent 34%),
                linear-gradient(180deg, #11317a 0%, #0b2256 42%, #071634 100%);
            z-index: -1;
        }

        .app {
            width: 100%;
            max-width: 440px;
            padding: 18px;
            box-sizing: border-box;
        }

        /* â”€â”€ TOPO â”€â”€ */
        .topo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 22px;
            position: relative;
            padding: 10px 0 2px;
        }
        .titulo-wrap { text-align: center; }
        .titulo {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
        }
        .subtitulo {
            margin-top: 4px;
            font-size: 13px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: #8faad4;
        }
        .btn-home {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: rgba(255,255,255,0.16);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.24);
            transition: background 0.15s;
        }
        .btn-home:active { background: rgba(255,255,255,0.34); transform: translateY(-50%) scale(0.93); }
        .btn-home svg { width: 22px; height: 22px; fill: white; }

        /* â”€â”€ ACCORDION â”€â”€ */
        .secao { margin-bottom: 14px; }

        .secao-header {
            background: #4467a8;
            border: 3px solid #d7dce3;
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: background 0.15s, border-radius 0.2s;
            min-height: 38px;
        }
        .secao-header:active { transform: translateY(1px); }
        .secao-header.aberta { border-radius: 22px 22px 0 0; border-bottom-color: rgba(255,255,255,0.2); }

        .secao-icone {
            position: absolute;
            left: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
        }
        .secao-titulo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .secao-seta {
            position: absolute;
            right: 18px;
            font-size: 14px;
            transition: transform 0.25s;
            color: rgba(255,255,255,0.85);
        }
        .secao-seta.girada { transform: rotate(180deg); }

        .secao-corpo {
            display: none;
            background: rgba(8, 22, 65, 0.75);
            border: 3px solid #d7dce3;
            border-top: none;
            border-radius: 0 0 22px 22px;
            padding: 16px;
            backdrop-filter: blur(8px);
        }
        .secao-corpo.aberto { display: block; }

        /* Badge contador no header */
        .badge-count {
            position: absolute;
            right: 46px;
            background: #4ade80;
            color: #0b2256;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* â”€â”€ BUSCA â”€â”€ */
        .busca-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .busca-row input {
            background: rgba(255,255,255,0.09);
            border: 2px solid #ffffff;
            border-radius: 22px;
            padding: 9px 14px;
            color: white;
            font-size: 15px;
            font-family: Arial, Helvetica, sans-serif;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .busca-row input::placeholder { color: #dbeafe; }
        .busca-row input:focus { border-color: rgba(100,170,255,0.65); }
        .busca-numero-input { width: 90px; flex-shrink: 0; text-align: center; }
        .busca-geral-input  { flex: 1; min-width: 0; }

        /* â”€â”€ CARDS PIX â”€â”€ */
        .pix-card {
            background: #0f2a66;
            border: 1.5px solid rgba(255,255,255,0.13);
            border-radius: 18px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }
        .pix-card:last-child { margin-bottom: 0; }
        /* Linha 1: "Pix 1   Grua G" */
        .pix-linha1 {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 3px;
        }
        .pix-numero {
            font-size: 17px;
            font-weight: bold;
            color: #7eb3ff;
            white-space: nowrap;
        }
        .pix-badge {
            font-size: 13px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .pix-badge-instalado {
            background: #1a4730;
            color: #4ade80;
            border: 1.5px solid #4ade80;
        }
        .pix-badge-retirado {
            background: #4a1f0a;
            color: #fb923c;
            border: 1.5px solid #fb923c;
        }
        .pix-numero-instalado { color: #4ade80; }
        .pix-numero-retirado { color: #f87171; }
        .pix-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            line-height: 1;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        .pix-status-badge.instalado {
            background: #166534;
            border: 1px solid #4ade80;
            color: #dcfce7;
        }
        .pix-status-badge.retirado {
            background: #7f1d1d;
            border: 1px solid #f87171;
            color: #fee2e2;
        }
        .pix-equipamento-nome {
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        /* Linha 2: "N. 01 - Peixe do vanor" */
        .pix-identificacao {
            font-size: 14px;
            color: #a8c4e8;
            margin-bottom: 8px;
        }
        .pix-identificacao-numero {
            color: #dbeafe;
            font-weight: bold;
        }

        /* Linha 3+4: SituaÃ§Ã£o, TÃ©cnico, Data */
        .pix-rodape {
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.09);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .pix-rodape-linha {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 13px;
            flex-wrap: wrap;
        }
        .pix-rodape-item { color: #ccd9ec; }
        .pix-rodape-item .lbl { color: #dbeafe; }

        .situacao-txt-instalado { color: #4ade80; font-weight: bold; }
        .situacao-txt-retirado  { color: #f87171; font-weight: bold; }

        .vazio {
            text-align: center;
            color: rgba(255,255,255,0.38);
            font-size: 14px;
            padding: 22px 0 10px;
        }

        /* â”€â”€ FORMULÃRIOS â”€â”€ */
        .form-grupo { margin-bottom: 14px; }

        .form-label {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
            display: block;
        }
        .form-input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,255,255,0.09);
            border: 1.5px solid rgba(255,255,255,0.18);
            border-radius: 14px;
            padding: 10px 14px;
            color: white;
            font-size: 15px;
            font-family: Arial, Helvetica, sans-serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.28); }
        .form-input:focus { border-color: rgba(100,160,255,0.65); background: rgba(255,255,255,0.12); }

        .form-input-destaque {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 4px;
            color: #7eb3ff;
            padding: 12px 14px;
        }

        .form-row { display: flex; gap: 10px; }
        .form-row .form-grupo { flex: 1; }

        /* â”€â”€ MOTIVO (grid de botÃµes) â”€â”€ */
        .motivo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .motivo-btn {
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.18);
            border-radius: 14px;
            padding: 13px 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }
        .motivo-btn.ativo { background: rgba(68,103,168,0.5); border-color: #7eb3ff; }
        .motivo-btn:active { transform: scale(0.96); }
        .motivo-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
        .motivo-texto { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: bold; }

        /* â”€â”€ CONDIÃ‡ÃƒO (toggle row) â”€â”€ */
        .condicao-row { display: flex; gap: 8px; }
        .condicao-btn {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.16);
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.15s;
            color: rgba(255,255,255,0.65);
        }
        .condicao-btn.ativo-ok       { background: #1a4730; border-color: #4ade80; color: #4ade80; }
        .condicao-btn.ativo-defeito  { background: #4a1f0a; border-color: #fb923c; color: #fb923c; }
        .condicao-btn.ativo-danif    { background: #3d0808; border-color: #f87171; color: #f87171; }
        .condicao-btn:active { transform: scale(0.96); }

        /* â”€â”€ INFO CARD RETIRADA â”€â”€ */
        .ret-info {
            display: none;
            background: rgba(251,146,60,0.1);
            border: 1.5px solid rgba(251,146,60,0.35);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #ffd0a8;
            line-height: 1.6;
        }

        /* â”€â”€ DIVISOR â”€â”€ */
        .divisor { height: 1px; background: rgba(255,255,255,0.1); margin: 14px 0; }

        /* â”€â”€ BOTÃƒO SALVAR â”€â”€ */
        .btn-salvar {
            width: 100%;
            border: none;
            border-radius: 28px;
            padding: 14px;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            transition: filter 0.15s, transform 0.1s;
            margin-top: 6px;
        }
        .btn-salvar:hover  { filter: brightness(1.1); }
        .btn-salvar:active { filter: brightness(0.9); transform: translateY(1px); }
        .btn-salvar-verde   { background: #1e7e3e; }
        .btn-salvar-laranja { background: #b84a1e; }

        /* select option escuro */
        select option { background: #0f2a66; }

        /* â”€â”€ ADICIONEI PIX â€” LISTA DE CLIENTES/MÃQUINAS â”€â”€ */
        .add-vazio {
            text-align: center;
            color: rgba(255,255,255,0.38);
            font-size: 15px;
            padding: 20px 0 8px;
        }
        .cliente-grupo {
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .cliente-grupo-header {
            padding: 11px 14px 9px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(68, 103, 168, 0.25);
        }
        .cliente-grupo-nome {
            font-size: 17px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.2px;
        }
        .cliente-grupo-nome .num-cliente {
            color: #ffffff;
            margin-right: 4px;
        }
        .maquina-item { border-bottom: 1px solid rgba(255,255,255,0.06); }
        .maquina-item:last-child { border-bottom: none; }
        .maquina-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            cursor: pointer;
        }
        .maquina-row:active { background: rgba(255,255,255,0.06); }
        .maquina-nome-txt {
            font-size: 16px;
            font-weight: bold;
            color: white;
        }
        .maquina-contador-txt {
            font-size: 14px;
            font-weight: bold;
            color: #fb923c;
            margin-top: 3px;
        }
        .btn-pix-add {
            font-size: 13px;
            font-weight: bold;
            padding: 5px 13px;
            border-radius: 20px;
            white-space: nowrap;
            border: 1.5px solid rgba(74,222,128,0.5);
            color: #4ade80;
            background: rgba(74,222,128,0.1);
            flex-shrink: 0;
        }
        .btn-pix-add.aberto {
            border-color: rgba(251,146,60,0.5);
            color: #fb923c;
            background: rgba(251,146,60,0.1);
        }
        .maquina-form-inline {
            display: none;
            padding: 4px 14px 14px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .maquina-form-inline.aberto {
            display: block;
            animation: surgirForm 0.2s ease;
        }
        @keyframes surgirForm {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .pix-form-row {
            display: flex;
            gap: 8px;
            margin: 10px 0 8px;
        }
        .pix-input-nr {
            width: 78px;
            flex-shrink: 0;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #7eb3ff;
            letter-spacing: 2px;
        }
        .pix-input-cnt { flex: 1; font-size: 16px; }
        .pix-erro {
            font-size: 13px;
            color: #f87171;
            margin-bottom: 8px;
        }
        .btn-confirmar-pix {
            width: 100%;
            background: #1e7e3e;
            border: none;
            border-radius: 22px;
            padding: 11px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            transition: filter 0.15s;
        }
        .btn-confirmar-pix:active { filter: brightness(0.85); transform: translateY(1px); }
        .btn-adicionar-fixo {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            z-index: 60;
            background: #1e5c30;
            border: 2px solid #4ade80;
            border-radius: 999px;
            padding: 12px 16px;
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 12px 28px rgba(0,0,0,0.28);
            cursor: pointer;
            display: none;
        }
        .btn-adicionar-fixo.visivel { display: block; }
        .btn-adicionar-fixo:active {
            transform: translateX(-50%) scale(0.97);
        }

        /* â”€â”€ RETIRADA INLINE NOS CARDS â”€â”€ */
        .btn-retirar-card {
            margin-top: 10px;
            width: 100%;
            background: rgba(251,146,60,0.1);
            border: 1.5px solid rgba(251,146,60,0.35);
            border-radius: 20px;
            padding: 7px 14px;
            color: #fb923c;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            transition: background 0.15s;
        }
        .btn-retirar-card:active { background: rgba(251,146,60,0.22); }
        .btn-instalar-card {
            margin-top: 10px;
            width: 100%;
            background: rgba(250,204,21,0.1);
            border: 1.5px solid rgba(250,204,21,0.35);
            border-radius: 20px;
            padding: 7px 14px;
            color: #facc15;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            transition: background 0.15s;
        }
        .btn-instalar-card:active { background: rgba(250,204,21,0.22); }
        .card-ret-form {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 12px;
            padding-top: 12px;
            animation: surgirForm 0.2s ease;
        }
        .card-ret-form.aberto { display: block; }
        .retirada-extra-box {
            margin: 0 0 10px;
            border: 1px solid rgba(251,146,60,0.35);
            border-radius: 14px;
            background: rgba(76, 29, 149, 0.18);
            padding: 10px;
        }
        .retirada-extra-pergunta {
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .retirada-extra-opcoes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .retirada-extra-opcao {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            user-select: none;
            -webkit-user-select: none;
        }
        .retirada-extra-opcao input {
            width: 18px;
            height: 18px;
            margin: 0;
        }
        .retirada-extra-body {
            display: none;
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.12);
            padding-top: 10px;
        }
        .retirada-extra-body.aberto { display: block; }
        .retirada-extra-acoes {
            display: none;
            margin-top: 10px;
        }
        .retirada-extra-acoes.aberto { display: block; }
        .retirada-info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }
        .retirada-info-item {
            background: rgba(15,42,102,0.85);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 9px 10px;
            text-align: center;
        }
        .retirada-info-item span {
            display: block;
            color: #dbeafe;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .retirada-info-item strong {
            display: block;
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
        }
        .retirada-input-label {
            display: block;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            margin: 0 0 6px;
            user-select: none;
            -webkit-user-select: none;
        }
        .retirada-foto-input {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            position: relative;
        }
        .adicao-foto-wrap {
            margin-bottom: 10px;
        }
        .retirada-foto-btn {
            width: 56px;
            height: 50px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .retirada-foto-btn.tem-foto {
            border-color: rgba(76,175,80,0.6);
            background: rgba(76,175,80,0.15);
        }
        .retirada-foto-menu {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }
        .retirada-foto-menu.aberto {
            display: block;
        }
        .retirada-foto-menu-box {
            background: #0d2560;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
        }
        .retirada-foto-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            user-select: none;
            -webkit-user-select: none;
        }
        .retirada-foto-menu-item + .retirada-foto-menu-item {
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .retirada-foto-menu-item input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .retirada-calc-box {
            margin-top: 10px;
            background: rgba(15,42,102,0.85);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 10px;
        }
        .retirada-calc-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 6px;
            text-align: center;
        }
        .retirada-calc-row:last-child { margin-bottom: 0; }
        .retirada-calc-row strong {

<script type="module">
import { verificarAutenticacao } from './auth.js';
import {
    getDatabase, ref, push, onValue, update, set, get
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import {
    app,
    dbEscutarClientes,
    dbEscutarAtendimentos,
    dbAplicarPendenciasManutencaoCliente,
    dbEscutarColaboradores,
    dbAdicionarPixEmPosse,
    dbRemoverPixEmPosse,
    storageSalvarFotoComThumb
} from './database.js';

verificarAutenticacao();

const db   = getDatabase(app);
const PATH = 'cadastros_pix';

// Estado em memÃ³ria
window._pixData            = {};
window._pixCardsData       = [];
window._clientesData       = [];
window._clientesPixData    = {};
window._atendimentosData   = [];
window._motivoSelecionado  = null;
window._condicaoSelecionada = null;
let _listaColaboradores    = [];
let _maquinaAberta        = null;
let _cardRetiradaAberta   = null;
let _retCardEstado        = {};
let _cardInstalacaoAberta = null;
let _isGestor = false;
const _adicaoPixFotos = {};
const _retiradaContadorFotos = {};

function normalizarListaRegistros(lista) {
    if (Array.isArray(lista)) return lista;
    if (lista && typeof lista === 'object') {
        return Object.keys(lista).map(key => {
            const item = lista[key];
            if (item && typeof item === 'object') {
                return item.firebaseUrl ? item : { firebaseUrl: key, ...item };
            }
            return { firebaseUrl: key, valor: item };
        });
    }
    return [];
}

function aplicarPermissaoGestorRapida(lista = []) {
    _listaColaboradores = normalizarListaRegistros(lista);
    const nome = String(localStorage.getItem('usuarioLogado') || '').trim();
    const nomeNormalizado = normalizarTexto(nome);
    const usuario = _listaColaboradores.find(c => String(c?.nome || '').trim() === nome)
        || _listaColaboradores.find(c => normalizarTexto(c?.nome || '') === nomeNormalizado);
    const perfilBruto = usuario
        ? (usuario.nivel_completo || usuario.nivel || usuario.perfil || '')
        : '';
    const perfil = normalizarTexto(perfilBruto);
    _isGestor = perfil.includes('gestao');
    const secao = document.getElementById('secao-gestor');
    if (secao) secao.style.display = _isGestor ? '' : 'none';
    if (_isGestor && typeof window.renderizarGestorPix === 'function') {
        window.renderizarGestorPix();
    }

    // GESTOR NÍVEL 1: oculta seções Locais com Pix e Adicionei Pix
    if (perfil.includes('gestao_1')) {
        const secaoLocais   = document.getElementById('secao-locais');
        const secaoAdicionar = document.getElementById('secao-adicionar');
        const btnFixo       = document.querySelector('.btn-adicionar-fixo');
        if (secaoLocais)    secaoLocais.style.display   = 'none';
        if (secaoAdicionar) secaoAdicionar.style.display = 'none';
        if (btnFixo)        btnFixo.style.display        = 'none';
    }
}

window.toggleSecao = function(secao) {
    if (secao === 'gestor' && typeof window.renderizarGestorPix === 'function') {
        window.renderizarGestorPix();
    }
    let abrindoSecao = false;
    ['locais','adicionar','gestor'].forEach(s => {
        const hdr = document.getElementById('hdr-' + s);
        const corpo = document.getElementById('corpo-' + s);
        const seta = document.getElementById('seta-' + s);
        if (!hdr || !corpo || !seta) return;
        if (s === secao) {
            const abrindo = !corpo.classList.contains('aberto');
            corpo.classList.toggle('aberto', abrindo);
            hdr.classList.toggle('aberta', abrindo);
            seta.classList.toggle('girada', abrindo);
            abrindoSecao = abrindo ? s : false;
        } else {
            corpo.classList.remove('aberto');
            hdr.classList.remove('aberta');
            seta.classList.remove('girada');
        }
    });
    if (abrindoSecao === 'adicionar') window.renderizarAdicionarPix?.();
    if (abrindoSecao === 'locais') window.renderizarLocaisPix?.();
    if (abrindoSecao === 'gestor') window.renderizarGestorPix?.();
};

window.abrirAdicionarPixFixo = function() {
    window.toggleSecao('adicionar');
    document.getElementById('hdr-adicionar')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

function atualizarVisibilidadeBotaoAdicionarFixo() {
    const btn = document.querySelector('.btn-adicionar-fixo');
    const hdr = document.getElementById('hdr-adicionar');
    if (!btn || !hdr) return;
    const rect = hdr.getBoundingClientRect();
    const totalmenteFora = rect.bottom <= 0 || rect.top >= window.innerHeight;
    btn.classList.toggle('visivel', totalmenteFora);
}

if ('IntersectionObserver' in window) {
    const hdrAdicionar = document.getElementById('hdr-adicionar');
    const btnAdicionarFixo = document.querySelector('.btn-adicionar-fixo');
    if (hdrAdicionar && btnAdicionarFixo) {
        const observer = new IntersectionObserver(([entry]) => {
            btnAdicionarFixo.classList.toggle('visivel', !entry.isIntersecting);
        }, { threshold: 0 });
        observer.observe(hdrAdicionar);
    }
} else {
    window.addEventListener('scroll', atualizarVisibilidadeBotaoAdicionarFixo, { passive: true });
    window.addEventListener('resize', atualizarVisibilidadeBotaoAdicionarFixo);
    setTimeout(atualizarVisibilidadeBotaoAdicionarFixo, 0);
}

function esc(valor) {
    return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function normalizarPix(valor) {
    return String(valor || '').trim();
}

function obterResponsaveisPixEmPosse(numeroPix, usuarioAtual = '') {
    const pixNormalizado = normalizarPix(numeroPix);
    const responsaveis = new Set();
    const usuarioLogado = String(usuarioAtual || '').trim();

    if (usuarioLogado) responsaveis.add(usuarioLogado);
    if (!pixNormalizado) return [...responsaveis];

    const ultimoRegistroRetirada = Object.values(window._pixData || {})
        .filter(item => normalizarPix(item?.numero_pix) === pixNormalizado)
        .sort((a, b) => obterTimestampRegistro(b) - obterTimestampRegistro(a))
        .find(item => String(item?.tecnico_retirada || '').trim());

    const retiradoPor = String(ultimoRegistroRetirada?.tecnico_retirada || '').trim();
    if (retiradoPor) responsaveis.add(retiradoPor);

    return [...responsaveis];
}

async function abaterPixDoBalanco(numeroPix, usuarioAtual = '') {
    const responsaveis = obterResponsaveisPixEmPosse(numeroPix, usuarioAtual);
    for (const responsavel of responsaveis) {
        await dbRemoverPixEmPosse(responsavel, numeroPix);
    }
}

function normalizarTexto(valor) {
    return String(valor || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .trim();
}

function normalizarBuscaLivre(valor) {
    return String(valor || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9]+/g, ' ')
        .toLowerCase()
        .trim();
}

function extrairPercentualComissao(valor) {
    const numero = String(valor || '').replace(',', '.').match(/-?\d+(?:\.\d+)?/);
    return numero ? (parseFloat(numero[0]) || 0) : 0;
}

function normalizarNumeroCalculo(valor) {
    const texto = String(valor || '').trim().replace(/\./g, '').replace(',', '.');
    const numero = parseFloat(texto);
    return Number.isFinite(numero) ? numero : 0;
}

function formatarMoedaBR(valor) {
    return Number(valor || 0).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
    });
}

function formatarData(valor) {
    const data = new Date(valor || 0);
    if (Number.isNaN(data.getTime())) return '—';
    return data.toLocaleString('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function descreverErroFirebase(erro, contextoPadrao) {
    const codigo = String(erro?.code || '').trim();
    const mensagem = String(erro?.message || erro || '').trim();
    const partes = [];
    if (contextoPadrao) partes.push(contextoPadrao);
    if (codigo) partes.push(`[${codigo}]`);
    if (mensagem) partes.push(mensagem);
    return partes.join(' ').trim() || 'Erro desconhecido.';
}

function obterTimestampRegistro(envio) {
    const base = envio?.data_retirada || envio?.data || envio?.criado_em || '';
    const t = Date.parse(base || '');
    return Number.isNaN(t) ? 0 : t;
}

function formatarNumeroResumo(valor) {
    const numero = normalizarNumeroCalculo(valor);
    return Number.isFinite(numero) ? numero.toLocaleString('pt-BR') : '0';
}

function montarIdentificacaoCliente(cliente) {
    const numeroRaw = String(cliente?.numero || '').trim();
    const numero = /^\d+$/.test(numeroRaw) ? numeroRaw.padStart(2, '0') : numeroRaw;
    const nome = String(cliente?.nome || '').trim();
    if (numero && nome) return `N. ${numero} - ${nome}`;
    return nome || numero || 'Cliente';
}

function obterEquipamentosDetalhadosCliente(cliente) {
    if (Array.isArray(cliente?.equipDetalhes) && cliente.equipDetalhes.length > 0) {
        return cliente.equipDetalhes.map((item, index) => ({
            rowId: String(item?.rowId || `eq_${index + 1}`),
            nome: String(item?.nome || '').trim(),
            qtd: String(item?.qtd || item?.quantidade || '1').trim() || '1',
            pix: String(item?.pix || '').trim(),
            contador: String(item?.contador || '').trim(),
            manutencaoPendente: String(item?.manutencaoPendente || '').trim(),
            aguardandoConfirmacao: item?.aguardandoConfirmacao === true,
            manutencaoPendenteEm: String(item?.manutencaoPendenteEm || '').trim(),
            manutencaoPendentePor: String(item?.manutencaoPendentePor || '').trim(),
            pixRetiradoPendente: String(item?.pixRetiradoPendente || '').trim(),
            contadorRetiradoPendente: String(item?.contadorRetiradoPendente || '').trim(),
            retiradaPendenteEm: String(item?.retiradaPendenteEm || '').trim(),
            retiradaPendentePor: String(item?.retiradaPendentePor || '').trim()
        }));
    }

    const texto = String(cliente?.equip || '').trim();
    if (!texto) return [];
    const partes = texto.includes('|')
        ? texto.split(/\s*\|\s*/)
        : texto.split(/\s*,\s*/);
    return partes.map((parte, index) => {
        let trecho = String(parte || '').trim();
        if (!trecho) return null;
        let qtd = '1';
        let pix = '';

        const matchPixLegado = trecho.match(/\s*\[Pix:\s*([^\]]+)\]\s*$/i);
        if (matchPixLegado) {
            pix = String(matchPixLegado[1] || '').trim();
            trecho = trecho.replace(/\s*\[Pix:\s*([^\]]+)\]\s*$/i, '').trim();
        } else {
            const matchPixTexto = trecho.match(/\s+Pix\s+([0-9]+)\s*$/i);
            if (matchPixTexto) {
                pix = String(matchPixTexto[1] || '').trim();
                trecho = trecho.replace(/\s+Pix\s+[0-9]+\s*$/i, '').trim();
            }
        }

        const matchQtd = trecho.match(/\s*\(([^)]+)\)\s*$/);
        if (matchQtd) {
            qtd = String(matchQtd[1] || '1').trim() || '1';
            trecho = trecho.replace(/\s*\(([^)]+)\)\s*$/, '').trim();
        }

        return {
            rowId: `legacy_${index + 1}`,
            nome: String(trecho || '').trim(),
            qtd,
            pix,
            contador: '',
            manutencaoPendente: '',
            aguardandoConfirmacao: false,
            manutencaoPendenteEm: '',
            manutencaoPendentePor: '',
            pixRetiradoPendente: '',
            contadorRetiradoPendente: '',
            retiradaPendenteEm: '',
            retiradaPendentePor: ''
        };
    }).filter(item => item && item.nome);
}

function serializarEquipamentosTextoCliente(equips = []) {
    return equips
        .map(item => {
            const nome = String(item?.nome || '').trim();
            const qtd = String(item?.qtd || item?.quantidade || '1').trim() || '1';
            const pix = String(item?.pix || '').trim();
            if (!nome) return '';
            const base = `${nome}${qtd !== '1' ? ` (${qtd})` : ''}`;
            return pix ? `${base} [Pix: ${pix}]` : base;
        })
        .filter(Boolean)
        .join(', ');
}

function obterPixParaExibicao() {
    const lista = [];

    (window._clientesData || []).forEach(cliente => {
        const identificacao = montarIdentificacaoCliente(cliente);
        const comissaoCliente = cliente?.comissaoCliente ?? cliente?.comissao ?? '';
        obterEquipamentosDetalhadosCliente(cliente).forEach(equip => {
            const base = {
                clienteId: cliente.firebaseUrl,
                rowId: equip.rowId,
                cliente: String(cliente?.nome || '').trim(),
                identificacao,
                equipamento: String(equip?.nome || '').trim(),
                comissaoCliente
            };

            const pixAtual = String(equip?.pix || '').trim();
            const pixRetirado = String(equip?.pixRetiradoPendente || '').trim();

            if (pixAtual) {
                let situacao = 'instalado';
                let pendenciaTipo = '';
                if (equip.aguardandoConfirmacao && equip.manutencaoPendente === 'adicao') {
                    situacao = 'em_analise';
                    pendenciaTipo = 'adicao';
                } else if (equip.aguardandoConfirmacao && equip.manutencaoPendente === 'retirada' && !pixRetirado) {
                    situacao = 'em_analise';
                    pendenciaTipo = 'retirada';
                }

                lista.push({
                    ...base,
                    numero_pix: pixAtual,
                    contador: String(equip?.contador || '').trim(),
                    situacao,
                    pendenciaTipo,
                    tecnico: String(equip?.manutencaoPendentePor || '').trim(),
                    data: String(equip?.manutencaoPendenteEm || '').trim(),
                    tecnico_retirada: String(equip?.manutencaoPendentePor || '').trim(),
                    data_retirada: String(equip?.manutencaoPendenteEm || '').trim()
                });
            }

            if (pixRetirado && pixRetirado !== pixAtual) {
                lista.push({
                    ...base,
                    numero_pix: pixRetirado,
                    contador: String(equip?.contadorRetiradoPendente || '').trim(),
                    situacao: 'em_analise',
                    pendenciaTipo: 'retirada',
                    tecnico: '',
                    data: '',
                    tecnico_retirada: String(equip?.retiradaPendentePor || equip?.manutencaoPendentePor || '').trim(),
                    data_retirada: String(equip?.retiradaPendenteEm || equip?.manutencaoPendenteEm || '').trim()
                });
            }
        });
    });

    return lista.sort((a, b) => {
        const na = /^\d+$/.test(String(a.numero_pix || '')) ? Number(a.numero_pix) : Number.MAX_SAFE_INTEGER;
        const nb = /^\d+$/.test(String(b.numero_pix || '')) ? Number(b.numero_pix) : Number.MAX_SAFE_INTEGER;
        if (na !== nb) return na - nb;
        return String(a.numero_pix || '').localeCompare(String(b.numero_pix || ''), 'pt-BR');
    });
}

function obterRegistroCadastroPixGestor(cliente, pendencia) {
    const numeroPix = normalizarPix(pendencia?.pix);
    const equipamento = normalizarTexto(pendencia?.nome);
    const clienteNome = normalizarTexto(cliente?.nome);
    const identificacao = normalizarTexto(montarIdentificacaoCliente(cliente));
    if (!numeroPix || !equipamento) return null;

    return Object.values(window._pixData || {})
        .filter(item => normalizarPix(item?.numero_pix) === numeroPix)
        .filter(item => normalizarTexto(item?.equipamento) === equipamento)
        .filter(item => {
            const itemCliente = normalizarTexto(item?.cliente);
            const itemIdent = normalizarTexto(item?.identificacao);
            return itemCliente === clienteNome || itemIdent === identificacao;
        })
        .sort((a, b) => obterTimestampRegistro(b) - obterTimestampRegistro(a))[0] || null;
}

    const registro = obterRegistroCadastroPixGestor(cliente, pendencia);

function _pixEmUso() {
    const emUso = new Set();
    obterPixParaExibicao().forEach(item => {
        const situacao = String(item?.situacao || '').trim().toLowerCase();
        const pendenciaTipo = String(item?.pendenciaTipo || '').trim().toLowerCase();
        if (situacao === 'instalado' || (situacao === 'em_analise' && pendenciaTipo === 'adicao')) {
            if (item?.numero_pix) emUso.add(String(item.numero_pix).trim());
        }
    });
    return emUso;
}

window.validarPixAdicionarAoSair = function(chave) {
    const pixEl = document.getElementById('pixnr-' + chave);
    const pixNum = String(pixEl?.value || '').trim();
    if (!pixNum) return;
    if (_pixEmUso().has(pixNum)) {
        exibirAvisoPadrao(`Pix ${pixNum} já está instalado em outro equipamento.`);
        if (pixEl) {
            pixEl.value = '';
            setTimeout(() => pixEl.focus(), 50);
        }
    }
};

    if (!container) return;
    if (carregando) carregando.style.display = 'none';

    const busca = normalizarBuscaLivre(document.getElementById('add-busca')?.value || '');
    const clientesFiltrados = (window._clientesData || [])
        .map(c => ({
            ...c,
            semPix: obterEquipamentosDetalhadosCliente(c).filter(
                e => !e.pix && (!e.aguardandoConfirmacao || e.manutencaoPendente === 'retirada' || e.pixRetiradoPendente)
            )
        }))
        .filter(c => c.semPix.length > 0)
        .filter(c => {
            if (!busca) return true;
            const numeroRaw = String(c.numero || '').trim();
            const numeroFmt = /^\d+$/.test(numeroRaw) ? numeroRaw.padStart(2, '0') : numeroRaw;

window.carregarFotoRetiradaContador = function(input, chave) {
    const file = input?.files?.[0];
    const btnEl = document.getElementById('retct-foto-btn-' + chave);
    const iconeEl = document.getElementById('retct-foto-icone-' + chave);

    if (!file) {
        delete _retiradaContadorFotos[chave];
        if (btnEl) {
            btnEl.classList.remove('tem-foto');
            btnEl.querySelectorAll('img').forEach(img => img.remove());
        }
        if (iconeEl) iconeEl.style.display = '';
        return;
    }

    const reader = new FileReader();
    reader.onload = function(ev) {
        const imgObj = new Image();
        imgObj.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1600;
            const MAX_HEIGHT = 1600;
            let width = imgObj.width;
            let height = imgObj.height;

            if (width > height) {
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
            } else if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(imgObj, 0, 0, width, height);
            const base64 = canvas.toDataURL('image/jpeg', 0.8);
            _retiradaContadorFotos[chave] = base64;

            if (btnEl) {
                btnEl.classList.add('tem-foto');
                btnEl.querySelectorAll('img').forEach(img => img.remove());
                const img = document.createElement('img');
                img.src = base64;
                img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px;pointer-events:none;';
                btnEl.appendChild(img);
            }
            if (iconeEl) iconeEl.style.display = 'none';
        };
        imgObj.src = ev.target?.result || '';
    };
    reader.readAsDataURL(file);
};

window.atualizarResumoRetiradaContador = function(chave) {
    const body = document.getElementById('retct-body-' + chave);
    const atualEl = document.getElementById('retct-atual-' + chave);
    const brutoEl = document.getElementById('retct-bruto-' + chave);
    const descEl = document.getElementById('retct-desc-' + chave);
    if (!body || !atualEl || !brutoEl || !descEl) return;

    const contadorAnterior = normalizarNumeroCalculo(body.dataset.anterior || '');
    const percentualComissao = normalizarNumeroCalculo(body.dataset.comissao || '');
    const contadorAtual = normalizarNumeroCalculo(atualEl.value || '');
    const bruto = contadorAtual > 0 ? contadorAtual - contadorAnterior : 0;
    const desconto = bruto > 0 ? bruto * (percentualComissao / 100) : 0;

    brutoEl.textContent = formatarMoedaBR(bruto);
    descEl.textContent = formatarMoedaBR(desconto);
};

function obterDadosRetiradaContador(chave) {
    const radioSim = document.getElementById('retct-sim-' + chave);
    const body = document.getElementById('retct-body-' + chave);
    const atualEl = document.getElementById('retct-atual-' + chave);
    const usaContador = radioSim?.checked === true;
    const contadorAnterior = normalizarNumeroCalculo(body?.dataset?.anterior || '');
    const percentualComissao = normalizarNumeroCalculo(body?.dataset?.comissao || '');
    const contadorAtualTexto = String(atualEl?.value || '').trim();
    const contadorAtual = normalizarNumeroCalculo(contadorAtualTexto);
    const bruto = contadorAtual - contadorAnterior;
    const valorComissao = bruto > 0 ? bruto * (percentualComissao / 100) : 0;
    const valorPagar = bruto > 0 ? bruto - valorComissao : 0;
    const fotoBase64 = _retiradaContadorFotos[chave] || '';

    return {
        usaContador,
        contadorAnterior,
        contadorAtualTexto,
        contadorAtual,
        percentualComissao,
        bruto,
        valorComissao,
        valorPagar,
        fotoBase64
    };
}

window.confirmarPixMaquina = async function(clienteId, rowId, chave) {
    if (!validarBuscaAdicionarPixObrigatoria()) return;
    const pixNum   = String(document.getElementById('pixnr-'   + chave)?.value || '').trim();
    const contador = String(document.getElementById('pixcnt-'  + chave)?.value || '').trim();
    const fotoBase64 = _adicaoPixFotos[chave] || '';
    const usuarioLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
    const dataInstalacao = new Date().toISOString();
    const erroEl   = document.getElementById('pixerro-' + chave);

    const mostrarErro = (msg) => {
        erroEl.textContent   = msg;
        erroEl.style.display = 'block';
    };
    erroEl.style.display = 'none';

    if (!pixNum) return exibirAvisoPadrao('Informe o n\u00famero do Pix.');
    if (!contador) return exibirAvisoPadrao('Informe o n\u00famero do contador.');

    if (_pixEmUso().has(pixNum)) {
        return exibirAvisoPadrao(`Pix ${pixNum} j\u00e1 est\u00e1 instalado em outro equipamento.`);
    }

    const cliente = (window._clientesData || []).find(c => c.firebaseUrl === clienteId);
    if (!cliente) return mostrarErro('Cliente n\u00e3o encontrado.');

    // Copia profunda preservando todos os campos originais
    let equips = Array.isArray(cliente?.equipDetalhes) && cliente.equipDetalhes.length > 0
        ? JSON.parse(JSON.stringify(cliente.equipDetalhes))
        : obterEquipamentosDetalhadosCliente(cliente).map(e => ({ ...e }));

    const idx = equips.findIndex(e => String(e?.rowId || '') === rowId);
    if (idx === -1) return mostrarErro('Equipamento n\u00e3o encontrado.');

    const pixNovoNormalizado = normalizarPix(pixNum);
    const pixRetiradoNormalizado = normalizarPix(equips[idx].pixRetiradoPendente || '');
    const pixAtualNormalizado = normalizarPix(equips[idx].pix || '');
    const retiradaMesmoPix = equips[idx].manutencaoPendente === 'retirada'
        && (pixRetiradoNormalizado === pixNovoNormalizado || (!pixRetiradoNormalizado && pixAtualNormalizado === pixNovoNormalizado));

    if (retiradaMesmoPix) {
        equips[idx].pixRetiradoPendente = '';
        equips[idx].contadorRetiradoPendente = '';
        equips[idx].retiradaPendenteEm = '';
        equips[idx].retiradaPendentePor = '';
    } else if (!equips[idx].pixRetiradoPendente && equips[idx].manutencaoPendente === 'retirada' && equips[idx].pix) {
        equips[idx].pixRetiradoPendente = String(equips[idx].pix || '').trim();
        equips[idx].contadorRetiradoPendente = String(equips[idx].contador || '').trim();
        equips[idx].retiradaPendenteEm = String(equips[idx].manutencaoPendenteEm || dataInstalacao).trim();
        equips[idx].retiradaPendentePor = String(equips[idx].manutencaoPendentePor || usuarioLogado).trim();
    }

    equips[idx].pix = pixNum;
    if (contador) equips[idx].contador = contador;
    equips[idx].manutencaoPendente = 'adicao';
    equips[idx].aguardandoConfirmacao = true;
    equips[idx].manutencaoPendenteEm = dataInstalacao;
    equips[idx].manutencaoPendentePor = usuarioLogado;

    try {
        let fotoContadorUrl = '';
        let fotoContadorThumbUrl = '';
        if (fotoBase64) {
            const fotoSalva = await storageSalvarFotoComThumb(fotoBase64, 'cadastro_pix/instalacao_contador', 120);
            fotoContadorUrl = String(fotoSalva?.url || '').trim();
            fotoContadorThumbUrl = String(fotoSalva?.thumbUrl || fotoContadorUrl || '').trim();
        }

        await update(ref(db, `clientes/${clienteId}`), {
            equipDetalhes: equips,
            equip: serializarEquipamentosTextoCliente(equips),
            statusCadastro: 'em_analise'
        });

        await push(ref(db, PATH), {
            numero_pix    : pixNum,
            cliente       : String(cliente.nome || '').trim(),
            identificacao : montarIdentificacaoCliente(cliente),
            equipamento   : String(equips[idx].nome || '').trim(),
            tecnico       : usuarioLogado,
            data          : dataInstalacao,
            contador      : contador,
            foto_contador_instalacao: fotoContadorUrl,
            foto_contador_instalacao_thumb: fotoContadorThumbUrl,
            situacao      : 'instalado',
            origem        : 'adicionei_pix',
            criado_em     : dataInstalacao
        });

        try {
            await abaterPixDoBalanco(pixNum, usuarioLogado);
        } catch (erroPossePix) {
            console.warn('Falha ao abater Pix do balanÃ§o:', erroPossePix);
        }

        await set(ref(db, 'metadata/clientes_versao'), Date.now());
        delete _adicaoPixFotos[chave];

        const mensagem = `Pix ${pixNum} enviado para an\u00e1lise do gestor.`;
        if (window.playAlert) {
            window.playAlert(mensagem);
        } else {
            alert(mensagem);
        }
    } catch (e) {
        mostrarErro('Erro ao salvar. Tente novamente.');
    }
};

window.renderizarGestorPix = function() {
    if (!_isGestor) return;
    const lista  = document.getElementById('gestor-lista');
    const vazio  = document.getElementById('gestor-vazio');
    const badge  = document.getElementById('count-gestor');
    if (!lista) return;

    const clientesPendentes = (window._clientesData || [])
        .map(c => ({
            ...c,
            pendentes: obterEquipamentosDetalhadosCliente(c).flatMap(e => {
                const pendencias = [];
                const rowId = String(e?.rowId || '').trim();
                const pixRetirado = String(e?.pixRetiradoPendente || '').trim();
                const pixAtual = String(e?.pix || '').trim();
                const duplicadoMesmoPix = pixRetirado && pixAtual && pixRetirado === pixAtual;

                if (pixRetirado && !duplicadoMesmoPix) {
                    pendencias.push({
                        rowId,
                        tipo: 'retirada',
                        nome: String(e?.nome || '').trim(),
                        pix: pixRetirado,
                        por: String(e?.retiradaPendentePor || e?.manutencaoPendentePor || '').trim()
                    });
                } else if (e.aguardandoConfirmacao && e.manutencaoPendente === 'retirada' && pixAtual && !duplicadoMesmoPix) {
                    pendencias.push({
                        rowId,
                        tipo: 'retirada',
                        nome: String(e?.nome || '').trim(),
                        pix: pixAtual,
                        por: String(e?.manutencaoPendentePor || '').trim()
                    });
                }

                if (e.aguardandoConfirmacao && e.manutencaoPendente === 'adicao' && pixAtual) {
                    pendencias.push({
                        rowId,
                        tipo: 'adicao',
                        nome: String(e?.nome || '').trim(),
                        pix: pixAtual,
                        por: String(e?.manutencaoPendentePor || '').trim()
                    });
                }

                return pendencias;
            })
        }))
        .filter(c => c.pendentes.length > 0);

    const total = clientesPendentes.reduce((s, c) => s + c.pendentes.length, 0);
    badge.textContent = total;
    badge.style.display = total > 0 ? 'inline-block' : 'none';

    if (clientesPendentes.length === 0) {
        vazio.style.display = 'block';
        lista.innerHTML = '';
        return;
    }
    vazio.style.display = 'none';

    // DelegaÃ§Ã£o de eventos â€” mais confiÃ¡vel que onclick inline em mÃ³dulo ES6
    lista.onclick = function(ev) {
        const foto = ev.target.closest('.gestor-retirada-foto');
        if (foto) {
            const fullUrl = String(foto.dataset.full || foto.getAttribute('src') || '').trim();
            if (fullUrl) abrirFotoGestorRetirada(fullUrl);
            return;
        }

        const btn = ev.target.closest('.btn-gestor-confirmar');
        if (!btn || btn.disabled) return;
        window.confirmarGestorItem(btn, btn.dataset.clienteid, btn.dataset.rowid, btn.dataset.tipo);
    };

    lista.innerHTML = clientesPendentes.map(c => {
        const cId    = c.firebaseUrl;
        const titulo = montarIdentificacaoCliente(c);

        const itens = c.pendentes.map(e => {
            const tipo      = e.tipo;
            const badgeCls  = tipo === 'adicao' ? 'gestor-badge-adicao' : 'gestor-badge-retirada';
            const tipoLabel = tipo === 'adicao' ? '+ Colocado' : '&minus; Retirado';
            const pixInfo   = e.pix ? `<span class="gestor-pix-nr">Pix ${esc(e.pix)}</span>` : '';
            const porQuem   = e.por
                ? `<span style="font-size:11px;color:#94a3b8;">${esc(e.por)}</span>`
                : '';
            const resumoRetirada = tipo === 'retirada'
                ? montarResumoGestorRetirada(c, e)
                : '';
            const resumoAdicao = tipo === 'adicao'
                ? montarResumoGestorAdicao(c, e)
                : '';
            const destaqueRetirada = tipo === 'retirada'
                ? `<div class="gestor-retirada-meta">
                        <div class="gestor-retirada-pill pix">
                            <span>Pix retirado</span>
                            <strong>Pix ${esc(e.pix || 'â€”')}</strong>
                        </div>
                        <div class="gestor-retirada-pill por">
                            <span>Retirado por</span>
                            <strong>${esc(e.por || 'NÃ£o informado')}</strong>
                        </div>
                   </div>`
                : '';
            const detalheAdicao = tipo !== 'retirada'
                ? `<div class="gestor-adicao-meta">
                        <div class="gestor-adicao-pill pix">
                            <span>Pix colocado</span>
                            <strong>Pix ${esc(e.pix || 'Ã¢â‚¬â€')}</strong>
                        </div>
                        <div class="gestor-adicao-pill por">
                            <span>Colocado por</span>
                            <strong>${esc(e.por || 'NÃƒÂ£o informado')}</strong>
                        </div>
                   </div>`
                : '';
            return `
            <div class="gestor-equip-row">
                <div class="gestor-equip-top ${tipo === 'retirada' ? 'retirada' : 'adicao'}">
                    <span class="gestor-badge-tipo ${badgeCls}">${tipoLabel}</span>
                    <span class="gestor-equip-nome">${esc(e.nome)}</span>
                </div>
                ${destaqueRetirada}
                ${detalheAdicao}
                ${resumoRetirada}
                ${resumoAdicao}
                <div class="gestor-acoes">
                    <button class="btn-gestor-confirmar"
                            data-clienteid="${cId}"
                            data-rowid="${e.rowId}"
                            data-tipo="${tipo}">
                        Confirmar
                    </button>
                </div>
            </div>`;
        }).join('');

        const partes = titulo.match(/^(N\.\s*\d+)\s*-\s*(.+)$/);
        const tituloHtml = partes
            ? `<span class="num-cliente">${esc(partes[1])}</span> &mdash; ${esc(partes[2])}`
            : esc(titulo);

        return `
        <div class="gestor-item">
            <div class="gestor-cliente-nome">&#128205; ${tituloHtml}</div>
            ${itens}
        </div>`;
    }).join('');
};

window.abrirFotoGestorRetirada = function(url) {
    const overlay = document.getElementById('gestorFotoOverlay');
    const img = document.getElementById('gestorFotoImg');
    if (!overlay || !img || !url) return;
    img.src = url;
    overlay.classList.add('aberto');
    history.pushState({ gestorFoto: true }, '');
};

window.fecharFotoGestorRetirada = function(event) {
    const overlay = document.getElementById('gestorFotoOverlay');
    const img = document.getElementById('gestorFotoImg');
    if (!overlay || !img) return;
    if (event && event.target !== overlay) return;
    overlay.classList.remove('aberto');
    img.src = '';
    if (history.state?.gestorFoto) history.back();
};

window.addEventListener('popstate', () => {
    const overlay = document.getElementById('gestorFotoOverlay');
    const img = document.getElementById('gestorFotoImg');
    if (overlay?.classList.contains('aberto')) {
        overlay.classList.remove('aberto');
        if (img) img.src = '';
    }
});

window.confirmarGestorItem = async function(btnEl, clienteId, rowId, tipo) {
    if (btnEl) { btnEl.disabled = true; btnEl.textContent = '...'; }

    const restaurarBtn = () => { if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'Confirmar'; } };

    try {
        const cliente = (window._clientesData || []).find(c => c.firebaseUrl === clienteId);
        if (!cliente) {
            restaurarBtn();
            alert('Cliente nÃ£o encontrado. Recarregue a pÃ¡gina.');
            return;
        }

        let equips = Array.isArray(cliente?.equipDetalhes) && cliente.equipDetalhes.length > 0
            ? JSON.parse(JSON.stringify(cliente.equipDetalhes))
            : obterEquipamentosDetalhadosCliente(cliente).map(e => ({ ...e }));

        const idx = equips.findIndex(e => String(e?.rowId || '') === rowId);
        if (idx === -1) {
            restaurarBtn();
            alert('Equipamento nÃ£o encontrado. Recarregue a pÃ¡gina.');
            return;
        }

        if (tipo === 'retirada') {
            equips[idx].pixRetiradoPendente = '';
            equips[idx].contadorRetiradoPendente = '';
            equips[idx].retiradaPendenteEm = '';
            equips[idx].retiradaPendentePor = '';
            if (equips[idx].manutencaoPendente === 'retirada') {
                equips[idx].pix      = '';
                equips[idx].contador = '';
            }
        }
        if (tipo === 'adicao' && String(equips[idx].pixRetiradoPendente || '').trim() === String(equips[idx].pix || '').trim()) {
            equips[idx].pixRetiradoPendente = '';
            equips[idx].contadorRetiradoPendente = '';
            equips[idx].retiradaPendenteEm = '';
            equips[idx].retiradaPendentePor = '';
        }
        if (tipo === 'adicao' || equips[idx].manutencaoPendente === 'retirada') {
            equips[idx].manutencaoPendente    = '';
            equips[idx].aguardandoConfirmacao = false;
            equips[idx].manutencaoPendenteEm  = '';
            equips[idx].manutencaoPendentePor = '';
        }

        const patch = {
            equipDetalhes: equips,
            equip: serializarEquipamentosTextoCliente(equips)
        };
        const aindaPendente = equips.some(e => e.aguardandoConfirmacao || e.pixRetiradoPendente);
        if (!aindaPendente) patch.statusCadastro = 'ativo';

        await update(ref(db, `clientes/${clienteId}`), patch);
        await set(ref(db, 'metadata/clientes_versao'), Date.now());

        if (window.playAlert) await window.playAlert('Confirmado com sucesso.');
        else alert('Confirmado com sucesso.');
    } catch (e) {
        restaurarBtn();
        const detalhe = descreverErroFirebase(e, 'Erro ao confirmar.');
        alert(detalhe);
    }
};

window.selecionarMotivoCard = function(pixKey, el) {
    document.querySelectorAll(`#crdmotivos-${pixKey} .motivo-btn`).forEach(b => b.classList.remove('ativo'));
    el.classList.add('ativo');
    _retCardEstado[pixKey] = _retCardEstado[pixKey] || {};
    _retCardEstado[pixKey].motivo = el.dataset.valor;
};

window.selecionarCondicaoCard = function(pixKey, el) {
    document.querySelectorAll(`#crdcond-${pixKey} .condicao-btn`).forEach(b => b.className = 'condicao-btn');
    el.classList.add(el.dataset.cls);
    _retCardEstado[pixKey] = _retCardEstado[pixKey] || {};
    _retCardEstado[pixKey].condicao = el.dataset.valor;
};

window.confirmarRetiradaCard = async function(clienteId, rowId, pixNum, pixKey) {
    const usuarioLogado = String(localStorage.getItem('usuarioLogado') || '').trim();
    const dataRetirada = new Date().toISOString();
    const dadosContador = obterDadosRetiradaContador(pixKey);

    const cliente = (window._clientesData || []).find(c => c.firebaseUrl === clienteId);
    if (!cliente) {
        if (window.playAlert) {
            window.playAlert('Cliente n\u00e3o encontrado.');
        } else {
            alert('Cliente n\u00e3o encontrado.');
        }
        return;
    }

    const equips = obterEquipamentosDetalhadosCliente(cliente);
    const itemSelecionado = equips.find(e => String(e?.rowId || '') === rowId);
    if (!itemSelecionado) {
        if (window.playAlert) {
            window.playAlert('M\u00e1quina do Pix n\u00e3o encontrada no cliente.');
        } else {
            alert('M\u00e1quina do Pix n\u00e3o encontrada no cliente.');
        }
        return;
    }

    const nomeEquipamento = String(itemSelecionado?.nome || '').trim();
    if (dadosContador.usaContador) {
        if (!dadosContador.contadorAtualTexto) {
            exibirAvisoPadrao('Informe o valor atual do contador.');
            return;
        }
        if (dadosContador.contadorAtual < dadosContador.contadorAnterior) {
            exibirAvisoPadrao('O contador atual n\u00e3o pode ser menor que o contador anterior.');
            return;
        }
    }

    try {
        let fotoContadorUrl = '';
        let fotoContadorThumbUrl = '';
        if (dadosContador.usaContador && dadosContador.fotoBase64) {
            try {
                const fotoSalva = await storageSalvarFotoComThumb(dadosContador.fotoBase64, 'cadastro_pix/retirada_contador', 120);
                fotoContadorUrl = String(fotoSalva?.url || '').trim();
                fotoContadorThumbUrl = String(fotoSalva?.thumbUrl || fotoContadorUrl || '').trim();
            } catch (erroFoto) {
                throw new Error(descreverErroFirebase(erroFoto, 'Falha ao salvar a foto do contador.'));
            }
        }

        const extrasRetirada = {
            retirou_trocou_contador: dadosContador.usaContador,
            contador_anterior_retirada: dadosContador.usaContador ? dadosContador.contadorAnterior : '',
            contador_atual_retirada: dadosContador.usaContador ? dadosContador.contadorAtual : '',
            percentual_comissao_cliente: dadosContador.usaContador ? dadosContador.percentualComissao : '',
            valor_bruto_cliente: dadosContador.usaContador ? dadosContador.bruto : '',
            valor_comissao_cliente: dadosContador.usaContador ? dadosContador.valorComissao : '',
            valor_pagar_cliente: dadosContador.usaContador ? dadosContador.valorPagar : '',
            foto_contador_retirada: fotoContadorUrl,
            foto_contador_retirada_thumb: fotoContadorThumbUrl
        };

        try {
            await dbAplicarPendenciasManutencaoCliente(clienteId, {
                atendente: usuarioLogado,
                equipamentosRetiradosDetalhes: [{
                    nome: nomeEquipamento,
                    pix: String(pixNum || '').trim()
                }]
            });
        } catch (erroCliente) {
            throw new Error(descreverErroFirebase(erroCliente, 'Falha ao marcar a m\u00e1quina do cliente.'));
        }

        try {
            await update(ref(db, `clientes/${clienteId}`), { statusCadastro: 'em_analise' });
        } catch (erroStatus) {
            throw new Error(descreverErroFirebase(erroStatus, 'Falha ao marcar o cliente em an\u00e1lise.'));
        }

        const chaveFirebase = Object.keys(window._pixData).find(
            k => String(window._pixData[k].numero_pix) === String(pixNum)
        );

        if (chaveFirebase) {
            try {
                await update(ref(db, `${PATH}/${chaveFirebase}`), {
                    situacao         : 'retirado',
                    tecnico_retirada : usuarioLogado,
                    data_retirada    : dataRetirada,
                    equipamento      : nomeEquipamento,
                    identificacao    : montarIdentificacaoCliente(cliente),
                    motivo_retirada  : 'manutencao',
                    condicao_retirada: 'analise',
                    destino_retirada : 'analise',
                    ...extrasRetirada
                });
            } catch (erroPixExistente) {
                throw new Error(descreverErroFirebase(erroPixExistente, 'Falha ao atualizar o cadastro do Pix.'));
            }
        } else {
            try {
                await push(ref(db, PATH), {
                    numero_pix       : pixNum,
                    cliente          : String(cliente.nome || '').trim(),
                    identificacao    : montarIdentificacaoCliente(cliente),
                    equipamento      : nomeEquipamento,
                    situacao         : 'retirado',
                    tecnico_retirada : usuarioLogado,
                    data_retirada    : dataRetirada,
                    motivo_retirada  : 'manutencao',
                    condicao_retirada: 'analise',
                    destino_retirada : 'analise',
                    ...extrasRetirada,
                    criado_em        : new Date().toISOString()
                });
            } catch (erroPixNovo) {
                throw new Error(descreverErroFirebase(erroPixNovo, 'Falha ao registrar um novo cadastro de Pix retirado.'));
            }
        }

        try {
            await set(ref(db, 'metadata/clientes_versao'), Date.now());
        } catch (erroVersao) {
            throw new Error(descreverErroFirebase(erroVersao, 'Falha ao atualizar a vers\u00e3o dos clientes.'));
        }

        try {
            await dbAdicionarPixEmPosse(usuarioLogado, pixNum, {
                cliente: String(cliente.nome || '').trim(),
                equipamento: nomeEquipamento,
                origem: 'retirada_pix',
                atualizadoEm: dataRetirada
            });
        } catch (erroPossePix) {
            console.warn('Falha ao lanÃ§ar Pix no balanÃ§o:', erroPossePix);
        }

        delete _retiradaContadorFotos[pixKey];

        if (window.playAlert) {
            window.playAlert(`Retirada do Pix ${pixNum} registrada e marcada em an\u00e1lise.`);
        } else {
            alert(`Retirada do Pix ${pixNum} registrada e marcada em an\u00e1lise.`);
        }
    } catch (e) {
        console.error('Erro ao confirmar retirada do Pix:', e);
        const detalhe = descreverErroFirebase(e, 'Erro ao salvar a retirada.');
        if (window.playAlert) {
            window.playAlert(detalhe);
        } else {
            alert(detalhe);
        }
    }
};
