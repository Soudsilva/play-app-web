<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Clientes</title>
<style>
    body{ margin:0; font-family:Arial; background:#0f2a66; display:flex; justify-content:center; color:white; }
    .app{ width:100%; max-width:420px; padding:15px; box-sizing:border-box; }
    .topo{ display:flex; align-items:center; margin-bottom:20px; gap:20px; }
    .titulo{ font-size:28px; font-weight:bold; }
    .voltar{ cursor:pointer; font-size:18px; }
    .cliente{ background:rgba(255,255,255,0.1); padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.2); }
    .nome{ font-size:18px; font-weight:bold; margin-bottom:8px; }
    .info{ font-size:14px; color:#cfd6e3; margin-bottom:4px; }
    .botao-excluir{ color:#ff4d4d; font-size:13px; margin-top:10px; cursor:pointer; text-align:right; font-weight:bold; }
    .botao-add{ background:#4467a8; padding:15px; text-align:center; border-radius:30px; font-weight:bold; cursor:pointer; margin-bottom:20px; }
    #campoPesquisa{ width:100%; padding:12px; border-radius:10px; border:none; font-size:16px; margin-bottom:20px; box-sizing:border-box; }
</style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="voltar" id="btnVoltar">⬅ Voltar</div>
        <div class="titulo">Clientes</div>
    </div>

    <div class="botao-add" id="btnNovo"> + Novo Cliente</div>
    <input type="text" id="campoPesquisa" placeholder="Buscar cliente...">

    <div id="listaClientes">
        <p style="text-align:center">Conectando ao banco...</p>
    </div>
</div>

<script type="module">
    import { dbEscutarClientes, dbExcluirCliente } from './database.js';

    // Esta função desenha os cards na tela
    function renderizarLista(clientes) {
        const listaHTML = document.getElementById("listaClientes");
        listaHTML.innerHTML = "";

        if (clientes.length === 0) {
            listaHTML.innerHTML = "<p style='text-align:center'>Nenhum cliente cadastrado.</p>";
            return;
        }

        // Ordenar por número
        clientes.sort((a, b) => parseInt(a.numero) - parseInt(b.numero));

        clientes.forEach(c => {
            const card = document.createElement('div');
            card.className = 'cliente';
            card.innerHTML = `
                <div class="nome">N. ${c.numero} ${c.nome}</div>
                <div class="info"><b>Cidade:</b> ${c.cidade || ""}</div>
                <div class="info"><b>Rota:</b> ${c.rota || ""}</div>
                <div class="info"><b>Aberto:</b> ${c.aberto || ""}</div>
                <div class="botao-excluir" data-id="${c.firebaseUrl}">Excluir da Nuvem</div>
            `;
            listaHTML.appendChild(card);
        });

        // Configurar botões de excluir
        document.querySelectorAll('.botao-excluir').forEach(btn => {
            btn.onclick = async (e) => {
                const id = e.target.getAttribute('data-id');
                if(confirm("Excluir este cliente de todos os dispositivos?")) {
                    await dbExcluirCliente(id);
                    // Não precisa chamar nada aqui, a escuta atualiza sozinha!
                }
            };
        });
    }

    // ATIVANDO A ESCUTA EM TEMPO REAL
    dbEscutarClientes((clientes) => {
        renderizarLista(clientes);
    });

    // Navegação
    document.getElementById('btnVoltar').onclick = () => window.location.href="index.html";
    document.getElementById('btnNovo').onclick = () => window.location.href="cadastrar_cliente.html";

    // Pesquisa básica (filtra a lista atual na tela)
    document.getElementById('campoPesquisa').oninput = (e) => {
        const termo = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.cliente');
        cards.forEach(card => {
            const texto = card.innerText.toLowerCase();
            card.style.display = texto.includes(termo) ? "block" : "none";
        });
    };
</script>
</body>
</html>
