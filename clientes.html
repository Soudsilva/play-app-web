<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Clientes</title>
<style>
    * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    .copiar { -webkit-user-select: text !important; user-select: text !important; }

    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background:
            radial-gradient(circle at top, rgba(54,105,214,0.55), transparent 34%),
            linear-gradient(180deg, #11317a 0%, #0b2256 42%, #071634 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        color: white;
    }

    .app {
        width: 100%;
        max-width: 440px;
        padding: 18px;
    }

    .topo {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin-bottom: 20px;
        position: relative;
        padding: 10px 0 2px;
    }

    .titulo-wrap { text-align: center; }
    .titulo { font-size: 29px; font-weight: bold; letter-spacing: 0.3px; }
    .subtitulo { margin-top: 3px; font-size: 12px; letter-spacing: 1.6px; text-transform: uppercase; color: #ffffff; }

    .btn-home {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        background: rgba(255,255,255,0.16);
        width: 42px; height: 42px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid rgba(255,255,255,0.24);
        box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    }
    .btn-home:active { background: rgba(255,255,255,0.34); transform: translateY(-50%) scale(0.92); }
    .btn-home img { width: 22px; height: 22px; filter: brightness(0) invert(1); }

    /* Barra de ações */
    .barra-acoes {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        align-items: center;
    }

    .botao-add {
        display: flex;
        align-items: center;
        gap: 7px;
        background: linear-gradient(135deg, #1e88e5, #1565c0);
        padding: 11px 18px;
        border-radius: 50px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 4px 14px rgba(21,101,192,0.4);
        border: 1px solid rgba(255,255,255,0.18);
        flex-shrink: 0;
    }
    .botao-add:active { transform: scale(0.97); }
    .botao-add svg { width: 15px; height: 15px; stroke: white; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    /* Campo de busca */
    .search-wrap {
        position: relative;
        flex: 1;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 50px;
        display: flex;
        align-items: center;
        padding: 0 14px 0 10px;
    }
    .search-wrap svg {
        width: 15px; height: 15px;
        stroke: rgba(255,255,255,0.5);
        fill: none; stroke-width: 2;
        stroke-linecap: round; stroke-linejoin: round;
        flex-shrink: 0;
    }
    #campoPesquisa {
        flex: 1;
        background: transparent;
        border: none;
        padding: 10px 8px;
        color: white;
        font-size: 14px;
        outline: none;
        width: 100%;
    }
    #campoPesquisa::placeholder { color: rgba(255,255,255,0.85); font-weight: bold; }

    .search-flutuante {
        position: fixed;
        top: -70px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 36px);
        max-width: 404px;
        background: rgba(10, 30, 80, 0.92);
        border: 1px solid rgba(255,255,255,0.22);
        border-radius: 50px;
        display: flex;
        align-items: center;
        padding: 0 14px 0 12px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.45);
        backdrop-filter: blur(14px);
        z-index: 999;
        transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .search-flutuante.visivel {
        top: 14px;
    }

    .search-flutuante svg {
        width: 16px; height: 16px;
        stroke: rgba(255,255,255,0.7);
        fill: none; stroke-width: 2;
        stroke-linecap: round; stroke-linejoin: round;
        flex-shrink: 0;
    }

    #campoPesquisaFlutuante {
        flex: 1;
        background: transparent;
        border: none;
        padding: 12px 8px;
        color: white;
        font-size: 15px;
        outline: none;
    }

    #campoPesquisaFlutuante::placeholder {
        color: rgba(255,255,255,0.75);
        font-weight: bold;
    }

    /* Cards */
    .cliente {
        background: linear-gradient(160deg, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0.06) 100%);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 20px;
        margin-bottom: 14px;
        overflow: hidden;
        box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        backdrop-filter: blur(8px);
        position: relative;
    }

    .cliente-accent {
        height: 4px;
        background: linear-gradient(90deg, #4caf50, #81c784);
        width: 100%;
    }

    .cliente-corpo {
        padding: 14px 16px 12px;
    }

    .cliente-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
        gap: 10px;
    }

    .cliente-col-esq {
        flex: 1;
        min-width: 0;
    }

    .cliente-numero-nome {
        font-size: 22px;
        font-weight: bold;
        color: #ffffff;
        line-height: 1.2;
        word-break: break-word;
    }

    .cliente-numero-nome .num {
        color: #ffffff;
    }

    .cliente-icones {
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex-shrink: 0;
    }

    .icone-acao-cliente {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
    }

    .icone-acao-cliente img {
        width: 34px; height: 34px;
    }

    .icone-acao-cliente span {
        font-size: 9px;
        font-weight: bold;
        color: #ffeb3b;
        letter-spacing: 0.3px;
    }

    /* Campos de info */
    .cliente-campos {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 10px;
        margin-top: 8px;
    }

    .campo-linha {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }

    .campo-item {
        font-size: 15px;
        color: #ffffff;
        line-height: 1.5;
    }

    .campo-item b { color: #ff9800; }

    .campo-item.obs-item {
        font-style: italic;
        font-size: 14px;
        color: #ffffff;
    }

    /* Ações editar/excluir */
    .acoes-cliente {
        display: flex;
        gap: 12px;
        padding-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.2);
        align-items: center;
    }

    .acao-cliente {
        display: inline-flex; align-items: center; gap: 5px;
        cursor: pointer; font-size: 13px; font-weight: 600;
        transition: transform 0.15s ease;
    }
    .acao-cliente svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex: none; }
    .acao-cliente.editar { color: #ffeb3b; }
    .acao-cliente.excluir { color: #ff8a8a; }
    .acao-cliente:active { transform: scale(0.95); }
    .acao-divisor { color: #ffffff; }

    .btn-copiar-img { width: 15px; height: 15px; cursor: pointer; vertical-align: middle; margin-left: 6px; opacity: 0.7; }
    .btn-copiar-img:active { transform: scale(0.9); }
</style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo-wrap">
            <div class="titulo">Clientes</div>
            <div class="subtitulo">Lista geral</div>
        </div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="barra-acoes">
        <div class="botao-add" id="btnNovo">
            <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo Cliente
        </div>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
            <input type="text" id="campoPesquisa" placeholder="Buscar...">
        </div>
    </div>

    <div id="listaClientes">
        <p style="text-align:center">Conectando ao banco...</p>
    </div>
</div>

<div class="search-flutuante" id="searchFlutuante">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    <input type="text" id="campoPesquisaFlutuante" placeholder="Buscar...">
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { dbEscutarClientes, dbExcluirCliente, dbEscutarColaboradores } from './database.js';

    let perfilUsuarioLogado = "";
    let nomeUsuarioLogado = "";
    let clientesSalvos = [];

    function normalizarTexto(valor) {
        return String(valor || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .trim();
    }

    function obterDataLocalIso(data) {
        const base = data ? new Date(data) : new Date();
        if (Number.isNaN(base.getTime())) return "";
        const ano = base.getFullYear();
        const mes = String(base.getMonth() + 1).padStart(2, "0");
        const dia = String(base.getDate()).padStart(2, "0");
        return `${ano}-${mes}-${dia}`;
    }

    function usuarioPodeGerenciarCliente(cliente) {
        if (!cliente) return false;
        if (perfilUsuarioLogado.includes('gestao')) return true;
        if (!perfilUsuarioLogado.includes('atendimento')) return false;

        const autorCadastro = cliente.cadastradoPor || cliente.ponto_aberto || "";
        const diaCadastro = cliente.dataCadastroDia || obterDataLocalIso(cliente.dataCadastro);
        const mesmoUsuario = normalizarTexto(autorCadastro) === normalizarTexto(nomeUsuarioLogado);
        const mesmoDia = diaCadastro === obterDataLocalIso();
        return mesmoUsuario && mesmoDia;
    }

    function renderizarLista(clientes) {
        const listaHTML = document.getElementById("listaClientes");
        listaHTML.innerHTML = "";
        clientesSalvos = clientes;

        if (clientes.length === 0) {
            listaHTML.innerHTML = "<p style='text-align:center'>Nenhum cliente cadastrado.</p>";
            return;
        }

        clientes.sort((a, b) => parseInt(a.numero) - parseInt(b.numero));

        clientes.forEach(c => {
            // 1. Processar Equipamentos e Pix
            let equipString = "";
            if (c.equip) {
                const equipList = c.equip.split(', ');
                const equipsToShow = [];
                equipList.forEach(item => {
                    if (!item) return;
                    let nome = item;
                    let qtd = "1";
                    let pix = "";
                    const regexQtd = /\s*\(([^)]+)\)$/;
                    const matchQtd = nome.match(regexQtd);
                    if (matchQtd) {
                        qtd = matchQtd[1];
                        nome = nome.replace(regexQtd, "").trim();
                    }
                    const regexPix = /\s*\[Pix:\s*([^\]]+)\]$/;
                    const matchPix = nome.match(regexPix);
                    if (matchPix) {
                        pix = matchPix[1];
                        nome = nome.replace(regexPix, "").trim();
                    }
                    nome = nome.trim();
                    if (nome) {
                        const formato = `${nome} ${qtd}${pix ? ` Pix ${pix}` : ''}`;
                        equipsToShow.push(formato);
                    }
                });
                if (equipsToShow.length > 0) {
                    equipString = equipsToShow.join(', ');
                }
            }

            // 2. Construir campos de info
            const campos = [];
            if (c.cidade) campos.push(`<div class="campo-item"><b>Cidade:</b> <span class="copiar">${c.cidade}</span></div>`);
            if (c.rota || c.comissao) {
                let rc = '';
                if (c.rota) rc += `<b>Rota:</b> <span class="copiar">${c.rota}</span>`;
                if (c.comissao) rc += `${c.rota ? ' &nbsp;' : ''}<b>Perc.:</b> ${c.comissao}`;
                campos.push(`<div class="campo-item">${rc}</div>`);
            }
            if (equipString) campos.push(`<div class="campo-item"><b>Equip.:</b> ${equipString}</div>`);
            if (c.aberto) campos.push(`<div class="campo-item"><b>Aberto:</b> ${c.aberto}</div>`);
            if (c.endereco) campos.push(`<div class="campo-item"><b>End.:</b> <span class="copiar">${c.endereco}</span><img src="https://cdn-icons-png.flaticon.com/512/1621/1621635.png" class="btn-copiar-img" onclick="copiarTexto('${c.endereco}')"></div>`);
            if (c.obs) campos.push(`<div class="campo-item obs-item"><b>Obs:</b> ${c.obs}</div>`);

            const acoesVisuaisHtml = usuarioPodeGerenciarCliente(c) ? `
                <div class="acoes-cliente">
                    <div onclick="editarCliente('${c.firebaseUrl}')" class="acao-cliente editar">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4z"/>
                        </svg>
                        <span>Editar</span>
                    </div>
                    <span class="acao-divisor">|</span>
                    <div onclick="excluirCliente('${c.firebaseUrl}')" class="acao-cliente excluir">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/>
                            <path d="M10 11v6"/><path d="M14 11v6"/>
                        </svg>
                        <span>Excluir</span>
                    </div>
                </div>
            ` : '';

            // 3. Montar o card final
            const card = document.createElement('div');
            card.className = 'cliente';
            card.innerHTML = `
                <div class="cliente-accent"></div>
                <div class="cliente-corpo">
                    <div class="cliente-header">
                        <div class="cliente-col-esq">
                            <div class="cliente-numero-nome">
                                <span class="num">N. ${c.numero}</span> — ${c.nome}
                            </div>
                            <div class="cliente-campos">
                                <div class="campo-linha">
                                    ${campos.join('')}
                                </div>
                            </div>
                        </div>
                        <div class="cliente-icones">
                            <div class="icone-acao-cliente" onclick="abrirConfiguracoes('${c.firebaseUrl}')">
                                <img src="assets/img/engrenagen.png" alt="Manutenção">
                                <span>Manutenção</span>
                            </div>
                            <div class="icone-acao-cliente" onclick="abrirMapa('${c.endereco || ""}')">
                                <img src="assets/img/Localizacao.png" alt="Localização">
                                <span>Localização</span>
                            </div>
                        </div>
                    </div>
                    ${acoesVisuaisHtml}
                </div>
            `;
            listaHTML.appendChild(card);
        });
    }

    dbEscutarColaboradores((colaboradores) => {
        nomeUsuarioLogado = localStorage.getItem('usuarioLogado') || "";
        const usuarioAtual = colaboradores.find(c => c.nome === nomeUsuarioLogado);
        perfilUsuarioLogado = String(usuarioAtual?.nivel_completo || "");
        renderizarLista(clientesSalvos);
    });

    dbEscutarClientes((clientes) => { renderizarLista(clientes); });

    document.getElementById('btnNovo').onclick = () => window.location.href="cadastrar_cliente.html";

    function aplicarBusca(termo) {
        const normalizado = termo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        const cards = document.querySelectorAll('.cliente');
        cards.forEach(card => {
            const textoCard = card.innerText.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            card.style.display = textoCard.includes(normalizado) ? "block" : "none";
        });
    }

    document.getElementById('campoPesquisa').oninput = (e) => {
        aplicarBusca(e.target.value);
        document.getElementById('campoPesquisaFlutuante').value = e.target.value;
    };

    document.getElementById('campoPesquisaFlutuante').oninput = (e) => {
        aplicarBusca(e.target.value);
        document.getElementById('campoPesquisa').value = e.target.value;
    };

    const barraBusca = document.getElementById('searchFlutuante');
    const barraNormal = document.querySelector('.search-wrap');

    window.addEventListener('scroll', () => {
        const limiar = barraNormal.getBoundingClientRect().bottom;
        if (limiar < 0) {
            barraBusca.classList.add('visivel');
        } else {
            barraBusca.classList.remove('visivel');
        }
    }, { passive: true });

    window.copiarTexto = function(texto) {
        if (!texto) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(texto).catch(() => usarPlanoB(texto));
        } else {
            usarPlanoB(texto);
        }
        function usarPlanoB(txt) {
            const area = document.createElement("textarea");
            area.value = txt; document.body.appendChild(area);
            area.select(); document.execCommand('copy');
            document.body.removeChild(area);
        }
    };

    window.excluirCliente = async function(url) {
        const id = url.split('/').pop().replace('.json', '');
        const cliente = clientesSalvos.find(c => c.firebaseUrl === id);
        if (!usuarioPodeGerenciarCliente(cliente)) {
            alert("VocÃª nÃ£o tem permissÃ£o para excluir este cliente.");
            return;
        }
        if (await window.playConfirm("Deseja realmente excluir este cliente?")) {
            try { await dbExcluirCliente(id); } catch (e) { alert("Erro ao excluir."); }
        }
    };

    window.editarCliente = function(url) {
        const id = url.split('/').pop().replace('.json', '');
        const cliente = clientesSalvos.find(c => c.firebaseUrl === id);
        if (!usuarioPodeGerenciarCliente(cliente)) {
            alert("VocÃª nÃ£o tem permissÃ£o para editar este cliente.");
            return;
        }
        window.location.href = `cadastrar_cliente.html?edit=${id}`;
    };

    window.abrirConfiguracoes = function(url) {
        const id = String(url || "").split('/').pop().replace('.json', '');
        if (!id) {
            alert("Cliente nao encontrado.");
            return;
        }
        window.location.href = `manutencao_cliente.html?cliente=${encodeURIComponent(id)}`;
    };
    window.abrirMapa = function(endereco) {
        if (!endereco) { alert("Sem endereço."); return; }
        const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`;
        window.open(url, '_blank');
    };
</script>
</body>
</html>
