<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Clientes</title>
<style>
    /* -------------------------------------------------------------------------
       [ESTILO GERAL]
       ------------------------------------------------------------------------- */
    body { margin:0; font-family:Arial; background:#042d86; display:flex; justify-content:center; color:white; }
    .app { width:100%; max-width:420px; padding:15px; box-sizing:border-box; }
    
    /* Cabeçalho Fixo no Topo do Container */
    .topo { 
        display: flex; 
        justify-content: center; 
        align-items: center;
        width: 100%; 
        margin-bottom: 20px; 
        position: relative; /* Âncora para a casinha */
        padding: 10px 0;
    }
    .titulo { font-size:28px; font-weight:bold; }

    /* [BOTÃO HOME - A CASINHA] */
    .btn-home {
        position: absolute; 
        right: 0;           
        top: 50%;           
        transform: translateY(-50%); 
        cursor: pointer;
        background: rgba(255, 255, 255, 0.2);
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: 0.2s;
    }
    .btn-home:active { background: rgba(255, 255, 255, 0.4); transform: translateY(-50%) scale(0.9); }
    .btn-home img { width: 22px; height: 22px; filter: brightness(0) invert(1); }

    /* Cards e Elementos */
    .cliente { 
        background:rgba(255,255,255,0.1); padding:15px; border-radius:12px; 
        margin-bottom:15px; border:1px solid rgba(255,255,255,0.2); position: relative; 
    }
    .botao-add { background:#4467a8; padding:15px; text-align:center; border-radius:30px; font-weight:bold; cursor:pointer; margin-bottom:20px; }
    #campoPesquisa { width:100%; padding:12px; border-radius:10px; border:none; font-size:16px; margin-bottom:20px; box-sizing:border-box; }

    /* Bloqueios e Seleção */
    * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    .copiar { -webkit-user-select: text !important; user-select: text !important; }
    .btn-copiar-img { width: 18px; height: 18px; cursor: pointer; vertical-align: middle; margin-left: 8px; opacity: 0.8; }
    .btn-copiar-img:active { transform: scale(0.9); }
    .acoes-cliente { display:flex; gap:14px; padding:10px 0 5px 5px; align-items:center; }
    .acao-cliente { display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; font-weight:600; color:#e9eefc; opacity:0.9; transition:opacity 0.2s ease, transform 0.2s ease; }
    .acao-cliente svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; flex:none; }
    .acao-cliente.editar { color:#ffeb3b; }
    .acao-cliente.excluir { color:#ff8a8a; }
    .acao-cliente:active { transform:scale(0.97); }
    .acao-divisor { color:rgba(255,255,255,0.25); }

</style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo">Clientes</div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="botao-add" id="btnNovo"> Cadastrar Cliente</div>
    <input type="text" id="campoPesquisa" placeholder="Buscar cliente...">

    <div id="listaClientes">
        <p style="text-align:center">Conectando ao banco...</p>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { dbEscutarClientes, dbExcluirCliente, dbEscutarColaboradores } from './database.js';

    let perfilUsuarioLogado = "";
    let nomeUsuarioLogado = "";
    let clientesSalvos = [];

    function normalizarTexto(valor) {
        return String(valor || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .trim();
    }

    function obterDataLocalIso(data) {
        const base = data ? new Date(data) : new Date();
        if (Number.isNaN(base.getTime())) return "";
        const ano = base.getFullYear();
        const mes = String(base.getMonth() + 1).padStart(2, "0");
        const dia = String(base.getDate()).padStart(2, "0");
        return `${ano}-${mes}-${dia}`;
    }

    function usuarioPodeGerenciarCliente(cliente) {
        if (!cliente) return false;
        if (perfilUsuarioLogado.includes('gestao')) return true;
        if (!perfilUsuarioLogado.includes('atendimento')) return false;

        const autorCadastro = cliente.cadastradoPor || cliente.ponto_aberto || "";
        const diaCadastro = cliente.dataCadastroDia || obterDataLocalIso(cliente.dataCadastro);
        const mesmoUsuario = normalizarTexto(autorCadastro) === normalizarTexto(nomeUsuarioLogado);
        const mesmoDia = diaCadastro === obterDataLocalIso();
        return mesmoUsuario && mesmoDia;
    }

    function renderizarLista(clientes) {
        const listaHTML = document.getElementById("listaClientes");
        listaHTML.innerHTML = "";
        clientesSalvos = clientes;

        if (clientes.length === 0) {
            listaHTML.innerHTML = "<p style='text-align:center'>Nenhum cliente cadastrado.</p>";
            return;
        }

        clientes.sort((a, b) => parseInt(a.numero) - parseInt(b.numero));

        clientes.forEach(c => {
            // 1. Processar Equipamentos e Pix
            let equipString = "";
            if (c.equip) {
                const equipList = c.equip.split(', ');
                const equipsToShow = [];
                equipList.forEach(item => {
                    if (!item) return;
                    let nome = item;
                    let qtd = "1";
                    let pix = "";
                    const regexQtd = /\s*\(([^)]+)\)$/;
                    const matchQtd = nome.match(regexQtd);
                    if (matchQtd) {
                        qtd = matchQtd[1];
                        nome = nome.replace(regexQtd, "").trim();
                    }
                    const regexPix = /\s*\[Pix:\s*([^\]]+)\]$/;
                    const matchPix = nome.match(regexPix);
                    if (matchPix) {
                        pix = matchPix[1];
                        nome = nome.replace(regexPix, "").trim();
                    }
                    nome = nome.trim();
                    if (nome) {
                        const formato = `${nome} ${qtd}${pix ? ` Pix ${pix}` : ''}`;
                        equipsToShow.push(formato);
                    }
                });
                if (equipsToShow.length > 0) {
                    equipString = equipsToShow.join(' / ');
                }
            }

            // 2. Construir blocos de HTML condicionalmente
            const cidadeHtml = c.cidade ? `<div style="display: table; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 3px 8px; margin-bottom: 4px;"><b style="color: #ff9800;">Cidade: </b> <span class="copiar">${c.cidade}</span></div>` : '';

            let rotaComissaoContent = '';
            if (c.rota) {
                rotaComissaoContent += `<b style="color: #ff9800;">Rota: </b> <span class="copiar">${c.rota}</span>`;
            }
            if (c.comissao) {
                const margin = c.rota ? 'margin-left: 10px;' : '';
                rotaComissaoContent += `<span style="${margin}"><b style="color: #ff9800;">Perc.: </b> ${c.comissao}</span>`;
            }
            const rotaComissaoHtml = rotaComissaoContent ? `<div style="display: table; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 3px 8px; margin-bottom: 4px;">${rotaComissaoContent}</div>` : '';

            const equipHtml = equipString ? `<div style="display: table; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 3px 8px; margin-bottom: 4px;"><b style="color: #ff9800;">Equi.: </b> ${equipString}</div>` : '';

            const abertoHtml = c.aberto ? `<div style="display: table; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 3px 8px; margin-bottom: 4px;"><b style="color: #ff9800;">Aberto: </b> ${c.aberto}</div>` : '';
            
            const obsHtml = c.obs ? `<div style="display: table; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 3px 8px; margin: 0 0 4px 0; font-style: italic; font-size: 12px;"><b style="color: #ff9800;">Obs: </b> ${c.obs}</div>` : '';

            const enderecoHtml = c.endereco ? `<div style="display: table; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 3px 8px; margin: 0 0 4px 0;"><b style="color: #ff9800;">Endereço: </b> <span>${c.endereco}</span> <img src="https://cdn-icons-png.flaticon.com/512/1621/1621635.png" class="btn-copiar-img" onclick="copiarTexto('${c.endereco}')"></div>` : '';

            const acoesHtml = usuarioPodeGerenciarCliente(c) ? `
                <div style="display: flex; gap: 15px; padding: 10px 0 5px 5px; align-items: center;">
                    <div onclick="editarCliente('${c.firebaseUrl}')" style="color: #ffeb3b; font-weight: bold; cursor: pointer; font-size: 14px;">âœŽ Editar</div>
                    <span style="color: rgba(255,255,255,0.2);">|</span>
                    <div onclick="excluirCliente('${c.firebaseUrl}')" style="color: #ff4d4d; font-weight: bold; cursor: pointer; font-size: 14px;">X Excluir</div>
                </div>
            ` : '';

            const acoesVisuaisHtml = usuarioPodeGerenciarCliente(c) ? `
                <div class="acoes-cliente">
                    <div onclick="editarCliente('${c.firebaseUrl}')" class="acao-cliente editar">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 20h9"/>
                            <path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4z"/>
                        </svg>
                        <span>Editar</span>
                    </div>
                    <span class="acao-divisor">|</span>
                    <div onclick="excluirCliente('${c.firebaseUrl}')" class="acao-cliente excluir">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 6h18"/>
                            <path d="M8 6V4h8v2"/>
                            <path d="M19 6l-1 14H6L5 6"/>
                            <path d="M10 11v6"/>
                            <path d="M14 11v6"/>
                        </svg>
                        <span>Excluir</span>
                    </div>
                </div>
            ` : '';

            // 3. Montar o card final
            const card = document.createElement('div');
            card.className = 'cliente';
            card.innerHTML = `
                <div style="width: calc(100% + 20px); height: 4px; background-color: #4caf50; margin: -10px -10px 15px -10px; border-radius: 4px 4px 0 0;"></div>
                
                <div style="float: right; display: flex; flex-direction: column; align-items: center; gap: 15px; margin-left: 15px; margin-bottom: 10px;">
                    <div style="display: flex; flex-direction: column; align-items: center; cursor: pointer;" onclick="abrirConfiguracoes('${c.firebaseUrl}')">
                        <img src="assets/img/engrenagen.png" style="width: 40px; height: 40px;">
                        <span style="font-size: 9px; color: #ffeb3b; font-weight: bold;">Manutenção</span>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: center; cursor: pointer;" onclick="abrirMapa('${c.endereco || ""}')">
                        <img src="assets/img/Localizacao.png" style="width: 40px; height: 40px;">
                        <span style="font-size: 9px; color: #ffeb3b; font-weight: bold;">Localização</span>
                    </div>
                </div>

                <div style="display: table; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 4px 8px; margin-bottom: 10px; font-weight: bold; font-size: 20px;">
                    <span style="color: #ff9800;">N. </span> <span style="color: #ffeb3b;">${c.numero} - ${c.nome}</span>
                </div>
                
                ${cidadeHtml}
                ${rotaComissaoHtml}
                ${equipHtml}
                ${abertoHtml}
                ${obsHtml}
                ${enderecoHtml}
                
                <div style="clear: both;"></div>

                ${acoesVisuaisHtml}
            `;
            listaHTML.appendChild(card);
        });
    }

    dbEscutarColaboradores((colaboradores) => {
        nomeUsuarioLogado = localStorage.getItem('usuarioLogado') || "";
        const usuarioAtual = colaboradores.find(c => c.nome === nomeUsuarioLogado);
        perfilUsuarioLogado = String(usuarioAtual?.nivel_completo || "");
        renderizarLista(clientesSalvos);
    });

    dbEscutarClientes((clientes) => { renderizarLista(clientes); });

    document.getElementById('btnNovo').onclick = () => window.location.href="cadastrar_cliente.html";

    document.getElementById('campoPesquisa').oninput = (e) => {
        const termo = e.target.value.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); 
        const cards = document.querySelectorAll('.cliente');
        cards.forEach(card => {
            const textoCard = card.innerText.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            card.style.display = textoCard.includes(termo) ? "block" : "none";
        });
    };

    window.copiarTexto = function(texto) {
        if (!texto) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(texto).catch(() => usarPlanoB(texto));
        } else {
            usarPlanoB(texto);
        }
        function usarPlanoB(txt) {
            const area = document.createElement("textarea");
            area.value = txt; document.body.appendChild(area);
            area.select(); document.execCommand('copy');
            document.body.removeChild(area);
        }
    };

    window.excluirCliente = async function(url) {
        const id = url.split('/').pop().replace('.json', '');
        const cliente = clientesSalvos.find(c => c.firebaseUrl === id);
        if (!usuarioPodeGerenciarCliente(cliente)) {
            alert("VocÃª nÃ£o tem permissÃ£o para excluir este cliente.");
            return;
        }
        if (await window.playConfirm("Deseja realmente excluir este cliente?")) {
            try { await dbExcluirCliente(id); } catch (e) { alert("Erro ao excluir."); }
        }
    };

    window.editarCliente = function(url) {
        const id = url.split('/').pop().replace('.json', '');
        const cliente = clientesSalvos.find(c => c.firebaseUrl === id);
        if (!usuarioPodeGerenciarCliente(cliente)) {
            alert("VocÃª nÃ£o tem permissÃ£o para editar este cliente.");
            return;
        }
        window.location.href = `cadastrar_cliente.html?edit=${id}`;
    };

    window.abrirConfiguracoes = function(url) {
        const id = String(url || "").split('/').pop().replace('.json', '');
        if (!id) {
            alert("Cliente nao encontrado.");
            return;
        }
        window.location.href = `manutencao_cliente.html?cliente=${encodeURIComponent(id)}`;
    };
    window.abrirMapa = function(endereco) {
        if (!endereco) { alert("Sem endereço."); return; }
        const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`;
        window.open(url, '_blank');
    };
</script>
</body>
</html>
