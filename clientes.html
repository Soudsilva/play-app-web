<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Clientes</title>
<style>
    * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    .copiar { -webkit-user-select: text !important; user-select: text !important; }

    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background:
            radial-gradient(circle at top, rgba(54,105,214,0.55), transparent 34%),
            linear-gradient(180deg, #11317a 0%, #0b2256 42%, #071634 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        color: white;
    }

    .app {
        width: 100%;
        max-width: 440px;
        padding: 18px;
    }

    .topo {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin-bottom: 20px;
        position: relative;
        padding: 10px 0 2px;
    }

    .titulo-wrap { text-align: center; }
    .titulo { font-size: 29px; font-weight: bold; letter-spacing: 0.3px; }
    .subtitulo { margin-top: 3px; font-size: 12px; letter-spacing: 1.6px; text-transform: uppercase; color: #ffffff; }

    .btn-home {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        background: rgba(255,255,255,0.16);
        width: 42px; height: 42px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid rgba(255,255,255,0.24);
        box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    }
    .btn-home:active { background: rgba(255,255,255,0.34); transform: translateY(-50%) scale(0.92); }
    .btn-home img { width: 22px; height: 22px; filter: brightness(0) invert(1); }

    /* Barra de ações */
    .barra-acoes {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        align-items: center;
    }

    .botao-add {
        display: flex;
        align-items: center;
        gap: 7px;
        background: linear-gradient(135deg, #1e88e5, #1565c0);
        padding: 11px 18px;
        border-radius: 50px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 4px 14px rgba(21,101,192,0.4);
        border: 1px solid rgba(255,255,255,0.18);
        flex-shrink: 0;
    }
    .botao-add:active { transform: scale(0.97); }
    .botao-add svg { width: 15px; height: 15px; stroke: white; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    /* Campo de busca */
    .search-wrap {
        position: relative;
        flex: 1;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 50px;
        display: flex;
        align-items: center;
        padding: 0 14px 0 10px;
    }
    .search-wrap svg {
        width: 15px; height: 15px;
        stroke: rgba(255,255,255,0.5);
        fill: none; stroke-width: 2;
        stroke-linecap: round; stroke-linejoin: round;
        flex-shrink: 0;
    }
    #campoPesquisa {
        flex: 1;
        background: transparent;
        border: none;
        padding: 10px 8px;
        color: white;
        font-size: 14px;
        outline: none;
        width: 100%;
    }
    #campoPesquisa::placeholder { color: rgba(255,255,255,0.85); font-weight: bold; }

    .search-flutuante {
        position: fixed;
        top: -70px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 36px);
        max-width: 404px;
        background: rgba(10, 30, 80, 0.92);
        border: 1px solid rgba(255,255,255,0.22);
        border-radius: 50px;
        display: flex;
        align-items: center;
        padding: 0 14px 0 12px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.45);
        backdrop-filter: blur(14px);
        z-index: 999;
        transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .search-flutuante.visivel {
        top: 14px;
    }

    .search-flutuante svg {
        width: 16px; height: 16px;
        stroke: rgba(255,255,255,0.7);
        fill: none; stroke-width: 2;
        stroke-linecap: round; stroke-linejoin: round;
        flex-shrink: 0;
    }

    #campoPesquisaFlutuante {
        flex: 1;
        background: transparent;
        border: none;
        padding: 12px 8px;
        color: white;
        font-size: 15px;
        outline: none;
    }

    #campoPesquisaFlutuante::placeholder {
        color: rgba(255,255,255,0.75);
        font-weight: bold;
    }

    /* Cards */
    .cliente {
        background: linear-gradient(160deg, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0.06) 100%);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 20px;
        margin-bottom: 14px;
        overflow: hidden;
        box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        backdrop-filter: blur(8px);
        position: relative;
    }

    .cliente-accent {
        height: 4px;
        background: linear-gradient(90deg, #4caf50, #81c784);
        width: 100%;
    }

    .cliente-corpo {
        padding: 14px 16px 12px;
    }

    .cliente-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
        gap: 10px;
    }

    .cliente-col-esq {
        flex: 1;
        min-width: 0;
    }

    .cliente-numero-nome {
        font-size: 22px;
        font-weight: bold;
        color: #ffffff;
        line-height: 1.2;
        word-break: break-word;
    }

    .cliente-numero-nome .num {
        color: #ffffff;
    }

    .cliente-icones {
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex-shrink: 0;
    }

    .icone-acao-cliente {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
    }

    .icone-acao-cliente img {
        width: 34px; height: 34px;
    }

    .icone-acao-cliente span {
        font-size: 9px;
        font-weight: bold;
        color: #ffeb3b;
        letter-spacing: 0.3px;
    }

    /* Campos de info */
    .cliente-campos {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 10px;
        margin-top: 8px;
    }

    .campo-linha {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }

    .campo-item {
        font-size: 15px;
        color: #ffffff;
        line-height: 1.5;
    }

    .campo-item b { color: #ff9800; }

    .campo-item.obs-item {
        font-style: italic;
        font-size: 14px;
        color: #ffffff;
    }

    .cliente-campos-largura {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-top: 6px;
        margin-bottom: 6px;
    }

    /* Ações editar/excluir */
    .acoes-cliente {
        display: flex;
        gap: 12px;
        padding-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.2);
        align-items: center;
    }

    .acao-cliente {
        display: inline-flex; align-items: center; gap: 5px;
        cursor: pointer; font-size: 13px; font-weight: 600;
        transition: transform 0.15s ease;
    }
    .acao-cliente svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex: none; }
    .acao-cliente.editar { color: #ffeb3b; }
    .acao-cliente.excluir { color: #ff8a8a; }
    .acao-cliente:active { transform: scale(0.95); }
    .acao-divisor { color: #ffffff; }

    .btn-copiar-img { width: 15px; height: 15px; cursor: pointer; vertical-align: middle; margin-left: 6px; opacity: 0.7; }
    .btn-copiar-img:active { transform: scale(0.9); }

    /* Modal de fotos */
    .fotos-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: 1000;
        align-items: flex-end;
        justify-content: center;
    }
    .fotos-overlay.aberto { display: flex; }

    .fotos-sheet {
        width: 100%;
        max-width: 440px;
        background: linear-gradient(180deg, #11317a 0%, #0b2256 100%);
        border-radius: 22px 22px 0 0;
        padding: 0 0 env(safe-area-inset-bottom, 16px);
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
        border-top: 1px solid rgba(255,255,255,0.18);
        animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }

    .fotos-sheet-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.15);
        flex-shrink: 0;
    }

    .fotos-sheet-titulo {
        font-size: 16px;
        font-weight: bold;
        color: #ffeb3b;
        letter-spacing: 0.3px;
    }

    .fotos-sheet-subtitulo {
        font-size: 12px;
        color: rgba(255,255,255,0.6);
        margin-top: 2px;
    }

    .fotos-sheet-fechar {
        width: 32px; height: 32px;
        border-radius: 50%;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.2);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
    }
    .fotos-sheet-fechar:active { background: rgba(255,255,255,0.25); }
    .fotos-sheet-fechar svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    .fotos-sheet-corpo {
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .fotos-secao-titulo {
        font-size: 11px;
        font-weight: bold;
        color: rgba(255,255,255,0.55);
        letter-spacing: 1.4px;
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    .fotos-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    .foto-item {
        border-radius: 12px;
        overflow: hidden;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        cursor: pointer;
    }
    .foto-item:active { transform: scale(0.97); }

    .foto-item img {
        width: 100%;
        aspect-ratio: 4/3;
        object-fit: cover;
        display: block;
    }

    .foto-item-label {
        font-size: 11px;
        font-weight: bold;
        color: rgba(255,255,255,0.75);
        padding: 6px 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .abast-card {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.13);
        border-radius: 12px;
        padding: 10px 14px;
        display: flex;
        flex-direction: column;
        gap: 7px;
    }

    .abast-linha {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        color: #fff;
        gap: 8px;
    }

    .abast-label {
        color: rgba(255,255,255,0.65);
        font-size: 13px;
    }

    .abast-val {
        font-weight: bold;
        color: #fff;
        text-align: right;
    }

.fotos-vazio {
        text-align: center;
        color: rgba(255,255,255,0.45);
        font-size: 14px;
        padding: 24px 0;
    }

    .fotos-carregando {
        text-align: center;
        color: rgba(255,255,255,0.55);
        font-size: 14px;
        padding: 24px 0;
    }

    /* Lightbox */
    .lightbox-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.92);
        z-index: 1100;
        align-items: center;
        justify-content: center;
    }
    .lightbox-overlay.aberto { display: flex; }
    .lightbox-overlay img {
        max-width: 94vw;
        max-height: 88vh;
        border-radius: 10px;
        object-fit: contain;
    }
    .lightbox-overlay .lb-fechar {
        position: absolute;
        top: 18px; right: 18px;
        width: 36px; height: 36px;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.25);
    }
    .lightbox-overlay .lb-fechar svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; }
</style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="titulo-wrap">
            <div class="titulo">Clientes</div>
            <div class="subtitulo">Lista geral</div>
        </div>
        <div class="btn-home" onclick="window.location.href='index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
        </div>
    </div>

    <div class="barra-acoes">
        <div class="botao-add" id="btnNovo">
            <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo Cliente
        </div>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
            <input type="text" id="campoPesquisa" placeholder="Buscar...">
        </div>
    </div>

    <div id="listaClientes">
        <p style="text-align:center">Conectando ao banco...</p>
    </div>
</div>

<div class="search-flutuante" id="searchFlutuante">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    <input type="text" id="campoPesquisaFlutuante" placeholder="Buscar...">
</div>

<!-- Modal de Fotos do Cliente -->
<div class="fotos-overlay" id="fotosOverlay" onclick="fecharFotos(event)">
    <div class="fotos-sheet">
        <div class="fotos-sheet-header">
            <div>
                <div class="fotos-sheet-titulo" id="fotosTitulo">Fotos</div>
                <div class="fotos-sheet-subtitulo" id="fotosSubtitulo"></div>
            </div>
            <div class="fotos-sheet-fechar" onclick="fecharFotosBtn()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
        </div>
        <div class="fotos-sheet-corpo" id="fotosCorpo">
            <div class="fotos-carregando">Carregando fotos...</div>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="fecharLightbox()">
    <img id="lightboxImg" src="" alt="">
    <div class="lb-fechar">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
</div>

<script src="assets/js/play-dialogs.js"></script>
<script type="module">
    import { dbEscutarClientes, dbExcluirCliente, dbEscutarColaboradores, dbListarAtendimentos } from './database.js';

    let perfilUsuarioLogado = "";
    let nomeUsuarioLogado = "";
    let clientesSalvos = [];

    function normalizarTexto(valor) {
        return String(valor || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .trim();
    }

    function obterDataLocalIso(data) {
        const base = data ? new Date(data) : new Date();
        if (Number.isNaN(base.getTime())) return "";
        const ano = base.getFullYear();
        const mes = String(base.getMonth() + 1).padStart(2, "0");
        const dia = String(base.getDate()).padStart(2, "0");
        return `${ano}-${mes}-${dia}`;
    }

    function usuarioPodeGerenciarCliente(cliente) {
        if (!cliente) return false;
        if (perfilUsuarioLogado.includes('gestao')) return true;
        if (!perfilUsuarioLogado.includes('atendimento')) return false;

        const autorCadastro = cliente.cadastradoPor || cliente.ponto_aberto || "";
        const diaCadastro = cliente.dataCadastroDia || obterDataLocalIso(cliente.dataCadastro);
        const mesmoUsuario = normalizarTexto(autorCadastro) === normalizarTexto(nomeUsuarioLogado);
        const mesmoDia = diaCadastro === obterDataLocalIso();
        return mesmoUsuario && mesmoDia;
    }

    function renderizarLista(clientes) {
        const listaHTML = document.getElementById("listaClientes");
        listaHTML.innerHTML = "";
        clientesSalvos = clientes;

        if (clientes.length === 0) {
            listaHTML.innerHTML = "<p style='text-align:center'>Nenhum cliente cadastrado.</p>";
            return;
        }

        clientes.sort((a, b) => parseInt(a.numero) - parseInt(b.numero));

        clientes.forEach(c => {
            // 1. Processar Equipamentos e Pix
            let equipString = "";
            if (c.equip) {
                const equipList = c.equip.split(', ');
                const equipsToShow = [];
                equipList.forEach(item => {
                    if (!item) return;
                    let nome = item;
                    let qtd = "1";
                    let pix = "";
                    const regexQtd = /\s*\(([^)]+)\)$/;
                    const matchQtd = nome.match(regexQtd);
                    if (matchQtd) {
                        qtd = matchQtd[1];
                        nome = nome.replace(regexQtd, "").trim();
                    }
                    const regexPix = /\s*\[Pix:\s*([^\]]+)\]$/;
                    const matchPix = nome.match(regexPix);
                    if (matchPix) {
                        pix = matchPix[1];
                        nome = nome.replace(regexPix, "").trim();
                    }
                    nome = nome.trim();
                    if (nome) {
                        const formato = `${nome} ${qtd}${pix ? ` Pix ${pix}` : ''}`;
                        equipsToShow.push(formato);
                    }
                });
                if (equipsToShow.length > 0) {
                    equipString = equipsToShow.join(', ');
                }
            }

            // 2. Construir campos de info
            const campos = [];
            if (c.cidade) campos.push(`<div class="campo-item"><b>Cidade:</b> <span class="copiar">${c.cidade}</span></div>`);
            if (c.rota || c.comissao) {
                let rc = '';
                if (c.rota) rc += `<b>Rota:</b> <span class="copiar">${c.rota}</span>`;
                if (c.comissao) rc += `${c.rota ? ' &nbsp;' : ''}<b>Perc.:</b> ${c.comissao}`;
                campos.push(`<div class="campo-item">${rc}</div>`);
            }
            if (equipString) campos.push(`<div class="campo-item"><b>Equip.:</b> ${equipString}</div>`);
            if (c.aberto) campos.push(`<div class="campo-item"><b>Aberto:</b> ${c.aberto}</div>`);

            const camposLargura = [];
            if (c.endereco) camposLargura.push(`<div class="campo-item"><b>End.:</b> <span class="copiar">${c.endereco}</span><img src="https://cdn-icons-png.flaticon.com/512/1621/1621635.png" class="btn-copiar-img" onclick="copiarTexto('${c.endereco}')"></div>`);
            if (c.obs) camposLargura.push(`<div class="campo-item obs-item"><b>Obs:</b> ${c.obs}</div>`);

            const acoesVisuaisHtml = usuarioPodeGerenciarCliente(c) ? `
                <div class="acoes-cliente">
                    <div onclick="editarCliente('${c.firebaseUrl}')" class="acao-cliente editar">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4z"/>
                        </svg>
                        <span>Editar</span>
                    </div>
                    <span class="acao-divisor">|</span>
                    <div onclick="excluirCliente('${c.firebaseUrl}')" class="acao-cliente excluir">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/>
                            <path d="M10 11v6"/><path d="M14 11v6"/>
                        </svg>
                        <span>Excluir</span>
                    </div>
                </div>
            ` : '';

            // 3. Montar o card final
            const card = document.createElement('div');
            card.className = 'cliente';
            card.innerHTML = `
                <div class="cliente-accent"></div>
                <div class="cliente-corpo">
                    <div class="cliente-header">
                        <div class="cliente-col-esq">
                            <div class="cliente-numero-nome">
                                <span class="num">N. ${c.numero}</span> — ${c.nome}
                            </div>
                            <div class="cliente-campos">
                                <div class="campo-linha">
                                    ${campos.join('')}
                                </div>
                            </div>
                        </div>
                        <div class="cliente-icones">
                            <div class="icone-acao-cliente" onclick="abrirConfiguracoes('${c.firebaseUrl}')">
                                <img src="assets/img/engrenagen.png" alt="Manutenção">
                                <span>Manutenção</span>
                            </div>
                            <div class="icone-acao-cliente" onclick="abrirMapa('${c.endereco || ""}')">
                                <img src="assets/img/Localizacao.png" alt="Localização">
                                <span>Localização</span>
                            </div>
                            <div class="icone-acao-cliente" onclick="abrirFotos('${c.firebaseUrl}')">
                                <svg viewBox="0 0 24 24" style="width:34px;height:34px;stroke:#ffeb3b;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;" aria-hidden="true">
                                    <rect x="2" y="7" width="20" height="14" rx="3"/>
                                    <circle cx="12" cy="14" r="3.2"/>
                                    <path d="M8 7l1.5-3h5L16 7"/>
                                    <circle cx="18.5" cy="10.5" r="0.8" fill="#ffeb3b" stroke="none"/>
                                </svg>
                                <span>Fotos</span>
                            </div>
                        </div>
                    </div>
                    ${camposLargura.length > 0 ? `<div class="cliente-campos-largura">${camposLargura.join('')}</div>` : ''}
                    ${acoesVisuaisHtml}
                </div>
            `;
            listaHTML.appendChild(card);
        });
    }

    dbEscutarColaboradores((colaboradores) => {
        nomeUsuarioLogado = localStorage.getItem('usuarioLogado') || "";
        const usuarioAtual = colaboradores.find(c => c.nome === nomeUsuarioLogado);
        perfilUsuarioLogado = String(usuarioAtual?.nivel_completo || "");
        renderizarLista(clientesSalvos);
    });

    dbEscutarClientes((clientes) => { renderizarLista(clientes); });

    document.getElementById('btnNovo').onclick = () => window.location.href="cadastrar_cliente.html";

    function aplicarBusca(termo) {
        const normalizado = termo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        const cards = document.querySelectorAll('.cliente');
        cards.forEach(card => {
            const textoCard = card.innerText.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            card.style.display = textoCard.includes(normalizado) ? "block" : "none";
        });
    }

    document.getElementById('campoPesquisa').oninput = (e) => {
        aplicarBusca(e.target.value);
        document.getElementById('campoPesquisaFlutuante').value = e.target.value;
    };

    document.getElementById('campoPesquisaFlutuante').oninput = (e) => {
        aplicarBusca(e.target.value);
        document.getElementById('campoPesquisa').value = e.target.value;
    };

    const barraBusca = document.getElementById('searchFlutuante');
    const barraNormal = document.querySelector('.search-wrap');

    window.addEventListener('scroll', () => {
        const limiar = barraNormal.getBoundingClientRect().bottom;
        if (limiar < 0) {
            barraBusca.classList.add('visivel');
        } else {
            barraBusca.classList.remove('visivel');
        }
    }, { passive: true });

    window.copiarTexto = function(texto) {
        if (!texto) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(texto).catch(() => usarPlanoB(texto));
        } else {
            usarPlanoB(texto);
        }
        function usarPlanoB(txt) {
            const area = document.createElement("textarea");
            area.value = txt; document.body.appendChild(area);
            area.select(); document.execCommand('copy');
            document.body.removeChild(area);
        }
    };

    window.excluirCliente = async function(url) {
        const id = url.split('/').pop().replace('.json', '');
        const cliente = clientesSalvos.find(c => c.firebaseUrl === id);
        if (!usuarioPodeGerenciarCliente(cliente)) {
            alert("VocÃª nÃ£o tem permissÃ£o para excluir este cliente.");
            return;
        }
        if (await window.playConfirm("Deseja realmente excluir este cliente?")) {
            try { await dbExcluirCliente(id); } catch (e) { alert("Erro ao excluir."); }
        }
    };

    window.editarCliente = function(url) {
        const id = url.split('/').pop().replace('.json', '');
        const cliente = clientesSalvos.find(c => c.firebaseUrl === id);
        if (!usuarioPodeGerenciarCliente(cliente)) {
            alert("VocÃª nÃ£o tem permissÃ£o para editar este cliente.");
            return;
        }
        window.location.href = `cadastrar_cliente.html?edit=${id}`;
    };

    window.abrirConfiguracoes = function(url) {
        const id = String(url || "").split('/').pop().replace('.json', '');
        if (!id) {
            alert("Cliente nao encontrado.");
            return;
        }
        window.location.href = `manutencao_cliente.html?cliente=${encodeURIComponent(id)}`;
    };
    window.abrirMapa = function(endereco) {
        if (!endereco) { alert("Sem endereço."); return; }
        const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`;
        window.open(url, '_blank');
    };

    window.abrirFotos = async function(url) {
        const id = String(url || "").split('/').pop().replace('.json', '');
        const cliente = clientesSalvos.find(c => c.firebaseUrl === id);
        if (!cliente) { alert("Cliente não encontrado."); return; }

        const overlay = document.getElementById('fotosOverlay');
        const corpo = document.getElementById('fotosCorpo');
        const titulo = document.getElementById('fotosTitulo');
        const subtitulo = document.getElementById('fotosSubtitulo');

        titulo.textContent = `N. ${cliente.numero} — ${cliente.nome}`;
        subtitulo.textContent = 'Fotos do cliente';
        corpo.innerHTML = '<div class="fotos-carregando">Carregando fotos...</div>';
        overlay.classList.add('aberto');
        document.body.style.overflow = 'hidden';
        history.pushState({ fotosSheet: true }, '');

        try {
            const atendimentos = await dbListarAtendimentos();
            const atendimentosDoCliente = atendimentos
                .filter(a => a?.cliente?.numero == cliente.numero)
                .sort((a, b) => {
                    const ta = a.dataHora || a.data || a.timestamp || 0;
                    const tb = b.dataHora || b.data || b.timestamp || 0;
                    return String(tb).localeCompare(String(ta));
                });
            const ultimoAtendimento = atendimentosDoCliente[0] || null;

            const secoes = [];

            // Foto da ficha
            const fotosficha = [];
            const fichaInstalacao = cliente.fotoFichaInstalacao || cliente.fotosInstalacao?.ficha || "";
            if (fichaInstalacao) fotosficha.push({ titulo: 'Ficha (instalação)', url: fichaInstalacao });
            if (ultimoAtendimento?.fotos?.ficha) fotosficha.push({ titulo: 'Ficha (último atend.)', url: ultimoAtendimento.fotos.ficha });
            if (fotosficha.length > 0) secoes.push({ nome: 'Foto da Ficha', fotos: fotosficha });

            // Fotos de máquinas
            const fotosMaquinas = [];
            if (Array.isArray(ultimoAtendimento?.fotos?.maquinas) && ultimoAtendimento.fotos.maquinas.length > 0) {
                ultimoAtendimento.fotos.maquinas.forEach((f, i) => {
                    const u = f?.url || f?.src || "";
                    if (u) fotosMaquinas.push({ titulo: f?.nome ? `Máq: ${f.nome}` : `Máquina ${i+1}`, url: u });
                });
            } else if (Array.isArray(cliente.fotosMaquinasInstalacao)) {
                cliente.fotosMaquinasInstalacao.forEach((f, i) => {
                    const u = f?.url || f?.src || "";
                    if (u) fotosMaquinas.push({ titulo: f?.nome ? `Máq: ${f.nome}` : `Máquina ${i+1}`, url: u });
                });
            }
            if (fotosMaquinas.length > 0) secoes.push({ nome: 'Fotos de Máquinas', fotos: fotosMaquinas });

            // Seção de reposição de produtos
            let abastecidoHtml = '';
            if (ultimoAtendimento) {
                const produtos = ultimoAtendimento.produtos || [];
                const linhas = [];

                if (Array.isArray(produtos) && produtos.length > 0) {
                    produtos.forEach(p => {
                        if (p.nome) linhas.push(`<div class="abast-linha"><span class="abast-label">${p.nome}</span><span class="abast-val">${p.quantidade ?? ''}</span></div>`);
                    });
                }

                if (linhas.length > 0) {
                    const dataAtend = ultimoAtendimento.data ? new Date(ultimoAtendimento.data).toLocaleDateString('pt-BR') : '';
                    const atendente = ultimoAtendimento.atendente || '';
                    abastecidoHtml = `
                        <div>
                            <div class="fotos-secao-titulo">Reposição${dataAtend ? ` — ${dataAtend}` : ''}</div>
                            <div class="abast-card">
                                ${atendente ? `<div class="abast-linha"><span class="abast-label">Atendente</span><span class="abast-val">${atendente}</span></div>` : ''}
                                ${linhas.join('')}
                            </div>
                        </div>`;
                }
            }

            if (secoes.length === 0 && !abastecidoHtml) {
                corpo.innerHTML = '<div class="fotos-vazio">Nenhuma informação encontrada para este cliente.</div>';
                return;
            }

            corpo.innerHTML = abastecidoHtml + secoes.map(s => `
                <div>
                    <div class="fotos-secao-titulo">${s.nome}</div>
                    <div class="fotos-grid">
                        ${s.fotos.map(f => `
                            <div class="foto-item" onclick="abrirLightbox('${f.url.replace(/'/g, "\\'")}')">
                                <img src="${f.url}" alt="${f.titulo}" loading="lazy">
                                <div class="foto-item-label">${f.titulo}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

        } catch(e) {
            corpo.innerHTML = '<div class="fotos-vazio">Erro ao carregar fotos.</div>';
        }
    };

    function _fecharFotosSheet() {
        const overlay = document.getElementById('fotosOverlay');
        if (!overlay.classList.contains('aberto')) return;
        overlay.classList.remove('aberto');
        document.body.style.overflow = '';
    }

    window.fecharFotos = function(e) {
        if (e && e.target !== document.getElementById('fotosOverlay')) return;
        _fecharFotosSheet();
        if (history.state?.fotosSheet) history.back();
    };

    window.fecharFotosBtn = function() {
        _fecharFotosSheet();
        if (history.state?.fotosSheet) history.back();
    };

    window.abrirLightbox = function(url) {
        const lb = document.getElementById('lightboxOverlay');
        document.getElementById('lightboxImg').src = url;
        lb.classList.add('aberto');
        history.pushState({ lightbox: true }, '');
    };

    window.fecharLightbox = function() {
        const lb = document.getElementById('lightboxOverlay');
        if (!lb.classList.contains('aberto')) return;
        lb.classList.remove('aberto');
        document.getElementById('lightboxImg').src = '';
        if (history.state?.lightbox) history.back();
    };

    window.addEventListener('popstate', function(e) {
        const lb = document.getElementById('lightboxOverlay');
        if (lb.classList.contains('aberto')) {
            lb.classList.remove('aberto');
            document.getElementById('lightboxImg').src = '';
            return;
        }
        _fecharFotosSheet();
    });
</script>
</body>
</html>
