<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de Rotas</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #080e24;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            color: white;
            overflow-x: hidden;
        }

        .app {
            width: 100%;
            max-width: 440px;
            padding: 0 16px 40px;
            position: relative;
        }

        /* ---- TOPO ---- */
        .topo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 0 12px;
            position: relative;
        }
        .btn-home {
            position: absolute;
            left: 0;
            background: rgba(255,255,255,0.1);
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.15s;
        }
        .btn-home:active { background: rgba(255,255,255,0.25); transform: scale(0.92); }
        .titulo-topo { font-size: 22px; font-weight: bold; letter-spacing: 1px; text-align: center; }
        .subtitulo-topo { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #7b9ed9; text-align: center; margin-top: 2px; }

        /* ---- TELAS ---- */
        .tela { display: none; flex-direction: column; align-items: center; }
        .tela.ativa { display: flex; }

        /* ---- TELA: CARREGANDO ---- */
        .spinner {
            width: 56px; height: 56px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: #4e8aff;
            border-radius: 50%;
            animation: girar 0.8s linear infinite;
            margin: 60px auto 20px;
        }
        @keyframes girar { to { transform: rotate(360deg); } }
        .txt-carregando { color: #7b9ed9; font-size: 15px; letter-spacing: 1px; }

        /* ---- TELA: SEM SESSÃO (admin) ---- */
        .card-admin {
            background: linear-gradient(135deg, #0d1f4a, #162d6b);
            border: 1px solid rgba(78,138,255,0.3);
            border-radius: 20px;
            padding: 24px 20px;
            width: 100%;
            margin-top: 10px;
        }
        .card-admin h2 {
            margin: 0 0 6px;
            font-size: 18px;
            color: #ffeb3b;
            text-align: center;
        }
        .card-admin p {
            margin: 0 0 20px;
            font-size: 13px;
            color: #a0b4d6;
            text-align: center;
            line-height: 1.5;
        }

        /* Tabela de rotas calculadas */
        .tabela-rotas {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .tabela-rotas th {
            background: rgba(78,138,255,0.15);
            padding: 8px 6px;
            color: #7b9ed9;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
        }
        .tabela-rotas td {
            padding: 9px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            text-align: center;
        }
        .tabela-rotas tr:last-child td { border-bottom: none; }
        .valor-estimado { color: #4cff91; font-weight: bold; font-size: 15px; }
        .badge-rota {
            background: rgba(78,138,255,0.2);
            border: 1px solid rgba(78,138,255,0.4);
            border-radius: 8px;
            padding: 3px 10px;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-iniciar {
            background: linear-gradient(135deg, #ffeb3b, #ff9800);
            color: #0d1f4a;
            font-weight: bold;
            font-size: 18px;
            padding: 16px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            box-shadow: 0 6px 24px rgba(255,200,0,0.35);
            transition: 0.15s;
        }
        .btn-iniciar:active { transform: scale(0.97); }

        /* ---- TELA: SELEÇÃO ATIVA ---- */
        .contador-rotas {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 13px;
            color: #a0b4d6;
            margin: 10px 0 20px;
            text-align: center;
        }
        .contador-rotas span { color: #ffeb3b; font-weight: bold; }

        /* Lista de quem já selecionou */
        .lista-selecoes {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }
        .item-selecao {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(76,255,145,0.08);
            border: 1px solid rgba(76,255,145,0.2);
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 14px;
            animation: entrar 0.3s ease;
        }
        @keyframes entrar { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
        .item-selecao .nome-usuario { font-weight: bold; color: #4cff91; }
        .item-selecao .status-check { font-size: 18px; }

        /* Máquina slot */
        .slot-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 0 28px;
        }

        .slot-machine {
            position: relative;
            width: 220px;
            height: 140px;
            background: linear-gradient(180deg, #1a0a3e, #0d1230);
            border-radius: 24px;
            border: 3px solid #4e3a8a;
            box-shadow: 0 0 40px rgba(120,60,255,0.4), inset 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Luzes piscando nos cantos */
        .slot-machine::before, .slot-machine::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 20px;
            pointer-events: none;
        }
        .luzes {
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            border-radius: 26px;
            border: 3px solid transparent;
            animation: luzesPiscar 1.2s steps(1) infinite;
        }
        @keyframes luzesPiscar {
            0%   { border-color: #ff5252; box-shadow: 0 0 12px #ff5252; }
            25%  { border-color: #ffeb3b; box-shadow: 0 0 12px #ffeb3b; }
            50%  { border-color: #4cff91; box-shadow: 0 0 12px #4cff91; }
            75%  { border-color: #4e8aff; box-shadow: 0 0 12px #4e8aff; }
            100% { border-color: #ff5252; box-shadow: 0 0 12px #ff5252; }
        }
        .luzes.pausado { animation: none; border-color: rgba(255,255,255,0.1); box-shadow: none; }

        .slot-janela {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        .slot-label {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 4px;
        }
        .slot-numero {
            font-size: 72px;
            font-weight: 900;
            color: #ffeb3b;
            text-shadow: 0 0 20px rgba(255,235,59,0.7);
            line-height: 1;
            min-width: 120px;
            display: block;
            transition: none;
            font-family: 'Courier New', monospace;
        }
        .slot-numero.girando {
            animation: piscarNumero 0.08s steps(1) infinite;
        }
        @keyframes piscarNumero {
            0%   { filter: blur(0px); }
            50%  { filter: blur(2px); opacity: 0.7; }
            100% { filter: blur(0px); }
        }

        /* Braço do slot (decorativo) */
        .slot-braco {
            position: absolute;
            right: -28px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 90px;
            background: linear-gradient(180deg, #8a6aff, #4e3a8a);
            border-radius: 13px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.4);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 6px;
        }
        .slot-braco-bola {
            width: 18px; height: 18px;
            background: radial-gradient(circle at 30% 30%, #ff9800, #e65100);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .slot-decoracao {
            display: flex;
            gap: 12px;
            margin-top: 14px;
        }
        .luz-decorativa {
            width: 12px; height: 12px;
            border-radius: 50%;
            animation: luzesDec 0.6s steps(1) infinite;
        }
        .luz-decorativa:nth-child(1) { background: #ff5252; animation-delay: 0s; }
        .luz-decorativa:nth-child(2) { background: #ffeb3b; animation-delay: 0.2s; }
        .luz-decorativa:nth-child(3) { background: #4cff91; animation-delay: 0.4s; }
        .luz-decorativa:nth-child(4) { background: #4e8aff; animation-delay: 0.2s; }
        .luz-decorativa:nth-child(5) { background: #ff5252; animation-delay: 0s; }
        .luz-decorativa.pausado { animation: none; background: rgba(255,255,255,0.15); }

        @keyframes luzesDec {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.2; }
        }

        /* Botão sortear */
        .btn-sortear {
            background: linear-gradient(135deg, #6a3de8, #3d1fa8);
            border: 3px solid #8a6aff;
            color: white;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 2px;
            padding: 18px 40px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(106,61,232,0.5);
            transition: 0.15s;
            position: relative;
            overflow: hidden;
        }
        .btn-sortear::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
            transform: translateX(-100%) rotate(45deg);
            animation: brilhoBtn 2.5s ease infinite;
        }
        @keyframes brilhoBtn {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        .btn-sortear:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(106,61,232,0.4); }
        .btn-sortear:disabled {
            background: #2a2a4a;
            border-color: #3a3a5a;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
            animation: none;
        }
        .btn-sortear:disabled::before { display: none; }

        /* ---- TELA: JÁ SELECIONOU ---- */
        .card-minha-rota {
            width: 100%;
            background: linear-gradient(135deg, #0a2a0a, #0d3d1a);
            border: 2px solid #4cff91;
            border-radius: 24px;
            padding: 28px 20px 24px;
            text-align: center;
            box-shadow: 0 0 40px rgba(76,255,145,0.2);
            margin: 10px 0 20px;
            animation: revelarCard 0.5s ease;
        }
        @keyframes revelarCard {
            from { opacity: 0; transform: scale(0.85); }
            to   { opacity: 1; transform: scale(1); }
        }
        .minha-rota-label {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #4cff91;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .minha-rota-numero {
            font-size: 96px;
            font-weight: 900;
            color: #ffeb3b;
            text-shadow: 0 0 30px rgba(255,235,59,0.5);
            line-height: 1;
            font-family: 'Courier New', monospace;
        }
        .minha-rota-subtitulo {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        /* Seção de detalhes da rota */
        .secao-detalhes { width: 100%; }
        .secao-titulo {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7b9ed9;
            margin: 20px 0 10px;
            text-align: center;
        }

        .card-cliente {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 10px;
            width: 100%;
        }
        .card-cliente-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .card-cliente-nome {
            font-weight: bold;
            font-size: 16px;
            flex: 1;
        }
        .card-cliente-dias {
            font-size: 11px;
            color: #ffeb3b;
            background: rgba(255,235,59,0.1);
            border-radius: 8px;
            padding: 3px 8px;
            margin-left: 8px;
            white-space: nowrap;
        }
        .card-cliente-end {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        /* Fotos das máquinas */
        .fotos-maquinas {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .foto-maquina-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .foto-maquina {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
        }
        .foto-maquina-nome {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            max-width: 80px;
            word-break: break-word;
        }

        /* Foto ampliada */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .lightbox.ativo { display: flex; }
        .lightbox img {
            max-width: 95vw;
            max-height: 90vh;
            border-radius: 12px;
            object-fit: contain;
        }

        /* ---- BOTÃO ADMIN FLUTUANTE ---- */
        .btn-admin-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(20,40,100,0.85);
            border: 1px solid rgba(78,138,255,0.4);
            border-radius: 50px;
            padding: 10px 18px;
            font-size: 13px;
            color: #7b9ed9;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(6px);
            display: none;
            gap: 6px;
            align-items: center;
        }
        .btn-admin-float.visivel { display: flex; }
        .btn-admin-float:active { background: rgba(40,70,160,0.85); }

        /* ---- MODAL ADMIN ---- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            justify-content: center;
            align-items: flex-end;
        }
        .modal-overlay.ativo { display: flex; }
        .modal-content {
            background: #0d1a3d;
            border: 1px solid rgba(78,138,255,0.3);
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 40px;
            width: 100%;
            max-width: 440px;
            max-height: 85vh;
            overflow-y: auto;
            animation: subirModal 0.3s ease;
        }
        @keyframes subirModal {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        .modal-titulo {
            font-size: 18px;
            font-weight: bold;
            color: #ffeb3b;
            text-align: center;
            margin-bottom: 6px;
        }
        .modal-subtitulo {
            font-size: 12px;
            color: #7b9ed9;
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-modal-acao {
            padding: 13px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: 0.15s;
            margin-bottom: 10px;
        }
        .btn-modal-acao:active { transform: scale(0.97); }
        .btn-calcular {
            background: linear-gradient(135deg, #1e6b2e, #2ecc71);
            color: white;
            border: none;
            box-shadow: 0 4px 16px rgba(46,204,113,0.3);
        }
        .btn-encerrar {
            background: rgba(255,80,80,0.1);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ff8080;
        }
        .btn-fechar-modal {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20,40,100,0.95);
            border: 1px solid rgba(78,138,255,0.4);
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 14px;
            color: white;
            z-index: 500;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.visivel {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            top: -10px;
            animation: cair linear forwards;
            z-index: 999;
            pointer-events: none;
        }
        @keyframes cair {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* Utilitários */
        .mt-8 { margin-top: 8px; }
        .mt-16 { margin-top: 16px; }
        .texto-centro { text-align: center; }
        .cor-aviso { color: #ff9800; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="btn-home" onclick="window.location.href='index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </div>
        <div>
            <div class="titulo-topo">Seleção de Rotas</div>
            <div class="subtitulo-topo">Play Diversões</div>
        </div>
    </div>

    <!-- TELA: CARREGANDO -->
    <div id="telaCarregando" class="tela ativa">
        <div class="spinner"></div>
        <div class="txt-carregando">Carregando...</div>
    </div>

    <!-- TELA: PREPARANDO SESSÃO (criação automática) -->
    <div id="telaSemSessao" class="tela">
        <div class="spinner"></div>
        <div class="txt-carregando">Preparando as rotas...</div>
    </div>

    <!-- TELA: SESSÃO ATIVA -->
    <div id="telaSessaoAtiva" class="tela">
        <div id="contadorRotas" class="contador-rotas">
            <span id="numDisponiveis">–</span> rotas disponíveis &nbsp;·&nbsp; <span id="numSelecionadas">0</span> já selecionadas
        </div>

        <!-- Lista de quem já selecionou -->
        <div id="listaSelecoes" class="lista-selecoes"></div>

        <!-- Slot machine -->
        <div class="slot-wrapper">
            <div class="slot-machine">
                <div class="luzes" id="luzesMaquina"></div>
                <div class="slot-janela">
                    <div class="slot-label">ROTA</div>
                    <span class="slot-numero" id="slotNumero">?</span>
                </div>
                <div class="slot-braco">
                    <div class="slot-braco-bola"></div>
                </div>
            </div>
            <div class="slot-decoracao">
                <div class="luz-decorativa" id="luz0"></div>
                <div class="luz-decorativa" id="luz1"></div>
                <div class="luz-decorativa" id="luz2"></div>
                <div class="luz-decorativa" id="luz3"></div>
                <div class="luz-decorativa" id="luz4"></div>
            </div>
        </div>

        <div id="btnSortearWrap" style="width:100%">
            <div class="btn-sortear" id="btnSortear" onclick="selecionarRota()">
                ✅ &nbsp;SELECIONAR MINHA ROTA
            </div>
        </div>

        <!-- Rotas já selecionadas pelo usuário -->
        <div id="wrapJaSelecionou" style="display:none; width:100%">
            <div id="detalhesMinhaRota"></div>
        </div>
    </div>
</div>

<!-- Botão admin flutuante -->
<div class="btn-admin-float" id="btnAdminFloat" onclick="abrirModalAdmin()">
    ⚙️ Admin
</div>

<!-- Modal admin -->
<div class="modal-overlay" id="modalAdmin" onclick="fecharModalAdmin(event)">
    <div class="modal-content">
        <div class="modal-titulo">⚙️ Painel do Gestor</div>
        <div class="modal-subtitulo">Gerencie a sessão de seleção de rotas</div>
        <div class="btn-modal-acao btn-calcular" onclick="recalcularESessao()">🔄 Recalcular e Reiniciar Sessão</div>
        <div class="btn-modal-acao btn-encerrar" onclick="encerrarSessao()">🛑 Encerrar Sessão Atual</div>
        <div class="btn-modal-acao btn-encerrar" onclick="limparSelecoes()" style="border-color:rgba(255,150,50,0.4);color:#ffaa60">🧹 Limpar Seleções (Teste)</div>
        <div class="btn-modal-acao btn-fechar-modal" onclick="fecharModalAdmin()">Fechar</div>
    </div>
</div>

<!-- Lightbox fotos -->
<div class="lightbox" id="lightbox" onclick="fecharLightbox()">
    <img id="lightboxImg" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
import {
    dbListarClientes,
    dbListarAtendimentos,
    dbEscutarSessaoRotas,
    dbCriarSessaoRotas,
    dbSelecionarRota,
    dbEncerrarSessaoRotas,
    dbListarColaboradores,
    dbLimparSelecoes
} from './database.js';

// ─────────────────────────────────────────────
// Estado global
// ─────────────────────────────────────────────
let usuarioAtual = '';
let ehAdmin = false;
let sessaoAtual = null;
let numerosDeRota = [];
let clientesPorRota = {};
let maquinasPorCliente = {};
let estaAnimando = false; // bloqueia renderização dos detalhes durante a animação

// ─────────────────────────────────────────────
// Inicialização
// ─────────────────────────────────────────────
async function init() {
    usuarioAtual = localStorage.getItem('usuario_selecionado') || '';

    // Carrega colaboradores para saber se é admin (apenas para mostrar botão de gestão)
    const colaboradores = await dbListarColaboradores();
    const usuario = colaboradores.find(c => c.nome === usuarioAtual);
    ehAdmin = usuario && (usuario.nivel_completo || '').includes('gestao');

    document.getElementById('btnAdminFloat').classList.add('visivel');

    // Escuta a sessão em tempo real
    dbEscutarSessaoRotas(onSessaoAtualizada);
}

// Flag para evitar criação dupla de sessão (vários usuários abrindo ao mesmo tempo)
let criandoSessao = false;

// ─────────────────────────────────────────────
// Callback: sessão foi atualizada no Firebase
// ─────────────────────────────────────────────
async function onSessaoAtualizada(sessao) {
    sessaoAtual = sessao;
    ocultarTodas();

    if (!sessao) {
        // Cria automaticamente a sessão para qualquer usuário
        await criarSessaoAutomatica();
    } else {
        mostrarTelaSessaoAtiva(sessao);
    }
}

// ─────────────────────────────────────────────
// Criação automática da sessão
// ─────────────────────────────────────────────
async function criarSessaoAutomatica() {
    if (criandoSessao) return;
    criandoSessao = true;

    document.getElementById('telaSemSessao').classList.add('ativa');

    try {
        await iniciarSessao();
    } catch(e) {
        console.error('Erro ao criar sessão automática:', e);
        mostrarToast('❌ Erro ao preparar rotas. Tente voltar e entrar novamente.');
    } finally {
        criandoSessao = false;
    }
}

const LIMITE_ROTAS = 3;

// ─────────────────────────────────────────────
// Tela: sessão ativa
// ─────────────────────────────────────────────
function mostrarTelaSessaoAtiva(sessao) {
    document.getElementById('telaSessaoAtiva').classList.add('ativa');

    const rotas = sessao.rotas || {};
    const todasRotas = Object.entries(rotas);
    const selecionadas = todasRotas.filter(([_, r]) => r.selecionada_por);
    const disponiveis = todasRotas.filter(([_, r]) => !r.selecionada_por);

    document.getElementById('numDisponiveis').textContent = disponiveis.length;
    document.getElementById('numSelecionadas').textContent = selecionadas.length;

    numerosDeRota = todasRotas.map(([n]) => n);
    clientesPorRota = sessao.clientes_por_rota || {};
    maquinasPorCliente = sessao.maquinas_por_cliente || {};

    // Lista de quem já selecionou — não atualiza enquanto a animação estiver rodando
    if (!estaAnimando) {
        const listaEl = document.getElementById('listaSelecoes');
        listaEl.innerHTML = '';
        const porUsuario = {};
        selecionadas.forEach(([_, r]) => {
            if (!porUsuario[r.selecionada_por]) {
                porUsuario[r.selecionada_por] = { qtd: 0, primeiro: r.timestamp_selecao };
            }
            porUsuario[r.selecionada_por].qtd++;
        });
        Object.entries(porUsuario)
            .sort((a, b) => new Date(a[1].primeiro) - new Date(b[1].primeiro))
            .forEach(([nome, info]) => {
                const div = document.createElement('div');
                div.className = 'item-selecao';
                const badges = Array.from({ length: info.qtd }, () => '🗺️').join(' ');
                div.innerHTML = `<span class="nome-usuario">✅ ${nome}</span><span class="status-check">${badges}</span>`;
                listaEl.appendChild(div);
            });
    }

    // Rotas já selecionadas pelo usuário atual
    const minhasRotas = todasRotas
        .filter(([_, r]) => r.selecionada_por === usuarioAtual)
        .map(([n]) => n);

    const qtdMinhas = minhasRotas.length;

    if (qtdMinhas > 0 && !estaAnimando) {
        document.getElementById('wrapJaSelecionou').style.display = 'block';
        mostrarMinhasRotas(minhasRotas, sessao);
    } else if (qtdMinhas === 0) {
        document.getElementById('wrapJaSelecionou').style.display = 'none';
    }

    if (qtdMinhas >= LIMITE_ROTAS) {
        // Atingiu o limite: exibe só as rotas, sem botão
        document.getElementById('btnSortearWrap').style.display = 'none';
        pausarAnimacao(minhasRotas[minhasRotas.length - 1]);
    } else {
        document.getElementById('btnSortearWrap').style.display = 'block';
        const btn = document.getElementById('btnSortear');
        btn.removeAttribute('disabled');
        const ordinal = qtdMinhas === 0 ? '1ª' : qtdMinhas === 1 ? '2ª' : '3ª';
        btn.innerHTML = `✅ &nbsp;SELECIONAR ${ordinal} ROTA`;
        if (disponiveis.length === 0) {
            btn.setAttribute('disabled', true);
            btn.innerHTML = '🔒 &nbsp;Todas as rotas já foram selecionadas';
        }
    }
}

function pausarAnimacao(ultimoNumero) {
    document.getElementById('slotNumero').textContent = ultimoNumero || '–';
    document.getElementById('slotNumero').classList.remove('girando');
    document.getElementById('luzesMaquina').classList.add('pausado');
    [0,1,2,3,4].forEach(i => document.getElementById('luz' + i).classList.add('pausado'));
}

function mostrarMinhasRotas(numerosRota, sessao) {
    const maquinas = sessao.maquinas_por_cliente || {};
    const wrap = document.getElementById('detalhesMinhaRota');
    let html = '';

    numerosRota.forEach((numeroRota, idx) => {
        const clientes = (sessao.clientes_por_rota || {})[numeroRota] || [];
        const ordinal = idx === 0 ? '1ª' : idx === 1 ? '2ª' : '3ª';
        if (clientes.length) {
            html += `<div class="secao-titulo">${ordinal} Rota — ${numeroRota}</div>`;
            clientes.forEach(c => {
                const fotosCliente = maquinas[c.id] || [];
                const diasStr = c.aberto || '–';
                const endStr = [c.endereco, c.numero_endereco, c.cidade].filter(Boolean).join(', ');
                let fotoHtml = '';
                if (fotosCliente.length > 0) {
                    fotoHtml = '<div class="fotos-maquinas">';
                    fotosCliente.forEach(f => {
                        fotoHtml += `
                            <div class="foto-maquina-wrap">
                                <img class="foto-maquina" src="${f.url}" alt="${f.nome}" onclick="abrirLightbox('${f.url}')">
                                <div class="foto-maquina-nome">${f.nome}</div>
                            </div>`;
                    });
                    fotoHtml += '</div>';
                }
                html += `
                <div class="card-cliente">
                    <div class="card-cliente-header">
                        <div class="card-cliente-nome">${c.nome}</div>
                        <div class="card-cliente-dias">${diasStr}</div>
                    </div>
                    ${endStr ? `<div class="card-cliente-end">📍 ${endStr}</div>` : ''}
                    ${fotoHtml}
                </div>`;
            });
        }
    });

    wrap.innerHTML = html;
}


// ─────────────────────────────────────────────
// Selecionar rota (usuário pressiona o botão)
// ─────────────────────────────────────────────
window.selecionarRota = async function() {
    if (!usuarioAtual) {
        mostrarToast('⚠️ Nenhum usuário selecionado no app');
        return;
    }
    if (!sessaoAtual) {
        mostrarToast('⚠️ Nenhuma sessão ativa');
        return;
    }

    const btn = document.getElementById('btnSortear');
    btn.setAttribute('disabled', true);
    btn.innerHTML = 'Selecionando...';

    // Liga a flag ANTES de chamar o Firebase para que o listener
    // que dispara ao salvar já encontre estaAnimando = true
    estaAnimando = true;

    let rotaSelecionada = null;
    try {
        rotaSelecionada = await dbSelecionarRota(usuarioAtual);
    } catch (e) {
        console.error(e);
        estaAnimando = false;
        mostrarToast('❌ Erro ao selecionar. Tente novamente.');
        btn.removeAttribute('disabled');
        btn.innerHTML = '✅ &nbsp;SELECIONAR MINHA ROTA';
        return;
    }

    if (!rotaSelecionada) {
        estaAnimando = false;
        mostrarToast('Todas as rotas já foram selecionadas!');
        btn.setAttribute('disabled', true);
        btn.innerHTML = '🔒 &nbsp;Nenhuma rota disponível';
        return;
    }

    await animarSlot(rotaSelecionada.numeroRota);
    estaAnimando = false;

    // Confetti
    dispararConfetti();

    // Renderiza os detalhes agora que a animação terminou
    if (sessaoAtual) {
        const rotas = sessaoAtual.rotas || {};
        const minhasRotas = Object.entries(rotas)
            .filter(([_, r]) => r.selecionada_por === usuarioAtual)
            .map(([n]) => n);
        if (minhasRotas.length > 0) {
            document.getElementById('wrapJaSelecionou').style.display = 'block';
            mostrarMinhasRotas(minhasRotas, sessaoAtual);
        }
        if (minhasRotas.length >= LIMITE_ROTAS) {
            document.getElementById('btnSortearWrap').style.display = 'none';
        }
    }
};

// ─────────────────────────────────────────────
// Animação slot machine
// ─────────────────────────────────────────────
function animarSlot(rotaFinal) {
    return new Promise(resolve => {
        const el = document.getElementById('slotNumero');
        const rotas = numerosDeRota.length > 0 ? numerosDeRota : ['01','02','03','04','05'];
        el.classList.add('girando');

        let count = 0;
        const totalSpins = 32;

        function spin() {
            const r = rotas[Math.floor(Math.random() * rotas.length)];
            el.textContent = r;
            count++;

            let delay;
            if (count < totalSpins * 0.5)      delay = 70;
            else if (count < totalSpins * 0.75) delay = 160;
            else if (count < totalSpins * 0.9)  delay = 300;
            else if (count < totalSpins)         delay = 500;
            else {
                el.classList.remove('girando');
                el.textContent = rotaFinal;
                resolve();
                return;
            }
            setTimeout(spin, delay);
        }

        spin();
    });
}

// ─────────────────────────────────────────────
// Cálculo das estimativas por rota
// ─────────────────────────────────────────────
async function calcularValoresPorRota() {
    const [clientes, atendimentos] = await Promise.all([
        dbListarClientes(),
        dbListarAtendimentos()
    ]);

    // Agrupa atendimentos por clienteId, ordena por data desc
    const atendPorCliente = {};
    atendimentos.forEach(a => {
        const cid = a.cliente?.id;
        if (!cid) return;
        if (!atendPorCliente[cid]) atendPorCliente[cid] = [];
        atendPorCliente[cid].push(a);
    });
    Object.values(atendPorCliente).forEach(lista => {
        lista.sort((a, b) => new Date(b.data) - new Date(a.data));
    });

    // Monta maquinas mais recentes por clienteId
    const maquinasPorClienteMap = {};
    clientes.forEach(c => {
        const lista = atendPorCliente[c.firebaseUrl] || [];
        // Pega fotos do atendimento mais recente que tiver fotos
        for (const at of lista) {
            if (at.fotos?.maquinas?.length > 0) {
                maquinasPorClienteMap[c.firebaseUrl] = at.fotos.maquinas;
                break;
            }
        }
    });

    // Calcula estimativa por cliente e agrupa por rota
    const rotasMap = {}; // { "01": { valor_estimado, clientes: [] } }

    clientes.forEach(c => {
        const numRota = (c.rota || '').trim();
        if (!numRota) return;

        const lista = atendPorCliente[c.firebaseUrl] || [];
        const estimativa = calcularEstimativaCliente(lista);

        if (!rotasMap[numRota]) {
            rotasMap[numRota] = { valor_estimado: 0, clientes: [], num_clientes: 0 };
        }
        rotasMap[numRota].valor_estimado += estimativa;
        rotasMap[numRota].num_clientes++;
        rotasMap[numRota].clientes.push({
            id: c.firebaseUrl,
            nome: c.nome || '',
            endereco: c.endereco || '',
            numero_endereco: c.numero_endereco || '',
            cidade: c.cidade || '',
            aberto: c.aberto || '',
            estimativa_valor: estimativa
        });
    });

    // Ordena por valor desc
    const rotas = Object.entries(rotasMap)
        .map(([numero, dados]) => ({ numero, ...dados }))
        .sort((a, b) => b.valor_estimado - a.valor_estimado);

    // Monta clientesPorRota
    const cpr = {};
    rotas.forEach(r => { cpr[r.numero] = r.clientes; });

    return { rotas, clientesPorRota: cpr, maquinasPorClienteMap };
}

function calcularEstimativaCliente(atendimentos) {
    if (atendimentos.length === 0) return 0;

    const hoje = new Date();
    hoje.setHours(0,0,0,0);

    const ultimo = new Date(atendimentos[0].data);
    ultimo.setHours(0,0,0,0);
    const diasDesdeUltimo = Math.max(0, Math.round((hoje - ultimo) / 86400000));

    if (atendimentos.length === 1) {
        // Só um atendimento: usa o valor dele como referência diária mínima (1 dia)
        const valorUnico = atendimentos[0].financeiro?.totalGeral || 0;
        return valorUnico > 0 ? Math.round(valorUnico * 0.5) : 0; // estimativa conservadora
    }

    // Dois últimos atendimentos
    const v1 = atendimentos[0].financeiro?.totalGeral || 0;
    const v2 = atendimentos[1].financeiro?.totalGeral || 0;
    const d1 = new Date(atendimentos[0].data);
    const d2 = new Date(atendimentos[1].data);
    d1.setHours(0,0,0,0);
    d2.setHours(0,0,0,0);

    const diasEntre = Math.abs(Math.round((d1 - d2) / 86400000));
    if (diasEntre === 0) return 0;

    const taxaDiaria = (v1 + v2) / diasEntre;
    return Math.round(taxaDiaria * diasDesdeUltimo);
}

// ─────────────────────────────────────────────
// Criar/reiniciar sessão (automático ou via admin)
// ─────────────────────────────────────────────
async function iniciarSessao() {
    const dados = await calcularValoresPorRota();

    if (dados.rotas.length === 0) {
        mostrarToast('❌ Nenhuma rota encontrada nos clientes cadastrados');
        return;
    }

    const rotasObj = {};
    dados.rotas.forEach(r => {
        rotasObj[r.numero] = {
            valor_estimado: r.valor_estimado,
            num_clientes: r.num_clientes,
            selecionada_por: null,
            timestamp_selecao: null
        };
    });

    const sessao = {
        criada_em: new Date().toISOString(),
        criada_por: usuarioAtual,
        rotas: rotasObj,
        clientes_por_rota: dados.clientesPorRota,
        maquinas_por_cliente: dados.maquinasPorClienteMap
    };

    await dbCriarSessaoRotas(sessao);
}

window.recalcularESessao = async function() {
    fecharModalAdmin();
    mostrarToast('🔄 Recalculando rotas...');
    try {
        await iniciarSessao();
        mostrarToast('✅ Sessão reiniciada!');
    } catch(e) {
        mostrarToast('❌ Erro ao recalcular');
    }
};

window.limparSelecoes = async function() {
    if (!sessaoAtual || !sessaoAtual.rotas) {
        mostrarToast('Nenhuma sessão ativa');
        return;
    }
    fecharModalAdmin();
    try {
        await dbLimparSelecoes(Object.keys(sessaoAtual.rotas));
        mostrarToast('✅ Seleções limpas!');
    } catch(e) {
        mostrarToast('❌ Erro ao limpar seleções');
    }
};

window.encerrarSessao = async function() {
    if (!confirm('Tem certeza que quer encerrar a sessão atual?')) return;
    fecharModalAdmin();
    try {
        await dbEncerrarSessaoRotas();
        mostrarToast('✅ Sessão encerrada');
    } catch(e) {
        mostrarToast('❌ Erro ao encerrar sessão');
    }
};

// ─────────────────────────────────────────────
// Helpers de UI
// ─────────────────────────────────────────────
function ocultarTodas() {
    document.getElementById('telaCarregando').classList.remove('ativa');
    document.getElementById('telaSemSessao').classList.remove('ativa');
    document.getElementById('telaSessaoAtiva').classList.remove('ativa');
}

window.abrirModalAdmin = function() {
    document.getElementById('modalAdmin').classList.add('ativo');
};
window.fecharModalAdmin = function(e) {
    if (e && e.target !== document.getElementById('modalAdmin')) return;
    document.getElementById('modalAdmin').classList.remove('ativo');
};

window.abrirLightbox = function(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('ativo');
    history.pushState({ lightbox: true }, '');
};
window.fecharLightbox = function() {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('ativo')) return;
    lb.classList.remove('ativo');
    if (history.state && history.state.lightbox) history.back();
};

window.addEventListener('popstate', function(e) {
    const lb = document.getElementById('lightbox');
    if (lb && lb.classList.contains('ativo')) {
        lb.classList.remove('ativo');
    }
});

function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visivel');
    setTimeout(() => t.classList.remove('visivel'), 3000);
}

function dispararConfetti() {
    const cores = ['#ffeb3b','#4cff91','#4e8aff','#ff5252','#ff9800','#e040fb'];
    for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = cores[Math.floor(Math.random() * cores.length)];
        p.style.width = (6 + Math.random() * 8) + 'px';
        p.style.height = (6 + Math.random() * 8) + 'px';
        p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        p.style.animationDelay = (Math.random() * 0.6) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 4000);
    }
}
