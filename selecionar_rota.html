п»ҝ<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeleГ§ГЈo de Rotas</title>
    <style>
        * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }

        body { margin:0; font-family:Arial,sans-serif; background:#0b2256; min-height:100vh; display:flex; justify-content:center; color:white; }
        .app { width:100%; max-width:600px; padding:15px 15px 60px; box-sizing:border-box; }

        /* TOPO */
        .topo { display:flex; align-items:center; justify-content:center; min-height:40px; margin-bottom:20px; position:relative; }
        .titulo { font-size:24px; font-weight:bold; text-align:center; }
        .btn-home { background:rgba(255,255,255,0.1); padding:8px; border-radius:50%; cursor:pointer; display:flex; position:absolute; left:0; border:none; }
        .btn-home:active { background:rgba(255,255,255,0.2); }

        /* TELAS */
        .tela { display:none; flex-direction:column; align-items:center; width:100%; }
        .tela.ativa { display:flex; }

        /* CARREGANDO */
        .loading-clientes {
            text-align: center;
            padding: 32px 18px;
        }
        .loading-engrenagem-cli {
            display: block;
            margin: 0 auto 14px;
            animation: girar-cli 2s linear infinite;
            transform-origin: center;
        }
        @keyframes girar-cli {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .loading-msg-cli {
            color: rgba(255,255,255,0.75);
            font-size: 15px;
            min-height: 22px;
            transition: opacity 0.35s ease;
            text-align: center;
        }
        .loading-msg-cli.fade-out { opacity: 0; }

        /* TГғЖ’ГӮВҚTULO DE SEГғЖ’ГўвӮ¬ВЎГғЖ’ГҶвҖҷO ГғВўГўвҖҡВ¬ГўвӮ¬Вқ padrГғЖ’ГӮВЈo do app */
        .secao-titulo { font-size:14px; font-weight:bold; color:#ffeb3b; text-transform:uppercase; letter-spacing:1px; margin:20px 0 10px; padding-bottom:5px; border-bottom:1px dashed rgba(255,235,59,0.3); text-align:center; display:block; width:100%; }


        /* LISTA QUEM JГғЖ’ГӮВҒ SELECIONOU */
        .lista-selecoes { width:100%; display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
        .item-selecao { display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px 16px; font-size:15px; animation:entrar 0.25s ease; }
        @keyframes entrar { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
        .item-selecao .nome-usuario { font-weight:bold; }
        .item-selecao .status-check { font-size:16px; color:#e5e7eb; }

        /* CARD COM NГғЖ’Г…ВЎMERO GIRANDO */
        .slot-wrapper { width:100%; display:flex; justify-content:center; margin:6px 0 18px; }
        .slot-machine { position:relative; width:180px; height:110px; background:rgba(255,255,255,0.04); border-radius:16px; border:1px solid rgba(255,235,59,0.2); display:flex; align-items:center; justify-content:center; box-shadow:inset 0 0 24px rgba(0,0,0,0.3); }
        .luzes { position:absolute; inset:-1px; border-radius:16px; border:2px solid rgba(255,235,59,0.25); animation:brilhoSlot 2s ease-in-out infinite; pointer-events:none; }
        @keyframes brilhoSlot { 0%,100% { border-color:rgba(255,235,59,0.15); } 50% { border-color:rgba(255,235,59,0.6); box-shadow:0 0 14px rgba(255,235,59,0.15); } }
        .luzes.pausado { animation:none; border-color:rgba(255,255,255,0.08); }
        .slot-janela { text-align:center; position:relative; z-index:1; }
        .slot-label { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#e5e7eb; margin-bottom:2px; }
        .slot-numero { font-size:64px; font-weight:900; color:#ffeb3b; line-height:1; min-width:100px; display:block; font-family:'Courier New',monospace; text-shadow:0 0 16px rgba(255,235,59,0.35); }
        .slot-numero.girando { animation:piscarNumero 0.09s steps(1) infinite; }
        @keyframes piscarNumero { 50% { filter:blur(2px); opacity:0.65; } }

        /* BOTГғЖ’ГҶвҖҷO SELECIONAR ГғВўГўвҖҡВ¬ГўвӮ¬Вқ padrГғЖ’ГӮВЈo amarelo do app */
        .btn-sortear { background:#ffeb3b; border:none; color:#0b2256; font-weight:bold; font-size:18px; padding:15px; border-radius:12px; cursor:pointer; width:100%; text-align:center; transition:0.15s; }
        .btn-sortear:active { transform:scale(0.98); background:#ffe100; }
        .btn-sortear[disabled] { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); color:#9ca3af; cursor:not-allowed; }
        .aviso-deposito-rota { display:none; margin-top:9px; color:#ffb74d; font-size:15px; font-weight:700; text-align:center; line-height:1.35; }

        /* CARD DE ROTA SELECIONADA */
        .card-rota { position:relative; overflow:hidden; padding:16px; border:2px solid #ffffff; border-radius:14px; margin-bottom:10px; background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)); width:100%; box-shadow:0 16px 30px rgba(0,0,0,0.25); }
        .card-rota::before { content:""; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, #ffeb3b, #ffc107, #ffeb3b); }
        .card-rota-numero { display:flex; align-items:center; justify-content:center; position:relative; margin-bottom:12px; }
        .btn-mapa-rota { position:absolute; right:0; padding:7px 10px; border-radius:10px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); cursor:pointer; display:flex; align-items:center; }
        .btn-mapa-rota:active { background:rgba(255,255,255,0.14); }
        .card-rota-numero-badge { display:inline-flex; align-items:center; gap:10px; padding:8px 14px; border-radius:999px; background:rgba(255,235,59,0.12); border:1px solid rgba(255,235,59,0.6); box-shadow:0 14px 22px rgba(255,235,59,0.12); }
        .card-rota-numero-badge-label { font-size:12px; font-weight:bold; letter-spacing:1.6px; text-transform:uppercase; color:#ffffff; user-select:none; -webkit-user-select:none; }
        .card-rota-numero-badge-num { font-size:26px; font-weight:900; color:#ffeb3b; line-height:1; font-family:'Courier New', monospace; text-shadow:0 0 14px rgba(255,235,59,0.35); }
        .card-rota-dias { display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:10px; }
        .card-rota-dias-label { font-size:12px; color:#ffffff; text-transform:uppercase; letter-spacing:0.5px; width:100%; text-align:center; user-select:none; -webkit-user-select:none; }
        .card-rota-dias-val { display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; width:100%; }
        .card-rota-liberacao { font-size:14px; font-weight:700; color:#ffffff; text-align:center; margin-top:6px; user-select:none; -webkit-user-select:none; }
        .dia-badge { font-size:12px; font-weight:bold; border-radius:999px; padding:6px 0; text-align:center; border:1px solid transparent; white-space:nowrap; }
        .dia-badge.disponivel { color:#ffffff; background:linear-gradient(180deg, #66bb6a, #2e7d32); border-color:#a5d6a7; box-shadow:0 0 0 1px rgba(165,214,167,0.18), 0 10px 18px rgba(76,175,80,0.18); }
        .dia-badge.indisponivel { color:#cbd5e1; background:rgba(255,255,255,0.06); border:1px dashed rgba(255,255,255,0.35); text-decoration:line-through; text-decoration-thickness:2px; text-decoration-color:#ffffff; }
        .card-rota-dias-hint { font-size:13px; font-weight:bold; color:#ff9800; text-align:center; margin-top:6px; }
        .card-rota-clientes { margin-top:14px; display:flex; flex-direction:column; gap:10px; }
        .card-rota-clientes-bloco { display:flex; flex-direction:column; }
        .card-rota-clientes-titulo { display:grid; grid-template-columns:26px 1fr auto auto; align-items:center; gap:8px; padding:13px 14px; border-radius:14px; cursor:pointer; user-select:none; -webkit-user-select:none; transition:filter 0.15s, border-radius 0.2s; border:none; }
        .card-rota-clientes-titulo:active { filter:brightness(0.85); transform:scale(0.99); }
        .card-rota-clientes-titulo.aberto { border-radius:14px 14px 0 0; }
        .card-rota-clientes-titulo.pendentes { background:linear-gradient(135deg,#92400e,#d97706); box-shadow:0 4px 16px rgba(217,119,6,0.3); }
        .card-rota-clientes-titulo.atendidos-hdr { background:linear-gradient(135deg,#14532d,#16a34a); box-shadow:0 4px 16px rgba(22,163,74,0.3); }
        .bloco-icone { font-size:18px; text-align:center; }
        .bloco-label { font-size:15px; font-weight:bold; color:white; text-align:center; }
        .bloco-badge { background:rgba(255,255,255,0.95); color:#0b2256; font-size:14px; font-weight:900; padding:3px 11px; border-radius:999px; text-align:center; white-space:nowrap; min-width:28px; margin-right:4px; }
        .seta-bloco { display:flex; flex-direction:column; align-items:center; gap:1px; color:rgba(255,255,255,0.8); transition:none; text-align:center; }
        .seta-bloco::before { content:"ver"; font-size:11px; font-weight:bold; letter-spacing:0.5px; text-transform:uppercase; color:rgba(255,255,255,1); transition:opacity 0.2s; }
        .seta-bloco svg { transition:transform 0.25s; }
        .card-rota-clientes-titulo.aberto .seta-bloco::before { content:"fechar"; }
        .card-rota-clientes-titulo.aberto .seta-bloco svg { transform:rotate(180deg); }
        .card-rota-numero-sub { font-size:18px; font-weight:bold; color:#ffeb3b; text-align:center; user-select:none; -webkit-user-select:none; }
        .card-rota-clientes-lista { display:none; flex-direction:column; gap:8px; max-height:260px; overflow:auto; padding:10px; background:rgba(0,0,0,0.18); border:1px solid rgba(255,255,255,0.1); border-top:none; border-radius:0 0 14px 14px; }
        .card-rota-clientes-lista.aberto { display:flex; }
        .card-rota-cliente-chip { padding:10px 12px; border:1px solid rgba(255,255,255,0.4); border-radius:10px; background:transparent; color:#ffffff; font-size:14px; font-weight:400; text-align:center; transition:background 0.15s; }
        .card-rota-cliente-chip[onclick]:active { background:rgba(255,255,255,0.1); transform:translateY(2px); }
        .card-rota-cliente-chip.atendido { border-color:rgba(74,222,128,0.5); color:#bbf7d0; }
        .card-rota-cliente-chip.justificado { border-style:dashed; border-color:rgba(230,100,60,0.85); color:rgba(255,255,255,0.9); }
        .card-rota-cliente-chip.justificado::before { content:"вҡ пёҸ"; font-size:11px; margin-right:7px; vertical-align:middle; }
        .card-rota-cliente-item { display:flex; flex-direction:column; gap:8px; padding:10px; border:1px solid #3b5791; border-radius:10px; background:#132f6c; }
        .card-rota-cliente-nome { color:#ffffff; font-size:15px; font-weight:700; text-align:center; line-height:1.25; }
        .card-rota-cliente-acoes { display:grid; grid-template-columns:1fr 1.7fr; gap:8px; }
        .btn-justificar-rota, .btn-atender-rota, .btn-ver-justif-rota { min-height:34px; border-radius:9px; font-size:14px; font-weight:700; cursor:pointer; text-align:center; }
        .btn-justificar-rota { background:#4a3c50; border:1px solid #b46545; color:#ff9b45; }
        .btn-justificar-rota:active { background:#5c4658; transform:scale(0.98); }
        .btn-justificar-rota:disabled { background:#2f3548; border-color:#667085; color:#cbd5e1; cursor:not-allowed; transform:none; }
        .btn-atender-rota { background:#16a34a; border:1px solid #16a34a; color:#ffffff; }
        .btn-atender-rota:active { background:#15803d; transform:scale(0.98); }
        .btn-ver-justif-rota { width:100%; background:#4a3c50; border:1px solid #b46545; color:#ffb74d; }
        .btn-ver-justif-rota:active { background:#5c4658; transform:scale(0.98); }
        .card-rota-cliente-vazio { padding:10px 12px; border:1px solid #ffffff; border-radius:12px; background:transparent; color:#ffffff; font-size:15px; font-weight:400; text-align:center; }
        .card-rota-acoes { display:flex; gap:8px; margin-top:4px; }
        .btn-ver-clientes { flex:1; padding:10px; border-radius:10px; background:#ffeb3b; color:#0b2256; font-size:14px; font-weight:bold; text-align:center; cursor:pointer; border:none; }
        .btn-ver-clientes:active { background:#ffe100; transform:scale(0.98); }

        /* LIGHTBOX */
        .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; justify-content:center; align-items:center; }
        .lightbox.ativo { display:flex; }
        .lightbox img { max-width:95vw; max-height:90vh; border-radius:10px; object-fit:contain; }

        /* MODAL */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; justify-content:center; align-items:flex-end; }
        .modal-overlay.ativo { display:flex; }
        .modal-content { background:linear-gradient(180deg,#173d8f,#0f2a66); border:1px solid rgba(255,255,255,0.15); border-radius:20px 20px 0 0; padding:22px 16px 36px; width:100%; max-width:600px; box-sizing:border-box; animation:subirModal 0.25s ease; }
        @keyframes subirModal { from { transform:translateY(100%); } to { transform:translateY(0); } }
        .modal-titulo { font-size:17px; font-weight:bold; color:#ffeb3b; text-align:center; margin-bottom:4px; }
        .modal-subtitulo { font-size:12px; color:#e5e7eb; text-align:center; margin-bottom:18px; }
        .modal-info { font-size:13px; color:#ffffff; text-align:left; margin:0 0 14px; }
        .modal-info-box { padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,0.14); background:rgba(255,255,255,0.06); }
        .modal-info-titulo { font-size:12px; font-weight:bold; margin-bottom:6px; }
        .modal-info-lista { font-size:12px; line-height:1.45; max-height:120px; overflow:auto; padding-top:6px; border-top:1px dashed rgba(255,255,255,0.18); }
        .btn-modal-acao { padding:14px; border-radius:12px; font-size:15px; font-weight:bold; cursor:pointer; text-align:center; transition:0.15s; margin-bottom:10px; }
        .btn-modal-acao:active { transform:scale(0.97); }
        .btn-calcular { background:#ffeb3b; color:#0b2256; border:none; }
        .btn-encerrar { background:rgba(255,80,80,0.08); border:1px solid rgba(255,80,80,0.22); color:#ff8282; }
        .btn-encerrar-teste { background:rgba(255,150,50,0.08); border:1px solid rgba(255,150,50,0.22); color:#ffaf64; }
        .btn-fechar-modal { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e5e7eb; }
        .modal-box, .modal-ver-box { background:linear-gradient(180deg,#173d8f,#0f2a66); border:1px solid #31518d; border-radius:20px 20px 0 0; padding:6px 18px 36px; width:100%; max-width:600px; box-sizing:border-box; animation:subirModal 0.25s ease; }
        .modal-handle { width:40px; height:4px; background:#8297c7; border-radius:2px; margin:12px auto 18px; }
        .motivos-grid { display:grid; grid-template-columns:1fr; gap:8px; margin-bottom:16px; }
        .btn-motivo { background:#17366f; border:1px solid #526da2; border-radius:12px; padding:13px 10px; font-size:15px; font-weight:700; color:#ffffff; cursor:pointer; text-align:center; display:flex; flex-direction:column; align-items:center; gap:4px; }
        .btn-motivo .motivo-icon { font-size:22px; }
        .btn-motivo:active { transform:scale(0.98); }
        .btn-motivo.selecionado { background:#304172; border-color:#ffeb3b; color:#ffeb3b; }
        .obs-label { font-size:14px; color:#ffffff; margin-bottom:6px; letter-spacing:0.5px; text-align:center; }
        .obs-input { width:100%; background:#102b63; border:1px solid #526da2; border-radius:12px; padding:12px 14px; font-size:16px; color:#ffffff; outline:none; resize:none; font-family:Arial,sans-serif; margin-bottom:18px; user-select:text; -webkit-user-select:text; }
        .obs-input::placeholder { color:#c7d2ee; }
        .obs-input:focus { border-color:#ffeb3b; }
        .modal-acoes { display:flex; gap:10px; }
        .btn-modal-cancelar, .btn-modal-confirmar, .btn-remover-justif, .btn-fechar-ver { padding:13px; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; text-align:center; }
        .btn-modal-cancelar { flex:1; background:#20396f; border:1px solid #526da2; color:#ffffff; }
        .btn-modal-confirmar { flex:2; background:#ffeb3b; border:none; color:#0b2256; }
        .btn-modal-confirmar:disabled { background:#31436f; color:#c7d2ee; cursor:not-allowed; }
        .detalhe-justif { background:#1b346b; border:1px solid #b46545; border-radius:14px; padding:14px; margin-bottom:14px; }
        .detalhe-justif-linha { display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:7px; font-size:15px; }
        .detalhe-justif-label { color:#ffffff; font-size:13px; }
        .detalhe-justif-valor { color:#ffffff; font-weight:700; text-align:right; }
        .detalhe-justif-obs { font-size:15px; color:#ffffff; font-style:italic; margin-top:7px; padding-top:7px; border-top:1px solid #526da2; text-align:center; }
        .chip-expiracao { display:inline-flex; align-items:center; gap:4px; font-size:13px; border-radius:20px; padding:3px 10px; font-weight:700; border:1px solid #ffffff; color:#ffffff; }
        .chip-exp-ativa { background:#1c5f36; }
        .chip-exp-expirada { background:#7c2424; }
        .btn-remover-justif { width:100%; background:#3e2440; border:1px solid #ff6e6e; color:#ff9a9a; margin-bottom:10px; }
        .btn-fechar-ver { width:100%; background:#20396f; border:1px solid #526da2; color:#ffffff; }

        /* TOAST */
        .toast { position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(12px); background:#0f2a66; border:1px solid rgba(255,255,255,0.13); border-radius:50px; padding:11px 22px; font-size:14px; color:white; z-index:500; opacity:0; transition:opacity 0.25s, transform 0.25s; white-space:nowrap; pointer-events:none; }
        .toast.visivel { opacity:1; transform:translateX(-50%) translateY(0); }

        /* CONFETTI */
        .confetti-piece { position:fixed; width:9px; height:9px; border-radius:2px; top:-10px; animation:cair linear forwards; z-index:999; pointer-events:none; }
        @keyframes cair { to { transform:translateY(110vh) rotate(720deg); opacity:0; } }

        .cor-aviso { color:#ff9800; font-size:13px; text-align:center; }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <div class="btn-home" onclick="window.location.href='index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </div>
        <div class="titulo">SeleГ§ГЈo de Rotas</div>
    </div>

    <!-- TELA: CARREGANDO -->
    <div id="telaCarregando" class="tela ativa">
        <div class="loading-clientes">
            <svg class="loading-engrenagem-cli" width="44" height="44" viewBox="0 0 24 24" fill="none"
                 stroke="rgba(255,200,50,0.9)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <div id="loadingMsgRotas" class="loading-msg-cli">Carregando rotas...</div>
        </div>
    </div>

    <!-- TELA: PREPARANDO SESSГғЖ’ГҶвҖҷO (criaГғЖ’ГӮВ§ГғЖ’ГӮВЈo automГғЖ’ГӮВЎtica) -->
    <div id="telaSemSessao" class="tela">
        <div class="loading-clientes">
            <svg class="loading-engrenagem-cli" width="44" height="44" viewBox="0 0 24 24" fill="none"

            setTimeout(() => {

                el.classList.remove('fade-out');
            }, 350);
        });
        _loadingIdxRotas = (_loadingIdxRotas + 1) % _loadingMsgsRotas.length;
    }, 2200);
}

function obterHojeLocal() {
    const hoje = new Date();

    const m = String(hoje.getMonth() + 1).padStart(2, '0');
    const d = String(hoje.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

async function init() {
    usuarioAtual = String(localStorage.getItem('usuarioLogado') || localStorage.getItem('usuario_selecionado') || '').trim();
    iniciarBloqueioDepositoRotas();

    if (!timerAtualizacaoLiberacaoRotas) {
        timerAtualizacaoLiberacaoRotas = setInterval(async () => {
            if (!sessaoAtual) return;
            try {
                await processarLiberacoesMinhasRotas(sessaoAtual);
                if (sessaoAtual) mostrarTelaSessaoAtiva(sessaoAtual);
            } catch (erroTimer) {
                console.warn('Falha ao atualizar a liberacao das rotas selecionadas:', erroTimer);
            }
        }, 60000);
    }

    // Escuta a versГғЖ’ГӮВЈo dos clientes para detectar quando rotas/clientes mudaram
    dbEscutarVersaoClientes((versao) => {
        versaoClientesAtual = versao || null;
        tentarAutoRecalcularSessao();
    });

    dbEscutarVersaoMediaDeVendas((versao) => {
        versaoMediaDeVendasAtual = versao || null;
        tentarAutoRecalcularSessao();
    });

    // Escuta a sessГғЖ’ГӮВЈo em tempo real
    dbEscutarSessaoRotas(onSessaoAtualizada);
    carregarClientesPorId();
}

function iniciarBloqueioDepositoRotas() {
    resumoDepositosCarregado = false;
    rotaBloqueadaPorDeposito = true;
    mensagemBloqueioDeposito = 'Aguardando verificaГ§ГЈo dos depГіsitos.';
    aplicarBloqueioDepositoRota();

    if (typeof pararEscutaResumoDepositos === 'function') pararEscutaResumoDepositos();
    pararEscutaResumoDepositos = dbEscutarResumoDepositos(usuarioAtual, (resumo) => {
        if (!resumo || resumo.erro) {
            resumoDepositosCarregado = false;
            rotaBloqueadaPorDeposito = true;
            mensagemBloqueioDeposito = 'Aguardando verificaГ§ГЈo dos depГіsitos.';
            aplicarBloqueioDepositoRota();
            return;
        }

        const falta = Number(resumo.faltaDepositarTotal || 0);
        const limite = Number(resumo.limiteBloqueio || 5000);
        const status = String(resumo.statusDeposito || '').trim().toLowerCase();
        resumoDepositosCarregado = true;
        rotaBloqueadaPorDeposito = status === 'bloqueado' || falta >= limite;
        mensagemBloqueioDeposito = rotaBloqueadaPorDeposito
            ? MENSAGEM_LIMITE_DEPOSITO
            : '';

        if (sessaoAtual && !estaAnimando) {
            mostrarTelaSessaoAtiva(sessaoAtual);
        } else {
            aplicarBloqueioDepositoRota();
        }
    });
}

function aplicarBloqueioDepositoRota() {
    const btn = document.getElementById('btnSortear');
    const aviso = document.getElementById('avisoDepositoRota');
    const wrap = document.getElementById('btnSortearWrap');
    if (!btn || !wrap || wrap.style.display === 'none') return;

    if (!resumoDepositosCarregado) {
        btn.setAttribute('disabled', true);
        btn.innerHTML = 'Verificando depГіsitos...';
        if (aviso) aviso.style.display = 'none';
        return;
    }

    if (rotaBloqueadaPorDeposito) {
        btn.setAttribute('disabled', true);
        btn.innerHTML = 'DepГіsito integral necessГЎrio';
        if (aviso) {
            aviso.textContent = mensagemBloqueioDeposito;
            aviso.style.display = 'block';
        }
        return;
    }

    if (aviso) aviso.style.display = 'none';
}

async function onSessaoAtualizada(sessao) {
    sessaoAtual = sessao;

    if (sessao && sessaoTemRotasDoUsuario(sessao)) {
        await garantirAtendimentosUsuarioCarregados();
    }
    await processarLiberacoesMinhasRotas(sessao);

    // Se a sessГЈo estiver desatualizada, recalcule em segundo plano sem derrubar a tela atual.
    tentarAutoRecalcularSessao();

    if (estaAnimando) {
        if (sessao && sessao.rotas) {
            const qtdDisp = Object.values(sessao.rotas).filter(r => !r.selecionada_por).length;
            document.getElementById('contadorRotas').textContent =
                qtdDisp > 0
                    ? `${qtdDisp} rota${qtdDisp !== 1 ? 's' : ''} disponГӯvel${qtdDisp !== 1 ? 'is' : ''}`
                    : 'Nenhuma rota disponГӯvel';
        }
        return;
    }

    ocultarTodas();

    if (!sessao) {
        await criarSessaoAutomatica({ mostrarTelaPreparando: true });
    } else {
        mostrarTelaSessaoAtiva(sessao);
    }
}

async function criarSessaoAutomatica({ mostrarTelaPreparando = false } = {}) {
    if (criandoSessao) return;
    criandoSessao = true;
    recalculandoSessaoEmSegundoPlano = !mostrarTelaPreparando;

    if (mostrarTelaPreparando) {
        ocultarTodas();
        document.getElementById('telaSemSessao').classList.add('ativa');
    }

    try {
        await iniciarSessao();
    } catch(e) {
        console.error('Erro ao criar sessГЈo automГЎtica:', e);
        mostrarToast('вқҢ Erro ao preparar rotas. Tente voltar e entrar novamente.');
    } finally {
        criandoSessao = false;
        recalculandoSessaoEmSegundoPlano = false;

        if (mostrarTelaPreparando && sessaoAtual) {
            ocultarTodas();
            mostrarTelaSessaoAtiva(sessaoAtual);
        }
    }
}

const LIMITE_ROTAS = 3;

function sessaoEstaDesatualizada(sessao) {
    const hojeLocal = obterHojeLocal();
    if (sessao?.referencia_dia && sessao.referencia_dia !== hojeLocal) return true;
    if (!sessao || !sessao.criada_em) return false;
    const criadaMs = Date.parse(sessao.criada_em);
    if (Number.isNaN(criadaMs)) return false;
    if (versaoClientesAtual && versaoClientesAtual > criadaMs) return true;
    if (versaoMediaDeVendasAtual && versaoMediaDeVendasAtual > criadaMs) return true;
    return false;
}

function tentarAutoRecalcularSessao() {
    if (estaAnimando) return false;
    if (!sessaoAtual) return false;
    if (criandoSessao || recalculandoSessaoEmSegundoPlano) return false;
    if (!sessaoEstaDesatualizada(sessaoAtual)) return false;

    criarSessaoAutomatica({ mostrarTelaPreparando: false });
    return true;
}

function sessaoTemRotasDoUsuario(sessao) {
    return Object.values(sessao?.rotas || {}).some(rota => rota?.selecionada_por === usuarioAtual);
}

function mostrarTelaSessaoAtiva(sessao) {
    _pararLoadingRotas();
    document.getElementById('telaSessaoAtiva').classList.add('ativa');

    const rotas = sessao.rotas || {};
    const todasRotas = Object.entries(rotas);
    const selecionadas = todasRotas.filter(([_, r]) => r.selecionada_por);
    const disponiveis = todasRotas.filter(([_, r]) => !r.selecionada_por);

    const qtdDisp = disponiveis.length;
    document.getElementById('contadorRotas').textContent =
        qtdDisp > 0
            ? `${qtdDisp} rota${qtdDisp !== 1 ? 's' : ''} disponГӯvel${qtdDisp !== 1 ? 'is' : ''}`
            : 'Nenhuma rota disponГӯvel';


    numerosDeRota = todasRotas.map(([n]) => n);
    clientesPorRota = sessao.clientes_por_rota || {};
    maquinasPorCliente = sessao.maquinas_por_cliente || {};



    // Rotas jГғЖ’ГӮВЎ selecionadas pelo usuГғЖ’ГӮВЎrio atual
    const minhasRotas = todasRotas
        .filter(([_, r]) => r.selecionada_por === usuarioAtual)
        .map(([n]) => n);

    const qtdMinhas = minhasRotas.length;

    atualizarVisibilidadeCardNumero(qtdMinhas, minhasRotas[minhasRotas.length - 1]);

    if (qtdMinhas > 0 && !estaAnimando) {
        document.getElementById('wrapJaSelecionou').style.display = 'block';
        mostrarMinhasRotas(minhasRotas, sessao);
    } else if (qtdMinhas === 0) {
        document.getElementById('wrapJaSelecionou').style.display = 'none';
    }

    if (qtdMinhas >= LIMITE_ROTAS) {
        // Atingiu o limite: exibe sГғЖ’ГӮВі as rotas, sem botГғЖ’ГӮВЈo
        document.getElementById('btnSortearWrap').style.display = 'none';
    } else {
        document.getElementById('btnSortearWrap').style.display = 'block';
        const btn = document.getElementById('btnSortear');
        btn.removeAttribute('disabled');
        btn.innerHTML = 'SELECIONAR ROTA';
        if (disponiveis.length === 0) {
            btn.setAttribute('disabled', true);
            btn.innerHTML = 'рҹ”’ &nbsp;Todas as rotas jГЎ foram selecionadas';
        }
        aplicarBloqueioDepositoRota();
    }
}

const ORDEM_DIAS = ['Seg','Ter','Qua','Qui','Sex','SГЎb','Dom'];

function diasEmComum(clientes) {
    if (!clientes.length) return [];
    const sets = clientes.map(c =>
        new Set((c.aberto || '').split(',').map(d => d.trim()).filter(Boolean))
    );
    return ORDEM_DIAS.filter(d => sets.every(s => s.has(d)));
}

function montarEnderecoCliente(c) {
    return [c?.endereco, c?.numero_endereco, c?.cidade].filter(Boolean).join(', ').trim();
}

function enderecoEhLink(valor) {
    return /^https?:\/\//i.test(String(valor || '').trim());
}

function escaparHtml(valor) {
    return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function obterChaveCliente(cliente) {
    return String(cliente?.id || cliente?.firebaseUrl || '').trim();
}

function obterChaveJustificativaCliente(cliente, justificativas = {}) {
    const chaves = [
        String(cliente?.firebaseUrl || '').trim(),
        String(cliente?.id || '').trim(),
        String(cliente?.numero || '').replace(/\D+/g, '').trim()
    ].filter(Boolean);

    for (const chave of chaves) {
        if (justificativas?.[chave]) return chave;
    }

    return chaves[0] || '';
}

function obterNumeroCliente(cliente) {
    const numeroDireto = String(cliente?.numero || '').trim();
    if (numeroDireto) return numeroDireto;

    const chave = obterChaveCliente(cliente);
    if (!chave) return '';

    return String(clientesPorIdMap[chave]?.numero || '').trim();
}

function obterDataBrasilia(timestamp) {
    if (!(timestamp > 0)) return null;

    const partes = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Sao_Paulo',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
    }).formatToParts(new Date(timestamp));

    const get = (type) => partes.find((parte) => parte.type === type)?.value;
    const ano = get('year');
    const mes = get('month');
    const dia = get('day');

    if (!ano || !mes || !dia) return null;
    return new Date(`${ano}-${mes}-${dia}T00:00:00-03:00`);
}

function formatarDiaSemanaLiberacao(timestamp) {
    const dataLiberacao = obterDataBrasilia(timestamp);
    if (!dataLiberacao) return '';

    const diaAnterior = new Date(dataLiberacao.getTime() - 86400000);
    const diaSemana = new Intl.DateTimeFormat('pt-BR', {
        timeZone: 'America/Sao_Paulo',
        weekday: 'long'
    }).format(diaAnterior);

    return `Libera no fim do dia de ${diaSemana}`;
}

function obterTextoLiberacaoRota(status) {
    if (status?.motivo === 'aguardando_primeiro_atendimento') {
        return 'Aguardando o primeiro atendimento da rota para comeГ§ar a contar a justificativa.';
    }

    if (!status?.liberarEmMs || status.liberarAgora) return '';

    const textoLiberacao = formatarDiaSemanaLiberacao(status.liberarEmMs);
    if (status.motivo === 'aguardando_ultima_justificativa') {
        return textoLiberacao;
    }

    if (status.motivo === 'aguardando_prazo_maximo') {
        return textoLiberacao;
    }

    return '';
}

async function processarLiberacoesMinhasRotas(sessao) {
    if (!sessao?.rotas) return;

    const minhasRotas = Object.entries(sessao.rotas)
        .filter(([_, dados]) => dados?.selecionada_por === usuarioAtual)
        .map(([numero, dados]) => ({ numero: String(numero), ...dados }));

    for (const rota of minhasRotas) {
        if (!justificativasPorRota[rota.numero]) {
            try {
                justificativasPorRota[rota.numero] = await dbListarJustificativasCheckin(rota.numero);
            } catch (_) {
                justificativasPorRota[rota.numero] = {};
            }
        }

        const status = calcularStatusLiberacaoRota({
            rotaNumero: rota.numero,
            rotaDados: rota,
            clientesDaRota: (sessao.clientes_por_rota || {})[rota.numero] || [],
            atendimentos: todosAtendimentosRotas,
            justificativas: justificativasPorRota[rota.numero] || {},
            nomeUsuario: usuarioAtual
        });

        const podeLiberarNoCliente = status.liberarAgora && status.motivo === 'todos_atendidos';

        if (!podeLiberarNoCliente) {
            await dbAtualizarControleLiberacaoRota(rota.numero, status);
            if (sessao?.rotas?.[rota.numero]) {
                sessao.rotas[rota.numero].validade_maxima_em = status.prazoMaximoMs ? new Date(status.prazoMaximoMs).toISOString() : null;
                sessao.rotas[rota.numero].prazo_justificativa_em = status.prazoJustificativaMs ? new Date(status.prazoJustificativaMs).toISOString() : null;
                sessao.rotas[rota.numero].liberar_em = status.liberarEmMs ? new Date(status.liberarEmMs).toISOString() : null;
                sessao.rotas[rota.numero].motivo_liberacao = status.motivo || null;
            }
            continue;
        }

        await dbLiberarRota(rota.numero);
        if (sessao?.rotas?.[rota.numero]) {
            sessao.rotas[rota.numero].selecionada_por = null;
            sessao.rotas[rota.numero].selecionada_em = null;
        }
        delete justificativasPorRota[rota.numero];
    }
}

function gerarUrlGoogleMapsRota(enderecos, origem) {
    const destino = encodeURIComponent(enderecos[enderecos.length - 1]);
    const waypoints = enderecos.slice(0, -1).map(e => encodeURIComponent(e)).join('|');
    const origemParam = origem === 'My+Location' ? 'My+Location' : encodeURIComponent(origem);
    let url = `https://www.google.com/maps/dir/?api=1&origin=${origemParam}&destination=${destino}&travelmode=driving&dir_action=navigate`;
    if (waypoints) url += `&waypoints=${waypoints}`;
    return url;
}

function abrirMapsUrl(urlWeb) {
    const ua = navigator.userAgent || '';
    if (/Android/i.test(ua)) {
        // Usar <a>.click() em vez de window.location.href para que o Chrome trate como clique
        // num link вҖ” o Android intercepta o intent sem navegar/recarregar a pГЎgina atual
        const intentUrl = urlWeb.replace(/^https:\/\/www\.google\.com\//i, 'intent://www.google.com/')
            + '#Intent;scheme=https;package=com.google.android.apps.maps;end';
        const a = document.createElement('a');
        a.href = intentUrl;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    } else if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.href = urlWeb.replace(/^https?:\/\//i, 'comgooglemapsurl://');
        setTimeout(() => { window.location.href = urlWeb; }, 1000);
    } else {
        window.open(urlWeb, '_blank');
    }
}

window.abrirMapaRota = function(numeroRota) {
    if (!sessaoAtual?.clientes_por_rota) {
        mostrarToast('вҡ пёҸ Nenhuma sessГЈo ativa');
        return;
    }

    const clientes = sessaoAtual.clientes_por_rota[numeroRota] || [];
    const enderecosAll = clientes
        .filter(cliente => !enderecoEhLink(cliente?.endereco))
        .map(montarEnderecoCliente)
        .filter(Boolean)
        .filter((endereco, indice, lista) => lista.indexOf(endereco) === indice);

    if (enderecosAll.length === 0) {
        mostrarToast('вҡ пёҸ Nenhum endereГ§o encontrado nesta rota');
        return;
    }

    // Limite prГЎtico de waypoints no Google Maps (origem + destino + 23 waypoints = 24 endereГ§os)
    const MAX_ENDERECOS = 24;
    const enderecos = enderecosAll.length > MAX_ENDERECOS
        ? enderecosAll.slice(0, MAX_ENDERECOS)
        : enderecosAll;

    if (enderecosAll.length > MAX_ENDERECOS) {
        mostrarToast(`вҡ пёҸ Muitas paradas (${enderecosAll.length}). Abrindo ${MAX_ENDERECOS} no mapa.`);
    }

    const navegar = (origem) => {
        abrirMapsUrl(gerarUrlGoogleMapsRota(enderecos, origem));
    };

    if (!navigator.geolocation) {
        navegar('My+Location');
        return;
    }

    navigator.geolocation.getCurrentPosition(
        (pos) => navegar(`${pos.coords.latitude},${pos.coords.longitude}`),
        () => navegar('My+Location'),
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
    );
};

window.selecionarRota = async function() {
    if (!resumoDepositosCarregado) {
        if (window.playAlert) await window.playAlert('Aguarde a verificaГ§ГЈo dos depГіsitos.');
        else mostrarToast('Aguarde a verificaГ§ГЈo dos depГіsitos.');
        return;
    }
    if (rotaBloqueadaPorDeposito) {
        if (window.playAlert) await window.playAlert(mensagemBloqueioDeposito || MENSAGEM_LIMITE_DEPOSITO);
        else mostrarToast(mensagemBloqueioDeposito || MENSAGEM_LIMITE_DEPOSITO);
        return;
    }
    if (!usuarioAtual) {
        mostrarToast('вҡ пёҸ Nenhum usuГЎrio selecionado no app');
        return;
    }
    if (!sessaoAtual) {
        mostrarToast('вҡ пёҸ Nenhuma sessГЈo ativa');
        return;
    }

    const btn = document.getElementById('btnSortear');
    btn.setAttribute('disabled', true);
    btn.innerHTML = 'Buscando rota de maior valor disponГӯvel...';

    // Liga a flag ANTES de chamar o Firebase para que o listener
    // que dispara ao salvar jГғЖ’ГӮВЎ encontre estaAnimando = true
    estaAnimando = true;

    let rotaSelecionada = null;
    try {
        rotaSelecionada = await dbSelecionarRota(usuarioAtual);
    } catch (e) {
        console.error(e);
        estaAnimando = false;
        mostrarToast('вқҢ Erro ao selecionar. Tente novamente.');
        btn.removeAttribute('disabled');
        btn.innerHTML = 'SELECIONAR ROTA';
        return;
    }

    if (!rotaSelecionada) {
        estaAnimando = false;
        mostrarToast('Todas as rotas jГЎ foram selecionadas!');
        btn.setAttribute('disabled', true);
        btn.innerHTML = 'рҹ”’ &nbsp;Nenhuma rota disponГӯvel';
        return;
    }

    await animarSlot(rotaSelecionada.numeroRota);
    estaAnimando = false;

    // Confetti
    dispararConfetti();

    // Renderiza os detalhes agora que a animaГғЖ’ГӮВ§ГғЖ’ГӮВЈo terminou
    if (sessaoAtual) {
        const rotas = sessaoAtual.rotas || {};
        const minhasRotas = Object.entries(rotas)
            .filter(([_, r]) => r.selecionada_por === usuarioAtual)
            .map(([n]) => n);
        atualizarVisibilidadeCardNumero(minhasRotas.length, minhasRotas[minhasRotas.length - 1]);
        if (minhasRotas.length > 0) {
            document.getElementById('wrapJaSelecionou').style.display = 'block';
            mostrarMinhasRotas(minhasRotas, sessaoAtual);
        }
        if (minhasRotas.length >= LIMITE_ROTAS) {
            document.getElementById('btnSortearWrap').style.display = 'none';
        } else {
            const disponiveis = Object.values(rotas).filter(r => !r.selecionada_por);
            if (disponiveis.length === 0) {
                btn.setAttribute('disabled', true);
                btn.innerHTML = 'рҹ”’ &nbsp;Nenhuma rota disponГӯvel';
            } else {
                btn.removeAttribute('disabled');
                btn.innerHTML = 'SELECIONAR ROTA';
            }
            aplicarBloqueioDepositoRota();
        }
    }
};

function animarSlot(rotaFinal) {
    return new Promise(resolve => {
        const el = document.getElementById('slotNumero');
        const rotasSessao = Object.keys(sessaoAtual?.rotas || {});
        const rotas = numerosDeRota.length > 0 ? numerosDeRota : (rotasSessao.length > 0 ? rotasSessao : ['01']);
        el.classList.add('girando');

        let count = 0;
        const totalSpins = 32;

        function spin() {
            const r = rotas[Math.floor(Math.random() * rotas.length)];
            el.textContent = r;
            count++;

            let delay;
            if (count < totalSpins * 0.5)      delay = 55;
            else if (count < totalSpins * 0.75) delay = 130;
            else if (count < totalSpins * 0.9)  delay = 240;
            else if (count < totalSpins)         delay = 400;
            else {
                el.classList.remove('girando');
                el.textContent = rotaFinal;
                resolve();
                return;
            }
            setTimeout(spin, delay);
        }

        spin();
    });
}

// CГғЖ’ГӮВЎlculo das estimativas por rota
// ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬
async function calcularValoresPorRota() {
    await dbSincronizarMediaDeVendasComClientes();

    const [clientes, atendimentos, medias] = await Promise.all([
        dbListarClientes(),
        dbListarAtendimentos(),
        dbListarMediaDeVendas()
    ]);
    clientesPorIdMap = {};
    (clientes || []).forEach((cliente) => {
        if (!cliente?.firebaseUrl) return;
        clientesPorIdMap[cliente.firebaseUrl] = cliente;
    });
    atualizarClientesAtendidosRecentes(atendimentos);

    // Agrupa atendimentos por clienteId, ordena por data desc
    const atendPorCliente = {};
    atendimentos.forEach(a => {
        const cid = a.cliente?.id;
        if (!cid) return;
        if (!atendPorCliente[cid]) atendPorCliente[cid] = [];
        atendPorCliente[cid].push(a);
    });
    Object.values(atendPorCliente).forEach(lista => {
        lista.sort((a, b) => new Date(b.data) - new Date(a.data));
    });

    // Monta maquinas mais recentes por clienteId
    const maquinasPorClienteMap = {};
    clientes.forEach(c => {
        const lista = atendPorCliente[c.firebaseUrl] || [];
        // Pega fotos do atendimento mais recente que tiver fotos
        for (const at of lista) {
            if (at.fotos?.maquinas?.length > 0) {
                maquinasPorClienteMap[c.firebaseUrl] = at.fotos.maquinas;
                break;
            }
        }
    });

    const mediaPorNumero = {};
    medias.forEach(item => {
        const numero = String(item?.cliente?.numero ?? item?.cliente_numero ?? item?.firebaseUrl ?? '').trim();
        if (!numero) return;
        mediaPorNumero[numero] = item;
    });

    // Calcula estimativa por cliente usando 100% a base Media_de_Vendas atual
    const rotasMap = {}; // { "01": { valor_estimado, clientes: [] } }

    clientes.forEach(c => {
        if (c?.emRecuperacao === true) return;

        const numRota = (c.rota || '').trim();
        if (!numRota) return;

        const mediaAtual = mediaPorNumero[String(c.numero ?? '').trim()] || null;
        const estimativa = Number.isFinite(Number(mediaAtual?.estimativaAtualDia))
            ? Math.round((Number(mediaAtual.estimativaAtualDia) + Number.EPSILON) * 100) / 100
            : 0;

        if (!rotasMap[numRota]) {
            rotasMap[numRota] = { valor_estimado: 0, clientes: [], num_clientes: 0 };
        }
        rotasMap[numRota].valor_estimado += estimativa;
        rotasMap[numRota].num_clientes++;
        rotasMap[numRota].clientes.push({
            id: c.firebaseUrl,
            numero: c.numero || '',
            nome: c.nome || '',
            endereco: c.endereco || '',
            numero_endereco: c.numero_endereco || '',
            cidade: c.cidade || '',
            aberto: c.aberto || ''
        });
    });

    // Ordena por valor desc
    const rotas = Object.entries(rotasMap)
        .map(([numero, dados]) => ({ numero, ...dados }))
        .sort((a, b) => b.valor_estimado - a.valor_estimado);

    // Monta clientesPorRota
    const cpr = {};
    rotas.forEach(r => { cpr[r.numero] = r.clientes; });

    return { rotas, clientesPorRota: cpr, maquinasPorClienteMap };
}

// Criar/reiniciar sessГғЖ’ГӮВЈo (automГғЖ’ГӮВЎtico ou via admin)
// ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬ГғВўГўвӮ¬ВқГўвҖҡВ¬
async function iniciarSessao() {
    const dados = await calcularValoresPorRota();

    if (dados.rotas.length === 0) {
        mostrarToast('вқҢ Nenhuma rota encontrada nos clientes cadastrados');
        return;
    }

    const sessaoAnterior = sessaoAtual || null;
    const rotasAntigas = sessaoAnterior?.rotas || {};
    const clientesPorRotaAntigos = sessaoAnterior?.clientes_por_rota || {};

    const rotasObj = {};
    dados.rotas.forEach(r => {
        rotasObj[r.numero] = {
            valor_estimado: r.valor_estimado,
            num_clientes: r.num_clientes,
            selecionada_por: null,
            selecionada_em: null,
            validade_maxima_em: null,
            prazo_justificativa_em: null,
            liberar_em: null,
            motivo_liberacao: null,
            prioridade_manual: null,
            prioridade_manual_em: null,
            prioridade_manual_por: null
        };
    });

    function limparClienteRota(cliente) {
        return {
            id: cliente?.id || cliente?.firebaseUrl || '',
            numero: cliente?.numero || '',
            nome: cliente?.nome || '',
            endereco: cliente?.endereco || '',
            numero_endereco: cliente?.numero_endereco || '',
            cidade: cliente?.cidade || '',
            aberto: cliente?.aberto || ''
        };
    }

    const clientesPorRota = Object.fromEntries(
        Object.entries(dados.clientesPorRota || {}).map(([numero, lista]) => [
            numero,
            (Array.isArray(lista) ? lista : []).map(limparClienteRota)
        ])
    );

    Object.entries(rotasAntigas).forEach(([numero, rotaAntiga]) => {
        if (rotaAntiga?.prioridade_manual && rotasObj[numero]) {
            rotasObj[numero].prioridade_manual = true;
            rotasObj[numero].prioridade_manual_em = rotaAntiga.prioridade_manual_em || null;
            rotasObj[numero].prioridade_manual_por = rotaAntiga.prioridade_manual_por || null;
        }

        if (!rotaAntiga?.selecionada_por) return;

        if (!rotasObj[numero]) {
            rotasObj[numero] = {
                valor_estimado: rotaAntiga.valor_estimado || 0,
                num_clientes: rotaAntiga.num_clientes ?? ((clientesPorRotaAntigos[numero] || []).length),
                selecionada_por: rotaAntiga.selecionada_por,
                selecionada_em: rotaAntiga.selecionada_em || null,
                validade_maxima_em: rotaAntiga.validade_maxima_em || null,
                prazo_justificativa_em: rotaAntiga.prazo_justificativa_em || null,
                liberar_em: rotaAntiga.liberar_em || null,
                motivo_liberacao: rotaAntiga.motivo_liberacao || null,
                prioridade_manual: rotaAntiga.prioridade_manual === true ? true : null,
                prioridade_manual_em: rotaAntiga.prioridade_manual_em || null,
                prioridade_manual_por: rotaAntiga.prioridade_manual_por || null
            };
        } else {
            rotasObj[numero] = {
                ...rotasObj[numero],
                selecionada_por: rotaAntiga.selecionada_por,
                selecionada_em: rotaAntiga.selecionada_em || null,
                validade_maxima_em: rotaAntiga.validade_maxima_em || null,
                prazo_justificativa_em: rotaAntiga.prazo_justificativa_em || null,
                liberar_em: rotaAntiga.liberar_em || null,
                motivo_liberacao: rotaAntiga.motivo_liberacao || null,
                prioridade_manual: rotaAntiga.prioridade_manual === true ? true : null,
                prioridade_manual_em: rotaAntiga.prioridade_manual_em || null,
                prioridade_manual_por: rotaAntiga.prioridade_manual_por || null
            };
        }

        if (clientesPorRotaAntigos[numero]) {
            clientesPorRota[numero] = (clientesPorRotaAntigos[numero] || []).map(limparClienteRota);
        }
    });

    const sessao = {
        criada_em: new Date().toISOString(),
        referencia_dia: obterHojeLocal(),
        criada_por: usuarioAtual,
        rotas: rotasObj,
        clientes_por_rota: clientesPorRota,
        maquinas_por_cliente: {
            ...(sessaoAnterior?.maquinas_por_cliente || {}),
            ...(dados.maquinasPorClienteMap || {})
        }
    };

window.abrirLightbox = function(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('ativo');
    history.pushState({ lightbox: true }, '');
};
window.fecharLightbox = function() {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('ativo')) return;
    lb.classList.remove('ativo');
    if (history.state && history.state.lightbox) history.back();
};

window.addEventListener('popstate', function(e) {
    const lb = document.getElementById('lightbox');
    if (lb && lb.classList.contains('ativo')) {
        lb.classList.remove('ativo');
    }
});

function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visivel');
    setTimeout(() => t.classList.remove('visivel'), 3000);
}

function dispararConfetti() {
    const cores = ['#ffeb3b','#4cff91','#4e8aff','#ff5252','#ff9800','#e040fb'];
    let maxMs = 0;
    for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = cores[Math.floor(Math.random() * cores.length)];
        p.style.width = (6 + Math.random() * 8) + 'px';
        p.style.height = (6 + Math.random() * 8) + 'px';
        const durationMs = 1500 + Math.random() * 2000;
        const delayMs = Math.random() * 600;
        maxMs = Math.max(maxMs, durationMs + delayMs);
        p.style.animationDuration = (durationMs / 1000) + 's';
        p.style.animationDelay = (delayMs / 1000) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), durationMs + delayMs + 200);
    }

    if (timerResetSlot) clearTimeout(timerResetSlot);
    timerResetSlot = setTimeout(() => {
        if (estaAnimando) return;
        const el = document.getElementById('slotNumero');
        if (!el) return;
        el.classList.remove('girando');
        el.textContent = '?';
    }, maxMs + 250);
}
